<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradEdge — MATRIX</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080810; --surface: rgba(255,255,255,0.02); --border: rgba(255,255,255,0.04);
      --green: #00ff88; --yellow: #ffd000; --blue: #00c8ff; --red: #ff3366;
      --mono: 'JetBrains Mono', monospace; --sans: 'Space Grotesk', sans-serif;
      --text: #fff; --text2: rgba(255,255,255,0.4); --text3: rgba(255,255,255,0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); }
    ::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
    #loading { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 12px; }
    #loading .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease-out both; }
    @keyframes pulseGlow { 0%,100%{box-shadow:0 0 4px rgba(0,255,136,0.1)} 50%{box-shadow:0 0 12px rgba(0,255,136,0.25)} }
    .macro-card:hover { transform: translateY(-1px); }
    .rotation-cell:hover { filter: brightness(1.3); transform: scale(1.05); }
    .corr-cell:hover { outline: 1px solid rgba(255,255,255,0.3); z-index: 1; }
    .analysis-toggle { cursor: pointer; user-select: none; transition: all 0.2s; }
    .analysis-toggle:hover { background: rgba(255,255,255,0.03); }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <div class="spinner"></div>
      <span style="font-family:var(--mono);font-size:11px;color:rgba(255,255,255,0.25)">Loading MATRIX data...</span>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useMemo, useCallback, useEffect, useRef } = React;

    const DATA_URL = './data/rrm_data.json';

    const Q_COLORS = { Leading: '#00ff88', Improving: '#00c8ff', Weakening: '#ffd000', Lagging: '#ff3366' };
    const LIGHT_MAP = { GREEN: '#00ff88', YELLOW: '#ffd000', BLUE: '#00c8ff', RED: '#ff3366' };
    const GROUP_META = [
      { key: 'sectors',         label: 'Sectors',  icon: '◉', desc: '16 NSE Sector Indices' },
      { key: 'etfs',            label: 'ETFs',     icon: '◆', desc: '54 NSE ETFs' },
      { key: 'asset_classes',   label: 'Assets',   icon: '◈', desc: '12 Asset Classes' },
      { key: 'market_segments', label: 'Segments', icon: '◇', desc: '4 Market Segments' },
      { key: 'global_indices',  label: 'Global',   icon: '🌐', desc: '25 Global Indices' },
      { key: 'custom_stocks',   label: 'My Stocks',icon: '★', desc: 'Custom Watchlist' },
    ];
    const BENCHMARKS = [
      { key: '^NSEI',    label: 'Nifty 50' },
      { key: '^NSEBANK', label: 'Bank Nifty' },
      { key: '^CRSLDX',  label: 'Nifty 500' },
    ];

    /* ═══════════════════════════════════════════════════════════
       DATA TRANSFORMER
       ═══════════════════════════════════════════════════════════ */
    function transformData(raw, benchKey, groupKey) {
      const bm = raw?.benchmarks_data?.[benchKey];
      if (!bm) return [];
      const daily   = bm.daily?.[groupKey]   || [];
      const weekly  = bm.weekly?.[groupKey]   || [];
      const monthly = bm.monthly?.[groupKey]  || [];
      const wMap = {}; weekly.forEach(s  => { wMap[s.symbol] = s; });
      const mMap = {}; monthly.forEach(s => { mMap[s.symbol] = s; });
      return daily.map(d => {
        const w = wMap[d.symbol] || {};
        const m = mMap[d.symbol] || {};
        return {
          symbol: d.symbol, name: d.name, color: d.color, group: d.group || '',
          daily:   { q: d.quadrant || '', rsr: d.current?.rs_ratio || 100, rsm: d.current?.rs_momentum || 100 },
          weekly:  { q: w.quadrant || '', rsr: w.current?.rs_ratio || 100, rsm: w.current?.rs_momentum || 100 },
          monthly: { q: m.quadrant || '', rsr: m.current?.rs_ratio || 100, rsm: m.current?.rs_momentum || 100 },
          dailyTail: d.tail || [], weeklyTail: w.tail || [], monthlyTail: m.tail || [],
        };
      });
    }

    /* ═══════════════════════════════════════════════════════════
       SIGNAL COMPUTATION
       ═══════════════════════════════════════════════════════════ */
    function computeSignals(item) {
      const { daily: d, weekly: w, monthly: m } = item;
      const right = q => q === 'Leading' || q === 'Improving';
      let score = 0;
      if (right(m.q)) score += (m.rsr >= 100 && m.rsm >= 100) ? 2 : 1;
      if (right(w.q)) score += (w.rsr >= 100 && w.rsm >= 100) ? 2 : 1;
      if (right(d.q)) score += 1;
      score = Math.min(score, 5);
      let light;
      if      (right(m.q) && right(w.q) && right(d.q))  light = 'GREEN';
      else if (right(m.q) && !right(w.q) && right(d.q)) light = 'YELLOW';
      else if (!right(m.q) && right(w.q) && right(d.q)) light = 'BLUE';
      else                                               light = 'RED';
      const weeklyMomOk = w.rsm >= 98 && w.rsm <= 106;
      const rsiOk = right(w.q) && weeklyMomOk;
      let action;
      if      (score >= 4 && rsiOk)    action = 'AGGRESSIVE BUY';
      else if (score >= 3 && rsiOk)    action = 'BUY ON DIP';
      else if (light === 'YELLOW')     action = 'HOOK ENTRY';
      else if (light === 'BLUE')       action = 'SCALP ONLY';
      else if (score >= 3)             action = 'HOLD';
      else                             action = 'AVOID';
      return { score, light, rsiOk, action };
    }

    /* ═══════════════════════════════════════════════════════════
       TINY COMPONENTS (unchanged from original)
       ═══════════════════════════════════════════════════════════ */
    const Dot = ({ color, active, s = 7 }) => (
      <span style={{
        display: 'inline-block', width: s, height: s, borderRadius: '50%',
        background: active ? color : 'rgba(255,255,255,0.05)',
        boxShadow: active ? `0 0 8px ${color}50` : 'none', transition: 'all 0.3s',
      }} />
    );

    const QBadge = ({ q }) => {
      const c = Q_COLORS[q] || '#444';
      return (
        <span style={{
          padding: '1px 6px', borderRadius: 3, border: `1px solid ${c}25`,
          background: `${c}08`, color: c, fontSize: 10, fontWeight: 600,
          fontFamily: 'var(--mono)', letterSpacing: '0.03em',
        }}>{q || '—'}</span>
      );
    };

    const ScoreBar = ({ score }) => {
      const c = score >= 4 ? '#00ff88' : score >= 3 ? '#ffd000' : '#ff3366';
      return (
        <div style={{ display: 'flex', alignItems: 'center', gap: 5, minWidth: 70 }}>
          <div style={{ flex: 1, height: 3, borderRadius: 2, background: 'rgba(255,255,255,0.04)', overflow: 'hidden' }}>
            <div style={{ width: `${(score / 5) * 100}%`, height: '100%', background: c, borderRadius: 2, boxShadow: `0 0 8px ${c}30`, transition: 'width 0.5s ease' }} />
          </div>
          <span style={{ color: c, fontWeight: 700, fontSize: 12, fontFamily: 'var(--mono)', width: 12, textAlign: 'right' }}>{score}</span>
        </div>
      );
    };

    const Sparkline = ({ data, width = 60, height = 20, color = '#00c8ff' }) => {
      if (!data || data.length < 2) return null;
      const vals = data.map(d => d.rs_ratio);
      const min = Math.min(...vals); const max = Math.max(...vals);
      const range = max - min || 1;
      const pts = vals.map((v, i) => {
        const x = (i / (vals.length - 1)) * width;
        const y = height - ((v - min) / range) * (height - 2) - 1;
        return `${x},${y}`;
      }).join(' ');
      return (
        <svg width={width} height={height} style={{ display: 'block' }}>
          <polyline points={pts} fill="none" stroke={color} strokeWidth="1.2" strokeLinejoin="round" />
          <line x1="0" y1={height - ((100 - min) / range) * (height - 2) - 1} x2={width} y2={height - ((100 - min) / range) * (height - 2) - 1}
            stroke="rgba(255,255,255,0.06)" strokeWidth="0.5" strokeDasharray="2,2" />
        </svg>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       ASSET ROW (unchanged)
       ═══════════════════════════════════════════════════════════ */
    const AssetRow = ({ item, sig, expanded, onToggle, idx }) => {
      const lc = LIGHT_MAP[sig.light];
      return (
        <div style={{ borderBottom: '1px solid rgba(255,255,255,0.02)' }} className="fade-in">
          <div onClick={onToggle} style={{
            display: 'grid', gridTemplateColumns: 'minmax(110px,1.2fr) 85px 80px 50px 70px 90px',
            alignItems: 'center', gap: 6, padding: '4px 12px', cursor: 'pointer',
            background: expanded ? 'rgba(255,255,255,0.02)' : 'transparent', transition: 'background 0.2s',
          }}>
            <div>
              <div style={{ color: '#fff', fontWeight: 600, fontSize: 11.5, fontFamily: 'var(--mono)', lineHeight: 1.3 }}>{item.name}</div>
              <div style={{ color: 'rgba(255,255,255,0.2)', fontSize: 9, fontFamily: 'var(--mono)' }}>{item.symbol}</div>
            </div>
            <div style={{ display: 'flex', gap: 3, alignItems: 'center' }}>
              {['GREEN','YELLOW','BLUE','RED'].map(l => <Dot key={l} color={LIGHT_MAP[l]} active={sig.light === l} />)}
              <span style={{ fontSize: 8, color: lc, fontFamily: 'var(--mono)', fontWeight: 700, marginLeft: 2 }}>{sig.light}</span>
            </div>
            <ScoreBar score={sig.score} />
            <span style={{ fontSize: 10, fontFamily: 'var(--mono)', fontWeight: 600, textAlign: 'center', color: sig.rsiOk ? '#00ff88' : 'rgba(255,255,255,0.1)' }}>
              {sig.rsiOk ? '✓' : '✗'}
            </span>
            <QBadge q={item.weekly.q} />
            <span style={{
              padding: '2px 5px', borderRadius: 3, fontSize: 8.5, fontWeight: 700,
              fontFamily: 'var(--mono)', textAlign: 'center', whiteSpace: 'nowrap',
              color: lc, background: `${lc}08`, border: `1px solid ${lc}15`,
            }}>{sig.action}</span>
          </div>
          {expanded && (
            <div style={{ padding: '2px 12px 8px', display: 'grid', gridTemplateColumns: 'repeat(3, minmax(0,1fr))', gap: 6 }}>
              {[['DAILY', item.daily, item.dailyTail], ['WEEKLY', item.weekly, item.weeklyTail], ['MONTHLY', item.monthly, item.monthlyTail]].map(([label, tf, tail]) => {
                const qc = Q_COLORS[tf.q] || '#444';
                return (
                  <div key={label} style={{ background: 'rgba(255,255,255,0.012)', borderRadius: 6, padding: '6px 8px', border: `1px solid ${qc}12`, minWidth: 0, overflow: 'hidden' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
                      <span style={{ fontSize: 8, color: 'var(--text3)', fontWeight: 700, letterSpacing: '0.1em', fontFamily: 'var(--mono)' }}>{label}</span>
                      <QBadge q={tf.q} />
                    </div>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
                      <div style={{ display: 'flex', gap: 10 }}>
                        <div style={{ textAlign: 'center' }}>
                          <div style={{ fontSize: 7, color: 'var(--text3)', fontFamily: 'var(--mono)', marginBottom: 1 }}>RS-R</div>
                          <div style={{ fontSize: 13, fontWeight: 700, color: tf.rsr >= 100 ? '#00ff88' : '#ff3366', fontFamily: 'var(--mono)' }}>{tf.rsr.toFixed(1)}</div>
                        </div>
                        <div style={{ textAlign: 'center' }}>
                          <div style={{ fontSize: 7, color: 'var(--text3)', fontFamily: 'var(--mono)', marginBottom: 1 }}>RS-M</div>
                          <div style={{ fontSize: 13, fontWeight: 700, color: tf.rsm >= 100 ? '#00ff88' : '#ff3366', fontFamily: 'var(--mono)' }}>{tf.rsm.toFixed(1)}</div>
                        </div>
                      </div>
                      <Sparkline data={tail} color={qc} width={50} height={18} />
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       BLOOMBERG PANEL 1: MACRO PULSE STRIP
       Live macro indicators in a compact horizontal bar
       ═══════════════════════════════════════════════════════════ */
    const MacroPulse = ({ rrmData, benchmark }) => {
      // Extract macro data from asset_classes group
      const macroItems = useMemo(() => {
        if (!rrmData) return [];
        const assets = transformData(rrmData, benchmark, 'asset_classes');
        const globals = transformData(rrmData, benchmark, 'global_indices');
        const all = [...assets, ...globals];

        // Pick key macro indicators
        const keys = ['Gold', 'Silver', 'Crude Oil', 'USD/INR', 'Bitcoin', 'US 10Y Yield', 'VIX', 'Dow Jones', 'S&P 500', 'NASDAQ'];
        const found = [];
        keys.forEach(k => {
          const item = all.find(a => a.name?.includes(k) || a.symbol?.includes(k.toUpperCase().replace(/\s/g,'')));
          if (item) found.push({ ...item, sig: computeSignals(item) });
        });
        return found;
      }, [rrmData, benchmark]);

      if (!macroItems.length) return null;

      return (
        <div style={{ marginBottom: 10 }}>
          <div style={{ fontSize: 7.5, color: 'var(--text3)', fontWeight: 700, letterSpacing: '0.12em', fontFamily: 'var(--mono)', marginBottom: 5 }}>
            MACRO PULSE
          </div>
          <div style={{ display: 'flex', gap: 4, overflowX: 'auto', paddingBottom: 4 }}>
            {macroItems.map(m => {
              const qc = Q_COLORS[m.weekly.q] || '#444';
              const momDir = m.weekly.rsm >= 100 ? '↑' : '↓';
              return (
                <div key={m.symbol} className="macro-card" style={{
                  background: `${qc}06`, border: `1px solid ${qc}15`, borderRadius: 6,
                  padding: '6px 10px', minWidth: 90, flexShrink: 0, transition: 'all 0.2s', cursor: 'default',
                }}>
                  <div style={{ fontSize: 8, color: 'var(--text2)', fontFamily: 'var(--mono)', marginBottom: 2, whiteSpace: 'nowrap' }}>{m.name}</div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                    <span style={{ fontSize: 13, fontWeight: 700, color: qc, fontFamily: 'var(--mono)' }}>{m.weekly.rsr.toFixed(0)}</span>
                    <span style={{ fontSize: 10, color: m.weekly.rsm >= 100 ? '#00ff88' : '#ff3366', fontWeight: 600 }}>{momDir}</span>
                  </div>
                  <div style={{ fontSize: 7, color: 'var(--text3)', fontFamily: 'var(--mono)', marginTop: 1 }}>{m.weekly.q}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       BLOOMBERG PANEL 2: SECTOR ROTATION MAP
       Visual quadrant distribution showing rotation flow
       ═══════════════════════════════════════════════════════════ */
    const SectorRotationMap = ({ enriched }) => {
      const quadrants = useMemo(() => {
        const q = { Leading: [], Improving: [], Weakening: [], Lagging: [] };
        enriched.forEach(item => {
          const wq = item.weekly.q;
          if (q[wq]) q[wq].push(item);
        });
        return q;
      }, [enriched]);

      const total = enriched.length || 1;

      // Detect rotation: items where daily != weekly quadrant
      const rotating = useMemo(() => {
        return enriched.filter(item => item.daily.q !== item.weekly.q).map(item => ({
          ...item,
          from: item.weekly.q,
          to: item.daily.q,
        }));
      }, [enriched]);

      const qOrder = ['Leading', 'Improving', 'Weakening', 'Lagging'];
      const qIcons = { Leading: '◉', Improving: '◈', Weakening: '◆', Lagging: '◇' };

      return (
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, padding: 12 }}>
          <div style={{ fontSize: 9, color: 'var(--text2)', fontWeight: 700, letterSpacing: '0.1em', fontFamily: 'var(--mono)', marginBottom: 10 }}>
            SECTOR ROTATION MAP — Weekly Quadrants
          </div>

          {/* Quadrant grid */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6, marginBottom: 10 }}>
            {qOrder.map(qName => {
              const items = quadrants[qName];
              const qc = Q_COLORS[qName];
              const pct = ((items.length / total) * 100).toFixed(0);
              return (
                <div key={qName} style={{
                  background: `${qc}04`, border: `1px solid ${qc}12`, borderRadius: 6, padding: '8px 10px',
                }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                    <span style={{ fontSize: 10, fontWeight: 700, color: qc, fontFamily: 'var(--mono)' }}>
                      {qIcons[qName]} {qName.toUpperCase()}
                    </span>
                    <span style={{ fontSize: 11, fontWeight: 700, color: qc, fontFamily: 'var(--mono)' }}>
                      {items.length} <span style={{ fontSize: 9, opacity: 0.5 }}>({pct}%)</span>
                    </span>
                  </div>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 3 }}>
                    {items.map(item => {
                      const isRotating = rotating.find(r => r.symbol === item.symbol);
                      return (
                        <span key={item.symbol} className="rotation-cell" style={{
                          fontSize: 9.5, fontFamily: 'var(--mono)', fontWeight: 600,
                          padding: '2px 5px', borderRadius: 3,
                          background: isRotating ? `${Q_COLORS[isRotating.to]}15` : 'rgba(255,255,255,0.03)',
                          color: isRotating ? Q_COLORS[isRotating.to] : 'var(--text2)',
                          border: isRotating ? `1px solid ${Q_COLORS[isRotating.to]}25` : '1px solid transparent',
                          cursor: 'default', transition: 'all 0.2s',
                        }} title={isRotating ? `Rotating: ${isRotating.from} → ${isRotating.to}` : item.weekly.q}>
                          {item.name?.replace(/^Nifty\s?/, '').slice(0, 10)}
                          {isRotating && <span style={{ marginLeft: 2, fontSize: 7 }}>→</span>}
                        </span>
                      );
                    })}
                    {items.length === 0 && <span style={{ fontSize: 8, color: 'var(--text3)', fontFamily: 'var(--mono)' }}>—</span>}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Rotation alerts */}
          {rotating.length > 0 && (
            <div style={{ borderTop: '1px solid var(--border)', paddingTop: 8 }}>
              <div style={{ fontSize: 9, color: 'var(--yellow)', fontWeight: 700, letterSpacing: '0.1em', fontFamily: 'var(--mono)', marginBottom: 4 }}>
                ⚡ ROTATION DETECTED ({rotating.length})
              </div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
                {rotating.map(r => (
                  <span key={r.symbol} style={{
                    fontSize: 9.5, fontFamily: 'var(--mono)', fontWeight: 600,
                    padding: '2px 6px', borderRadius: 3,
                    background: 'rgba(255,208,0,0.06)', border: '1px solid rgba(255,208,0,0.15)',
                    color: 'var(--yellow)',
                  }}>
                    {r.name?.replace(/^Nifty\s?/, '')}:{' '}
                    <span style={{ color: Q_COLORS[r.from] }}>{r.from?.slice(0,4)}</span>
                    {' → '}
                    <span style={{ color: Q_COLORS[r.to] }}>{r.to?.slice(0,4)}</span>
                  </span>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       BLOOMBERG PANEL 3: CORRELATION MATRIX HEATMAP
       Shows RS-Ratio similarity between sectors
       ═══════════════════════════════════════════════════════════ */
    const CorrelationMatrix = ({ enriched }) => {
      const matrix = useMemo(() => {
        if (enriched.length < 2) return null;
        const n = Math.min(enriched.length, 16); // Cap at 16 for readability
        const items = enriched.slice(0, n);

        // Compute "correlation" based on RS-Ratio + RS-Momentum similarity
        const corr = [];
        for (let i = 0; i < n; i++) {
          corr[i] = [];
          for (let j = 0; j < n; j++) {
            if (i === j) { corr[i][j] = 1; continue; }
            const a = items[i], b = items[j];
            // Normalized distance in RS-Ratio/Momentum space
            const dR = Math.abs(a.weekly.rsr - b.weekly.rsr);
            const dM = Math.abs(a.weekly.rsm - b.weekly.rsm);
            const dist = Math.sqrt(dR * dR + dM * dM);
            // Convert to correlation-like score (closer = higher)
            corr[i][j] = Math.max(0, 1 - dist / 15); // 15 = normalization factor
          }
        }
        return { items, corr, n };
      }, [enriched]);

      if (!matrix || matrix.n < 2) return null;

      const { items, corr, n } = matrix;
      const cellSize = Math.min(28, Math.floor(280 / n));

      const getColor = (v) => {
        if (v >= 0.8) return '#00ff8850';
        if (v >= 0.6) return '#00ff8830';
        if (v >= 0.4) return '#00c8ff20';
        if (v >= 0.2) return '#ffd00015';
        return '#ff336610';
      };

      return (
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, padding: 12 }}>
          <div style={{ fontSize: 9, color: 'var(--text2)', fontWeight: 700, letterSpacing: '0.1em', fontFamily: 'var(--mono)', marginBottom: 10 }}>
            RS CORRELATION MATRIX — Weekly RS-Ratio Proximity
          </div>
          <div style={{ overflowX: 'auto' }}>
            <div style={{ display: 'inline-grid', gridTemplateColumns: `30px repeat(${n}, ${cellSize}px)`, gap: 1 }}>
              {/* Header row */}
              <div />
              {items.map((item, j) => (
                <div key={`h-${j}`} style={{
                  fontSize: 6.5, color: 'var(--text3)', fontFamily: 'var(--mono)', fontWeight: 600,
                  textAlign: 'center', height: 30, display: 'flex', alignItems: 'flex-end', justifyContent: 'center',
                  paddingBottom: 2, writingMode: 'vertical-rl', transform: 'rotate(180deg)',
                }}>
                  {item.name?.replace(/^Nifty\s?/, '').slice(0, 8)}
                </div>
              ))}
              {/* Data rows */}
              {items.map((rowItem, i) => (
                <React.Fragment key={`r-${i}`}>
                  <div style={{
                    fontSize: 6.5, color: 'var(--text3)', fontFamily: 'var(--mono)', fontWeight: 600,

            <span><span style={{ display: 'inline-block', width: 8, height: 8, borderRadius: 2, background: '#00c8ff20', marginRight: 3, verticalAlign: 'middle' }}/>Moderate</span>
            <span><span style={{ display: 'inline-block', width: 8, height: 8, borderRadius: 2, background: '#ff336610', marginRight: 3, verticalAlign: 'middle' }}/>Divergent</span>

    /* ═══════════════════════════════════════════════════════════
       BLOOMBERG PANEL 4: ANALYSIS PANEL
       Market regime, breadth summary, key insights
       ═══════════════════════════════════════════════════════════ */
    const AnalysisPanel = ({ enriched, rrmData, benchmark }) => {
      const analysis = useMemo(() => {
        if (!enriched.length) return null;

        // Quadrant distribution
        const qDist = { Leading: 0, Improving: 0, Weakening: 0, Lagging: 0 };
        enriched.forEach(item => { if (qDist[item.weekly.q] !== undefined) qDist[item.weekly.q]++; });
        const total = enriched.length;

        // Market regime
        const rightSide = qDist.Leading + qDist.Improving;
        const leftSide = qDist.Weakening + qDist.Lagging;
        const rightPct = ((rightSide / total) * 100).toFixed(0);
        let regime;
        if (rightPct >= 70) regime = { label: 'STRONG BULL', color: '#00ff88', icon: '🟢' };
        else if (rightPct >= 55) regime = { label: 'BULL', color: '#00ff88', icon: '🟢' };
        else if (rightPct >= 45) regime = { label: 'TRANSITIONAL', color: '#ffd000', icon: '🟡' };
        else if (rightPct >= 30) regime = { label: 'BEAR', color: '#ff3366', icon: '🔴' };
        else regime = { label: 'STRONG BEAR', color: '#ff3366', icon: '🔴' };

        // Score distribution
        const scoreDist = { 5: 0, 4: 0, 3: 0, 2: 0, 1: 0, 0: 0 };
        enriched.forEach(item => { scoreDist[item.sig.score]++; });
        const highConviction = scoreDist[5] + scoreDist[4];

        // Top movers (highest RS-Momentum)
        const topMom = [...enriched].sort((a, b) => b.weekly.rsm - a.weekly.rsm).slice(0, 3);
        const bottomMom = [...enriched].sort((a, b) => a.weekly.rsm - b.weekly.rsm).slice(0, 3);

        // Insights
        const insights = [];
        if (rightPct >= 60) insights.push({ type: 'bull', text: `${rightPct}% sectors on right side — broad-based strength` });
        if (rightPct <= 35) insights.push({ type: 'bear', text: `Only ${rightPct}% on right side — defensive positioning advised` });
        if (qDist.Improving > qDist.Leading) insights.push({ type: 'rotation', text: `More Improving (${qDist.Improving}) than Leading (${qDist.Leading}) — early rotation phase` });
        if (qDist.Weakening > qDist.Lagging) insights.push({ type: 'rotation', text: `More Weakening (${qDist.Weakening}) than Lagging (${qDist.Lagging}) — distribution phase` });
        if (highConviction >= total * 0.3) insights.push({ type: 'bull', text: `${highConviction} high-conviction setups (Score ≥4) — aggressive deployment` });
        if (scoreDist[1] + scoreDist[0] >= total * 0.5) insights.push({ type: 'bear', text: `${scoreDist[1] + scoreDist[0]} low-score assets — capital preservation mode` });

        return { qDist, total, rightPct, regime, scoreDist, highConviction, topMom, bottomMom, insights };
      }, [enriched]);

      if (!analysis) return null;

      const { qDist, total, rightPct, regime, scoreDist, highConviction, topMom, bottomMom, insights } = analysis;

      return (
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, padding: 12 }}>
          <div style={{ fontSize: 9, color: 'var(--text2)', fontWeight: 700, letterSpacing: '0.1em', fontFamily: 'var(--mono)', marginBottom: 10 }}>
            MARKET ANALYSIS — {BENCHMARKS.find(b => b.key === benchmark)?.label}
          </div>

          {/* Regime + Breadth */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, marginBottom: 10 }}>
            {/* Regime */}
            <div style={{ background: `${regime.color}06`, border: `1px solid ${regime.color}15`, borderRadius: 6, padding: '8px 10px', textAlign: 'center' }}>
              <div style={{ fontSize: 8, color: 'var(--text3)', fontFamily: 'var(--mono)', fontWeight: 700, letterSpacing: '0.1em', marginBottom: 4 }}>REGIME</div>
              <div style={{ fontSize: 14, fontWeight: 700, color: regime.color, fontFamily: 'var(--mono)' }}>{regime.label}</div>
              <div style={{ fontSize: 10, color: 'var(--text2)', fontFamily: 'var(--mono)', marginTop: 2 }}>{rightPct}% right side</div>
            </div>
            {/* Breadth bar */}
            <div style={{ background: 'rgba(255,255,255,0.015)', border: '1px solid var(--border)', borderRadius: 6, padding: '8px 10px' }}>
              <div style={{ fontSize: 8, color: 'var(--text3)', fontFamily: 'var(--mono)', fontWeight: 700, letterSpacing: '0.1em', marginBottom: 6 }}>BREADTH</div>
              <div style={{ display: 'flex', height: 6, borderRadius: 3, overflow: 'hidden', gap: 1 }}>
                <div style={{ width: `${(qDist.Leading / total) * 100}%`, background: '#00ff88', transition: 'width 0.5s' }} />
                <div style={{ width: `${(qDist.Improving / total) * 100}%`, background: '#00c8ff', transition: 'width 0.5s' }} />
                <div style={{ width: `${(qDist.Weakening / total) * 100}%`, background: '#ffd000', transition: 'width 0.5s' }} />
                <div style={{ width: `${(qDist.Lagging / total) * 100}%`, background: '#ff3366', transition: 'width 0.5s' }} />
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 4, fontSize: 8, fontFamily: 'var(--mono)' }}>
                <span style={{ color: '#00ff88' }}>L:{qDist.Leading}</span>
                <span style={{ color: '#00c8ff' }}>I:{qDist.Improving}</span>
                <span style={{ color: '#ffd000' }}>W:{qDist.Weakening}</span>
                <span style={{ color: '#ff3366' }}>Lg:{qDist.Lagging}</span>
              </div>
            </div>
            {/* High conviction */}
            <div style={{ background: 'rgba(255,255,255,0.015)', border: '1px solid var(--border)', borderRadius: 6, padding: '8px 10px', textAlign: 'center' }}>
              <div style={{ fontSize: 8, color: 'var(--text3)', fontFamily: 'var(--mono)', fontWeight: 700, letterSpacing: '0.1em', marginBottom: 4 }}>HIGH CONVICTION</div>
              <div style={{ fontSize: 20, fontWeight: 700, color: highConviction > 0 ? '#00ff88' : '#ff3366', fontFamily: 'var(--mono)' }}>{highConviction}</div>
              <div style={{ fontSize: 8, color: 'var(--text3)', fontFamily: 'var(--mono)' }}>Score ≥ 4</div>
            </div>
          </div>

          {/* Momentum Leaders & Laggards */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 10 }}>
            <div style={{ background: 'rgba(0,255,136,0.03)', border: '1px solid rgba(0,255,136,0.08)', borderRadius: 6, padding: '6px 10px' }}>
              <div style={{ fontSize: 7, color: '#00ff88', fontFamily: 'var(--mono)', fontWeight: 700, letterSpacing: '0.1em', marginBottom: 4 }}>▲ MOMENTUM LEADERS</div>
              {topMom.map(m => (
                <div key={m.symbol} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '2px 0' }}>
                  <span style={{ fontSize: 10, color: 'var(--text2)', fontFamily: 'var(--mono)' }}>{m.name?.replace(/^Nifty\s?/, '').slice(0, 12)}</span>
                  <span style={{ fontSize: 10, color: '#00ff88', fontFamily: 'var(--mono)', fontWeight: 700 }}>{m.weekly.rsm.toFixed(1)}</span>
                </div>
              ))}
            </div>
            <div style={{ background: 'rgba(255,51,102,0.03)', border: '1px solid rgba(255,51,102,0.08)', borderRadius: 6, padding: '6px 10px' }}>
              <div style={{ fontSize: 7, color: '#ff3366', fontFamily: 'var(--mono)', fontWeight: 700, letterSpacing: '0.1em', marginBottom: 4 }}>▼ MOMENTUM LAGGARDS</div>
              {bottomMom.map(m => (
                <div key={m.symbol} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '2px 0' }}>
                  <span style={{ fontSize: 10, color: 'var(--text2)', fontFamily: 'var(--mono)' }}>{m.name?.replace(/^Nifty\s?/, '').slice(0, 12)}</span>
                  <span style={{ fontSize: 10, color: '#ff3366', fontFamily: 'var(--mono)', fontWeight: 700 }}>{m.weekly.rsm.toFixed(1)}</span>
                </div>
              ))}
            </div>
          </div>

          {/* AI Insights */}
          {insights.length > 0 && (
            <div style={{ borderTop: '1px solid var(--border)', paddingTop: 8 }}>
              <div style={{ fontSize: 7.5, color: 'var(--blue)', fontWeight: 700, letterSpacing: '0.1em', fontFamily: 'var(--mono)', marginBottom: 4 }}>
                💡 KEY INSIGHTS
              </div>
              {insights.map((ins, i) => {
                const ic = ins.type === 'bull' ? '#00ff88' : ins.type === 'bear' ? '#ff3366' : '#ffd000';
                return (
                  <div key={i} style={{ fontSize: 10.5, color: 'var(--text2)', fontFamily: 'var(--mono)', padding: '2px 0', display: 'flex', gap: 6, alignItems: 'flex-start' }}>
                    <span style={{ color: ic, flexShrink: 0 }}>●</span>
                    <span>{ins.text}</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       POSITIONS TAB — from journal localStorage
       ═══════════════════════════════════════════════════════════ */
    const PositionsTab = ({ rrmData, benchmark }) => {
      const [positions, setPositions] = useState([]);

      useEffect(() => {
        try {
          const raw = localStorage.getItem('tradedge_trades');
          if (raw) {
            const trades = JSON.parse(raw).filter(t => t.status === 'Open' || t.status === 'Partial');
            setPositions(trades);
          }
        } catch(e) {}
      }, []);

      const enriched = useMemo(() => {
        if (!rrmData || !positions.length) return [];
        // Try to find RRM data for each position
        const allGroups = ['sectors', 'etfs', 'asset_classes', 'market_segments', 'global_indices'];
        const allItems = [];
        allGroups.forEach(g => {
          const items = transformData(rrmData, benchmark, g);
          allItems.push(...items);
        });

        return positions.map(pos => {
          const sym = pos.symbol?.toUpperCase() + '.NS';
          const rrmItem = allItems.find(a => a.symbol === sym || a.symbol === pos.symbol);
          return {
            ...pos,
            rrm: rrmItem ? { ...rrmItem, sig: computeSignals(rrmItem) } : null,
          };
        });
      }, [rrmData, benchmark, positions]);

      if (!positions.length) return (
        <div style={{ padding: 20, textAlign: 'center', color: 'var(--text3)', fontSize: 10, fontFamily: 'var(--mono)' }}>
          No open positions in journal
        </div>
      );

      return (
        <div style={{ borderRadius: 6, border: '1px solid var(--border)', overflow: 'hidden' }}>
          {enriched.map((pos, i) => {
            const qc = pos.rrm ? Q_COLORS[pos.rrm.weekly.q] : '#444';
            return (
              <div key={pos.id || i} style={{
                display: 'flex', alignItems: 'center', gap: 10, padding: '8px 12px',
                borderBottom: '1px solid rgba(255,255,255,0.025)',
              }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: '#fff', fontFamily: 'var(--mono)' }}>{pos.symbol}</div>
                  <div style={{ fontSize: 8, color: 'var(--text3)', fontFamily: 'var(--mono)' }}>{pos.side} · {pos.status}</div>
                </div>
                {pos.rrm ? (
                  <>
                    <QBadge q={pos.rrm.weekly.q} />
                    <ScoreBar score={pos.rrm.sig.score} />
                    <span style={{ fontSize: 8, color: LIGHT_MAP[pos.rrm.sig.light], fontWeight: 700, fontFamily: 'var(--mono)' }}>
                      {pos.rrm.sig.action}
                    </span>
                  </>
                ) : (
                  <span style={{ fontSize: 9, color: 'var(--text3)', fontFamily: 'var(--mono)' }}>No RRM data</span>
                )}
              </div>
            );
          })}
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       HELIX — Hybrid ELement Intelligence X-ray
       Multi-Dimensional Rotation Intelligence Graph
       ═══════════════════════════════════════════════════════════ */
    const HelixGraph = ({ enriched, rrmData, benchmark, activeGroup }) => {
      const canvasRef = useRef(null);
      const animRef = useRef(null);
      const [expanded, setExpanded] = useState(false);
      const [helixTF, setHelixTF] = useState('weekly');
      const [showRSI, setShowRSI] = useState(true);
      const [showMTF, setShowMTF] = useState(true);
      const [showTrails, setShowTrails] = useState(true);
      const [playing, setPlaying] = useState(false);
      const [playStep, setPlayStep] = useState(8);
      const playRef = useRef(null);
      const hoverRef = useRef(null);
      const [hoveredItem, setHoveredItem] = useState(null);

      const points = useMemo(() => {
        return enriched.map(item => {
          const tf = item[helixTF] || item.weekly;
          const sig = item.sig;
          const tail = helixTF === 'daily' ? item.dailyTail : helixTF === 'monthly' ? item.monthlyTail : item.weeklyTail;
          const trimmedTail = playing ? (tail || []).slice(0, playStep) : (tail || []).slice(-8);
          // During play, bubble position = last trail point (time-lapse)
          const lastTrailPt = playing && trimmedTail.length > 0 ? trimmedTail[trimmedTail.length - 1] : null;
          return {
            name: item.name?.replace(/^Nifty\s?/, '') || item.symbol,
            symbol: item.symbol,
            rsr: lastTrailPt ? lastTrailPt.rs_ratio : tf.rsr,
            rsm: lastTrailPt ? lastTrailPt.rs_momentum : tf.rsm,
            q: tf.q,
            score: sig.score, light: sig.light, action: sig.action, rsiOk: sig.rsiOk,
            color: LIGHT_MAP[sig.light] || '#444', qColor: Q_COLORS[tf.q] || '#444',
            tail: trimmedTail,
          };
        });
      }, [enriched, helixTF, playing, playStep]);

      useEffect(() => {
        const c = canvasRef.current;
        if (!c || !points.length) return;
        const dpr = window.devicePixelRatio || 1;
        const rect = c.getBoundingClientRect();
        const W = rect.width;
        const H = expanded ? Math.min(window.innerHeight - 100, 800) : 520;
        c.style.height = H + 'px';
        c.width = W * dpr; c.height = H * dpr;
        const ctx = c.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        let rMin = 94, rMax = 106, mMin = 94, mMax = 106;
        points.forEach(p => { rMin = Math.min(rMin, p.rsr - 1); rMax = Math.max(rMax, p.rsr + 1); mMin = Math.min(mMin, p.rsm - 1); mMax = Math.max(mMax, p.rsm + 1); });
        rMin -= 1; rMax += 1; mMin -= 1; mMax += 1;
        const mg = { l: 50, r: 20, t: 20, b: 36 };
        const cw = W - mg.l - mg.r, ch = H - mg.t - mg.b;
        const tX = v => mg.l + (v - rMin) / (rMax - rMin) * cw;
        const tY = v => mg.t + (1 - (v - mMin) / (mMax - mMin)) * ch;
        const cx = tX(100), cy = tY(100);

        function draw() {
          ctx.clearRect(0, 0, W, H);
          ctx.fillStyle = '#06060e'; ctx.fillRect(0, 0, W, H);

          // Grid
          ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 0.5;
          for (let v = Math.ceil(rMin); v <= Math.floor(rMax); v += 2) { ctx.beginPath(); ctx.moveTo(tX(v), mg.t); ctx.lineTo(tX(v), H - mg.b); ctx.stroke(); }
          for (let v = Math.ceil(mMin); v <= Math.floor(mMax); v += 2) { ctx.beginPath(); ctx.moveTo(mg.l, tY(v)); ctx.lineTo(W - mg.r, tY(v)); ctx.stroke(); }

          // Quadrant fills
          ctx.fillStyle = 'rgba(0,255,136,0.025)'; ctx.fillRect(cx, mg.t, W - mg.r - cx, cy - mg.t);
          ctx.fillStyle = 'rgba(0,200,255,0.02)';  ctx.fillRect(mg.l, mg.t, cx - mg.l, cy - mg.t);
          ctx.fillStyle = 'rgba(255,208,0,0.015)';  ctx.fillRect(cx, cy, W - mg.r - cx, H - mg.b - cy);
          ctx.fillStyle = 'rgba(255,51,102,0.02)';  ctx.fillRect(mg.l, cy, cx - mg.l, H - mg.b - cy);

          // Cross
          ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
          ctx.beginPath(); ctx.moveTo(cx, mg.t); ctx.lineTo(cx, H - mg.b); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(mg.l, cy); ctx.lineTo(W - mg.r, cy); ctx.stroke();
          ctx.setLineDash([]);

          // Quadrant labels
          ctx.font = '700 10px JetBrains Mono'; ctx.globalAlpha = 0.25;
          ctx.fillStyle = '#00ff88'; ctx.fillText('LEADING', cx + 6, mg.t + 14);
          ctx.fillStyle = '#00c8ff'; ctx.fillText('IMPROVING', mg.l + 4, mg.t + 14);
          ctx.fillStyle = '#ffd000'; ctx.fillText('WEAKENING', cx + 6, H - mg.b - 6);
          ctx.fillStyle = '#ff3366'; ctx.fillText('LAGGING', mg.l + 4, H - mg.b - 6);
          ctx.globalAlpha = 1;

          // Axes
          ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '600 9px JetBrains Mono';
          ctx.save(); ctx.translate(12, H / 2); ctx.rotate(-Math.PI / 2); ctx.fillText('RS-MOMENTUM →', 0, 0); ctx.restore();
          ctx.fillText('RS-RATIO →', W / 2 - 25, H - 6);
          ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.font = '600 8px JetBrains Mono';
          for (let v = Math.ceil(rMin); v <= Math.floor(rMax); v += 2) ctx.fillText(v.toString(), tX(v) - 5, H - mg.b + 12);
          for (let v = Math.ceil(mMin); v <= Math.floor(mMax); v += 2) ctx.fillText(v.toString(), 2, tY(v) + 3);

          const hovered = hoverRef.current;

          // Trails
          if (showTrails) {
            points.forEach(p => {
              if (!p.tail || p.tail.length < 2) return;
              const isH = hovered === p.symbol;
              const alpha = hovered ? (isH ? 0.85 : 0.08) : 0.45;
              ctx.globalAlpha = alpha;
              ctx.beginPath();
              p.tail.forEach((t, i) => { const x = tX(t.rs_ratio), y = tY(t.rs_momentum); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
              ctx.strokeStyle = p.color; ctx.lineWidth = isH ? 2.5 : 1.2; ctx.lineCap = 'round'; ctx.stroke();
              p.tail.forEach((t, i) => {
                ctx.globalAlpha = alpha * (0.3 + 0.7 * (i / Math.max(p.tail.length - 1, 1)));
                ctx.beginPath(); ctx.arc(tX(t.rs_ratio), tY(t.rs_momentum), i === p.tail.length - 1 ? 2.5 : 1.5, 0, Math.PI * 2);
                ctx.fillStyle = p.color; ctx.fill();
              });
              ctx.globalAlpha = 1;
            });
          }

          // Bubbles
          points.forEach(p => {
            const x = tX(p.rsr), y = tY(p.rsm);
            const isH = hovered === p.symbol;
            const r = showMTF ? 3 + p.score * 2.5 : 6;
            const alpha = hovered ? (isH ? 1 : 0.12) : 0.85;
            ctx.globalAlpha = alpha;

            // RSI glow
            if (showRSI && p.rsiOk) {
              const pulse = Math.sin(Date.now() / 600 + p.rsr) * 0.3 + 0.7;
              ctx.globalAlpha = alpha * 0.3 * pulse;
              ctx.beginPath(); ctx.arc(x, y, r + 6, 0, Math.PI * 2);
              ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 1.5; ctx.stroke();
              ctx.globalAlpha = alpha * 0.08 * pulse;
              ctx.beginPath(); ctx.arc(x, y, r + 4, 0, Math.PI * 2);
              ctx.fillStyle = '#00ff88'; ctx.fill();
            }

            ctx.globalAlpha = alpha;
            if (isH) { ctx.shadowColor = p.color; ctx.shadowBlur = 20; }

            // Bubble
            ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
            const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, 0, x, y, r);
            grad.addColorStop(0, p.color + 'cc'); grad.addColorStop(1, p.color + '55');
            ctx.fillStyle = grad; ctx.fill();
            ctx.strokeStyle = p.color; ctx.lineWidth = isH ? 2 : 0.8; ctx.stroke();
            ctx.shadowBlur = 0;

            // Score inside
            if (showMTF && r >= 8) {
              ctx.font = `700 ${Math.max(8, r * 0.7)}px JetBrains Mono`;
              ctx.fillStyle = '#000'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
              ctx.fillText(p.score.toString(), x, y + 0.5);
              ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
            }

            // Label
            if (isH || points.length <= 20 || p.score >= 4) {
              ctx.font = isH ? '700 11px JetBrains Mono' : '600 9px JetBrains Mono';
              ctx.fillStyle = isH ? '#fff' : p.color;
              ctx.globalAlpha = isH ? 1 : alpha * 0.9;
              const lx = x + r + 4, ly = y - r - 2;
              ctx.fillText(p.name.slice(0, 12), lx, ly);
              if (isH) {
                ctx.font = '600 7px JetBrains Mono'; ctx.fillStyle = p.color;
                ctx.fillText(p.action, lx, ly + 11);
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillText(`R:${p.rsr.toFixed(1)} M:${p.rsm.toFixed(1)} S:${p.score}`, lx, ly + 20);
              }
            }
            ctx.globalAlpha = 1;
          });

          // Quadrant counts
          const qC = { Leading: 0, Improving: 0, Weakening: 0, Lagging: 0 };
          points.forEach(p => { if (qC[p.q] !== undefined) qC[p.q]++; });
          ctx.font = '700 10px JetBrains Mono'; ctx.globalAlpha = 0.25;
          ctx.fillStyle = '#00ff88'; ctx.textAlign = 'right'; ctx.fillText(qC.Leading.toString(), W - mg.r - 6, mg.t + 14);
          ctx.fillStyle = '#00c8ff'; ctx.textAlign = 'left'; ctx.fillText(qC.Improving.toString(), mg.l + 4, mg.t + 26);
          ctx.fillStyle = '#ffd000'; ctx.textAlign = 'right'; ctx.fillText(qC.Weakening.toString(), W - mg.r - 6, H - mg.b - 6);
          ctx.fillStyle = '#ff3366'; ctx.textAlign = 'left'; ctx.fillText(qC.Lagging.toString(), mg.l + 4, H - mg.b - 18);
          ctx.textAlign = 'start'; ctx.globalAlpha = 1;

          // Watermark
          ctx.font = '700 11px JetBrains Mono'; ctx.fillStyle = 'rgba(255,255,255,0.04)';
          ctx.textAlign = 'right'; ctx.fillText('HELIX', W - mg.r - 4, H - 8); ctx.textAlign = 'start';

          animRef.current = requestAnimationFrame(draw);
        }
        draw();
        return () => { if (animRef.current) cancelAnimationFrame(animRef.current); };
      }, [points, expanded, showRSI, showMTF, showTrails]);

      const handleMouseMove = useCallback((e) => {
        const c = canvasRef.current; if (!c) return;
        const rect = c.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        const W = rect.width, H = rect.height;
        let rMin = 94, rMax = 106, mMin = 94, mMax = 106;
        points.forEach(p => { rMin = Math.min(rMin, p.rsr - 1); rMax = Math.max(rMax, p.rsr + 1); mMin = Math.min(mMin, p.rsm - 1); mMax = Math.max(mMax, p.rsm + 1); });
        rMin -= 1; rMax += 1; mMin -= 1; mMax += 1;
        const mg = { l: 50, r: 20, t: 20, b: 36 };
        const cw = W - mg.l - mg.r, ch = H - mg.t - mg.b;
        const tX = v => mg.l + (v - rMin) / (rMax - rMin) * cw;
        const tY = v => mg.t + (1 - (v - mMin) / (mMax - mMin)) * ch;
        let found = null;
        points.forEach(p => { const dist = Math.sqrt((mx - tX(p.rsr)) ** 2 + (my - tY(p.rsm)) ** 2); if (dist < 20) found = p.symbol; });
        hoverRef.current = found; setHoveredItem(found);
      }, [points]);

      const handleMouseLeave = useCallback(() => { hoverRef.current = null; setHoveredItem(null); }, []);

      if (activeGroup === 'positions' || !enriched.length) return null;

      return (
        <div style={{ background: '#06060e', border: '1px solid rgba(255,255,255,0.06)', borderRadius: 8, overflow: 'hidden', marginBottom: 8, transition: 'all 0.3s' }}>

            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 11, fontWeight: 700, fontFamily: 'var(--mono)', background: 'linear-gradient(135deg, #00ff88, #00c8ff)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', letterSpacing: '0.08em' }}>✦ HELIX</span>
              <span style={{ fontSize: 8, color: 'var(--text3)', fontFamily: 'var(--mono)' }}>Hybrid ELement Intelligence X-ray</span>
            </div>
            <div style={{ display: 'flex', gap: 3, alignItems: 'center' }}>
              {['daily', 'weekly', 'monthly'].map(tf => (
                <button key={tf} onClick={() => setHelixTF(tf)} style={{ padding: '2px 7px', borderRadius: 3, fontSize: 8, fontWeight: 700, cursor: 'pointer', border: `1px solid ${helixTF === tf ? '#00c8ff30' : 'rgba(255,255,255,0.04)'}`, background: helixTF === tf ? '#00c8ff08' : 'transparent', color: helixTF === tf ? '#00c8ff' : 'rgba(255,255,255,0.2)', fontFamily: 'var(--mono)' }}>{tf.charAt(0).toUpperCase()}</button>
              ))}
              <span style={{ width: 1, height: 12, background: 'rgba(255,255,255,0.06)', margin: '0 2px' }} />
              <button onClick={() => setShowRSI(!showRSI)} style={{ padding: '2px 6px', borderRadius: 3, fontSize: 7.5, fontWeight: 600, cursor: 'pointer', border: `1px solid ${showRSI ? '#00ff8830' : 'rgba(255,255,255,0.04)'}`, background: showRSI ? '#00ff8808' : 'transparent', color: showRSI ? '#00ff88' : 'rgba(255,255,255,0.2)', fontFamily: 'var(--mono)' }}>RSI</button>
              <button onClick={() => setShowMTF(!showMTF)} style={{ padding: '2px 6px', borderRadius: 3, fontSize: 7.5, fontWeight: 600, cursor: 'pointer', border: `1px solid ${showMTF ? '#ffd00030' : 'rgba(255,255,255,0.04)'}`, background: showMTF ? '#ffd00008' : 'transparent', color: showMTF ? '#ffd000' : 'rgba(255,255,255,0.2)', fontFamily: 'var(--mono)' }}>MTF</button>
              <button onClick={() => setShowTrails(!showTrails)} style={{ padding: '2px 6px', borderRadius: 3, fontSize: 7.5, fontWeight: 600, cursor: 'pointer', border: `1px solid ${showTrails ? '#00c8ff30' : 'rgba(255,255,255,0.04)'}`, background: showTrails ? '#00c8ff08' : 'transparent', color: showTrails ? '#00c8ff' : 'rgba(255,255,255,0.2)', fontFamily: 'var(--mono)' }}>TRAIL</button>
              <button onClick={() => {
                if (playing) { clearInterval(playRef.current); setPlaying(false); setPlayStep(8); return; }
                setPlaying(true); setShowTrails(true); let s = 1; setPlayStep(1);
                playRef.current = setInterval(() => { s++; if (s > 8) { clearInterval(playRef.current); setPlaying(false); return; } setPlayStep(s); }, 600);
              }} style={{ padding: '2px 6px', borderRadius: 3, fontSize: 7.5, fontWeight: 600, cursor: 'pointer', border: `1px solid ${playing ? '#ffd00040' : 'rgba(255,255,255,0.04)'}`, background: playing ? '#ffd00010' : 'transparent', color: playing ? '#ffd000' : 'rgba(255,255,255,0.2)', fontFamily: 'var(--mono)' }}>{playing ? '⏸ PAUSE' : '▶ PLAY'}</button>
              <span style={{ width: 1, height: 12, background: 'rgba(255,255,255,0.06)', margin: '0 2px' }} />
              <button onClick={() => setExpanded(!expanded)} style={{ padding: '2px 8px', borderRadius: 3, fontSize: 8, fontWeight: 600, cursor: 'pointer', border: '1px solid rgba(255,255,255,0.06)', background: expanded ? 'rgba(255,255,255,0.04)' : 'transparent', color: 'rgba(255,255,255,0.3)', fontFamily: 'var(--mono)' }}>{expanded ? '⊖ Compact' : '⊕ Expand'}</button>
            </div>
          </div>
          <canvas ref={canvasRef} onMouseMove={handleMouseMove} onMouseLeave={handleMouseLeave} style={{ width: '100%', cursor: 'crosshair', display: 'block' }} />
          <div style={{ padding: '5px 12px', borderTop: '1px solid rgba(255,255,255,0.04)', display: 'flex', gap: 12, fontSize: 7.5, color: 'var(--text3)', fontFamily: 'var(--mono)', flexWrap: 'wrap' }}>
            <span>Bubble size = MTF Score (1–5)</span>
            <span>Color = Signal (<span style={{ color: '#00ff88' }}>G</span>/<span style={{ color: '#ffd000' }}>Y</span>/<span style={{ color: '#00c8ff' }}>B</span>/<span style={{ color: '#ff3366' }}>R</span>)</span>
            {showRSI && <span><span style={{ color: '#00ff88' }}>◌</span> = RSI sweet zone</span>}
            <span>TF: {helixTF.toUpperCase()}</span>
            <span>{points.length} assets</span>
          </div>
        </div>
      );
    };

                  background: mode === m ? '#00ff880c' : 'transparent',

                  border: `1px solid ${showAnalysis[panel.key] ? panel.color + '30' : 'var(--border)'}`,
                  background: showAnalysis[panel.key] ? `${panel.color}08` : 'transparent',
                  color: showAnalysis[panel.key] ? panel.color : 'var(--text3)',
                  fontFamily: 'var(--mono)', transition: 'all 0.2s',
                }}>
                  {panel.label} {showAnalysis[panel.key] ? '▾' : '▸'}
                </button>
              ))}
            </div>

            {/* Sector Rotation Map */}
            {showAnalysis.rotation && activeGroup !== 'positions' && (
              <SectorRotationMap enriched={enriched} />
            )}

            {/* Correlation Matrix */}
            {showAnalysis.correlation && activeGroup !== 'positions' && (
              <CorrelationMatrix enriched={enriched} />
            )}

            {/* Market Analysis */}
            {showAnalysis.analysis && activeGroup !== 'positions' && (
              <AnalysisPanel enriched={enriched} rrmData={rrmData} benchmark={benchmark} />
            )}
          </div>

          {showAddModal && <AddStockModal onClose={() => setShowAddModal(false)} onAdd={handleAddStock} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<RRMSignalsDashboard />);
  </script>
</body>
</html>
