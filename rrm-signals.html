<script type="text/babel">
const { useState, useMemo, useCallback, useEffect, useRef } = React;

const DATA_URL = './data/rrm_data.json';

const Q_COLORS = { Leading:'#00ff88', Improving:'#00c8ff', Weakening:'#ffd000', Lagging:'#ff3366' };
const LIGHT_MAP = { GREEN:'#00ff88', YELLOW:'#ffd000', BLUE:'#00c8ff', RED:'#ff3366' };
const GROUP_META = [
  { key:'sectors', label:'Sectors', icon:'\u25C9' },
  { key:'etfs', label:'ETFs', icon:'\u25C6' },
  { key:'asset_classes', label:'Assets', icon:'\u25C8' },
  { key:'market_segments', label:'Segments', icon:'\u25C7' },
  { key:'global_indices', label:'Global', icon:'\uD83C\uDF10' },
  { key:'custom_stocks', label:'My Stocks', icon:'\u2605' },
];
const BENCHMARKS = [
  { key:'^NSEI', label:'Nifty 50' },
  { key:'^NSEBANK', label:'Bank Nifty' },
  { key:'^CRSLDX', label:'Nifty 500' },
];
const GRID_COLS = '200px 85px 80px 45px 75px 105px';

function transformData(raw, benchKey, groupKey) {
  const bm = raw?.benchmarks_data?.[benchKey];
  if (!bm) return [];
  const daily = bm.daily?.[groupKey] || [];
  const weekly = bm.weekly?.[groupKey] || [];
  const monthly = bm.monthly?.[groupKey] || [];
  const wMap = {}; weekly.forEach(s => { wMap[s.symbol] = s; });
  const mMap = {}; monthly.forEach(s => { mMap[s.symbol] = s; });
  return daily.map(d => {
    const w = wMap[d.symbol] || {};
    const m = mMap[d.symbol] || {};
    return {
      symbol: d.symbol, name: d.name, color: d.color, group: d.group || '',
      daily:   { q: d.quadrant||'', rsr: d.current?.rs_ratio||100, rsm: d.current?.rs_momentum||100 },
      weekly:  { q: w.quadrant||'', rsr: w.current?.rs_ratio||100, rsm: w.current?.rs_momentum||100 },
      monthly: { q: m.quadrant||'', rsr: m.current?.rs_ratio||100, rsm: m.current?.rs_momentum||100 },
      dailyTail: d.tail||[], weeklyTail: w.tail||[], monthlyTail: m.tail||[],
    };
  });
}

function computeSignals(item) {
  const { daily:d, weekly:w, monthly:m } = item;
  const right = q => q === 'Leading' || q === 'Improving';
  let score = 0;
  if (right(m.q)) score += (m.rsr>=100 && m.rsm>=100) ? 2 : 1;
  if (right(w.q)) score += (w.rsr>=100 && w.rsm>=100) ? 2 : 1;
  if (right(d.q)) score += 1;
  score = Math.min(score, 5);
  let light;
  if (right(m.q) && right(w.q) && right(d.q)) light = 'GREEN';
  else if (right(m.q) && !right(w.q) && right(d.q)) light = 'YELLOW';
  else if (!right(m.q) && right(w.q) && right(d.q)) light = 'BLUE';
  else light = 'RED';
  const rsiOk = right(w.q) && w.rsm >= 98 && w.rsm <= 106;
  let action;
  if (score>=4 && rsiOk) action='AGGRESSIVE BUY';
  else if (score>=3 && rsiOk) action='BUY ON DIP';
  else if (light==='YELLOW') action='HOOK ENTRY';
  else if (light==='BLUE') action='SCALP ONLY';
  else if (score>=3) action='HOLD';
  else action='AVOID';
  return { score, light, rsiOk, action };
}

// ═══ TINY COMPONENTS ═══
const Dot = ({color, active, s=7}) => (
  <span style={{ display:'inline-block', width:s, height:s, borderRadius:'50%',
    background: active ? color : 'rgba(255,255,255,0.05)',
    boxShadow: active ? `0 0 8px ${color}50` : 'none', transition:'all .3s' }} />
);

const QBadge = ({q}) => {
  const c = Q_COLORS[q] || '#444';
  return <span style={{ padding:'1px 6px', borderRadius:3, border:`1px solid ${c}25`,
    background:`${c}08`, color:c, fontSize:10, fontWeight:600,
    fontFamily:'var(--mono)', letterSpacing:'0.03em' }}>{q || '\u2014'}</span>;
};

const ScoreBar = ({score}) => {
  const c = score>=4 ? '#00ff88' : score>=3 ? '#ffd000' : '#ff3366';
  return (
    <div style={{ display:'flex', alignItems:'center', gap:5, minWidth:70 }}>
      <div style={{ flex:1, height:3, borderRadius:2, background:'rgba(255,255,255,0.04)', overflow:'hidden' }}>
        <div style={{ width:`${(score/5)*100}%`, height:'100%', background:c, borderRadius:2,
          boxShadow:`0 0 8px ${c}30`, transition:'width .5s ease' }} />
      </div>
      <span style={{ color:c, fontWeight:700, fontSize:12, fontFamily:'var(--mono)', width:12, textAlign:'right' }}>{score}</span>
    </div>
  );
};

const Sparkline = ({data, width=55, height=18, color='#00c8ff'}) => {
  if (!data || data.length < 2) return null;
  const vals = data.map(d => d.rs_ratio);
  const min = Math.min(...vals), max = Math.max(...vals), range = max-min||1;
  const pts = vals.map((v,i) => `${(i/(vals.length-1))*width},${height-((v-min)/range)*(height-2)-1}`).join(' ');
  return <svg width={width} height={height} style={{display:'block'}}><polyline points={pts} fill="none" stroke={color} strokeWidth="1.2" strokeLinejoin="round"/></svg>;
};

// ═══ ASSET ROW ═══
const AssetRow = ({item, sig, expanded, onToggle}) => {
  const lc = LIGHT_MAP[sig.light];
  return (
    <div style={{borderBottom:'1px solid rgba(255,255,255,0.025)'}} className="fade-in">
      <div onClick={onToggle} style={{
        display:'grid', gridTemplateColumns:GRID_COLS,
        alignItems:'center', gap:8, padding:'8px 14px', cursor:'pointer',
        background: expanded ? 'rgba(255,255,255,0.02)' : 'transparent', transition:'background .2s',
      }}>
        <div>
          <div style={{color:'#fff',fontWeight:600,fontSize:11.5,fontFamily:'var(--mono)',lineHeight:1.3}}>{item.name}</div>
          <div style={{color:'rgba(255,255,255,0.2)',fontSize:9,fontFamily:'var(--mono)'}}>{item.symbol}</div>
        </div>
        <div style={{display:'flex',gap:3,alignItems:'center'}}>
          {['GREEN','YELLOW','BLUE','RED'].map(l => <Dot key={l} color={LIGHT_MAP[l]} active={sig.light===l}/>)}
          <span style={{fontSize:8,color:lc,fontFamily:'var(--mono)',fontWeight:700,marginLeft:2}}>{sig.light}</span>
        </div>
        <ScoreBar score={sig.score}/>
        <span style={{fontSize:10,fontFamily:'var(--mono)',fontWeight:600,textAlign:'center',
          color:sig.rsiOk?'#00ff88':'rgba(255,255,255,0.1)'}}>
          {sig.rsiOk ? '\u2713' : '\u2717'}
        </span>
        <QBadge q={item.weekly.q}/>
        <span style={{padding:'2px 5px',borderRadius:3,fontSize:8.5,fontWeight:700,
          fontFamily:'var(--mono)',textAlign:'center',whiteSpace:'nowrap',
          color:lc,background:`${lc}08`,border:`1px solid ${lc}15`}}>
          {sig.action}
        </span>
      </div>
      {expanded && (
        <div style={{padding:'2px 14px 10px',display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
          {[['DAILY',item.daily,item.dailyTail],['WEEKLY',item.weekly,item.weeklyTail],['MONTHLY',item.monthly,item.monthlyTail]].map(([label,tf,tail]) => {
            const qc = Q_COLORS[tf.q]||'#444';
            return (
              <div key={label} style={{background:'rgba(255,255,255,0.012)',borderRadius:6,padding:'8px 10px',border:`1px solid ${qc}12`}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <span style={{fontSize:8,color:'var(--text3)',fontWeight:700,letterSpacing:'0.1em',fontFamily:'var(--mono)'}}>{label}</span>
                  <QBadge q={tf.q}/>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
                  <div style={{display:'flex',gap:14}}>
                    <div style={{textAlign:'center'}}>
                      <div style={{fontSize:7.5,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:1}}>RS-R</div>
                      <div style={{fontSize:14,fontWeight:700,color:tf.rsr>=100?'#00ff88':'#ff3366',fontFamily:'var(--mono)'}}>{tf.rsr.toFixed(1)}</div>
                    </div>
                    <div style={{textAlign:'center'}}>
                      <div style={{fontSize:7.5,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:1}}>RS-M</div>
                      <div style={{fontSize:14,fontWeight:700,color:tf.rsm>=100?'#00ff88':'#ff3366',fontFamily:'var(--mono)'}}>{tf.rsm.toFixed(1)}</div>
                    </div>
                  </div>
                  <Sparkline data={tail} color={qc}/>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

// ═══ ADD STOCK MODAL with 2668-stock autocomplete ═══
const AddStockModal = ({onClose, onAdd}) => {
  const [mode, setMode] = useState('manual');
  const [ticker, setTicker] = useState('');
  const [name, setName] = useState('');
  const [group, setGroup] = useState('Watchlist');
  const [pasteText, setPasteText] = useState('');
  const [suggestions, setSuggestions] = useState([]);
  const [showSugg, setShowSugg] = useState(false);
  const [hlIdx, setHlIdx] = useState(-1);
  const listRef = useRef(null);

  const handleTickerChange = (val) => {
    setTicker(val);
    setHlIdx(-1);
    const q = val.trim().toUpperCase();
    if (q.length >= 1) {
      // Search by ticker first, then by name
      const byTicker = window.NSE_STOCKS.filter(s => s.ticker.startsWith(q));
      const byName = window.NSE_STOCKS.filter(s => s.name.toUpperCase().includes(q) && !s.ticker.startsWith(q));
      const matches = [...byTicker, ...byName].slice(0, 10);
      setSuggestions(matches);
      setShowSugg(matches.length > 0);
    } else {
      setShowSugg(false);
    }
  };

  const selectSuggestion = (s) => {
    setTicker(s.ticker);
    setName(s.name);
    setShowSugg(false);
  };

  const handleKeyDown = (e) => {
    if (!showSugg) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); setHlIdx(i => Math.min(i+1, suggestions.length-1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setHlIdx(i => Math.max(i-1, 0)); }
    else if (e.key === 'Enter' && hlIdx >= 0) { e.preventDefault(); selectSuggestion(suggestions[hlIdx]); }
    else if (e.key === 'Escape') { setShowSugg(false); }
  };

  const handleAdd = () => {
    if (mode === 'manual' && ticker.trim()) {
      const sym = ticker.trim().toUpperCase() + (ticker.includes('.') ? '' : '.NS');
      onAdd({ symbol:sym, name:name||ticker.toUpperCase(), group });
      setTicker(''); setName('');
    } else if (mode === 'paste' && pasteText.trim()) {
      pasteText.split('\n').filter(l=>l.trim()).forEach(l => {
        const parts = l.split(',').map(s=>s.trim());
        if (parts[0]) onAdd({ symbol:parts[0].toUpperCase()+(parts[0].includes('.')?'':'.NS'), name:parts[1]||parts[0].toUpperCase(), group });
      });
      setPasteText('');
    }
  };

  const inp = {
    background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.08)',
    borderRadius:5, padding:'7px 10px', color:'#fff', fontSize:12,
    fontFamily:'var(--mono)', outline:'none', width:'100%',
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999}}
      onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:'#0c0c18',border:'1px solid rgba(255,255,255,0.08)',borderRadius:10,padding:22,width:420,maxWidth:'92vw',
      }}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:16}}>
          <span style={{fontSize:13,fontWeight:700,color:'var(--green)',fontFamily:'var(--mono)'}}>ADD STOCKS</span>
          <span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',alignSelf:'center'}}>2,668 NSE stocks</span>
          <button onClick={onClose} style={{background:'none',border:'none',color:'rgba(255,255,255,0.3)',cursor:'pointer',fontSize:16}}>{'\u2715'}</button>
        </div>
        <div style={{display:'flex',gap:4,marginBottom:14}}>
          {['manual','paste'].map(m => (
            <button key={m} onClick={()=>setMode(m)} style={{
              padding:'4px 12px',borderRadius:4,fontSize:10,fontWeight:600,cursor:'pointer',
              border:`1px solid ${mode===m?'#00ff8835':'rgba(255,255,255,0.05)'}`,
              background:mode===m?'#00ff880c':'transparent',
              color:mode===m?'#00ff88':'rgba(255,255,255,0.3)',fontFamily:'var(--mono)',
            }}>{m==='manual'?'MANUAL':'PASTE LIST'}</button>
          ))}
        </div>

        {mode === 'manual' ? (
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            <div style={{position:'relative'}}>
              <input value={ticker} onChange={e=>handleTickerChange(e.target.value)}
                onKeyDown={handleKeyDown}
                onFocus={()=>{ if(suggestions.length) setShowSugg(true); }}
                onBlur={()=>setTimeout(()=>setShowSugg(false),200)}
                placeholder="Type ticker or company name..." style={inp} autoComplete="off" />
              {showSugg && (
                <div ref={listRef} style={{
                  position:'absolute',top:'100%',left:0,right:0,zIndex:10,
                  background:'#12121f',border:'1px solid rgba(255,255,255,0.1)',
                  borderRadius:5,marginTop:2,maxHeight:240,overflowY:'auto',
                }}>
                  {suggestions.map((s,i) => (
                    <div key={s.symbol} className="sugg-item" onMouseDown={()=>selectSuggestion(s)}
                      style={{
                        padding:'7px 10px',cursor:'pointer',fontSize:11,fontFamily:'var(--mono)',
                        color: i===hlIdx ? '#00ff88' : 'rgba(255,255,255,0.6)',
                        background: i===hlIdx ? 'rgba(0,255,136,0.06)' : 'transparent',
                        borderBottom:'1px solid rgba(255,255,255,0.03)',
                        display:'flex',justifyContent:'space-between',alignItems:'center',
                      }}>
                      <span>
                        <span style={{fontWeight:700,color:i===hlIdx?'#00ff88':'#fff'}}>{s.ticker}</span>
                        <span style={{opacity:0.4,marginLeft:8,fontSize:9,fontFamily:'var(--sans)'}}>{s.name}</span>
                      </span>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="Display name (auto-filled)" style={{...inp,fontFamily:'var(--sans)'}} />
            <select value={group} onChange={e=>setGroup(e.target.value)} style={inp}>
              <option value="Watchlist">Watchlist</option>
              <option value="Core Holdings">Core Holdings</option>
              <option value="Swing Trades">Swing Trades</option>
            </select>
          </div>
        ) : (
          <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} rows={6}
            placeholder={"RELIANCE, Reliance Industries\nHDFCBANK, HDFC Bank\nTCS"}
            style={{...inp,resize:'none',fontSize:11}} />
        )}
        <button onClick={handleAdd} style={{
          marginTop:14,width:'100%',padding:'9px',borderRadius:5,
          border:'1px solid #00ff8830',background:'#00ff880a',
          color:'#00ff88',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'var(--mono)',
        }}>+ ADD</button>
      </div>
    </div>
  );
};

// ═══ MAIN DASHBOARD ═══
function RRMSignalsDashboard() {
  const [rrmData, setRrmData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [benchmark, setBenchmark] = useState('^NSEI');
  const [activeGroup, setActiveGroup] = useState('sectors');
  const [filter, setFilter] = useState('ALL');
  const [expandedIdx, setExpandedIdx] = useState(null);
  const [showAddModal, setShowAddModal] = useState(false);
  const [customStocks, setCustomStocks] = useState([]);

  useEffect(() => {
    fetch(DATA_URL)
      .then(r => { if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(data => { setRrmData(data); setLoading(false); })
      .catch(err => { console.error('Fetch error:', err); setError(err.message); setLoading(false); });
  }, []);

  const items = useMemo(() => {
    if (!rrmData) return [];
    if (activeGroup === 'custom_stocks') return customStocks;
    return transformData(rrmData, benchmark, activeGroup);
  }, [rrmData, benchmark, activeGroup, customStocks]);

  const enriched = useMemo(() => items.map(item => ({...item, sig:computeSignals(item)})), [items]);

  const filtered = useMemo(() => {
    let list = enriched;
    if (filter !== 'ALL') list = list.filter(i => i.sig.light === filter);
    return list.sort((a,b) => b.sig.score - a.sig.score || a.name.localeCompare(b.name));
  }, [enriched, filter]);

  const counts = useMemo(() => {
    const c = {ALL:enriched.length,GREEN:0,YELLOW:0,BLUE:0,RED:0};
    enriched.forEach(i => c[i.sig.light]++);
    return c;
  }, [enriched]);

  const handleAddStock = useCallback(stock => {
    const col = '#'+Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0');
    setCustomStocks(prev => [...prev, {
      ...stock, color:col,
      daily:{q:'Improving',rsr:99.5,rsm:100.5}, weekly:{q:'Improving',rsr:99.0,rsm:100.2},
      monthly:{q:'Lagging',rsr:98.0,rsm:99.0}, dailyTail:[], weeklyTail:[], monthlyTail:[],
    }]);
  }, []);

  const meta = rrmData?.metadata;

  if (!loading && error) return (
    <div style={{minHeight:'100vh',background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12,padding:20}}>
      <span style={{fontSize:32}}>{'\u26A0'}</span>
      <span style={{fontFamily:'var(--mono)',fontSize:13,color:'var(--red)'}}>Failed to load RRM data</span>
      <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)'}}>{error}</span>
      <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text2)',textAlign:'center',maxWidth:340}}>
        Check that <code style={{color:'#00c8ff'}}>{DATA_URL}</code> exists. Run the GitHub Actions workflow first.
      </span>
    </div>
  );

  if (loading) return null;

  return (
    <div style={{minHeight:'100vh',background:'var(--bg)',padding:'16px 20px 40px',display:'flex',flexDirection:'column',alignItems:'center'}}>
      <div style={{width:'100%',maxWidth:920}}>

        {/* Header */}
        <div style={{marginBottom:12}}>
          <div style={{display:'flex',alignItems:'baseline',gap:8,flexWrap:'wrap'}}>
            <h1 style={{fontSize:17,fontWeight:700,fontFamily:'var(--mono)',letterSpacing:'-0.02em'}}>
              <span style={{color:'var(--green)'}}>RRM</span>{' '}
              <span style={{color:'rgba(255,255,255,0.65)'}}>SIGNALS</span>
            </h1>
            <span style={{fontSize:8,color:'var(--text3)',fontFamily:'var(--mono)'}}>v4.1</span>
            {meta && <span style={{fontSize:8,color:'var(--text3)',fontFamily:'var(--mono)'}}>{meta.date}</span>}
          </div>
          <div style={{display:'flex',gap:12,fontSize:8.5,color:'var(--text3)',marginTop:2,fontFamily:'var(--mono)'}}>
            <span>{'\u2776'} RRG-RSI</span><span>{'\u2777'} MTF CONFLUENCE</span><span>{'\u2778'} SECTOR SYNC</span>
          </div>
        </div>

        {/* Benchmark */}
        <div style={{display:'flex',gap:3,marginBottom:8}}>
          {BENCHMARKS.map(b => (
            <button key={b.key} onClick={()=>{setBenchmark(b.key);setExpandedIdx(null);}} style={{
              padding:'3px 8px',borderRadius:3,fontSize:9,fontWeight:600,cursor:'pointer',
              border:`1px solid ${benchmark===b.key?'#00c8ff30':'var(--border)'}`,
              background:benchmark===b.key?'#00c8ff08':'transparent',
              color:benchmark===b.key?'#00c8ff':'var(--text3)',fontFamily:'var(--mono)',
            }}>{b.label}</button>
          ))}
        </div>

        {/* Group tabs */}
        <div style={{display:'flex',gap:3,marginBottom:8,flexWrap:'wrap'}}>
          {GROUP_META.map(g => {
            const active = activeGroup===g.key;
            const ct = g.key==='custom_stocks' ? customStocks.length
              : (rrmData?.benchmarks_data?.[benchmark]?.daily?.[g.key]?.length || 0);
            return (
              <button key={g.key} onClick={()=>{setActiveGroup(g.key);setExpandedIdx(null);setFilter('ALL');}} style={{
                padding:'4px 9px',borderRadius:4,fontSize:10,fontWeight:600,cursor:'pointer',
                border:`1px solid ${active?'rgba(255,255,255,0.12)':'var(--border)'}`,
                background:active?'rgba(255,255,255,0.05)':'transparent',
                color:active?'#fff':'var(--text2)',fontFamily:'var(--mono)',transition:'all .2s',
              }}>{g.icon} {g.label} <span style={{opacity:0.35}}>({ct})</span></button>
            );
          })}
          <button onClick={()=>setShowAddModal(true)} style={{
            padding:'4px 9px',borderRadius:4,fontSize:10,fontWeight:600,cursor:'pointer',
            border:'1px solid #00ff8825',background:'#00ff8806',color:'var(--green)',fontFamily:'var(--mono)',
          }}>+ ADD</button>
        </div>

        {/* Filter pills */}
        <div style={{display:'flex',gap:3,marginBottom:8}}>
          {['ALL','GREEN','YELLOW','BLUE','RED'].map(f => {
            const active = filter===f;
            const c = f==='ALL'?'#fff':LIGHT_MAP[f];
            return (
              <button key={f} onClick={()=>setFilter(f)} style={{
                padding:'3px 7px',borderRadius:3,fontSize:9,fontWeight:600,cursor:'pointer',
                border:`1px solid ${active?c+'30':'var(--border)'}`,
                background:active?`${c}08`:'transparent',
                color:active?c:'var(--text3)',fontFamily:'var(--mono)',
              }}>{f} ({counts[f]})</button>
            );
          })}
        </div>

        {/* Column headers */}
        <div style={{display:'grid',gridTemplateColumns:GRID_COLS,gap:8,padding:'4px 14px',borderBottom:'1px solid rgba(255,255,255,0.04)',marginBottom:1}}>
          {['ASSET','SIGNAL','SCORE','RSI','WEEKLY','ACTION'].map(h => (
            <span key={h} style={{fontSize:7.5,fontWeight:700,color:'var(--text3)',letterSpacing:'0.1em',
              fontFamily:'var(--mono)',textAlign:h==='RSI'?'center':'left'}}>{h}</span>
          ))}
        </div>

        {/* Data list */}
        <div style={{borderRadius:6,border:'1px solid var(--border)',overflow:'hidden'}}>
          {filtered.map((item,i) => (
            <AssetRow key={item.symbol+i} item={item} sig={item.sig}
              expanded={expandedIdx===i} onToggle={()=>setExpandedIdx(expandedIdx===i?null:i)} />
          ))}
          {filtered.length === 0 && (
            <div style={{padding:30,textAlign:'center',color:'var(--text3)',fontSize:11,fontFamily:'var(--mono)'}}>
              {activeGroup==='custom_stocks' ? 'No custom stocks yet. Click + ADD.' :
               items.length===0 ? 'No data for this group/benchmark.' : 'No assets match this filter.'}
            </div>
          )}
        </div>

        {/* Legend */}
        <div style={{marginTop:10,padding:'8px 12px',background:'var(--surface)',borderRadius:5,border:'1px solid var(--border)'}}>
          <div style={{fontSize:7.5,color:'var(--text3)',fontWeight:700,letterSpacing:'0.1em',marginBottom:5,fontFamily:'var(--mono)'}}>SIGNAL LOGIC</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'2px 16px',fontSize:10,color:'var(--text2)'}}>
            <div><span style={{color:'var(--green)'}}>●</span> GREEN — M+W+D right side</div>
            <div><span style={{color:'var(--yellow)'}}>●</span> YELLOW — M strong, W dip, D ↑</div>
            <div><span style={{color:'var(--blue)'}}>●</span> BLUE — W+D strong, no M backing</div>
            <div><span style={{color:'var(--red)'}}>●</span> RED — Structural weakness</div>
          </div>
          <div style={{fontSize:8.5,color:'var(--text3)',marginTop:4,fontFamily:'var(--mono)'}}>
            Score 4-5 = High conviction · RSI {'\u2713'} = Weekly momentum sweet zone · {BENCHMARKS.find(b=>b.key===benchmark)?.label || benchmark}
          </div>
        </div>

      </div>
      {showAddModal && <AddStockModal onClose={()=>setShowAddModal(false)} onAdd={handleAddStock} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<RRMSignalsDashboard />);
</script>
</body>
</html>
