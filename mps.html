<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradEdge — MPS Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tradedge.css">
</head>
<body>

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
  <div>
    <div style="font-size:18px;font-weight:700;color:var(--t1)">📡 Market Pulse Score</div>
    <div style="font-size:12px;color:var(--t3);margin-top:3px">Composite market health indicator · Updated daily</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <span id="mps-ts" style="font-size:11px;color:var(--t3)"></span>
    <button class="btn btn-ghost btn-sm" onclick="loadMPS()">↻ Refresh</button>
  </div>
</div>

<!-- Gauge -->
<div class="card" style="margin-bottom:16px;text-align:center;padding:32px">
  <div style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Market Pulse Score</div>
  <div id="mps-score" style="font-family:'IBM Plex Mono',monospace;font-size:72px;font-weight:800;color:var(--y);line-height:1">—</div>
  <div id="mps-label" style="font-size:14px;font-weight:700;color:var(--t2);margin-top:8px">Loading…</div>
  <div id="mps-regime" style="font-size:12px;color:var(--t3);margin-top:4px"></div>
  <!-- Gauge bar -->
  <div style="margin:20px auto 0;max-width:400px;height:12px;border-radius:6px;background:var(--bg3);border:1px solid var(--b1);overflow:hidden;position:relative">
    <div id="mps-bar" style="height:100%;border-radius:6px;transition:width .6s ease;width:0%"></div>
  </div>
  <div style="display:flex;justify-content:space-between;max-width:400px;margin:4px auto 0;font-size:9px;color:var(--t4)">
    <span>0 (Extreme Fear)</span><span>50 (Neutral)</span><span>100 (Extreme Greed)</span>
  </div>
</div>

<!-- Components -->
<div style="font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">Score Components</div>
<div id="mps-components" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:20px"></div>

<!-- History -->
<div class="card">
  <div class="card-head"><span class="card-title">Recent Scores</span></div>
  <div class="card-body"><div id="mps-history"></div></div>
</div>

<script src="js/core.js"></script>
<script src="js/supabase.js"></script>
<script src="js/journal-sync.js"></script>
<script src="js/ui.js"></script>
<script src="js/sidebar.js"></script>

<script>
'use strict';

async function loadMPS() {
  document.getElementById('mps-ts').textContent = 'Loading…';
  try {
    const res = await fetch('data/mps_latest.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    renderMPS(data);
  } catch (e) {
    document.getElementById('mps-ts').innerHTML = '<span style="color:var(--r)">❌ ' + e.message + '</span>';
    // Try cached
    try {
      const cached = localStorage.getItem('te_mps_cache');
      if (cached) renderMPS(JSON.parse(cached));
    } catch (e2) {}
  }
}

function renderMPS(data) {
  localStorage.setItem('te_mps_cache', JSON.stringify(data));
  const score = data.score ?? data.mps ?? data.total ?? 50;
  const label = score >= 75 ? 'Bullish' : score >= 60 ? 'Mildly Bullish' : score >= 40 ? 'Neutral' : score >= 25 ? 'Mildly Bearish' : 'Bearish';
  const color = score >= 60 ? 'var(--g)' : score >= 40 ? 'var(--y)' : 'var(--r)';
  const regime = data.regime || data.market_regime || (score >= 60 ? 'Risk-On' : score >= 40 ? 'Cautious' : 'Risk-Off');

  document.getElementById('mps-score').textContent = Math.round(score);
  document.getElementById('mps-score').style.color = color;
  document.getElementById('mps-label').textContent = label;
  document.getElementById('mps-label').style.color = color;
  document.getElementById('mps-regime').textContent = `Market Regime: ${regime}`;
  document.getElementById('mps-bar').style.width = score + '%';
  document.getElementById('mps-bar').style.background = `linear-gradient(90deg, var(--r) 0%, var(--y) 50%, var(--g) 100%)`;
  document.getElementById('mps-ts').textContent = data.generated || data.timestamp || 'Updated';

  // Components
  const components = data.components || data.breakdown || {};
  const el = document.getElementById('mps-components');
  const compKeys = Object.keys(components);
  if (compKeys.length) {
    el.innerHTML = compKeys.map(k => {
      const v = components[k];
      const val = typeof v === 'object' ? (v.score ?? v.value ?? 0) : v;
      const cColor = val >= 60 ? 'var(--g)' : val >= 40 ? 'var(--y)' : 'var(--r)';
      return `<div class="kpi" style="text-align:center">
        <div class="kpi-label">${k.replace(/_/g, ' ')}</div>
        <div class="kpi-val" style="font-size:22px;color:${cColor}">${typeof val === 'number' ? val.toFixed(1) : val}</div>
      </div>`;
    }).join('');
  } else {
    el.innerHTML = '<div style="color:var(--t4);font-size:12px">No component data</div>';
  }

  // History
  const history = data.history || [];
  const hEl = document.getElementById('mps-history');
  if (history.length) {
    hEl.innerHTML = `<div style="display:flex;gap:6px;flex-wrap:wrap">${history.slice(0, 14).map(h => {
      const s = h.score ?? h.mps ?? 50;
      const c = s >= 60 ? 'var(--g)' : s >= 40 ? 'var(--y)' : 'var(--r)';
      return `<div style="text-align:center;padding:6px 10px;background:var(--bg3);border-radius:6px;min-width:50px">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;color:${c}">${Math.round(s)}</div>
        <div style="font-size:9px;color:var(--t4)">${h.date || '—'}</div>
      </div>`;
    }).join('')}</div>`;
  } else {
    hEl.innerHTML = '<div style="color:var(--t4);font-size:12px;text-align:center;padding:16px">No history data</div>';
  }
}

loadMPS();
</script>
</body>
</html>
