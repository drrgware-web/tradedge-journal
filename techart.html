// Demo data generator
function genDemo(sy,dy=300){
  const sd=sy.split('').reduce((a,c)=>a+c.charCodeAt(0),0);let r=sd;
  const rn=()=>{r=(r*16807)%2147483647;return r/2147483647};
  const b=80+rn()*3000,tr=rn()>.45?1:-1;const d=[];let p=b;
  for(let i=0;i<dy;i++){p=Math.max(5,p*(1+tr*.0008+(rn()-.48)*.028));const v=p*(.004+rn()*.022);
    d.push({d:new Date(2025,0,1+i).toISOString().slice(0,10),o:+(p-v*(rn()-.5)).toFixed(2),h:+(p+v*rn()).toFixed(2),l:+(p-v*rn()).toFixed(2),c:+(p+v*(rn()-.5)).toFixed(2)})}return d}

const FALLBACK_STOCKS=['RELIANCE','TCS','HDFCBANK','INFY','ICICIBANK','SBIN','BHARTIARTL','BAJFINANCE','TATAMOTORS','LT','MARUTI','SUNPHARMA','TITAN','AXISBANK','WIPRO','DRREDDY','KOTAKBANK','HINDUNILVR','ADANIENT','BAJAJFINSV'];

// ═══ P&F ENGINE ═══
function buildPnF(ohlc,bv,rv=3,lg=true,mt='close'){
  if(!ohlc||ohlc.length<2)return{cols:[],sigs:[],ma:[]};
  const cols=[];let cur=null,bp=ohlc[0].c||ohlc[0].close||100;
  const bs=p=>lg?p*bv/100:bv;
  const rnd=v=>Math.round(v*100)/100;
  const gp=(b,ct,ph)=>{
    const cl=b.c||b.close||0,hi=b.h||b.high||cl,lo=b.l||b.low||cl;
    if(mt==='close')return cl;
    return ct==='X'?(ph==='c'?hi:lo):(ph==='c'?lo:hi);};

  for(let i=1;i<ohlc.length;i++){
    const b=ohlc[i],s=bs(bp);if(s<=0)continue;
    if(!cur){const p=b.c||b.close;
      if(p>=bp+s){cur={t:'X',b:[]};let q=bp;while(q+s<=p){q+=s;cur.b.push(rnd(q))}if(cur.b.length){bp=cur.b[cur.b.length-1];cols.push(cur)}else cur=null}
      else if(p<=bp-s){cur={t:'O',b:[]};let q=bp;while(q-s>=p){q-=s;cur.b.push(rnd(q))}if(cur.b.length){bp=cur.b[cur.b.length-1];cols.push(cur)}else cur=null}continue}
    const cp=gp(b,cur.t,'c'),rp=gp(b,cur.t,'r');
    if(cur.t==='X'){if(cp>=bp+s){let q=bp;while(q+s<=cp){q+=s;cur.b.push(rnd(q))}bp=cur.b[cur.b.length-1]}else if(rp<=bp-s*rv){const nc={t:'O',b:[]};let q=bp;while(q-s>=rp){q-=s;nc.b.push(rnd(q))}if(nc.b.length>=rv){bp=nc.b[nc.b.length-1];cur=nc;cols.push(cur)}}}
    else{if(cp<=bp-s){let q=bp;while(q-s>=cp){q-=s;cur.b.push(rnd(q))}bp=cur.b[cur.b.length-1]}else if(rp>=bp+s*rv){const nc={t:'X',b:[]};let q=bp;while(q+s<=rp){q+=s;nc.b.push(rnd(q))}if(nc.b.length>=rv){bp=nc.b[nc.b.length-1];cur=nc;cols.push(cur)}}}}

  // Detect anchor columns
  const lens=cols.map(c=>c.b.length);const med=lens.slice().sort((a,b)=>a-b)[Math.floor(lens.length/2)]||3;
  cols.forEach(c=>{c.ac=c.b.length>=med*1.5});

  const sigs=detect(cols);
  // 10-col SMA
  const mids=cols.map(c=>(Math.max(...c.b)+Math.min(...c.b))/2);
  const ma=mids.map((_,i)=>{if(i<9)return null;let s=0;for(let j=i-9;j<=i;j++)s+=mids[j];return s/10});
  return{cols,sigs,ma};
}

function detect(cols){
  const S=[];if(cols.length<3)return S;
  const H=c=>Math.max(...c.b),L=c=>Math.min(...c.b),M=c=>(H(c)+L(c))/2;
  for(let i=2;i<cols.length;i++){
    const c0=cols[i],c1=cols[i-1],c2=cols[i-2];
    if(c0.t==='X'&&H(c0)>H(c2))S.push({tp:'DTB',lb:'Double Top Buy',ab:'DTB',ci:i,pr:H(c2),bu:true});
    if(c0.t==='O'&&L(c0)<L(c2))S.push({tp:'DBS',lb:'Double Bottom Sell',ab:'DBS',ci:i,pr:L(c2),bu:false});
    if(i>=4){const c4=cols[i-4];
      if(c0.t==='X'&&c2.t==='X'&&c4.t==='X'&&Math.abs(H(c2)-H(c4))/H(c4)<.015&&H(c0)>H(c2))S.push({tp:'TT',lb:'Triple Top Buy',ab:'TT',ci:i,pr:H(c2),bu:true});
      if(c0.t==='O'&&c2.t==='O'&&c4.t==='O'&&Math.abs(L(c2)-L(c4))/L(c4)<.015&&L(c0)<L(c2))S.push({tp:'TB',lb:'Triple Bottom Sell',ab:'TB',ci:i,pr:L(c2),bu:false});}
    if(i>=3){
      if(c0.t==='O'&&c1.t==='X'&&H(c1)>H(cols[i-3])&&L(c0)<L(c2))S.push({tp:'BuT',lb:'Bull Trap',ab:'BuT',ci:i,pr:L(c0),bu:false});
      if(c0.t==='X'&&c1.t==='O'&&L(c1)<L(cols[i-3])&&H(c0)>H(c2))S.push({tp:'BrT',lb:'Bear Trap',ab:'BrT',ci:i,pr:H(c0),bu:true});}
    if(c0.t==='O'&&c1.t==='X'&&c1.b.length>=8&&(i>=3?H(c1)>H(cols[i-3]):true)&&L(c0)<M(c1))S.push({tp:'HP',lb:'High Pole',ab:'HP',ci:i,pr:M(c1),bu:false});
    if(c0.t==='X'&&c1.t==='O'&&c1.b.length>=8&&(i>=3?L(c1)<L(cols[i-3]):true)&&H(c0)>M(c1))S.push({tp:'LP',lb:'Low Pole',ab:'LP',ci:i,pr:M(c1),bu:true});
    if(i>=3){const c3=cols[i-3];if(H(c1)<H(c2)&&L(c1)>L(c2)&&H(c2)<H(c3)&&L(c2)>L(c3))S.push({tp:'TRI',lb:'Triangle',ab:'△',ci:i,pr:M(c1),bu:null});}
    // Anchor column labels
    if(cols[i].ac)S.push({tp:cols[i].t==='X'?'AC+':'AC-',lb:cols[i].t==='X'?'Anchor Col +':'Anchor Col -',ab:cols[i].t==='X'?'AC+':'AC-',ci:i,pr:M(cols[i]),bu:cols[i].t==='X'?true:false,isL:true});
  }
  let ld=null;S.forEach(s=>{if(s.bu===null||s.isL){s.fr=false;return}const d=s.bu?'B':'S';s.fr=d!==ld;if(s.fr)ld=d});return S;
}

function mxSc(co,si){if(co.length<2)return 0;const l=co[co.length-1],s=si.filter(x=>x.bu!==null&&!x.isL).slice(-1)[0];if(!s)return 0;if(s.bu&&l.t==='X')return 2;if(s.bu&&l.t==='O')return 1;if(!s.bu&&l.t==='O')return-2;if(!s.bu&&l.t==='X')return-1;return 0}

const PATS=[
  {tp:'AC+',lb:'Anchor Column Bullish',c:'#00e676'},{tp:'AC-',lb:'Anchor Column Bearish',c:'#ff9100'},

  {tp:'TRI',lb:'Triangle (△)',c:'#ffb300'},
];
const TOOLS=[{icon:'⚓',lb:'Anchor Points',k:'anc'},{icon:'╱',lb:'45° Trend Line',k:'t45'},{icon:'📏',lb:'Vertical Count',k:'vc'},{icon:'〰',lb:'Moving Average',k:'ma'}];
const BVS=[{l:'0.25%',v:.25,s:1},{l:'0.50%',v:.5,s:1},{l:'1%',v:1,s:2},{l:'1.5%',v:1.5,s:2},{l:'3%',v:3,s:3},{l:'5%',v:5,s:4}];

// ═══ CANVAS — DEFINEDGE STYLE ═══
function PnFC({cols,sigs,ma,w,h,sym,pv,tv,zoom}){
  const ref=useRef(null);
  useEffect(()=>{
    const cv=ref.current;if(!cv||!cols.length)return;
    const ctx=cv.getContext('2d');const dp=window.devicePixelRatio||1;
    const cW=Math.max(w,cols.length*(10+zoom*3)+80);
    cv.width=cW*dp;cv.height=h*dp;cv.style.width=cW+'px';ctx.scale(dp,dp);
    ctx.fillStyle='#060810';ctx.fillRect(0,0,cW,h);

    let ap=[];cols.forEach(c=>ap.push(...c.b));if(!ap.length)return;
    const mn=Math.min(...ap),mx=Math.max(...ap),rg=mx-mn||1;
    const P={t:10,b:10,l:10,r:56};
    const cw2=cW-P.l-P.r,ch=h-P.t-P.b;
    const colW=Math.max(8,Math.min(24,(10+zoom*3)));
    const xo=ci=>P.l+ci*colW+colW/2;
    const yo=pr=>P.t+ch-((pr-mn)/rg)*ch;
    const boxSz=Math.max(5,colW*.65);

    // Column backgrounds
    cols.forEach((col,ci)=>{
      const x=xo(ci)-colW/2;const hi=yo(Math.max(...col.b))-3,lo=yo(Math.min(...col.b))+3;
      const g=ctx.createLinearGradient(x,hi,x,lo);
      if(col.t==='X'){g.addColorStop(0,col.ac?'rgba(0,200,83,.14)':'rgba(0,200,83,.04)');g.addColorStop(1,col.ac?'rgba(0,200,83,.06)':'rgba(0,200,83,.015)')}

// ═══ EDGECLOUD INDICATORS ═══
function calcEMA(data,period){const k=2/(period+1);const out=[];let prev=null;for(const v of data){if(v==null){out.push(prev);continue}prev=prev==null?v:v*k+prev*(1-k);out.push(prev)}return out}
function calcSMA(data,period){const out=[];let sum=0;for(let i=0;i<data.length;i++){sum+=data[i]||0;if(i>=period)sum-=data[i-period]||0;out.push(i>=period-1?sum/period:null)}return out}

function calcATR(ohlc,period){
  const tr=[];for(let i=0;i<ohlc.length;i++){const d=ohlc[i];const h=d.high,l=d.low,pc=i>0?ohlc[i-1].close:l;tr.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)))}
  const out=[];let sum=0;for(let i=0;i<tr.length;i++){sum+=tr[i];if(i>=period){sum-=tr[i-period];out.push(sum/period)}else if(i===period-1){out.push(sum/period)}else{out.push(null)}}
  return out;
}

function calcSuperTrend(ohlc,period,mult){
  const len=ohlc.length;const st=new Array(len).fill(null);const dir=new Array(len).fill(1);
  const atr=calcATR(ohlc,period);
  let prevUp=0,prevDn=0,prevDir=1;
  for(let i=0;i<len;i++){
    if(atr[i]==null){st[i]=null;continue}
    const d=ohlc[i];const mid=(d.high+d.low)/2;let up=mid-mult*atr[i];let dn=mid+mult*atr[i];
    if(prevUp>0)up=Math.max(up,prevUp);if(prevDn>0)dn=Math.min(dn,prevDn);
    const d2=d.close>prevDn?1:d.close<prevUp?-1:prevDir;
    st[i]=d2===1?up:dn;dir[i]=d2;prevUp=up;prevDn=dn;prevDir=d2;
  }
  return{values:st,direction:dir};
}

function calcEdgeCloud(ohlc,cfg){
  const c=cfg||{};
  const st1=calcSuperTrend(ohlc,c.stPeriod||10,c.stMult1||3);
  let walking,walkDir,st2=null;
  if(c.dualST){
    st2=calcSuperTrend(ohlc,c.stPeriod2||10,c.stMult2||3);
    walking=st1.values.map((v,i)=>(v!=null&&st2.values[i]!=null)?(v+st2.values[i])/2:null);
    walkDir=st1.direction.map((v,i)=>(v===1&&st2.direction[i]===1)?1:(v===-1&&st2.direction[i]===-1)?-1:v);
  }else{
    walking=st1.values.slice();walkDir=st1.direction.slice();
  }
  const closes=ohlc.map(d=>d.close);
  const running=calcEMA(closes,c.emaPeriod||21);
  return{walking,walkDir,running,st1,st2};
}
const EC_DEFAULTS={stPeriod:10,stMult1:3,dualST:false,stPeriod2:10,stMult2:2,emaPeriod:21,bbPeriod:20,bbStdDev:2,bbSqueeze:10,adxPeriod:14,rsiPeriod:14,dcPeriod:20,ppLookback:10,wlColor:'#FFA000',wlWidth:2,wlStyle:'dashed',rlColor:'#42A5F5',rlWidth:2,rlStyle:'solid',showCloud:true};

function calcRSI(closes,period){
  const out=new Array(closes.length).fill(null);let avgG=0,avgL=0;
  for(let i=1;i<closes.length;i++){
    const d=closes[i]-closes[i-1];const g=d>0?d:0;const l=d<0?-d:0;
    if(i<=period){avgG+=g/period;avgL+=l/period;if(i===period)out[i]=avgL===0?100:100-100/(1+avgG/avgL)}
    else{avgG=(avgG*(period-1)+g)/period;avgL=(avgL*(period-1)+l)/period;out[i]=avgL===0?100:100-100/(1+avgG/avgL)}
  }
  return out;
}

function calcBollingerWidth(closes,period){
  const sma=calcSMA(closes,period);
  const out=[];
  for(let i=0;i<closes.length;i++){
    if(sma[i]==null||i<period-1){out.push(null);continue}
    let s2=0;for(let j=i-period+1;j<=i;j++){const d=closes[j]-sma[i];s2+=d*d}
    const std=Math.sqrt(s2/period);const upper=sma[i]+2*std;const lower=sma[i]-2*std;
    out.push(sma[i]>0?(upper-lower)/sma[i]*100:0);
  }
  return out;
}

function calcADX(ohlc,period){
  const len=ohlc.length;const adx=new Array(len).fill(null);const diP=new Array(len).fill(null);const diM=new Array(len).fill(null);
  const atr=calcATR(ohlc,period);
  const dmP=[0],dmM=[0];
  for(let i=1;i<len;i++){const upM=ohlc[i].high-ohlc[i-1].high;const dnM=ohlc[i-1].low-ohlc[i].low;dmP.push(upM>dnM&&upM>0?upM:0);dmM.push(dnM>upM&&dnM>0?dnM:0)}
  const smDmP=calcEMA(dmP,period);const smDmM=calcEMA(dmM,period);const smAtr=calcEMA(atr.map(v=>v||0),period);
  const dx=[];
  for(let i=0;i<len;i++){
    if(smAtr[i]==null||smAtr[i]===0){dx.push(null);continue}
    const dp=smDmP[i]/smAtr[i]*100;const dm=smDmM[i]/smAtr[i]*100;
    diP[i]=dp;diM[i]=dm;const s=dp+dm;dx.push(s===0?0:Math.abs(dp-dm)/s*100);
  }
  const adxLine=calcEMA(dx.map(v=>v||0),period);
  for(let i=0;i<len;i++)adx[i]=adxLine[i];
  return{adx,diP,diM};
}

function calcFusionState(bbw,rsi,adx,diP,diM,adxRising){
  if(bbw==null||rsi==null||adx==null)return{state:'DRIFT',color:'#616161'};
  if(bbw<10&&rsi>55&&adxRising)return{state:'IGNITION',color:'#FFD700'};
  if(bbw>=10&&rsi>55&&adx>25&&diP>diM)return{state:'THRUST',color:'#00E676'};
  if(bbw>=10&&rsi<45&&adx>25&&diM>diP)return{state:'FADE',color:'#FF5252'};
  if(bbw<10&&adx<20)return{state:'COIL',color:'#B388FF'};
  return{state:'DRIFT',color:'#616161'};
}

function calcAllFusionStates(ohlc,cfg){
  const c=cfg||{};

        crosshair:{mode:0,vertLine:{color:dk?'rgba(255,255,255,0.15)':'rgba(0,0,0,0.15)',labelBackgroundColor:crossBg},horzLine:{color:dk?'rgba(255,255,255,0.15)':'rgba(0,0,0,0.15)',labelBackgroundColor:crossBg}},
        rightPriceScale:{borderColor:bdr},
        timeScale:{borderColor:bdr,timeVisible:false,rightOffset:5},
      });
      chartObjRef.current=chart;

      let mainSeries;
      if(mode==='line'){
        mainSeries=chart.addAreaSeries({topColor:dk?'rgba(66,165,245,0.15)':'rgba(33,150,243,0.12)',bottomColor:'transparent',lineColor:'#2196F3',lineWidth:2,crosshairMarkerRadius:4});
        mainSeries.setData(ohlc.map(d=>({time:d.time,value:d.close})));
      }else{
        mainSeries=chart.addBarSeries({upColor:'#00e676',downColor:'#ef5350',thinBars:true,openVisible:false});
        mainSeries.setData(ohlc.map((d,i)=>({time:d.time,open:i>0?ohlc[i-1].close:d.open,high:d.high,low:d.low,close:d.close})));
      }

      // Pocket Pivot detection (volume chart created separately below)
      const ppFlags=[];
      ohlc.forEach((bar,i)=>{
        if(i<2||i===ohlc.length-1)return;const prevC=ohlc[i-1].close;if(bar.close<prevC)return;
        let maxDV=0;for(let j=Math.max(0,i-(ecCfg.ppLookback||10));j<i;j++){const pC=j>0?ohlc[j-1].close:ohlc[j].close;if(ohlc[j].close<pC&&ohlc[j].volume>maxDV)maxDV=ohlc[j].volume}
        if(maxDV>0&&bar.volume>maxDV)ppFlags.push(i);
      });

      const{walking,walkDir,running,st1,st2}=calcEdgeCloud(ohlc,ecCfg);
      walkRef.current=walking;runRef.current=running;
      // Walking Line — dashed, green when bullish, red when bearish (per-bar color)
      const wkSeries=chart.addLineSeries({lineWidth:2,lineStyle:LightweightCharts.LineStyle.Dashed,lastValueVisible:true,priceLineVisible:false,color:'#26a69a',title:'WL'});
      const wkD=[];for(let i=0;i<ohlc.length;i++){if(walking[i]!=null)wkD.push({time:ohlc[i].time,value:walking[i],color:walkDir[i]===1?'#26a69a':'#ef5350'})}
      wkSeries.setData(wkD);
      // Running Line — solid orange
      const rnSeries=chart.addLineSeries({color:'#ff9800',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Solid,lastValueVisible:true,priceLineVisible:false,title:'RL'});
      const rnD=[];for(let i=0;i<ohlc.length;i++){if(running[i]!=null)rnD.push({time:ohlc[i].time,value:running[i]})}
      rnSeries.setData(rnD);

      const fusionStates=calcAllFusionStates(ohlc,ecCfg);
      fusionRef.current=fusionStates;

      // Cloud fill BETWEEN WL and RL — green when bullish, red when bearish
      if(ecCfg.showCloud){
        const bullUpper=[],bullLower=[],bearUpper=[],bearLower=[];
        for(let i=0;i<ohlc.length;i++){
          if(walking[i]==null||running[i]==null)continue;
          const t=ohlc[i].time;const hi=Math.max(walking[i],running[i]);const lo=Math.min(walking[i],running[i]);
          const isBull=running[i]>walking[i];
          if(isBull){
            bullUpper.push({time:t,value:hi});bullLower.push({time:t,value:lo});
            bearUpper.push({time:t,value:lo});bearLower.push({time:t,value:lo});
          }else{
            bearUpper.push({time:t,value:hi});bearLower.push({time:t,value:lo});
            bullUpper.push({time:t,value:lo});bullLower.push({time:t,value:lo});
          }
        }
        // Adaptive opacity: reduce when cloud is very wide (gap-downs)
        let maxCloudPct=0;for(let j=0;j<ohlc.length;j++){if(walking[j]!=null&&running[j]!=null){const cp=Math.abs(walking[j]-running[j])/(Math.min(walking[j],running[j])||1)*100;if(cp>maxCloudPct)maxCloudPct=cp}}
        const cloudOp=maxCloudPct>10?0.04:0.12;const cloudOp2=maxCloudPct>10?0.01:0.02;
        const aOpts={lastValueVisible:false,priceLineVisible:false,crosshairMarkerVisible:false};
        chart.addAreaSeries({...aOpts,topColor:`rgba(0,230,118,${cloudOp})`,bottomColor:`rgba(0,230,118,${cloudOp2})`,lineColor:'transparent'}).setData(bullUpper);
        chart.addAreaSeries({...aOpts,topColor:bgCol,bottomColor:bgCol,lineColor:'transparent'}).setData(bullLower);
        chart.addAreaSeries({...aOpts,topColor:`rgba(239,83,80,${cloudOp})`,bottomColor:`rgba(239,83,80,${cloudOp2})`,lineColor:'transparent'}).setData(bearUpper);
        chart.addAreaSeries({...aOpts,topColor:bgCol,bottomColor:bgCol,lineColor:'transparent'}).setData(bearLower);
      }

      // ── Donchian Channel (20) ──
      const dcPeriod=ecCfg.dcPeriod||20;const dcUpper=[],dcLower=[];
      for(let i=0;i<ohlc.length;i++){
        if(i<dcPeriod-1){dcUpper.push(null);dcLower.push(null);continue}
        let hh=-Infinity,ll=Infinity;for(let j=i-dcPeriod+1;j<=i;j++){if(ohlc[j].high>hh)hh=ohlc[j].high;if(ohlc[j].low<ll)ll=ohlc[j].low}
        dcUpper.push(hh);dcLower.push(ll);
      }
      // DC lines removed — calculation kept for BO/BD detection

      // Donchian breakout detection (first bar only)
      const boFlags=[];let inBullBO=false,inBearBO=false;
      for(let i=dcPeriod;i<ohlc.length;i++){
        if(dcUpper[i-1]!=null&&ohlc[i].close>dcUpper[i-1]&&!inBullBO){boFlags.push({idx:i,type:'bull'});inBullBO=true;inBearBO=false}
        else if(dcLower[i-1]!=null&&ohlc[i].close<dcLower[i-1]&&!inBearBO){boFlags.push({idx:i,type:'bear'});inBearBO=true;inBullBO=false}
        else{if(ohlc[i].close<=dcUpper[i-1])inBullBO=false;if(ohlc[i].close>=dcLower[i-1])inBearBO=false}
      }

      // ── Pullback detection ──
      const pbFlags=[];
      for(let i=3;i<ohlc.length;i++){
        if(walking[i]==null||running[i]==null)continue;
        const cloudTop=Math.max(walking[i],running[i]);const cloudBot=Math.min(walking[i],running[i]);
        const bullCloud=running[i]>walking[i];const fs=fusionStates[i]?.state;
        if(fs==='FADE')continue; // skip counter-trend
        if(bullCloud){
          // Check: was above cloud recently, dipped into cloud, closed back above
          let wasAbove=false;for(let j=Math.max(0,i-5);j<i;j++){if(ohlc[j].close>Math.max(walking[j]||0,running[j]||0))wasAbove=true}
          if(wasAbove&&ohlc[i].low<=cloudTop&&ohlc[i].close>=cloudBot&&ohlc[i].close>ohlc[i].open){
            pbFlags.push(i);
          }
        }else{
          let wasBelow=false;for(let j=Math.max(0,i-5);j<i;j++){if(ohlc[j].close<Math.min(walking[j]||Infinity,running[j]||Infinity))wasBelow=true}
          if(wasBelow&&ohlc[i].high>=cloudBot&&ohlc[i].close<=cloudTop&&ohlc[i].close<ohlc[i].open){
            pbFlags.push(i);
          }
        }
      }

      // ── BB Squeeze markers ──
      const closes=ohlc.map(d=>d.close);
      const bbwArr=calcBollingerWidth(closes,ecCfg.bbPeriod||20);
      const sqFlags=[];let wasSqueeze=false;
      for(let i=1;i<ohlc.length;i++){
        if(bbwArr[i]==null)continue;
        const isSq=bbwArr[i]<(ecCfg.bbSqueeze||10);
        if(isSq&&!wasSqueeze)sqFlags.push({idx:i,type:'enter'}); // squeeze starts
        if(!isSq&&wasSqueeze)sqFlags.push({idx:i,type:'fire'}); // squeeze fires
        wasSqueeze=isSq;
      }

      // Blue overlay bars ONLY for combo signals: BO+PP or PB+PP
      const ppCutoff=Math.max(0,ohlc.length-60);
      const ppSetAll=new Set(ppFlags);
      const boIdxSet=new Set(boFlags.filter(b=>b.type==='bull').map(b=>b.idx));
      const pbSet=new Set(pbFlags);
      const comboIdxs=[];
      ppSetAll.forEach(i=>{if(boIdxSet.has(i)||pbSet.has(i))comboIdxs.push(i)});
      if(comboIdxs.length>0){
        const blueBars=chart.addBarSeries({upColor:'#00e5ff',downColor:'#00e5ff',thinBars:false,openVisible:false,lastValueVisible:false,priceLineVisible:false});
        blueBars.setData(comboIdxs.sort((a,b)=>a-b).map(i=>{const d=ohlc[i];return{time:d.time,open:i>0?ohlc[i-1].close:d.open,high:d.high,low:d.low,close:d.close}}));
      }

      // ── All markers ──
      const markers=[];
      // Fusion state transitions
      for(let i=1;i<fusionStates.length;i++){const prev=fusionStates[i-1].state;const cur=fusionStates[i].state;const t=ohlc[i].time;
        if(prev==='COIL'&&cur==='IGNITION')markers.push({time:t,position:'aboveBar',color:'#FFD700',shape:'circle',text:'I'});
        else if(prev==='IGNITION'&&cur==='THRUST')markers.push({time:t,position:'belowBar',color:'#00E676',shape:'arrowUp',text:'T'});
        else if(prev==='THRUST'&&cur==='FADE')markers.push({time:t,position:'aboveBar',color:'#FF5252',shape:'arrowDown',text:'F'});
        else if(cur==='COIL'&&prev!=='COIL')markers.push({time:t,position:'belowBar',color:'#B388FF',shape:'square',text:'C'})}
      // Pocket Pivot — faint arrows, last 60 bars
      const ppCut2=ohlc.length-60;
      ppFlags.filter(i=>i>=ppCut2).forEach(i=>{markers.push({time:ohlc[i].time,position:'belowBar',color:'#00e5ff44',shape:'arrowUp',text:''})});
      // Donchian breakouts — BO last 90 bars, BD last 3
      const boCut=ohlc.length-90;
      boFlags.filter(b=>b.type==='bull'&&b.idx>=boCut).forEach(({idx})=>{const fs=fusionStates[idx]?.state;const dim=fs==='DRIFT'||fs==='COIL';
        markers.push({time:ohlc[idx].time,position:'belowBar',color:dim?'#00e5ff60':'#00e5ff',shape:'arrowUp',text:'BO'})});
      const lastBDs=boFlags.filter(b=>b.type==='bear').slice(-3);
      lastBDs.forEach(({idx})=>{const fs=fusionStates[idx]?.state;const dim=fs==='DRIFT'||fs==='COIL';
        markers.push({time:ohlc[idx].time,position:'aboveBar',color:dim?'#FF525260':'#FF5252',shape:'arrowDown',text:'BD'})});
      // Pullbacks — solid green, last 60 bars
      const pbCut=ohlc.length-60;
      pbFlags.filter(i=>i>=pbCut).forEach(i=>{markers.push({time:ohlc[i].time,position:'belowBar',color:'#26A69A',shape:'circle',text:'PB'})});
      // BB Squeeze — last 30 bars only
      const sqCut=ohlc.length-30;
      sqFlags.filter(s=>s.idx>=sqCut).forEach(({idx,type})=>{const fs=fusionStates[idx]?.state;
        if(type==='enter')markers.push({time:ohlc[idx].time,position:'belowBar',color:'#B388FF88',shape:'square',text:'SQ'});
        else markers.push({time:ohlc[idx].time,position:'aboveBar',color:(fs==='IGNITION')?'#FFD700':'#B388FF',shape:'circle',text:'SQ'})});
      markers.sort((a,b)=>a.time-b.time);
      if(markers.length)mainSeries.setMarkers(markers);

      // Crosshair move → update hovered bar
      chart.subscribeCrosshairMove(param=>{
        if(!param||!param.time){setHovered(null);return}
        const idx=ohlc.findIndex(d=>d.time.year===param.time.year&&d.time.month===param.time.month&&d.time.day===param.time.day);
        if(idx<0){setHovered(null);return}
        const d=ohlc[idx];const fs=fusionStates[idx];
        setHovered({date:d.time.day+'/'+d.time.month+'/'+d.time.year,open:d.open,high:d.high,low:d.low,close:d.close,volume:d.volume,walking:walking[idx],running:running[idx],st1Val:st1.values[idx],st1Dir:st1.direction[idx],st2Val:st2?.values[idx],st2Dir:st2?.direction[idx],cloudBull:walking[idx]!=null&&running[idx]!=null?running[idx]>walking[idx]:null,...fs})});

      // ── Trade overlay from te_trades ──
      let tradeOverlay=null;
      try{
        const allTrades=JSON.parse(localStorage.getItem('te_trades')||'[]');
        const match=allTrades.find(t=>t.symbol===symbol&&(t.status==='Open'||t.status==='Partial'));
        if(match){
          const entries=match.entries||[];const exits=match.exits||[];
          const avgEntry=entries.length?entries.reduce((s,e)=>s+(+e.price)*(+e.qty),0)/entries.reduce((s,e)=>s+(+e.qty),0):+match.entry_price||0;
          const sl=+match.sl||0;const days=entries.length?Math.floor((Date.now()-new Date(entries[0].date).getTime())/86400000):0;
          const curClose=ohlc[ohlc.length-1].close;const pnlPct=avgEntry>0?((curClose-avgEntry)/avgEntry*100):0;
          const riskPct=avgEntry>0&&sl>0?((avgEntry-sl)/avgEntry*100):0;
          // Entry fusion state (find bar closest to first entry date)
          let entryFusionState=null;
          if(entries.length&&fusionStates.length){const ed=new Date(entries[0].date).getTime()/1000;const eIdx=ohlc.reduce((best,d,i)=>Math.abs((d._ts||0)-ed)<Math.abs((ohlc[best]._ts||0)-ed)?i:best,0);entryFusionState=fusionStates[eIdx]?.state||null}
          tradeOverlay={entries,exits,avgEntry,sl,days,pnlPct,riskPct,status:match.status,entryFusion:entryFusionState,curFusion:fusionStates[ohlc.length-1]?.state};
          // Avg entry line — subtle
          if(avgEntry>0){const avgLine=chart.addLineSeries({color:'rgba(0,188,212,0.4)',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dashed,lastValueVisible:true,priceLineVisible:false,title:'Avg'});avgLine.setData([{time:ohlc[0].time,value:avgEntry},{time:ohlc[ohlc.length-1].time,value:avgEntry}])}
          // SL line — subtle
          if(sl>0){const slLine=chart.addLineSeries({color:'rgba(255,82,82,0.4)',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dashed,lastValueVisible:true,priceLineVisible:false,title:'SL'});slLine.setData([{time:ohlc[0].time,value:sl},{time:ohlc[ohlc.length-1].time,value:sl}])}
          // Entry/exit/pyramid markers on main series
          const tm=[...markers];
          entries.forEach((e,j)=>{const ts=new Date(e.date).getTime()/1000;const near=ohlc.reduce((b,d,i)=>Math.abs((d._ts||0)-ts)<Math.abs((ohlc[b]._ts||0)-ts)?i:b,0);tm.push({time:ohlc[near].time,position:'belowBar',color:j===0?'#00E676':'#FF9800',shape:'arrowUp',text:j===0?'P1':j===1?'P2':'P3'})});
          exits.forEach((e,j)=>{const ts=new Date(e.date).getTime()/1000;const near=ohlc.reduce((b,d,i)=>Math.abs((d._ts||0)-ts)<Math.abs((ohlc[b]._ts||0)-ts)?i:b,0);const isProfit=(+e.price)>avgEntry;tm.push({time:ohlc[near].time,position:'aboveBar',color:isProfit?'#00E676':'#FF5252',shape:'arrowDown',text:j===0?'T1':j===1?'T2':j===2?'T3':'RUN'})});
          tm.sort((a,b)=>a.time-b.time);
          mainSeries.setMarkers(tm);
        }
      }catch(e){}
      setFusion(prev=>({...(prev||{}),_tradeOverlay:tradeOverlay}));

      chart.timeScale().fitContent();
      setTimeout(()=>{if(chartObjRef.current)chartObjRef.current.timeScale().fitContent()},200);
      setTimeout(()=>{if(chartObjRef.current)chartObjRef.current.timeScale().fitContent()},600);

      // ── Separate volume chart ──
      if(volContainerRef.current){
        if(volChartRef.current){volChartRef.current.remove();volChartRef.current=null}
        volContainerRef.current.innerHTML='';
        const vc=LightweightCharts.createChart(volContainerRef.current,{
          width:chartW,height:80,
          layout:{background:{color:bgCol},textColor:txtCol,fontFamily:'IBM Plex Mono'},
          grid:{vertLines:{color:gridCol},horzLines:{color:'transparent'}},
          rightPriceScale:{visible:true,borderColor:'transparent',borderVisible:false,drawTicks:false,textColor:'transparent'},
          timeScale:{visible:false,borderColor:bdr,rightOffset:5},
          crosshair:{mode:1},
          handleScroll:{vertTouchDrag:false},
        });
        volChartRef.current=vc;
        const vhs=vc.addHistogramSeries({color:'#26a69a',priceFormat:{type:'volume'},lastValueVisible:false,priceLineVisible:false});
        const ppSet=new Set(ppFlags.filter(idx=>idx>=ohlc.length-60));
        const boSet=new Set(boFlags.map(b=>b.idx));
        vhs.setData(ohlc.map((bar,i)=>{
          const prevC=i>0?ohlc[i-1].close:bar.open;const isUp=bar.close>=prevC;
          const isSignal=ppSet.has(i)||boSet.has(i);const vol=bar.volume||0;
          return{time:bar.time,value:isSignal?Math.max(vol,vol*1.15):vol,color:isSignal?'#00e5ff':isUp?'rgba(0,230,118,0.4)':'rgba(239,83,80,0.4)'};
        }));
        vc.timeScale().fitContent();
        // Force sync initial visible range
        const mainRange=chart.timeScale().getVisibleLogicalRange();
        if(mainRange)vc.timeScale().setVisibleLogicalRange(mainRange);
        // Sync time scales on scroll/zoom
        chart.timeScale().subscribeVisibleLogicalRangeChange(range=>{if(range&&volChartRef.current)volChartRef.current.timeScale().setVisibleLogicalRange(range)});
        vc.timeScale().subscribeVisibleLogicalRangeChange(range=>{if(range&&chartObjRef.current)chartObjRef.current.timeScale().setVisibleLogicalRange(range)});
      }

      // Build panel data
      const n=ohlc.length-1;const cur=fusionStates[n];
      const cloudBull=walking[n]!=null&&running[n]!=null?running[n]>walking[n]:null;
      const stripLen=Math.min(60,ohlc.length);
      const strip=fusionStates.slice(-stripLen);
      const bbwStrip=strip.map(s=>s.bbw);
      setFusion({...cur,cloudBull,strip,bbwStrip,ohlcLen:ohlc.length,_tradeOverlay:tradeOverlay});

      // Fetch weekly fusion state (async, non-blocking)
      if(showWeekly){fetchWeekly(wUrl,symbol)}
      setLoading(false);
    }catch(e){setErr(e.message);setLoading(false)}
  },[symbol,w,h,mode,showWeekly,isDark,ecCfg]);

  const fetchWeekly=useCallback(async(wUrl,sym)=>{
    try{
      const res=await fetch(wUrl+'?_='+Date.now(),{method:'POST',headers:{'Content-Type':'application/json','X-Kite-Action':'yahoo-proxy','Cache-Control':'no-cache','Pragma':'no-cache'},body:JSON.stringify({ticker:`${sym}.NS`,range:'2y',interval:'1wk',_t:Date.now()})});
      if(!res.ok)return;const data=await res.json();
      const result=data?.chart?.result?.[0];if(!result)return;
      const ohlc=parseOHLCV(result);if(ohlc.length<30)return;
      const states=calcAllFusionStates(ohlc);
      const n=ohlc.length-1;const wk=states[n];
      const stripLen=Math.min(30,ohlc.length);
      setWeeklyState({...wk,strip:states.slice(-stripLen),cloudBull:ohlc.length>1});
    }catch{}
  },[]);

  useEffect(()=>{fetchAndRender(range)},[fetchAndRender,range]);
  // Resize chart when container resizes (window resize, layout change, etc.)
  useEffect(()=>{
    if(!containerRef.current)return;
    const ro=new ResizeObserver(()=>{if(containerRef.current){const cw=containerRef.current.clientWidth;if(cw>0){if(chartObjRef.current)chartObjRef.current.resize(cw,440);if(volChartRef.current)volChartRef.current.resize(cw,80)}}});
    ro.observe(containerRef.current);
    // Also handle window resize as fallback
    const onResize=()=>{if(chartObjRef.current&&containerRef.current){chartObjRef.current.resize(containerRef.current.clientWidth,500)}};
    window.addEventListener('resize',onResize);
    return()=>{ro.disconnect();window.removeEventListener('resize',onResize)};
  },[]);

  // Display values: hovered bar overrides latest
  const dv=hovered||fusion;

  const tfBtn=(label,val)=><button key={val} onClick={()=>setRange(val)} style={{padding:'3px 10px',fontSize:9,fontFamily:'var(--fm)',fontWeight:range===val?700:500,color:range===val?'#42A5F5':'var(--t3)',background:range===val?'rgba(66,165,245,.12)':'transparent',border:`1px solid ${range===val?'rgba(66,165,245,.3)':'var(--bdr)'}`,borderRadius:3,cursor:'pointer',transition:'all .15s'}}>{label}</button>;

    {sub&&<div style={{font:'400 13px var(--fm)',color:'var(--t3)',marginTop:6}}>{sub}</div>}
  </div>;

  const entryRow=(sig,state,action,color,idx)=><tr style={{borderBottom:'1px solid var(--bdr)',background:idx%2?'var(--bg3)':'transparent'}}>
    <td style={{padding:'12px 14px',font:'600 14px var(--fm)',color:'var(--t2)'}}>{sig}</td>
    <td style={{padding:'12px 14px'}}><span style={{font:'700 13px var(--fm)',color:FUSION_COLORS[state],padding:'3px 10px',background:`${FUSION_COLORS[state]}18`,borderRadius:4}}>{state}</span></td>
    <td style={{padding:'12px 14px',font:'500 14px var(--fm)',color}}>{action}</td>
  </tr>;

  const exitRow=(transition,action,color,idx)=><tr style={{borderBottom:'1px solid var(--bdr)',background:idx%2?'var(--bg3)':'transparent'}}>
    <td style={{padding:'12px 14px',font:'600 14px var(--fm)',color:'var(--t2)'}}>{transition}</td>
    <td style={{padding:'12px 14px',font:color==='#FF5252'?'700 14px var(--fm)':'500 14px var(--fm)',color}}>{action}</td>
  </tr>;

  const sep=()=><div style={{height:1,background:'var(--bdr)',margin:'16px 0'}}/>;

  if(err)return<div style={{padding:40,textAlign:'center',color:'#ff3d5a',font:'500 12px var(--fm)'}}>{err}</div>;
  return<div style={{animation:'fadeIn .3s ease-out',width:'100%',padding:'0 8px 20px'}}>
    <div style={{position:'relative'}}>
      {loading&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',zIndex:5,background:isDark?'rgba(13,17,23,.9)':'rgba(255,255,255,.9)',backdropFilter:'blur(4px)'}}><div style={{width:32,height:32,border:'3px solid rgba(66,165,245,.12)',borderTop:'3px solid #42A5F5',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/></div>}
      <div ref={containerRef} style={{width:'100%',minWidth:0,height:440,transition:'opacity .2s'}}/>
      <div ref={volContainerRef} style={{width:'100%',height:80,borderTop:'1px solid var(--bdr)'}}/>
      {/* Top-left controls */}

      {/* Entry Decision Matrix + Exit Layer */}
      <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
        <div style={{flex:1,minWidth:240,background:'var(--bg2)',border:'1px solid var(--bdr)',borderLeft:'3px solid #00e5ff',borderRadius:6,padding:12}}>
          <div style={{font:'700 12px var(--fm)',color:'var(--t2)',letterSpacing:'.1em',marginBottom:10}}>ENTRY DECISION MATRIX</div>
          <table style={{width:'100%',borderCollapse:'collapse'}}><thead><tr style={{borderBottom:'1px solid var(--bdl)'}}>
            <th style={{padding:'10px 14px',font:'600 12px var(--fm)',color:'var(--t3)',textAlign:'left'}}>Signal</th>
            <th style={{padding:'10px 14px',font:'600 12px var(--fm)',color:'var(--t3)',textAlign:'left'}}>State</th>
            <th style={{padding:'10px 14px',font:'600 12px var(--fm)',color:'var(--t3)',textAlign:'left'}}>Action</th>
          </tr></thead><tbody>
            {entryRow('Star','IGNITION','Full position (P1)','#FFD700',0)}
            {entryRow('Star','THRUST','75% position','#00E676',1)}
            {entryRow('Pullback','THRUST','Add tranche (P2)','#00E676',2)}
            {entryRow('Pyramid','IGNITION','Aggressive add (P3)','#FFD700',3)}
            {entryRow('Star','COIL','Watchlist only','#B388FF',4)}
            {entryRow('Pullback','DRIFT','Skip','#616161',5)}
            {entryRow('Pyramid','FADE','Tighten SL','#FF5252',6)}
          </tbody></table>
        </div>
        <div style={{flex:1,minWidth:240,background:'var(--bg2)',border:'1px solid var(--bdr)',borderLeft:'3px solid #FF5252',borderRadius:6,padding:12}}>
          <div style={{font:'700 12px var(--fm)',color:'var(--t2)',letterSpacing:'.1em',marginBottom:10}}>EXIT LAYER TABLE</div>
          <table style={{width:'100%',borderCollapse:'collapse'}}><thead><tr style={{borderBottom:'1px solid var(--bdl)'}}>
            <th style={{padding:'10px 14px',font:'600 12px var(--fm)',color:'var(--t3)',textAlign:'left'}}>Transition</th>
            <th style={{padding:'10px 14px',font:'600 12px var(--fm)',color:'var(--t3)',textAlign:'left'}}>Action</th>
          </tr></thead><tbody>
            {exitRow('THRUST','Trail EMA(21), let RUN ride','#00E676',0)}
            {exitRow('IGN → THRUST','Breakeven fast, T1 at 1R','#FFD700',1)}
            {exitRow('THRUST → FADE','Tighten to EMA(8), close T2/T3','#FF5252',2)}
            {exitRow('THRUST → DRIFT','Close RUN, book profits','#616161',3)}
            {exitRow('ANY → FADE','Hard exit all tranches','#FF5252',4)}
          </tbody></table>
        </div>
      </div>
    </div>
  </div>;
}

// ═══ APP ═══
function App(){
  const[sel,setSel]=useState(null);const[bi,setBi]=useState(2);const[mt,setMt]=useState('close');const[trd,setTrd]=useState([]);
  const[pv,setPv]=useState(()=>{const o={};PATS.forEach(p=>o[p.tp]=true);return o});
  const[tv2,setTv]=useState({anc:true,t45:false,vc:true,ma:true});
  const[zoom,setZoom]=useState(2);const[tab,setTab]=useState('bar');// chart | bar | line
  const[liveData,setLiveData]=useState(null);const[isLive,setIsLive]=useState(false);
  const[wlOpen,setWlOpen]=useState(false);
  const[isDark,setIsDark]=useState(()=>localStorage.getItem('te_theme')!=='light');
  const chartRef=useRef(null);const ctRef=useRef(null);const[cW,setCW]=useState(800);const[cH,setCH]=useState(400);
  const[searchQ,setSearchQ]=useState('');const[searchResults,setSearchResults]=useState([]);const[showSearch,setShowSearch]=useState(false);const[nseSymbols,setNseSymbols]=useState([]);const searchRef=useRef(null);const debounceRef=useRef(null);

  // Load data
  useEffect(()=>{
    loadData().then(({stocks,live,generated})=>{
      setIsLive(live);
      if(live&&stocks){setLiveData(stocks);const first=Object.keys(stocks)[0];if(first)setSel({s:first,n:stocks[first].name||first,x:'NSE'})}
      else{setSel({s:FALLBACK_STOCKS[0],n:FALLBACK_STOCKS[0],x:'NSE'})}
      if(live)uS('ok',`LIVE · ${generated?.slice(0,10)||''}`);
    });
    fS().then(m=>setTrd(m||[]));
    // Load NSE symbols for search
    fetch('data/nse_symbols.json').then(r=>r.ok?r.json():null).then(d=>{if(Array.isArray(d))setNseSymbols(d)}).catch(()=>{});
  },[]);

  // Search debounce
  useEffect(()=>{
    if(!searchQ.trim()){setSearchResults([]);return}
    clearTimeout(debounceRef.current);
    debounceRef.current=setTimeout(()=>{
      const q=searchQ.toUpperCase();
      const r=nseSymbols.filter(s=>s.symbol.includes(q)||s.name.toUpperCase().includes(q)).slice(0,8);
      setSearchResults(r);
    },200);
  },[searchQ,nseSymbols]);

  // Close search dropdown on outside click
  useEffect(()=>{const fn=e=>{if(searchRef.current&&!searchRef.current.contains(e.target))setShowSearch(false)};document.addEventListener('mousedown',fn);return()=>document.removeEventListener('mousedown',fn)},[]);

  useEffect(()=>{const ro=new ResizeObserver(e=>{for(const en of e){setCW(en.contentRect.width);setCH(en.contentRect.height)}});if(chartRef.current)ro.observe(chartRef.current);if(ctRef.current)ro.observe(ctRef.current);return()=>ro.disconnect()},[]);

  // Theme toggle listener
  useEffect(()=>{const fn=()=>setIsDark(d=>!d);document.addEventListener('te-toggle-theme',fn);return()=>document.removeEventListener('te-toggle-theme',fn)},[]);
  // Theme apply
  useEffect(()=>{
    localStorage.setItem('te_theme',isDark?'dark':'light');
    const s=document.documentElement.style;
    if(isDark){s.setProperty('--bg0','#050709');s.setProperty('--bg1','#0a0d12');s.setProperty('--bg2','#161b22');s.setProperty('--bg3','#131822');s.setProperty('--bgh','#1a2030');s.setProperty('--bdr','rgba(255,255,255,0.08)');s.setProperty('--bdl','rgba(255,255,255,0.12)');s.setProperty('--t1','#e0e0e0');s.setProperty('--t2','#99a3b8');s.setProperty('--t3','#566178');s.setProperty('--t4','#3a4358');document.body.style.background='#050709';document.body.style.color='#e0e0e0'}
    else{s.setProperty('--bg0','#f5f5f5');s.setProperty('--bg1','#ffffff');s.setProperty('--bg2','#f8f9fa');s.setProperty('--bg3','#f0f1f3');s.setProperty('--bgh','#e8eaed');s.setProperty('--bdr','rgba(0,0,0,0.08)');s.setProperty('--bdl','#e0e0e0');s.setProperty('--t1','#1a1a2e');s.setProperty('--t2','#444');s.setProperty('--t3','#666');s.setProperty('--t4','#999');document.body.style.background='#f5f5f5';document.body.style.color='#1a1a2e'}
    // Render toggle button
    const el=document.getElementById('theme-btn');
    if(el){el.textContent=isDark?'☾':'☀';el.title=isDark?'Switch to light':'Switch to dark'}
  },[isDark]);


  const bv=BVS[bi];
  const ohlc=useMemo(()=>{
    if(!sel)return[];
    if(isLive&&liveData&&liveData[sel.s])return liveData[sel.s].ohlc;
    return genDemo(sel.s);
  },[sel,isLive,liveData]);
  const lp=ohlc.length?(ohlc[ohlc.length-1].c||ohlc[ohlc.length-1].close||0):0;
  const{cols,sigs,ma}=useMemo(()=>buildPnF(ohlc,bv.v,3,true,mt),[ohlc,bv.v,mt]);
  const lastSig=sigs.filter(x=>x.bu!==null&&!x.isL).slice(-1)[0];const isBull=lastSig?.bu;
  const freshN=sigs.filter(s=>s.fr).length;

  // Watchlist
  const wlData=useMemo(()=>{
    const syms=isLive&&liveData?Object.keys(liveData).slice(0,20):FALLBACK_STOCKS;
    return syms.map(s=>{
      const o=isLive&&liveData&&liveData[s]?liveData[s].ohlc:genDemo(s);
      const r=buildPnF(o,1,3,true,'close');const sc=mxSc(r.cols,r.sigs);
      const pr=o.length?(o[o.length-1].c||o[o.length-1].close||0):0;
      const nm=isLive&&liveData&&liveData[s]?liveData[s].name||s:s;
      return{s,n:nm,x:'NSE',pr,sc}}).sort((a,b)=>b.sc-a.sc);
  },[isLive,liveData]);

  // Matrix data (multi-bv)
  const mxData=useMemo(()=>{
    const syms=isLive&&liveData?Object.keys(liveData).slice(0,30):FALLBACK_STOCKS;
    return syms.map(s=>{
      const o=isLive&&liveData&&liveData[s]?liveData[s].ohlc:genDemo(s);
      const sc={};let tot=0;[.25,1,3].forEach(v=>{const r=buildPnF(o,v,3,true,'close');const x=mxSc(r.cols,r.sigs);sc[v]=x;tot+=x});
      const pr=o.length?(o[o.length-1].c||o[o.length-1].close||0):0;
      const nm=isLive&&liveData&&liveData[s]?liveData[s].name||s:s;
      return{s,n:nm,sc,tot,pr}}).sort((a,b)=>b.tot-a.tot);
  },[isLive,liveData]);

  const exec=useCallback(act=>{if(!sel)return;const t={id:Date.now(),timestamp:Date.now(),action:act,symbol:sel.s,price:+lp.toFixed(2),signal:lastSig?.lb||'Manual',boxValue:bv.l,time:new Date().toLocaleString('en-IN'),source:'techart'};
    const u=[t,...trd].slice(0,100);setTrd(u);lS(u);cP(u)},[trd,sel,lp,lastSig,bv]);

  if(!sel)return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:'var(--t3)'}}>Loading...</div>;

  const dtPct=wlData.length?((wlData.filter(x=>x.sc>0).length/wlData.length)*100).toFixed(0):'—';

  return(
  <div className="app">
    {/* LEFT — only show for Renko tab */}
    {tab==='chart'&&<div className="lp">
      <div className="ph">PATTERNS & AUTO TOOLS</div>
      <div className="pl">
        {PATS.map(p=><div key={p.tp} className="pi" onClick={()=>setPv(v=>({...v,[p.tp]:!v[p.tp]}))}>
          <div className="pd" style={{background:p.c}}/><span>{p.lb}</span><span className={`pe ${pv[p.tp]?'on':''}`}>{pv[p.tp]?'👁':'○'}</span>
        </div>)}
      </div>
      <div className="pt">
        <div style={{font:'600 8px var(--fm)',color:'var(--t4)',letterSpacing:'.08em',marginBottom:3}}>TOOLS</div>
        {TOOLS.map(t=><div key={t.k} className="pti" onClick={()=>setTv(v=>({...v,[t.k]:!v[t.k]}))}>
          <span style={{fontSize:12,width:18,textAlign:'center'}}>{t.icon}</span><span>{t.lb}</span>
          <span className={`pe ${tv2[t.k]?'on':''}`} style={{marginLeft:'auto'}}>{tv2[t.k]?'👁':'○'}</span>
        </div>)}
        <div className="pti" style={{marginTop:4}}>
          <span style={{fontSize:12,width:18,textAlign:'center'}}>🔍</span><span>Zoom</span>
          <input type="range" min="0" max="6" value={zoom} onChange={e=>setZoom(+e.target.value)}
            style={{marginLeft:'auto',width:60,accentColor:'var(--cyn)'}}/>
        </div>
      </div>
      <div className="tb2">
        <div style={{font:'600 8px var(--fm)',color:'var(--t4)',letterSpacing:'.06em'}}>
          TRADE · <span style={{color:isBull?'#00e676':isBull===false?'#ff3d5a':'var(--t4)'}}>{isBull?'BULLISH':isBull===false?'BEARISH':'NEUTRAL'}</span>
          {lastSig&&<span style={{color:'var(--t3)',marginLeft:4}}>· {lastSig.ab}</span>}
        </div>
        <div className="tbs">
          <button className="btn buy" disabled={!isBull} onClick={()=>exec('BUY')}>▲ BUY</button>
          <button className="btn sell" disabled={isBull!==false} onClick={()=>exec('SELL')}>▼ SELL</button>
        </div>
        {trd.slice(0,3).map(t=><div key={t.id} style={{font:'400 8px var(--fm)',color:t.action==='BUY'?'#00e676':'#ff3d5a',padding:'2px 0',marginTop:2}}>{t.action} {t.symbol} ₹{t.price}</div>)}
      </div>
    </div>}

    {/* CENTER */}
    <div className="ct" ref={ctRef}>
      <div className="ib">
        <span style={{font:'800 15px var(--fu)',color:'var(--t1)'}}>{sel.s}</span>
        <div ref={searchRef} style={{position:'relative'}}>
          <input value={searchQ} onChange={e=>{setSearchQ(e.target.value);setShowSearch(true)}} onFocus={e=>{setShowSearch(true);e.target.style.borderColor='rgba(0,229,255,.4)'}} onBlur={e=>{e.target.style.borderColor='var(--bdr)'}} placeholder="Search symbol..." style={{minWidth:200,padding:'6px 12px',font:'400 14px var(--fm)',background:'var(--bg3)',border:'1px solid var(--bdr)',borderRadius:4,color:'var(--t1)',outline:'none',transition:'border-color .15s'}} onKeyDown={e=>{if(e.key==='Enter'&&searchResults.length){setSel({s:searchResults[0].symbol,n:searchResults[0].name,x:'NSE'});setSearchQ('');setShowSearch(false)}}}/>
          {showSearch&&searchResults.length>0&&<div style={{position:'absolute',top:'100%',left:0,width:260,maxHeight:240,overflowY:'auto',background:'var(--bg2)',border:'1px solid var(--bdr)',borderRadius:6,boxShadow:'0 8px 24px rgba(0,0,0,.6)',zIndex:20,marginTop:2}}>
            {searchResults.map(r=><div key={r.symbol} onClick={()=>{setSel({s:r.symbol,n:r.name,x:'NSE'});setSearchQ('');setShowSearch(false)}} style={{padding:'6px 10px',cursor:'pointer',borderBottom:'1px solid var(--bdr)',font:'400 10px var(--fm)',color:'var(--t2)',display:'flex',gap:8,alignItems:'center'}} onMouseEnter={e=>e.currentTarget.style.background='var(--bgh)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <span style={{font:'700 11px var(--fm)',color:'var(--t1)',minWidth:80}}>{r.symbol}</span>
              <span style={{font:'400 9px var(--fu)',color:'var(--t3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.name}</span>
            </div>)}
          </div>}
        </div>
        {tab==='chart'&&<span style={{font:'500 11px var(--fm)',color:'var(--cyn)'}}>({bv.l} × 3)</span>}
        <span style={{font:'500 10px var(--fu)',color:'var(--t3)'}}>Daily</span>
        <span style={{font:'600 12px var(--fm)',color:'var(--t1)'}}>CMP: <b>{lp.toFixed(2)}</b></span>
        {tab==='chart'&&<span style={{font:'400 9px var(--fm)',color:'var(--t3)'}}>Cnt: {cols.length}</span>}
        {isLive&&<span style={{font:'500 8px var(--fm)',color:'var(--grn)',background:'rgba(0,230,118,.08)',padding:'1px 5px',borderRadius:3}}>LIVE</span>}
        {tab==='chart'&&<span style={{font:'400 9px var(--fm)',color:'var(--t3)',marginLeft:'auto'}}>{freshN} fresh · {sigs.filter(s=>!s.isL).length} patterns</span>}
        <a href={tvLink(sel.s)} target="_blank" rel="noopener" style={{font:'500 9px var(--fu)',color:'var(--cyn)',textDecoration:'none',padding:'2px 6px',borderRadius:3,border:'1px solid rgba(24,214,224,.2)',marginLeft:tab!=='chart'?'auto':undefined}}>TV Pro</a>
        <a href={rzLink(sel.s)} target="_blank" rel="noopener" style={{font:'500 9px var(--fu)',color:'var(--ora)',textDecoration:'none',padding:'2px 6px',borderRadius:3,border:'1px solid rgba(255,145,0,.2)'}}>RZone</a>
      </div>
      <div className="ctrl">
        <div className="pg">
          <button className={`pb ${tab==='chart'?'ow':''}`} onClick={()=>setTab('chart')}>Renko</button>
          <button className={`pb ${tab==='bar'?'ow':''}`} onClick={()=>setTab('bar')}>Bar</button>
          <button className={`pb ${tab==='line'?'ow':''}`} onClick={()=>setTab('line')}>Line</button>
        </div>
        <div className="sep"/>
        <button className="pb" onClick={()=>setWlOpen(w=>!w)} style={{fontSize:9}}>☰ Watchlist</button>
      </div>

      {tab==='chart'&&<>
        <div className="ca" ref={chartRef}><PnFC cols={cols} sigs={sigs} ma={ma} w={cW||800} h={cH||400} sym={sel.s} pv={pv} tv={tv2} zoom={zoom}/></div>
        <div className="ds"><DSm cols={cols} w={cW||800} h={76}/></div>
      </>}
      {(tab==='bar'||tab==='line')&&<LWChart symbol={sel.s} w={cW||800} h={500} mode={tab} isDark={isDark}/>}
    </div>

    {/* WATCHLIST OVERLAY */}
    <div className={`rp${wlOpen?' open':''}`}>
      <div className="wh"><span>WATCHLIST</span><button onClick={()=>setWlOpen(false)} style={{background:'none',border:'none',color:'var(--t3)',fontSize:16,cursor:'pointer',marginLeft:'auto'}}>×</button></div>
      {wlData.map(st=>(
        <div key={st.s} className={`wi ${sel.s===st.s?'sl':''}`} onClick={()=>{setSel(st);setTab('bar');setWlOpen(false)}}>
          <div className="wic">{st.s.slice(0,2)}</div>
          <div className="wii">
            <div className="win">{st.s}</div>
            <div className="wie">{st.x}</div>
          </div>
          <div className="wip">
            <div style={{font:'600 10px var(--fm)',color:st.sc>0?'#00e676':st.sc<0?'#ff3d5a':'var(--t2)'}}>{st.pr.toFixed(2)}</div>
            <div style={{font:'400 8px var(--fm)',color:st.sc>0?'#00e676':st.sc<0?'#ff3d5a':'var(--t3)'}}>{st.pr.toFixed(2)} ({st.sc>0?'+':''}{st.sc})</div>
            <div className="dl">
              <a href={tvLink(st.s)} target="_blank" rel="noopener" title="TradingView">📈</a>
              <a href={rzLink(st.s)} target="_blank" rel="noopener" title="Definedge Zone">🔲</a>
            </div>
          </div>
        </div>
      ))}
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
