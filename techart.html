// ═══ P&F ENGINE ═══
function buildPnF(prices,bv,rv=3,lg=true,mt='close'){
  if(!prices||prices.length<2)return{cols:[],sigs:[],meta:{}};
  const cols=[];let cur=null;
  const nm=prices.map((p,i)=>({...(typeof p==='number'?{close:p,high:p,low:p}:p),idx:i}));
  let bp=nm[0].close||100;
  const bs=p=>lg?p*bv/100:bv;
  const gp=(b,ct,ph)=>{if(mt==='close')return b.close||b.price;return ct==='X'?(ph==='c'?b.high||b.close:b.low||b.close):(ph==='c'?b.low||b.close:b.high||b.close)};
  const rn=v=>Math.round(v*100)/100;

  for(let i=1;i<nm.length;i++){
    const b=nm[i],s=bs(bp);if(s<=0)continue;
    if(!cur){const p=b.close||b.price;
      if(p>=bp+s){cur={t:'X',b:[],si:i};let q=bp;while(q+s<=p){q+=s;cur.b.push(rn(q))}if(cur.b.length){bp=cur.b[cur.b.length-1];cur.ei=i;cols.push(cur)}else cur=null}
      else if(p<=bp-s){cur={t:'O',b:[],si:i};let q=bp;while(q-s>=p){q-=s;cur.b.push(rn(q))}if(cur.b.length){bp=cur.b[cur.b.length-1];cur.ei=i;cols.push(cur)}else cur=null}
      continue}
    const cp=gp(b,cur.t,'c'),rp=gp(b,cur.t,'r');
    if(cur.t==='X'){
      if(cp>=bp+s){let q=bp;while(q+s<=cp){q+=s;cur.b.push(rn(q))}bp=cur.b[cur.b.length-1];cur.ei=i}
      else if(rp<=bp-s*rv){const nc={t:'O',b:[],si:i};let q=bp;while(q-s>=rp){q-=s;nc.b.push(rn(q))}if(nc.b.length>=rv){bp=nc.b[nc.b.length-1];nc.ei=i;cur=nc;cols.push(cur)}}}
    else{
      if(cp<=bp-s){let q=bp;while(q-s>=cp){q-=s;cur.b.push(rn(q))}bp=cur.b[cur.b.length-1];cur.ei=i}
      else if(rp>=bp+s*rv){const nc={t:'X',b:[],si:i};let q=bp;while(q+s<=rp){q+=s;nc.b.push(rn(q))}if(nc.b.length>=rv){bp=nc.b[nc.b.length-1];nc.ei=i;cur=nc;cols.push(cur)}}}}

  const sigs=detect(cols);
  // Compute MA (10-col SMA of mid-prices)
  const maMid=cols.map(c=>(Math.max(...c.b)+Math.min(...c.b))/2);
  const ma=maMid.map((_,i)=>{if(i<9)return null;let s=0;for(let j=i-9;j<=i;j++)s+=maMid[j];return s/10});
  // Anchor columns (long columns ≥ median*1.5)
  const lens=cols.map(c=>c.b.length);const medLen=lens.slice().sort((a,b)=>a-b)[Math.floor(lens.length/2)]||3;
  cols.forEach((c,i)=>{c.isAnchor=c.b.length>=medLen*1.5;c.maVal=ma[i]});

  return{cols,sigs,ma};
}

function detect(cols){
  const sigs=[];if(cols.length<3)return sigs;
  const H=c=>c.b.length?Math.max(...c.b):0,L=c=>c.b.length?Math.min(...c.b):1/0,M=c=>(H(c)+L(c))/2;
  for(let i=2;i<cols.length;i++){
    const c0=cols[i],c1=cols[i-1],c2=cols[i-2];
    // Double Top Buy / Double Bottom Sell
    if(c0.t==='X'&&H(c0)>H(c2))sigs.push({tp:'DTB',lb:'Double Top Buy',ab:'DTB',ci:i,pr:H(c2),bu:true});
    if(c0.t==='O'&&L(c0)<L(c2))sigs.push({tp:'DBS',lb:'Double Bottom Sell',ab:'DBS',ci:i,pr:L(c2),bu:false});
    // Triple Top / Bottom
    if(i>=4){const c4=cols[i-4];
      if(c0.t==='X'&&c2.t==='X'&&c4.t==='X'&&Math.abs(H(c2)-H(c4))/H(c4)<.015&&H(c0)>H(c2))
        sigs.push({tp:'TT',lb:'Triple Top Buy',ab:'TT',ci:i,pr:H(c2),bu:true});
      if(c0.t==='O'&&c2.t==='O'&&c4.t==='O'&&Math.abs(L(c2)-L(c4))/L(c4)<.015&&L(c0)<L(c2))
        sigs.push({tp:'TB',lb:'Triple Bottom Sell',ab:'TB',ci:i,pr:L(c2),bu:false});}
    // Traps
    if(i>=3){
      if(c0.t==='O'&&c1.t==='X'&&H(c1)>H(cols[i-3])&&L(c0)<L(c2))
        sigs.push({tp:'BuT',lb:'Bull Trap',ab:'BuT',ci:i,pr:L(c0),bu:false});
      if(c0.t==='X'&&c1.t==='O'&&L(c1)<L(cols[i-3])&&H(c0)>H(c2))
        sigs.push({tp:'BrT',lb:'Bear Trap',ab:'BrT',ci:i,pr:H(c0),bu:true});}
    // High Pole / Low Pole
    if(c0.t==='O'&&c1.t==='X'&&c1.b.length>=8&&(i>=3?H(c1)>H(cols[i-3]):true)&&L(c0)<M(c1))
      sigs.push({tp:'HP',lb:'High Pole',ab:'HP',ci:i,pr:M(c1),bu:false});
    if(c0.t==='X'&&c1.t==='O'&&c1.b.length>=8&&(i>=3?L(c1)<L(cols[i-3]):true)&&H(c0)>M(c1))
      sigs.push({tp:'LP',lb:'Low Pole',ab:'LP',ci:i,pr:M(c1),bu:true});
    // Triangle
    if(i>=3){const c3=cols[i-3];
      if(H(c1)<H(c2)&&L(c1)>L(c2)&&H(c2)<H(c3)&&L(c2)>L(c3))
        sigs.push({tp:'TRI',lb:'Triangle',ab:'△',ci:i,pr:M(c1),bu:null});}
    // Anchor Column labels
    if(cols[i].isAnchor){
      sigs.push({tp:cols[i].t==='X'?'AC+':'AC-',lb:cols[i].t==='X'?'Anchor Column +':'Anchor Column -',ab:cols[i].t==='X'?'AC+':'AC-',ci:i,pr:M(cols[i]),bu:cols[i].t==='X'?true:false,isLabel:true});
    }
  }
  let ld=null;sigs.forEach(s=>{if(s.bu===null||s.isLabel){s.fr=false;return}const d=s.bu?'B':'S';s.fr=d!==ld;if(s.fr)ld=d});
  return sigs;
}

function mxScore(co,si){if(co.length<2)return 0;const lc=co[co.length-1],ls=si.filter(s=>s.bu!==null&&!s.isLabel).slice(-1)[0];if(!ls)return 0;if(ls.bu&&lc.t==='X')return 2;if(ls.bu&&lc.t==='O')return 1;if(!ls.bu&&lc.t==='O')return-2;if(!ls.bu&&lc.t==='X')return-1;return 0}

// ═══ DEFINEDGE-STYLE CANVAS ═══
function PnFChart({cols,sigs,ma,w,h,sym,patVis,toolVis}){
  const ref=useRef(null);
  useEffect(()=>{
    const cv=ref.current;if(!cv||!cols.length)return;
    const ctx=cv.getContext('2d');const dp=window.devicePixelRatio||1;
    cv.width=w*dp;cv.height=h*dp;ctx.scale(dp,dp);

    // Background
    ctx.fillStyle='#060810';ctx.fillRect(0,0,w,h);

    let ap=[];cols.forEach(c=>ap.push(...c.b));if(!ap.length)return;
    const mn=Math.min(...ap),mx=Math.max(...ap),rg=mx-mn||1;
    const P={t:8,b:8,l:8,r:52};
    const cw=w-P.l-P.r,ch=h-P.t-P.b;
    const colW=Math.max(8,Math.min(20,cw/cols.length));
    const totalColW=cols.length*colW;
    const offsetX=Math.max(0,(cw-totalColW)/2);
    const xo=ci=>P.l+offsetX+ci*colW+colW/2;
    const yo=pr=>P.t+ch-((pr-mn)/rg)*ch;
    const boxH=ch/(rg/(ap[1]-ap[0]||1));

    // ─── COLUMN BACKGROUNDS (Definedge style) ───
    cols.forEach((col,ci)=>{
      const x=xo(ci)-colW/2;
      const colTop=yo(Math.max(...col.b))-4;
      const colBot=yo(Math.min(...col.b))+4;
      const grad=ctx.createLinearGradient(x,colTop,x,colBot);
      if(col.t==='X'){
        grad.addColorStop(0,col.isAnchor?'rgba(0,200,83,.12)':'rgba(0,200,83,.04)');
        grad.addColorStop(1,col.isAnchor?'rgba(0,200,83,.06)':'rgba(0,200,83,.015)');
      }else{
        grad.addColorStop(0,col.isAnchor?'rgba(255,61,90,.10)':'rgba(255,61,90,.03)');
        grad.addColorStop(1,col.isAnchor?'rgba(255,61,90,.05)':'rgba(255,61,90,.01)');
      }
      ctx.fillStyle=grad;
      ctx.fillRect(x,colTop,colW,colBot-colTop);
    });

    // ─── GRID ───
    ctx.strokeStyle='#151a25';ctx.lineWidth=.5;
    const steps=Math.min(12,Math.ceil(rg/(ap[1]-ap[0]||1)/3));
    const gridStep=rg/steps;
    for(let i=0;i<=steps;i++){
      const p=mn+gridStep*i,y=yo(p);
      ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(w-P.r,y);ctx.stroke();
      // Price labels on right (Definedge style)
      ctx.fillStyle='#3a4358';ctx.font='9px IBM Plex Mono';ctx.textAlign='left';
      ctx.fillText(p.toFixed(p>500?0:p>50?1:2),w-P.r+4,y+3);
    }

    // ─── ANCHOR POINT LINES (green dashed) ───
    if(toolVis.anchor){
      // Find repeated highs/lows across columns as support/resistance
      const priceFreq={};
      cols.forEach(c=>{const h=Math.max(...c.b),l=Math.min(...c.b);
        const hk=Math.round(h*10)/10,lk=Math.round(l*10)/10;
        priceFreq[hk]=(priceFreq[hk]||0)+1;priceFreq[lk]=(priceFreq[lk]||0)+1;});
      const anchorLevels=Object.entries(priceFreq).filter(([_,cnt])=>cnt>=3).map(([p])=>+p).slice(0,6);
      ctx.setLineDash([6,4]);ctx.lineWidth=1;
      anchorLevels.forEach(p=>{
        const y=yo(p);
        ctx.strokeStyle=CL.anchorD;ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(w-P.r,y);ctx.stroke();
      });
      ctx.setLineDash([]);
    }

    // ─── 45° TREND LINES ───
    if(toolVis.trend45){
      // Find significant lows for bullish 45° and significant highs for bearish 45°
      const sigLows=[],sigHighs=[];
      cols.forEach((c,ci)=>{
        const lo=Math.min(...c.b),hi=Math.max(...c.b);
        if(ci>0&&ci<cols.length-1){
          const pLo=Math.min(...cols[ci-1].b);const nLo=ci+1<cols.length?Math.min(...cols[ci+1].b):lo;
          if(lo<=pLo&&lo<=nLo)sigLows.push({ci,pr:lo});
          const pH=Math.max(...cols[ci-1].b);const nH=ci+1<cols.length?Math.max(...cols[ci+1].b):hi;
          if(hi>=pH&&hi>=nH)sigHighs.push({ci,pr:hi});}});
      ctx.setLineDash([4,3]);ctx.lineWidth=1;
      // Bullish 45° from last 2 significant lows
      sigLows.slice(-2).forEach(sl=>{
        ctx.strokeStyle=CL.trend45D;ctx.beginPath();
        const startX=xo(sl.ci),startY=yo(sl.pr);
        // 45° means 1 box up per 1 column right
        const bxSz=rg/ch*colW; // price per colW at 45°
        const endCi=cols.length-1;
        const endPr=sl.pr+bxSz*(endCi-sl.ci);
        ctx.moveTo(startX,startY);ctx.lineTo(xo(endCi),yo(Math.min(endPr,mx)));ctx.stroke();
      });
      // Bearish 45° from last 2 significant highs
      sigHighs.slice(-2).forEach(sh=>{
        ctx.strokeStyle='rgba(255,61,90,.25)';ctx.beginPath();
        const startX=xo(sh.ci),startY=yo(sh.pr);
        const bxSz=rg/ch*colW;
        const endCi=cols.length-1;
        const endPr=sh.pr-bxSz*(endCi-sh.ci);
        ctx.moveTo(startX,startY);ctx.lineTo(xo(endCi),yo(Math.max(endPr,mn)));ctx.stroke();
      });
      ctx.setLineDash([]);
    }

    // ─── MOVING AVERAGE ───
    if(toolVis.ma&&ma){
      ctx.strokeStyle=CL.ma;ctx.lineWidth=1.5;ctx.beginPath();
      let started=false;
      ma.forEach((v,i)=>{if(v===null)return;const x=xo(i),y=yo(v);
        if(!started){ctx.moveTo(x,y);started=true}else ctx.lineTo(x,y)});
      ctx.stroke();
    }

    // ─── X and O MARKS ───
    cols.forEach((col,ci)=>{
      const x=xo(ci),sz=Math.max(4,colW*.6);
      col.b.forEach(bp=>{
        const y=yo(bp);
        if(col.t==='X'){
          ctx.strokeStyle=CL.g;ctx.lineWidth=1.6;const h2=sz/2;
          ctx.beginPath();ctx.moveTo(x-h2,y-h2);ctx.lineTo(x+h2,y+h2);ctx.moveTo(x+h2,y-h2);ctx.lineTo(x-h2,y+h2);ctx.stroke();
        }else{
          ctx.strokeStyle=CL.r;ctx.lineWidth=1.6;
          ctx.beginPath();ctx.arc(x,y,sz/2,0,Math.PI*2);ctx.stroke();
        }
      });
    });

    // ─── PATTERN LABELS ON CHART (Definedge style) ───
    sigs.forEach(s=>{
      if(s.ci>=cols.length)return;
      if(!patVis[s.tp])return;
      const x=xo(s.ci),y=yo(s.pr);
      const col=cols[s.ci];
      const isUp=s.bu===true||s.tp==='AC+';
      const labelY=isUp?yo(Math.max(...col.b))-14:yo(Math.min(...col.b))+16;

      // Label background pill (like Definedge)
      const txt=s.ab;
      ctx.font='bold 9px IBM Plex Mono';
      const tw=ctx.measureText(txt).width;
      const px=4,py=2;

      // Background
      const bgColor=s.tp==='AC+'?'rgba(0,200,83,.85)':s.tp==='AC-'?'rgba(255,145,0,.85)':
        s.bu===true?'rgba(0,200,83,.75)':s.bu===false?'rgba(255,61,90,.75)':'rgba(255,179,0,.75)';
      ctx.fillStyle=bgColor;
      const rx=x-tw/2-px,ry=labelY-7-py,rw=tw+px*2,rh=14+py;
      ctx.beginPath();ctx.roundRect(rx,ry,rw,rh,3);ctx.fill();

      // Text
      ctx.fillStyle=s.tp==='AC+'||s.tp==='AC-'?'#000':'#fff';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(txt,x,labelY);

      // Fresh signal arrow
      if(s.fr&&!s.isLabel){
        ctx.fillStyle=isUp?CL.g:CL.r;ctx.globalAlpha=.8;
        const ay=isUp?labelY-16:labelY+16;
        ctx.beginPath();
        if(isUp){ctx.moveTo(x,ay);ctx.lineTo(x+5,ay+7);ctx.lineTo(x-5,ay+7)}
        else{ctx.moveTo(x,ay);ctx.lineTo(x+5,ay-7);ctx.lineTo(x-5,ay-7)}
        ctx.fill();ctx.globalAlpha=1;
      }
    });

    // ─── VERTICAL COUNT TARGETS (dashed lines) ───
    if(toolVis.vcount){
      // Simple vertical count from last fresh buy/sell signal
      const freshSigs=sigs.filter(s=>s.fr&&!s.isLabel);
      const lastFresh=freshSigs[freshSigs.length-1];
      if(lastFresh){
        const col=cols[lastFresh.ci];
        const nBoxes=col.b.length;
        const target=lastFresh.bu?Math.max(...col.b)+nBoxes*(col.b[1]-col.b[0]||1):Math.min(...col.b)-nBoxes*(col.b[0]-col.b[1]||1);
        if(target>=mn&&target<=mx*1.3){
          ctx.setLineDash([8,4]);ctx.strokeStyle=lastFresh.bu?'rgba(0,230,118,.3)':'rgba(255,61,90,.3)';ctx.lineWidth=1;
          const y=yo(Math.max(mn,Math.min(mx,target)));
          ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(w-P.r,y);ctx.stroke();
          ctx.setLineDash([]);
          // Label
          ctx.fillStyle=lastFresh.bu?CL.g:CL.r;ctx.font='8px IBM Plex Mono';ctx.textAlign='left';
          ctx.fillText(`VC: ${target.toFixed(2)}`,w-P.r+4,y-4);
        }
      }
    }

    // ─── CURRENT PRICE LINE ───
    const lastCol=cols[cols.length-1];
    const lastPr=lastCol.t==='X'?Math.max(...lastCol.b):Math.min(...lastCol.b);
    const lpY=yo(lastPr);
    ctx.setLineDash([3,3]);ctx.strokeStyle='rgba(234,238,246,.2)';ctx.lineWidth=.5;
    ctx.beginPath();ctx.moveTo(P.l,lpY);ctx.lineTo(w-P.r,lpY);ctx.stroke();ctx.setLineDash([]);
    // Price tag
    ctx.fillStyle='rgba(24,214,224,.9)';
    ctx.beginPath();ctx.roundRect(w-P.r+1,lpY-8,P.r-4,16,3);ctx.fill();
    ctx.fillStyle='#000';ctx.font='bold 8px IBM Plex Mono';ctx.textAlign='center';
    ctx.fillText(lastPr.toFixed(2),w-P.r+P.r/2-1,lpY+3);

  },[cols,sigs,ma,w,h,sym,patVis,toolVis]);
  return <canvas ref={ref} style={{width:w,height:h,display:'block'}}/>;
}

// ═══ DSMART OSCILLATOR ═══
function DSmartCanvas({cols,w,h}){
  const ref=useRef(null);
  useEffect(()=>{
    const cv=ref.current;if(!cv||cols.length<5)return;
    const ctx=cv.getContext('2d');const dp=window.devicePixelRatio||1;
    cv.width=w*dp;cv.height=h*dp;ctx.scale(dp,dp);
    ctx.fillStyle='#060810';ctx.fillRect(0,0,w,h);

    // DSmart = rolling % of X columns in last 20
    const win=20;const vals=[];
    for(let i=0;i<cols.length;i++){
      const start=Math.max(0,i-win+1);
      let xc=0;for(let j=start;j<=i;j++)if(cols[j].t==='X')xc++;
      vals.push(xc/(i-start+1)*100);
    }

    const P={t:4,b:4,l:60,r:52};
    const cw=w-P.l-P.r,ch=h-P.t-P.b;
    const colW=cw/cols.length;

    // Overbought/Oversold zones
    ctx.fillStyle='rgba(0,230,118,.03)';ctx.fillRect(P.l,P.t,cw,ch*.4);
    ctx.fillStyle='rgba(255,61,90,.03)';ctx.fillRect(P.l,P.t+ch*.6,cw,ch*.4);

    // 60/20 lines
    ctx.setLineDash([4,4]);ctx.lineWidth=.5;
    ctx.strokeStyle='rgba(0,230,118,.2)';ctx.beginPath();const y60=P.t+ch*(1-60/100);ctx.moveTo(P.l,y60);ctx.lineTo(w-P.r,y60);ctx.stroke();
    ctx.strokeStyle='rgba(255,61,90,.2)';ctx.beginPath();const y20=P.t+ch*(1-20/100);ctx.moveTo(P.l,y20);ctx.lineTo(w-P.r,y20);ctx.stroke();
    ctx.setLineDash([]);

    // Labels
    ctx.fillStyle='#3a4358';ctx.font='8px IBM Plex Mono';ctx.textAlign='right';
    ctx.fillText('60',P.l-4,y60+3);ctx.fillText('20',P.l-4,y20+3);
    ctx.fillText('DSmart',P.l-4,P.t+ch/2+3);

    // Line
    ctx.strokeStyle=CL.c;ctx.lineWidth=1.5;ctx.beginPath();
    vals.forEach((v,i)=>{
      const x=P.l+i*colW+colW/2;const y=P.t+ch*(1-v/100);
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    });ctx.stroke();

    // Fill under
    const lastX=P.l+(vals.length-1)*colW+colW/2;
    const lastY=P.t+ch*(1-vals[vals.length-1]/100);
    ctx.lineTo(lastX,P.t+ch);ctx.lineTo(P.l+colW/2,P.t+ch);ctx.closePath();
    ctx.fillStyle='rgba(24,214,224,.05)';ctx.fill();

    // Current value
    const cv2=vals[vals.length-1];
    ctx.fillStyle=cv2>60?CL.g:cv2<20?CL.r:CL.c;ctx.font='bold 9px IBM Plex Mono';ctx.textAlign='left';
    ctx.fillText(`${cv2.toFixed(0)}%`,w-P.r+4,lastY+3);

  },[cols,w,h]);
  return <canvas ref={ref} style={{width:w,height:h,display:'block'}}/>;
}

// ═══ APP ═══
function App(){
  const[sel,setSel]=useState(STOCKS[0]);
  const[bi,setBi]=useState(2);
  const[mt,setMt]=useState('close');
  const[trd,setTrd]=useState([]);
  const[patVis,setPatVis]=useState(()=>{const o={};PAT_CFG.forEach(p=>o[p.tp]=true);return o});
  const[toolVis,setToolVis]=useState({anchor:true,trend45:false,vcount:true,ma:true});
  const chartRef=useRef(null);
  const[chartW,setChartW]=useState(800);
  const[chartH,setChartH]=useState(500);

  const bv=BVS[bi];
  const prices=useMemo(()=>gen(sel.s),[sel.s]);
  const lp=prices[prices.length-1]?.close||0;
  const{cols,sigs,ma}=useMemo(()=>buildPnF(prices,bv.v,3,true,mt),[prices,bv.v,mt]);
  const lastSig=sigs.filter(s=>s.bu!==null&&!s.isLabel).slice(-1)[0];
  const isBull=lastSig?.bu;

  // Resize
  useEffect(()=>{
    const ro=new ResizeObserver(entries=>{for(const e of entries){setChartW(e.contentRect.width);setChartH(e.contentRect.height)}});
    if(chartRef.current)ro.observe(chartRef.current);
    return()=>ro.disconnect();
  },[]);

  // Sync
  useEffect(()=>{(async()=>{const m=await fS();setTrd(m||[])})()},[]);

  // Compute P&F detail levels
  const H=c=>c.b.length?Math.max(...c.b):0,L2=c=>c.b.length?Math.min(...c.b):0;
  const lastCol=cols[cols.length-1];
  const dtbPr=lastCol&&cols.length>2?H(cols.filter(c=>c.t==='X').slice(-2)[0]||{b:[0]}):0;
  const dbsPr=lastCol&&cols.length>2?L2(cols.filter(c=>c.t==='O').slice(-2)[0]||{b:[0]}):0;
  const crPr=lastCol?(lastCol.t==='X'?L2(lastCol)-lp*.03:H(lastCol)+lp*.03):0;
  const cnt=cols.length;const xCnt=cols.filter(c=>c.t==='X').length;

  const exec=useCallback((act)=>{
    const t={id:Date.now(),timestamp:Date.now(),action:act,symbol:sel.s,price:+lp.toFixed(2),signal:lastSig?.lb||'Manual',boxValue:bv.l,time:new Date().toLocaleString('en-IN'),source:'techart'};
    const u=[t,...trd].slice(0,100);setTrd(u);lS(u);cP(u)},[trd,sel,lp,lastSig,bv]);

  // Watchlist with scores
  const wlData=useMemo(()=>STOCKS.map(st=>{const p=gen(st.s);const r=buildPnF(p,1,3,true,'close');const sc=mxScore(r.cols,r.sigs);const pr=p[p.length-1]?.close||0;return{...st,pr,sc}}).sort((a,b)=>b.sc-a.sc),[]);

  return(
  <div className="app">
    {/* ═══ LEFT: PATTERNS & TOOLS ═══ */}
    <div className="left-p">
      <div className="pat-hdr">PATTERNS & AUTO TOOLS</div>
      <div className="pat-list">
        {PAT_CFG.map(p=>(
          <div key={p.tp} className="pat-item" onClick={()=>setPatVis(v=>({...v,[p.tp]:!v[p.tp]}))}>
            <div className="pat-dot" style={{background:p.c}}/>
            <span>{p.lb}</span>
            <span className={`pat-eye ${patVis[p.tp]?'on':''}`}>{patVis[p.tp]?'👁':'○'}</span>
          </div>
        ))}
      </div>
      <div className="pat-tools">
        <div style={{font:'600 8px var(--fm)',color:'var(--t4)',letterSpacing:'.1em',marginBottom:4}}>TOOLS</div>
        {TOOLS.map(t=>(
          <div key={t.key} className="pat-tool" onClick={()=>setToolVis(v=>({...v,[t.key]:!v[t.key]}))}>
            <span className="pat-tool-icon">{t.icon}</span>
            <span>{t.lb}</span>
            <span className={`pat-eye ${toolVis[t.key]?'on':''}`} style={{marginLeft:'auto'}}>{toolVis[t.key]?'👁':'○'}</span>
          </div>
        ))}
      </div>
      {/* Trade buttons */}
      <div className="trade-box">
        <div style={{font:'600 8px var(--fm)',color:'var(--t4)',letterSpacing:'.08em',marginBottom:4}}>
          TRADE · {lastSig?lastSig.lb:'No Signal'} · <span style={{color:isBull?CL.g:isBull===false?CL.r:'var(--t4)'}}>{isBull?'BULLISH':isBull===false?'BEARISH':'NEUTRAL'}</span>
        </div>
        <div className="trade-btns">
          <button className="tbtn buy" disabled={!isBull} onClick={()=>exec('BUY')}>▲ BUY</button>
          <button className="tbtn sell" disabled={isBull!==false} onClick={()=>exec('SELL')}>▼ SELL</button>
        </div>
        {trd.length>0&&<div style={{marginTop:6}}>
          {trd.slice(0,3).map(t=><div key={t.id} style={{font:'400 8px var(--fm)',color:t.action==='BUY'?CL.g:CL.r,padding:'2px 0'}}>{t.action} {t.symbol} ₹{t.price}</div>)}
        </div>}
      </div>
    </div>

    {/* ═══ CENTER: CHART ═══ */}
    <div className="center">
      {/* Info bar (Definedge style) */}
      <div className="info-bar">
        <span className="ib-sym">{sel.s}</span>
        <span className="ib-params">({bv.l} × 3)</span>
        <span style={{font:'500 10px var(--fu)',color:'var(--t3)'}}>Daily</span>
        <span className="ib-price" style={{color:lp>0?'var(--t1)':'var(--t3)'}}>CMP: <b>{lp.toFixed(2)}</b></span>
        <span className="ib-detail">Cnt: {cnt}</span>
      </div>
      {/* Levels bar */}
      <div style={{padding:'3px 14px',borderBottom:'1px solid var(--bdr)',background:'var(--bg2)',font:'400 9px var(--fm)',color:'var(--t3)',display:'flex',gap:12,flexWrap:'wrap'}}>
        <span>DTB: <b style={{color:CL.g}}>{dtbPr.toFixed(2)}</b></span>
        <span>DBS: <b style={{color:CL.r}}>{dbsPr.toFixed(2)}</b></span>
        <span>HP: 0.00</span>
        <span>LP: 0.00</span>
        <span>CR: <b>{crPr.toFixed(2)}</b></span>
        <span>CB: <b>{(lp*1.03).toFixed(2)}</b></span>
        <span>CL: {bv.l}</span>
      </div>
      {/* Controls */}
      <div className="ctrl">
        <div className="pg">{BVS.map((b,i)=><button key={b.l} className={`pb ${bi===i?'oc':''}`} onClick={()=>setBi(i)}>{b.l}</button>)}</div>
        <div className="sep"/>
        <div className="pg"><button className={`pb ${mt==='close'?'op':''}`} onClick={()=>setMt('close')}>CL</button><button className={`pb ${mt==='hl'?'op':''}`} onClick={()=>setMt('hl')}>HL</button></div>
        <div className="sep"/>
        <span className="stag">Slot {bv.sl}</span>
        <div style={{marginLeft:'auto',font:'400 9px var(--fm)',color:'var(--t3)'}}>
          {sigs.filter(s=>s.fr).length} fresh signals · {cols.length} cols · {sigs.filter(s=>!s.isLabel).length} patterns
        </div>
      </div>

      {/* Chart */}
      <div className="chart-area" ref={chartRef}>
        <PnFChart cols={cols} sigs={sigs} ma={ma} w={chartW||800} h={chartH||400} sym={sel.s} patVis={patVis} toolVis={toolVis}/>
      </div>

      {/* DSmart Oscillator */}
      <div className="dsmart">
        <DSmartCanvas cols={cols} w={chartW||800} h={80}/>
      </div>
    </div>

    {/* ═══ RIGHT: WATCHLIST ═══ */}
    <div className="right-p">
      <div className="wl-hdr">
        <span>WATCHLIST</span>
        <span style={{font:'400 9px var(--fm)'}}>PnF ({bv.l})</span>
      </div>
      {wlData.map(st=>(
        <div key={st.s} className={`wl-item ${sel.s===st.s?'sel':''}`} onClick={()=>setSel(st)}>
          <div className="wl-icon">{st.s.slice(0,2)}</div>
          <div className="wl-info">
            <div className="wl-name">{st.s}</div>
            <div className="wl-exch">{st.x}</div>
          </div>
          <div className="wl-price">
            <div className="wl-pr" style={{color:st.sc>0?CL.g:st.sc<0?CL.r:'var(--t2)'}}>{st.pr.toFixed(2)}</div>
            <div className="wl-ch" style={{color:st.sc>0?CL.g:st.sc<0?CL.r:'var(--t3)'}}>{st.pr.toFixed(2)} ({st.sc>0?'+':''}{st.sc})</div>
          </div>
        </div>
      ))}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
