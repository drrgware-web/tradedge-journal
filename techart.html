function genDemo(sy,dy=300){
  const sd=sy.split('').reduce((a,c)=>a+c.charCodeAt(0),0);let r=sd;
  const rn=()=>{r=(r*16807)%2147483647;return r/2147483647};
  const b=80+rn()*3000,tr=rn()>.45?1:-1;const d=[];let p=b;

    d.push({d:new Date(2025,0,1+i).toISOString().slice(0,10),o:+(p-v*(rn()-.5)).toFixed(2),h:+(p+v*rn()).toFixed(2),l:+(p-v*rn()).toFixed(2),c:+(p+v*(rn()-.5)).toFixed(2)})}return d}

const FALLBACK_STOCKS=['RELIANCE','TCS','HDFCBANK','INFY','ICICIBANK','SBIN','BHARTIARTL','BAJFINANCE','TATAMOTORS','LT','MARUTI','SUNPHARMA','TITAN','AXISBANK','WIPRO','DRREDDY','KOTAKBANK','HINDUNILVR','ADANIENT','BAJAJFINSV'];

// ═══ P&F ENGINE ═══
function buildPnF(ohlc,bv,rv=3,lg=true,mt='close'){
  if(!ohlc||ohlc.length<2)return{cols:[],sigs:[],ma:[]};
  const cols=[];let cur=null,bp=ohlc[0].c||ohlc[0].close||100;
  const bs=p=>lg?p*bv/100:bv;
  const rnd=v=>Math.round(v*100)/100;
  const gp=(b,ct,ph)=>{
    const cl=b.c||b.close||0,hi=b.h||b.high||cl,lo=b.l||b.low||cl;
    if(mt==='close')return cl;
    return ct==='X'?(ph==='c'?hi:lo):(ph==='c'?lo:hi);};

  for(let i=1;i<ohlc.length;i++){
    const b=ohlc[i],s=bs(bp);if(s<=0)continue;
    if(!cur){const p=b.c||b.close;
      if(p>=bp+s){cur={t:'X',b:[]};let q=bp;while(q+s<=p){q+=s;cur.b.push(rnd(q))}if(cur.b.length){bp=cur.b[cur.b.length-1];cols.push(cur)}else cur=null}
      else if(p<=bp-s){cur={t:'O',b:[]};let q=bp;while(q-s>=p){q-=s;cur.b.push(rnd(q))}if(cur.b.length){bp=cur.b[cur.b.length-1];cols.push(cur)}else cur=null}continue}
    const cp=gp(b,cur.t,'c'),rp=gp(b,cur.t,'r');
    if(cur.t==='X'){if(cp>=bp+s){let q=bp;while(q+s<=cp){q+=s;cur.b.push(rnd(q))}bp=cur.b[cur.b.length-1]}else if(rp<=bp-s*rv){const nc={t:'O',b:[]};let q=bp;while(q-s>=rp){q-=s;nc.b.push(rnd(q))}if(nc.b.length>=rv){bp=nc.b[nc.b.length-1];cur=nc;cols.push(cur)}}}
    else{if(cp<=bp-s){let q=bp;while(q-s>=cp){q-=s;cur.b.push(rnd(q))}bp=cur.b[cur.b.length-1]}else if(rp>=bp+s*rv){const nc={t:'X',b:[]};let q=bp;while(q+s<=rp){q+=s;nc.b.push(rnd(q))}if(nc.b.length>=rv){bp=nc.b[nc.b.length-1];cur=nc;cols.push(cur)}}}}

  // Detect anchor columns
  const lens=cols.map(c=>c.b.length);const med=lens.slice().sort((a,b)=>a-b)[Math.floor(lens.length/2)]||3;
  cols.forEach(c=>{c.ac=c.b.length>=med*1.5});

  const sigs=detect(cols);
  // 10-col SMA
  const mids=cols.map(c=>(Math.max(...c.b)+Math.min(...c.b))/2);
  const ma=mids.map((_,i)=>{if(i<9)return null;let s=0;for(let j=i-9;j<=i;j++)s+=mids[j];return s/10});
  return{cols,sigs,ma};
}

function detect(cols){
  const S=[];if(cols.length<3)return S;
  const H=c=>Math.max(...c.b),L=c=>Math.min(...c.b),M=c=>(H(c)+L(c))/2;
  for(let i=2;i<cols.length;i++){
    const c0=cols[i],c1=cols[i-1],c2=cols[i-2];
    if(c0.t==='X'&&H(c0)>H(c2))S.push({tp:'DTB',lb:'Double Top Buy',ab:'DTB',ci:i,pr:H(c2),bu:true});
    if(c0.t==='O'&&L(c0)<L(c2))S.push({tp:'DBS',lb:'Double Bottom Sell',ab:'DBS',ci:i,pr:L(c2),bu:false});
    if(i>=4){const c4=cols[i-4];
      if(c0.t==='X'&&c2.t==='X'&&c4.t==='X'&&Math.abs(H(c2)-H(c4))/H(c4)<.015&&H(c0)>H(c2))S.push({tp:'TT',lb:'Triple Top Buy',ab:'TT',ci:i,pr:H(c2),bu:true});
      if(c0.t==='O'&&c2.t==='O'&&c4.t==='O'&&Math.abs(L(c2)-L(c4))/L(c4)<.015&&L(c0)<L(c2))S.push({tp:'TB',lb:'Triple Bottom Sell',ab:'TB',ci:i,pr:L(c2),bu:false});}
    if(i>=3){
      if(c0.t==='O'&&c1.t==='X'&&H(c1)>H(cols[i-3])&&L(c0)<L(c2))S.push({tp:'BuT',lb:'Bull Trap',ab:'BuT',ci:i,pr:L(c0),bu:false});
      if(c0.t==='X'&&c1.t==='O'&&L(c1)<L(cols[i-3])&&H(c0)>H(c2))S.push({tp:'BrT',lb:'Bear Trap',ab:'BrT',ci:i,pr:H(c0),bu:true});}
    if(c0.t==='O'&&c1.t==='X'&&c1.b.length>=8&&(i>=3?H(c1)>H(cols[i-3]):true)&&L(c0)<M(c1))S.push({tp:'HP',lb:'High Pole',ab:'HP',ci:i,pr:M(c1),bu:false});
    if(c0.t==='X'&&c1.t==='O'&&c1.b.length>=8&&(i>=3?L(c1)<L(cols[i-3]):true)&&H(c0)>M(c1))S.push({tp:'LP',lb:'Low Pole',ab:'LP',ci:i,pr:M(c1),bu:true});
    if(i>=3){const c3=cols[i-3];if(H(c1)<H(c2)&&L(c1)>L(c2)&&H(c2)<H(c3)&&L(c2)>L(c3))S.push({tp:'TRI',lb:'Triangle',ab:'△',ci:i,pr:M(c1),bu:null});}
    // Anchor column labels
    if(cols[i].ac)S.push({tp:cols[i].t==='X'?'AC+':'AC-',lb:cols[i].t==='X'?'Anchor Col +':'Anchor Col -',ab:cols[i].t==='X'?'AC+':'AC-',ci:i,pr:M(cols[i]),bu:cols[i].t==='X'?true:false,isL:true});
  }
  let ld=null;S.forEach(s=>{if(s.bu===null||s.isL){s.fr=false;return}const d=s.bu?'B':'S';s.fr=d!==ld;if(s.fr)ld=d});return S;
}

function mxSc(co,si){if(co.length<2)return 0;const l=co[co.length-1],s=si.filter(x=>x.bu!==null&&!x.isL).slice(-1)[0];if(!s)return 0;if(s.bu&&l.t==='X')return 2;if(s.bu&&l.t==='O')return 1;if(!s.bu&&l.t==='O')return-2;if(!s.bu&&l.t==='X')return-1;return 0}

];

const BVS=[{l:'0.25%',v:.25,s:1},{l:'0.50%',v:.5,s:1},{l:'1%',v:1,s:2},{l:'1.5%',v:1.5,s:2},{l:'3%',v:3,s:3},{l:'5%',v:5,s:4}];

// ═══ CANVAS — DEFINEDGE STYLE ═══
function PnFC({cols,sigs,ma,w,h,sym,pv,tv,zoom}){
  const ref=useRef(null);
  useEffect(()=>{
    const cv=ref.current;if(!cv||!cols.length)return;
    const ctx=cv.getContext('2d');const dp=window.devicePixelRatio||1;
    const cW=Math.max(w,cols.length*(10+zoom*3)+80);
    cv.width=cW*dp;cv.height=h*dp;cv.style.width=cW+'px';ctx.scale(dp,dp);
    ctx.fillStyle='#060810';ctx.fillRect(0,0,cW,h);

    let ap=[];cols.forEach(c=>ap.push(...c.b));if(!ap.length)return;
    const mn=Math.min(...ap),mx=Math.max(...ap),rg=mx-mn||1;
    const P={t:10,b:10,l:10,r:56};
    const cw2=cW-P.l-P.r,ch=h-P.t-P.b;
    const colW=Math.max(8,Math.min(24,(10+zoom*3)));
    const xo=ci=>P.l+ci*colW+colW/2;
    const yo=pr=>P.t+ch-((pr-mn)/rg)*ch;
    const boxSz=Math.max(5,colW*.65);

    // Column backgrounds
    cols.forEach((col,ci)=>{
      const x=xo(ci)-colW/2;const hi=yo(Math.max(...col.b))-3,lo=yo(Math.min(...col.b))+3;
      const g=ctx.createLinearGradient(x,hi,x,lo);
      if(col.t==='X'){g.addColorStop(0,col.ac?'rgba(0,200,83,.14)':'rgba(0,200,83,.04)');g.addColorStop(1,col.ac?'rgba(0,200,83,.06)':'rgba(0,200,83,.015)')}
      else{g.addColorStop(0,col.ac?'rgba(255,61,90,.12)':'rgba(255,61,90,.03)');g.addColorStop(1,col.ac?'rgba(255,61,90,.05)':'rgba(255,61,90,.01)')}
      ctx.fillStyle=g;ctx.fillRect(x,hi,colW,lo-hi);
    });

    // Grid
    ctx.strokeStyle='#151a25';ctx.lineWidth=.4;
    const gSteps=Math.min(15,Math.max(6,Math.ceil(rg/(cols[0]?.b[1]-cols[0]?.b[0]||1)/4)));
    for(let i=0;i<=gSteps;i++){const p=mn+rg/gSteps*i,y=yo(p);
      ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(cW-P.r,y);ctx.stroke();
      ctx.fillStyle='#3a4358';ctx.font='9px IBM Plex Mono';ctx.textAlign='left';
      ctx.fillText(p.toFixed(p>500?0:p>50?1:2),cW-P.r+4,y+3);}

    // Anchor lines
    if(tv.anc){const pf={};cols.forEach(c=>{[Math.max(...c.b),Math.min(...c.b)].forEach(p=>{const k=Math.round(p*10)/10;pf[k]=(pf[k]||0)+1})});
      const aLvl=Object.entries(pf).filter(([,n])=>n>=3).map(([p])=>+p).slice(0,8);
      ctx.setLineDash([6,4]);ctx.lineWidth=1;ctx.strokeStyle='rgba(0,230,118,.3)';
      aLvl.forEach(p=>{const y=yo(p);ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(cW-P.r,y);ctx.stroke()});ctx.setLineDash([])}

    // 45° lines
    if(tv.t45){const sL=[],sH=[];
      cols.forEach((c,i)=>{if(i>0&&i<cols.length-1){const lo=Math.min(...c.b),hi=Math.max(...c.b);
        if(lo<=Math.min(...cols[i-1].b)&&(i+1>=cols.length||lo<=Math.min(...cols[i+1].b)))sL.push({ci:i,pr:lo});
        if(hi>=Math.max(...cols[i-1].b)&&(i+1>=cols.length||hi>=Math.max(...cols[i+1].b)))sH.push({ci:i,pr:hi})}});
      ctx.setLineDash([4,3]);ctx.lineWidth=.8;
      sL.slice(-3).forEach(sl=>{ctx.strokeStyle='rgba(255,179,0,.25)';ctx.beginPath();const bxS=rg/ch*colW;
        ctx.moveTo(xo(sl.ci),yo(sl.pr));ctx.lineTo(xo(cols.length-1),yo(Math.min(sl.pr+bxS*(cols.length-1-sl.ci),mx)));ctx.stroke()});
      sH.slice(-3).forEach(sh=>{ctx.strokeStyle='rgba(255,61,90,.2)';ctx.beginPath();const bxS=rg/ch*colW;
        ctx.moveTo(xo(sh.ci),yo(sh.pr));ctx.lineTo(xo(cols.length-1),yo(Math.max(sh.pr-bxS*(cols.length-1-sh.ci),mn)));ctx.stroke()});
      ctx.setLineDash([])}

    // MA
    if(tv.ma&&ma){ctx.strokeStyle='rgba(150,150,180,.45)';ctx.lineWidth=1.5;ctx.beginPath();let st=false;
      ma.forEach((v,i)=>{if(v===null)return;const x=xo(i),y=yo(v);if(!st){ctx.moveTo(x,y);st=true}else ctx.lineTo(x,y)});ctx.stroke()}

    // X and O — BIGGER marks
    cols.forEach((col,ci)=>{const x=xo(ci);
      col.b.forEach(bp=>{const y=yo(bp);
        if(col.t==='X'){ctx.strokeStyle='#00e676';ctx.lineWidth=Math.max(1.5,boxSz/5);const h2=boxSz/2;
          ctx.beginPath();ctx.moveTo(x-h2,y-h2);ctx.lineTo(x+h2,y+h2);ctx.moveTo(x+h2,y-h2);ctx.lineTo(x-h2,y+h2);ctx.stroke()}
        else{ctx.strokeStyle='#ff3d5a';ctx.lineWidth=Math.max(1.5,boxSz/5);
          ctx.beginPath();ctx.arc(x,y,boxSz/2,0,Math.PI*2);ctx.stroke()}})});

    // Pattern labels — positioned OUTSIDE columns (above for bull, below for bear)
    const usedY={};// track label positions to avoid overlap
    sigs.forEach(s=>{
      if(s.ci>=cols.length||!pv[s.tp])return;
      const x=xo(s.ci),col=cols[s.ci];
      const isUp=s.bu===true||s.tp==='AC+';
      let ly=isUp?yo(Math.max(...col.b))-16:yo(Math.min(...col.b))+16;
      // Anti-overlap
      const key=Math.round(x/colW)+'_'+Math.round(ly/20);
      if(usedY[key])ly+=isUp?-18:18;usedY[key]=true;

      const txt=s.ab;ctx.font='bold 8px IBM Plex Mono';const tw=ctx.measureText(txt).width;
      const bg=s.tp==='AC+'?'rgba(0,200,83,.9)':s.tp==='AC-'?'rgba(255,145,0,.9)':s.bu===true?'rgba(0,200,83,.8)':s.bu===false?'rgba(255,61,90,.8)':'rgba(255,179,0,.8)';
      ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(x-tw/2-4,ly-7,tw+8,14,3);ctx.fill();
      ctx.fillStyle=(s.tp==='AC+'||s.tp==='AC-')?'#000':'#fff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(txt,x,ly);
      // Fresh arrow
      if(s.fr&&!s.isL){ctx.fillStyle=isUp?'#00e676':'#ff3d5a';ctx.globalAlpha=.85;const ay=isUp?ly-14:ly+14;
        ctx.beginPath();if(isUp){ctx.moveTo(x,ay);ctx.lineTo(x+4,ay+6);ctx.lineTo(x-4,ay+6)}else{ctx.moveTo(x,ay);ctx.lineTo(x+4,ay-6);ctx.lineTo(x-4,ay-6)}ctx.fill();ctx.globalAlpha=1}
    });

    // Vertical count target
    if(tv.vc){const fs=sigs.filter(s=>s.fr&&!s.isL);const lf=fs[fs.length-1];
      if(lf){const col=cols[lf.ci];const n=col.b.length;const bStep=col.b.length>1?Math.abs(col.b[1]-col.b[0]):1;
        const tgt=lf.bu?Math.max(...col.b)+n*bStep:Math.min(...col.b)-n*bStep;
        if(tgt>mn*.9&&tgt<mx*1.2){ctx.setLineDash([8,4]);ctx.strokeStyle=lf.bu?'rgba(0,230,118,.25)':'rgba(255,61,90,.25)';ctx.lineWidth=1;
          const y=yo(Math.max(mn,Math.min(mx*1.1,tgt)));ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(cW-P.r,y);ctx.stroke();ctx.setLineDash([]);
          ctx.fillStyle=lf.bu?'#00e676':'#ff3d5a';ctx.font='8px IBM Plex Mono';ctx.textAlign='left';ctx.fillText(`VC:${tgt.toFixed(1)}`,cW-P.r+4,y-4)}}}

    // Current price tag (cyan)
    const lCol=cols[cols.length-1];const lPr=lCol.t==='X'?Math.max(...lCol.b):Math.min(...lCol.b);const lpY=yo(lPr);
    ctx.setLineDash([3,3]);ctx.strokeStyle='rgba(234,238,246,.15)';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(P.l,lpY);ctx.lineTo(cW-P.r,lpY);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='rgba(24,214,224,.9)';ctx.beginPath();ctx.roundRect(cW-P.r+1,lpY-8,P.r-4,16,3);ctx.fill();
    ctx.fillStyle='#000';ctx.font='bold 8px IBM Plex Mono';ctx.textAlign='center';ctx.fillText(lPr.toFixed(2),cW-P.r+(P.r-4)/2+1,lpY+3);
  },[cols,sigs,ma,w,h,sym,pv,tv,zoom]);
  return <canvas ref={ref} style={{height:h,display:'block'}}/>;
}

// DSmart
function DSm({cols,w,h}){
  const ref=useRef(null);
  useEffect(()=>{const cv=ref.current;if(!cv||cols.length<5)return;const ctx=cv.getContext('2d');const dp=window.devicePixelRatio||1;
    cv.width=w*dp;cv.height=h*dp;cv.style.width=w+'px';ctx.scale(dp,dp);ctx.fillStyle='#060810';ctx.fillRect(0,0,w,h);
    const win=20;const vals=[];for(let i=0;i<cols.length;i++){const st=Math.max(0,i-win+1);let xc=0;for(let j=st;j<=i;j++)if(cols[j].t==='X')xc++;vals.push(xc/(i-st+1)*100)}
    const P={t:4,b:4,l:56,r:56};const cw=w-P.l-P.r,ch=h-P.t-P.b;const cW2=cw/cols.length;
    ctx.fillStyle='rgba(0,230,118,.03)';ctx.fillRect(P.l,P.t,cw,ch*.4);ctx.fillStyle='rgba(255,61,90,.03)';ctx.fillRect(P.l,P.t+ch*.6,cw,ch*.4);
    ctx.setLineDash([4,4]);ctx.lineWidth=.5;
    const y60=P.t+ch*(1-60/100),y20=P.t+ch*(1-20/100);
    ctx.strokeStyle='rgba(0,230,118,.2)';ctx.beginPath();ctx.moveTo(P.l,y60);ctx.lineTo(w-P.r,y60);ctx.stroke();
    ctx.strokeStyle='rgba(255,61,90,.2)';ctx.beginPath();ctx.moveTo(P.l,y20);ctx.lineTo(w-P.r,y20);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#3a4358';ctx.font='8px IBM Plex Mono';ctx.textAlign='right';ctx.fillText('60',P.l-4,y60+3);ctx.fillText('20',P.l-4,y20+3);ctx.fillText('DSmart',P.l-4,P.t+ch/2+3);
    ctx.strokeStyle='#18d6e0';ctx.lineWidth=1.5;ctx.beginPath();
    vals.forEach((v,i)=>{const x=P.l+i*cW2+cW2/2,y=P.t+ch*(1-v/100);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});ctx.stroke();
    const cv2=vals[vals.length-1];ctx.fillStyle=cv2>60?'#00e676':cv2<20?'#ff3d5a':'#18d6e0';ctx.font='bold 9px IBM Plex Mono';ctx.textAlign='left';
    ctx.fillText(`${cv2.toFixed(0)}%`,w-P.r+4,P.t+ch*(1-cv2/100)+3);
  },[cols,w,h]);return <canvas ref={ref} style={{height:h,display:'block'}}/>;
}

// ═══ EDGECLOUD INDICATORS ═══
function calcEMA(data,period){const k=2/(period+1);const out=[];let prev=null;for(const v of data){if(v==null){out.push(prev);continue}prev=prev==null?v:v*k+prev*(1-k);out.push(prev)}return out}
function calcSMA(data,period){const out=[];let sum=0;for(let i=0;i<data.length;i++){sum+=data[i]||0;if(i>=period)sum-=data[i-period]||0;out.push(i>=period-1?sum/period:null)}return out}

function calcATR(ohlc,period){
  const tr=[];for(let i=0;i<ohlc.length;i++){const d=ohlc[i];const h=d.high,l=d.low,pc=i>0?ohlc[i-1].close:l;tr.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)))}
  const out=[];let sum=0;for(let i=0;i<tr.length;i++){sum+=tr[i];if(i>=period){sum-=tr[i-period];out.push(sum/period)}else if(i===period-1){out.push(sum/period)}else{out.push(null)}}
  return out;
}

function calcSuperTrend(ohlc,period,mult){
  const len=ohlc.length;const st=new Array(len).fill(null);const dir=new Array(len).fill(1);
  const atr=calcATR(ohlc,period);
  let prevUp=0,prevDn=0,prevDir=1;
  for(let i=0;i<len;i++){
    if(atr[i]==null){st[i]=null;continue}
    const d=ohlc[i];const mid=(d.high+d.low)/2;let up=mid-mult*atr[i];let dn=mid+mult*atr[i];
    if(prevUp>0)up=Math.max(up,prevUp);if(prevDn>0)dn=Math.min(dn,prevDn);
    const d2=d.close>prevDn?1:d.close<prevUp?-1:prevDir;
    st[i]=d2===1?up:dn;dir[i]=d2;prevUp=up;prevDn=dn;prevDir=d2;
  }
  return{values:st,direction:dir};
}

function calcEdgeCloud(ohlc){
  const st1=calcSuperTrend(ohlc,10,2);const st2=calcSuperTrend(ohlc,10,3);
  const walking=st1.values.map((v,i)=>(v!=null&&st2.values[i]!=null)?(v+st2.values[i])/2:null);
  const walkDir=st1.direction.map((v,i)=>(v===1&&st2.direction[i]===1)?1:(v===-1&&st2.direction[i]===-1)?-1:v);
  const closes=ohlc.map(d=>d.close);
  const running=calcEMA(closes,21);
  return{walking,walkDir,running};
}

function calcRSI(closes,period){
  const out=new Array(closes.length).fill(null);let avgG=0,avgL=0;
  for(let i=1;i<closes.length;i++){
    const d=closes[i]-closes[i-1];const g=d>0?d:0;const l=d<0?-d:0;
    if(i<=period){avgG+=g/period;avgL+=l/period;if(i===period)out[i]=avgL===0?100:100-100/(1+avgG/avgL)}
    else{avgG=(avgG*(period-1)+g)/period;avgL=(avgL*(period-1)+l)/period;out[i]=avgL===0?100:100-100/(1+avgG/avgL)}
  }
  return out;
}

function calcBollingerWidth(closes,period){
  const sma=calcSMA(closes,period);
  const out=[];
  for(let i=0;i<closes.length;i++){
    if(sma[i]==null||i<period-1){out.push(null);continue}
    let s2=0;for(let j=i-period+1;j<=i;j++){const d=closes[j]-sma[i];s2+=d*d}
    const std=Math.sqrt(s2/period);const upper=sma[i]+2*std;const lower=sma[i]-2*std;
    out.push(sma[i]>0?(upper-lower)/sma[i]*100:0);
  }
  return out;
}

function calcADX(ohlc,period){
  const len=ohlc.length;const adx=new Array(len).fill(null);const diP=new Array(len).fill(null);const diM=new Array(len).fill(null);
  const atr=calcATR(ohlc,period);
  const dmP=[0],dmM=[0];
  for(let i=1;i<len;i++){const upM=ohlc[i].high-ohlc[i-1].high;const dnM=ohlc[i-1].low-ohlc[i].low;dmP.push(upM>dnM&&upM>0?upM:0);dmM.push(dnM>upM&&dnM>0?dnM:0)}
  const smDmP=calcEMA(dmP,period);const smDmM=calcEMA(dmM,period);const smAtr=calcEMA(atr.map(v=>v||0),period);
  const dx=[];
  for(let i=0;i<len;i++){
    if(smAtr[i]==null||smAtr[i]===0){dx.push(null);continue}
    const dp=smDmP[i]/smAtr[i]*100;const dm=smDmM[i]/smAtr[i]*100;
    diP[i]=dp;diM[i]=dm;const s=dp+dm;dx.push(s===0?0:Math.abs(dp-dm)/s*100);
  }
  const adxLine=calcEMA(dx.map(v=>v||0),period);
  for(let i=0;i<len;i++)adx[i]=adxLine[i];
  return{adx,diP,diM};
}

function calcFusionState(bbw,rsi,adx,diP,diM,adxRising){
  if(bbw==null||rsi==null||adx==null)return{state:'DRIFT',color:'#616161'};
  if(bbw<10&&rsi>55&&adxRising)return{state:'IGNITION',color:'#FFD700'};
  if(bbw>=10&&rsi>55&&adx>25&&diP>diM)return{state:'THRUST',color:'#00E676'};
  if(bbw>=10&&rsi<45&&adx>25&&diM>diP)return{state:'FADE',color:'#FF5252'};
  if(bbw<10&&adx<20)return{state:'COIL',color:'#B388FF'};
  return{state:'DRIFT',color:'#616161'};
}

const FUSION_COLORS={IGNITION:'#FFD700',THRUST:'#00E676',FADE:'#FF5252',COIL:'#B388FF',DRIFT:'#616161'};
const FUSION_CLOUD={IGNITION:'rgba(255,215,0,0.18)',THRUST:'rgba(0,230,118,0.15)',FADE:'rgba(255,82,82,0.15)',COIL:'rgba(179,136,255,0.12)',DRIFT:'rgba(97,97,97,0.10)'};
const FUSION_BG={IGNITION:'rgba(255,215,0,0.06)',THRUST:'rgba(0,230,118,0.05)',FADE:'rgba(255,82,82,0.05)',COIL:'rgba(179,136,255,0.04)',DRIFT:'rgba(97,97,97,0.03)'};
const FUSION_DESC={IGNITION:'Tight BB + momentum building — squeeze fire',THRUST:'Strong trend confirmed — ride the move',FADE:'Bearish pressure dominant — caution',COIL:'Low vol + low trend — spring loading',DRIFT:'No clear edge — range-bound'};

function calcAllFusionStates(ohlc){
  const closes=ohlc.map(d=>d.close);
  const bbw=calcBollingerWidth(closes,20);
  const rsi=calcRSI(closes,14);
  const{adx,diP,diM}=calcADX(ohlc,14);
  const states=[];
  for(let i=0;i<ohlc.length;i++){
    const adxRising=i>=3&&adx[i]!=null&&adx[i-3]!=null&&adx[i]>adx[i-3];
    states.push({...calcFusionState(bbw[i],rsi[i],adx[i],diP[i],diM[i],adxRising),bbw:bbw[i],rsi:rsi[i],adx:adx[i],diP:diP[i],diM:diM[i]});
  }
  return states;
}

// ═══ LW CHART COMPONENT (Bar + Line + EdgeCloud + Fusion) ═══
function LWChart({symbol,w,h,mode,isDark}){
  const containerRef=useRef(null);const chartObjRef=useRef(null);
  const[loading,setLoading]=useState(false);const[err,setErr]=useState(null);
  const[range,setRange]=useState('6mo');
  const[fusion,setFusion]=useState(null);

  const fetchAndRender=useCallback(async(rng)=>{
    if(!symbol||!containerRef.current)return;
    const wUrl=localStorage.getItem('zd_worker_url');
    if(!wUrl){setErr('Set zd_worker_url in localStorage');return}
    setLoading(true);setErr(null);
    if(chartObjRef.current){chartObjRef.current.remove();chartObjRef.current=null}
    containerRef.current.innerHTML='';
    try{
      const res=await fetch(wUrl,{method:'POST',headers:{'Content-Type':'application/json','X-Kite-Action':'yahoo-proxy'},body:JSON.stringify({ticker:`${symbol}.NS`,range:rng,interval:'1d'})});
      if(!res.ok)throw new Error('HTTP '+res.status);
      const data=await res.json();
      const result=data?.chart?.result?.[0];if(!result)throw new Error('No data');
      const ts=result.timestamp||[];const q=result.indicators?.quote?.[0]||{};
      const ohlc=[];
      for(let i=0;i<ts.length;i++){
        if(q.close[i]==null)continue;
        ohlc.push({time:ts[i],open:q.open[i]||q.close[i],high:q.high[i]||q.close[i],low:q.low[i]||q.close[i],close:q.close[i],volume:q.volume?.[i]||0});
      }
      if(!ohlc.length)throw new Error('Empty OHLCV');

      const dk=isDark!==false;
      const bgCol=dk?'#0d1117':'#ffffff';
      const gridCol=dk?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.06)';
      const txtCol=dk?'#888':'#666';
      const crossBg=dk?'#1a2030':'#e8e8e8';

      const chart=LightweightCharts.createChart(containerRef.current,{
        width:w||800,height:h||400,
        layout:{background:{color:bgCol},textColor:txtCol,fontFamily:'IBM Plex Mono'},
        grid:{vertLines:{color:gridCol},horzLines:{color:gridCol}},
        crosshair:{mode:0,vertLine:{color:dk?'rgba(255,255,255,0.15)':'rgba(0,0,0,0.15)',labelBackgroundColor:crossBg},horzLine:{color:dk?'rgba(255,255,255,0.15)':'rgba(0,0,0,0.15)',labelBackgroundColor:crossBg}},
        rightPriceScale:{borderColor:gridCol},
        timeScale:{borderColor:gridCol,timeVisible:false},
      });
      chartObjRef.current=chart;

      // Main series
      let mainSeries;
      if(mode==='line'){
        mainSeries=chart.addAreaSeries({topColor:dk?'rgba(66,165,245,0.15)':'rgba(66,165,245,0.2)',bottomColor:'transparent',lineColor:'#42A5F5',lineWidth:2,crosshairMarkerRadius:4});
        mainSeries.setData(ohlc.map(d=>({time:d.time,value:d.close})));
      }else{
        mainSeries=chart.addCandlestickSeries({upColor:'#26A69A',downColor:'#EF5350',borderUpColor:'#26A69A',borderDownColor:'#EF5350',wickUpColor:'#26A69Aaa',wickDownColor:'#EF5350aa'});
        mainSeries.setData(ohlc.map(d=>({time:d.time,open:d.open,high:d.high,low:d.low,close:d.close})));
      }

      // Volume
      const vs=chart.addHistogramSeries({priceFormat:{type:'volume'},priceScaleId:'vol',color:'#26A69A'});
      vs.priceScale().applyOptions({scaleMargins:{top:0.8,bottom:0}});
      vs.setData(ohlc.map(d=>({time:d.time,value:d.volume,color:d.close>=d.open?(dk?'rgba(38,166,154,0.35)':'rgba(38,166,154,0.5)'):(dk?'rgba(239,83,80,0.35)':'rgba(239,83,80,0.5)')})));

      // EdgeCloud lines
      const{walking,walkDir,running}=calcEdgeCloud(ohlc);
      const wkSeries=chart.addLineSeries({lineWidth:2,lineStyle:LightweightCharts.LineStyle.Dashed,lastValueVisible:false,priceLineVisible:false,color:'#FFA000'});
      const wkD=[];for(let i=0;i<ohlc.length;i++){if(walking[i]!=null)wkD.push({time:ohlc[i].time,value:walking[i]})}
      wkSeries.setData(wkD);

      const rnSeries=chart.addLineSeries({color:'#42A5F5',lineWidth:2,lineStyle:LightweightCharts.LineStyle.Solid,lastValueVisible:false,priceLineVisible:false});
      const rnD=[];for(let i=0;i<ohlc.length;i++){if(running[i]!=null)rnD.push({time:ohlc[i].time,value:running[i]})}
      rnSeries.setData(rnD);

      // ── Fusion states per bar ──

      // Cloud fill colored by fusion state — use background tint histogram
      const bgTint=chart.addHistogramSeries({priceFormat:{type:'price'},priceScaleId:'bgtint',color:'#616161',base:0,lastValueVisible:false,priceLineVisible:false});
      bgTint.priceScale().applyOptions({scaleMargins:{top:0,bottom:0},visible:false});

      const cloudLower=chart.addAreaSeries({lastValueVisible:false,priceLineVisible:false,crosshairMarkerVisible:false,lineColor:'transparent',topColor:'transparent',bottomColor:'transparent'});
      const cUpD=[];const cDnD=[];
      for(let i=0;i<ohlc.length;i++){
        if(walking[i]==null||running[i]==null)continue;
        const t=ohlc[i].time;const st=fusionStates[i]?.state||'DRIFT';
        const col=FUSION_CLOUD[st];
        cUpD.push({time:t,value:Math.max(walking[i],running[i])});
        cDnD.push({time:t,value:Math.min(walking[i],running[i])});
      }
      cloudUpper.setData(cUpD);cloudLower.setData(cDnD);
      // Apply fusion-state coloring via per-bar area — use multiple area overlays by state
      const stateGroups={};
      for(let i=0;i<ohlc.length;i++){
        if(walking[i]==null||running[i]==null)continue;
        const st=fusionStates[i]?.state||'DRIFT';
        if(!stateGroups[st])stateGroups[st]=[];
        stateGroups[st].push({time:ohlc[i].time,top:Math.max(walking[i],running[i]),bot:Math.min(walking[i],running[i])});
      }
      for(const[st,pts] of Object.entries(stateGroups)){
        const col=FUSION_CLOUD[st]||'rgba(97,97,97,0.10)';
        const s=chart.addAreaSeries({topColor:col,bottomColor:'transparent',lineColor:'transparent',lastValueVisible:false,priceLineVisible:false,crosshairMarkerVisible:false});
        s.setData(pts.map(p=>({time:p.time,value:p.top})));
      }

      // ── Signal markers for state transitions ──
      const markers=[];
      for(let i=1;i<fusionStates.length;i++){
        const prev=fusionStates[i-1].state;const cur=fusionStates[i].state;const t=ohlc[i].time;
        if(prev==='COIL'&&cur==='IGNITION')markers.push({time:t,position:'aboveBar',color:'#FFD700',shape:'circle',text:'IGN'});
        else if(prev==='IGNITION'&&cur==='THRUST')markers.push({time:t,position:'belowBar',color:'#00E676',shape:'arrowUp',text:'THR'});
        else if(prev==='THRUST'&&cur==='FADE')markers.push({time:t,position:'aboveBar',color:'#FF5252',shape:'arrowDown',text:'FADE'});
        else if(cur==='COIL'&&prev!=='COIL')markers.push({time:t,position:'belowBar',color:'#B388FF',shape:'square',text:'COIL'});
      }
      if(markers.length)mainSeries.setMarkers(markers);

      chart.timeScale().fitContent();

      // ── Build fusion data for panel ──
      const n=ohlc.length-1;const cur=fusionStates[n];
      const cloudBull=walking[n]!=null&&running[n]!=null?walking[n]>running[n]:null;
      const stripLen=Math.min(60,ohlc.length);
      const strip=fusionStates.slice(-stripLen);
      const bbwStrip=strip.map(s=>s.bbw);
      setFusion({...cur,cloudBull,strip,bbwStrip});
      setLoading(false);
    }catch(e){setErr(e.message);setLoading(false)}
  },[symbol,w,h,mode,isDark]);

  useEffect(()=>{fetchAndRender(range)},[fetchAndRender,range]);
  useEffect(()=>{if(chartObjRef.current&&w&&h)chartObjRef.current.resize(w,h)},[w,h]);

  const tfBtn=(label,val)=><button key={val} onClick={()=>setRange(val)} style={{padding:'2px 8px',fontSize:8,fontFamily:'var(--fm)',fontWeight:range===val?700:500,color:range===val?'#42A5F5':'var(--t3)',background:range===val?'rgba(66,165,245,.12)':'transparent',border:`1px solid ${range===val?'rgba(66,165,245,.3)':'var(--bdr)'}`,borderRadius:3,cursor:'pointer'}}>{label}</button>;

  const mCard=(label,val,color,sub)=><div style={{background:'var(--bg2)',border:'1px solid var(--bdr)',borderRadius:6,padding:'8px 10px',flex:1,minWidth:100}}>
    <div style={{font:'500 7px var(--fm)',color:'var(--t4)',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:2}}>{label}</div>
    <div style={{font:'700 16px var(--fm)',color:color||'var(--t1)'}}>{val}</div>

  </div>;

  const entryRow=(sig,state,action,color)=><tr style={{borderBottom:'1px solid var(--bdr)'}}>
    <td style={{padding:'3px 8px',font:'600 8px var(--fm)',color:'var(--t2)'}}>{sig}</td>
    <td style={{padding:'3px 8px'}}><span style={{font:'700 8px var(--fm)',color:FUSION_COLORS[state]}}>{state}</span></td>
    <td style={{padding:'3px 8px',font:'500 8px var(--fm)',color}}>{action}</td>
  </tr>;

  const exitRow=(transition,action,color)=><tr style={{borderBottom:'1px solid var(--bdr)'}}>
    <td style={{padding:'3px 8px',font:'600 8px var(--fm)',color:'var(--t2)'}}>{transition}</td>
    <td style={{padding:'3px 8px',font:'500 8px var(--fm)',color}}>{action}</td>
  </tr>;

  if(err)return<div style={{padding:40,textAlign:'center',color:'#ff3d5a',font:'500 11px var(--fm)'}}>{err}</div>;
  return<div>
    <div style={{position:'relative'}}>
      {loading&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',zIndex:5,background:'rgba(13,17,23,.85)'}}><div style={{width:30,height:30,border:'3px solid rgba(66,165,245,.15)',borderTop:'3px solid #42A5F5',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/></div>}
      <div ref={containerRef} style={{width:'100%',height:h||400}}/>
      <div style={{position:'absolute',top:6,left:8,display:'flex',gap:6,alignItems:'center',zIndex:2}}>
        <div style={{display:'flex',gap:3}}>{[['1M','1mo'],['3M','3mo'],['6M','6mo'],['1Y','1y']].map(([l,v])=>tfBtn(l,v))}</div>
        <div style={{width:1,height:12,background:'var(--bdr)',margin:'0 2px'}}/>
        <span style={{font:'600 7px var(--fm)',color:'#FFA000'}}>╌ Walking</span>
        <span style={{font:'600 7px var(--fm)',color:'#42A5F5'}}>— Running</span>
        <span style={{font:'600 7px var(--fm)',color:'rgba(38,166,154,.6)'}}>■ Cloud</span>
      </div>
    </div>

    {fusion&&<div style={{padding:'6px 0'}}>
      {/* Metric cards */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:6}}>
        {mCard('BB Width',fusion.bbw!=null?fusion.bbw.toFixed(1)+'%':'—',fusion.bbw!=null&&fusion.bbw<10?'#B388FF':'var(--t1)',fusion.bbw!=null&&fusion.bbw<10?'Squeeze active':'Normal')}
        {mCard('Adaptive RSI',fusion.rsi!=null?fusion.rsi.toFixed(1):'—',fusion.rsi!=null?(fusion.rsi>55?'#00E676':fusion.rsi<45?'#FF5252':'var(--t2)'):'var(--t3)',fusion.rsi!=null?(fusion.rsi>70?'Overbought zone':fusion.rsi>55?'Bullish zone':fusion.rsi<30?'Oversold zone':fusion.rsi<45?'Bearish zone':'Neutral zone'):'—')}
        {mCard('ADX (14)',fusion.adx!=null?fusion.adx.toFixed(1):'—',fusion.adx!=null&&fusion.adx>25?'#FFA000':'var(--t3)',(fusion.adx!=null?(fusion.adx>25?'Trending':'Ranging'):'')+' · DI+ '+(fusion.diP||0).toFixed(1)+' / DI- '+(fusion.diM||0).toFixed(1))}
        {mCard('Fusion State',fusion.state,fusion.color,FUSION_DESC[fusion.state]||'')}
      </div>

      {/* Fusion state strip */}
      <div style={{marginBottom:4}}>
        <div style={{font:'600 7px var(--fm)',color:'var(--t4)',letterSpacing:'.08em',marginBottom:2}}>FUSION STATE ({fusion.strip.length} bars)</div>
        <div style={{display:'flex',height:10,borderRadius:3,overflow:'hidden',border:'1px solid var(--bdr)'}}>

        <div style={{display:'flex',height:6,borderRadius:2,overflow:'hidden',border:'1px solid var(--bdr)'}}>
          {fusion.bbwStrip.map((v,i)=><div key={i} style={{flex:1,background:v!=null?(v<10?'#FFD700':v<15?'#B388FF':'#616161'):'#2a2a2a'}} title={v!=null?v.toFixed(1)+'%':'—'}/>)}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:2}}>
          {Object.entries(FUSION_COLORS).map(([k,c])=><span key={k} style={{font:'600 6px var(--fm)',color:c}}>{k}</span>)}

      {/* Current state + cloud */}

        <span style={{font:'400 8px var(--fm)',color:'var(--t3)'}}>{FUSION_DESC[fusion.state]}</span>
        <div style={{marginLeft:'auto',font:'600 8px var(--fm)',color:fusion.cloudBull?'#26A69A':'#EF5350'}}>{fusion.cloudBull?'☁ BULLISH CLOUD':'☁ BEARISH CLOUD'}</div>
      </div>

      {/* Entry Decision Matrix + Exit Layer */}
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        <div style={{flex:1,minWidth:220,background:'var(--bg2)',border:'1px solid var(--bdr)',borderRadius:6,padding:8}}>
          <div style={{font:'700 8px var(--fm)',color:'var(--t2)',letterSpacing:'.08em',marginBottom:4}}>ENTRY DECISION MATRIX</div>
          <table style={{width:'100%',borderCollapse:'collapse'}}><thead><tr style={{borderBottom:'1px solid var(--bdl)'}}>
            <th style={{padding:'3px 8px',font:'600 7px var(--fm)',color:'var(--t4)',textAlign:'left'}}>Signal</th>
            <th style={{padding:'3px 8px',font:'600 7px var(--fm)',color:'var(--t4)',textAlign:'left'}}>State</th>
            <th style={{padding:'3px 8px',font:'600 7px var(--fm)',color:'var(--t4)',textAlign:'left'}}>Action</th>
          </tr></thead><tbody>
            {entryRow('Star','IGNITION','Full position (P1)','#FFD700')}
            {entryRow('Star','THRUST','75% position','#00E676')}
            {entryRow('Pullback','THRUST','Add tranche (P2)','#00E676')}
            {entryRow('Pyramid','IGNITION','Aggressive add (P3)','#FFD700')}
            {entryRow('Star','COIL','Watchlist only','#B388FF')}
            {entryRow('Pullback','DRIFT','Skip','#616161')}
            {entryRow('Pyramid','FADE','Tighten SL','#FF5252')}
          </tbody></table>
        </div>
        <div style={{flex:1,minWidth:220,background:'var(--bg2)',border:'1px solid var(--bdr)',borderRadius:6,padding:8}}>
          <div style={{font:'700 8px var(--fm)',color:'var(--t2)',letterSpacing:'.08em',marginBottom:4}}>EXIT LAYER TABLE</div>
          <table style={{width:'100%',borderCollapse:'collapse'}}><thead><tr style={{borderBottom:'1px solid var(--bdl)'}}>
            <th style={{padding:'3px 8px',font:'600 7px var(--fm)',color:'var(--t4)',textAlign:'left'}}>Transition</th>
            <th style={{padding:'3px 8px',font:'600 7px var(--fm)',color:'var(--t4)',textAlign:'left'}}>Action</th>
          </tr></thead><tbody>
            {exitRow('THRUST','Trail EMA(21), let RUN ride','#00E676')}

            {exitRow('THRUST → FADE','Tighten to EMA(8), close T2/T3','#FF5252')}
            {exitRow('THRUST → DRIFT','Close RUN, book profits','#616161')}
            {exitRow('ANY → FADE','Hard exit all tranches','#FF5252')}
          </tbody></table>
        </div>
      </div>
    </div>}
  </div>;
}

      return{s,n:nm,x:'NSE',pr,sc}}).sort((a,b)=>b.sc-a.sc);
  },[isLive,liveData]);

      const o=isLive&&liveData&&liveData[s]?liveData[s].ohlc:genDemo(s);
      const sc={};let tot=0;[.25,1,3].forEach(v=>{const r=buildPnF(o,v,3,true,'close');const x=mxSc(r.cols,r.sigs);sc[v]=x;tot+=x});
      const pr=o.length?(o[o.length-1].c||o[o.length-1].close||0):0;

    const u=[t,...trd].slice(0,100);setTrd(u);lS(u);cP(u)},[trd,sel,lp,lastSig,bv]);

  if(!sel)return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:'var(--t3)'}}>Loading...</div>;

        {/* Deep links */}

              <div style={{display:'flex',justifyContent:'space-around'}}>
                {[['Bull',mxData.filter(x=>x.tot>0).length,'#00e676'],['Neut',mxData.filter(x=>x.tot===0).length,'#3a4358'],['Bear',mxData.filter(x=>x.tot<0).length,'#ff3d5a']].map(([l,n,c])=>
                  <div key={l} style={{textAlign:'center'}}><div style={{font:'900 22px var(--fu)',color:c}}>{n}</div><div style={{font:'500 8px var(--fm)',color:'var(--t4)'}}>{l}</div></div>)}
              </div>
              <div style={{font:'400 9px var(--fu)',color:'var(--t2)',marginTop:6,lineHeight:1.5}}>DT%: {dtPct}% · {+dtPct>60?'⚠ Overbought':+dtPct<20?'⚠ Oversold':'✓ Neutral zone'}</div>
            </div>
            <div className="bthc">
              <div style={{font:'600 8px var(--fm)',color:'var(--t4)',letterSpacing:'.08em',marginBottom:8}}>SLOTS</div>
              <div style={{font:'400 9px var(--fu)',color:'var(--t2)',lineHeight:1.7}}>
                <div><b style={{color:'#18d6e0'}}>S1</b> 0.25-1%: Combos, Follow-throughs</div>
                <div><b style={{color:'#a78bfa'}}>S2</b> 1-3%: Traps, Poles, Triple Tops</div>
                <div><b style={{color:'#ffb300'}}>S3</b> 3-5%: Multi-col breakouts</div>
                <div><b style={{color:'#00e676'}}>S4</b> 5%+: Col reversals, S/R</div>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>

    {/* RIGHT: WATCHLIST */}
    <div className="rp">
      <div className="wh"><span>WATCHLIST</span><span style={{font:'400 8px var(--fm)'}}>PnF ({bv.l})</span></div>
      {wlData.map(st=>(
        <div key={st.s} className={`wi ${sel.s===st.s?'sl':''}`} onClick={()=>{setSel(st);setTab('chart')}}>
          <div className="wic">{st.s.slice(0,2)}</div>
          <div className="wii">
            <div className="win">{st.s}</div>
            <div className="wie">{st.x}</div>
          </div>
          <div className="wip">
            <div style={{font:'600 10px var(--fm)',color:st.sc>0?'#00e676':st.sc<0?'#ff3d5a':'var(--t2)'}}>{st.pr.toFixed(2)}</div>
            <div style={{font:'400 8px var(--fm)',color:st.sc>0?'#00e676':st.sc<0?'#ff3d5a':'var(--t3)'}}>{st.pr.toFixed(2)} ({st.sc>0?'+':''}{st.sc})</div>
            <div className="dl">
              <a href={tvLink(st.s)} target="_blank" rel="noopener" title="TradingView">📈</a>
              <a href={rzLink(st.s)} target="_blank" rel="noopener" title="Definedge Zone">🔲</a>
            </div>
          </div>
        </div>
      ))}
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
