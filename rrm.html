<script>
// ═══════════════════════════════════════════════════════════════════════════
// RRM v6.0 — CORE STATE
// ═══════════════════════════════════════════════════════════════════════════
let DATA=null,IS_LIVE=false,MODE='sectors',TF='daily',HIGHLIGHT=null,DRILLDOWN=null,STOCK_LIMIT=10,BENCH=null;
let ANIM_PLAYING=false,ANIM_FRAME=0,ANIM_TIMER=null,TAIL_SLICE=null,FULLSCREEN=false,SIDEBAR_FILTER='';
let QUADRANT_FILTER='all';
let SELECTED_ITEMS=new Set();
let SELECT_ALL_MODE=true;

// v6: MTF conviction filter threshold
let MTF_MIN_CONVICTION=0; // 0 = show all, 50 = show only conviction >= 50

// ═══════════════════════════════════════════════════════════════════════════
// v6.0 ADVANCED METRICS ENGINE
// ═══════════════════════════════════════════════════════════════════════════

function calcVelocity(tail) {
  if (!tail || tail.length < 2) return 0;
  const prev = tail[tail.length - 2];
  const curr = tail[tail.length - 1];
  return Math.hypot(curr.rs_ratio - prev.rs_ratio, curr.rs_momentum - prev.rs_momentum);
}

function calcHeading(tail) {
  if (!tail || tail.length < 2) return 0;
  const prev = tail[tail.length - 2];
  const curr = tail[tail.length - 1];
  const deltaRatio = curr.rs_ratio - prev.rs_ratio;
  const deltaMomentum = curr.rs_momentum - prev.rs_momentum;
  let angle = Math.atan2(deltaMomentum, deltaRatio) * (180 / Math.PI);
  return (angle + 360) % 360;
}

function calcDistance(current) {
  if (!current) return 0;
  return Math.hypot(current.rs_ratio - 100, current.rs_momentum - 100);
}

function calcRotationScore(tail, current) {
  const velocity = calcVelocity(tail);
  const heading = calcHeading(tail);
  const distance = calcDistance(current);
  
  let headingScore;
  if (heading >= 0 && heading <= 90) headingScore = 100;
  else if (heading > 90 && heading <= 180) headingScore = 50;
  else if (heading > 180 && heading <= 270) headingScore = 25;
  else headingScore = 60;
  
  const velocityScore = Math.min(velocity * 20, 100);
  const distanceScore = Math.min(distance * 15, 100);
  
  return Math.round(0.4 * velocityScore + 0.3 * headingScore + 0.3 * distanceScore);
}

function getHeadingInfo(heading) {
  if (heading >= 337.5 || heading < 22.5) return { label: 'E', emoji: '→', color: '#3b82f6' };
  if (heading >= 22.5 && heading < 67.5) return { label: 'NE', emoji: '↗', color: '#22c55e' };
  if (heading >= 67.5 && heading < 112.5) return { label: 'N', emoji: '↑', color: '#22c55e' };
  if (heading >= 112.5 && heading < 157.5) return { label: 'NW', emoji: '↖', color: '#eab308' };
  if (heading >= 157.5 && heading < 202.5) return { label: 'W', emoji: '←', color: '#eab308' };
  if (heading >= 202.5 && heading < 247.5) return { label: 'SW', emoji: '↙', color: '#ef4444' };
  if (heading >= 247.5 && heading < 292.5) return { label: 'S', emoji: '↓', color: '#ef4444' };
  return { label: 'SE', emoji: '↘', color: '#3b82f6' };
}

function getScoreClass(score) {
  if (score >= 65) return 'high';
  if (score >= 40) return 'med';
  return 'low';
}

// v6: Hook detection - V-shaped reversal
function detectHook(tail) {
  if (!tail || tail.length < 4) return false;
  
  // Calculate heading for previous segment and current segment
  const prevTail = tail.slice(-4, -2);
  const currTail = tail.slice(-2);
  
  if (prevTail.length < 2 || currTail.length < 2) return false;
  
  const prevHeading = calcHeading([...tail.slice(-4, -2), tail[tail.length - 3]]);
  const currHeading = calcHeading(tail);
  
  // Hook pattern: was heading SW (180-270°), now heading NE (0-90°)
  // Or: was heading S (247-292°), now heading N (67-112°)
  const wasDownward = (prevHeading > 180 && prevHeading < 300);
  const nowUpward = (currHeading >= 0 && currHeading < 120);
  
  return wasDownward && nowUpward;
}

// v6: Tail curvature - acceleration detection
function calcTailCurvature(tail) {
  if (!tail || tail.length < 5) return 0;
  
  // Compare angle of last 2 segments vs previous segments
  const recentAngle = calcHeading(tail.slice(-2));
  const olderAngle = calcHeading(tail.slice(-4, -2));
  
  // Positive curvature = accelerating clockwise (bullish)
  let diff = recentAngle - olderAngle;
  if (diff > 180) diff -= 360;
  if (diff < -180) diff += 360;
  
  return diff;
}

function enrichWithMetrics(item) {
  const velocity = calcVelocity(item.tail);
  const heading = calcHeading(item.tail);
  const distance = calcDistance(item.current);
  const rotationScore = calcRotationScore(item.tail, item.current);
  const hasHook = detectHook(item.tail);
  const curvature = calcTailCurvature(item.tail);
  
  return {
    ...item,
    velocity,
    heading,
    headingInfo: getHeadingInfo(heading),
    distance,
    rotationScore,
    hasHook,
    curvature
  };
}

// ═══════════════════════════════════════════════════════════════════════════
// v6: MTF CONVICTION SCORING
// ═══════════════════════════════════════════════════════════════════════════

function calcMTFConviction(dailyItem, weeklyItem, monthlyItem) {
  // Base: average rotation scores across available timeframes
  const dScore = dailyItem?.rotationScore || 0;
  const wScore = weeklyItem?.rotationScore || 0;
  const mScore = monthlyItem?.rotationScore || 50; // default neutral if no monthly
  
  let conviction = (dScore + wScore + (monthlyItem ? mScore : 50)) / 3;
  
  // Bonus: Daily heading is bullish (0-90° NE)
  const dHeading = dailyItem?.heading || 0;
  if (dHeading >= 0 && dHeading <= 90) conviction += 10;
  
  // Bonus: Strong daily velocity (> 1.5)
  if ((dailyItem?.velocity || 0) > 1.5) conviction += 5;
  
  // Bonus: Weekly confirms daily direction (within 45°)
  const wHeading = weeklyItem?.heading || 0;
  let headingDiff = Math.abs(dHeading - wHeading);
  if (headingDiff > 180) headingDiff = 360 - headingDiff;
  if (headingDiff < 45) conviction += 5;
  
  // Bonus: V-hook detected (strong reversal signal)
  if (dailyItem?.hasHook) conviction += 8;
  
  // Bonus: Positive curvature (accelerating)
  if ((dailyItem?.curvature || 0) > 15) conviction += 3;
  
  // Penalty: Overextended (far from center)
  if ((dailyItem?.distance || 0) > 5) conviction -= 10;
  
  // Penalty: Very low velocity (stalling)
  if ((dailyItem?.velocity || 0) < 0.3) conviction -= 5;
  
  return Math.min(100, Math.max(0, Math.round(conviction)));
}

// v6: ENHANCED MTF ALIGNMENT COMPUTATION
// ═══════════════════════════════════════════════════════════════════════════

function computeEnhancedAlignments(){
  const bd=getBD();
  let daily=[],weekly=[],monthly=[];
  
  if(DRILLDOWN&&bd.drilldown&&bd.drilldown[DRILLDOWN]){
    const dd=bd.drilldown[DRILLDOWN];
    daily=(dd.daily||[]).map(enrichWithMetrics);
    weekly=(dd.weekly||[]).map(enrichWithMetrics);
    monthly=(dd.monthly||[]).map(enrichWithMetrics);
  } else {
    const modeKey=MODE==='etfs'?'etfs':MODE==='assets'?'asset_classes':MODE==='segments'?'market_segments':'sectors';
    const getTfItems=(tf)=>{const d=bd[tf];if(!d)return[];return (d[modeKey]||[]).map(enrichWithMetrics)};
    daily=getTfItems('daily');
    weekly=getTfItems('weekly');
    monthly=getTfItems('monthly');
  }
  
  if(!daily.length&&!weekly.length)return{power:[],pullback:[],early:[],exhaustion:[]};
  
  // Build lookup maps
  const dMap={},wMap={},mMap={};
  daily.forEach(s=>{dMap[s.symbol]=s});
  weekly.forEach(s=>{wMap[s.symbol]=s});
  monthly.forEach(s=>{mMap[s.symbol]=s});
  
  const allSymbols=[...new Set([...Object.keys(dMap),...Object.keys(wMap),...Object.keys(mMap)])];
  
  const power=[],pullback=[],early=[],exhaustion=[];
  
  allSymbols.forEach(sym=>{
    const d=dMap[sym],w=wMap[sym],m=mMap[sym];
    if(!d&&!w)return;
    
    const dQ=d?.quadrant,wQ=w?.quadrant,mQ=m?.quadrant;
    
    // Calculate conviction score
    const conviction = calcMTFConviction(d, w, m);
    
    // Skip if below minimum conviction threshold
    if(conviction < MTF_MIN_CONVICTION) return;
    
    const info={
      symbol:sym,
      name:d?.name||w?.name||m?.name||sym,
      color:d?.color||w?.color||m?.color||'#94a3b8',
      conviction,
      dQ, wQ, mQ,
      hasHook: d?.hasHook || false,
      velocity: d?.velocity || 0,
      heading: d?.heading || 0,
      headingInfo: d?.headingInfo || getHeadingInfo(0),
      distance: d?.distance || 0,
      curvature: d?.curvature || 0
    };
    
    // Pattern matching with MTF rules
    // Power Setup: M=Leading + W=Leading + D=Improving/Leading
    if(mQ==='Leading'&&wQ==='Leading'&&(dQ==='Improving'||dQ==='Leading')){
      power.push(info);
    }
    // Pullback Play: M=Leading + W=Weakening + D=Lagging/Improving
    else if(mQ==='Leading'&&wQ==='Weakening'&&(dQ==='Lagging'||dQ==='Improving')){
      pullback.push(info);
    }
    // Early Reversal: M=Lagging + W=Improving + D=Leading
    else if(mQ==='Lagging'&&wQ==='Improving'&&dQ==='Leading'){
      early.push(info);
    }
    // Exhaustion: M=Weakening + W=Lagging + D=Lagging
    else if(mQ==='Weakening'&&wQ==='Lagging'&&dQ==='Lagging'){
      exhaustion.push(info);
    }
    // Fallback patterns (no monthly data)
    else if(!mQ&&wQ==='Leading'&&(dQ==='Improving'||dQ==='Leading')){
      power.push(info);
    }
    else if(!mQ&&wQ==='Improving'&&dQ==='Leading'){
      early.push(info);
    }
    else if(!mQ&&wQ==='Weakening'&&dQ==='Lagging'){
      exhaustion.push(info);
    }
  });
  
  // Sort each array by conviction (descending)
  power.sort((a,b)=>b.conviction-a.conviction);
  pullback.sort((a,b)=>b.conviction-a.conviction);
  early.sort((a,b)=>b.conviction-a.conviction);
  exhaustion.sort((a,b)=>b.conviction-a.conviction);
  
  return{power,pullback,early,exhaustion};
}

function toggleItemSelection(symbol) {
  if (SELECT_ALL_MODE) {
    SELECT_ALL_MODE = false;
    const allItems = getAllItems();
    SELECTED_ITEMS = new Set(allItems.map(i => i.symbol));
    SELECTED_ITEMS.delete(symbol);
  } else {
    if (SELECTED_ITEMS.has(symbol)) {
      SELECTED_ITEMS.delete(symbol);
    } else {
      SELECTED_ITEMS.add(symbol);
    }
    const allItems = getAllItems();
    if (SELECTED_ITEMS.size === allItems.length) {
      SELECT_ALL_MODE = true;
      SELECTED_ITEMS.clear();
    }
  }
  render();
}

  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);

  const P={t:30,r:30,b:40,l:50},iw=W-P.l-P.r,ih=H-P.t-P.b,C=100;
  let ax=[],ay=[];
  items.forEach(s=>{
    const tail=TAIL_SLICE?s.tail.slice(-TAIL_SLICE):s.tail;
    tail.forEach(t=>{ax.push(t.rs_ratio);ay.push(t.rs_momentum)});
  });
  if(!ax.length){ax=[96,104];ay=[96,104]}
  const mg=1.5,xn=Math.min(Math.min(...ax)-mg,C-4),xx=Math.max(Math.max(...ax)+mg,C+4),yn=Math.min(Math.min(...ay)-mg,C-4),yx=Math.max(Math.max(...ay)+mg,C+4);
  const tX=v=>P.l+((v-xn)/(xx-xn))*iw,tY=v=>P.t+ih-((v-yn)/(yx-yn))*ih,cx=tX(C),cy=tY(C);

  const qFills=[
    [P.l,P.t,cx-P.l,cy-P.t,'rgba(59,130,246,.05)'],
    [cx,P.t,W-P.r-cx,cy-P.t,'rgba(34,197,94,.05)'],
    [P.l,cy,cx-P.l,H-P.b-cy,'rgba(239,68,68,.05)'],
    [cx,cy,W-P.r-cx,H-P.b-cy,'rgba(234,179,8,.05)']
  ];
  qFills.forEach(([x,y,w,h,f])=>{ctx.fillStyle=f;ctx.fillRect(x,y,w,h)});

  ctx.textAlign='center';ctx.font='600 11px Orbitron';
  const qLabels=[
    [(P.l+cx)/2,P.t+18,'IMPROVING','rgba(59,130,246,.35)'],
    [(cx+W-P.r)/2,P.t+18,'LEADING','rgba(34,197,94,.35)'],
    [(P.l+cx)/2,H-P.b-8,'LAGGING','rgba(239,68,68,.35)'],
    [(cx+W-P.r)/2,H-P.b-8,'WEAKENING','rgba(234,179,8,.35)']
  ];
  qLabels.forEach(([x,y,t,c])=>{ctx.fillStyle=c;ctx.fillText(t,x,y)});

  for(let v=Math.ceil(xn);v<=Math.floor(xx);v++){
    const x=tX(v),ic=v===C;
    ctx.beginPath();ctx.moveTo(x,P.t);ctx.lineTo(x,H-P.b);
    ctx.strokeStyle=ic?'#475569':'#1e293b';ctx.lineWidth=ic?1.5:.5;
    if(!ic)ctx.setLineDash([2,4]);else ctx.setLineDash([]);
    ctx.stroke();ctx.setLineDash([]);
    if(v%2===0){ctx.fillStyle='#475569';ctx.font='9px JetBrains Mono';ctx.textAlign='center';ctx.fillText(v,x,H-P.b+16)}
  }
  for(let v=Math.ceil(yn);v<=Math.floor(yx);v++){
    const y=tY(v),ic=v===C;
    ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(W-P.r,y);
    ctx.strokeStyle=ic?'#475569':'#1e293b';ctx.lineWidth=ic?1.5:.5;
    if(!ic)ctx.setLineDash([2,4]);else ctx.setLineDash([]);
    ctx.stroke();ctx.setLineDash([]);
    if(v%2===0){ctx.fillStyle='#475569';ctx.font='9px JetBrains Mono';ctx.textAlign='end';ctx.fillText(v,P.l-6,y+3)}
  }

  ctx.fillStyle='#64748b';ctx.font='10px JetBrains Mono';ctx.textAlign='center';
  ctx.fillText('JdK RS-RATIO →',W/2,H-4);
  ctx.save();ctx.translate(12,H/2);ctx.rotate(-Math.PI/2);ctx.fillText('JdK RS-MOMENTUM →',0,0);ctx.restore();

  const labelPositions=[];
  function findLabelPos(idealX,idealY,text){
    ctx.font='500 9px JetBrains Mono';
    const tw=ctx.measureText(text).width+4,th=12;
    const offsets=[[8,-8],[8,14],[-tw-8,-8],[-tw-8,14],[8,-22],[8,26],[-tw-8,-22]];
    for(const[dx,dy]of offsets){
      const lx=idealX+dx,ly=idealY+dy;
      const overlap=labelPositions.some(p=>!(lx>p.x+p.w||lx+tw<p.x||ly>p.y+p.h||ly+th<p.y));
      if(!overlap){labelPositions.push({x:lx,y:ly,w:tw,h:th});return{x:lx,y:ly}}
    }
    const pos={x:idealX+8,y:idealY-8};labelPositions.push({x:pos.x,y:pos.y,w:tw,h:th});return pos;
  }

  items.forEach(sec=>{
    const isH=HIGHLIGHT===sec.symbol,op=HIGHLIGHT&&!isH?.12:1;
    let tail=TAIL_SLICE?sec.tail.slice(-TAIL_SLICE):sec.tail;
    if(ANIM_PLAYING&&ANIM_FRAME<tail.length)tail=tail.slice(0,ANIM_FRAME+1);
    if(tail.length<2)return;

    ctx.save();ctx.globalAlpha=op;

    if(isH||!HIGHLIGHT){ctx.shadowColor=sec.color;ctx.shadowBlur=isH?12:6}
    ctx.beginPath();
    tail.forEach((t,i)=>{const x=tX(t.rs_ratio),y=tY(t.rs_momentum);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
    ctx.strokeStyle=sec.color;ctx.lineWidth=isH?3:1.8;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
    ctx.shadowBlur=0;

    tail.forEach((t,i)=>{
      const x=tX(t.rs_ratio),y=tY(t.rs_momentum),last=i===tail.length-1;
      const dotOp=0.3+0.7*(i/(tail.length-1));
      ctx.globalAlpha=op*dotOp;
      ctx.beginPath();
      const r=last?(isH?7:5):2.5;
      ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle=sec.color;ctx.fill();
      if(last){
        ctx.strokeStyle='#0c1018';ctx.lineWidth=2;ctx.stroke();
        const pulse=Math.sin(Date.now()/300)*0.5+0.5;
        const pulse2=Math.sin(Date.now()/500)*0.5+0.5;
        ctx.globalAlpha=op*(0.15+0.35*pulse);
        ctx.shadowColor=sec.color;ctx.shadowBlur=isH?20*pulse:10*pulse;
        ctx.beginPath();ctx.arc(x,y,r+3+3*pulse,0,Math.PI*2);
        ctx.strokeStyle=sec.color;ctx.lineWidth=2;ctx.stroke();
        ctx.shadowBlur=0;
        ctx.globalAlpha=op*(0.08+0.18*pulse2);
        ctx.beginPath();ctx.arc(x,y,r+8+5*pulse2,0,Math.PI*2);
        ctx.strokeStyle=sec.color;ctx.lineWidth=1;ctx.stroke();
        ctx.globalAlpha=op*(0.5+0.5*pulse);
        ctx.beginPath();ctx.arc(x,y,r*0.4,0,Math.PI*2);
        ctx.fillStyle='#fff';ctx.fill();
        
        // Score badge
        if (sec.rotationScore !== undefined && (isH || !HIGHLIGHT)) {
          ctx.globalAlpha = op * 0.9;
          const scoreClass = getScoreClass(sec.rotationScore);
          const badgeColor = scoreClass === 'high' ? '#22c55e' : scoreClass === 'med' ? '#eab308' : '#ef4444';
          const badgeX = x + 12;
          const badgeY = y - 12;
          ctx.beginPath();
          ctx.roundRect(badgeX - 12, badgeY - 8, 24, 16, 8);
          ctx.fillStyle = badgeColor + '40';
          ctx.fill();
          ctx.strokeStyle = badgeColor;
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.fillStyle = badgeColor;
          ctx.font = '700 8px JetBrains Mono';
          ctx.textAlign = 'center';
          ctx.fillText(sec.rotationScore, badgeX, badgeY + 3);
        }
        
        // Hook indicator
        if (sec.hasHook && (isH || !HIGHLIGHT)) {
          ctx.globalAlpha = op;
          ctx.fillStyle = '#22d3ee';
          ctx.font = '12px sans-serif';
          ctx.fillText('↺', x - 18, y - 8);
        }
      }
    });
    ctx.globalAlpha=op;

    const l=tail[tail.length-1],p=tail[tail.length-2];
    const lx=tX(l.rs_ratio),ly=tY(l.rs_momentum),px=tX(p.rs_ratio),py=tY(p.rs_momentum);
    const a=Math.atan2(ly-py,lx-px),al=9;
    
    const headingInfo = sec.headingInfo || getHeadingInfo(sec.heading || 0);
    ctx.beginPath();
    ctx.moveTo(lx,ly);
    ctx.lineTo(lx+al*Math.cos(a+2.6),ly+al*Math.sin(a+2.6));
    ctx.lineTo(lx+al*Math.cos(a-2.6),ly+al*Math.sin(a-2.6));
    ctx.closePath();
    ctx.fillStyle=headingInfo.color;
    ctx.fill();

    if(op>.5){
      const nm=sec.name.replace('Nifty ','');
      const pos=findLabelPos(lx,ly,nm);
      ctx.font=(isH?'700':'500')+' '+(isH?'11':'9')+'px JetBrains Mono';
      ctx.fillStyle=sec.color;ctx.textAlign='left';ctx.globalAlpha=Math.min(op+.2,1);
      ctx.fillText(nm,pos.x,pos.y);
    }
    ctx.restore();
  });

  canvas.onmousemove=e=>{
    const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
    let cl=null,cd=20;
    items.forEach(sec=>{
      const tail=TAIL_SLICE?sec.tail.slice(-TAIL_SLICE):sec.tail;
      const t=tail[tail.length-1];if(!t)return;
      const d=Math.hypot(mx-tX(t.rs_ratio),my-tY(t.rs_momentum));
      if(d<cd){cd=d;cl=sec}
    });
    const tt=document.getElementById('tt');
    if(cl){
      tt.style.display='block';
      tt.style.left=(e.clientX-el.closest('.rp').getBoundingClientRect().left+14)+'px';
      tt.style.top=(e.clientY-el.closest('.rp').getBoundingClientRect().top-10)+'px';
      
      const headingInfo = cl.headingInfo || getHeadingInfo(cl.heading || 0);
      const scoreClass = getScoreClass(cl.rotationScore || 0);
      const scoreColor = scoreClass === 'high' ? '#4ade80' : scoreClass === 'med' ? '#facc15' : '#f87171';
      
      tt.innerHTML=`
        <b style="color:${cl.color}">${cl.name}</b>
        <span style="font-size:9px;color:var(--t3)">${cl.quadrant} · ${Math.round(cl.heading || 0)}° ${headingInfo.label}</span>
        ${cl.hasHook?'<span style="color:#22d3ee;margin-left:6px" title="V-Hook detected">↺ Hook</span>':''}
        <div style="margin-top:4px">
          RS-Ratio: <b>${cl.current.rs_ratio.toFixed(2)}</b><br>
          RS-Mom: <b>${cl.current.rs_momentum.toFixed(2)}</b>
        </div>
        <div class="tt-metrics">
          <div class="tt-metric"><span class="tt-metric-label">Velocity</span><span class="tt-metric-value">${(cl.velocity || 0).toFixed(2)}</span></div>
          <div class="tt-metric"><span class="tt-metric-label">Distance</span><span class="tt-metric-value">${(cl.distance || 0).toFixed(2)}</span></div>
          <div class="tt-metric"><span class="tt-metric-label">Heading</span><span class="tt-metric-value" style="color:${headingInfo.color}">${headingInfo.emoji} ${headingInfo.label}</span></div>
          <div class="tt-metric"><span class="tt-metric-label">Score</span><span class="tt-metric-value" style="color:${scoreColor}">${cl.rotationScore || 0}/100</span></div>
        </div>
        ${!DRILLDOWN&&MODE==='sectors'?'<div style="margin-top:6px;font-size:9px;color:var(--cyan)">Double-click → drill-down</div>':''}`;
      if(HIGHLIGHT!==cl.symbol){HIGHLIGHT=cl.symbol;drawChart(items)}
    }else{tt.style.display='none';if(HIGHLIGHT){HIGHLIGHT=null;drawChart(items)}}
  };
  canvas.onmouseleave=()=>{document.getElementById('tt').style.display='none';if(HIGHLIGHT){HIGHLIGHT=null;drawChart(items)}};
  if(!DRILLDOWN&&MODE==='sectors'){
    canvas.ondblclick=e=>{
      const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
      let cl=null,cd=20;
      items.forEach(sec=>{const t=sec.tail[sec.tail.length-1];if(!t)return;const d=Math.hypot(mx-tX(t.rs_ratio),my-tY(t.rs_momentum));if(d<cd){cd=d;cl=sec}});
      if(cl)drill(cl.symbol);
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// CONTROL FUNCTIONS
// ═══════════════════════════════════════════════════════════════════════════

function setMode(m){DRILLDOWN=null;MODE=m;HIGHLIGHT=null;TAIL_SLICE=null;stopAnim();SELECT_ALL_MODE=true;SELECTED_ITEMS.clear();render()}
function setTF(t){TF=t;HIGHLIGHT=null;TAIL_SLICE=null;stopAnim();render()}
function setLimit(v){STOCK_LIMIT=v;render()}
function setBench(b){BENCH=b;DRILLDOWN=null;HIGHLIGHT=null;TAIL_SLICE=null;stopAnim();SELECT_ALL_MODE=true;SELECTED_ITEMS.clear();render()}
function filterSidebar(v){SIDEBAR_FILTER=v;render()}
function hl(sym){HIGHLIGHT=sym;drawChart(getCurrentItems())}
function drill(sym){const bd=getBD();if(bd.drilldown&&bd.drilldown[sym]){DRILLDOWN=sym;HIGHLIGHT=null;TAIL_SLICE=null;stopAnim();SELECT_ALL_MODE=true;SELECTED_ITEMS.clear();render()}else{alert('No drill-down data for this sector yet.\nRun the RRM GitHub Action to generate stock-level data.')}}
function exitDrill(){DRILLDOWN=null;HIGHLIGHT=null;TAIL_SLICE=null;stopAnim();SELECT_ALL_MODE=true;SELECTED_ITEMS.clear();render()}
function setQuadrantFilter(q){QUADRANT_FILTER=q;render()}

function toggleAnim(){ANIM_PLAYING?stopAnim():startAnim()}
function startAnim(){
  ANIM_PLAYING=true;ANIM_FRAME=1;
  const items=getCurrentItems();
  const maxTail=Math.max(...items.map(s=>s.tail?.length||0),2);
  ANIM_TIMER=setInterval(()=>{
    ANIM_FRAME++;
    if(ANIM_FRAME>=maxTail){ANIM_FRAME=maxTail;stopAnim()}
    drawChart(items);
  },400);
  render();
}
function stopAnim(){ANIM_PLAYING=false;if(ANIM_TIMER){clearInterval(ANIM_TIMER);ANIM_TIMER=null}ANIM_FRAME=0}

function setTailSlice(v){
  TAIL_SLICE=v;
  const lbl=document.getElementById('tail-count');if(lbl)lbl.textContent=v+' pts';
  drawChart(getCurrentItems());
}

function toggleFS(){FULLSCREEN=!FULLSCREEN;document.querySelector('.d').classList.toggle('fs',FULLSCREEN);render()}

function exportChart(format){
  const canvas=document.getElementById('rrm-canvas');if(!canvas)return;
  if(format==='png'){
    const link=document.createElement('a');link.download=`RRM_${TF}_${DATA?.metadata?.date||'export'}.png`;
    link.href=canvas.toDataURL('image/png');link.click();
  }else{
    const svgData=`<svg xmlns="http://www.w3.org/2000/svg" width="${canvas.width}" height="${canvas.height}"><foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml"><img src="${canvas.toDataURL('image/png')}" width="${canvas.width}" height="${canvas.height}"/></div></foreignObject></svg>`;
    const blob=new Blob([svgData],{type:'image/svg+xml'});
    const link=document.createElement('a');link.download=`RRM_${TF}_${DATA?.metadata?.date||'export'}.svg`;
    link.href=URL.createObjectURL(blob);link.click();
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// INITIALIZATION
// ═══════════════════════════════════════════════════════════════════════════

async function init(){
  let d=null;
  try{const r=await fetch('./data/rrm_data.json',{cache:'no-store'});if(r.ok){d=await r.json();if(d?.benchmarks_data&&Object.keys(d.benchmarks_data).length>0)IS_LIVE=true;else d=null}}catch(e){console.warn('RRM fetch:',e)}
  if(!d){try{const r=await fetch('./data/rrg_data.json',{cache:'no-store'});if(r.ok){d=await r.json();if(d?.benchmarks_data&&Object.keys(d.benchmarks_data).length>0)IS_LIVE=true;else d=null}}catch(e){console.warn('RRG fallback fetch:',e)}}
  if(!d){d=SAMPLE;IS_LIVE=false}
  DATA=d;BENCH=d.default_benchmark||Object.keys(d.available_benchmarks||{})[0]||'^NSEI';
  await new Promise(r=>setTimeout(r,300));
  render();
  
  let _lastPulse=0;
  (function pulseLoop(t){
    requestAnimationFrame(pulseLoop);
    if(DATA&&t-_lastPulse>50){
      _lastPulse=t;
      drawChart(getCurrentItems());
    }
  })(0);
  window.addEventListener('resize',()=>{if(DATA)render()});
}
init();
</script>
