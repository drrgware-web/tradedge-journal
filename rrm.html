<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRM v4 — Relative Momentum Matrix | TradEdge</title>
<link rel="icon" type="image/jpeg" href="./assets/logo.jpeg">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06080d;--bg2:#0c1018;--bg3:#111827;--bg4:#1a2235;--bd:#1e293b;--bd2:#334155;--t1:#e2e8f0;--t2:#94a3b8;--t3:#64748b;--t4:#475569;--cyan:#22d3ee;--pink:#f472b6;--green:#4ade80;--fd:'Orbitron',sans-serif;--fm:'JetBrains Mono',monospace;--fb:'Exo 2',sans-serif;--r:10px}
body{font-family:var(--fb);background:var(--bg);color:var(--t1);min-height:100vh}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:9999}
.d{max-width:1440px;margin:0 auto;padding:16px 16px 60px;transition:max-width .3s}
.d.fs{max-width:100%;padding:8px}
.hd{text-align:center;padding:0 0 14px;position:relative}
.logo-strip{background:#101a29;padding:16px 0 12px;margin:0 -16px 10px;position:relative}
.logo-strip::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent)}
.logo-strip::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(34,211,238,.15),transparent)}
.logo-img{width:200px;height:auto;display:block;margin:0 auto 2px}
.logo-tagline{font-family:var(--fb);font-size:10px;font-weight:500;letter-spacing:3.5px;text-transform:uppercase;color:#c9a84c;animation:tagP 4s ease-in-out infinite}
@keyframes tagP{0%,100%{opacity:.4}50%{opacity:1}}
.hd .sub{font-family:var(--fm);font-size:10px;color:var(--t4);letter-spacing:2px;margin-top:6px}
.ctrl{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;padding:8px 12px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r)}
.cg{display:flex;align-items:center;gap:5px}
.cl{font-family:var(--fm);font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase}
.cb{padding:4px 12px;border-radius:5px;border:1px solid var(--bd);background:var(--bg3);color:var(--t2);font-family:var(--fm);font-size:10px;font-weight:600;cursor:pointer;transition:.2s}
.cb:hover{border-color:var(--bd2);color:var(--t1)}
.cb.a{border-color:var(--cyan);color:var(--cyan);background:rgba(34,211,238,.08)}
select.cs{padding:4px 8px;border-radius:5px;border:1px solid var(--bd);background:var(--bg3);color:var(--t1);font-family:var(--fm);font-size:10px;cursor:pointer}
.badge{font-family:var(--fm);font-size:9px;padding:3px 8px;border:1px solid var(--bd);border-radius:4px;background:var(--bg3)}
.badge .dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:3px;vertical-align:middle}
.badge.live .dot{background:var(--green);animation:pd 2s infinite}
.badge.sample .dot{background:#ef4444}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.3}}
.bc{display:flex;align-items:center;gap:6px;margin-bottom:10px;font-family:var(--fm);font-size:11px}
.bc span{color:var(--t3);cursor:pointer;transition:.2s}
.bc span:hover{color:var(--cyan)}
.bc .arr{color:var(--t4);cursor:default}
.bc .cur{color:var(--cyan);font-weight:700;cursor:default}
/* Toolbar row */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.tb-btn{padding:4px 10px;border-radius:5px;border:1px solid var(--bd);background:var(--bg3);color:var(--t2);font-family:var(--fm);font-size:9px;font-weight:600;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:4px}
.tb-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.tb-btn.playing{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.08)}
.tb-spacer{flex:1}
/* Slider */
.slider-wrap{display:flex;align-items:center;gap:8px;flex:1;min-width:200px;max-width:400px}
.slider-wrap input[type=range]{flex:1;accent-color:var(--cyan);height:4px;cursor:pointer}
.slider-label{font-family:var(--fm);font-size:9px;color:var(--t3);white-space:nowrap}
/* Main layout */
.ml{display:grid;grid-template-columns:1fr 280px;gap:12px}
@media(max-width:900px){.ml{grid-template-columns:1fr}}
.rp{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:10px;position:relative}
.rc{position:relative;width:100%;aspect-ratio:1.2/1;min-height:480px}
.rc canvas{position:absolute;inset:0;width:100%;height:100%}
.tt{position:absolute;display:none;background:var(--bg3);border:1px solid var(--bd2);border-radius:6px;padding:8px 10px;font-family:var(--fm);font-size:10px;pointer-events:none;z-index:100;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.tt b{display:block;margin-bottom:3px}
/* Sidebar */
.sb{display:flex;flex-direction:column;gap:8px;max-height:calc(100vh - 200px);overflow-y:auto}
.sb::-webkit-scrollbar{width:4px}
.sb::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}
.sb-search{width:100%;padding:5px 8px;border-radius:5px;border:1px solid var(--bd);background:var(--bg3);color:var(--t1);font-family:var(--fm);font-size:10px;outline:none;margin-bottom:4px}
.sb-search:focus{border-color:var(--cyan)}
.sb-search::placeholder{color:var(--t4)}
.qp{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:10px}
.qt{font-family:var(--fd);font-size:10px;font-weight:600;letter-spacing:2px;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.qd{width:8px;height:8px;border-radius:50%}
.sl{list-style:none}
.si{display:flex;align-items:center;gap:5px;padding:3px 0;font-family:var(--fm);font-size:10px;color:var(--t2);cursor:pointer;transition:.15s}
.si:hover{color:var(--t1)}
.si .sd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.si .sv{margin-left:auto;color:var(--t4);font-size:9px}
/* Multi-TF Alignment Panel */
.mtf-panel{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:14px}
.mtf-title{font-family:var(--fd);font-size:11px;font-weight:600;letter-spacing:3px;color:var(--t3);margin-bottom:10px;text-transform:uppercase}
.mtf-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:8px}
.mtf-card{padding:10px 12px;border-radius:var(--r);border:1px solid;background:var(--bg3);transition:.2s}
.mtf-card:hover{transform:translateY(-1px)}
.mtf-card-name{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1px;margin-bottom:4px}
.mtf-card-desc{font-family:var(--fm);font-size:9px;color:var(--t3);line-height:1.4;margin-bottom:6px}
.mtf-card-cond{font-family:var(--fm);font-size:9px;color:var(--t4);margin-bottom:6px}
.mtf-card-list{font-family:var(--fm);font-size:10px;color:var(--t1);line-height:1.6}
.mtf-card-list .mtf-item{display:inline-flex;align-items:center;gap:4px;padding:1px 6px;margin:2px;border-radius:3px;background:rgba(255,255,255,.04);border:1px solid var(--bd)}
.mtf-card-list .mtf-item .mtf-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.mtf-empty{color:var(--t4);font-family:var(--fm);font-size:9px;font-style:italic}
.ft{text-align:center;padding:14px 0;font-family:var(--fm);font-size:9px;color:var(--t4);letter-spacing:1px;border-top:1px solid var(--bd);margin-top:16px}
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:16px}
.sp{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulseGlow{0%,100%{filter:drop-shadow(0 0 4px currentColor) drop-shadow(0 0 8px currentColor);transform:scale(1)}50%{filter:drop-shadow(0 0 8px currentColor) drop-shadow(0 0 16px currentColor);transform:scale(1.15)}}
</style>
</head>
<body>
<div class="d" id="app">
  <div class="ld"><div class="sp"></div><div style="font-family:var(--fm);font-size:11px;color:var(--t3);letter-spacing:2px">LOADING RRM DATA...</div></div>
</div>
<script>
let DATA=null,IS_LIVE=false,MODE='sectors',TF='daily',HIGHLIGHT=null,DRILLDOWN=null,STOCK_LIMIT=10,BENCH=null;
let ANIM_PLAYING=false,ANIM_FRAME=0,ANIM_TIMER=null,TAIL_SLICE=null,FULLSCREEN=false,SIDEBAR_FILTER='';

// ═══ SAMPLE DATA ═══
const SAMPLE_BENCH_DATA={
  daily:{sectors:[
    {symbol:"^CNXIT",name:"Nifty IT",quadrant:"Improving",color:"#06b6d4",current:{rs_ratio:97.5,rs_momentum:103.2},tail:[{rs_ratio:95.8,rs_momentum:101.5},{rs_ratio:96.2,rs_momentum:102},{rs_ratio:96.8,rs_momentum:102.5},{rs_ratio:97.1,rs_momentum:103},{rs_ratio:97.5,rs_momentum:103.2}]},
    {symbol:"^CNXPHARMA",name:"Nifty Pharma",quadrant:"Leading",color:"#f59e0b",current:{rs_ratio:102.8,rs_momentum:101.5},tail:[{rs_ratio:101.2,rs_momentum:100.5},{rs_ratio:101.8,rs_momentum:100.8},{rs_ratio:102.2,rs_momentum:101},{rs_ratio:102.5,rs_momentum:101.2},{rs_ratio:102.8,rs_momentum:101.5}]},
    {symbol:"^NSEBANK",name:"Nifty Bank",quadrant:"Weakening",color:"#3b82f6",current:{rs_ratio:101.2,rs_momentum:98.8},tail:[{rs_ratio:102.5,rs_momentum:99.8},{rs_ratio:102.1,rs_momentum:99.5},{rs_ratio:101.8,rs_momentum:99.2},{rs_ratio:101.5,rs_momentum:99},{rs_ratio:101.2,rs_momentum:98.8}]},
    {symbol:"^CNXAUTO",name:"Nifty Auto",quadrant:"Lagging",color:"#ef4444",current:{rs_ratio:98.2,rs_momentum:98.5},tail:[{rs_ratio:99.5,rs_momentum:99.2},{rs_ratio:99.1,rs_momentum:99},{rs_ratio:98.8,rs_momentum:98.8},{rs_ratio:98.5,rs_momentum:98.6},{rs_ratio:98.2,rs_momentum:98.5}]},
    {symbol:"^CNXFMCG",name:"Nifty FMCG",quadrant:"Leading",color:"#22c55e",current:{rs_ratio:103.5,rs_momentum:101.8},tail:[{rs_ratio:102,rs_momentum:100.5},{rs_ratio:102.5,rs_momentum:101},{rs_ratio:103,rs_momentum:101.2},{rs_ratio:103.2,rs_momentum:101.5},{rs_ratio:103.5,rs_momentum:101.8}]},
    {symbol:"^CNXMETAL",name:"Nifty Metal",quadrant:"Improving",color:"#8b5cf6",current:{rs_ratio:98.8,rs_momentum:102.2},tail:[{rs_ratio:97.2,rs_momentum:100.8},{rs_ratio:97.6,rs_momentum:101.2},{rs_ratio:98,rs_momentum:101.6},{rs_ratio:98.4,rs_momentum:102},{rs_ratio:98.8,rs_momentum:102.2}]},
    {symbol:"^CNXREALTY",name:"Nifty Realty",quadrant:"Lagging",color:"#ec4899",current:{rs_ratio:97,rs_momentum:98.2},tail:[{rs_ratio:98.5,rs_momentum:99},{rs_ratio:98,rs_momentum:98.8},{rs_ratio:97.6,rs_momentum:98.5},{rs_ratio:97.3,rs_momentum:98.3},{rs_ratio:97,rs_momentum:98.2}]},
    {symbol:"^CNXENERGY",name:"Nifty Energy",quadrant:"Leading",color:"#f97316",current:{rs_ratio:101.5,rs_momentum:100.8},tail:[{rs_ratio:100.5,rs_momentum:100.2},{rs_ratio:100.8,rs_momentum:100.4},{rs_ratio:101,rs_momentum:100.5},{rs_ratio:101.2,rs_momentum:100.7},{rs_ratio:101.5,rs_momentum:100.8}]},
    {symbol:"^CNXPSUBANK",name:"Nifty PSU Bank",quadrant:"Weakening",color:"#0ea5e9",current:{rs_ratio:100.5,rs_momentum:97.5},tail:[{rs_ratio:102,rs_momentum:99},{rs_ratio:101.5,rs_momentum:98.5},{rs_ratio:101,rs_momentum:98},{rs_ratio:100.8,rs_momentum:97.8},{rs_ratio:100.5,rs_momentum:97.5}]},
    {symbol:"^CNXINFRA",name:"Nifty Infra",quadrant:"Weakening",color:"#14b8a6",current:{rs_ratio:100.2,rs_momentum:99.2},tail:[{rs_ratio:100.8,rs_momentum:100},{rs_ratio:100.6,rs_momentum:99.8},{rs_ratio:100.5,rs_momentum:99.5},{rs_ratio:100.3,rs_momentum:99.3},{rs_ratio:100.2,rs_momentum:99.2}]}
  ],etfs:[],asset_classes:[],market_segments:[],quadrant_summary:{Leading:["Nifty Pharma","Nifty FMCG","Nifty Energy"],Improving:["Nifty IT","Nifty Metal"],Lagging:["Nifty Auto","Nifty Realty"],Weakening:["Nifty Bank","Nifty PSU Bank","Nifty Infra"]},tail_length:5},
  weekly:{sectors:[],etfs:[],asset_classes:[],market_segments:[],quadrant_summary:{Leading:[],Improving:[],Lagging:[],Weakening:[]},tail_length:5},
  monthly:{sectors:[],etfs:[],asset_classes:[],market_segments:[],quadrant_summary:{Leading:[],Improving:[],Lagging:[],Weakening:[]},tail_length:5},
  drilldown:{}
};
const SAMPLE={
  benchmarks_data:{"^NSEI":SAMPLE_BENCH_DATA},
  available_benchmarks:{"^NSEI":"Nifty 50","^NSEBANK":"Nifty Bank","^CRSLDX":"Nifty 500"},
  default_benchmark:"^NSEI",
  config:{window:10,center:100},
  metadata:{generated_at:"2026-03-16T16:30:00",date:"2026-03-16",benchmarks_calculated:["^NSEI"],total_sectors:10,total_etfs:0,total_drilldown_sectors:0,timeframes:["daily","weekly"]}
};

function getBD(){
  if(!DATA)return SAMPLE_BENCH_DATA;
  const bd=DATA.benchmarks_data||{};
  return bd[BENCH]||bd[DATA.default_benchmark]||Object.values(bd)[0]||SAMPLE_BENCH_DATA;
}

// ═══ MULTI-TIMEFRAME ALIGNMENT ═══
function computeAlignments(){
  const bd=getBD();
  let daily=[],weekly=[],monthly=[];

  if(DRILLDOWN&&bd.drilldown&&bd.drilldown[DRILLDOWN]){
    // Drill-down: individual stocks within a sector
    const dd=bd.drilldown[DRILLDOWN];
    daily=dd.daily||[];
    weekly=dd.weekly||[];
    monthly=dd.monthly||[];
  } else {
    // Normal mode: sectors/etfs/assets/segments
    const modeKey=MODE==='etfs'?'etfs':MODE==='assets'?'asset_classes':MODE==='segments'?'market_segments':'sectors';
    const getTfItems=(tf)=>{const d=bd[tf];if(!d)return[];return d[modeKey]||[]};
    daily=getTfItems('daily');weekly=getTfItems('weekly');monthly=getTfItems('monthly');
  }

  if(!daily.length&&!weekly.length)return{power:[],pullback:[],early:[],exhaustion:[]};
  const qMap=(items)=>{const m={};items.forEach(s=>{m[s.symbol]=s.quadrant});return m};
  const dQ=qMap(daily),wQ=qMap(weekly),mQ=qMap(monthly);
  const colorMap={};daily.forEach(s=>{colorMap[s.symbol]=s.color});
  weekly.forEach(s=>{if(!colorMap[s.symbol])colorMap[s.symbol]=s.color});
  monthly.forEach(s=>{if(!colorMap[s.symbol])colorMap[s.symbol]=s.color});
  const nameMap={};daily.forEach(s=>{nameMap[s.symbol]=s.name});
  weekly.forEach(s=>{if(!nameMap[s.symbol])nameMap[s.symbol]=s.name});
  monthly.forEach(s=>{if(!nameMap[s.symbol])nameMap[s.symbol]=s.name});
  const allSymbols=[...new Set([...Object.keys(dQ),...Object.keys(wQ),...Object.keys(mQ)])];
  const power=[],pullback=[],early=[],exhaustion=[];
  allSymbols.forEach(sym=>{
    const d=dQ[sym],w=wQ[sym],m=mQ[sym];
    if(!d&&!w)return;
    const info={symbol:sym,name:nameMap[sym]||sym,color:colorMap[sym]||'#94a3b8',d,w,m};
    // Power: Monthly Leading, Weekly Leading, Daily Improving/Leading
    if(m==='Leading'&&w==='Leading'&&(d==='Improving'||d==='Leading'))power.push(info);
    // Pullback: Monthly Leading, Weekly Weakening, Daily Lagging/Improving
    else if(m==='Leading'&&w==='Weakening'&&(d==='Lagging'||d==='Improving'))pullback.push(info);
    // Early Reversal: Monthly Lagging, Weekly Improving, Daily Leading
    else if(m==='Lagging'&&w==='Improving'&&d==='Leading')early.push(info);
    // Exhaustion: Monthly Weakening, Weekly Lagging, Daily Lagging
    else if(m==='Weakening'&&w==='Lagging'&&d==='Lagging')exhaustion.push(info);
    // 2-TF fallback (when monthly not available)
    else if(!m&&w==='Leading'&&(d==='Improving'||d==='Leading'))power.push(info);
    else if(!m&&w==='Weakening'&&d==='Lagging')exhaustion.push(info);
  });
  return{power,pullback,early,exhaustion};
}

function renderAlignmentPanel(){
  const a=computeAlignments();
  const bd=getBD();
  let modeLabel,hasMonthly;

  if(DRILLDOWN&&bd.drilldown&&bd.drilldown[DRILLDOWN]){
    const dd=bd.drilldown[DRILLDOWN];
    modeLabel=dd.sector_name+' Stocks';
    hasMonthly=!!dd.monthly?.length;
  } else {
    const modeKey=MODE==='etfs'?'etfs':MODE==='assets'?'asset_classes':MODE==='segments'?'market_segments':'sectors';
    modeLabel=MODE==='etfs'?'ETFs':MODE==='assets'?'Asset Classes':MODE==='segments'?'Segments':'Sectors';
    hasMonthly=!!bd.monthly?.[modeKey]?.length;
  }

  const tfNote=hasMonthly?'Monthly + Weekly + Daily':'Weekly + Daily (Monthly not yet available)';
  const cardData=[
    {key:'power',name:'POWER SETUP',emoji:'⚡',color:'#22c55e',border:'rgba(34,197,94,.3)',bg:'rgba(34,197,94,.05)',desc:'Full convergence — highest conviction buy signal',cond:'M:Leading · W:Leading · D:Improving→Leading',items:a.power},
    {key:'pullback',name:'PULLBACK PLAY',emoji:'🔄',color:'#3b82f6',border:'rgba(59,130,246,.3)',bg:'rgba(59,130,246,.05)',desc:'Buy the dip — long-term strong, short-term cooling',cond:'M:Leading · W:Weakening · D:Lagging→Improving',items:a.pullback},
    {key:'early',name:'EARLY REVERSAL',emoji:'🌱',color:'#f59e0b',border:'rgba(245,158,11,.3)',bg:'rgba(245,158,11,.05)',desc:'Potential bottom — speculative with high reward',cond:'M:Lagging · W:Improving · D:Leading',items:a.early},
    {key:'exhaustion',name:'EXHAUSTION',emoji:'💀',color:'#ef4444',border:'rgba(239,68,68,.3)',bg:'rgba(239,68,68,.05)',desc:'Distribution phase — exit or avoid',cond:'M:Weakening · W:Lagging · D:Lagging',items:a.exhaustion}
  ];
  return `<div class="mtf-panel">
    <div class="mtf-title">⚙ MULTI-TIMEFRAME ALIGNMENT · ${modeLabel.toUpperCase()} <span style="font-family:var(--fm);font-size:9px;color:var(--t4);font-weight:400;letter-spacing:1px;margin-left:8px">${tfNote}</span></div>
    <div class="mtf-grid">${cardData.map(c=>`
      <div class="mtf-card" style="border-color:${c.border};background:${c.bg}">
        <div class="mtf-card-name" style="color:${c.color}">${c.emoji} ${c.name} <span style="font-weight:400;color:var(--t4);font-size:9px">(${c.items.length})</span></div>
        <div class="mtf-card-desc">${c.desc}</div>
        <div class="mtf-card-cond">${c.cond}</div>
        <div class="mtf-card-list">${c.items.length?c.items.map(i=>`<span class="mtf-item"><span class="mtf-dot" style="background:${i.color}"></span>${i.name}</span>`).join(''):'<span class="mtf-empty">No matches currently</span>'}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

// ═══ RENDER ═══
function render(){
  const d=DATA,app=document.getElementById('app');
  const bd=getBD();
  const tf_data=bd[TF]||bd.daily;
  const benchName=(d.available_benchmarks||{})[BENCH]||BENCH;
  let items,displayBench=benchName,breadcrumb='';

  if(DRILLDOWN&&bd.drilldown&&bd.drilldown[DRILLDOWN]){
    const dd=bd.drilldown[DRILLDOWN];
    const ddTF=TF==='weekly'?(dd.weekly||[]):TF==='monthly'?(dd.monthly||dd.weekly||[]):(dd.daily||[]);
    items=STOCK_LIMIT==='all'?ddTF:ddTF.slice(0,parseInt(STOCK_LIMIT));
    displayBench=dd.sector_name;
    breadcrumb=`<div class="bc"><span onclick="exitDrill()">Sectors</span><span class="arr">›</span><span class="cur">${dd.sector_name} — Stocks vs ${dd.sector_name}</span></div>`;
  } else {
    items=MODE==='etfs'?(tf_data.etfs||[]):MODE==='assets'?(tf_data.asset_classes||[]):MODE==='segments'?(tf_data.market_segments||[]):(tf_data.sectors||[]);
  }

  const grp={Leading:[],Improving:[],Weakening:[],Lagging:[]};
  items.forEach(s=>{if(grp[s.quadrant])grp[s.quadrant].push(s)});

  const benchOpts=Object.entries(d.available_benchmarks||{}).map(([k,v])=>`<option value="${k}" ${k===BENCH?'selected':''}>${v}</option>`).join('');
  const hasBenchData=Object.keys(d.benchmarks_data||{}).length>1;
  const hasMontly=!!bd.monthly?.sectors?.length;

  app.innerHTML=`
    <div class="hd">
      <div class="logo-strip">
        <img class="logo-img" src="./assets/logo.jpeg" alt="TradEdge" onerror="this.style.display='none'">
        <div class="logo-tagline">Define Your Edge with TradEdge</div>
      </div>
      <p class="sub">RELATIVE MOMENTUM MATRIX · SECTOR ROTATION · ${d.metadata?.date||''}</p>
    </div>
    <div class="ctrl">
      <div class="cg"><span class="cl">Mode:</span>
        <button class="cb ${!DRILLDOWN&&MODE==='sectors'?'a':''}" onclick="setMode('sectors')">Sectors</button>
        <button class="cb ${!DRILLDOWN&&MODE==='etfs'?'a':''}" onclick="setMode('etfs')">ETFs</button>
        <button class="cb ${!DRILLDOWN&&MODE==='assets'?'a':''}" onclick="setMode('assets')">Assets</button>
        <button class="cb ${!DRILLDOWN&&MODE==='segments'?'a':''}" onclick="setMode('segments')">Segments</button>
      </div>
      <div class="cg"><span class="cl">Period:</span>
        <button class="cb ${TF==='daily'?'a':''}" onclick="setTF('daily')">Daily</button>
        <button class="cb ${TF==='weekly'?'a':''}" onclick="setTF('weekly')">Weekly</button>
        <button class="cb ${TF==='monthly'?'a':''}" onclick="setTF('monthly')" ${!hasMontly?'style="opacity:.4"':''}>Monthly</button>
      </div>
      ${DRILLDOWN?`<div class="cg"><span class="cl">Stocks:</span>
        <select class="cs" onchange="setLimit(this.value)">
          <option value="5" ${STOCK_LIMIT==5?'selected':''}>Top 5</option>
          <option value="10" ${STOCK_LIMIT==10?'selected':''}>Top 10</option>
          <option value="all" ${STOCK_LIMIT==='all'?'selected':''}>All</option>
        </select></div>`:''}
      <div class="cg"><span class="cl">Benchmark:</span>
        ${hasBenchData?`<select class="cs" onchange="setBench(this.value)">${benchOpts}</select>`
        :`<span style="font-family:var(--fm);font-size:11px;color:var(--cyan);font-weight:600">${benchName}</span>`}
      </div>
      <span class="badge ${IS_LIVE?'live':'sample'}"><span class="dot"></span>${IS_LIVE?'LIVE':'SAMPLE'}</span>
    </div>
    ${renderAlignmentPanel()}
    ${breadcrumb}
    <div class="toolbar">
      <button class="tb-btn ${ANIM_PLAYING?'playing':''}" onclick="toggleAnim()" title="Animate trail movement">
        ${ANIM_PLAYING?'⏸ Pause':'▶ Play'} Trail
      </button>
      <div class="slider-wrap">
        <span class="slider-label">Tail:</span>
        <input type="range" min="2" max="${items.length?Math.max(...items.map(s=>s.tail?.length||5)):5}" value="${TAIL_SLICE||items[0]?.tail?.length||5}" oninput="setTailSlice(+this.value)" title="Scrub through history">
        <span class="slider-label" id="tail-count">${TAIL_SLICE||items[0]?.tail?.length||5} pts</span>
      </div>
      <div class="tb-spacer"></div>
      <button class="tb-btn" onclick="exportChart('svg')" title="Export as SVG">📐 SVG</button>
      <button class="tb-btn" onclick="exportChart('png')" title="Export as PNG">📷 PNG</button>
      <button class="tb-btn" onclick="toggleFS()" title="Toggle fullscreen">${FULLSCREEN?'⊡ Exit FS':'⊞ Fullscreen'}</button>
    </div>
    <div class="ml">
      <div class="rp"><div class="rc" id="rc"><canvas id="rrm-canvas"></canvas></div><div class="tt" id="tt"></div></div>
      <div class="sb">
        <input class="sb-search" type="text" placeholder="🔍 Filter sectors..." value="${SIDEBAR_FILTER}" oninput="filterSidebar(this.value)">
        ${qPanel('Leading','#22c55e',grp.Leading)}
        ${qPanel('Improving','#3b82f6',grp.Improving)}
        ${qPanel('Weakening','#eab308',grp.Weakening)}
        ${qPanel('Lagging','#ef4444',grp.Lagging)}
      </div>
    </div>
    <div class="ft">TradEdge RRM v4.0 · ${items.length} instruments · ${TF} · Bench: ${displayBench} · ✦ Trade the Pulse ✦</div>`;
  drawChart(items);
}

function qPanel(n,c,items){
  const filtered=SIDEBAR_FILTER?items.filter(s=>s.name.toLowerCase().includes(SIDEBAR_FILTER.toLowerCase())):items;
  return`<div class="qp"><div class="qt"><div class="qd" style="background:${c}"></div><span style="color:${c}">${n}</span><span style="font-family:var(--fm);font-size:9px;color:var(--t4);margin-left:auto">${filtered.length}${filtered.length!==items.length?'/'+items.length:''}</span></div>
  <ul class="sl">${filtered.length===0?'<li style="font-family:var(--fm);font-size:9px;color:var(--t4);padding:3px 0">—</li>':
    filtered.map(s=>`<li class="si" onmouseenter="hl('${s.symbol}')" onmouseleave="hl(null)" ${!DRILLDOWN&&MODE==='sectors'?`ondblclick="drill('${s.symbol}')"`:''}><span class="sd" style="background:${s.color}"></span><span>${s.name}</span><span class="sv">${s.current.rs_ratio.toFixed(1)}/${s.current.rs_momentum.toFixed(1)}</span></li>`).join('')}</ul></div>`;
}

// ═══ CANVAS CHART (replaces SVG for better performance + PNG export) ═══
function drawChart(items){
  const el=document.getElementById('rc');if(!el)return;
  const canvas=document.getElementById('rrm-canvas');if(!canvas)return;
  const rect=el.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  const W=rect.width,H=rect.height;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);

  const P={t:30,r:30,b:40,l:50},iw=W-P.l-P.r,ih=H-P.t-P.b,C=100;
  let ax=[],ay=[];
  items.forEach(s=>{
    const tail=TAIL_SLICE?s.tail.slice(-TAIL_SLICE):s.tail;
    tail.forEach(t=>{ax.push(t.rs_ratio);ay.push(t.rs_momentum)});
  });
  if(!ax.length){ax=[96,104];ay=[96,104]}
  const mg=1.5,xn=Math.min(Math.min(...ax)-mg,C-4),xx=Math.max(Math.max(...ax)+mg,C+4),yn=Math.min(Math.min(...ay)-mg,C-4),yx=Math.max(Math.max(...ay)+mg,C+4);
  const tX=v=>P.l+((v-xn)/(xx-xn))*iw,tY=v=>P.t+ih-((v-yn)/(yx-yn))*ih,cx=tX(C),cy=tY(C);

  // Quadrant fills
  const qFills=[
    [P.l,P.t,cx-P.l,cy-P.t,'rgba(59,130,246,.05)'],
    [cx,P.t,W-P.r-cx,cy-P.t,'rgba(34,197,94,.05)'],
    [P.l,cy,cx-P.l,H-P.b-cy,'rgba(239,68,68,.05)'],
    [cx,cy,W-P.r-cx,H-P.b-cy,'rgba(234,179,8,.05)']
  ];
  qFills.forEach(([x,y,w,h,f])=>{ctx.fillStyle=f;ctx.fillRect(x,y,w,h)});

  // Quadrant labels
  ctx.textAlign='center';ctx.font='600 11px Orbitron';
  const qLabels=[
    [(P.l+cx)/2,P.t+18,'IMPROVING','rgba(59,130,246,.35)'],
    [(cx+W-P.r)/2,P.t+18,'LEADING','rgba(34,197,94,.35)'],
    [(P.l+cx)/2,H-P.b-8,'LAGGING','rgba(239,68,68,.35)'],
    [(cx+W-P.r)/2,H-P.b-8,'WEAKENING','rgba(234,179,8,.35)']
  ];
  qLabels.forEach(([x,y,t,c])=>{ctx.fillStyle=c;ctx.fillText(t,x,y)});

  // Grid lines
  for(let v=Math.ceil(xn);v<=Math.floor(xx);v++){
    const x=tX(v),ic=v===C;
    ctx.beginPath();ctx.moveTo(x,P.t);ctx.lineTo(x,H-P.b);
    ctx.strokeStyle=ic?'#475569':'#1e293b';ctx.lineWidth=ic?1.5:.5;
    if(!ic)ctx.setLineDash([2,4]);else ctx.setLineDash([]);
    ctx.stroke();ctx.setLineDash([]);
    if(v%2===0){ctx.fillStyle='#475569';ctx.font='9px JetBrains Mono';ctx.textAlign='center';ctx.fillText(v,x,H-P.b+16)}
  }
  for(let v=Math.ceil(yn);v<=Math.floor(yx);v++){
    const y=tY(v),ic=v===C;
    ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(W-P.r,y);
    ctx.strokeStyle=ic?'#475569':'#1e293b';ctx.lineWidth=ic?1.5:.5;
    if(!ic)ctx.setLineDash([2,4]);else ctx.setLineDash([]);
    ctx.stroke();ctx.setLineDash([]);
    if(v%2===0){ctx.fillStyle='#475569';ctx.font='9px JetBrains Mono';ctx.textAlign='end';ctx.fillText(v,P.l-6,y+3)}
  }

  // Axis labels
  ctx.fillStyle='#64748b';ctx.font='10px JetBrains Mono';ctx.textAlign='center';
  ctx.fillText('JdK RS-RATIO →',W/2,H-4);
  ctx.save();ctx.translate(12,H/2);ctx.rotate(-Math.PI/2);ctx.fillText('JdK RS-MOMENTUM →',0,0);ctx.restore();

  // Label collision avoidance
  const labelPositions=[];
  function findLabelPos(idealX,idealY,text){
    ctx.font='500 9px JetBrains Mono';
    const tw=ctx.measureText(text).width+4,th=12;
    const offsets=[[8,-8],[8,14],[-tw-8,-8],[-tw-8,14],[8,-22],[8,26],[-tw-8,-22]];
    for(const[dx,dy]of offsets){
      const lx=idealX+dx,ly=idealY+dy;
      const overlap=labelPositions.some(p=>!(lx>p.x+p.w||lx+tw<p.x||ly>p.y+p.h||ly+th<p.y));
      if(!overlap){labelPositions.push({x:lx,y:ly,w:tw,h:th});return{x:lx,y:ly}}
    }
    const pos={x:idealX+8,y:idealY-8};labelPositions.push({x:pos.x,y:pos.y,w:tw,h:th});return pos;
  }

  // Draw trails
  items.forEach(sec=>{
    const isH=HIGHLIGHT===sec.symbol,op=HIGHLIGHT&&!isH?.12:1;
    let tail=TAIL_SLICE?sec.tail.slice(-TAIL_SLICE):sec.tail;
    // Animation: show only up to ANIM_FRAME
    if(ANIM_PLAYING&&ANIM_FRAME<tail.length)tail=tail.slice(0,ANIM_FRAME+1);
    if(tail.length<2)return;

    ctx.save();ctx.globalAlpha=op;

    // Neon glow trail
    if(isH||!HIGHLIGHT){
      ctx.shadowColor=sec.color;ctx.shadowBlur=isH?12:6;
    }
    ctx.beginPath();
    tail.forEach((t,i)=>{const x=tX(t.rs_ratio),y=tY(t.rs_momentum);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
    ctx.strokeStyle=sec.color;ctx.lineWidth=isH?3:1.8;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
    ctx.shadowBlur=0;

    // Trail dots with gradient opacity
    tail.forEach((t,i)=>{
      const x=tX(t.rs_ratio),y=tY(t.rs_momentum),last=i===tail.length-1;
      const dotOp=0.3+0.7*(i/(tail.length-1));
      ctx.globalAlpha=op*dotOp;
      ctx.beginPath();
      const r=last?(isH?7:5):2.5;
      ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle=sec.color;ctx.fill();
      if(last){
        ctx.strokeStyle='#0c1018';ctx.lineWidth=2;ctx.stroke();
        // Animated pulsing glow on current position
        const pulse=Math.sin(Date.now()/300)*0.5+0.5; // 0→1 oscillation
        const pulse2=Math.sin(Date.now()/500)*0.5+0.5;
        // Inner glow ring
        ctx.globalAlpha=op*(0.15+0.35*pulse);
        ctx.shadowColor=sec.color;ctx.shadowBlur=isH?20*pulse:10*pulse;
        ctx.beginPath();ctx.arc(x,y,r+3+3*pulse,0,Math.PI*2);
        ctx.strokeStyle=sec.color;ctx.lineWidth=2;ctx.stroke();
        ctx.shadowBlur=0;
        // Outer glow ring
        ctx.globalAlpha=op*(0.08+0.18*pulse2);
        ctx.beginPath();ctx.arc(x,y,r+8+5*pulse2,0,Math.PI*2);
        ctx.strokeStyle=sec.color;ctx.lineWidth=1;ctx.stroke();
        // Core bright flash
        ctx.globalAlpha=op*(0.5+0.5*pulse);
        ctx.beginPath();ctx.arc(x,y,r*0.4,0,Math.PI*2);
        ctx.fillStyle='#fff';ctx.fill();
      }
    });
    ctx.globalAlpha=op;

    // Direction arrow
    const l=tail[tail.length-1],p=tail[tail.length-2];
    const lx=tX(l.rs_ratio),ly=tY(l.rs_momentum),px=tX(p.rs_ratio),py=tY(p.rs_momentum);
    const a=Math.atan2(ly-py,lx-px),al=9;
    ctx.beginPath();
    ctx.moveTo(lx,ly);
    ctx.lineTo(lx+al*Math.cos(a+2.6),ly+al*Math.sin(a+2.6));
    ctx.lineTo(lx+al*Math.cos(a-2.6),ly+al*Math.sin(a-2.6));
    ctx.closePath();ctx.fillStyle=sec.color;ctx.fill();

    // Label with collision avoidance
    if(op>.5){
      const nm=sec.name.replace('Nifty ','');
      const pos=findLabelPos(lx,ly,nm);
      ctx.font=(isH?'700':'500')+' '+(isH?'11':'9')+'px JetBrains Mono';
      ctx.fillStyle=sec.color;ctx.textAlign='left';ctx.globalAlpha=Math.min(op+.2,1);
      ctx.fillText(nm,pos.x,pos.y);
    }
    ctx.restore();
  });

  // Mouse interaction
  canvas.onmousemove=e=>{
    const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
    let cl=null,cd=20;
    items.forEach(sec=>{
      const tail=TAIL_SLICE?sec.tail.slice(-TAIL_SLICE):sec.tail;
      const t=tail[tail.length-1];if(!t)return;
      const d=Math.hypot(mx-tX(t.rs_ratio),my-tY(t.rs_momentum));
      if(d<cd){cd=d;cl=sec}
    });
    const tt=document.getElementById('tt');
    if(cl){
      tt.style.display='block';
      tt.style.left=(e.clientX-el.closest('.rp').getBoundingClientRect().left+14)+'px';
      tt.style.top=(e.clientY-el.closest('.rp').getBoundingClientRect().top-10)+'px';
      tt.innerHTML=`<b style="color:${cl.color}">${cl.name}</b><span style="font-size:9px;color:var(--t3)">${cl.quadrant}</span><div style="margin-top:4px">RS-Ratio: <b>${cl.current.rs_ratio.toFixed(2)}</b><br>RS-Mom: <b>${cl.current.rs_momentum.toFixed(2)}</b></div>${!DRILLDOWN&&MODE==='sectors'?'<div style="margin-top:4px;font-size:9px;color:var(--cyan)">Double-click → drill-down</div>':''}`;
      if(HIGHLIGHT!==cl.symbol){HIGHLIGHT=cl.symbol;drawChart(items)}
    }else{tt.style.display='none';if(HIGHLIGHT){HIGHLIGHT=null;drawChart(items)}}
  };
  canvas.onmouseleave=()=>{document.getElementById('tt').style.display='none';if(HIGHLIGHT){HIGHLIGHT=null;drawChart(items)}};
  if(!DRILLDOWN&&MODE==='sectors'){
    canvas.ondblclick=e=>{
      const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
      let cl=null,cd=20;
      items.forEach(sec=>{const t=sec.tail[sec.tail.length-1];if(!t)return;const d=Math.hypot(mx-tX(t.rs_ratio),my-tY(t.rs_momentum));if(d<cd){cd=d;cl=sec}});
      if(cl)drill(cl.symbol);
    }
  }
}

// ═══ ACTIONS ═══
function setMode(m){DRILLDOWN=null;MODE=m;HIGHLIGHT=null;TAIL_SLICE=null;stopAnim();render()}
function setTF(t){TF=t;HIGHLIGHT=null;TAIL_SLICE=null;stopAnim();render()}
function setLimit(v){STOCK_LIMIT=v;render()}
function setBench(b){BENCH=b;DRILLDOWN=null;HIGHLIGHT=null;TAIL_SLICE=null;stopAnim();render()}
function filterSidebar(v){SIDEBAR_FILTER=v;render()}
function hl(sym){
  HIGHLIGHT=sym;
  const bd=getBD(),tf=bd[TF]||bd.daily;
  let items;
  if(DRILLDOWN&&bd.drilldown&&bd.drilldown[DRILLDOWN]){
    const dd=bd.drilldown[DRILLDOWN];
    items=TF==='weekly'?(dd.weekly||[]):TF==='monthly'?(dd.monthly||dd.weekly||[]):(dd.daily||[]);
    if(STOCK_LIMIT!=='all')items=items.slice(0,parseInt(STOCK_LIMIT));
  }else{items=MODE==='etfs'?(tf.etfs||[]):MODE==='assets'?(tf.asset_classes||[]):MODE==='segments'?(tf.market_segments||[]):(tf.sectors||[])}
  drawChart(items);
}
function drill(sym){const bd=getBD();if(bd.drilldown&&bd.drilldown[sym]){DRILLDOWN=sym;HIGHLIGHT=null;TAIL_SLICE=null;stopAnim();render()}else{alert('No drill-down data for this sector yet.\nRun the RRM GitHub Action to generate stock-level data.')}}
function exitDrill(){DRILLDOWN=null;HIGHLIGHT=null;TAIL_SLICE=null;stopAnim();render()}

// Animation
function toggleAnim(){ANIM_PLAYING?stopAnim():startAnim()}
function startAnim(){
  ANIM_PLAYING=true;ANIM_FRAME=1;
  const bd=getBD(),tf=bd[TF]||bd.daily;
  let items=MODE==='etfs'?(tf.etfs||[]):MODE==='assets'?(tf.asset_classes||[]):MODE==='segments'?(tf.market_segments||[]):(tf.sectors||[]);
  const maxTail=Math.max(...items.map(s=>s.tail?.length||0),2);
  ANIM_TIMER=setInterval(()=>{
    ANIM_FRAME++;
    if(ANIM_FRAME>=maxTail){ANIM_FRAME=maxTail;stopAnim()}
    drawChart(items);
  },400);
  render();
}
function stopAnim(){ANIM_PLAYING=false;if(ANIM_TIMER){clearInterval(ANIM_TIMER);ANIM_TIMER=null}ANIM_FRAME=0}

// Tail slider
function setTailSlice(v){
  TAIL_SLICE=v;
  const lbl=document.getElementById('tail-count');if(lbl)lbl.textContent=v+' pts';
  const bd=getBD(),tf=bd[TF]||bd.daily;
  let items;
  if(DRILLDOWN&&bd.drilldown&&bd.drilldown[DRILLDOWN]){
    const dd=bd.drilldown[DRILLDOWN];items=TF==='weekly'?(dd.weekly||[]):(dd.daily||[]);
    if(STOCK_LIMIT!=='all')items=items.slice(0,parseInt(STOCK_LIMIT));
  }else{items=MODE==='etfs'?(tf.etfs||[]):MODE==='assets'?(tf.asset_classes||[]):MODE==='segments'?(tf.market_segments||[]):(tf.sectors||[])}
  drawChart(items);
}

// Fullscreen
function toggleFS(){FULLSCREEN=!FULLSCREEN;document.querySelector('.d').classList.toggle('fs',FULLSCREEN);render()}

// Export
function exportChart(format){
  const canvas=document.getElementById('rrm-canvas');if(!canvas)return;
  if(format==='png'){
    const link=document.createElement('a');link.download=`RRM_${TF}_${DATA?.metadata?.date||'export'}.png`;
    link.href=canvas.toDataURL('image/png');link.click();
  }else{
    // SVG export: create an SVG from canvas (simplified)
    const svgData=`<svg xmlns="http://www.w3.org/2000/svg" width="${canvas.width}" height="${canvas.height}"><foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml"><img src="${canvas.toDataURL('image/png')}" width="${canvas.width}" height="${canvas.height}"/></div></foreignObject></svg>`;
    const blob=new Blob([svgData],{type:'image/svg+xml'});
    const link=document.createElement('a');link.download=`RRM_${TF}_${DATA?.metadata?.date||'export'}.svg`;
    link.href=URL.createObjectURL(blob);link.click();
  }
}

// ═══ INIT ═══
async function init(){
  let d=null;
  try{const r=await fetch('./data/rrm_data.json',{cache:'no-store'});if(r.ok){d=await r.json();if(d?.benchmarks_data&&Object.keys(d.benchmarks_data).length>0)IS_LIVE=true;else d=null}}catch(e){console.warn('RRM fetch:',e)}
  if(!d){try{const r=await fetch('./data/rrg_data.json',{cache:'no-store'});if(r.ok){d=await r.json();if(d?.benchmarks_data&&Object.keys(d.benchmarks_data).length>0)IS_LIVE=true;else d=null}}catch(e){console.warn('RRG fallback fetch:',e)}}
  if(!d){d=SAMPLE;IS_LIVE=false}
  DATA=d;BENCH=d.default_benchmark||Object.keys(d.available_benchmarks||{})[0]||'^NSEI';
  await new Promise(r=>setTimeout(r,300));render();
  // Continuous animation loop for pulsating glow on tips (~20fps)
  let _lastPulse=0;
  (function pulseLoop(t){requestAnimationFrame(pulseLoop);if(DATA&&t-_lastPulse>50){_lastPulse=t;render()}})(0);
  // Resize handler
  window.addEventListener('resize',()=>{if(DATA)render()});
}
init();
</script>
