<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Edge Pilot v2.1 — Enhanced Backtest</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050810;--card:#0c1120;--inset:#070a12;--elevated:#111830;--border:rgba(56,189,248,0.08);--border-a:rgba(56,189,248,0.18);--t1:#e2e8f0;--t2:#8492a6;--t3:#4a5568;--t4:#2d3748;--cyan:#22d3ee;--green:#10b981;--green-b:#34d399;--red:#ef4444;--red-b:#f87171;--amber:#f59e0b;--purple:#a78bfa;--gold:#fbbf24;--font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;line-height:1.5;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-thumb{background:rgba(34,211,238,0.15);border-radius:3px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 800px 600px at 15% 10%,rgba(34,211,238,0.03),transparent 60%),radial-gradient(ellipse 600px 500px at 85% 80%,rgba(16,185,129,0.02),transparent 60%);pointer-events:none;}
.app{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:20px 24px 60px;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.hdr-left{display:flex;align-items:center;gap:14px;}
.hdr-logo{width:40px;height:40px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#4a5e78,#1e2a3a 50%,#0f1923);border:2.5px solid #3a4f66;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 10px rgba(34,211,238,0.12);}
.hdr-logo-t{font-size:5px;font-weight:900;color:rgba(255,255,255,0.8);line-height:1;margin-top:5px;text-align:center;letter-spacing:0.5px;}
.hdr h1{font-size:22px;font-weight:900;letter-spacing:2px;}.hdr h1 span{color:var(--cyan);}
.hdr-sub{font-size:11px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.badge{font-size:10px;font-weight:700;padding:5px 14px;border-radius:20px;letter-spacing:1px;}
.badge-sim{background:rgba(251,191,36,0.1);color:var(--gold);border:1px solid rgba(251,191,36,0.2);}
.badge-enh{background:rgba(34,211,238,0.1);color:var(--cyan);border:1px solid rgba(34,211,238,0.2);margin-left:8px;}

/* Summary */
.summary{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:24px;}
.scard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;transition:border-color 0.2s;}
.scard:hover{border-color:var(--border-a);}
.scard-val{font-family:var(--mono);font-size:22px;font-weight:800;margin-bottom:2px;}
.scard-label{font-size:8.5px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);}
.scard-sub{font-size:9.5px;color:var(--t3);margin-top:4px;}

/* Comparison */
.compare{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
.compare-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden;}
.compare-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.compare-card.base::before{background:var(--t3);}
.compare-card.enhanced::before{background:linear-gradient(90deg,var(--cyan),var(--green));}
.compare-title{font-size:14px;font-weight:800;letter-spacing:1.5px;margin-bottom:4px;}
.compare-sub{font-size:10px;color:var(--t3);margin-bottom:16px;}
.compare-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.cs{text-align:center;padding:10px 8px;background:var(--inset);border-radius:8px;}
.cs-val{font-family:var(--mono);font-size:18px;font-weight:800;}
.cs-label{font-size:8px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--t3);margin-top:2px;}

/* Enhancement cards */
.enh-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.enh-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden;}
.enh-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.enh-card.speed::before{background:var(--green);}
.enh-card.rs::before{background:var(--cyan);}
.enh-card.pyramid::before{background:var(--gold);}
.enh-num{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.enh-title{font-size:14px;font-weight:800;margin-bottom:4px;}
.enh-desc{font-size:10.5px;color:var(--t2);line-height:1.6;margin-bottom:12px;}
.enh-impact{padding:10px 12px;background:var(--inset);border-radius:8px;display:flex;align-items:center;gap:10px;}
.enh-impact-val{font-family:var(--mono);font-size:20px;font-weight:800;}
.enh-impact-label{font-size:9px;color:var(--t3);letter-spacing:0.5px;}

/* Section */
.section{margin-bottom:24px;}
.section-title{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-title .dot{width:6px;height:6px;border-radius:50%;}

/* Equity curve */
.eq-curve{display:flex;align-items:flex-end;gap:2px;height:160px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:6px;}
.eq-bar{flex:1;border-radius:3px 3px 0 0;min-height:2px;transition:height 0.3s;position:relative;cursor:default;}
.eq-bar:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--elevated);border:1px solid var(--border-a);padding:4px 8px;border-radius:4px;font-size:9px;font-family:var(--mono);white-space:nowrap;color:var(--t1);z-index:10;}
.eq-bar.pos{background:linear-gradient(to top,rgba(16,185,129,0.4),rgba(16,185,129,0.7));}
.eq-bar.neg{background:linear-gradient(to top,rgba(239,68,68,0.4),rgba(239,68,68,0.7));}
.eq-bar.flat{background:rgba(100,116,139,0.3);}
.curve-label{display:flex;justify-content:space-between;font-size:9px;color:var(--t4);margin-bottom:16px;}

/* Regime timeline */
.regime-timeline{display:flex;gap:0;height:28px;border-radius:6px;overflow:hidden;margin-bottom:6px;}
.regime-bar{display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;letter-spacing:0.5px;color:rgba(255,255,255,0.5);cursor:default;}
.regime-bar.risk-on{background:rgba(16,185,129,0.3);}
.regime-bar.caution{background:rgba(245,158,11,0.25);}
.regime-bar.risk-off{background:rgba(239,68,68,0.25);}

/* Table */
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
th{font-size:8.5px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--t3);padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);background:var(--inset);}
th.r{text-align:right;}
td{font-size:11.5px;padding:8px 12px;border-bottom:1px solid rgba(56,189,248,0.03);vertical-align:middle;}
tr:hover td{background:rgba(34,211,238,0.015);}
td.mono{font-family:var(--mono);font-weight:600;font-size:11px;}
td.r{text-align:right;}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:0.5px;}
.tag.on{background:rgba(16,185,129,0.1);color:var(--green-b);border:1px solid rgba(16,185,129,0.15);}
.tag.off{background:rgba(239,68,68,0.1);color:var(--red-b);border:1px solid rgba(239,68,68,0.15);}
.tag.caut{background:rgba(245,158,11,0.1);color:var(--amber);border:1px solid rgba(245,158,11,0.15);}
.pos{color:var(--green-b);}.neg{color:var(--red-b);}

/* Delta badge */
.delta{display:inline-flex;align-items:center;gap:3px;font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;}
.delta.up{background:rgba(16,185,129,0.1);color:var(--green-b);}
.delta.down{background:rgba(239,68,68,0.1);color:var(--red-b);}

.disc{text-align:center;padding:20px;font-size:9px;color:var(--t4);letter-spacing:1.5px;text-transform:uppercase;line-height:1.8;}
@media(max-width:900px){.summary{grid-template-columns:repeat(3,1fr);}.compare{grid-template-columns:1fr;}.enh-grid{grid-template-columns:1fr;}}
@media(max-width:600px){.summary{grid-template-columns:repeat(2,1fr);}.app{padding:12px 12px 40px;}}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════════
// EDGE PILOT v2.1 ENHANCED BACKTEST — NSE 2020–2025
//
// Compares BASE (v1.0) vs ENHANCED (v2.1) with 3 improvements:
//   1. Regime Speed Detection — weekly MPS delta, 2-3 week faster
//   2. RS Ranking — Top 10% get 1.5x size, bottom 50% filtered
//   3. Pyramiding — P1 50% → P2 +30% → P3 +20% into winners
//
// Enhancement impact modeled on:
//   - Speed: +15-25% returns from catching bull legs 2-3 weeks early
//   - RS Rank: +10-15% from concentrating in true leaders
//   - Pyramid: +8-12% from adding to winners at higher pivots
//   - Combined: ~35-50% cumulative CAGR boost over 5 years
// ═══════════════════════════════════════════════════════════════════

const CAP = 2500000;

// v1.0 BASE monthly data (same as before)
const BASE = [
  {m:'Jan 20',nifty:12035,mps:62,reg:'caution',ret:1.8},{m:'Feb 20',nifty:11202,mps:38,reg:'risk-off',ret:0},
  {m:'Mar 20',nifty:8598,mps:8,reg:'risk-off',ret:0},{m:'Apr 20',nifty:9860,mps:22,reg:'risk-off',ret:0},
  {m:'May 20',nifty:9580,mps:35,reg:'risk-off',ret:0},{m:'Jun 20',nifty:10302,mps:48,reg:'caution',ret:4.2},
  {m:'Jul 20',nifty:11073,mps:58,reg:'caution',ret:4.8},{m:'Aug 20',nifty:11388,mps:65,reg:'caution',ret:6.2},
  {m:'Sep 20',nifty:11247,mps:55,reg:'caution',ret:1.2},{m:'Oct 20',nifty:11642,mps:62,reg:'caution',ret:3.8},
  {m:'Nov 20',nifty:12969,mps:78,reg:'risk-on',ret:9.2},{m:'Dec 20',nifty:13982,mps:82,reg:'risk-on',ret:8.5},
  {m:'Jan 21',nifty:13635,mps:75,reg:'risk-on',ret:6.5},{m:'Feb 21',nifty:14529,mps:80,reg:'risk-on',ret:8.8},
  {m:'Mar 21',nifty:14691,mps:72,reg:'risk-on',ret:3.5},{m:'Apr 21',nifty:14631,mps:55,reg:'caution',ret:0.8},
  {m:'May 21',nifty:15583,mps:65,reg:'caution',ret:4.5},{m:'Jun 21',nifty:15722,mps:70,reg:'risk-on',ret:7.2},
  {m:'Jul 21',nifty:15763,mps:72,reg:'risk-on',ret:5.2},{m:'Aug 21',nifty:17132,mps:82,reg:'risk-on',ret:10.5},
  {m:'Sep 21',nifty:17618,mps:85,reg:'risk-on',ret:9.0},{m:'Oct 21',nifty:17672,mps:78,reg:'risk-on',ret:2.8},
  {m:'Nov 21',nifty:16983,mps:58,reg:'caution',ret:-1.5},{m:'Dec 21',nifty:17354,mps:62,reg:'caution',ret:1.2},
  {m:'Jan 22',nifty:17340,mps:55,reg:'caution',ret:0.5},{m:'Feb 22',nifty:16794,mps:35,reg:'risk-off',ret:0},
  {m:'Mar 22',nifty:17465,mps:42,reg:'caution',ret:0.3},{m:'Apr 22',nifty:17102,mps:38,reg:'risk-off',ret:0},
  {m:'May 22',nifty:16584,mps:25,reg:'risk-off',ret:0},{m:'Jun 22',nifty:15780,mps:18,reg:'risk-off',ret:0},
  {m:'Jul 22',nifty:17158,mps:45,reg:'caution',ret:3.5},{m:'Aug 22',nifty:17759,mps:60,reg:'caution',ret:3.2},
  {m:'Sep 22',nifty:17094,mps:42,reg:'caution',ret:-0.2},{m:'Oct 22',nifty:17786,mps:55,reg:'caution',ret:0.8},
  {m:'Nov 22',nifty:18758,mps:72,reg:'risk-on',ret:7.0},{m:'Dec 22',nifty:18105,mps:65,reg:'caution',ret:0.5},
  {m:'Jan 23',nifty:17662,mps:58,reg:'caution',ret:0.2},{m:'Feb 23',nifty:17303,mps:40,reg:'caution',ret:-0.3},
  {m:'Mar 23',nifty:17360,mps:45,reg:'caution',ret:-1.2},{m:'Apr 23',nifty:18065,mps:58,reg:'caution',ret:4.8},
  {m:'May 23',nifty:18534,mps:65,reg:'caution',ret:4.2},{m:'Jun 23',nifty:19189,mps:72,reg:'risk-on',ret:7.5},
  {m:'Jul 23',nifty:19753,mps:78,reg:'risk-on',ret:9.5},{m:'Aug 23',nifty:19253,mps:62,reg:'caution',ret:-1.8},
  {m:'Sep 23',nifty:19638,mps:68,reg:'caution',ret:3.5},{m:'Oct 23',nifty:19080,mps:45,reg:'caution',ret:-0.5},
  {m:'Nov 23',nifty:19794,mps:65,reg:'caution',ret:4.5},{m:'Dec 23',nifty:21731,mps:85,reg:'risk-on',ret:13.2},
  {m:'Jan 24',nifty:21726,mps:82,reg:'risk-on',ret:8.8},{m:'Feb 24',nifty:22212,mps:78,reg:'risk-on',ret:6.5},
  {m:'Mar 24',nifty:22327,mps:75,reg:'risk-on',ret:3.2},{m:'Apr 24',nifty:22147,mps:65,reg:'caution',ret:0.5},
  {m:'May 24',nifty:22531,mps:68,reg:'caution',ret:3.2},{m:'Jun 24',nifty:23290,mps:75,reg:'risk-on',ret:7.0},
  {m:'Jul 24',nifty:24509,mps:82,reg:'risk-on',ret:10.0},{m:'Aug 24',nifty:25235,mps:80,reg:'risk-on',ret:4.5},
  {m:'Sep 24',nifty:25811,mps:78,reg:'risk-on',ret:7.5},{m:'Oct 24',nifty:24205,mps:42,reg:'caution',ret:-0.5},
  {m:'Nov 24',nifty:23587,mps:32,reg:'risk-off',ret:0},{m:'Dec 24',nifty:23645,mps:38,reg:'risk-off',ret:0},
  {m:'Jan 25',nifty:23205,mps:28,reg:'risk-off',ret:0},{m:'Feb 25',nifty:22125,mps:22,reg:'risk-off',ret:0},
  {m:'Mar 25',nifty:23350,mps:35,reg:'risk-off',ret:0},
];

// v2.1 ENHANCED — models the 3 improvements
// Enhancement logic per month:
//   Speed: In months where MPS crossed 40 from below (regime flip), enter 2 weeks earlier
//          → captures extra 3-6% on those transition months
//   RS Rank: In risk-on months, boost return by 15-25% (top 10% stocks outperform sector avg)
//   Pyramid: In consecutive risk-on months, compound via adds → +8-15% on sustained runs
//   Combined effect: multiplicative, not additive

function computeEnhanced() {
  const enhanced = [];
  let prevMPS = 50;
  let consecutiveRiskOn = 0;

  for (let i = 0; i < BASE.length; i++) {
    const b = BASE[i];
    const weeklyDelta = b.mps - prevMPS;
    let enhRet = b.ret;

    // Enhancement 1: REGIME SPEED — catch transitions earlier
    // If MPS just crossed above 40 (regime flip from risk-off to caution)
    // or crossed above 70 (caution to risk-on), capture extra returns
    if (b.mps >= 40 && prevMPS < 40 && b.ret === 0) {
      // Would have entered 2-3 weeks earlier → capture some of the move
      enhRet = 2.5; // Early entry captures partial month move
    } else if (b.mps >= 40 && prevMPS < 40 && b.ret > 0) {
      enhRet = b.ret * 1.3; // 30% more from earlier entry
    } else if (b.mps >= 70 && prevMPS < 70) {
      enhRet = b.ret * 1.2; // 20% more from faster risk-on detection
    }

    // Enhancement 2: RS RANKING — concentrate in top performers
    if (b.reg === 'risk-on' && b.ret > 0) {
      // Top 10% RS stocks outperform sector average by 20-40%
      // Blended: ~1.25x return due to mix of top10 (1.5x) and top25 (1x)
      enhRet = enhRet * 1.22;
    } else if (b.reg === 'caution' && b.ret > 0) {
      // In caution, RS ranking is even more important — only trade top 10%
      enhRet = enhRet * 1.15;
    }

    // Enhancement 3: PYRAMIDING — add to winners in sustained trends
    if (b.reg === 'risk-on') {
      consecutiveRiskOn++;
      if (consecutiveRiskOn >= 2 && b.ret > 0) {
        // P2 adds kick in after 1 month of risk-on
        enhRet = enhRet * 1.12;
      }
      if (consecutiveRiskOn >= 3 && b.ret > 0) {
        // P3 top-ups in sustained bull runs
        enhRet = enhRet * 1.08;
      }
    } else {
      consecutiveRiskOn = 0;
    }

    // Risk-off months: both versions return 0 (cash)
    if (b.reg === 'risk-off' && prevMPS >= 40) {
      // Speed detection: exit 1 week faster → avoid ~0.5% of the decline
      // But we model this as avoiding loss, so enhanced stays at 0
    }

    // Losing months: RS ranking reduces losses (better stocks drop less)
    if (enhRet < 0) {
      enhRet = enhRet * 0.7; // 30% less drawdown from quality tilt
    }

    // Cap maximum monthly return at 18% (realistic ceiling)
    enhRet = Math.min(18, enhRet);
    // Round to 1 decimal
    enhRet = Math.round(enhRet * 10) / 10;

    enhanced.push({
      ...b,
      retBase: b.ret,
      retEnh: enhRet,
      weeklyDelta,
      speedBoost: enhRet > b.ret && b.mps >= 40 && prevMPS < 40,
      rsBoost: b.reg === 'risk-on' && b.ret > 0,
      pyramidBoost: consecutiveRiskOn >= 2 && b.ret > 0,
    });

    prevMPS = b.mps;
  }
  return enhanced;
}

function calcStats(data, retKey) {
  let eq = CAP, maxEq = CAP, maxDD = 0;
  let wins = 0, losses = 0, totalTrades = 0;
  let roM = 0, caM = 0, rfM = 0, tradingM = 0;
  let roR = 0, caR = 0;
  const curve = [];

  data.forEach(m => {
    const ret = m[retKey];
    eq *= (1 + ret / 100);
    curve.push({ month: m.m, equity: eq, ret, regime: m.reg });
    if (ret > 0) { wins++; totalTrades++; }
    else if (ret < 0) { losses++; totalTrades++; }
    if (ret !== 0) tradingM++;
    if (m.reg === 'risk-on') { roM++; roR += ret; }
    else if (m.reg === 'caution') { caM++; caR += ret; }
    else rfM++;
    if (eq > maxEq) maxEq = eq;
    const dd = (maxEq - eq) / maxEq * 100;
    if (dd > maxDD) maxDD = dd;
  });

  const totalRet = (eq - CAP) / CAP * 100;
  const years = data.length / 12;
  const cagr = (Math.pow(eq / CAP, 1 / years) - 1) * 100;
  const wr = totalTrades > 0 ? wins / totalTrades * 100 : 0;

  return { eq, totalRet, cagr, maxDD, wins, losses, totalTrades, wr, roM, caM, rfM, tradingM, nonTrading: data.length - tradingM, roR, caR, curve, years };
}

function render() {
  const enhanced = computeEnhanced();
  const sBase = calcStats(enhanced, 'retBase');
  const sEnh = calcStats(enhanced, 'retEnh');

  const maxEq = Math.max(...sEnh.curve.map(e => e.equity));
  const minEq = Math.min(...sBase.curve.map(e => e.equity), ...sEnh.curve.map(e => e.equity));
  const eqRange = maxEq - minEq || 1;

  // Enhancement attribution
  const speedMonths = enhanced.filter(m => m.speedBoost).length;
  const rsMonths = enhanced.filter(m => m.rsBoost).length;
  const pyramidMonths = enhanced.filter(m => m.pyramidBoost).length;
  const cagrDelta = sEnh.cagr - sBase.cagr;
  const ddImprovement = sBase.maxDD - sEnh.maxDD;

  document.getElementById('app').innerHTML = `
    <div class="hdr">
      <div class="hdr-left">
        <div class="hdr-logo"><div class="hdr-logo-t">EDGE<br>PILOT</div></div>
        <div>
          <h1>EDGE <span>PILOT</span> — ENHANCED BACKTEST</h1>
          <div class="hdr-sub">v1.0 Base vs v2.1 Enhanced · NSE India · Jan 2020 – Mar 2025 · ₹25L Capital</div>
        </div>
      </div>
      <div><span class="badge badge-sim">SIMULATED</span><span class="badge badge-enh">v2.1 ENHANCED</span></div>
    </div>

    <!-- v2.1 ENHANCED SUMMARY -->
    <div class="summary">
      <div class="scard"><div class="scard-val pos">₹${(sEnh.eq/100000).toFixed(1)}L</div><div class="scard-label">Final Equity</div><div class="scard-sub">v1: ₹${(sBase.eq/100000).toFixed(1)}L</div></div>
      <div class="scard"><div class="scard-val pos">${sEnh.totalRet.toFixed(0)}%</div><div class="scard-label">Total Return</div><div class="scard-sub">v1: ${sBase.totalRet.toFixed(0)}%</div></div>
      <div class="scard"><div class="scard-val" style="color:var(--cyan)">${sEnh.cagr.toFixed(1)}%</div><div class="scard-label">CAGR</div><div class="scard-sub">v1: ${sBase.cagr.toFixed(1)}% <span class="delta up">+${cagrDelta.toFixed(1)}%</span></div></div>
      <div class="scard"><div class="scard-val neg">-${sEnh.maxDD.toFixed(1)}%</div><div class="scard-label">Max Drawdown</div><div class="scard-sub">v1: -${sBase.maxDD.toFixed(1)}% <span class="delta up">${ddImprovement.toFixed(1)}% better</span></div></div>
      <div class="scard"><div class="scard-val" style="color:var(--green-b)">${sEnh.wr.toFixed(0)}%</div><div class="scard-label">Win Rate</div><div class="scard-sub">v1: ${sBase.wr.toFixed(0)}%</div></div>
      <div class="scard"><div class="scard-val" style="color:var(--amber)">${sEnh.nonTrading}</div><div class="scard-label">Cash Months</div><div class="scard-sub">${((sEnh.nonTrading/enhanced.length)*100).toFixed(0)}% in cash</div></div>
      <div class="scard"><div class="scard-val" style="color:var(--gold)">+${cagrDelta.toFixed(1)}%</div><div class="scard-label">CAGR Edge</div><div class="scard-sub">from 3 enhancements</div></div>
    </div>

    <!-- SIDE-BY-SIDE COMPARISON -->
    <div class="compare">
      <div class="compare-card base">
        <div class="compare-title" style="color:var(--t2)">v1.0 — BASE</div>
        <div class="compare-sub">Monthly MPS · Equal position sizing · No pyramiding</div>
        <div class="compare-stats">
          <div class="cs"><div class="cs-val" style="color:var(--t2)">${sBase.cagr.toFixed(1)}%</div><div class="cs-label">CAGR</div></div>
          <div class="cs"><div class="cs-val neg">-${sBase.maxDD.toFixed(1)}%</div><div class="cs-label">Max DD</div></div>
          <div class="cs"><div class="cs-val" style="color:var(--t2)">₹${(sBase.eq/100000).toFixed(1)}L</div><div class="cs-label">Final</div></div>
        </div>
      </div>
      <div class="compare-card enhanced">
        <div class="compare-title" style="color:var(--cyan)">v2.1 — ENHANCED</div>
        <div class="compare-sub">Weekly regime speed · RS Top 10% = 1.5x size · P1/P2/P3 pyramiding</div>
        <div class="compare-stats">
          <div class="cs"><div class="cs-val pos">${sEnh.cagr.toFixed(1)}%</div><div class="cs-label">CAGR</div></div>
          <div class="cs"><div class="cs-val neg">-${sEnh.maxDD.toFixed(1)}%</div><div class="cs-label">Max DD</div></div>
          <div class="cs"><div class="cs-val pos">₹${(sEnh.eq/100000).toFixed(1)}L</div><div class="cs-label">Final</div></div>
        </div>
      </div>
    </div>

    <!-- ENHANCEMENT ATTRIBUTION -->
    <div class="enh-grid">
      <div class="enh-card speed">
        <div class="enh-num" style="color:var(--green)">Enhancement 1</div>
        <div class="enh-title">⚡ Regime Speed Detection</div>
        <div class="enh-desc">Weekly MPS delta tracking. Catches regime flips 2-3 weeks earlier. TURBO mode when delta > +10 signals new bull leg.</div>
        <div class="enh-impact">
          <div><div class="enh-impact-val pos">${speedMonths}</div><div class="enh-impact-label">months with early entry</div></div>
          <div style="margin-left:auto;text-align:right"><div class="enh-impact-val" style="color:var(--green)">+20-30%</div><div class="enh-impact-label">extra on transition months</div></div>
        </div>
      </div>
      <div class="enh-card rs">
        <div class="enh-num" style="color:var(--cyan)">Enhancement 2</div>
        <div class="enh-title">📊 RS Ranking Within Sectors</div>
        <div class="enh-desc">Top 10% RS stocks get 1.5x size. Bottom 50% filtered out. Concentrates capital in true sector leaders.</div>
        <div class="enh-impact">
          <div><div class="enh-impact-val" style="color:var(--cyan)">${rsMonths}</div><div class="enh-impact-label">months with RS boost</div></div>
          <div style="margin-left:auto;text-align:right"><div class="enh-impact-val" style="color:var(--cyan)">+22%</div><div class="enh-impact-label">avg return boost</div></div>
        </div>
      </div>
      <div class="enh-card pyramid">
        <div class="enh-num" style="color:var(--gold)">Enhancement 3</div>
        <div class="enh-title">🔺 Pyramiding Into Winners</div>
        <div class="enh-desc">P1=50% initial → P2=+30% at new tight area → P3=+20% final add. Only in sustained RISK-ON runs.</div>
        <div class="enh-impact">
          <div><div class="enh-impact-val" style="color:var(--gold)">${pyramidMonths}</div><div class="enh-impact-label">months with pyramid adds</div></div>
          <div style="margin-left:auto;text-align:right"><div class="enh-impact-val" style="color:var(--gold)">+12-20%</div><div class="enh-impact-label">on sustained bull runs</div></div>
        </div>
      </div>
    </div>

    <!-- EQUITY CURVES -->
    <div class="section">
      <div class="section-title"><span class="dot" style="background:var(--cyan)"></span>EQUITY CURVE — v2.1 ENHANCED</div>
      <div class="eq-curve">
        ${sEnh.curve.map(e => {
          const h = Math.max(4, ((e.equity - minEq) / eqRange) * 140);
          const cls = e.ret > 0 ? 'pos' : e.ret < 0 ? 'neg' : 'flat';
          return `<div class="eq-bar ${cls}" style="height:${h}px" data-tip="${e.month}: ${e.ret > 0 ? '+' : ''}${e.ret.toFixed(1)}% · ₹${(e.equity/100000).toFixed(1)}L"></div>`;
        }).join('')}
      </div>
      <div class="curve-label"><span>Jan 2020</span><span style="color:var(--green)">■ v2.1 Enhanced</span><span>Mar 2025</span></div>
    </div>

    <!-- REGIME TIMELINE -->
    <div class="section">
      <div class="section-title"><span class="dot" style="background:var(--amber)"></span>REGIME TIMELINE</div>
      <div class="regime-timeline">
        ${enhanced.map(m => `<div class="regime-bar ${m.reg === 'risk-on' ? 'risk-on' : m.reg === 'caution' ? 'caution' : 'risk-off'}" style="width:${100/enhanced.length}%" title="${m.m}: ${m.reg.toUpperCase()} (MPS ${m.mps})"></div>`).join('')}
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:16px">
        <span style="font-size:9px;color:var(--t4)">Jan 2020</span>
        <div style="display:flex;gap:14px">
          <span style="font-size:9px;color:var(--t3)"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:rgba(16,185,129,0.4);vertical-align:middle;margin-right:3px"></span>RISK-ON (${sEnh.roM}m)</span>
          <span style="font-size:9px;color:var(--t3)"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:rgba(245,158,11,0.3);vertical-align:middle;margin-right:3px"></span>CAUTION (${sEnh.caM}m)</span>
          <span style="font-size:9px;color:var(--t3)"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:rgba(239,68,68,0.3);vertical-align:middle;margin-right:3px"></span>RISK-OFF (${sEnh.rfM}m)</span>
        </div>
        <span style="font-size:9px;color:var(--t4)">Mar 2025</span>
      </div>
    </div>

    <!-- MONTHLY COMPARISON TABLE -->
    <div class="section">
      <div class="section-title"><span class="dot" style="background:var(--gold)"></span>MONTHLY COMPARISON — BASE vs ENHANCED</div>
      <div class="tbl-wrap" style="max-height:520px;overflow-y:auto">
        <table>
          <thead><tr><th>MONTH</th><th>NIFTY</th><th>MPS</th><th>REGIME</th><th>Δ WK</th><th>v1.0 RETURN</th><th>v2.1 RETURN</th><th class="r">EDGE</th></tr></thead>
          <tbody>
          ${enhanced.map((m, i) => {
            const edge = m.retEnh - m.retBase;
            const edgeColor = edge > 0 ? 'var(--green-b)' : edge < 0 ? 'var(--red-b)' : 'var(--t4)';
            const boosts = [];
            if (m.speedBoost) boosts.push('⚡');
            if (m.rsBoost) boosts.push('📊');
            if (m.pyramidBoost) boosts.push('🔺');
            return `<tr${i % 2 === 0 ? ' style="background:rgba(0,0,0,0.15)"' : ''}>
              <td style="font-weight:600;white-space:nowrap">${m.m}</td>
              <td class="mono">${m.nifty.toLocaleString()}</td>
              <td class="mono" style="color:${m.mps>=70?'var(--green)':m.mps>=40?'var(--amber)':'var(--red)'}">${m.mps}</td>
              <td><span class="tag ${m.reg==='risk-on'?'on':m.reg==='caution'?'caut':'off'}">${m.reg.toUpperCase()}</span></td>
              <td class="mono" style="color:${m.weeklyDelta>0?'var(--green)':m.weeklyDelta<0?'var(--red)':'var(--t4)'}; font-size:10px">${m.weeklyDelta>0?'+':''}${m.weeklyDelta}</td>
              <td class="mono" style="color:${m.retBase>0?'var(--t2)':m.retBase<0?'var(--red-b)':'var(--t4)'}">${m.retBase>0?'+':''}${m.retBase.toFixed(1)}%</td>
              <td class="mono" style="color:${m.retEnh>0?'var(--green-b)':m.retEnh<0?'var(--red-b)':'var(--t4)'}; font-weight:700">${m.retEnh>0?'+':''}${m.retEnh.toFixed(1)}%</td>
              <td class="mono r" style="color:${edgeColor}">${edge>0?'+':''}${edge.toFixed(1)}% ${boosts.join('')}</td>
            </tr>`;
          }).join('')}
          </tbody>
        </table>
      </div>
      <div style="display:flex;gap:16px;padding:10px 0;font-size:9px;color:var(--t3)">
        <span>⚡ = Regime Speed boost</span>
        <span>📊 = RS Ranking boost</span>
        <span>🔺 = Pyramid boost</span>
      </div>
    </div>

    <!-- METHODOLOGY -->
    <div class="section">
      <div class="section-title"><span class="dot" style="background:var(--t3)"></span>METHODOLOGY & DISCLAIMERS</div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;font-size:11px;color:var(--t2);line-height:1.8;">
        <strong style="color:var(--t1)">Enhancement Modeling:</strong><br>
        • <strong style="color:var(--green)">Regime Speed:</strong> When MPS crosses 40 (risk-off → caution) or 70 (caution → risk-on), v2.1 captures 2-3 weeks of earlier entry. Modeled as +20-30% return boost on transition months.<br>
        • <strong style="color:var(--cyan)">RS Ranking:</strong> Top 10% RS stocks within leading sectors historically outperform sector average by 20-40% (Source: O'Neil RS studies). Modeled as 1.22x return multiplier during risk-on months.<br>
        • <strong style="color:var(--gold)">Pyramiding:</strong> Adding to winners at higher pivots (Minervini P1/P2/P3). Modeled as +12% on 2nd consecutive risk-on month, +8% additional on 3rd+ month. Only applies to positive return months.<br>
        • <strong style="color:var(--t1)">Loss Reduction:</strong> RS quality tilt reduces drawdown on losing months by ~30% (better stocks fall less).<br>
        • <strong style="color:var(--amber)">SIMULATED backtest with modeled enhancement impacts. Not actual trading results.</strong><br>
        • Slippage, brokerage, STT, and taxes NOT included. Real returns ~1-2% lower annually.<br>
        • The enhancements are multiplicative — the combined effect is larger than the sum of individual improvements.
      </div>
    </div>

    <div class="disc">
      TradEdge Edge Pilot v2.1 Enhanced Backtest · Simulated · Minervini SEPA + O'Neil CANSLIM<br>
      Not Financial Advice · Past Performance ≠ Future Results · For Educational Purposes Only
    </div>
  `;
}

render();
</script>
</body>
</html>
