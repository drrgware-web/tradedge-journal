<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edge Pilot — Backtest Report (NSE 2020–2025)</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#050810;--card:#0c1120;--inset:#070a12;--elevated:#111830;
  --border:rgba(56,189,248,0.08);--border-a:rgba(56,189,248,0.18);
  --t1:#e2e8f0;--t2:#8492a6;--t3:#4a5568;--t4:#2d3748;
  --cyan:#22d3ee;--green:#10b981;--green-b:#34d399;--red:#ef4444;--red-b:#f87171;
  --amber:#f59e0b;--purple:#a78bfa;--gold:#fbbf24;
  --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;line-height:1.5;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-thumb{background:rgba(34,211,238,0.15);border-radius:3px;}

body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 800px 600px at 15% 10%,rgba(34,211,238,0.03),transparent 60%),radial-gradient(ellipse 600px 500px at 85% 80%,rgba(16,185,129,0.02),transparent 60%);pointer-events:none;}
.app{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:20px 24px 60px;}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.hdr-left{display:flex;align-items:center;gap:14px;}
.hdr-logo{width:40px;height:40px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#4a5e78,#1e2a3a 50%,#0f1923);border:2.5px solid #3a4f66;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 10px rgba(34,211,238,0.12);}
.hdr-logo-t{font-size:5px;font-weight:900;color:rgba(255,255,255,0.8);line-height:1;margin-top:5px;text-align:center;letter-spacing:0.5px;}
.hdr h1{font-size:22px;font-weight:900;letter-spacing:2px;}
.hdr h1 span{color:var(--cyan);}
.hdr-sub{font-size:11px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.hdr-badge{font-size:10px;font-weight:700;padding:5px 14px;border-radius:20px;background:rgba(251,191,36,0.1);color:var(--gold);border:1px solid rgba(251,191,36,0.2);letter-spacing:1px;}

/* Summary Cards */
.summary{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:24px;}
.scard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;transition:border-color 0.2s;}
.scard:hover{border-color:var(--border-a);}
.scard-val{font-family:var(--mono);font-size:24px;font-weight:800;margin-bottom:2px;}
.scard-label{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);}
.scard-sub{font-size:10px;color:var(--t3);margin-top:4px;}

/* Regime Timeline */
.section{margin-bottom:24px;}
.section-title{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-title .dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);}

.regime-timeline{display:flex;gap:0;height:36px;border-radius:8px;overflow:hidden;margin-bottom:8px;}
.regime-bar{display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,0.7);transition:opacity 0.2s;cursor:default;position:relative;}
.regime-bar:hover{opacity:0.85;}
.regime-bar.risk-on{background:rgba(16,185,129,0.3);}
.regime-bar.caution{background:rgba(245,158,11,0.25);}
.regime-bar.risk-off{background:rgba(239,68,68,0.25);}
.regime-labels{display:flex;gap:0;margin-bottom:16px;}
.regime-label{font-size:8px;color:var(--t4);text-align:center;letter-spacing:0.5px;}

/* Data Table */
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
th{font-size:9px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--t3);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);background:var(--inset);}
th.r{text-align:right;}
td{font-size:12px;padding:9px 14px;border-bottom:1px solid rgba(56,189,248,0.03);vertical-align:middle;}
tr:hover td{background:rgba(34,211,238,0.015);}
td.mono{font-family:var(--mono);font-weight:600;}
td.r{text-align:right;}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:0.5px;}
.tag.on{background:rgba(16,185,129,0.1);color:var(--green-b);border:1px solid rgba(16,185,129,0.15);}
.tag.off{background:rgba(239,68,68,0.1);color:var(--red-b);border:1px solid rgba(239,68,68,0.15);}
.tag.caut{background:rgba(245,158,11,0.1);color:var(--amber);border:1px solid rgba(245,158,11,0.15);}
.pos{color:var(--green-b);}
.neg{color:var(--red-b);}
.neut{color:var(--t3);}

/* Equity Curve (CSS bars) */
.eq-curve{display:flex;align-items:flex-end;gap:2px;height:160px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;}
.eq-bar{flex:1;border-radius:3px 3px 0 0;min-height:2px;transition:height 0.3s;position:relative;cursor:default;}
.eq-bar:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--elevated);border:1px solid var(--border-a);padding:4px 8px;border-radius:4px;font-size:9px;font-family:var(--mono);white-space:nowrap;color:var(--t1);z-index:10;}
.eq-bar.pos{background:linear-gradient(to top,rgba(16,185,129,0.4),rgba(16,185,129,0.7));}
.eq-bar.neg{background:linear-gradient(to top,rgba(239,68,68,0.4),rgba(239,68,68,0.7));}
.eq-bar.flat{background:rgba(100,116,139,0.3);}

/* Two Column */
.cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}

/* Gate Analysis */
.gate-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--inset);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;}
.gate-num{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-family:var(--mono);font-size:11px;font-weight:700;flex-shrink:0;}
.gate-info{flex:1;}
.gate-name{font-size:12px;font-weight:700;letter-spacing:0.5px;}
.gate-detail{font-size:10px;color:var(--t3);}
.gate-stat{text-align:right;}
.gate-stat-val{font-family:var(--mono);font-size:16px;font-weight:700;}
.gate-stat-label{font-size:8px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;}

/* Trade Log */
.trade-log{max-height:400px;overflow-y:auto;}

/* Disclaimer */
.disc{text-align:center;padding:20px;font-size:9px;color:var(--t4);letter-spacing:1.5px;text-transform:uppercase;line-height:1.8;}

/* Responsive */
@media(max-width:900px){.summary{grid-template-columns:repeat(3,1fr);}.cols{grid-template-columns:1fr;}}
@media(max-width:600px){.summary{grid-template-columns:repeat(2,1fr);}.app{padding:12px 12px 40px;}}
</style>
</head>

// ── COMPUTE AGGREGATES ──
function computeStats() {
  let equity = STARTING_CAPITAL;
  const equityCurve = [];
  let totalTrades = 0, totalWins = 0, totalLosses = 0;
  let maxEquity = equity, maxDD = 0;
  let riskOnMonths = 0, cautionMonths = 0, riskOffMonths = 0;
  let riskOnReturn = 0, cautionReturn = 0;
  let tradingMonths = 0;

  BACKTEST_DATA.forEach(m => {
    const prevEquity = equity;
    equity = equity * (1 + m.monthReturn / 100);
    equityCurve.push({ month: m.month, equity, ret: m.monthReturn, regime: m.regime });

    if (m.regime === 'risk-on') { riskOnMonths++; riskOnReturn += m.monthReturn; }
    else if (m.regime === 'caution') { cautionMonths++; cautionReturn += m.monthReturn; }
    else { riskOffMonths++; }

    totalTrades += m.trades;
    const wins = Math.round(m.trades * m.winRate / 100);
    totalWins += wins;
    totalLosses += (m.trades - wins);
    if (m.trades > 0) tradingMonths++;

    if (equity > maxEquity) maxEquity = equity;
    const dd = (maxEquity - equity) / maxEquity * 100;
    if (dd > maxDD) maxDD = dd;
  });

  const totalReturn = ((equity - STARTING_CAPITAL) / STARTING_CAPITAL * 100);
  const years = BACKTEST_DATA.length / 12;
  const cagr = (Math.pow(equity / STARTING_CAPITAL, 1 / years) - 1) * 100;
  const winRate = totalTrades > 0 ? (totalWins / totalTrades * 100) : 0;
  const nonTradingMonths = BACKTEST_DATA.length - tradingMonths;

  return {
    equity, totalReturn, cagr, maxDD, totalTrades, totalWins, totalLosses, winRate,
    riskOnMonths, cautionMonths, riskOffMonths, tradingMonths, nonTradingMonths,
    riskOnReturn, cautionReturn, equityCurve, years
  };
}
