<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradEdge — MATRIX v4.3</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#050810;--surface:rgba(255,255,255,0.02);--surface2:rgba(255,255,255,0.035);--border:rgba(255,255,255,0.05);--border2:rgba(255,255,255,0.08);--green:#00ff88;--yellow:#ffd000;--blue:#00c8ff;--red:#ff3366;--cyan:#00e5ff;--mono:'JetBrains Mono',monospace;--sans:'Outfit',sans-serif;--text:#fff;--text2:rgba(255,255,255,0.45);--text3:rgba(255,255,255,0.18)}
    *{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
    #loading{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}
    #loading .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
    #loading .brand{font-family:var(--mono);font-size:15px;font-weight:700;letter-spacing:.2em;background:linear-gradient(90deg,var(--green),var(--cyan),var(--green));background-size:200% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s ease-in-out infinite}
    #loading .sub{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:.08em}
    @keyframes spin{to{transform:rotate(360deg)}}@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}.fade-in{animation:fadeIn .25s ease-out both}
    @keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
    .macro-card{transition:all .25s ease}.macro-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
    .rotation-cell:hover{filter:brightness(1.3);transform:scale(1.05)}.corr-cell:hover{outline:1px solid rgba(255,255,255,.3);z-index:1}
    .analysis-toggle{cursor:pointer;user-select:none;transition:all .2s}.analysis-toggle:hover{background:rgba(255,255,255,.03)}
    .nav-btn{transition:all .2s ease;position:relative}.nav-btn:hover{transform:translateY(-1px)}.filter-btn{transition:all .15s ease}.filter-btn:hover{transform:scale(1.03)}
    .thm-pill{transition:all .15s ease}.thm-pill:hover{transform:scale(1.04)}
    .logo-fallback{display:none;width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#0ea5e9,#6366f1,#a855f7);align-items:center;justify-content:center;font-family:var(--mono);font-size:14px;font-weight:800;color:#fff;text-shadow:0 0 8px rgba(255,255,255,.3)}
    .stale-banner{background:linear-gradient(90deg,rgba(255,51,102,.06),rgba(255,208,0,.06));border:1px solid rgba(255,51,102,.15);border-radius:8px;padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:10px;color:var(--yellow);animation:fadeIn .3s ease-out}
    .stale-banner .stale-age{color:var(--red);font-weight:700}
  </style>
</head>
<body>
<a href="dashboard.html" style="position:fixed;top:10px;left:10px;z-index:9998;padding:4px 10px;font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:600;color:#00ff88;background:rgba(6,8,12,.85);border:1px solid rgba(0,255,136,.25);border-radius:5px;text-decoration:none;backdrop-filter:blur(8px);transition:all .15s;opacity:.7" onmouseenter="this.style.opacity='1';this.style.borderColor='rgba(0,255,136,.6)'" onmouseleave="this.style.opacity='.7';this.style.borderColor='rgba(0,255,136,.25)'">⌂ Home</a>
  <div id="root"><div id="loading"><div class="spinner"></div><div class="brand">MATRIX</div><div class="sub">Multi-Asset Timeframe Rating & Intelligence X-ray</div></div></div>
  <script type="text/babel">
const{useState,useMemo,useCallback,useEffect,useRef}=React;
const DATA_URL='./data/rrm_data.json';
const Q_COLORS={Leading:'#00ff88',Improving:'#00c8ff',Weakening:'#ffd000',Lagging:'#ff3366'};
const LIGHT_MAP={GREEN:'#00ff88',YELLOW:'#ffd000',BLUE:'#00c8ff',RED:'#ff3366'};
const GROUP_META=[{key:'sectors',label:'Sectors',icon:'◉',desc:'16 NSE Sector Indices'},{key:'thematic_indices',label:'Thematic',icon:'🏷',desc:'47 Nifty Thematic Indices'},{key:'etfs',label:'ETFs',icon:'◆',desc:'54 NSE ETFs'},{key:'asset_classes',label:'Assets',icon:'◈',desc:'12 Asset Classes'},{key:'market_segments',label:'Segments',icon:'◇',desc:'11 Market Segments'},{key:'global_indices',label:'Global',icon:'🌐',desc:'25 Global Indices'},{key:'custom_stocks',label:'My Stocks',icon:'★',desc:'Custom Watchlist'}];
const BENCHMARKS=[{key:'^NSEI',label:'Nifty 50'},{key:'^NSEBANK',label:'Bank Nifty'},{key:'^CRSLDX',label:'Nifty 500'}];
const THEMATIC_GROUPS=['all','Sectoral','Thematic','Strategy'];

function transformData(raw,benchKey,groupKey){const bm=raw?.benchmarks_data?.[benchKey];if(!bm)return[];const d=bm.daily?.[groupKey]||[],w=bm.weekly?.[groupKey]||[],m=bm.monthly?.[groupKey]||[];const wM={};w.forEach(s=>{wM[s.symbol]=s;});const mM={};m.forEach(s=>{mM[s.symbol]=s;});return d.map(dd=>{const ww=wM[dd.symbol]||{},mm=mM[dd.symbol]||{};return{symbol:dd.symbol,name:dd.name,color:dd.color,group:dd.group||'',daily:{q:dd.quadrant||'',rsr:dd.current?.rs_ratio||100,rsm:dd.current?.rs_momentum||100},weekly:{q:ww.quadrant||'',rsr:ww.current?.rs_ratio||100,rsm:ww.current?.rs_momentum||100},monthly:{q:mm.quadrant||'',rsr:mm.current?.rs_ratio||100,rsm:mm.current?.rs_momentum||100},dailyTail:dd.tail||[],weeklyTail:ww.tail||[],monthlyTail:mm.tail||[]};});}

function computeSignals(item){const{daily:d,weekly:w,monthly:m}=item;const right=q=>q==='Leading'||q==='Improving';let score=0;if(right(m.q))score+=(m.rsr>=100&&m.rsm>=100)?2:1;if(right(w.q))score+=(w.rsr>=100&&w.rsm>=100)?2:1;if(right(d.q))score+=1;score=Math.min(score,5);let light;if(right(m.q)&&right(w.q)&&right(d.q))light='GREEN';else if(right(m.q)&&!right(w.q)&&right(d.q))light='YELLOW';else if(!right(m.q)&&right(w.q)&&right(d.q))light='BLUE';else light='RED';const weeklyMomOk=w.rsm>=98&&w.rsm<=106;const rsiOk=right(w.q)&&weeklyMomOk;let sz=0;if(w.rsr>100)sz++;if(weeklyMomOk)sz++;const rsiVal=item?.weekly?.rsi||null;if(rsiVal?(rsiVal>=40&&rsiVal<=60):(w.rsm>=98&&w.rsm<=103))sz++;if(right(w.q))sz++;if(score>=3)sz++;let action;if(score>=4&&rsiOk)action='AGGRESSIVE BUY';else if(score>=3&&rsiOk)action='BUY ON DIP';else if(light==='YELLOW')action='HOOK ENTRY';else if(light==='BLUE')action='SCALP ONLY';else if(score>=3)action='HOLD';else action='AVOID';return{score,light,rsiOk,action,sz,rsiVal};}

const Dot=({color,active,s=7})=><span style={{display:'inline-block',width:s,height:s,borderRadius:'50%',background:active?color:'rgba(255,255,255,0.04)',boxShadow:active?`0 0 8px ${color}40`:'none',transition:'all .3s'}}/>;
const QBadge=({q})=>{const c=Q_COLORS[q]||'#444';return<span style={{padding:'2px 8px',borderRadius:4,border:`1px solid ${c}20`,background:`${c}06`,color:c,fontSize:10,fontWeight:600,fontFamily:'var(--mono)'}}>{q||'—'}</span>;};
const ScoreBar=({score})=>{const c=score>=4?'#00ff88':score>=3?'#ffd000':'#ff3366';return<div style={{display:'flex',alignItems:'center',gap:6,minWidth:75}}><div style={{flex:1,height:3,borderRadius:2,background:'rgba(255,255,255,0.04)',overflow:'hidden'}}><div style={{width:`${(score/5)*100}%`,height:'100%',background:c,borderRadius:2,boxShadow:`0 0 8px ${c}25`,transition:'width .5s ease'}}/></div><span style={{color:c,fontWeight:700,fontSize:12,fontFamily:'var(--mono)',width:14,textAlign:'right'}}>{score}</span></div>;};
const SZBadge=({sz})=>{const c=sz>=4?'#00ff88':sz>=3?'#ffd000':sz>=2?'#00c8ff':'#ff3366';return<div style={{display:'flex',alignItems:'center',gap:3,minWidth:45}} title={`SZ:${sz}/5`}><span style={{fontSize:10,color:c}}>{sz>=4?'★':sz>=3?'◆':sz>=2?'◇':'·'}</span><span style={{fontSize:10,fontWeight:700,fontFamily:'var(--mono)',color:c,padding:'1px 5px',borderRadius:3,background:`${c}08`,border:`1px solid ${c}15`}}>{sz}/5</span></div>;};
const Sparkline=({data,width=60,height=20,color='#00c8ff'})=>{if(!data||data.length<2)return null;const vals=data.map(d=>d.rs_ratio);const min=Math.min(...vals),max=Math.max(...vals),range=max-min||1;return<svg width={width} height={height} style={{display:'block'}}><polyline points={vals.map((v,i)=>`${(i/(vals.length-1))*width},${height-((v-min)/range)*(height-2)-1}`).join(' ')} fill="none" stroke={color} strokeWidth="1.2" strokeLinejoin="round"/></svg>;};

const AssetRow=({item,sig,expanded,onToggle,showGroup})=>{const lc=LIGHT_MAP[sig.light];return<div style={{borderBottom:'1px solid rgba(255,255,255,0.02)'}} className="fade-in"><div onClick={onToggle} style={{display:'grid',gridTemplateColumns:'2fr 1.2fr 1fr 0.7fr 0.5fr 0.9fr 1.2fr',alignItems:'center',gap:6,padding:'6px 12px',cursor:'pointer',background:expanded?'rgba(255,255,255,0.02)':'transparent',transition:'background .2s'}}><div><div style={{display:'flex',alignItems:'center',gap:6}}><span style={{color:'#fff',fontWeight:600,fontSize:12,fontFamily:'var(--mono)',lineHeight:1.3}}>{item.name}</span>{showGroup&&item.group&&<span style={{fontSize:7,padding:'1px 5px',borderRadius:8,background:'rgba(255,255,255,.03)',color:'var(--text3)',fontFamily:'var(--mono)',letterSpacing:'.05em',textTransform:'uppercase',fontWeight:600}}>{item.group.slice(0,3)}</span>}</div><div style={{color:'rgba(255,255,255,0.18)',fontSize:9,fontFamily:'var(--mono)',marginTop:1}}>{item.symbol}</div></div><div style={{display:'flex',gap:3,alignItems:'center'}}>{['GREEN','YELLOW','BLUE','RED'].map(l=><Dot key={l} color={LIGHT_MAP[l]} active={sig.light===l}/>)}<span style={{fontSize:8,color:lc,fontFamily:'var(--mono)',fontWeight:700,marginLeft:3}}>{sig.light}</span></div><ScoreBar score={sig.score}/><SZBadge sz={sig.sz}/><span style={{fontSize:10,fontFamily:'var(--mono)',fontWeight:600,textAlign:'center',color:sig.rsiOk?'#00ff88':'rgba(255,255,255,0.08)'}}>{sig.rsiOk?'✓':'✗'}</span><QBadge q={item.weekly.q}/><span style={{padding:'3px 6px',borderRadius:4,fontSize:9,fontWeight:700,fontFamily:'var(--mono)',textAlign:'center',whiteSpace:'nowrap',color:lc,background:`${lc}06`,border:`1px solid ${lc}12`}}>{sig.action}</span></div>{expanded&&<div style={{padding:'4px 12px 10px',display:'grid',gridTemplateColumns:'repeat(3,minmax(0,1fr))',gap:6}}>{[['DAILY',item.daily,item.dailyTail],['WEEKLY',item.weekly,item.weeklyTail],['MONTHLY',item.monthly,item.monthlyTail]].map(([label,tf,tail])=>{const qc=Q_COLORS[tf.q]||'#444';return<div key={label} style={{background:'rgba(255,255,255,0.012)',borderRadius:6,padding:'8px 10px',border:`1px solid ${qc}10`}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}><span style={{fontSize:8,color:'var(--text3)',fontWeight:700,letterSpacing:'.12em',fontFamily:'var(--mono)'}}>{label}</span><QBadge q={tf.q}/></div><div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}><div style={{display:'flex',gap:12}}><div><div style={{fontSize:7,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:1}}>RS-R</div><div style={{fontSize:14,fontWeight:700,color:tf.rsr>=100?'#00ff88':'#ff3366',fontFamily:'var(--mono)'}}>{tf.rsr.toFixed(1)}</div></div><div><div style={{fontSize:7,color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:1}}>RS-M</div><div style={{fontSize:14,fontWeight:700,color:tf.rsm>=100?'#00ff88':'#ff3366',fontFamily:'var(--mono)'}}>{tf.rsm.toFixed(1)}</div></div></div><Sparkline data={tail} color={qc} width={48} height={18}/></div></div>;})}</div>}</div>;};

const MacroPulse=({rrmData,benchmark})=>{const macroItems=useMemo(()=>{if(!rrmData)return[];const all=[...transformData(rrmData,benchmark,'market_segments'),...transformData(rrmData,benchmark,'asset_classes'),...transformData(rrmData,benchmark,'global_indices'),...transformData(rrmData,benchmark,'sectors')];return['Gold','Silver','Crude Oil','USD/INR','Bitcoin','US 10Y Yield','Dow Jones','S&P 500','NASDAQ'].map(k=>all.find(a=>a.name?.includes(k)||a.symbol?.includes(k.toUpperCase().replace(/\s/g,'')))).filter(Boolean).map(item=>({...item,sig:computeSignals(item)}));},[rrmData,benchmark]);if(!macroItems.length)return null;return<div style={{marginBottom:14}}><div style={{fontSize:8,color:'var(--text3)',fontWeight:700,letterSpacing:'.15em',fontFamily:'var(--mono)',marginBottom:8}}>MACRO PULSE</div><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(110px,1fr))',gap:6}}>{macroItems.map(m=>{const qc=Q_COLORS[m.weekly.q]||'#444';return<div key={m.symbol} className="macro-card" style={{background:`${qc}05`,border:`1px solid ${qc}10`,borderRadius:8,padding:'10px 12px',cursor:'default',borderLeft:`2px solid ${qc}40`}}><div style={{fontSize:9.5,color:'var(--text2)',fontFamily:'var(--mono)',marginBottom:5,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',fontWeight:500}}>{m.name}</div><div style={{display:'flex',alignItems:'baseline',gap:5}}><span style={{fontSize:20,fontWeight:800,color:qc,fontFamily:'var(--mono)',lineHeight:1}}>{m.weekly.rsr.toFixed(0)}</span><span style={{fontSize:14,color:m.weekly.rsm>=100?'#00ff88':'#ff3366',fontWeight:700}}>{m.weekly.rsm>=100?'↑':'↓'}</span></div><div style={{fontSize:8,color:`${qc}90`,fontFamily:'var(--mono)',marginTop:4,fontWeight:500}}>{m.weekly.q}</div></div>;})}</div></div>;};

const StaleBanner=({rrmData})=>{if(!rrmData?.metadata?.generated_at)return null;const gen=new Date(rrmData.metadata.generated_at);const now=new Date();const hrs=Math.floor((now-gen)/(1000*60*60));if(hrs<18)return null;const days=Math.floor(hrs/24);const ageStr=days>0?`${days}d ${hrs%24}h`:`${hrs}h`;return<div className="stale-banner"><span style={{fontSize:16}}>⚠️</span><span>Data is <span className="stale-age">{ageStr}</span> old — last updated {rrmData.metadata.date}. Run the GitHub Action to refresh.</span></div>;};

const ThematicFilter=({items,activeSubGroup,setActiveSubGroup})=>{const counts=useMemo(()=>{const c={all:items.length,Sectoral:0,Thematic:0,Strategy:0};items.forEach(i=>{if(c[i.group]!==undefined)c[i.group]++;});return c;},[items]);return<div style={{display:'flex',gap:3,marginTop:6,alignItems:'center'}}>{THEMATIC_GROUPS.map(g=>{const active=activeSubGroup===g;const ct=counts[g]||0;const c=g==='all'?'#fff':'#ffd000';return<button key={g} className="thm-pill" onClick={()=>setActiveSubGroup(g)} style={{padding:'3px 10px',borderRadius:12,fontSize:9,fontWeight:600,cursor:'pointer',border:`1px solid ${active?c+'30':'var(--border)'}`,background:active?`${c}08`:'transparent',color:active?c:'var(--text3)',fontFamily:'var(--mono)',letterSpacing:'.03em'}}>{g==='all'?'All':g} <span style={{opacity:.4}}>{ct}</span></button>;})}</div>;};

const SectorRotationMap=({enriched})=>{const quadrants=useMemo(()=>{const q={Leading:[],Improving:[],Weakening:[],Lagging:[]};enriched.forEach(item=>{if(q[item.weekly.q])q[item.weekly.q].push(item);});return q;},[enriched]);const total=enriched.length||1;const rotating=useMemo(()=>enriched.filter(item=>item.daily.q!==item.weekly.q).map(item=>({...item,from:item.weekly.q,to:item.daily.q})),[enriched]);return<div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:12}}><div style={{fontSize:9,color:'var(--text2)',fontWeight:700,letterSpacing:'.1em',fontFamily:'var(--mono)',marginBottom:10}}>SECTOR ROTATION MAP — Weekly</div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:10}}>{['Leading','Improving','Weakening','Lagging'].map(qName=>{const items=quadrants[qName];const qc=Q_COLORS[qName];const icons={Leading:'◉',Improving:'◈',Weakening:'◆',Lagging:'◇'};return<div key={qName} style={{background:`${qc}04`,border:`1px solid ${qc}12`,borderRadius:6,padding:'8px 10px'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}><span style={{fontSize:10,fontWeight:700,color:qc,fontFamily:'var(--mono)'}}>{icons[qName]} {qName.toUpperCase()}</span><span style={{fontSize:11,fontWeight:700,color:qc,fontFamily:'var(--mono)'}}>{items.length} <span style={{fontSize:9,opacity:.5}}>({((items.length/total)*100).toFixed(0)}%)</span></span></div><div style={{display:'flex',flexWrap:'wrap',gap:3}}>{items.map(item=>{const isR=rotating.find(r=>r.symbol===item.symbol);return<span key={item.symbol} className="rotation-cell" style={{fontSize:9.5,fontFamily:'var(--mono)',fontWeight:600,padding:'2px 5px',borderRadius:3,background:isR?`${Q_COLORS[isR.to]}15`:'rgba(255,255,255,0.03)',color:isR?Q_COLORS[isR.to]:'var(--text2)',border:isR?`1px solid ${Q_COLORS[isR.to]}25`:'1px solid transparent',cursor:'default',transition:'all .2s'}} title={isR?`${isR.from}→${isR.to}`:item.weekly.q}>{item.name?.replace(/^Nifty\s?/,'').slice(0,10)}{isR&&<span style={{marginLeft:2,fontSize:7}}>→</span>}</span>;})}{items.length===0&&<span style={{fontSize:8,color:'var(--text3)'}}>—</span>}</div></div>;})}</div>{rotating.length>0&&<div style={{borderTop:'1px solid var(--border)',paddingTop:8}}><div style={{fontSize:9,color:'var(--yellow)',fontWeight:700,letterSpacing:'.1em',fontFamily:'var(--mono)',marginBottom:4}}>⚡ ROTATION DETECTED ({rotating.length})</div><div style={{display:'flex',flexWrap:'wrap',gap:4}}>{rotating.map(r=><span key={r.symbol} style={{fontSize:9.5,fontFamily:'var(--mono)',fontWeight:600,padding:'2px 6px',borderRadius:3,background:'rgba(255,208,0,0.06)',border:'1px solid rgba(255,208,0,0.15)',color:'var(--yellow)'}}>{r.name?.replace(/^Nifty\s?/,'')}:{' '}<span style={{color:Q_COLORS[r.from]}}>{r.from?.slice(0,4)}</span>{' → '}<span style={{color:Q_COLORS[r.to]}}>{r.to?.slice(0,4)}</span></span>)}</div></div>}</div>;};

const CorrelationMatrix=({enriched})=>{const matrix=useMemo(()=>{if(enriched.length<2)return null;const n=Math.min(enriched.length,16);const items=enriched.slice(0,n);const corr=[];for(let i=0;i<n;i++){corr[i]=[];for(let j=0;j<n;j++){if(i===j){corr[i][j]=1;continue;}const a=items[i],b=items[j];corr[i][j]=Math.max(0,1-Math.sqrt(Math.pow(a.weekly.rsr-b.weekly.rsr,2)+Math.pow(a.weekly.rsm-b.weekly.rsm,2))/15);}}return{items,corr,n};},[enriched]);if(!matrix||matrix.n<2)return null;const{items,corr,n}=matrix;const cs=Math.min(28,Math.floor(280/n));const gc=v=>v>=.8?'#00ff8850':v>=.6?'#00ff8830':v>=.4?'#00c8ff20':v>=.2?'#ffd00015':'#ff336610';return<div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:12}}><div style={{fontSize:9,color:'var(--text2)',fontWeight:700,letterSpacing:'.1em',fontFamily:'var(--mono)',marginBottom:10}}>RS CORRELATION MATRIX</div><div style={{overflowX:'auto'}}><div style={{display:'inline-grid',gridTemplateColumns:`30px repeat(${n},${cs}px)`,gap:1}}><div/>{items.map((_,j)=><div key={`h${j}`} style={{fontSize:6.5,color:'var(--text3)',fontFamily:'var(--mono)',fontWeight:600,textAlign:'center',height:30,display:'flex',alignItems:'flex-end',justifyContent:'center',paddingBottom:2,writingMode:'vertical-rl',transform:'rotate(180deg)'}}>{items[j].name?.replace(/^Nifty\s?/,'').slice(0,8)}</div>)}{items.map((ri,i)=><React.Fragment key={`r${i}`}><div style={{fontSize:6.5,color:'var(--text3)',fontFamily:'var(--mono)',fontWeight:600,display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:3,whiteSpace:'nowrap',overflow:'hidden'}}>{ri.name?.replace(/^Nifty\s?/,'').slice(0,6)}</div>{items.map((_,j)=><div key={`c${i}${j}`} className="corr-cell" style={{width:cs,height:cs,background:gc(corr[i][j]),borderRadius:2,display:'flex',alignItems:'center',justifyContent:'center',fontSize:7,fontFamily:'var(--mono)',fontWeight:600,color:corr[i][j]>=.5?'#00ff88':'rgba(255,255,255,.15)',cursor:'default'}} title={`${ri.name}↔${items[j].name}: ${(corr[i][j]*100).toFixed(0)}%`}>{i===j?'●':corr[i][j]>=.3?(corr[i][j]*100).toFixed(0):''}</div>)}</React.Fragment>)}</div></div></div>;};
