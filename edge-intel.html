// ═══ TOAST NOTIFICATION SYSTEM ═══
let toastId = 0;
const toastListeners = new Set();
const toasts = [];

const addToast = (message, type = 'info', duration = 4000) => {
  const id = ++toastId;
  const toast = { id, message, type, exiting: false };
  toasts.push(toast);
  toastListeners.forEach(fn => fn([...toasts]));
  
  setTimeout(() => {
    const t = toasts.find(x => x.id === id);
    if (t) t.exiting = true;
    toastListeners.forEach(fn => fn([...toasts]));
    
    setTimeout(() => {
      const idx = toasts.findIndex(x => x.id === id);
      if (idx > -1) toasts.splice(idx, 1);
      toastListeners.forEach(fn => fn([...toasts]));
    }, 300);
  }, duration);
  
  return id;
};

const ToastContainer = () => {
  const [items, setItems] = useState([]);
  
  useEffect(() => {
    toastListeners.add(setItems);
    return () => toastListeners.delete(setItems);
  }, []);
  
  if (!items.length) return null;
  
  return (
    <div className="toast-container">
      {items.map(t => (
        <div key={t.id} className={`toast toast-${t.type} ${t.exiting ? 'toast-exit' : ''}`}>
          {t.type === 'success' && '✓'}
          {t.type === 'error' && '✗'}
          {t.type === 'info' && 'ℹ'}
          <span>{t.message}</span>
        </div>
      ))}
    </div>
  );
};

// ═══ SUPABASE SYNC FUNCTION ═══
const syncTradesToSupabase = async (trades) => {
  try {
    // Check if row exists
    const checkRes = await fetch(
      `${SUPABASE_URL}/rest/v1/tradedge_trades?device_id=eq.${DEVICE_ID}&select=id`,
      {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        }
      }
    );
    const existing = await checkRes.json();
    
    const payload = {
      device_id: DEVICE_ID,
      trades_json: JSON.stringify(trades),
      updated_at: new Date().toISOString()
    };
    
    let res;
    if (existing && existing.length > 0) {
      // Update existing row
      res = await fetch(
        `${SUPABASE_URL}/rest/v1/tradedge_trades?device_id=eq.${DEVICE_ID}`,
        {
          method: 'PATCH',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify(payload)
        }
      );
    } else {
      // Insert new row
      res = await fetch(
        `${SUPABASE_URL}/rest/v1/tradedge_trades`,
        {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify(payload)
        }
      );
    }
    
    if (res.ok) {
      console.log('✓ Trades synced to Supabase');
      return true;
    } else {
      console.error('Supabase sync failed:', res.status);
      return false;
    }
  } catch (e) {
    console.error('Supabase sync error:', e);
    return false;
  }
};

const callGroqAI=async(prompt,systemPrompt="You are an expert equity research analyst.")=>{
  if(!GROQ_API_KEY)throw new Error('Set groq_api_key in localStorage');
  const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Authorization':`Bearer ${GROQ_API_KEY}`,'Content-Type':'application/json'},
    body:JSON.stringify({model:GROQ_MODEL,messages:[{role:'system',content:systemPrompt},{role:'user',content:prompt}],temperature:0.7,max_tokens:2000})
  });
  if(!res.ok)throw new Error('API Error: '+res.status);
  const data=await res.json();
  return data.choices?.[0]?.message?.content||'No response';
};

const formatAIResponse=(text)=>{
  return text
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/^### (.*$)/gm,'<h3>$1</h3>')
    .replace(/^## (.*$)/gm,'<h3>$1</h3>')
    .replace(/^# (.*$)/gm,'<h3>$1</h3>')
    .replace(/\n- /g,'\n• ')
    .replace(/\n\d+\. /g,'\n• ')
    .replace(/🟢|✅|📈|BULLISH/gi,'<span class="bull">$&</span>')
    .replace(/🔴|❌|📉|BEARISH/gi,'<span class="bear">$&</span>')
    .replace(/🟡|⚠️|NEUTRAL/gi,'<span class="neutral">$&</span>')
    .replace(/\n/g,'<br/>');
};

- Current Price: ₹${stockData?.price||'N/A'}

        ].map((m,i)=><div key={i} className="metric-box"><div className="metric-label">{m.label}</div><div className="metric-value" style={{color:m.color}}>{m.value}</div></div>)}
      </div>

      {!analysis&&!loading&&<button className="btn btn-accent" style={{width:'100%',padding:'14px'}} onClick={runAnalysis}>🔍 Generate Institutional Analysis</button>}
      
      {loading&&<div style={{textAlign:'center',padding:40}}><div className="loading-pulse" style={{fontSize:14,color:'var(--accent)'}}>⚡ Analyzing {symbol}...</div><div style={{fontSize:11,color:'var(--text-muted)',marginTop:8}}>Running institutional-grade analysis</div></div>}

              // Calculate new average price
              const totalCost = (oldQty * oldAvg) + (orderQty * entry);
              const newAvg = totalCost / newQty;
              
              // Initialize additions array if not exists
              if(!existingTrade.additions) existingTrade.additions = [];
              
              // Record this addition
              existingTrade.additions.push({
                qty: orderQty,
                price: entry,
                ts: now,
                order_id: orderId
              });
              
              // Update position
              existingTrade.qty = newQty;
              existingTrade.quantity = newQty;
              existingTrade.avg_price = +newAvg.toFixed(2);
              existingTrade.last_updated = now;
              
              trades[existingIdx] = existingTrade;
              
              addToast(`📈 Pyramid: Added ${orderQty} @ ₹${entry} — New Avg: ₹${newAvg.toFixed(2)}, Total: ${newQty} shares`, 'success', 5000);

              setEntry(+newAvg.toFixed(2));
              setQty(newQty);
            }

            return;

                </button>
                <button onClick={()=>setEntry(currentPrice)} style={{padding:'2px 6px',fontSize:8,background:'rgba(0,200,255,0.2)',border:'1px solid var(--accent2)',borderRadius:3,color:'var(--accent2)',cursor:'pointer'}} title="Use CMP as Entry">
                  ↓
                </button>
                {lastCMPUpdate && <span style={{fontSize:7,color:'var(--text-muted)'}}>@{lastCMPUpdate.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>}
              </div>
            </div>
            <input type="number" value={entry} onChange={e=>setEntry(+e.target.value)} style={{width:'100%'}}/>
          </div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:10,color:'var(--accent)',fontFamily:'var(--font-mono)',display:'block',marginBottom:4}}>TARGET ₹</label>
            <input type="number" value={target} onChange={e=>setTarget(+e.target.value)} style={{width:'100%',borderColor:'rgba(0,255,136,0.3)'}}/>
          </div>
          {/* SMART SL INPUT WITH CALCULATOR TOGGLE */}
          <div style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
              <label style={{fontSize:10,color:'var(--red)',fontFamily:'var(--font-mono)'}}>STOP LOSS ₹</label>
              <button onClick={()=>setShowSLCalculator(!showSLCalculator)} style={{fontSize:9,padding:'2px 8px',background:showSLCalculator?'rgba(255,68,85,0.2)':'transparent',border:'1px solid var(--red)',borderRadius:4,color:'var(--red)',cursor:'pointer',fontFamily:'var(--font-mono)'}}>
                {showSLCalculator?'✕ Close':'🧮 Smart SL'}
              </button>
            </div>
            <div style={{display:'flex',gap:6}}>
              <input type="number" value={sl} onChange={e=>setSL(+e.target.value)} style={{flex:1,borderColor:'rgba(255,68,85,0.3)'}}/>
              <div style={{padding:'8px 12px',background:'var(--bg-tertiary)',borderRadius:6,fontSize:10,fontFamily:'var(--font-mono)',color:'var(--red)',display:'flex',alignItems:'center'}}>
                -{((entry-sl)/entry*100).toFixed(1)}%
              </div>
            </div>
            {/* SL Method Badge */}
            <div style={{marginTop:6,display:'flex',gap:6,alignItems:'center'}}>
              <span style={{fontSize:9,color:'var(--text-muted)'}}>Method:</span>
              <span style={{fontSize:9,padding:'2px 6px',background:slMethod==='atr'?'rgba(255,170,0,0.2)':slMethod==='pct'?'rgba(255,136,255,0.2)':slMethod==='ema'?'rgba(0,200,255,0.2)':'rgba(136,68,255,0.2)',color:slMethod==='atr'?'#ffaa00':slMethod==='pct'?'#ff88ff':slMethod==='ema'?'#00c8ff':'#8844ff',borderRadius:4,fontFamily:'var(--font-mono)',fontWeight:700}}>
                {slMethod==='atr'?`${slATRMult}× ATR`:slMethod==='pct'?`${slPct}%`:slMethod==='ema'?`EMA${slEMA}`:slMethod==='fixed'?'Fixed ₹':'Swing'}
              </span>
              <span style={{fontSize:9,color:'var(--text-muted)'}}>= ₹{Math.abs(entry-sl).toFixed(2)} risk/share</span>
            </div>
          </div>
        </div>
        <div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:10,color:'var(--text-muted)',fontFamily:'var(--font-mono)',display:'block',marginBottom:4}}>CAPITAL ₹</label>
            <input type="number" value={capital} onChange={e=>setCapital(+e.target.value)} style={{width:'100%'}}/>
          </div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:10,color:'var(--text-muted)',fontFamily:'var(--font-mono)',display:'block',marginBottom:4}}>RISK PER TRADE %</label>
            <input type="number" value={riskPct} onChange={e=>setRiskPct(+e.target.value)} step={0.5} style={{width:'100%'}}/>
          </div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:10,color:'var(--text-muted)',fontFamily:'var(--font-mono)',display:'block',marginBottom:4}}>QUANTITY</label>
            <input type="number" value={qty} onChange={e=>setQty(+e.target.value)} style={{width:'100%'}}/>
          </div>
        </div>
      </div>

      {/* ═══ SMART SL CALCULATOR PANEL ═══ */}
      {showSLCalculator&&<div className="fade-in" style={{background:'linear-gradient(135deg,rgba(255,68,85,0.05),rgba(200,50,60,0.02))',border:'1px solid rgba(255,68,85,0.2)',borderRadius:12,padding:16,marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
          <span style={{fontSize:18}}>🛡️</span>
          <span style={{fontSize:13,fontWeight:800,fontFamily:'var(--font-mono)',color:'var(--red)'}}>SMART STOP LOSS CALCULATOR</span>
          <span style={{fontSize:9,color:'var(--text-muted)',marginLeft:'auto',fontFamily:'var(--font-mono)'}}>ATR(14) = ₹{atr.toFixed(2)}</span>
        </div>
        
        {/* Method Selector */}
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          {[
            {m:'atr',icon:'📊',label:'ATR Based',desc:'Volatility adjusted',color:'#ffaa00'},
            {m:'pct',icon:'📉',label:'Percentage',desc:'Fixed % below',color:'#ff88ff'},
            {m:'ema',icon:'📈',label:'EMA Support',desc:'Below key EMA',color:'#00c8ff'},
            {m:'fixed',icon:'💰',label:'Fixed ₹ Risk',desc:'Set max loss',color:'#8844ff'},
            {m:'swing',icon:'📍',label:'Swing Low',desc:'Below support',color:'#ff4455'}
          ].map(x=>(
            <button key={x.m} onClick={()=>setSLMethod(x.m)} style={{flex:1,padding:'10px 8px',background:slMethod===x.m?`${x.color}15`:'var(--bg-tertiary)',border:`2px solid ${slMethod===x.m?x.color:'var(--border-dim)'}`,borderRadius:8,cursor:'pointer',transition:'all 0.15s'}}>
              <div style={{fontSize:16,marginBottom:2}}>{x.icon}</div>
              <div style={{fontSize:10,fontWeight:700,color:slMethod===x.m?x.color:'var(--text-primary)',fontFamily:'var(--font-mono)'}}>{x.label}</div>
              <div style={{fontSize:8,color:'var(--text-muted)'}}>{x.desc}</div>
            </button>
          ))}
        </div>
        
        {/* ATR-Based SL */}
        {slMethod==='atr'&&<div>
          <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:8,fontFamily:'var(--font-mono)'}}>Select ATR Multiplier:</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8}}>
            {[1, 1.5, 2, 2.5, 3].map(m=>{
              const slPrice = +(entry - atr * m).toFixed(2);
              const slPctVal = +((atr * m) / entry * 100).toFixed(1);
              const riskAmt = +((entry - slPrice) * (positionSize || qty)).toFixed(0);
              return(
                <div key={m} onClick={()=>applySL('atr',m)} style={{padding:'12px 8px',background:slATRMult===m?'rgba(255,170,0,0.15)':'var(--bg-tertiary)',border:`2px solid ${slATRMult===m?'#ffaa00':'var(--border-dim)'}`,borderRadius:8,cursor:'pointer',textAlign:'center',transition:'all 0.15s'}}>
                  <div style={{fontSize:12,fontWeight:800,color:slATRMult===m?'#ffaa00':'var(--text-muted)',fontFamily:'var(--font-mono)'}}>{m}× ATR</div>
                  <div style={{fontSize:16,fontWeight:900,color:'var(--red)',fontFamily:'var(--font-mono)',margin:'4px 0'}}>₹{slPrice}</div>
                  <div style={{fontSize:9,color:'var(--text-muted)'}}>-{slPctVal}%</div>
                  <div style={{fontSize:9,color:'var(--red)',marginTop:4}}>Risk: ₹{riskAmt}</div>
                </div>
              );
            })}
          </div>
          <div style={{marginTop:10,padding:10,background:'rgba(0,0,0,0.2)',borderRadius:6,fontSize:10,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>
            💡 <strong style={{color:'#ffaa00'}}>Recommended:</strong> 2× ATR gives room for normal volatility. Use 1× for tight stops (scalping), 3× for wide stops (swing).
          </div>
        </div>}
        
        {/* Percentage-Based SL */}
        {slMethod==='pct'&&<div>
          <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:8,fontFamily:'var(--font-mono)'}}>Select Risk Percentage:</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8}}>
            {[2, 3, 4, 5, 7].map(p=>{
              const slPrice = +(entry * (1 - p/100)).toFixed(2);
              const riskAmt = +((entry - slPrice) * (positionSize || qty)).toFixed(0);
              return(
                <div key={p} onClick={()=>applySL('pct',p)} style={{padding:'12px 8px',background:slPct===p?'rgba(255,136,255,0.15)':'var(--bg-tertiary)',border:`2px solid ${slPct===p?'#ff88ff':'var(--border-dim)'}`,borderRadius:8,cursor:'pointer',textAlign:'center',transition:'all 0.15s'}}>
                  <div style={{fontSize:12,fontWeight:800,color:slPct===p?'#ff88ff':'var(--text-muted)',fontFamily:'var(--font-mono)'}}>{p}%</div>
                  <div style={{fontSize:16,fontWeight:900,color:'var(--red)',fontFamily:'var(--font-mono)',margin:'4px 0'}}>₹{slPrice}</div>
                  <div style={{fontSize:9,color:'var(--text-muted)'}}>-₹{(entry*p/100).toFixed(0)}</div>
                  <div style={{fontSize:9,color:'var(--red)',marginTop:4}}>Risk: ₹{riskAmt}</div>
                </div>
              );
            })}
          </div>
        </div>}
        
        {/* EMA-Based SL */}
        {slMethod==='ema'&&<div>
          <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:8,fontFamily:'var(--font-mono)'}}>Place SL Below EMA Support:</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8}}>
            {[{e:10,c:'#00ff88',use:'Scalp'},{e:21,c:'#00c8ff',use:'Swing'},{e:50,c:'#ff88ff',use:'Position'},{e:100,c:'#ffaa00',use:'Trend'},{e:200,c:'#ff4455',use:'Investor'}].map(x=>{
              const slPrice = +(emaValues[x.e] - 2).toFixed(2);
              const slPctVal = +((entry - slPrice) / entry * 100).toFixed(1);
              const riskAmt = +((entry - slPrice) * (positionSize || qty)).toFixed(0);
              return(
                <div key={x.e} onClick={()=>applySL('ema',x.e)} style={{padding:'12px 8px',background:slEMA===x.e?`${x.c}20`:'var(--bg-tertiary)',border:`2px solid ${slEMA===x.e?x.c:'var(--border-dim)'}`,borderRadius:8,cursor:'pointer',textAlign:'center',transition:'all 0.15s'}}>
                  <div style={{fontSize:9,fontWeight:700,color:slEMA===x.e?x.c:'var(--text-muted)'}}>{x.use}</div>
                  <div style={{fontSize:11,fontWeight:800,color:x.c,fontFamily:'var(--font-mono)'}}>EMA {x.e}</div>
                  <div style={{fontSize:14,fontWeight:900,color:'var(--red)',fontFamily:'var(--font-mono)',margin:'4px 0'}}>₹{slPrice}</div>
                  <div style={{fontSize:9,color:'var(--text-muted)'}}>-{slPctVal}%</div>
                  <div style={{fontSize:9,color:'var(--red)',marginTop:4}}>Risk: ₹{riskAmt}</div>
                </div>
              );
            })}
          </div>
          <div style={{marginTop:10,padding:10,background:'rgba(0,0,0,0.2)',borderRadius:6,fontSize:10,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>
            📈 EMA values shown with ₹2 buffer below. <span style={{color:'#00c8ff'}}>EMA21</span> is most popular for swing trading.
          </div>
        </div>}
        
        {/* Fixed ₹ Risk SL */}
        {slMethod==='fixed'&&<div>
          <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:8,fontFamily:'var(--font-mono)'}}>Set Maximum ₹ Loss:</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8,marginBottom:12}}>
            {[500, 1000, 2000, 3000, 5000].map(amt=>{
              const slPrice = +(entry - (amt / (positionSize || qty || 1))).toFixed(2);
              const slPctVal = +((entry - slPrice) / entry * 100).toFixed(1);
              return(
                <div key={amt} onClick={()=>{setSLFixedRisk(amt);applySL('fixed',amt)}} style={{padding:'12px 8px',background:slFixedRisk===amt?'rgba(136,68,255,0.15)':'var(--bg-tertiary)',border:`2px solid ${slFixedRisk===amt?'#8844ff':'var(--border-dim)'}`,borderRadius:8,cursor:'pointer',textAlign:'center',transition:'all 0.15s'}}>
                  <div style={{fontSize:12,fontWeight:800,color:slFixedRisk===amt?'#8844ff':'var(--text-muted)',fontFamily:'var(--font-mono)'}}>₹{amt}</div>
                  <div style={{fontSize:14,fontWeight:900,color:'var(--red)',fontFamily:'var(--font-mono)',margin:'4px 0'}}>₹{slPrice}</div>
                  <div style={{fontSize:9,color:'var(--text-muted)'}}>-{slPctVal}%</div>
                </div>
              );
            })}
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span style={{fontSize:10,color:'var(--text-muted)'}}>Custom:</span>
            <input type="number" value={slFixedRisk} onChange={e=>{setSLFixedRisk(+e.target.value);applySL('fixed',+e.target.value)}} style={{width:100,padding:'8px'}} placeholder="₹ amount"/>
            <span style={{fontSize:10,color:'var(--text-muted)'}}>→ SL @ ₹{(entry - (slFixedRisk / (positionSize || qty || 1))).toFixed(2)}</span>
          </div>
        </div>}
        
        {/* Swing Low SL — AUTO-DETECTED */}
        {slMethod==='swing'&&<div>
          <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:8,fontFamily:'var(--font-mono)'}}>
            {stockData?.swingLows ? '🎯 AUTO-DETECTED SWING LOWS (Daily)' : 'Enter Recent Swing Low:'}
          </div>
          
          {/* Auto-detected swing lows */}
          {stockData?.swingLows && <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:12}}>
            {[
              {key:'low5', label:'5-Day Low', color:'#00ff88'},
              {key:'low10', label:'10-Day Low', color:'#00c8ff'},
              {key:'low20', label:'20-Day Low', color:'#ff88ff'},
              {key:'low50', label:'50-Day Low', color:'#ffaa00'}
            ].map(x => {
              const data = stockData.swingLows[x.key];
              if (!data) return null;
              const slPrice = +(data.price - 2).toFixed(2);
              const riskPct = +((entry - slPrice) / entry * 100).toFixed(1);
              const riskAmt = +((entry - slPrice) * (positionSize || qty)).toFixed(0);
              const isSelected = slSwingLow === data.price;
              return (
                <div key={x.key} onClick={()=>{setSLSwingLow(data.price);applySL('swing',data.price)}} style={{padding:'12px 8px',background:isSelected?`${x.color}20`:'var(--bg-tertiary)',border:`2px solid ${isSelected?x.color:'var(--border-dim)'}`,borderRadius:8,cursor:'pointer',textAlign:'center',transition:'all 0.15s'}}>
                  <div style={{fontSize:9,fontWeight:700,color:isSelected?x.color:'var(--text-muted)'}}>{x.label}</div>
                  <div style={{fontSize:16,fontWeight:900,color:'var(--red)',fontFamily:'var(--font-mono)',margin:'4px 0'}}>₹{data.price}</div>
                  <div style={{fontSize:8,color:x.color}}>{data.date} ({data.daysAgo}d ago)</div>
                  <div style={{fontSize:9,color:'var(--text-muted)',marginTop:4}}>SL: ₹{slPrice} (-{riskPct}%)</div>
                  <div style={{fontSize:9,color:'var(--red)'}}>Risk: ₹{riskAmt}</div>
                </div>
              );
            })}
          </div>}
          
          {/* Manual entry fallback */}
          <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:12}}>
            <span style={{fontSize:10,color:'var(--text-muted)'}}>Or manual:</span>
            <input type="number" value={slSwingLow||''} onChange={e=>setSLSwingLow(+e.target.value)} style={{width:120,padding:'8px',fontSize:12}} placeholder="Price"/>
            <button onClick={()=>applySL('swing',slSwingLow)} disabled={!slSwingLow} style={{padding:'8px 16px',background:slSwingLow?'linear-gradient(135deg,#ff4455,#ff6677)':'var(--bg-tertiary)',border:'none',borderRadius:6,color:slSwingLow?'#fff':'var(--text-muted)',fontWeight:700,cursor:slSwingLow?'pointer':'not-allowed'}}>Apply</button>
          </div>
          
          {slSwingLow>0&&<div style={{padding:12,background:'var(--bg-tertiary)',borderRadius:8,display:'flex',justifyContent:'space-between'}}>
            <div><span style={{color:'var(--text-muted)',fontSize:10}}>Swing Low:</span> <span style={{color:'#ff4455',fontWeight:700}}>₹{slSwingLow}</span></div>
            <div><span style={{color:'var(--text-muted)',fontSize:10}}>SL (₹2 buffer):</span> <span style={{color:'var(--red)',fontWeight:700}}>₹{(slSwingLow-2).toFixed(2)}</span></div>
            <div><span style={{color:'var(--text-muted)',fontSize:10}}>Risk:</span> <span style={{color:'var(--red)',fontWeight:700}}>-{((entry-(slSwingLow-2))/entry*100).toFixed(1)}%</span></div>
          </div>}
          
          <div style={{marginTop:10,padding:10,background:'rgba(0,0,0,0.2)',borderRadius:6,fontSize:10,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>
            📍 {stockData?.swingLows ? 'Swing lows auto-detected from daily chart. Click to apply.' : 'Load stock to auto-detect swing lows, or enter manually.'}
          </div>
        </div>}
        
        {/* Visual Comparison */}
        <div style={{marginTop:16,padding:12,background:'rgba(0,0,0,0.3)',borderRadius:8}}>
          <div style={{fontSize:10,fontWeight:700,color:'var(--text-muted)',marginBottom:10,fontFamily:'var(--font-mono)'}}>📊 VISUAL COMPARISON</div>
          <div style={{position:'relative',height:40,background:'var(--bg-primary)',borderRadius:6,overflow:'hidden'}}>
            {/* Entry marker */}
            <div style={{position:'absolute',right:0,top:0,height:'100%',width:4,background:'var(--accent)'}}/>
            <div style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',fontSize:9,color:'var(--accent)'}}>Entry ₹{entry}</div>
            
            {/* SL levels */}
            {[
              {m:'atr',v:slATRMult,p:+(entry-atr*slATRMult).toFixed(2),c:'#ffaa00',l:`${slATRMult}×ATR`},
              {m:'pct',v:slPct,p:+(entry*(1-slPct/100)).toFixed(2),c:'#ff88ff',l:`${slPct}%`},
              {m:'ema',v:slEMA,p:+(emaValues[slEMA]-2).toFixed(2),c:'#00c8ff',l:`EMA${slEMA}`}
            ].sort((a,b)=>b.p-a.p).map((x,i)=>{
              const pctFromEntry = ((entry-x.p)/entry*100);
              const leftPos = 100 - (pctFromEntry * 10); // Scale for visualization
              return(
                <div key={x.m} style={{position:'absolute',left:`${Math.max(5,leftPos)}%`,top:8+i*10,display:'flex',alignItems:'center',gap:4}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:x.c,border:slMethod===x.m?'2px solid #fff':''}}/>
                  <span style={{fontSize:8,color:x.c,fontFamily:'var(--font-mono)'}}>{x.l} ₹{x.p}</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>}

      <div className="rr-bar" style={{marginBottom:16}}>
        <div className="rr-risk" style={{width:`${100/(1+parseFloat(rr)||1)}%`}}>RISK ₹{risk.toFixed(0)}</div>
        <div className="rr-reward" style={{flex:1}}>REWARD ₹{reward.toFixed(0)}</div>
      </div>

      <div className="trade-setup-grid" style={{marginBottom:20}}>
        <div className="metric-box"><div className="metric-label">R:R RATIO</div><div className="metric-value" style={{color:parseFloat(rr)>=2?'#00ff88':parseFloat(rr)>=1.5?'#ffaa00':'#ff4455'}}>1:{rr}</div></div>
        <div className="metric-box"><div className="metric-label">POSITION SIZE</div><div className="metric-value" style={{color:'#00c8ff'}}>{positionSize}</div></div>
        <div className="metric-box"><div className="metric-label">MAX LOSS</div><div className="metric-value" style={{color:'#ff4455'}}>₹{maxLoss.toFixed(0)}</div></div>
        <div className="metric-box"><div className="metric-label">MAX PROFIT</div><div className="metric-value" style={{color:'#00ff88'}}>₹{maxProfit.toFixed(0)}</div></div>
        <div className="metric-box"><div className="metric-label">POSITION VALUE</div><div className="metric-value" style={{color:'#8844ff'}}>₹{(positionSize*entry).toFixed(0)}</div></div>
        <div className="metric-box"><div className="metric-label">ATR(14)</div><div className="metric-value" style={{color:stockData?.volatility==='HIGH'?'#ff4455':stockData?.volatility==='MEDIUM'?'#ffaa00':'#00ff88'}}>₹{stockData?.atr||atr.toFixed(2)} <span style={{fontSize:9,opacity:0.7}}>({stockData?.atr_pct||(atr/entry*100).toFixed(1)}%)</span></div></div>
      </div>

      {stockData?.atr && <div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap',alignItems:'center'}}>
        <span style={{fontSize:10,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>VOLATILITY:</span>
        <span style={{padding:'3px 8px',borderRadius:4,fontSize:10,fontWeight:700,fontFamily:'var(--font-mono)',background:stockData.volatility==='HIGH'?'rgba(255,68,85,0.2)':stockData.volatility==='MEDIUM'?'rgba(255,170,0,0.2)':'rgba(0,255,136,0.2)',color:stockData.volatility==='HIGH'?'#ff4455':stockData.volatility==='MEDIUM'?'#ffaa00':'#00ff88'}}>{stockData.volatility||'—'}</span>
        <span style={{fontSize:9,color:'var(--text-muted)',marginLeft:8}}>Trail suggestions:</span>
        {[0.5,1,2,3].map(m=><span key={m} style={{fontSize:9,color:'var(--amber)',fontFamily:'var(--font-mono)'}}>₹{(stockData.atr*m).toFixed(0)}({m}×)</span>)}
      </div>}

      <div style={{display:'flex',gap:10,marginBottom:20}}>
        <button className="btn btn-accent" style={{flex:1,padding:'14px'}} onClick={generateSetup} disabled={loading}>
          {loading?'⚡ Generating...':'🎯 Generate AI Trade Plan'}
        </button>
        <button className="btn" style={{padding:'14px',background:showExecution?'rgba(0,255,136,0.1)':'transparent',borderColor:showExecution?'var(--accent)':'var(--border-med)',color:showExecution?'var(--accent)':'var(--text-primary)'}} onClick={()=>setShowExecution(!showExecution)}>
          ⚡ Execute Trade
        </button>

                <div style={{fontSize:18,fontWeight:900,color:'var(--accent)',fontFamily:'var(--font-mono)'}}>₹{entry}</div>
              </div>
              <div style={{textAlign:'center',padding:'12px',background:'var(--bg-tertiary)',borderRadius:8,borderLeft:'3px solid var(--red)'}}>
                <div style={{fontSize:9,color:'var(--text-muted)',marginBottom:4}}>STOP LOSS</div>
                <div style={{fontSize:18,fontWeight:900,color:'var(--red)',fontFamily:'var(--font-mono)'}}>₹{sl}</div>
                <div style={{fontSize:9,color:'var(--red)',marginTop:2}}>-{((entry-sl)/entry*100).toFixed(1)}%</div>

              <div style={{position:'absolute',left:`${((entry-sl)/(target-sl))*100}%`,top:0,height:'100%',right:0,background:'linear-gradient(90deg,#ffaa00,#00ff88)',borderRadius:'0 4px 4px 0'}}/>

              <span><span style={{color:'var(--text-muted)'}}>Reward:</span> <strong style={{color:'#00ff88'}}>₹{maxProfit.toFixed(0)}</strong></span>
              {enableTrail&&<span><span style={{color:'var(--text-muted)'}}>Trail:</span> <strong style={{color:'var(--amber)'}}>₹{getTrailValue()}</strong></span>}

          </div>

          {/* EXECUTE BUTTON */}
          <button onClick={executeOrder} disabled={executing} style={{width:'100%',padding:'16px',fontSize:15,fontWeight:900,fontFamily:'var(--font-mono)',borderRadius:10,border:'none',cursor:executing?'not-allowed':'pointer',background:executing?'var(--bg-tertiary)':enableAMO?'linear-gradient(135deg,#0088cc,#00ddff)':enableGTTEntry?'linear-gradient(135deg,#cc66ff,#ff88ff)':enableGTT?'linear-gradient(135deg,#ff8800,#ffaa00)':enableBracket?'linear-gradient(135deg,#0088ff,#00c8ff)':txnType==='BUY'?'linear-gradient(135deg,#00aa55,#00ff88)':'linear-gradient(135deg,#cc2233,#ff4455)',color:executing?'var(--text-muted)':'#000',transition:'all 0.2s',boxShadow:executing?'':'0 4px 20px rgba(0,0,0,0.3)',transform:executing?'':'translateY(0)'}}>
            {executing?<span style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
              <span style={{width:16,height:16,border:'2px solid var(--text-muted)',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 1s linear infinite'}}/>

            </span>:
            enableAMO?(autoPlaceGTT?`🌙 PLACE AMO ${txnType} + AUTO GTT`:`🌙 PLACE AMO ${txnType} ORDER`):
            enableGTTEntry?`🎯 PLACE GTT BUY @ ₹${gttTrigger||sl}`:
            enableGTT?`🛡️ SET GTT EXIT (SL + TARGET)`:
            enableBracket?`🔲 PLACE BRACKET ${txnType}`:
            `⚡ PLACE ${txnType} ORDER`}
          </button>

          {/* Result Display */}
          {execResult&&<div style={{marginTop:16,padding:16,borderRadius:10,background:(execResult.data||execResult.status==='success'||execResult.orderId)?'linear-gradient(135deg,rgba(0,255,136,0.1),rgba(0,200,100,0.05))':'linear-gradient(135deg,rgba(255,68,85,0.1),rgba(200,50,60,0.05))',border:`1px solid ${(execResult.data||execResult.status==='success'||execResult.orderId)?'rgba(0,255,136,0.3)':'rgba(255,68,85,0.3)'}`}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
              <span style={{fontSize:20}}>{(execResult.data||execResult.status==='success'||execResult.orderId)?'✓':'✗'}</span>
              <span style={{fontSize:13,fontWeight:800,color:(execResult.data||execResult.status==='success'||execResult.orderId)?'#00ff88':'#ff4455'}}>
                {(execResult.data||execResult.status==='success'||execResult.orderId)?'ORDER PLACED SUCCESSFULLY':'ORDER FAILED'}
              </span>
            </div>
            <pre style={{fontSize:9,color:'var(--text-muted)',fontFamily:'var(--font-mono)',margin:0,whiteSpace:'pre-wrap',maxHeight:100,overflow:'auto'}}>{JSON.stringify(execResult,null,2)}</pre>
          </div>}
        </div>
      </div>}

      {analysis&&<div className="ai-response glow-border" style={{marginTop:20}} dangerouslySetInnerHTML={{__html:formatAIResponse(analysis)}}/>}
    </div>
  );
};

// ═══ EARNINGS REACTION ANALYZER ═══
const EarningsAnalyzer=({symbol,stockData})=>{
  const[quarters,setQuarters]=useState(8);
  const[analysis,setAnalysis]=useState(null);
  const[loading,setLoading]=useState(false);
  const[earnings,setEarnings]=useState([]);
  const[fetchingEarnings,setFetchingEarnings]=useState(false);
  const[earningsSource,setEarningsSource]=useState('none'); // 'yahoo', 'scanner', 'ai', 'none'

  const runAnalysis=async()=>{
    setLoading(true);
    try{
      // Use actual earnings data if available
      const earningsContext = earnings.length > 0 
        ? `Actual Earnings Data:\n${earnings.map(e => `${e.q}: EPS ₹${e.eps} (Est ₹${e.est}) - ${e.status.toUpperCase()}, Reaction: ${e.reaction}%`).join('\n')}`
        : 'No actual earnings data available - use your knowledge of this company.';
      
      const prompt=`Analyze the last ${quarters} earnings reports for ${symbol} (${stockData?.name||'Indian Stock'}).

Current Stock Context:
- Price: ₹${stockData?.price}
- P/E: ${stockData?.fundamentals?.pe_ratio}
- Market Cap: ₹${stockData?.fundamentals?.market_cap_cr} Cr

${earningsContext}

Provide a comprehensive earnings reaction analysis:

### EARNINGS HISTORY PATTERN
For each of the last ${quarters} quarters, analyze:
- Beat/Miss/Inline status
- Revenue growth trend
- EPS surprise percentage
- Stock reaction (1-day, 1-week post earnings)
- Guidance changes

### MARKET REACTION PATTERNS
- Average move on earnings day
- Tendency to gap up/down
- Post-earnings drift direction
- Options implied move vs actual

### KEY METRICS TO WATCH
- Revenue growth trajectory
- Margin trends (gross, operating, net)
- Guidance patterns (raise/maintain/lower)
- Management commentary themes

### SENTIMENT ANALYSIS
- Analyst estimate revisions
- Institutional positioning pre-earnings
- Short interest changes
- Options flow signals

### TRADING STRATEGY
- Pre-earnings positioning (if any)
- Earnings day strategy
- Post-earnings playbook
- Key price levels to watch

### NEXT EARNINGS OUTLOOK
- Expected report date
- Consensus estimates
- Likely surprises
- Recommended approach

Format with 🟢 for beats, 🔴 for misses, 🟡 for inline.`;

      const response=await callGroqAI(prompt);
      setAnalysis(response);
    }catch(e){alert(e.message)}
    setLoading(false);
  };

  // Fetch real earnings data from Yahoo Finance via worker
  const fetchEarningsData = async () => {
    setFetchingEarnings(true);
    try {
      const wUrl = localStorage.getItem('zd_worker_url');
      if (!wUrl) {
        // Fallback: Use AI to generate earnings analysis from web
        setEarningsSource('ai');
        return;
      }
      
      // Try Yahoo Finance earnings data
      const res = await fetch(wUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Kite-Action': 'yahoo-earnings' },
        body: JSON.stringify({ ticker: `${symbol}.NS` })
      });
      
      if (res.ok) {
        const data = await res.json();
        if (data?.earnings && data.earnings.length > 0) {
          setEarnings(data.earnings);
          setEarningsSource('yahoo');
          return;
        }
      }
      
      // Fallback: Try Screener.in style data from stockData
      if (stockData?.fundamentals?.quarterly_results) {
        const qResults = stockData.fundamentals.quarterly_results;
        const formatted = qResults.map(q => ({
          q: q.quarter,
          eps: q.eps,
          est: q.eps_estimate || q.eps * 0.95,
          rev: q.revenue,
          revEst: q.revenue_estimate || q.revenue * 0.98,
          reaction: q.price_reaction || 0,
          status: q.eps > (q.eps_estimate || q.eps * 0.95) ? 'beat' : q.eps < (q.eps_estimate || q.eps * 0.95) ? 'miss' : 'inline'
        }));
        setEarnings(formatted);
        setEarningsSource('scanner');
        return;
      }
      
      // Ultimate fallback: Web search for earnings
      setEarningsSource('search');
      
    } catch (e) {
      console.error('Earnings fetch error:', e);
      setEarningsSource('error');
    }
    setFetchingEarnings(false);
  };
  
  // Fetch earnings on mount or symbol change
  useEffect(() => {
    if (symbol) {
      fetchEarningsData();
    }
  }, [symbol]);

  // Search web for earnings data using Groq
  const searchEarningsData = async () => {
    setFetchingEarnings(true);
    try {
      const searchPrompt = `Search for ${symbol} (${stockData?.name || symbol}) quarterly earnings results for last ${quarters} quarters.
      
For each quarter provide:
- Quarter name (e.g., Q3 FY24)
- EPS actual and estimate
- Revenue actual and estimate  
- Stock price reaction after earnings (%)
- Whether it was a BEAT, MISS, or INLINE

Return data in this exact JSON format:
[
  {"q": "Q3 FY24", "eps": 12.5, "est": 11.2, "rev": 2450, "revEst": 2380, "reaction": 3.2, "status": "beat"},
  ...
]

Return ONLY the JSON array, no other text.`;

      const response = await callGroqAI(searchPrompt, "You are a financial data assistant. Return only valid JSON data.");
      
      // Parse JSON from response
      const jsonMatch = response.match(/\[[\s\S]*\]/);
      if (jsonMatch) {
        const parsed = JSON.parse(jsonMatch[0]);
        setEarnings(parsed);
        setEarningsSource('ai');
      }
    } catch (e) {
      console.error('AI earnings search error:', e);
    }
    setFetchingEarnings(false);
  };

  return(
    <div className="fade-in">
      <div className="section-title">📊 EARNINGS REACTION ANALYZER</div>
      
      <div style={{display:'flex',gap:12,marginBottom:20,alignItems:'center',flexWrap:'wrap'}}>
        <label style={{fontSize:11,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>ANALYZE LAST</label>
        <select value={quarters} onChange={e=>setQuarters(+e.target.value)} style={{width:80}}>
          <option value={4}>4 Qtrs</option>
          <option value={8}>8 Qtrs</option>
          <option value={12}>12 Qtrs</option>
        </select>
        <span style={{fontSize:11,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>QUARTERS</span>
        
        <button onClick={searchEarningsData} disabled={fetchingEarnings} style={{marginLeft:'auto',padding:'6px 12px',fontSize:10,background:'rgba(0,200,255,0.1)',border:'1px solid var(--accent2)',borderRadius:6,color:'var(--accent2)',cursor:'pointer',fontFamily:'var(--font-mono)'}}>
          {fetchingEarnings ? '⏳ Fetching...' : '🔄 Fetch Live Data'}
        </button>
      </div>
      
      {/* Data Source Indicator */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
        <span style={{fontSize:9,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>DATA SOURCE:</span>
        <span style={{fontSize:9,padding:'2px 8px',borderRadius:4,fontFamily:'var(--font-mono)',fontWeight:700,
          background: earningsSource === 'yahoo' ? 'rgba(0,255,136,0.2)' : earningsSource === 'scanner' ? 'rgba(0,200,255,0.2)' : earningsSource === 'ai' ? 'rgba(255,136,255,0.2)' : 'rgba(255,170,0,0.2)',
          color: earningsSource === 'yahoo' ? '#00ff88' : earningsSource === 'scanner' ? '#00c8ff' : earningsSource === 'ai' ? '#ff88ff' : '#ffaa00'
        }}>
          {earningsSource === 'yahoo' ? '🟢 YAHOO FINANCE' : earningsSource === 'scanner' ? '🔵 SCANNER DATA' : earningsSource === 'ai' ? '🟣 AI GENERATED' : '🟡 CLICK FETCH'}
        </span>
        {earnings.length > 0 && <span style={{fontSize:9,color:'var(--text-muted)'}}>({earnings.length} quarters)</span>}
      </div>

      <div style={{marginBottom:20}}>
        {fetchingEarnings ? (
          <div style={{textAlign:'center',padding:'40px',color:'var(--text-muted)'}}>
            <div style={{fontSize:24,marginBottom:8}}>⏳</div>
            <div style={{fontSize:12}}>Fetching earnings data...</div>
          </div>
        ) : earnings.length === 0 ? (
          <div style={{textAlign:'center',padding:'40px',background:'var(--bg-tertiary)',borderRadius:10,border:'1px dashed var(--border-dim)'}}>
            <div style={{fontSize:24,marginBottom:8}}>📊</div>
            <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:12}}>No earnings data loaded</div>
            <button onClick={searchEarningsData} style={{padding:'10px 20px',background:'linear-gradient(135deg,#00c8ff,#0088ff)',border:'none',borderRadius:6,color:'#000',fontWeight:700,cursor:'pointer'}}>
              🔍 Fetch Earnings Data via AI
            </button>
          </div>
        ) : (
          earnings.slice(0, quarters).map((e,i)=>(
            <div key={i} className={`earnings-card ${e.status}`}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontWeight:700,fontSize:13}}>{e.q}</span>
                  <span className={`badge badge-${e.status==='beat'?'bull':e.status==='miss'?'bear':'neutral'}`}>
                    {e.status==='beat'?'🟢 BEAT':e.status==='miss'?'🔴 MISS':'🟡 INLINE'}
                  </span>
                </div>
                <span style={{fontFamily:'var(--font-mono)',fontSize:13,fontWeight:700,color:e.reaction>=0?'#00ff88':'#ff4455'}}>
                  {e.reaction>=0?'+':''}{e.reaction}%
                </span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,fontSize:11}}>
                <div>
                  <span style={{color:'var(--text-muted)'}}>EPS: </span>
                  <span style={{fontFamily:'var(--font-mono)',fontWeight:600}}>₹{e.eps}</span>
                  <span style={{color:'var(--text-muted)'}}> vs Est ₹{e.est}</span>
                  <span style={{color:e.eps>e.est?'#00ff88':'#ff4455',marginLeft:6}}>({((e.eps-e.est)/e.est*100).toFixed(1)}%)</span>
                </div>
                <div>
                  <span style={{color:'var(--text-muted)'}}>Rev: </span>
                  <span style={{fontFamily:'var(--font-mono)',fontWeight:600}}>₹{e.rev}Cr</span>
                  <span style={{color:'var(--text-muted)'}}> vs Est ₹{e.revEst}Cr</span>
                </div>
              </div>
              <div className="reaction-bar">
                <div className="reaction-fill" style={{
                  width:`${Math.min(Math.abs(e.reaction)*10,100)}%`,
                  background:e.reaction>=0?'linear-gradient(90deg,#00cc66,#00ff88)':'linear-gradient(90deg,#ff4455,#ff6655)',
                  marginLeft:e.reaction<0?'auto':0
                }}/>
              </div>
            </div>
          ))
        )}
      </div>

      {/* Earnings Summary Stats */}
      {earnings.length > 0 && <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:20}}>
        <div style={{padding:'12px',background:'var(--bg-tertiary)',borderRadius:8,textAlign:'center'}}>
          <div style={{fontSize:9,color:'var(--text-muted)',marginBottom:4}}>BEAT RATE</div>
          <div style={{fontSize:18,fontWeight:900,color:'#00ff88',fontFamily:'var(--font-mono)'}}>{Math.round(earnings.filter(e=>e.status==='beat').length/earnings.length*100)}%</div>
        </div>
        <div style={{padding:'12px',background:'var(--bg-tertiary)',borderRadius:8,textAlign:'center'}}>
          <div style={{fontSize:9,color:'var(--text-muted)',marginBottom:4}}>AVG REACTION</div>
          <div style={{fontSize:18,fontWeight:900,color:earnings.reduce((a,e)=>a+e.reaction,0)/earnings.length>=0?'#00ff88':'#ff4455',fontFamily:'var(--font-mono)'}}>{(earnings.reduce((a,e)=>a+e.reaction,0)/earnings.length).toFixed(1)}%</div>
        </div>
        <div style={{padding:'12px',background:'var(--bg-tertiary)',borderRadius:8,textAlign:'center'}}>
          <div style={{fontSize:9,color:'var(--text-muted)',marginBottom:4}}>BEAT ON BEAT</div>
          <div style={{fontSize:18,fontWeight:900,color:'#00c8ff',fontFamily:'var(--font-mono)'}}>{(earnings.filter(e=>e.status==='beat').reduce((a,e)=>a+e.reaction,0)/(earnings.filter(e=>e.status==='beat').length||1)).toFixed(1)}%</div>
        </div>
        <div style={{padding:'12px',background:'var(--bg-tertiary)',borderRadius:8,textAlign:'center'}}>
          <div style={{fontSize:9,color:'var(--text-muted)',marginBottom:4}}>MISS REACTION</div>
          <div style={{fontSize:18,fontWeight:900,color:'#ff4455',fontFamily:'var(--font-mono)'}}>{(earnings.filter(e=>e.status==='miss').reduce((a,e)=>a+e.reaction,0)/(earnings.filter(e=>e.status==='miss').length||1)).toFixed(1)}%</div>
        </div>
      </div>}

      <button className="btn btn-accent" style={{width:'100%',padding:'14px'}} onClick={runAnalysis} disabled={loading}>
        {loading?'⚡ Analyzing Patterns...':'📈 Generate Earnings Analysis'}
      </button>

      {analysis&&<div className="ai-response glow-border" style={{marginTop:20}} dangerouslySetInnerHTML={{__html:formatAIResponse(analysis)}}/>}
    </div>
  );
};

      setShowSuggestions(matches.length>0);
    }else{
      setSuggestions([]);
      setShowSuggestions(false);
    }
  },[inputSymbol]);

  const selectStock=(s)=>{
    setInputSymbol(s.s);
    setShowSuggestions(false);
    loadStock(s.s);
  };

  // Fetch live ATR and Swing Lows from Yahoo via worker
  const fetchLiveATR = async (sym) => {
    const wUrl = localStorage.getItem('zd_worker_url');
    if (!wUrl) return null;
    
    try {
      const res = await fetch(wUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Kite-Action': 'yahoo-proxy' },
        body: JSON.stringify({ ticker: `${sym}.NS`, range: '3mo', interval: '1d' })
      });
      const data = await res.json();
      
      const result = data?.chart?.result?.[0];
      if (!result) return null;
      
      const quotes = result.indicators?.quote?.[0];
      const timestamps = result.timestamp || [];
      if (!quotes) return null;
      
      const highs = quotes.high || [];
      const lows = quotes.low || [];
      const closes = quotes.close || [];
      
      // Filter out nulls but keep indices for date mapping
      const validIndices = closes.map((c, i) => c != null ? i : -1).filter(i => i >= 0);
      if (validIndices.length < 15) return null;
      
      const validHighs = validIndices.map(i => highs[i]);
      const validLows = validIndices.map(i => lows[i]);
      const validCloses = validIndices.map(i => closes[i]);
      const validTimestamps = validIndices.map(i => timestamps[i]);
      
      // Calculate ATR(14)
      const period = 14;
      const trueRanges = [];
      
      for (let i = 1; i < validHighs.length; i++) {
        const h = validHighs[i], l = validLows[i], pc = validCloses[i - 1];
        const tr = Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc));
        trueRanges.push(tr);
      }
      
      if (trueRanges.length < period) return null;
      
      const recentTRs = trueRanges.slice(-period);
      const atr = recentTRs.reduce((a, b) => a + b, 0) / period;
      let currentPrice = validCloses[validCloses.length - 1]; // fallback to last daily close
      const atrPct = (atr / currentPrice) * 100;
      
      // ═══ FETCH LIVE INTRADAY PRICE ═══
      try {
        const liveRes = await fetch(wUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Kite-Action': 'yahoo-proxy' },
          body: JSON.stringify({ ticker: `${sym}.NS`, range: '1d', interval: '1m' })
        });
        const liveData = await liveRes.json();
        const liveResult = liveData?.chart?.result?.[0];
        
        // Priority 1: regularMarketPrice
        if (liveResult?.meta?.regularMarketPrice > 0) {
          currentPrice = liveResult.meta.regularMarketPrice;
          console.log('Live price from regularMarketPrice:', currentPrice);
        } else {
          // Priority 2: Latest intraday candle close
          const liveCloses = liveResult?.indicators?.quote?.[0]?.close || [];
          const validLiveCloses = liveCloses.filter(c => c != null && c > 0);
          if (validLiveCloses.length > 0) {
            currentPrice = validLiveCloses[validLiveCloses.length - 1];
            console.log('Live price from intraday candle:', currentPrice);
          }
        }
      } catch (e) {
        console.log('Live price fetch failed, using daily close:', currentPrice);
      }
      
      // ═══ SWING LOW DETECTION ═══
      const findPeriodLow = (days) => {
        const slice = validLows.slice(-days);
        const tsSlice = validTimestamps.slice(-days);
        const minVal = Math.min(...slice);
        const minIdx = slice.lastIndexOf(minVal);
        const daysAgo = days - minIdx - 1;
        const date = tsSlice[minIdx] ? new Date(tsSlice[minIdx] * 1000).toLocaleDateString('en-IN', {day:'numeric',month:'short'}) : '';
        return { price: +minVal.toFixed(2), daysAgo, date };
      };
      
      const swingLows = {
        low5: findPeriodLow(5),   // 5-day low
        low10: findPeriodLow(10), // 10-day low
        low20: findPeriodLow(20), // 20-day low (swing low)
        low50: validLows.length >= 50 ? findPeriodLow(50) : null // 50-day low
      };
      
      return {
        atr: +atr.toFixed(2),
        atr_pct: +atrPct.toFixed(2),
        volatility: atrPct > 3 ? 'HIGH' : atrPct > 1.5 ? 'MEDIUM' : 'LOW',
        price: +currentPrice.toFixed(2),
        swingLows // ← NEW: swing low data
      };
    } catch (e) {
      console.log('ATR fetch error:', e);
      return null;
    }
  };

  const loadStock=async(sym)=>{
    if(!sym)return;
    setLoading(true);
    setShowSuggestions(false);
    try{
      let data = null;
      
      // Try stock_details first
      const res=await fetch(`./data/stock_details/${sym.toUpperCase()}.json?t=${Date.now()}`);
      if(res.ok){
        data=await res.json();
      }else{
        // Try scanner results
        const scanRes=await fetch(`./data/scanner_results.json?t=${Date.now()}`);
        if(scanRes.ok){
          const scanData=await scanRes.json();
          const found=scanData.stocks?.find(s=>s.symbol.toUpperCase()===sym.toUpperCase());
          if(found) data = found;
        }
      }
      
      if(data){
        // Fetch live ATR and Swing Lows if not already present
        if(!data.atr || !data.atr_pct){
          console.log('Fetching live ATR for', sym);
          const atrData = await fetchLiveATR(sym.toUpperCase());
          if(atrData){
            data.atr = atrData.atr;
            data.atr_pct = atrData.atr_pct;
            data.volatility = atrData.volatility;
            data.swingLows = atrData.swingLows;
            // ALWAYS use live price from Yahoo (overwrite stale JSON data)
            if(atrData.price > 0) data.price = atrData.price;
            console.log('Live ATR + Swing Lows:', atrData);
          }
        }
        setStockData(data);
        setSymbol(sym.toUpperCase());
      }else{
        alert('Stock not found');
        setStockData(null);
      }
    }catch(e){console.error(e);setStockData(null)}
    setLoading(false);
  };

  const handleSubmit=e=>{e.preventDefault();loadStock(inputSymbol)};

  // Close suggestions when clicking outside
  useEffect(()=>{
    const handleClick=(e)=>{
      if(inputRef.current&&!inputRef.current.contains(e.target)){
        setShowSuggestions(false);
      }
    };
    document.addEventListener('click',handleClick);
    return()=>document.removeEventListener('click',handleClick);
  },[]);

  return(
    <div>
      <ToastContainer />
      <nav className="nav">
        <a href="index.html" style={{display:'flex',alignItems:'center'}}>
          <img src="assets/logo.jpeg" alt="TE" style={{height:80,marginRight:16}} onError={e=>e.target.style.display='none'}/>
        </a>
        <a href="scanner.html" className="nav-link">Scanner</a>
        <a href="watchlist.html" className="nav-link">Watchlist</a>
        <a href="matrix.html" className="nav-link">Matrix</a>
        <a href="edge-intel.html" className="nav-link active">Edge Intel</a>
      </nav>

      <div style={{maxWidth:1200,margin:'0 auto',padding:'24px 20px'}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <h1 className="title-glow" style={{fontSize:36,fontWeight:900,background:'linear-gradient(135deg,#00ff88,#00c8ff,#8844ff)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginBottom:8}}>
            ◈ EDGE INTEL
          </h1>
          <p style={{fontSize:13,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>
            INSTITUTIONAL BREAKDOWN • SMART TRADE SETUP • EARNINGS ANALYZER
          </p>
        </div>

        {!hasApiKey&&<div style={{padding:16,background:'rgba(255,170,0,0.1)',border:'1px solid rgba(255,170,0,0.3)',borderRadius:8,marginBottom:20,textAlign:'center'}}>
          <div style={{fontSize:12,color:'#ffaa00',marginBottom:8}}>⚠️ GROQ API Key Required</div>
          <div style={{fontSize:11,color:'var(--text-muted)'}}>Set <code style={{background:'var(--bg-tertiary)',padding:'2px 6px',borderRadius:3}}>localStorage.setItem('groq_api_key', 'YOUR_KEY')</code> in console</div>
          <a href="https://console.groq.com" target="_blank" style={{fontSize:10,color:'var(--accent2)'}}>Get free API key →</a>
        </div>}

        <form onSubmit={handleSubmit} style={{display:'flex',gap:12,marginBottom:24}}>
          <div className="autocomplete-wrapper" style={{flex:1}} ref={inputRef}>
            <input 
              type="text" 
              value={inputSymbol} 
              onChange={e=>setInputSymbol(e.target.value.toUpperCase())}
              onFocus={()=>inputSymbol.length>=1&&suggestions.length>0&&setShowSuggestions(true)}
              placeholder="Enter NSE Symbol (e.g., RELIANCE, TCS, INFY)"
              style={{width:'100%',padding:'14px 18px',fontSize:14,borderRadius:showSuggestions?'8px 8px 0 0':'8px'}}
              autoComplete="off"
            />
            {showSuggestions&&<div className="autocomplete-list">
              {suggestions.map((s,i)=>(
                <div key={i} className="autocomplete-item" onClick={()=>selectStock(s)}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span className="symbol">{s.s}</span>
                    <span className="name">{s.n}</span>
                  </div>
                  {s.sec&&<span className="sector">{s.sec}</span>}
                </div>
              ))}
            </div>}
          </div>
          <button type="submit" className="btn btn-accent" style={{padding:'14px 28px'}} disabled={loading}>
            {loading?'Loading...':'🔍 Analyze'}
          </button>
        </form>

        {stockData&&<div className="card glow-border" style={{marginBottom:24}}>
          <div style={{padding:'16px 20px',background:'linear-gradient(90deg,rgba(0,255,136,0.03),transparent)',borderBottom:'1px solid var(--border-dim)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <span style={{fontSize:24,fontWeight:900,color:'#fff'}}>{symbol}</span>
              <span style={{fontSize:13,color:'var(--text-secondary)',marginLeft:12}}>{stockData.name||stockData.sector}</span>
              {stockData.sector&&<span style={{fontSize:10,padding:'3px 8px',borderRadius:4,background:'rgba(0,200,255,0.1)',color:'#00c8ff',marginLeft:8,fontFamily:'var(--font-mono)'}}>{stockData.sector}</span>}
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:24,fontWeight:800,fontFamily:'var(--font-mono)',color:'#fff'}}>₹{stockData.price?.toLocaleString()}</div>
              <div style={{fontSize:13,fontFamily:'var(--font-mono)',fontWeight:700,color:stockData.change_pct>=0?'#00ff88':'#ff4455'}}>
                {stockData.change_pct>=0?'▲':'▼'} {stockData.change_pct>=0?'+':''}{stockData.change_pct?.toFixed(2)}%
              </div>
            </div>
          </div>
        </div>}

        {stockData&&<Fragment>
          <div className="tabs" style={{marginBottom:24,justifyContent:'center'}}>
            <button className={`tab ${activeTab==='institutional'?'active':''}`} onClick={()=>setActiveTab('institutional')}>
              🏛️ Institutional
            </button>
            <button className={`tab ${activeTab==='trade'?'active':''}`} onClick={()=>setActiveTab('trade')}>
              📐 Trade Setup
            </button>
            <button className={`tab ${activeTab==='earnings'?'active':''}`} onClick={()=>setActiveTab('earnings')}>
              📊 Earnings
            </button>
          </div>

          <div className="card" style={{padding:24}}>
            {activeTab==='institutional'&&<InstitutionalBreakdown symbol={symbol} stockData={stockData}/>}
            {activeTab==='trade'&&<SmartTradeSetup symbol={symbol} stockData={stockData}/>}
            {activeTab==='earnings'&&<EarningsAnalyzer symbol={symbol} stockData={stockData}/>}
          </div>
        </Fragment>}

        {!stockData&&!loading&&<div style={{textAlign:'center',padding:60,color:'var(--text-muted)'}}>
          <div style={{fontSize:48,marginBottom:16,opacity:0.3}}>◈</div>
          <div style={{fontSize:14}}>Enter a stock symbol to begin analysis</div>
          <div style={{fontSize:11,marginTop:8,color:'var(--text-muted)'}}>Examples: RELIANCE, TCS, INFY, HDFCBANK, ICICIBANK</div>
        </div>}

        <div style={{marginTop:32,padding:'16px 0',borderTop:'1px solid var(--border-dim)',display:'flex',justifyContent:'space-between',fontSize:9,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>
          <span>EDGE INTEL v1.0 • TRADEDGE</span>
          <span>Powered by Groq llama-3.3-70b</span>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<EdgeIntel/>);
</script>
</body>
</html>
