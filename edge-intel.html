const callGroqAI=async(prompt,systemPrompt="You are an expert equity research analyst.")=>{
  if(!GROQ_API_KEY)throw new Error('Set groq_api_key in localStorage');
  const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Authorization':`Bearer ${GROQ_API_KEY}`,'Content-Type':'application/json'},
    body:JSON.stringify({model:GROQ_MODEL,messages:[{role:'system',content:systemPrompt},{role:'user',content:prompt}],temperature:0.7,max_tokens:2000})
  });
  if(!res.ok)throw new Error('API Error: '+res.status);
  const data=await res.json();
  return data.choices?.[0]?.message?.content||'No response';
};

const formatAIResponse=(text)=>{
  return text
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/^### (.*$)/gm,'<h3>$1</h3>')
    .replace(/^## (.*$)/gm,'<h3>$1</h3>')
    .replace(/^# (.*$)/gm,'<h3>$1</h3>')
    .replace(/\n- /g,'\n• ')
    .replace(/\n\d+\. /g,'\n• ')
    .replace(/🟢|✅|📈|BULLISH/gi,'<span class="bull">$&</span>')
    .replace(/🔴|❌|📉|BEARISH/gi,'<span class="bear">$&</span>')
    .replace(/🟡|⚠️|NEUTRAL/gi,'<span class="neutral">$&</span>')
    .replace(/\n/g,'<br/>');
};

const SmartTradeSetup=({symbol,stockData})=>{
  const[entry,setEntry]=useState(stockData?.price||0);
  const[target,setTarget]=useState(0);
  const[sl,setSL]=useState(0);
  const[qty,setQty]=useState(1);
  const[capital,setCapital]=useState(100000);
  const[riskPct,setRiskPct]=useState(1);
  const[analysis,setAnalysis]=useState(null);
  const[loading,setLoading]=useState(false);
  
  // Trade Execution State
  const[showExecution,setShowExecution]=useState(false);
  const[broker,setBroker]=useState('zerodha');
  const[orderType,setOrderType]=useState('LIMIT');
  const[product,setProduct]=useState('CNC');
  const[txnType,setTxnType]=useState('BUY');
  const[executing,setExecuting]=useState(false);
  const[execResult,setExecResult]=useState(null);
  const[enableBracket,setEnableBracket]=useState(false);
  const[enableGTT,setEnableGTT]=useState(false);
  const[enableTrail,setEnableTrail]=useState(false);
  const[trailMethod,setTrailMethod]=useState('pct'); // 'pct' or 'atr'
  const[trailValue,setTrailValue]=useState(2);
  const[trailATR,setTrailATR]=useState(1); // ATR multiplier

  // Calculate ATR from stockData if available
  const atr = stockData?.atr || stockData?.technicals?.atr || (entry * 0.015); // fallback 1.5%

  useEffect(()=>{
    if(stockData?.price){
      setEntry(stockData.price);
      setTarget(+(stockData.price*1.08).toFixed(2));
      setSL(+(stockData.price*0.97).toFixed(2));
    }
  },[stockData?.price]);

  const risk=entry>0&&sl>0?Math.abs(entry-sl)*qty:0;
  const reward=entry>0&&target>0?Math.abs(target-entry)*qty:0;
  const rr=risk>0?(reward/risk).toFixed(2):'—';
  const positionSize=riskPct>0&&risk>0?Math.floor((capital*riskPct/100)/Math.abs(entry-sl)):0;
  const maxLoss=positionSize*Math.abs(entry-sl);
  const maxProfit=positionSize*Math.abs(target-entry);
  const winRate=rr>=2?'40-45%':rr>=1.5?'50-55%':rr>=1?'60%+':'70%+';

  // Calculate trail value based on method
  const getTrailValue = () => {
    if(trailMethod === 'atr') {
      return +(atr * trailATR).toFixed(2);
    }
    return trailValue;
  };

  const generateSetup=async()=>{
    setLoading(true);
    try{
      const prompt=`Create a professional trade setup for ${symbol}:

Current Price: ₹${stockData?.price}
Entry: ₹${entry}
Target: ₹${target} (${((target-entry)/entry*100).toFixed(1)}% upside)
Stop Loss: ₹${sl} (${((entry-sl)/entry*100).toFixed(1)}% risk)
Risk:Reward = 1:${rr}
Position Size: ${positionSize} shares
Max Risk: ₹${maxLoss.toFixed(0)}
Max Profit: ₹${maxProfit.toFixed(0)}

Technical Context:
- RSI: ${stockData?.rsi}
- MACD: ${stockData?.macd?.crossover}
- EMA Trend: ${stockData?.ema?.cross_9_21}
- Volume: ${stockData?.volume?.ratio}x avg

Provide:
### SETUP RATIONALE
Why this entry makes sense technically.

### KEY LEVELS
- Primary target and stretch target
- Stop loss rationale
- Trailing stop strategy

### ENTRY TRIGGERS
Specific conditions to enter (breakout, pullback, confirmation).

### EXIT RULES
When to take profits, when to cut losses, when to trail.

### POSITION MANAGEMENT
- Scale-in strategy
- Partial profit booking
- Risk management rules

### TRADE GRADE
Rate this setup: A+ / A / B+ / B / C (with reasoning)`;

      const response=await callGroqAI(prompt);
      setAnalysis(response);
    }catch(e){alert(e.message)}
    setLoading(false);
  };

  const executeOrder=async()=>{
    const wUrl=localStorage.getItem('zd_worker_url');
    if(!wUrl){alert('Set zd_worker_url in localStorage');return}
    
    setExecuting(true);setExecResult(null);
    try{
      const headers={'Content-Type':'application/json'};
      let res;
      
      // Get broker-specific action prefix
      const brokerPrefix = broker === 'dhan' ? 'dhan-' : broker === 'definedge' ? 'de-' : '';
      
      // Get Zerodha auth if needed
      if(broker === 'zerodha') {
        const auth = localStorage.getItem('kite_auth');
        if(auth) headers['Authorization'] = auth;
      } else if(broker === 'dhan') {
        headers['X-Dhan-Token'] = localStorage.getItem('dhan_token') || '';
        headers['X-Dhan-ID'] = localStorage.getItem('dhan_client_id') || '';
      } else if(broker === 'definedge') {
        headers['X-DE-Session'] = localStorage.getItem('de_session') || '';
      }
      
      if(enableGTT){
        // GTT Order (SL + Target as OCO)
        headers['X-Kite-Action'] = broker === 'dhan' ? 'dhan-forever-place' : 'gtt-place';
        
        if(broker === 'zerodha') {
          const r=await fetch(wUrl,{method:'POST',headers,body:JSON.stringify({
            type: 'two-leg',
            condition: {
              tradingsymbol: symbol,
              exchange: 'NSE',
              trigger_values: [sl, target],
              last_price: entry
            },
            orders: [
              { transaction_type: 'SELL', quantity: positionSize||qty, price: sl, order_type: 'LIMIT', product },
              { transaction_type: 'SELL', quantity: positionSize||qty, price: target, order_type: 'LIMIT', product }
            ]
          })});
          res=await r.json();
        } else if(broker === 'dhan') {
          // Dhan Forever OCO
          const r=await fetch(wUrl,{method:'POST',headers,body:JSON.stringify({
            orderFlag: 'OCO',
            transaction_type: 'SELL',
            exchange: 'NSE_EQ',
            security_id: stockData?.security_id || symbol,
            quantity: positionSize||qty,
            price: target,
            triggerPrice: target,
            price1: sl,
            triggerPrice1: sl,
            product
          })});
          res=await r.json();
        }
      } else if(enableBracket){
        // Bracket Order (Entry + SL + Target)
        headers['X-Kite-Action'] = brokerPrefix + 'bracket-order';
        if(broker === 'dhan') headers['X-Kite-Action'] = 'dhan-bracket';
        if(broker === 'definedge') headers['X-Kite-Action'] = 'de-bracket';
        
        const trailVal = enableTrail ? getTrailValue() : 0;
        
        const r=await fetch(wUrl,{method:'POST',headers,body:JSON.stringify({
          tradingsymbol:symbol,
          exchange: broker === 'dhan' ? 'NSE_EQ' : 'NSE',
          transaction_type:txnType,
          quantity:positionSize||qty,
          price:entry,
          stoploss:Math.abs(entry-sl),
          target:Math.abs(target-entry),
          trailing_stoploss: trailVal,
          security_id: stockData?.security_id || ''
        })});
        res=await r.json();
      }else{
        // Regular Order
        headers['X-Kite-Action'] = brokerPrefix + 'place-order';
        if(broker === 'dhan') headers['X-Kite-Action'] = 'dhan-place';
        if(broker === 'definedge') headers['X-Kite-Action'] = 'de-place';
        
        const r=await fetch(wUrl,{method:'POST',headers,body:JSON.stringify({
          tradingsymbol:symbol,
          exchange: broker === 'dhan' ? 'NSE_EQ' : 'NSE',
          transaction_type:txnType,
          order_type:orderType,
          quantity:positionSize||qty,
          product,
          price:orderType==='LIMIT'?entry:0,
          trigger_price:orderType.includes('SL')?sl:0,
          security_id: stockData?.security_id || ''
        })});
        res=await r.json();
      }
      
      setExecResult(res);
      if(res?.data||res?.status==='success'||res?.orderId){
        // Log to journal
        const trades=JSON.parse(localStorage.getItem('te_trades')||'[]');
        trades.push({id:Date.now(),symbol,action:txnType,price:entry,qty:positionSize||qty,
          ts:new Date().toISOString(),status:'executed',target,sl,rr,broker,
          orderType: enableGTT ? 'GTT' : enableBracket ? 'BRACKET' : 'REGULAR'});
        localStorage.setItem('te_trades',JSON.stringify(trades));
      }
    }catch(e){setExecResult({error:e.message})}
    setExecuting(false);
  };

  return(
    <div className="fade-in">
      <div className="section-title">📐 SMART TRADE SETUP BUILDER</div>
      
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,marginBottom:20}}>
        <div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:10,color:'var(--text-muted)',fontFamily:'var(--font-mono)',display:'block',marginBottom:4}}>ENTRY PRICE</label>
            <input type="number" value={entry} onChange={e=>setEntry(+e.target.value)} style={{width:'100%'}}/>
          </div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:10,color:'var(--accent)',fontFamily:'var(--font-mono)',display:'block',marginBottom:4}}>TARGET ₹</label>
            <input type="number" value={target} onChange={e=>setTarget(+e.target.value)} style={{width:'100%',borderColor:'rgba(0,255,136,0.3)'}}/>
          </div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:10,color:'var(--red)',fontFamily:'var(--font-mono)',display:'block',marginBottom:4}}>STOP LOSS ₹</label>
            <input type="number" value={sl} onChange={e=>setSL(+e.target.value)} style={{width:'100%',borderColor:'rgba(255,68,85,0.3)'}}/>
          </div>
        </div>
        <div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:10,color:'var(--text-muted)',fontFamily:'var(--font-mono)',display:'block',marginBottom:4}}>CAPITAL ₹</label>
            <input type="number" value={capital} onChange={e=>setCapital(+e.target.value)} style={{width:'100%'}}/>
          </div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:10,color:'var(--text-muted)',fontFamily:'var(--font-mono)',display:'block',marginBottom:4}}>RISK PER TRADE %</label>
            <input type="number" value={riskPct} onChange={e=>setRiskPct(+e.target.value)} step={0.5} style={{width:'100%'}}/>
          </div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:10,color:'var(--text-muted)',fontFamily:'var(--font-mono)',display:'block',marginBottom:4}}>QUANTITY</label>
            <input type="number" value={qty} onChange={e=>setQty(+e.target.value)} style={{width:'100%'}}/>
          </div>
        </div>
      </div>

      <div className="rr-bar" style={{marginBottom:16}}>
        <div className="rr-risk" style={{width:`${100/(1+parseFloat(rr)||1)}%`}}>RISK ₹{risk.toFixed(0)}</div>
        <div className="rr-reward" style={{flex:1}}>REWARD ₹{reward.toFixed(0)}</div>
      </div>

      <div className="trade-setup-grid" style={{marginBottom:20}}>
        <div className="metric-box"><div className="metric-label">R:R RATIO</div><div className="metric-value" style={{color:parseFloat(rr)>=2?'#00ff88':parseFloat(rr)>=1.5?'#ffaa00':'#ff4455'}}>1:{rr}</div></div>

            <div style={{fontSize:9,color:'var(--text-muted)',fontFamily:'var(--font-mono)',marginBottom:4}}>PRODUCT</div>
            <select value={product} onChange={e=>setProduct(e.target.value)} style={{width:'100%',padding:'8px'}}>
              <option value="CNC">CNC (Delivery)</option>
              <option value="MIS">MIS (Intraday)</option>
            </select>
          </div>
          <div>
            <div style={{fontSize:9,color:'var(--text-muted)',fontFamily:'var(--font-mono)',marginBottom:4}}>QUANTITY</div>
            <input type="number" value={positionSize||qty} readOnly style={{width:'100%',padding:'8px',background:'var(--bg-card)'}}/>
          </div>
          <div>
            <div style={{fontSize:9,color:'var(--text-muted)',fontFamily:'var(--font-mono)',marginBottom:4}}>PRICE ₹</div>
            <input type="number" value={entry} onChange={e=>setEntry(+e.target.value)} style={{width:'100%',padding:'8px'}}/>
          </div>
        </div>

        <div style={{display:'flex',gap:16,marginBottom:16,flexWrap:'wrap'}}>
          <label style={{display:'flex',alignItems:'center',gap:6,fontSize:10,color:'var(--accent2)',fontFamily:'var(--font-mono)',cursor:'pointer'}}>
            <input type="checkbox" checked={enableBracket} onChange={e=>{setEnableBracket(e.target.checked);if(e.target.checked)setEnableGTT(false)}} style={{accentColor:'var(--accent2)'}}/>
            🔲 Bracket Order (Entry + SL + Target)
          </label>
          <label style={{display:'flex',alignItems:'center',gap:6,fontSize:10,color:'#ff88ff',fontFamily:'var(--font-mono)',cursor:'pointer'}}>
            <input type="checkbox" checked={enableGTT} onChange={e=>{setEnableGTT(e.target.checked);if(e.target.checked)setEnableBracket(false)}} style={{accentColor:'#ff88ff'}}/>
            🎯 GTT (SL + Target OCO)
          </label>
        </div>

        {enableBracket&&<div style={{display:'flex',gap:16,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
          <label style={{display:'flex',alignItems:'center',gap:6,fontSize:10,color:'var(--amber)',fontFamily:'var(--font-mono)',cursor:'pointer'}}>
            <input type="checkbox" checked={enableTrail} onChange={e=>setEnableTrail(e.target.checked)} style={{accentColor:'var(--amber)'}}/>
            ⚡ Auto-Trail SL
          </label>
          {enableTrail&&<>
            <div style={{display:'flex',alignItems:'center',gap:4,background:'var(--bg-tertiary)',padding:'4px 8px',borderRadius:4}}>
              <button onClick={()=>setTrailMethod('pct')} style={{padding:'3px 8px',fontSize:9,fontWeight:700,borderRadius:3,border:'none',cursor:'pointer',background:trailMethod==='pct'?'var(--amber)':'transparent',color:trailMethod==='pct'?'#000':'var(--text-muted)'}}>%</button>
              <button onClick={()=>setTrailMethod('atr')} style={{padding:'3px 8px',fontSize:9,fontWeight:700,borderRadius:3,border:'none',cursor:'pointer',background:trailMethod==='atr'?'var(--amber)':'transparent',color:trailMethod==='atr'?'#000':'var(--text-muted)'}}>ATR</button>
            </div>
            {trailMethod==='pct'?
              <div style={{display:'flex',alignItems:'center',gap:4}}>
                <span style={{fontSize:9,color:'var(--text-muted)'}}>Trail %:</span>
                <input type="number" value={trailValue} onChange={e=>setTrailValue(+e.target.value)} style={{width:50,padding:'4px 6px',fontSize:10}}/>
              </div>
            :
              <div style={{display:'flex',alignItems:'center',gap:4}}>
                <span style={{fontSize:9,color:'var(--text-muted)'}}>ATR×:</span>
                {[0.5,1,1.5,2,3].map(m=><button key={m} onClick={()=>setTrailATR(m)} style={{padding:'3px 6px',fontSize:9,fontWeight:700,borderRadius:3,border:'1px solid',cursor:'pointer',background:trailATR===m?'var(--amber)':'transparent',borderColor:trailATR===m?'var(--amber)':'var(--border-dim)',color:trailATR===m?'#000':'var(--text-muted)'}}>{m}x</button>)}
                <span style={{fontSize:9,color:'var(--amber)',marginLeft:4}}>= ₹{(atr*trailATR).toFixed(2)}</span>
              </div>
            }
          </>}
        </div>}

        {enableBracket&&<div style={{padding:12,background:'rgba(0,200,255,0.05)',border:'1px solid rgba(0,200,255,0.2)',borderRadius:6,marginBottom:16,fontSize:10,fontFamily:'var(--font-mono)'}}>
          <div style={{color:'var(--accent2)',fontWeight:700,marginBottom:6}}>📋 BRACKET ORDER PREVIEW</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,color:'var(--text-secondary)'}}>
            <div><span style={{color:'var(--text-muted)'}}>Entry:</span> ₹{entry}</div>
            <div><span style={{color:'var(--accent)'}}>Target:</span> ₹{target} (+{((target-entry)/entry*100).toFixed(1)}%)</div>
            <div><span style={{color:'var(--red)'}}>SL:</span> ₹{sl} (-{((entry-sl)/entry*100).toFixed(1)}%)</div>
          </div>
          {enableTrail&&<div style={{marginTop:6,color:'var(--amber)'}}>
            <span style={{color:'var(--text-muted)'}}>Trail:</span> ₹{getTrailValue()} ({trailMethod==='atr'?`${trailATR}× ATR`:`${trailValue}%`})
          </div>}
        </div>}

        {enableGTT&&<div style={{padding:12,background:'rgba(255,136,255,0.05)',border:'1px solid rgba(255,136,255,0.2)',borderRadius:6,marginBottom:16,fontSize:10,fontFamily:'var(--font-mono)'}}>
          <div style={{color:'#ff88ff',fontWeight:700,marginBottom:6}}>🎯 GTT ORDER PREVIEW (OCO - One Cancels Other)</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,color:'var(--text-secondary)'}}>
            <div><span style={{color:'var(--red)'}}>SL Leg:</span> Sell @ ₹{sl} (trigger: ₹{sl})</div>
            <div><span style={{color:'var(--accent)'}}>Target Leg:</span> Sell @ ₹{target} (trigger: ₹{target})</div>
          </div>
          <div style={{marginTop:6,color:'var(--text-muted)',fontSize:9}}>
            ⚠️ Place BUY order first, then this GTT will set exit triggers. Valid till triggered/cancelled.
          </div>
        </div>}

        <button onClick={executeOrder} disabled={executing} style={{width:'100%',padding:'12px',fontSize:13,fontWeight:800,fontFamily:'var(--font-mono)',borderRadius:6,border:'none',cursor:'pointer',background:enableGTT?'linear-gradient(135deg,#cc66ff,#ff88ff)':txnType==='BUY'?'linear-gradient(135deg,#00cc66,#00ff88)':'linear-gradient(135deg,#ee3344,#ff5566)',color:enableGTT?'#000':'#000'}}>
          {executing?'⏳ Executing...':enableGTT?'🎯 Place GTT (SL + Target)':enableBracket?`⚡ Place Bracket ${txnType}`:`⚡ Place ${txnType} Order`}
        </button>

        {execResult&&<div style={{marginTop:12,padding:12,borderRadius:6,background:execResult.data||execResult.status==='success'?'rgba(0,255,136,0.1)':'rgba(255,68,85,0.1)',border:`1px solid ${execResult.data||execResult.status==='success'?'rgba(0,255,136,0.3)':'rgba(255,68,85,0.3)'}`}}>
          <div style={{fontSize:12,fontWeight:700,color:execResult.data||execResult.status==='success'?'#00ff88':'#ff4455',marginBottom:4}}>
            {execResult.data||execResult.status==='success'?'✓ Order Placed Successfully':'✗ Order Failed'}
          </div>
          <pre style={{fontSize:8,color:'var(--text-muted)',fontFamily:'var(--font-mono)',margin:0,whiteSpace:'pre-wrap'}}>{JSON.stringify(execResult,null,2)}</pre>
        </div>}
      </div>}

      {analysis&&<div className="ai-response glow-border" style={{marginTop:20}} dangerouslySetInnerHTML={{__html:formatAIResponse(analysis)}}/>}
    </div>
  );
};

// ═══ EARNINGS REACTION ANALYZER ═══
const EarningsAnalyzer=({symbol,stockData})=>{
  const[quarters,setQuarters]=useState(4);
  const[analysis,setAnalysis]=useState(null);
  const[loading,setLoading]=useState(false);

  const runAnalysis=async()=>{
    setLoading(true);
    try{
      const prompt=`Analyze the last ${quarters} earnings reports for ${symbol} (${stockData?.name||'Indian Stock'}).

Current Stock Context:
- Price: ₹${stockData?.price}
- P/E: ${stockData?.fundamentals?.pe_ratio}
- Market Cap: ₹${stockData?.fundamentals?.market_cap_cr} Cr

Provide a comprehensive earnings reaction analysis:

### EARNINGS HISTORY PATTERN
For each of the last ${quarters} quarters, analyze:
- Beat/Miss/Inline status
- Revenue growth trend
- EPS surprise percentage
- Stock reaction (1-day, 1-week post earnings)
- Guidance changes

### MARKET REACTION PATTERNS
- Average move on earnings day
- Tendency to gap up/down
- Post-earnings drift direction
- Options implied move vs actual

### KEY METRICS TO WATCH
- Revenue growth trajectory
- Margin trends (gross, operating, net)
- Guidance patterns (raise/maintain/lower)
- Management commentary themes

### SENTIMENT ANALYSIS
- Analyst estimate revisions
- Institutional positioning pre-earnings
- Short interest changes
- Options flow signals

### TRADING STRATEGY
- Pre-earnings positioning (if any)
- Earnings day strategy
- Post-earnings playbook
- Key price levels to watch

### NEXT EARNINGS OUTLOOK
- Expected report date
- Consensus estimates
- Likely surprises
- Recommended approach

Format with 🟢 for beats, 🔴 for misses, 🟡 for inline.`;

      const response=await callGroqAI(prompt);
      setAnalysis(response);
    }catch(e){alert(e.message)}
    setLoading(false);
  };

  const mockEarnings=[
    {q:'Q3 FY24',eps:12.5,est:11.2,rev:2450,revEst:2380,reaction:3.2,status:'beat'},
    {q:'Q2 FY24',eps:10.8,est:10.5,rev:2280,revEst:2250,reaction:-1.5,status:'beat'},
    {q:'Q1 FY24',eps:9.2,est:9.8,rev:2150,revEst:2200,reaction:-4.2,status:'miss'},
    {q:'Q4 FY23',eps:11.0,est:11.0,rev:2320,revEst:2310,reaction:0.8,status:'inline'},
  ];

  return(
    <div className="fade-in">
      <div className="section-title">📊 EARNINGS REACTION ANALYZER</div>
      
      <div style={{display:'flex',gap:12,marginBottom:20,alignItems:'center'}}>
        <label style={{fontSize:11,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>ANALYZE LAST</label>
        <select value={quarters} onChange={e=>setQuarters(+e.target.value)} style={{width:80}}>
          <option value={4}>4 Qtrs</option>
          <option value={8}>8 Qtrs</option>
          <option value={12}>12 Qtrs</option>
        </select>
        <span style={{fontSize:11,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>QUARTERS</span>
      </div>

      <div style={{marginBottom:20}}>
        <div style={{fontSize:10,color:'var(--text-muted)',fontFamily:'var(--font-mono)',marginBottom:8}}>RECENT EARNINGS (SAMPLE DATA)</div>
        {mockEarnings.map((e,i)=>(
          <div key={i} className={`earnings-card ${e.status}`}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontWeight:700,fontSize:13}}>{e.q}</span>
                <span className={`badge badge-${e.status==='beat'?'bull':e.status==='miss'?'bear':'neutral'}`}>
                  {e.status==='beat'?'🟢 BEAT':e.status==='miss'?'🔴 MISS':'🟡 INLINE'}
                </span>
              </div>
              <span style={{fontFamily:'var(--font-mono)',fontSize:13,fontWeight:700,color:e.reaction>=0?'#00ff88':'#ff4455'}}>
                {e.reaction>=0?'+':''}{e.reaction}%
              </span>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,fontSize:11}}>
              <div>
                <span style={{color:'var(--text-muted)'}}>EPS: </span>
                <span style={{fontFamily:'var(--font-mono)',fontWeight:600}}>₹{e.eps}</span>
                <span style={{color:'var(--text-muted)'}}> vs Est ₹{e.est}</span>
                <span style={{color:e.eps>e.est?'#00ff88':'#ff4455',marginLeft:6}}>({((e.eps-e.est)/e.est*100).toFixed(1)}%)</span>
              </div>
              <div>
                <span style={{color:'var(--text-muted)'}}>Rev: </span>
                <span style={{fontFamily:'var(--font-mono)',fontWeight:600}}>₹{e.rev}Cr</span>
                <span style={{color:'var(--text-muted)'}}> vs Est ₹{e.revEst}Cr</span>
              </div>
            </div>
            <div className="reaction-bar">
              <div className="reaction-fill" style={{
                width:`${Math.min(Math.abs(e.reaction)*10,100)}%`,
                background:e.reaction>=0?'linear-gradient(90deg,#00cc66,#00ff88)':'linear-gradient(90deg,#ff4455,#ff6655)',
                marginLeft:e.reaction<0?'auto':0
              }}/>
            </div>
          </div>
        ))}
      </div>

      <button className="btn btn-accent" style={{width:'100%',padding:'14px'}} onClick={runAnalysis} disabled={loading}>
        {loading?'⚡ Analyzing Patterns...':'📈 Generate Earnings Analysis'}
      </button>

      {analysis&&<div className="ai-response glow-border" style={{marginTop:20}} dangerouslySetInnerHTML={{__html:formatAIResponse(analysis)}}/>}
    </div>
  );
};

// ═══ MAIN APP ═══
const EdgeIntel=()=>{
  const[symbol,setSymbol]=useState('');
  const[inputSymbol,setInputSymbol]=useState('');
  const[stockData,setStockData]=useState(null);
  const[loading,setLoading]=useState(false);
  const[activeTab,setActiveTab]=useState('institutional');
  const[hasApiKey,setHasApiKey]=useState(!!GROQ_API_KEY);
  const[showSuggestions,setShowSuggestions]=useState(false);
  const[suggestions,setSuggestions]=useState([]);
  const inputRef=useRef(null);

  // Autocomplete filter
  useEffect(()=>{
    if(inputSymbol.length>=1){
      const q=inputSymbol.toUpperCase();
      const matches=FULL_STOCK_LIST.filter(s=>
        s.s.startsWith(q)||s.n.toUpperCase().includes(q)
      ).slice(0,12);
      setSuggestions(matches);
      setShowSuggestions(matches.length>0);
    }else{
      setSuggestions([]);
      setShowSuggestions(false);
    }
  },[inputSymbol]);

  const selectStock=(s)=>{
    setInputSymbol(s.s);
    setShowSuggestions(false);
    loadStock(s.s);
  };

  const loadStock=async(sym)=>{
    if(!sym)return;
    setLoading(true);
    setShowSuggestions(false);
    try{
      const res=await fetch(`./data/stock_details/${sym.toUpperCase()}.json?t=${Date.now()}`);
      if(res.ok){
        const data=await res.json();
        setStockData(data);
        setSymbol(sym.toUpperCase());
      }else{
        // Try scanner results
        const scanRes=await fetch(`./data/scanner_results.json?t=${Date.now()}`);
        if(scanRes.ok){
          const scanData=await scanRes.json();
          const found=scanData.stocks?.find(s=>s.symbol.toUpperCase()===sym.toUpperCase());
          if(found){setStockData(found);setSymbol(sym.toUpperCase())}
          else{alert('Stock not found');setStockData(null)}
        }
      }
    }catch(e){console.error(e);setStockData(null)}
    setLoading(false);
  };

  const handleSubmit=e=>{e.preventDefault();loadStock(inputSymbol)};

  // Close suggestions when clicking outside
  useEffect(()=>{
    const handleClick=(e)=>{
      if(inputRef.current&&!inputRef.current.contains(e.target)){
        setShowSuggestions(false);
      }
    };
    document.addEventListener('click',handleClick);
    return()=>document.removeEventListener('click',handleClick);
  },[]);

  return(
    <div>
      <nav className="nav">
        <a href="index.html" style={{display:'flex',alignItems:'center'}}>
          <img src="assets/logo.jpeg" alt="TE" style={{height:80,marginRight:16}} onError={e=>e.target.style.display='none'}/>
        </a>
        <a href="scanner.html" className="nav-link">Scanner</a>
        <a href="watchlist.html" className="nav-link">Watchlist</a>
        <a href="matrix.html" className="nav-link">Matrix</a>
        <a href="edge-intel.html" className="nav-link active">Edge Intel</a>
      </nav>

      <div style={{maxWidth:1200,margin:'0 auto',padding:'24px 20px'}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <h1 className="title-glow" style={{fontSize:36,fontWeight:900,background:'linear-gradient(135deg,#00ff88,#00c8ff,#8844ff)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginBottom:8}}>
            ◈ EDGE INTEL
          </h1>
          <p style={{fontSize:13,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>
            INSTITUTIONAL BREAKDOWN • SMART TRADE SETUP • EARNINGS ANALYZER
          </p>
        </div>

        {!hasApiKey&&<div style={{padding:16,background:'rgba(255,170,0,0.1)',border:'1px solid rgba(255,170,0,0.3)',borderRadius:8,marginBottom:20,textAlign:'center'}}>
          <div style={{fontSize:12,color:'#ffaa00',marginBottom:8}}>⚠️ GROQ API Key Required</div>
          <div style={{fontSize:11,color:'var(--text-muted)'}}>Set <code style={{background:'var(--bg-tertiary)',padding:'2px 6px',borderRadius:3}}>localStorage.setItem('groq_api_key', 'YOUR_KEY')</code> in console</div>
          <a href="https://console.groq.com" target="_blank" style={{fontSize:10,color:'var(--accent2)'}}>Get free API key →</a>
        </div>}

        <form onSubmit={handleSubmit} style={{display:'flex',gap:12,marginBottom:24}}>
          <div className="autocomplete-wrapper" style={{flex:1}} ref={inputRef}>
            <input 
              type="text" 
              value={inputSymbol} 
              onChange={e=>setInputSymbol(e.target.value.toUpperCase())}
              onFocus={()=>inputSymbol.length>=1&&suggestions.length>0&&setShowSuggestions(true)}
              placeholder="Enter NSE Symbol (e.g., RELIANCE, TCS, INFY)"
              style={{width:'100%',padding:'14px 18px',fontSize:14,borderRadius:showSuggestions?'8px 8px 0 0':'8px'}}
              autoComplete="off"
            />
            {showSuggestions&&<div className="autocomplete-list">
              {suggestions.map((s,i)=>(
                <div key={i} className="autocomplete-item" onClick={()=>selectStock(s)}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span className="symbol">{s.s}</span>
                    <span className="name">{s.n}</span>
                  </div>
                  {s.sec&&<span className="sector">{s.sec}</span>}
                </div>
              ))}
            </div>}
          </div>
          <button type="submit" className="btn btn-accent" style={{padding:'14px 28px'}} disabled={loading}>
            {loading?'Loading...':'🔍 Analyze'}
          </button>
        </form>

        {stockData&&<div className="card glow-border" style={{marginBottom:24}}>
          <div style={{padding:'16px 20px',background:'linear-gradient(90deg,rgba(0,255,136,0.03),transparent)',borderBottom:'1px solid var(--border-dim)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <span style={{fontSize:24,fontWeight:900,color:'#fff'}}>{symbol}</span>
              <span style={{fontSize:13,color:'var(--text-secondary)',marginLeft:12}}>{stockData.name||stockData.sector}</span>
              {stockData.sector&&<span style={{fontSize:10,padding:'3px 8px',borderRadius:4,background:'rgba(0,200,255,0.1)',color:'#00c8ff',marginLeft:8,fontFamily:'var(--font-mono)'}}>{stockData.sector}</span>}
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:24,fontWeight:800,fontFamily:'var(--font-mono)',color:'#fff'}}>₹{stockData.price?.toLocaleString()}</div>
              <div style={{fontSize:13,fontFamily:'var(--font-mono)',fontWeight:700,color:stockData.change_pct>=0?'#00ff88':'#ff4455'}}>
                {stockData.change_pct>=0?'▲':'▼'} {stockData.change_pct>=0?'+':''}{stockData.change_pct?.toFixed(2)}%
              </div>
            </div>
          </div>
        </div>}

        {stockData&&<Fragment>
          <div className="tabs" style={{marginBottom:24,justifyContent:'center'}}>
            <button className={`tab ${activeTab==='institutional'?'active':''}`} onClick={()=>setActiveTab('institutional')}>
              🏛️ Institutional
            </button>
            <button className={`tab ${activeTab==='trade'?'active':''}`} onClick={()=>setActiveTab('trade')}>
              📐 Trade Setup
            </button>
            <button className={`tab ${activeTab==='earnings'?'active':''}`} onClick={()=>setActiveTab('earnings')}>
              📊 Earnings
            </button>
          </div>

          <div className="card" style={{padding:24}}>
            {activeTab==='institutional'&&<InstitutionalBreakdown symbol={symbol} stockData={stockData}/>}
            {activeTab==='trade'&&<SmartTradeSetup symbol={symbol} stockData={stockData}/>}
            {activeTab==='earnings'&&<EarningsAnalyzer symbol={symbol} stockData={stockData}/>}
          </div>
        </Fragment>}

        {!stockData&&!loading&&<div style={{textAlign:'center',padding:60,color:'var(--text-muted)'}}>
          <div style={{fontSize:48,marginBottom:16,opacity:0.3}}>◈</div>
          <div style={{fontSize:14}}>Enter a stock symbol to begin analysis</div>
          <div style={{fontSize:11,marginTop:8,color:'var(--text-muted)'}}>Examples: RELIANCE, TCS, INFY, HDFCBANK, ICICIBANK</div>
        </div>}

        <div style={{marginTop:32,padding:'16px 0',borderTop:'1px solid var(--border-dim)',display:'flex',justifyContent:'space-between',fontSize:9,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>
          <span>EDGE INTEL v1.0 • TRADEDGE</span>
          <span>Powered by Groq llama-3.3-70b</span>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<EdgeIntel/>);
</script>
</body>
</html>
