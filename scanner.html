<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner | TradEdge</title>
    <link rel="icon" type="image/jpeg" href="assets/logo.jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-hover: #242432;
            --border: #2a2a3a;
            --text-primary: #e8e8f0;
            --text-secondary: #8888a0;
            --text-muted: #5a5a70;
            --accent-cyan: #00f0ff;
            --accent-magenta: #ff00aa;
            --accent-green: #00ff88;
            --accent-red: #ff4466;
            --accent-yellow: #ffaa00;
            --accent-purple: #aa66ff;
            --gradient-cyber: linear-gradient(135deg, #00f0ff 0%, #ff00aa 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 16px; }

        .logo {
            width: 36px; height: 36px; border-radius: 8px;
            background: var(--gradient-cyber);
        }

        .logo img { width: 100%; height: 100%; border-radius: 8px; object-fit: cover; }

        .title {
            font-size: 20px; font-weight: 600;
            background: linear-gradient(90deg, #00f0ff 0%, #ff00aa 25%, #00f0ff 50%, #ff00aa 75%, #00f0ff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
        }

        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }

        .subtitle { font-size: 12px; color: var(--text-muted); margin-left: 12px; }

        .header-right { display: flex; align-items: center; gap: 16px; }

        .meta-info { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); }
        .meta-info span { color: var(--accent-cyan); }

        .nav-links { display: flex; gap: 8px; }
        .nav-link {
            padding: 6px 12px; font-size: 12px; color: var(--text-secondary);
            text-decoration: none; border-radius: 6px; transition: all 0.2s;
        }
        .nav-link:hover { background: var(--bg-hover); color: var(--text-primary); }

        .tab-nav {
            display: flex; background: var(--bg-secondary);
            border-bottom: 1px solid var(--border); padding: 0 24px;
        }

        .tab-btn {
            padding: 14px 24px; background: transparent; border: none;
            color: var(--text-secondary); font-family: 'Outfit', sans-serif;
            font-size: 14px; font-weight: 500; cursor: pointer;
            border-bottom: 2px solid transparent; transition: all 0.2s;
        }

        .tab-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
        .tab-btn.active { color: var(--accent-cyan); border-bottom-color: var(--accent-cyan); }

        .main { display: grid; grid-template-columns: 300px 1fr; min-height: calc(100vh - 110px); }

        .sidebar {
            background: var(--bg-secondary); border-right: 1px solid var(--border);
            padding: 20px; overflow-y: auto; max-height: calc(100vh - 110px);
        }

        .sidebar-section { margin-bottom: 20px; }

        .sidebar-title {
            font-size: 10px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px;
            display: flex; align-items: center; gap: 6px;
        }

        .sidebar-title .icon { font-size: 12px; }

        .scan-list { display: flex; flex-direction: column; gap: 3px; }

        .scan-btn {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 12px; background: transparent; border: 1px solid transparent;
            border-radius: 8px; cursor: pointer; transition: all 0.2s;
            text-align: left; width: 100%;
        }

        .scan-btn:hover { background: var(--bg-hover); border-color: var(--border); }
        .scan-btn.active { background: var(--bg-card); border-color: var(--accent-cyan); }
        .scan-btn.active .scan-name { color: var(--accent-cyan); }

        .scan-name { font-size: 13px; color: var(--text-secondary); font-weight: 500; }

        .scan-count {
            font-family: 'JetBrains Mono', monospace; font-size: 11px;
            color: var(--text-muted); background: var(--bg-primary);
            padding: 2px 8px; border-radius: 10px; min-width: 32px; text-align: center;
        }

        .scan-btn.active .scan-count { background: rgba(0, 240, 255, 0.15); color: var(--accent-cyan); }

        .content { padding: 24px; overflow-y: auto; max-height: calc(100vh - 110px); }

        .content-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }

        .content-title { font-size: 24px; font-weight: 600; }
        .content-desc { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

        .content-meta { display: flex; align-items: center; gap: 8px; margin-top: 8px; }

        .meta-badge {
            font-size: 11px; padding: 4px 10px; border-radius: 12px;
            background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border);
        }

        .meta-badge.category {
            background: rgba(0, 240, 255, 0.1); color: var(--accent-cyan);
            border-color: rgba(0, 240, 255, 0.3);
        }

        .search-box { position: relative; }

        .search-input {
            width: 280px; padding: 10px 16px 10px 40px;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
            color: var(--text-primary); font-family: 'Outfit', sans-serif;
            font-size: 13px; transition: all 0.2s;
        }

        .search-input:focus {
            outline: none; border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.1);
        }

        .search-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 14px;
        }

        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }

        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
            padding: 16px 20px; display: flex; align-items: center; gap: 14px;
        }

        .stat-icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 18px;
        }

        .stat-icon.cyan { background: rgba(0, 240, 255, 0.15); }
        .stat-icon.green { background: rgba(0, 255, 136, 0.15); }
        .stat-icon.yellow { background: rgba(255, 170, 0, 0.15); }
        .stat-icon.purple { background: rgba(170, 102, 255, 0.15); }

        .stat-value { font-size: 22px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

        .table-container {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden;
        }

        .stock-table { width: 100%; border-collapse: collapse; }

        .stock-table th {
            background: var(--bg-secondary); padding: 12px 14px; text-align: left;
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--text-muted);
            border-bottom: 1px solid var(--border); cursor: pointer;
            user-select: none; transition: all 0.2s; white-space: nowrap;
        }

        .stock-table th:hover { color: var(--text-primary); background: var(--bg-hover); }
        .stock-table th.sorted { color: var(--accent-cyan); }

        .sort-icon { margin-left: 4px; opacity: 0.5; }
        .stock-table th.sorted .sort-icon { opacity: 1; }

        .stock-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }

        .stock-table tbody tr { transition: all 0.15s; cursor: pointer; }
        .stock-table tbody tr:hover { background: var(--bg-hover); }
        .stock-table tbody tr:last-child td { border-bottom: none; }

        .symbol-name { font-weight: 600; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
        .company-name { font-size: 11px; color: var(--text-muted); max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .price-cell { font-family: 'JetBrains Mono', monospace; font-weight: 500; }
        .change-positive { color: var(--accent-green); }
        .change-negative { color: var(--accent-red); }

        .grade-badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 28px; height: 28px; border-radius: 6px;
            font-weight: 700; font-size: 13px;
        }

        .grade-A { background: rgba(0, 255, 136, 0.15); color: var(--accent-green); border: 1px solid rgba(0, 255, 136, 0.3); }
        .grade-B { background: rgba(0, 240, 255, 0.15); color: var(--accent-cyan); border: 1px solid rgba(0, 240, 255, 0.3); }
        .grade-C { background: rgba(255, 170, 0, 0.15); color: var(--accent-yellow); border: 1px solid rgba(255, 170, 0, 0.3); }
        .grade-D { background: rgba(255, 68, 102, 0.15); color: var(--accent-red); border: 1px solid rgba(255, 68, 102, 0.3); }
        .grade-E, .grade-- { background: var(--bg-hover); color: var(--text-muted); border: 1px solid var(--border); }

        .status-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 500;
        }

        .status-safe { background: rgba(0, 255, 136, 0.1); color: var(--accent-green); }
        .status-caution { background: rgba(255, 170, 0, 0.1); color: var(--accent-yellow); }
        .status-danger { background: rgba(255, 68, 102, 0.1); color: var(--accent-red); }

        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

        .metric-cell { font-family: 'JetBrains Mono', monospace; font-size: 12px; }

        .loading, .empty-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 80px; color: var(--text-muted);
        }

        .loading-spinner {
            width: 40px; height: 40px; border: 3px solid var(--border);
            border-top-color: var(--accent-cyan); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }

        .pagination {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; background: var(--bg-secondary); border-top: 1px solid var(--border);
        }

        .page-info { font-size: 13px; color: var(--text-muted); }
        .page-info span { color: var(--text-primary); font-weight: 500; }

        .page-controls { display: flex; gap: 8px; }

        .page-btn {
            padding: 8px 16px; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text-secondary); cursor: pointer;
            font-family: 'Outfit', sans-serif; font-size: 13px; transition: all 0.2s;
        }

        .page-btn:hover:not(:disabled) {
            background: var(--bg-hover); color: var(--text-primary); border-color: var(--accent-cyan);
        }

        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        @media (max-width: 1200px) {
            .main { grid-template-columns: 260px 1fr; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 900px) {
            .main { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo"><img src="assets/logo.jpeg" alt="TradEdge" onerror="this.style.display='none'"></div>
            <span class="title">SCANNER</span>
            <span class="subtitle">Stock Screener</span>
        </div>
        <div class="header-right">
            <button id="refreshBtn" onclick="refreshStockList()" style="padding:6px 14px;background:rgba(0,240,255,0.1);border:1px solid var(--accent-cyan);border-radius:6px;color:var(--accent-cyan);font-size:11px;font-weight:600;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all 0.2s" onmouseover="this.style.background='rgba(0,240,255,0.2)'" onmouseout="this.style.background='rgba(0,240,255,0.1)'">🔄 Refresh</button>
            <div class="meta-info">Updated: <span id="lastUpdate">-</span> • <span id="stockCount">-</span> stocks</div>
            <nav class="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="matrix.html" class="nav-link">Matrix</a>
                <a href="stock.html" class="nav-link">Drilldown</a>
            </nav>
        </div>
    </header>

    <nav class="tab-nav">
        <button class="tab-btn active" data-tab="presets">📊 Scan Presets</button>
        <button class="tab-btn" data-tab="categories">🏷️ Categories</button>
        <button class="tab-btn" data-tab="live">⚡ Live Scans</button>
    </nav>

    <main class="main">
        <aside class="sidebar" id="sidebar"></aside>
        <section class="content">
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-icon cyan">📊</div>
                    <div class="stat-content"><div class="stat-value" id="totalScanned">-</div><div class="stat-label">Total Scanned</div></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green">🚀</div>
                    <div class="stat-content"><div class="stat-value" id="stat2">-</div><div class="stat-label" id="stat2Label">-</div></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon yellow">⚡</div>
                    <div class="stat-content"><div class="stat-value" id="stat3">-</div><div class="stat-label" id="stat3Label">-</div></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon purple">✅</div>
                    <div class="stat-content"><div class="stat-value" id="stat4">-</div><div class="stat-label" id="stat4Label">-</div></div>
                </div>
            </div>

            <div class="content-header">
                <div>
                    <h1 class="content-title" id="scanTitle">All Stocks</h1>
                    <p class="content-desc" id="scanDesc">Complete scanner results</p>
                    <div class="content-meta" id="scanMeta"></div>
                </div>
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="searchInput" placeholder="Search symbol or name...">
                </div>
            </div>

            <div class="table-container">
                <div id="loadingState" class="loading"><div class="loading-spinner"></div><div>Loading scanner results...</div></div>
                <div id="emptyState" class="empty-state" style="display: none;"><div class="empty-icon">📭</div><div>No stocks found</div></div>

                <table class="stock-table" id="stockTable" style="display: none;">
                    <thead>
                        <tr>
                            <th data-sort="symbol">Symbol <span class="sort-icon">↕</span></th>
                            <th data-sort="close">CMP <span class="sort-icon">↕</span></th>
                            <th data-sort="change_pct">Chg% <span class="sort-icon">↕</span></th>
                            <th data-sort="return_1m">1M <span class="sort-icon">↕</span></th>
                            <th data-sort="return_3m">3M <span class="sort-icon">↕</span></th>
                            <th data-sort="oneil_grade">O'Neil <span class="sort-icon">↕</span></th>
                            <th data-sort="composite_score">Score <span class="sort-icon">↕</span></th>
                            <th data-sort="surveillance_status">Status <span class="sort-icon">↕</span></th>
                            <th data-sort="volume_ratio">Vol <span class="sort-icon">↕</span></th>
                            <th data-sort="roe">ROE <span class="sort-icon">↕</span></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>

                <div class="pagination" id="pagination" style="display: none;">
                    <div class="page-info">Showing <span id="showingFrom">1</span>-<span id="showingTo">50</span> of <span id="totalResults">0</span></div>
                    <div class="page-controls">
                        <button class="page-btn" id="prevBtn" disabled>← Prev</button>
                        <button class="page-btn" id="nextBtn">Next →</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="js/nse-stock-master.js"></script>
    <script>
        let presetsData = null, categoriesData = null, currentTab = 'presets';
        let currentStocks = [], filteredStocks = [], sortField = 'composite_score', sortDir = 'desc';
        let currentPage = 1; const pageSize = 50;
        let darvasData = null, trendlineData = null;

        // ═══ CHARTINK LIVE SCAN PRESETS ═══
        const LIVE_SCANS = {
            'BREAKOUT SCANS': {
                icon: '🚀', scans: [
                    { id: 'horizontal_breakout', name: 'Horizontal Resistance Breakout', desc: 'Close > 20-day high + 1.5x volume + EMA sync', clause: "( {cash} ( [0] close > [0] max( 20 , [0] high ) and [-1] close <= [-1] max( 20 , [-1] high ) and [0] volume > 1.5 * [0] sma( volume,20 ) and [0] ema( close,10 ) > [0] ema( close,20 ) and [0] ema( close,20 ) > [0] ema( close,50 ) and [0] ema( close,50 ) > [0] ema( close,200 ) ) ) " },
                    { id: 'horizontal_tight', name: 'Tight Range Breakout', desc: '10-day high breakout after ATR contraction + EMA sync', clause: "( {cash} ( [0] close > [0] max( 10 , [0] high ) and [-1] close <= [-1] max( 10 , [-1] high ) and [0] atr( 10 ) < [0] atr( 40 ) * 0.7 and [0] volume > 1.3 * [0] sma( volume,20 ) and [0] ema( close,10 ) > [0] ema( close,20 ) and [0] ema( close,20 ) > [0] ema( close,50 ) ) ) " }
                ]
            },
            'MOMENTUM SCANS': {
                icon: '⚡', scans: [
                    { id: 'stoch_oversold', name: 'Stochastic Oversold Reversal', desc: 'Stoch(5,3,3) crossing up from <20 + EMA sync', clause: "( {cash} ( [0] 5 day stochastic %k ( 5,3,3 ) > [0] 5 day stochastic %d ( 5,3,3 ) and [-1] 5 day stochastic %k ( 5,3,3 ) <= [-1] 5 day stochastic %d ( 5,3,3 ) and [-1] 5 day stochastic %k ( 5,3,3 ) < 20 and [0] ema( close,10 ) > [0] ema( close,20 ) and [0] ema( close,20 ) > [0] ema( close,50 ) and [0] ema( close,50 ) > [0] ema( close,200 ) ) ) " },
                    { id: 'stoch_midrange', name: 'Stochastic Mid-range Crossover', desc: 'Stoch crossing in 40-60 zone (momentum re-ignition)', clause: "( {cash} ( [0] 5 day stochastic %k ( 5,3,3 ) > [0] 5 day stochastic %d ( 5,3,3 ) and [-1] 5 day stochastic %k ( 5,3,3 ) <= [-1] 5 day stochastic %d ( 5,3,3 ) and [0] 5 day stochastic %k ( 5,3,3 ) >= 40 and [0] 5 day stochastic %k ( 5,3,3 ) <= 65 and [0] ema( close,10 ) > [0] ema( close,20 ) and [0] ema( close,20 ) > [0] ema( close,50 ) and [0] ema( close,50 ) > [0] ema( close,200 ) ) ) " },
                    { id: 'ema_pullback', name: 'EMA Sync + Pullback to 10 EMA', desc: 'Perfect EMA order + price bouncing off 10 EMA', clause: "( {cash} ( [0] ema( close,10 ) > [0] ema( close,20 ) and [0] ema( close,20 ) > [0] ema( close,50 ) and [0] ema( close,50 ) > [0] ema( close,200 ) and [0] low <= [0] ema( close,10 ) * 1.01 and [0] close > [0] ema( close,10 ) and [0] close > [0] open ) ) " },
                    { id: 'ema_perfect', name: 'EMA Perfect Order', desc: '10>20>50>200 EMA + price above all', clause: "( {cash} ( [0] ema( close,10 ) > [0] ema( close,20 ) and [0] ema( close,20 ) > [0] ema( close,50 ) and [0] ema( close,50 ) > [0] ema( close,200 ) and [0] close > [0] ema( close,10 ) ) ) " }
                ]
            },
            'PATTERN SCANS (Python)': {
                icon: '📐', scans: [
                    { id: 'darvas_box', name: 'Darvas Box Breakout', desc: 'Price breaking above Darvas Box ceiling + EMA sync', type: 'python' },
                    { id: 'trendline_break', name: 'Descending Trendline Breakout', desc: 'Breaking above descending trendline on swing highs', type: 'python' }
                ]
            },
            'IPO LISTINGS': {
                icon: '🆕', scans: [
                    { id: 'ipo_1y', name: 'IPO < 1 Year', desc: 'Stocks listed within last 12 months', type: 'ipo', years: 1 },
                    { id: 'ipo_2y', name: 'IPO < 2 Years', desc: 'Stocks listed within last 24 months', type: 'ipo', years: 2 },
                    { id: 'ipo_3y', name: 'IPO < 3 Years', desc: 'Stocks listed within last 36 months', type: 'ipo', years: 3 }
                ]
            }
        };

        // ═══ REFRESH STOCK LIST ═══
        async function refreshStockList() {
            const btn = document.getElementById('refreshBtn');
            btn.textContent = '⏳ Refreshing...';
            btn.disabled = true;
            try {
                if (window.NSEMaster) {
                    await NSEMaster.refresh();
                    const s = NSEMaster.stats();
                    document.getElementById('stockCount').textContent = s.total;
                    document.getElementById('totalScanned').textContent = s.total;
                    document.getElementById('lastUpdate').textContent = new Date().toLocaleString('en-IN', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
                    btn.textContent = '✓ ' + s.total + ' stocks';
                    setTimeout(() => { btn.textContent = '🔄 Refresh'; btn.disabled = false; }, 3000);
                } else {
                    btn.textContent = '⚠ NSEMaster not loaded';
                    setTimeout(() => { btn.textContent = '🔄 Refresh'; btn.disabled = false; }, 2000);
                }
            } catch(e) {
                btn.textContent = '✗ Failed';
                setTimeout(() => { btn.textContent = '🔄 Refresh'; btn.disabled = false; }, 2000);
            }
        }

        // ═══ CHARTINK LIVE SCAN EXECUTION ═══
        async function runChartInkScan(scanId, clause) {
            const wUrl = localStorage.getItem('zd_worker_url') || localStorage.getItem('te_worker_url') || 'https://spring-fire-41a0.drrgware.workers.dev';
            document.getElementById('scanTitle').textContent = '⏳ Running scan...';
            try {
                const res = await fetch(wUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Kite-Action': 'chartink-scan' },
                    body: JSON.stringify({ scan_clause: clause })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                return (data.stocks || []).map(s => ({
                    symbol: s.symbol, name: s.name, close: s.close, cmp: s.close,
                    change_pct: s.change_pct, volume_ratio: 0, return_1m: 0, return_3m: 0,
                    composite_score: 0, oneil_grade: '-', surveillance_status: '-', roe: 0
                }));
            } catch(e) {
                console.error('ChartInk scan failed:', e);
                document.getElementById('scanTitle').textContent = '✗ Scan failed: ' + e.message;
                return [];
            }
        }

        async function init() {
            try {
                // Load scanner data + NSEMaster in parallel
                const [pr, cr, dr, tr] = await Promise.all([
                    fetch('data/scan_presets_results.json').catch(() => null),
                    fetch('data/scanner_results.json').catch(() => null),
                    fetch('data/darvas_breakouts.json').catch(() => null),
                    fetch('data/trendline_breakouts.json').catch(() => null)
                ]);
                if (pr?.ok) presetsData = await pr.json();
                if (cr?.ok) categoriesData = await cr.json();
                if (dr?.ok) darvasData = await dr.json();
                if (tr?.ok) trendlineData = await tr.json();
                if (!presetsData && !categoriesData) throw new Error('No data');
                
                // Init NSEMaster (non-blocking) — updates count when ready
                if (window.NSEMaster) {
                    NSEMaster.init().then(() => {
                        const s = NSEMaster.stats();
                        document.getElementById('stockCount').textContent = s.total;
                        document.getElementById('totalScanned').textContent = s.total;
                        // Update date to now if on Live tab
                        if (currentTab === 'live') {
                            document.getElementById('lastUpdate').textContent = new Date().toLocaleString('en-IN', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
                        }
                        console.log('NSEMaster ready:', s.total, 'stocks | IPO 1Y:', s.ipo1y, '| 2Y:', s.ipo2y, '| 3Y:', s.ipo3y);
                    });
                }

                updateMeta();
                if (!presetsData && categoriesData) {
                    currentTab = 'categories';
                    document.querySelector('[data-tab="categories"]').classList.add('active');
                    document.querySelector('[data-tab="presets"]').classList.remove('active');
                }
                setupTabs(); renderSidebar(); selectFirstScan();
            } catch (e) {
                document.getElementById('loadingState').innerHTML = `<div class="empty-icon">⚠️</div><div>No scanner data</div><div style="font-size:12px;margin-top:8px;color:var(--text-muted)">Run scanner workflow first</div>`;
            }
        }

        function updateMeta() {
            const d = presetsData || categoriesData;
            
            // Find the most recent date across all data sources
            const dates = [];
            if (d?.meta?.generated_at) dates.push(new Date(d.meta.generated_at));
            if (darvasData?.generated_at) dates.push(new Date(darvasData.generated_at));
            if (trendlineData?.generated_at) dates.push(new Date(trendlineData.generated_at));
            
            if (dates.length > 0) {
                const latest = new Date(Math.max(...dates));
                document.getElementById('lastUpdate').textContent = latest.toLocaleString('en-IN', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
            }
            
            // Stock count: use NSEMaster if available, else fallback to scanner meta
            if (window.NSEMaster && NSEMaster.ready) {
                const nseCount = NSEMaster.count();
                document.getElementById('stockCount').textContent = nseCount;
                document.getElementById('totalScanned').textContent = nseCount;
            } else if (d?.meta?.total_stocks) {
                document.getElementById('stockCount').textContent = d.meta.total_stocks;
                document.getElementById('totalScanned').textContent = d.meta.total_stocks;
            }
        }

        function setupTabs() {
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.addEventListener('click', () => {
                    currentTab = b.dataset.tab;
                    document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    // Update date display based on tab
                    if (currentTab === 'live') {
                        document.getElementById('lastUpdate').textContent = new Date().toLocaleString('en-IN', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
                    } else {
                        updateMeta(); // Restore original date from scanner data
                    }
                    renderSidebar(); selectFirstScan();
                });
            });
        }

        function renderSidebar() {
            const sb = document.getElementById('sidebar');
            if (currentTab === 'presets' && presetsData) renderPresetsSidebar(sb);
            else if (currentTab === 'live') renderLiveSidebar(sb);
            else if (categoriesData) renderCategoriesSidebar(sb);
        }

        function renderPresetsSidebar(sb) {
            const cats = presetsData.scans_by_category || {};
            let h = '';
            for (const [cid, cd] of Object.entries(cats)) {
                const i = cd.info || {};
                h += `<div class="sidebar-section"><div class="sidebar-title"><span class="icon">${i.icon||'📊'}</span>${i.name||cid}</div><div class="scan-list">`;
                for (const s of cd.scans || []) h += `<button class="scan-btn" data-scan="${s.id}" data-type="preset"><span class="scan-name">${s.name}</span><span class="scan-count">${s.count}</span></button>`;
                h += `</div></div>`;
            }
            sb.innerHTML = h; attachListeners();
        }

        function renderLiveSidebar(sb) {
            let h = '';
            for (const [catName, cat] of Object.entries(LIVE_SCANS)) {
                h += `<div class="sidebar-section"><div class="sidebar-title"><span class="icon">${cat.icon}</span>${catName}</div><div class="scan-list">`;
                for (const s of cat.scans) {
                    const badge = s.type === 'python' ? '🐍' : s.type === 'ipo' ? '🆕' : '⚡';
                    h += `<button class="scan-btn" data-scan="${s.id}" data-type="live"><span class="scan-name">${badge} ${s.name}</span><span class="scan-count" id="lc_${s.id}">—</span></button>`;
                }
                h += `</div></div>`;
            }
            sb.innerHTML = h; attachListeners();

            // Auto-load counts for Python scans
            if (darvasData?.results) document.getElementById('lc_darvas_box') && (document.getElementById('lc_darvas_box').textContent = darvasData.results.length);
            if (trendlineData?.results) document.getElementById('lc_trendline_break') && (document.getElementById('lc_trendline_break').textContent = trendlineData.results.length);

            // Auto-load IPO counts from NSEMaster
            if (window.NSEMaster && NSEMaster.ready) {
                const s = NSEMaster.stats();
                if (document.getElementById('lc_ipo_1y')) document.getElementById('lc_ipo_1y').textContent = s.ipo1y;
                if (document.getElementById('lc_ipo_2y')) document.getElementById('lc_ipo_2y').textContent = s.ipo2y;
                if (document.getElementById('lc_ipo_3y')) document.getElementById('lc_ipo_3y').textContent = s.ipo3y;
            } else if (window.NSEMaster) {
                NSEMaster.init().then(() => {
                    const s = NSEMaster.stats();
                    if (document.getElementById('lc_ipo_1y')) document.getElementById('lc_ipo_1y').textContent = s.ipo1y;
                    if (document.getElementById('lc_ipo_2y')) document.getElementById('lc_ipo_2y').textContent = s.ipo2y;
                    if (document.getElementById('lc_ipo_3y')) document.getElementById('lc_ipo_3y').textContent = s.ipo3y;
                });
            }
        }

        function renderCategoriesSidebar(sb) {
            const groups = {
                "O'Neil": ['oneil_a','oneil_ab'], "Guru": ['canslim_high','graham_value','buffett_quality','lynch_growth'],
                "Surveillance": ['safe_stocks','caution_stocks'], "Momentum": ['high_momentum','breakout'],
                "Fundamentals": ['high_roe','low_debt','high_growth'], "Volume": ['high_volume','accumulation','fii_buying','high_promoter']
            };
            const names = {oneil_a:'Grade A',oneil_ab:'Grade A/B',canslim_high:'CANSLIM',graham_value:'Graham',buffett_quality:'Buffett',lynch_growth:'Lynch',safe_stocks:'Safe',caution_stocks:'Caution',high_momentum:'High RS',breakout:'Breakout',high_roe:'High ROE',low_debt:'Low Debt',high_growth:'High Growth',high_volume:'Volume Surge',accumulation:'Accumulation',fii_buying:'FII Buying',high_promoter:'High Promoter'};
            let h = `<div class="sidebar-section"><div class="sidebar-title">📋 All</div><div class="scan-list"><button class="scan-btn active" data-scan="all" data-type="category"><span class="scan-name">All Stocks</span><span class="scan-count">${categoriesData.all_stocks?.length||0}</span></button></div></div>`;
            for (const [g, cs] of Object.entries(groups)) {
                h += `<div class="sidebar-section"><div class="sidebar-title">${g}</div><div class="scan-list">`;
                for (const c of cs) h += `<button class="scan-btn" data-scan="${c}" data-type="category"><span class="scan-name">${names[c]||c}</span><span class="scan-count">${categoriesData.categories?.[c]?.count||0}</span></button>`;
                h += `</div></div>`;
            }
            sb.innerHTML = h; attachListeners();
        }

        function attachListeners() {
            document.querySelectorAll('.scan-btn').forEach(b => {
                b.addEventListener('click', () => {
                    selectScan(b.dataset.scan, b.dataset.type);
                    document.querySelectorAll('.scan-btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                });
            });
        }

        function selectFirstScan() { document.querySelector('.scan-btn')?.click(); }

        function selectScan(id, type) {
            currentPage = 1;
            if (type === 'preset' && presetsData) {
                const r = presetsData.scan_results?.[id];
                if (r) {
                    currentStocks = r.stocks || [];
                    document.getElementById('scanTitle').textContent = r.name;
                    document.getElementById('scanDesc').textContent = r.description;
                    const ci = presetsData.categories?.[r.category] || {};
                    document.getElementById('scanMeta').innerHTML = `<span class="meta-badge category">${ci.icon||''} ${ci.name||r.category}</span><span class="meta-badge">${r.count} matches</span>`;
                    updateStats(presetsData.meta?.total_scans||0, currentStocks.length, Object.keys(presetsData.categories||{}).length);
                }
            } else if (type === 'live') {
                // Find the scan definition
                let scanDef = null;
                for (const cat of Object.values(LIVE_SCANS)) {
                    scanDef = cat.scans.find(s => s.id === id);
                    if (scanDef) break;
                }
                if (!scanDef) return;

                if (scanDef.type === 'python') {
                    // Load from pre-computed JSON
                    let data = null;
                    if (id === 'darvas_box') data = darvasData;
                    else if (id === 'trendline_break') data = trendlineData;

                    if (data?.results) {
                        currentStocks = data.results.map(r => ({
                            symbol: r.symbol, name: r.symbol, close: r.cmp, cmp: r.cmp,
                            change_pct: r.chg_pct, return_1m: r.chg_1m || 0, return_3m: 0,
                            composite_score: r.vol_ratio || 0, oneil_grade: '-',
                            surveillance_status: r.status === 'BREAKOUT' ? 'SAFE' : 'CAUTION',
                            volume_ratio: r.vol_ratio || 0, roe: 0,
                            _extra: r
                        }));
                        document.getElementById('scanTitle').textContent = scanDef.name;
                        document.getElementById('scanDesc').textContent = scanDef.desc;
                        const genAt = data.generated_at ? new Date(data.generated_at).toLocaleString('en-IN', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
                        document.getElementById('scanMeta').innerHTML = `<span class="meta-badge category">🐍 Python</span><span class="meta-badge">${data.results.length} matches</span>` + (genAt ? `<span class="meta-badge">${genAt}</span>` : '');
                        updateStats(data.total_scanned||0, currentStocks.length, data.breakouts||0);
                        // Update sidebar count
                        const lc = document.getElementById('lc_' + id);
                        if (lc) lc.textContent = data.results.length;
                    } else {
                        currentStocks = [];
                        document.getElementById('scanTitle').textContent = scanDef.name;
                        document.getElementById('scanDesc').textContent = 'No data — run the Python scanner first: python3 scripts/' + (id === 'darvas_box' ? 'darvas_scanner.py' : 'trendline_scanner.py');
                        document.getElementById('scanMeta').innerHTML = `<span class="meta-badge category">🐍 Not yet run</span>`;
                    }
                } else if (scanDef.type === 'ipo') {
                    // IPO groups from NSEMaster
                    if (window.NSEMaster && NSEMaster.ready) {
                        const ipoStocks = NSEMaster.getIPO(scanDef.years);
                        currentStocks = ipoStocks.map(s => ({
                            symbol: s.s, name: s.n, close: 0, cmp: 0,
                            change_pct: 0, return_1m: 0, return_3m: 0,
                            composite_score: 0, oneil_grade: '-',
                            surveillance_status: '-', volume_ratio: 0,
                            roe: 0, listing_date: s.listingDate, ipo_years: s.ipoYears
                        }));
                        document.getElementById('scanTitle').textContent = scanDef.name;
                        document.getElementById('scanDesc').textContent = `${ipoStocks.length} stocks listed within last ${scanDef.years} year${scanDef.years>1?'s':''}`;
                        document.getElementById('scanMeta').innerHTML = `<span class="meta-badge category">🆕 IPO</span><span class="meta-badge">${ipoStocks.length} stocks</span>`;
                        updateStats(NSEMaster.count(), ipoStocks.length, 0);
                        const lc = document.getElementById('lc_' + id);
                        if (lc) lc.textContent = ipoStocks.length;
                    } else {
                        currentStocks = [];
                        document.getElementById('scanTitle').textContent = scanDef.name;
                        document.getElementById('scanDesc').textContent = 'Loading NSEMaster... Please wait and retry.';
                        document.getElementById('scanMeta').innerHTML = '';
                        // Try init
                        if (window.NSEMaster) NSEMaster.init().then(() => selectScan(id, type));
                    }
                } else {
                    // ChartInk live scan
                    document.getElementById('scanTitle').textContent = '⏳ Running: ' + scanDef.name;
                    document.getElementById('scanDesc').textContent = scanDef.desc;
                    document.getElementById('scanMeta').innerHTML = `<span class="meta-badge category">⚡ ChartInk Live</span><span class="meta-badge">Scanning...</span>`;
                    
                    runChartInkScan(id, scanDef.clause).then(stocks => {
                        currentStocks = stocks;
                        document.getElementById('scanTitle').textContent = scanDef.name;
                        document.getElementById('scanMeta').innerHTML = `<span class="meta-badge category">⚡ ChartInk Live</span><span class="meta-badge">${stocks.length} matches</span><span class="meta-badge">${new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</span>`;
                        updateStats(0, stocks.length, 0);
                        // Update sidebar count
                        const lc = document.getElementById('lc_' + id);
                        if (lc) lc.textContent = stocks.length;
                        applyFilters();
                    });
                    return; // Don't call applyFilters yet — async
                }
            } else if (categoriesData) {
                if (id === 'all') {
                    currentStocks = categoriesData.all_stocks || [];
                    document.getElementById('scanTitle').textContent = 'All Stocks';
                    document.getElementById('scanDesc').textContent = 'Complete results by composite score';
                    document.getElementById('scanMeta').innerHTML = `<span class="meta-badge">${currentStocks.length} stocks</span>`;
                } else {
                    const cd = categoriesData.categories?.[id];
                    currentStocks = cd?.stocks || [];
                    const ci = categoriesData.category_info?.[id] || {};
                    document.getElementById('scanTitle').textContent = ci.name || id;
                    document.getElementById('scanDesc').textContent = ci.description || '';
                    document.getElementById('scanMeta').innerHTML = `<span class="meta-badge">${cd?.count||0} matches</span>`;
                }
                updateStats(categoriesData.categories?.oneil_a?.count||0, categoriesData.categories?.high_momentum?.count||0, categoriesData.categories?.safe_stocks?.count||0);
            }
            applyFilters();
        }

        function updateStats(v2, v3, v4) {
            document.getElementById('stat2').textContent = v2;
            document.getElementById('stat2Label').textContent = currentTab === 'presets' ? 'Total Scans' : 'Grade A';
            document.getElementById('stat3').textContent = v3;
            document.getElementById('stat3Label').textContent = currentTab === 'presets' ? 'Matches' : 'High Momentum';
            document.getElementById('stat4').textContent = v4;
            document.getElementById('stat4Label').textContent = currentTab === 'presets' ? 'Categories' : 'Safe Stocks';
        }

        function applyFilters() {
            const s = document.getElementById('searchInput').value.toLowerCase();
            filteredStocks = currentStocks.filter(x => !s || x.symbol?.toLowerCase().includes(s) || x.name?.toLowerCase().includes(s));
            sortStocks(); renderTable();
        }

        function sortStocks() {
            filteredStocks.sort((a, b) => {
                let av = a[sortField], bv = b[sortField];
                if (typeof av === 'string') { av = av?.toLowerCase()||''; bv = bv?.toLowerCase()||''; }
                if (av == null) av = sortDir === 'asc' ? Infinity : -Infinity;
                if (bv == null) bv = sortDir === 'asc' ? Infinity : -Infinity;
                return sortDir === 'asc' ? (av < bv ? -1 : av > bv ? 1 : 0) : (av > bv ? -1 : av < bv ? 1 : 0);
            });
        }

        function renderTable() {
            const ld = document.getElementById('loadingState'), em = document.getElementById('emptyState');
            const tb = document.getElementById('stockTable'), pg = document.getElementById('pagination'), bd = document.getElementById('tableBody');
            ld.style.display = 'none';
            if (!filteredStocks.length) { em.style.display = 'flex'; tb.style.display = 'none'; pg.style.display = 'none'; return; }
            em.style.display = 'none'; tb.style.display = 'table'; pg.style.display = 'flex';
            const tp = Math.ceil(filteredStocks.length / pageSize), st = (currentPage - 1) * pageSize, en = Math.min(st + pageSize, filteredStocks.length);
            document.getElementById('showingFrom').textContent = st + 1;
            document.getElementById('showingTo').textContent = en;
            document.getElementById('totalResults').textContent = filteredStocks.length;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage >= tp;
            bd.innerHTML = filteredStocks.slice(st, en).map(s => `
                <tr onclick="openStock('${s.symbol}')">
                    <td><div class="symbol-name">${s.symbol}</div><div class="company-name">${s.name||s.symbol}</div></td>
                    <td class="price-cell">₹${fmt(s.close||s.cmp)}</td>
                    <td class="price-cell ${(s.change_pct||0)>=0?'change-positive':'change-negative'}">${(s.change_pct||0)>=0?'+':''}${fmt(s.change_pct,2)}%</td>
                    <td class="metric-cell ${(s.return_1m||0)>=0?'change-positive':'change-negative'}">${(s.return_1m||0)>=0?'+':''}${fmt(s.return_1m,1)}%</td>
                    <td class="metric-cell ${(s.return_3m||0)>=0?'change-positive':'change-negative'}">${(s.return_3m||0)>=0?'+':''}${fmt(s.return_3m,1)}%</td>
                    <td><span class="grade-badge grade-${s.oneil_grade||'-'}">${s.oneil_grade||'-'}</span></td>
                    <td class="metric-cell">${fmt(s.composite_score,0)}</td>
                    <td>${renderStatus(s.surveillance_status)}</td>
                    <td class="metric-cell">${fmt(s.volume_ratio,2)}x</td>
                    <td class="metric-cell">${fmt(s.roe,1)}%</td>
                </tr>
            `).join('');
            document.querySelectorAll('.stock-table th').forEach(h => h.classList.toggle('sorted', h.dataset.sort === sortField));
        }

        function renderStatus(s) {
            if (!s || s === '-') return '<span style="color:var(--text-muted)">-</span>';
            const c = s === 'SAFE' ? 'safe' : s === 'CAUTION' ? 'caution' : 'danger';
            return `<span class="status-badge status-${c}"><span class="status-dot"></span>${s}</span>`;
        }

        function fmt(n, d = 2) { return n == null || isNaN(n) ? '-' : Number(n).toLocaleString('en-IN', {minimumFractionDigits:d,maximumFractionDigits:d}); }
        function openStock(s) { window.open(`stock.html?s=${s}`, '_blank'); }

        document.getElementById('searchInput').addEventListener('input', () => { currentPage = 1; applyFilters(); });
        document.querySelectorAll('.stock-table th[data-sort]').forEach(h => {
            h.addEventListener('click', () => {
                if (sortField === h.dataset.sort) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
                else { sortField = h.dataset.sort; sortDir = 'desc'; }
                sortStocks(); renderTable();
            });
        });
        document.getElementById('prevBtn').addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderTable(); }});
        document.getElementById('nextBtn').addEventListener('click', () => { const tp = Math.ceil(filteredStocks.length/pageSize); if (currentPage < tp) { currentPage++; renderTable(); }});

        init();
    </script>
</body>
</html>
