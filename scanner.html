  --text-secondary: #8899aa;
  --text-muted: #556677;

}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {

  content: '';
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;

  content: '';

@keyframes logoPulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.85; transform: scale(1.03); } }

// DATA LAYER — Fetches from data/scanner_results.json

// ═══════════════════════════════════════════════════════════════

const DATA_URL = "./data/scanner_results.json?t=" + Date.now();
const SCAN_RUNS_URL = "./data/scan_runs.json?t=" + Date.now();

function useStockData() {
  const [stocks, setStocks] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState(null);
  const [meta, setMeta] = React.useState({});

  React.useEffect(() => {
    let cancelled = false;
    async function load() {
      try {
        const res = await fetch(DATA_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        if (!cancelled) {
          setStocks(json.stocks || []);
          setMeta(json.meta || {});
          setLoading(false);
        }
      } catch (e) {
        console.warn("Failed to fetch scanner data, using mock:", e.message);
        if (!cancelled) {
          setStocks(FALLBACK_MOCK);
          setMeta({generated_at: new Date().toISOString(), total_scanned: FALLBACK_MOCK.length, version: "mock"});
          setLoading(false);
          setError("Using offline data — run generate_data.py to update");
        }
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  return { stocks, loading, error, meta };
}

// ═══════════════════════════════════════════════════════════════
// TRADINGVIEW MINI CHART (embedded widget)
// ═══════════════════════════════════════════════════════════════

const TVMiniChart = ({symbol}) => {
  const canvasRef = useRef(null);
  const [prices, setPrices] = useState(null);
  
  useEffect(() => {
    fetch(`./data/stock_details/${symbol}.json?t=${Date.now()}`)
      .then(r => r.ok ? r.json() : null)
      .then(d => { if (d?.price_history?.length) setPrices(d.price_history.slice(-60)); })
      .catch(() => {});
  }, [symbol]);
  
  useEffect(() => {
    if (!canvasRef.current || !prices?.length) return;
    const canvas = canvasRef.current;
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.parentElement.offsetWidth;
    const H = 80;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + "px"; canvas.style.height = H + "px";
    const ctx = canvas.getContext("2d");
    ctx.scale(dpr, dpr);
    
    const closes = prices.map(p => p.c || p.close || 0).filter(v => v > 0);
    const vols = prices.map(p => p.v || p.volume || 0);
    if (closes.length < 2) return;
    
    const mn = Math.min(...closes), mx = Math.max(...closes);
    const range = mx - mn || 1;
    const pad = 4, chartW = W - pad * 2, chartH = H - 20;
    const step = chartW / (closes.length - 1);
    
    ctx.clearRect(0, 0, W, H);
    
    // Volume bars
    const maxVol = Math.max(...vols) || 1;
    vols.forEach((v, i) => {
      const x = pad + i * step;
      const bh = (v / maxVol) * 16;
      const bull = i > 0 ? closes[i] >= closes[i-1] : true;
      ctx.fillStyle = bull ? "rgba(0,255,136,0.15)" : "rgba(255,68,85,0.15)";
      ctx.fillRect(x - step/3, H - bh, step * 0.6, bh);
    });
    
    // Price line
    const first = closes[0], last = closes[closes.length - 1];
    const lineColor = last >= first ? "#00ff88" : "#ff4455";
    ctx.beginPath();
    closes.forEach((c, i) => {
      const x = pad + i * step;
      const y = pad + (1 - (c - mn) / range) * chartH;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.strokeStyle = lineColor; ctx.lineWidth = 1.5; ctx.stroke();
    
    // Fill gradient
    ctx.lineTo(pad + (closes.length - 1) * step, H);
    ctx.lineTo(pad, H); ctx.closePath();
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, last >= first ? "rgba(0,255,136,0.12)" : "rgba(255,68,85,0.12)");
    grad.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = grad; ctx.fill();
    
    // Price label
    ctx.fillStyle = "#889"; ctx.font = "9px 'JetBrains Mono'"; ctx.textAlign = "right";
    ctx.fillText(`₹${last.toFixed(1)}`, W - 4, 12);
    const chg = ((last - first) / first * 100).toFixed(1);
    ctx.fillStyle = last >= first ? "#00ff88" : "#ff4455";
    ctx.fillText(`${last >= first ? "+" : ""}${chg}%`, W - 4, 24);
  }, [prices]);
  
  if (!prices) return <div style={{height:80,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text-muted)",fontSize:9,fontFamily:"var(--font-mono)"}}>Loading chart...</div>;
  return <canvas ref={canvasRef} style={{width:"100%",borderRadius:4,cursor:"pointer"}} onClick={() => window.open(`stock.html?s=${symbol}`, '_blank')}/>;
};

              <label style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"var(--text-secondary)"}}>
                <input type="checkbox" checked={fundaFilters.rev_growth_on} onChange={e => setFundaFilters(p => ({...p, rev_growth_on: e.target.checked}))} style={{accentColor:"var(--accent)"}}/> Rev Growth {">"} (%)
                <input type="number" value={fundaFilters.rev_growth_min} onChange={e => setFundaFilters(p => ({...p, rev_growth_min: parseFloat(e.target.value)||0}))} style={{width:50}}/>
              </label>
            </div>
          )}

          {/* Misc Tab */}
          {activeTab === "misc" && (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <label style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"var(--text-secondary)"}}>
                <input type="checkbox" style={{accentColor:"var(--accent)"}}/> Volume Gainers
              </label>
              <label style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"var(--text-secondary)"}}>
                <input type="checkbox" style={{accentColor:"var(--accent)"}}/> Gap Up Today
              </label>
              <label style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"var(--text-secondary)"}}>
                <input type="checkbox" style={{accentColor:"var(--accent)"}}/> Near New Highs
              </label>
              <label style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"var(--text-secondary)"}}>
                <input type="checkbox" style={{accentColor:"var(--accent)"}}/> Listing Date &gt;
                <input type="text" placeholder="2024/01/01" style={{width:90}}/>
              </label>
              <label style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"var(--text-secondary)"}}>
                <input type="checkbox" style={{accentColor:"var(--accent)"}}/> Sector:
                <select style={{width:120}}><option>All</option><option>IT</option><option>Banking</option><option>Pharma</option><option>Auto</option><option>FMCG</option><option>Power</option><option>Defence</option></select>
              </label>
              <label style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"var(--text-secondary)"}}>
                <input type="checkbox" style={{accentColor:"var(--accent)"}}/> RS Range:
                <input type="number" placeholder="70" style={{width:45}}/>-
                <input type="number" placeholder="100" style={{width:45}}/>
              </label>
            </div>
          )}

          {/* Apply / Reset */}
          <div style={{marginTop:12,display:"flex",gap:8,justifyContent:"flex-end",alignItems:"center"}}>
            {chartinkSymbols?.length > 0 && <span style={{fontSize:9,color:"var(--accent)",fontFamily:"var(--font-mono)"}}>CHARTINK: {chartinkSymbols.length} stocks</span>}
            <button className="btn" style={{borderColor:"var(--red)",color:"var(--red)"}} onClick={resetAllFilters}>Reset</button>
            <button className="btn btn-accent" onClick={applyAllFilters}>Apply Filters</button>
          </div>
        </div>
      )}
    </div>
  );
};

// MAIN SCANNER DASHBOARD
// ═══════════════════════════════════════════════════════════════

const ScannerDashboard = () => {
  const { stocks, loading, error, meta } = useStockData();
  const [activePreset, setActivePreset] = useState("all");
  const [sortBy, setSortBy] = useState("score_desc");
  const [searchQuery, setSearchQuery] = useState("");
  const [selectedStock, setSelectedStock] = useState(null);
  const [excludeCircuit, setExcludeCircuit] = useState(true);
  const [appliedFilters, setAppliedFilters] = useState({ funda: null, chartink: null });
  const [chartinkResults, setChartinkResults] = useState(null);
  const [wlSidebar, setWlSidebar] = useState(false);
  const [wlRefresh, setWlRefresh] = useState(0);

  const filteredStocks = useMemo(() => {
    let list = [...stocks];
    
    // Circuit limit filter
    if (excludeCircuit) {
      list = list.filter(s => !s.circuit?.is_restricted);
    }
    
    // ── ChartInk Technical Filter (from scan results) ──
    if (appliedFilters.chartink?.length > 0) {
      const syms = new Set(appliedFilters.chartink);
      list = list.filter(s => syms.has(s.symbol.toUpperCase()));
    }
    
    // ── Fundamental Filters ──
    if (appliedFilters.funda) {
      const ff = appliedFilters.funda;
      list = list.filter(s => {
        const f = s.fundamentals || {};
        if (ff.pe_on && f.pe_ratio != null) { if (f.pe_ratio < ff.pe_min || f.pe_ratio > ff.pe_max) return false; }
        if (ff.pb_on && f.pb_ratio != null) { if (f.pb_ratio < ff.pb_min || f.pb_ratio > ff.pb_max) return false; }
        if (ff.roe_on) { if (f.roe == null || f.roe < ff.roe_min) return false; }
        if (ff.de_on) { if (f.debt_to_equity != null && f.debt_to_equity > ff.de_max) return false; }
        if (ff.eps_growth_on) { if (f.eps_growth == null || f.eps_growth < ff.eps_growth_min) return false; }
        if (ff.rev_growth_on) { if (f.revenue_growth == null || f.revenue_growth < ff.rev_growth_min) return false; }
        return true;
      });
    }
    
    // Preset filter
    if (activePreset === "catalyst") list = list.filter(s => s.catalysts?.length > 0);
    else if (activePreset === "bullish") list = list.filter(s => s.composite_score >= 3);
    else if (activePreset === "bearish") list = list.filter(s => s.composite_score <= -3);
    else if (activePreset === "earnings") list = list.filter(s => s.earnings_alert);
    else if (activePreset === "volume") list = list.filter(s => ["spike","extreme_spike"].includes(s.volume?.signal));
    else if (activePreset === "breakout") list = list.filter(s => ["new_52w_high","near_52w_high"].includes(s.breakout?.signal));
    else if (activePreset === "momentum") list = list.filter(s => s.rsi > 55 && s.rsi < 80 && s.composite_score > 0);
    
    // Search
    if (searchQuery) {
      const q = searchQuery.toUpperCase();
      list = list.filter(s => s.symbol.includes(q) || s.name.toUpperCase().includes(q) || s.sector.toUpperCase().includes(q));
    }
    
    // Sort
    const sorters = {
      score_desc: (a,b) => b.composite_score - a.composite_score,
      score_asc: (a,b) => a.composite_score - b.composite_score,
      change_desc: (a,b) => b.change_pct - a.change_pct,
      rsi_desc: (a,b) => (b.rsi||0) - (a.rsi||0),
      funds_desc: (a,b) => (b.fund_holdings?.no_of_funds||0) - (a.fund_holdings?.no_of_funds||0),
      mcap_desc: (a,b) => (b.fundamentals?.market_cap_cr||0) - (a.fundamentals?.market_cap_cr||0),
    };
    list.sort(sorters[sortBy] || sorters.score_desc);
    
    return list;
  }, [stocks, activePreset, sortBy, searchQuery, excludeCircuit, appliedFilters]);

  const summary = useMemo(() => ({
    bullish: stocks.filter(s=>s.composite_score>=3).length,
    bearish: stocks.filter(s=>s.composite_score<=-3).length,
    catalysts: stocks.filter(s=>s.catalysts?.length>0).length,
    volume: stocks.filter(s=>["spike","extreme_spike"].includes(s.volume?.signal)).length,
    earnings: stocks.filter(s=>s.earnings_alert).length,
    restricted: stocks.filter(s=>s.circuit?.is_restricted).length,
  }), [stocks]);

  if (loading) {
    return (
      <div>
        <nav className="nav">
          <a href="index.html" style={{display:"flex",alignItems:"center"}}><img src="assets/logo.jpeg" alt="TradEdge" style={{height:100,marginRight:16,animation:"logoPulse 3s ease-in-out infinite"}}/></a>
          <a href="scanner.html" className="nav-link active">Scanner</a>
          <a href="sectors.html" className="nav-link">Sectors</a>
          <a href="rrg.html" className="nav-link">RRG</a>
          <a href="matrix.html" className="nav-link">Matrix</a>
          <a href="mps.html" className="nav-link">MPS</a>
          <a href="index.html" className="nav-link">Journal</a>
          <a href="watchlist.html" className="nav-link">Watchlist</a>
        </nav>
        <div style={{display:"flex",justifyContent:"center",alignItems:"center",height:"60vh",flexDirection:"column",gap:12}}>
          <div style={{width:40,height:40,border:"3px solid var(--border-low)",borderTop:"3px solid var(--accent)",
            borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
          <div style={{color:"var(--text-muted)",fontSize:12,fontFamily:"var(--font-mono)"}}>Loading scanner data...</div>
          <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        </div>
      </div>
    );
  }

  return (
    <div>
      {/* Navigation */}
      <nav className="nav">
        <a href="index.html" style={{display:"flex",alignItems:"center"}}><img src="assets/logo.jpeg" alt="TradEdge" style={{height:100,marginRight:16,animation:"logoPulse 3s ease-in-out infinite"}}/></a>
        <a href="scanner.html" className="nav-link active">Scanner</a>
        <a href="sectors.html" className="nav-link">Sectors</a>
        <a href="rrg.html" className="nav-link">RRG</a>
        <a href="matrix.html" className="nav-link">Matrix</a>
        <a href="mps.html" className="nav-link">MPS</a>
        <a href="index.html" className="nav-link">Journal</a>
          <a href="watchlist.html" className="nav-link">Watchlist</a>
      </nav>

      <div style={{maxWidth:1440,margin:"0 auto",padding:"12px 16px"}}>

        {/* Error banner */}
        {error && (
          <div style={{padding:"6px 12px",marginBottom:8,borderRadius:4,background:"rgba(255,170,0,0.08)",
            border:"1px solid rgba(255,170,0,0.2)",fontSize:10,color:"#ffaa00",fontFamily:"var(--font-mono)"}}>
            ⚠ {error}
          </div>

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
          <div>
            <h1 style={{fontSize:20,fontWeight:800,letterSpacing:1,
              background:"linear-gradient(135deg,#00ff88,#00c8ff,#8844ff)",
              WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>◈ SCANNER</h1>
            <div style={{fontSize:10,color:"var(--text-muted)",fontFamily:"var(--font-mono)",letterSpacing:1}}>
              {meta.total_scanned || stocks.length} STOCKS • {meta.generated_at ? new Date(meta.generated_at).toLocaleString("en-IN") : "OFFLINE"} • v{meta.version || "1.0"}
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <input type="text" placeholder="⌕ Search symbol, name, sector..."
              value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}
              style={{width:220}}/>
            <label style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"var(--text-secondary)",
              fontFamily:"var(--font-mono)",cursor:"pointer"}}>
              <input type="checkbox" checked={excludeCircuit} onChange={e=>setExcludeCircuit(e.target.checked)}
                style={{accentColor:"var(--accent)"}}/>
              Exclude 2%/5%
            </label>
            <button style={{padding:"3px 10px",fontSize:10,fontFamily:"var(--font-mono)",fontWeight:700,
              background:"rgba(0,255,136,0.1)",border:"1px solid var(--accent)",color:"var(--accent)",
              borderRadius:4,cursor:"pointer"}} onClick={() => {
                // Use ChartInk results if available, otherwise filtered stocks
                const useChartink = chartinkResults?.stocks?.length > 0;
                const sourceStocks = useChartink ? chartinkResults.stocks : filteredStocks;
                const count = sourceStocks.length;
                const name = prompt("Save " + count + " stocks as watchlist:",

                if (!name) return;

                const stockData = sourceStocks.slice(0, 200).map(s => ({

              💾 Save Scan
            </button>
            <button style={{padding:"3px 10px",fontSize:10,fontFamily:"var(--font-mono)",fontWeight:700,
              background:wlSidebar ? "rgba(136,68,255,0.2)" : "transparent",

              📋 Watchlists {window.teWatchlist?.getLists().length > 0 ? `(${window.teWatchlist.getLists().length})` : ""}

          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:8,marginBottom:12}}>
          {[
            {label:"BULLISH",count:summary.bullish,color:"#00ff88",icon:"▲"},
            {label:"BEARISH",count:summary.bearish,color:"#ff4455",icon:"▼"},
            {label:"CATALYSTS",count:summary.catalysts,color:"#ffaa00",icon:"⚡"},
            {label:"VOL SPIKE",count:summary.volume,color:"#ff00ff",icon:"📊"},
            {label:"EARNINGS",count:summary.earnings,color:"#00c8ff",icon:"📅"},

              <div style={{fontSize:9,color:"var(--text-muted)",fontFamily:"var(--font-mono)",letterSpacing:1}}>{c.icon} {c.label}</div>
              <div style={{fontSize:20,fontWeight:800,color:c.color,fontFamily:"var(--font-display)"}}>{c.count}</div>
            </div>

        {/* Scan Builder */}
        <ScanBuilder onApplyFilter={setAppliedFilters} onScanResults={setChartinkResults}/>

        {/* Preset Tabs */}

          {SCAN_CATEGORIES.map(p => (
            <button key={p.id} onClick={() => setActivePreset(activePreset===p.id?"all":p.id)}
              style={{
                background:activePreset===p.id?"var(--accent-dim)":"rgba(255,255,255,0.02)",
                border:`1px solid ${activePreset===p.id?"var(--accent)":"rgba(255,255,255,0.06)"}`,
                borderRadius:4,padding:"4px 10px",color:activePreset===p.id?"var(--accent)":"var(--text-muted)",
                fontSize:10,fontWeight:700,fontFamily:"var(--font-mono)",cursor:"pointer",letterSpacing:0.5}}>
              {p.icon} {p.label}

          <div style={{marginLeft:"auto",display:"flex",gap:4,alignItems:"center"}}>
            <span style={{fontSize:10,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>SORT:</span>
            <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
              style={{fontSize:10,padding:"3px 6px"}}>

              <option value="score_asc">Score ↑</option>
              <option value="change_desc">Change% ↓</option>
              <option value="rsi_desc">RSI ↓</option>
              <option value="funds_desc">Funds ↓</option>
              <option value="mcap_desc">MCap ↓</option>
            </select>

        </div>

        {/* Count */}
        <div style={{fontSize:11,color:"var(--text-muted)",marginBottom:8,fontFamily:"var(--font-mono)"}}>

        </div>

        {/* Results Table */}

            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>

                      onMouseLeave={e=>e.currentTarget.style.background=i%2===0?"transparent":"rgba(255,255,255,0.008)"}>
                      <td style={{padding:"8px",whiteSpace:"nowrap"}}>
                        <div style={{fontWeight:700,color:"#fff",fontSize:12}}>{stock.symbol}</div>

                        </div>
                      </div>
                      <div style={{display:"flex",gap:4}}>
                        <button style={{fontSize:8,padding:"2px 6px",border:"1px solid var(--border-low)",background:"transparent",
                          color:"var(--accent)",borderRadius:3,cursor:"pointer",fontFamily:"var(--font-mono)"}}
                          onClick={() => {
                            setSearchQuery("");
                            const syms = list.stocks.map(s=>s.symbol.toUpperCase());
                            setAppliedFilters(prev => ({...prev, chartink: syms}));
                            setWlSidebar(false);
                          }}>Filter ▶</button>
                        <button style={{fontSize:8,padding:"2px 6px",border:"1px solid rgba(255,68,85,0.3)",background:"transparent",
                          color:"var(--red)",borderRadius:3,cursor:"pointer",fontFamily:"var(--font-mono)"}}
                          onClick={() => {
                            if (confirm(`Delete "${list.name}"?`)) {
                              window.teWatchlist.deleteList(list.id); window.teWatchlist.sync(); setWlRefresh(r=>r+1);
                            }
                          }}>🗑</button>
                      </div>
                    </div>
                    {/* Stock list */}
                    <div style={{maxHeight:200,overflowY:"auto"}}>
                      {list.stocks.map((s, si) => (
                        <div key={si} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                          padding:"4px 10px",borderBottom:"1px solid rgba(255,255,255,0.02)",fontSize:10,cursor:"pointer"}}
                          onClick={() => window.open(`stock.html?s=${s.symbol}`, '_blank')}>
                          <div>
                            <span style={{fontWeight:700,color:"#fff",marginRight:6}}>{s.symbol}</span>
                            <span style={{color:"var(--text-muted)",fontSize:9}}>{s.sector}</span>
                          </div>
                          <div style={{display:"flex",gap:4,alignItems:"center"}}>
                            <span style={{fontSize:8,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>{s.source}</span>
                            <button style={{fontSize:10,background:"transparent",border:"none",color:"var(--text-muted)",
                              cursor:"pointer",padding:"0 2px"}} onClick={(e) => {
                                e.stopPropagation();
                                window.teWatchlist.removeStock(list.id, s.symbol);
                                window.teWatchlist.sync(); setWlRefresh(r=>r+1);
                              }}>×</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ));
              })()}
            </div>
            {/* Footer */}
            <div style={{padding:"8px 12px",borderTop:"1px solid var(--border-dim)",fontSize:8,color:"var(--text-muted)",
              fontFamily:"var(--font-mono)",textAlign:"center"}}>
              <a href="watchlist.html" style={{color:"var(--accent)",textDecoration:"none"}}>Open Full Watchlist Dashboard →</a>
            </div>
          </div>
        )}

        {/* Footer */}
        <div style={{marginTop:16,padding:"12px 0",borderTop:"1px solid var(--border-dim)",
          display:"flex",justifyContent:"space-between",fontSize:9,color:"var(--text-muted)",
          fontFamily:"var(--font-mono)",letterSpacing:1}}>
          <span>TRADEDGE SCANNER v1.0 • 2803 NSE STOCKS • GITHUB PAGES</span>
          <span>⚡ CYBERPUNK EDITION</span>
        </div>
      </div>

      {/* Stock Drilldown Modal */}
      <StockDrilldown stock={selectedStock} onClose={() => setSelectedStock(null)}/>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// MOUNT
// ═══════════════════════════════════════════════════════════════
ReactDOM.createRoot(document.getElementById("root")).render(<ScannerDashboard/>);
</script>
</body>
</html>
