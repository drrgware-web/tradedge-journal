<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stock Drilldown | TradEdge</title>
<link rel="icon" type="image/jpeg" href="assets/logo.jpeg">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#06080c;--bg2:#0a0e14;--bg3:#0d1117;--bg4:#141a22;--border:rgba(0,255,136,.08);--accent:#00ff88;--accent2:#00c8ff;--accent3:#8b5cf6;--red:#ef4444;--amber:#f59e0b;--green:#22c55e;--t1:#f1f5f9;--t2:#cbd5e1;--t3:#94a3b8;--t4:#64748b;--mono:'IBM Plex Mono',monospace;--sans:'Outfit',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--sans);background:var(--bg);color:var(--t1);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.hdr{background:rgba(10,14,20,.95);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.back{padding:7px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--t3);text-decoration:none;font-size:12px}.back:hover{color:var(--accent);border-color:var(--accent)}
.stk-sym{font-size:24px;font-weight:800;font-family:var(--mono);color:var(--accent);margin-left:16px}
.stk-nm{font-size:13px;color:var(--t3);margin-left:12px}
.badge{font-size:9px;padding:3px 7px;border-radius:4px;font-weight:700;margin-left:8px}.badge.fno{background:rgba(139,92,246,.15);color:#a78bfa}.badge.sec{background:var(--bg4);color:var(--t4)}
.srch{width:220px;padding:9px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--t1);font-family:var(--mono);font-size:12px}.srch:focus{outline:none;border-color:var(--accent);width:280px}
.srch-dd{position:absolute;top:100%;right:0;width:320px;margin-top:4px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;max-height:320px;overflow-y:auto;display:none;box-shadow:0 8px 32px rgba(0,0,0,.5)}.srch-dd.on{display:block}
.srch-it{display:flex;justify-content:space-between;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border)}.srch-it:hover{background:var(--bg4)}
.main{max-width:1400px;margin:0 auto;padding:20px}
.sec{margin-bottom:20px}
.sec-t{font-size:12px;font-weight:700;color:var(--t3);letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;gap:8px}.sec-t::before{content:'';width:4px;height:16px;background:var(--accent);border-radius:2px}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-h{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(0,0,0,.2);border-bottom:1px solid var(--border)}.card-t{font-size:11px;font-weight:700;color:var(--t2);letter-spacing:.5px}.card-b{padding:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:900px){.grid2{grid-template-columns:1fr}}
.hero{display:flex;gap:24px;padding:20px;background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid var(--border);border-radius:14px;margin-bottom:20px;flex-wrap:wrap}
.hero-price{font-size:36px;font-weight:800;font-family:var(--mono)}
.hero-chg{display:inline-flex;align-items:center;gap:5px;font-size:14px;font-weight:700;padding:5px 10px;border-radius:6px;margin-left:12px}.hero-chg.up{background:rgba(34,197,94,.12);color:var(--green)}.hero-chg.dn{background:rgba(239,68,68,.12);color:var(--red)}
.hero-meta{display:flex;gap:20px;margin-top:14px;flex-wrap:wrap}
.hm-l{font-size:9px;color:var(--t4);text-transform:uppercase}.hm-v{font-size:14px;font-weight:600;font-family:var(--mono);margin-top:2px}.hm-v.up{color:var(--green)}.hm-v.dn{color:var(--red)}
.hero-right{display:flex;gap:8px;margin-left:auto;align-items:flex-start}
.qlink{padding:8px 12px;background:var(--bg4);border:1px solid var(--border);border-radius:7px;color:var(--t3);text-decoration:none;font-size:11px;font-weight:600;white-space:nowrap}.qlink:hover{border-color:var(--accent);color:var(--accent)}
.fresh-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;margin-bottom:12px}.fresh-badge.fresh{background:rgba(34,197,94,.12);color:var(--green)}.fresh-badge.stale{background:rgba(100,100,120,.12);color:var(--t4)}
.qs-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.qs-grade{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800}.qs-grade.A{background:rgba(34,197,94,.2);color:var(--green)}.qs-grade.B{background:rgba(0,200,255,.2);color:var(--accent2)}.qs-grade.C{background:rgba(245,158,11,.2);color:var(--amber)}.qs-grade.D,.qs-grade.F{background:rgba(239,68,68,.2);color:var(--red)}.qs-score{font-size:14px;font-weight:600;color:var(--t2)}
.qs-bars{display:flex;flex-direction:column;gap:8px}.qs-row{display:flex;align-items:center;gap:10px}.qs-label{width:80px;font-size:10px;color:var(--t4)}.qs-bar{flex:1;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden}.qs-fill{height:100%;border-radius:4px}.qs-val{width:40px;font-size:10px;font-family:var(--mono);color:var(--t3);text-align:right}
.kl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}.kl-box{padding:12px;background:var(--bg2);border-radius:8px;border-left:3px solid var(--accent2)}.kl-box.res{border-left-color:var(--red)}.kl-box.sup{border-left-color:var(--green)}.kl-title{font-size:9px;color:var(--t4);margin-bottom:4px}.kl-val{font-size:14px;font-weight:700;font-family:var(--mono)}.kl-desc{font-size:9px;color:var(--t3);margin-top:2px}
.risk-box{padding:12px;background:var(--bg2);border-radius:8px;margin-top:12px}.risk-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}.risk-row:last-child{margin-bottom:0}.risk-icon{font-size:14px}.risk-label{font-size:10px;color:var(--t4);width:80px}.risk-val{font-size:11px;color:var(--t2);flex:1}.risk-val.fresh{color:var(--green)}
.met-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.met-box{padding:14px;background:var(--bg2);border-radius:8px;text-align:center}.met-v{font-size:18px;font-weight:700;font-family:var(--mono)}.met-l{font-size:9px;color:var(--t4);margin-top:3px}
.shp-wrap{display:flex;gap:20px;flex-wrap:wrap}.shp-donut{position:relative;width:160px;height:160px;flex-shrink:0}.shp-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;font-size:20px}
.shp-list{flex:1;min-width:200px}.shp-row{display:flex;align-items:center;padding:10px 12px;background:var(--bg2);border-radius:6px;margin-bottom:6px}.shp-dot{width:10px;height:10px;border-radius:50%;margin-right:10px}.shp-name{flex:1;font-size:11px;color:var(--t2)}.shp-pct{font-family:var(--mono);font-size:12px;font-weight:600;margin-right:10px}
.shp-chg{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;min-width:50px;text-align:center}.shp-chg.up{background:rgba(34,197,94,.12);color:var(--green)}.shp-chg.dn{background:rgba(239,68,68,.12);color:var(--red)}.shp-chg.flat{background:var(--bg4);color:var(--t4)}
.surv-st{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;margin-bottom:14px}.surv-st.safe{background:rgba(34,197,94,.12);color:var(--green)}.surv-st.danger{background:rgba(239,68,68,.12);color:var(--red)}.surv-st.caution{background:rgba(245,158,11,.12);color:var(--amber)}.surv-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}.surv-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border-radius:6px;border-left:3px solid var(--green)}.surv-item.fail{border-left-color:var(--red)}.surv-icon{font-size:12px}.surv-text{font-size:10px;color:var(--t2)}
/* SHP Trend Chart */
.shp-trend{margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.chart-tb{display:flex;align-items:center;gap:6px;padding:8px 12px;background:rgba(0,0,0,.2);border-bottom:1px solid var(--border);flex-wrap:wrap}
.tb-grp{display:flex;gap:2px;background:var(--bg);border-radius:4px;padding:2px}.tb-btn{padding:5px 10px;border:none;border-radius:3px;font-size:9px;font-weight:600;font-family:var(--mono);cursor:pointer;background:transparent;color:var(--t4)}.tb-btn:hover{color:var(--t2)}.tb-btn.active{background:rgba(0,255,136,.1);color:var(--accent)}
.ema-btn{padding:3px 6px;border-radius:3px;font-size:8px;font-weight:700;font-family:var(--mono);cursor:pointer;border:1px solid;background:transparent}
.chart-ft{padding:5px 12px;background:rgba(0,0,0,.2);font-size:8px;font-family:var(--mono);color:var(--t4);display:flex;justify-content:space-between}
.ai-card{background:linear-gradient(135deg,rgba(139,92,246,.08),rgba(6,182,212,.05));border:1px solid rgba(139,92,246,.2)}.ai-h{background:linear-gradient(90deg,rgba(139,92,246,.1),transparent)}.ai-body{padding:18px}.ai-content{font-size:12px;line-height:1.7;color:var(--t2)}.ai-content strong{color:var(--t1)}.ai-loading{text-align:center;padding:30px;color:var(--t4)}.ai-ft{margin-top:14px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}.ai-powered{font-size:9px;color:var(--t4)}.ai-refresh{padding:5px 10px;background:var(--bg4);border:1px solid var(--border);border-radius:5px;color:var(--t3);font-size:9px;cursor:pointer}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px}@keyframes spin{to{transform:rotate(360deg)}}.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;color:var(--t4)}
</style>
</head>
<body>
<header class="hdr">
  <div style="display:flex;align-items:center">
    <a href="scanner.html" class="back">← Scanner</a>
    <span class="stk-sym" id="sym">—</span>
    <span class="stk-nm" id="nm">Loading...</span>
    <span id="badges"></span>
  </div>
  <div style="position:relative">
    <input type="text" class="srch" id="srch" placeholder="Search stock..." autocomplete="off">
    <div class="srch-dd" id="srchDD"></div>
  </div>
</header>
<main class="main" id="main"><div class="loading" id="ld"><div class="spinner"></div>Loading stock data...</div></main>
<script>
const TV='8RFOgQZr',WK='https://spring-fire-41a0.drrgware.workers.dev',GROQ='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',COL={promo:'#8b5cf6',fii:'#22c55e',dii:'#f59e0b',pub:'#3b82f6'},FUND_PE_THRESHOLD=40;
let D=null,F=null,allS=[],scannerStock=null,shpData=null;

function $(id){return document.getElementById(id)}
function go(s){location.href='stock.html?s='+s}
function sv(o,p,d){if(!o)return d;for(const k of p.split('.')){if(o==null)return d;o=o[k];}return o!=null?o:d;}
function fmt(n,d){if(n==null||isNaN(n))return'—';d=d||2;return Number(n).toLocaleString('en-IN',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtCr(n){if(n==null||isNaN(n))return'—';if(n>=100000)return(n/100000).toFixed(2)+'L';if(n>=1000)return(n/1000).toFixed(1)+'K';return n.toFixed(0);}
function fmtV(n){if(n==null||isNaN(n))return'—';if(n>=10000000)return(n/10000000).toFixed(2)+'Cr';if(n>=100000)return(n/100000).toFixed(2)+'L';if(n>=1000)return(n/1000).toFixed(1)+'K';return String(n);}
function fmtP(n){if(n==null||isNaN(n))return'—';return(n>=0?'+':'')+n.toFixed(1)+'%';}

async function init(){
  const s=new URLSearchParams(location.search).get('s');
  await loadSyms();setupSrch();
  if(!s){empty();return;}
  $('sym').textContent=s;document.title=s+' | TradEdge';

  // FIX #2: Load scanner data FIRST for real price/returns/SMA
  scannerStock=allS.find(x=>x.s===s.toUpperCase());

  try{const r=await fetch('data/stock_details/'+s+'.json');if(r.ok){D=await r.json();D.symbol=D.symbol||s;}else throw 0;
  }catch(e){D={symbol:s,name:s,sector:'Unknown',technical:{},fundamentals:{},fund_holdings:{},volume:{},breakout:{},surveillance:{flags:[]}};}

  // Merge scanner data into D (scanner data is more recent/accurate for price fields)
  if(scannerStock){
    const sc=scannerStock;
    D.name=D.name||sc.n;D.sector=D.sector||sc.sector||'';
    if(!D.technical)D.technical={};
    D.technical.close=sc.close||sc.cmp||D.technical.close||0;
    D.technical.change_pct=sc.change_pct!=null?sc.change_pct:(D.technical.change_pct||0);
    D.technical.high_52w=sc.high_52w||D.technical.high_52w||0;
    D.technical.low_52w=sc.low_52w||D.technical.low_52w||0;
    D.technical.returns={...D.technical.returns,'1w':sc.return_1w||0,'1m':sc.return_1m||0,'3m':sc.return_3m||0,'6m':sc.return_6m||0,'1y':sc.return_1y||0};
    D.technical.rsi=sc.rsi||D.technical.rsi||0;
    D.technical.sma_20=sc.sma_20||0;D.technical.sma_50=sc.sma_50||0;D.technical.sma_200=sc.sma_200||0;
    if(!D.volume)D.volume={};
    D.volume.ratio=sc.volume_ratio||D.volume.ratio||0;
    D.volume.latest=sc.volume||D.volume.latest||0;
    if(!D.breakout)D.breakout={};
    D.breakout.high_52w=sc.high_52w||D.breakout.high_52w||0;
    D.breakout.low_52w=sc.low_52w||D.breakout.low_52w||0;
    if(!D.fundamentals)D.fundamentals={};
    D.fundamentals.market_cap_cr=sc.market_cap_cr||D.fundamentals.market_cap_cr||0;
    D.fundamentals.pe_ratio=sc.pe||D.fundamentals.pe_ratio||0;
    D.fundamentals.pb_ratio=sc.pb||D.fundamentals.pb_ratio||0;
    D.fundamentals.roe=sc.roe||D.fundamentals.roe||0;
    D.fundamentals.roce=sc.roce||D.fundamentals.roce||0;
    // FIX #3: debt_equity from scanner is already ratio (0.11), not percentage
    D.fundamentals.debt_to_equity=sc.debt_equity!=null?sc.debt_equity:D.fundamentals.debt_to_equity;
    if(!D.fund_holdings)D.fund_holdings={};
    D.fund_holdings.promoter_pct=sc.promoter_holding||D.fund_holdings.promoter_pct||0;
    D.fund_holdings.institutional_pct=sc.institutional_holding||D.fund_holdings.institutional_pct||0;
    D.oneil={grade:sc.oneil_grade,composite:sc.composite_score,eps_strength:sc.eps_strength,price_strength:sc.price_strength};
  }

  render();
  fetchFundScorecard(s);
  genAI(s);
}

async function loadSyms(){
  try{const r=await fetch('data/scanner_results.json');if(r.ok){const d=await r.json();const stocks=d.all_stocks||[];allS=stocks.map(x=>({s:x.symbol,n:x.name||x.symbol,...x}));}}catch(e){}
}

function setupSrch(){const i=$('srch'),dd=$('srchDD');if(!i||!dd)return;i.oninput=function(){const q=i.value.trim().toUpperCase();if(!q){dd.classList.remove('on');return;}const m=allS.filter(x=>x.s.includes(q)||x.n.toUpperCase().includes(q)).slice(0,10);dd.innerHTML=m.length?m.map(x=>'<div class="srch-it" data-s="'+x.s+'"><span style="font-family:var(--mono);color:var(--accent)">'+x.s+'</span><span style="font-size:10px;color:var(--t4)">'+x.n+'</span></div>').join(''):'<div style="padding:12px;color:var(--t4);text-align:center">No matches</div>';dd.classList.add('on');};dd.onclick=function(e){const t=e.target.closest('[data-s]');if(t)go(t.dataset.s);};document.onclick=function(e){if(!e.target.closest('.srch')&&!e.target.closest('.srch-dd'))dd.classList.remove('on');};}
function empty(){$('sym').textContent='Select Stock';$('sym').style.color='var(--t4)';$('nm').textContent='';$('ld').innerHTML='<div style="font-size:48px;margin-bottom:20px">🔍</div><div style="font-size:18px;font-weight:600;margin-bottom:8px">Search for a stock</div><div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">'+['RELIANCE','TCS','HDFCBANK','ASHOKLEY','INFY'].map(x=>'<button onclick="go(\''+x+'\')" style="padding:10px 16px;background:var(--bg4);border:1px solid var(--border);border-radius:6px;color:var(--accent);font-family:var(--mono);font-size:12px;cursor:pointer">'+x+'</button>').join('')+'</div>';}

function render(){
  const ld=$('ld'),main=$('main');if(ld)ld.style.display='none';if(!main)return;
  $('nm').textContent=sv(D,'name',D.symbol);
  const mcap=sv(D,'fundamentals.market_cap_cr',0);
  $('badges').innerHTML=(mcap>5000?'<span class="badge fno">F&O</span>':'')+'<span class="badge sec">'+sv(D,'sector','—')+'</span>';
  let h='';
  h+=renderHero();
  h+='<div class="grid2 sec"><div>'+renderAI()+'</div><div>'+renderQuality()+'</div></div>';
  h+=renderMetrics();
  h+='<div class="grid2 sec"><div>'+renderSHP()+'</div><div>'+renderSurv()+'</div></div>';
  h+='<div class="sec" id="fundScorecardSec"><div class="sec-t">Fundamental Scorecards</div><div id="fundScorecardC"><div style="text-align:center;padding:30px;color:var(--t4)"><div class="spinner"></div>Loading from Screener.in...</div></div></div>';
  h+=renderChart();
  main.innerHTML=h;
  setTimeout(function(){drawDonut();initChart();},100);
}

function renderHero(){
  const price=sv(D,'technical.close',0);const chg=sv(D,'technical.change_pct',0);const up=chg>=0;
  const h52=sv(D,'breakout.high_52w',0);const l52=sv(D,'breakout.low_52w',0);
  const vol=sv(D,'volume.latest',0);const volR=sv(D,'volume.ratio',0);
  const ret1w=sv(D,'technical.returns.1w',0);const ret1m=sv(D,'technical.returns.1m',0);const ret3m=sv(D,'technical.returns.3m',0);
  return'<div class="hero"><div style="flex:1"><div class="fresh-badge '+(volR>=1.5?'fresh':'stale')+'">'+(volR>=1.5?'🟢 Fresh — Active volume':'⚪ Monitoring')+'</div><div><span class="hero-price">₹'+fmt(price)+'</span><span class="hero-chg '+(up?'up':'dn')+'">'+(up?'▲':'▼')+' '+Math.abs(chg).toFixed(2)+'%</span></div><div class="hero-meta"><div><div class="hm-l">52W High</div><div class="hm-v">₹'+fmt(h52)+'</div></div><div><div class="hm-l">52W Low</div><div class="hm-v">₹'+fmt(l52)+'</div></div><div><div class="hm-l">Volume</div><div class="hm-v">'+fmtV(vol)+'</div></div><div><div class="hm-l">Vol Ratio</div><div class="hm-v" style="color:'+(volR>=1.5?'var(--green)':'var(--t2)')+'">'+fmt(volR,2)+'x</div></div><div><div class="hm-l">1W</div><div class="hm-v '+(ret1w>=0?'up':'dn')+'">'+fmtP(ret1w)+'</div></div><div><div class="hm-l">1M</div><div class="hm-v '+(ret1m>=0?'up':'dn')+'">'+fmtP(ret1m)+'</div></div><div><div class="hm-l">3M</div><div class="hm-v '+(ret3m>=0?'up':'dn')+'">'+fmtP(ret3m)+'</div></div></div></div><div class="hero-right"><a href="https://in.tradingview.com/chart/'+TV+'/?symbol=NSE:'+D.symbol+'" target="_blank" class="qlink">📊 TV Pro</a><a href="https://zone.definedge.com/chart/NSE/'+D.symbol+'/pf" target="_blank" class="qlink">📈 P&F</a><a href="https://www.screener.in/company/'+D.symbol+'/" target="_blank" class="qlink">📋 Screener</a></div></div>';
}

function renderAI(){return'<div class="sec-t">AI Intelligence Summary</div><div class="card ai-card"><div class="card-h ai-h"><span class="card-t" style="color:var(--accent3)">🤖 AI ANALYSIS</span><span style="font-size:9px;color:var(--t4)">Groq</span></div><div class="ai-body" id="aiC"><div class="ai-loading"><div class="spinner"></div>Generating...</div></div></div>';}

function renderQuality(){
  const chgPct=sv(D,'technical.change_pct',0);const volR=sv(D,'volume.ratio',0);const ps=sv(D,'oneil.price_strength',50);
  const priceEvt=Math.min(25,Math.max(0,Math.round(chgPct>0?15+chgPct:10)));const volScore=Math.min(20,Math.round(volR*10));const candleScore=12;const structScore=Math.min(15,Math.round(ps/6.6));const liqScore=volR>=1?8:4;const rsScore=Math.min(10,Math.round(ps/10));const secScore=4;
  const total=priceEvt+volScore+candleScore+structScore+liqScore+rsScore+secScore;
  const grade=total>=80?'A':total>=65?'B':total>=50?'C':total>=35?'D':'F';

// Draw SHP trend line chart from quarterly arrays
function drawShpTrend(){
  if(!shpData)return;
  const cv=$('shpTrend');if(!cv)return;
  const dp=window.devicePixelRatio||1;const W=cv.parentElement.getBoundingClientRect().width;const H=120;
  cv.width=W*dp;cv.height=H*dp;cv.style.width=W+'px';cv.style.height=H+'px';
  const ctx=cv.getContext('2d');ctx.scale(dp,dp);
  const PAD={L:35,R:10,T:10,B:25};const cW=W-PAD.L-PAD.R;const cH=H-PAD.T-PAD.B;
  const labels=shpData.quarters||[];const n=labels.length;if(n<2)return;
  // Show last 8 quarters
  const show=Math.min(n,8);const si=n-show;
  const series=[{d:shpData.promoter,c:COL.promo,n:'Promoter'},{d:shpData.fii,c:COL.fii,n:'FII'},{d:shpData.dii,c:COL.dii,n:'DII'},{d:shpData.public,c:COL.pub,n:'Public'}].filter(s=>s.d&&s.d.length>=n);
  if(!series.length)return;
  // Find range (exclude promoter for better scale on FII/DII/Public)
  const nonPromo=series.filter(s=>s.n!=='Promoter');
  let minV=100,maxV=0;
  (nonPromo.length?nonPromo:series).forEach(s=>{for(let i=si;i<n;i++){const v=s.d[i];if(v<minV)minV=v;if(v>maxV)maxV=v;}});
  const range=maxV-minV||1;minV=Math.max(0,minV-range*0.1);maxV=maxV+range*0.1;const rng=maxV-minV;
  // BG
  ctx.fillStyle='#06080c';ctx.fillRect(0,0,W,H);
  // Grid
  ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=0.5;
  for(let i=0;i<=3;i++){const y=PAD.T+(i/3)*cH;ctx.beginPath();ctx.moveTo(PAD.L,y);ctx.lineTo(W-PAD.R,y);ctx.stroke();ctx.fillStyle='#445';ctx.font='8px "IBM Plex Mono"';ctx.textAlign='right';ctx.fillText((maxV-(i/3)*rng).toFixed(1)+'%',PAD.L-3,y+3);}
  // X labels
  ctx.fillStyle='#556';ctx.font='8px "IBM Plex Mono"';ctx.textAlign='center';
  for(let i=0;i<show;i++){const x=PAD.L+(i/(show-1))*cW;const lbl=labels[si+i]||'';ctx.fillText(lbl.replace(/\s+/g,' ').slice(0,7),x,H-5);}
  // Lines (skip promoter for cleaner view, or show all)
  series.forEach(s=>{
    if(s.n==='Promoter')return; // Skip promoter (usually flat, dominates scale)
    ctx.strokeStyle=s.c;ctx.lineWidth=1.5;ctx.beginPath();
    for(let i=0;i<show;i++){const x=PAD.L+(i/(show-1))*cW;const y=PAD.T+(1-(s.d[si+i]-minV)/rng)*cH;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
    ctx.stroke();
    // Dot on last point
    const lx=PAD.L+((show-1)/(show-1))*cW;const ly=PAD.T+(1-(s.d[n-1]-minV)/rng)*cH;
    ctx.beginPath();ctx.arc(lx,ly,3,0,Math.PI*2);ctx.fillStyle=s.c;ctx.fill();
    // Label
    ctx.fillStyle=s.c;ctx.font='bold 8px "IBM Plex Mono"';ctx.textAlign='right';
    ctx.fillText(s.n+' '+s.d[n-1].toFixed(1)+'%',lx-8,ly-6);
  });
}

function renderSurv(){
  const s=D.surveillance||{};const dataFlags=s.flags||[];
  const checks=[{n:'NSE ASM List',key:'asm',f:false},{n:'NSE GSM List',key:'gsm',f:false},{n:'High Debt',key:'high_debt',f:false},{n:'Low Inst.',key:'low_inst',f:false},{n:'Penny Stock',key:'penny',f:false},{n:'High Pledging',key:'high_pledge',f:false},{n:'Low Liquidity',key:'low_liq',f:false},{n:'Inst. Decline',key:'inst_decline',f:false}];
  dataFlags.forEach(function(flag){if(!flag)return;const fn=flag.name||flag.n||'';const isFlagged=flag.flagged===true||flag.f===true;for(let i=0;i<checks.length;i++){if(fn.toLowerCase().includes(checks[i].key)){checks[i].f=isFlagged;break;}}});
  // Auto-detect from scanner data
  if(scannerStock){
    const sc=scannerStock;
    if(sc.debt_equity>1.5)checks.find(c=>c.key==='high_debt').f=true;
    if((sc.institutional_holding||0)<10)checks.find(c=>c.key==='low_inst').f=true;
    if(sc.close<50||sc.cmp<50)checks.find(c=>c.key==='penny').f=true;
    if(sc.volume_ratio<0.3)checks.find(c=>c.key==='low_liq').f=true;
    if(sc.surveillance_status&&sc.surveillance_status!=='normal'){checks.find(c=>c.key==='asm').f=true;}
  }
  const rc=checks.filter(c=>c.f).length;const st=rc===0?'safe':rc<=2?'caution':'danger';
  // Sync red flag count to Key Metrics after a tick (DOM needs to exist first)
  setTimeout(()=>{const el=$('metRedFlags');if(el){el.textContent=rc;el.style.color=rc===0?'var(--green)':rc<=2?'var(--amber)':'var(--red)';}},50);
  return'<div class="sec-t">Surveillance</div><div class="card"><div class="card-h"><span class="card-t">🛡️ SURVEILLANCE</span></div><div class="card-b"><div class="surv-st '+st+'">'+(rc===0?'✓ All Clear':'⚠ '+rc+' Red Flag'+(rc>1?'s':''))+'</div><div class="surv-grid">'+checks.map(c=>'<div class="surv-item '+(c.f?'fail':'')+'"><span class="surv-icon">'+(c.f?'🚩':'✓')+'</span><span class="surv-text">'+c.n+'</span></div>').join('')+'</div></div></div>';
}

// ══════ FUNDAMENTAL SCORECARD ══════
function fundCalcScore(p){if(!p||!p.quarters.length)return{score:0,flags:[]};const q=p.quarters[0];const flags=[];let score=50;if(q.epsYoY!=null){if(q.epsYoY>20)score+=15;else if(q.epsYoY>0)score+=8;else{score-=15;flags.push({m:'EPS YoY',v:q.epsYoY,s:'red'});}}if(q.epsQoQ!=null){if(q.epsQoQ>10)score+=8;else if(q.epsQoQ>0)score+=4;else{score-=8;flags.push({m:'EPS QoQ',v:q.epsQoQ,s:'red'});}}if(q.salesYoY!=null){if(q.salesYoY>15)score+=12;else if(q.salesYoY>0)score+=6;else{score-=12;flags.push({m:'Sales YoY',v:q.salesYoY,s:'red'});}}if(q.salesQoQ!=null){if(q.salesQoQ>5)score+=5;else if(q.salesQoQ>=0)score+=2;else{score-=5;flags.push({m:'Sales QoQ',v:q.salesQoQ,s:'yel'});}}if(q.opmQoQ!=null){if(q.opmQoQ>1)score+=5;else if(q.opmQoQ>=0)score+=2;else{score-=5;flags.push({m:'OPM QoQ',v:q.opmQoQ,s:'yel'});}}const pe=p.info.pe;if(pe>FUND_PE_THRESHOLD){score-=10;flags.push({m:'P/E',v:pe,s:'red'});}else if(pe>0&&pe<15)score+=5;if(p.info.roe>15)score+=5;else if(p.info.roe>0&&p.info.roe<5){score-=5;flags.push({m:'ROE',v:p.info.roe.toFixed(1)+'%',s:'yel'});}return{score:Math.max(0,Math.min(100,score)),flags};}

async function fetchFundScorecard(sym){
  const c=$('fundScorecardC');if(!c)return;
  const wk=localStorage.getItem('zd_worker_url')||'';
  if(!wk){c.innerHTML='<div style="padding:16px;color:var(--t4);font-size:12px">Set <code>zd_worker_url</code> in localStorage for Screener.in data</div>';return;}
  try{
    const r=await fetch(wk,{method:'GET',headers:{'X-Kite-Action':'screener','X-Screener-Symbol':sym},signal:AbortSignal.timeout(15000)});
    if(!r.ok)throw 0;const data=await r.json();if(!data.quarters||!data.quarters.length)throw 0;
    const info={name:data.info?.name||sym,mcapCr:data.info?.mcapCr||0,pe:data.info?.pe||0,roe:data.info?.roe||0,roce:data.info?.roce||0,currentPrice:data.info?.currentPrice||0,bookValue:data.info?.bookValue||0,dividendYield:data.info?.dividendYield||0};
    const quarters=data.quarters.map(q=>({label:q.label||'',eps:q.eps||0,epsYoY:q.epsYoY??null,epsQoQ:q.epsQoQ??null,revenueCr:q.sales||0,salesYoY:q.salesYoY??null,salesQoQ:q.salesQoQ??null,opm:q.opm||0,opmQoQ:q.opmQoQ??null}));
    F={info,quarters};const{score,flags}=fundCalcScore(F);

    // Update SHP from worker arrays
    if(data.shareholding&&Array.isArray(data.shareholding.promoter)){
      shpData=data.shareholding;
      const shp=data.shareholding;const h=D.fund_holdings;
      const getLast=(arr)=>arr&&arr.length?arr[arr.length-1]:0;
      const getPrev=(arr)=>arr&&arr.length>=2?arr[arr.length-2]:getLast(arr);
      h.promoter_pct=getLast(shp.promoter);h.promoter_chg=getLast(shp.promoter)-getPrev(shp.promoter);
      h.fii_pct=getLast(shp.fii);h.fii_chg=getLast(shp.fii)-getPrev(shp.fii);
      h.dii_pct=getLast(shp.dii);h.dii_chg=getLast(shp.dii)-getPrev(shp.dii);
      h.public_pct=getLast(shp.public);h.public_chg=getLast(shp.public)-getPrev(shp.public);
      // Re-render SHP section
      const sb=$('shpBody');if(sb){
        function cb2(cc){if(cc>0.01)return'<div class="shp-chg up">▲'+cc.toFixed(2)+'%</div>';if(cc<-0.01)return'<div class="shp-chg dn">▼'+Math.abs(cc).toFixed(2)+'%</div>';return'<div class="shp-chg flat">—</div>';}
        const holders2=[];
        if(h.promoter_pct>0)holders2.push({n:'Promoters',p:h.promoter_pct,c:h.promoter_chg,col:COL.promo});
        if(h.fii_pct>0)holders2.push({n:'FII/FPI',p:h.fii_pct,c:h.fii_chg,col:COL.fii});
        if(h.dii_pct>0)holders2.push({n:'DII',p:h.dii_pct,c:h.dii_chg,col:COL.dii});
        const pub2=h.public_pct||Math.max(0,100-h.promoter_pct-h.fii_pct-h.dii_pct);
        if(pub2>0)holders2.push({n:'Public',p:pub2,c:h.public_chg||0,col:COL.pub});
        sb.innerHTML='<div class="shp-wrap"><div class="shp-donut"><canvas id="shpC" width="160" height="160"></canvas><div class="shp-center">👥</div></div><div class="shp-list">'+holders2.map(x=>'<div class="shp-row"><div class="shp-dot" style="background:'+x.col+'"></div><div class="shp-name">'+x.n+'</div><div class="shp-pct">'+x.p.toFixed(1)+'%</div>'+cb2(x.c)+'</div>').join('')+'</div></div><div class="shp-trend"><canvas id="shpTrend" height="120" style="width:100%"></canvas></div>';
        drawDonut();drawShpTrend();
      }
    }
    // Update metrics
    if(data.info){const f=D.fundamentals;if(data.info.mcapCr)f.market_cap_cr=data.info.mcapCr;if(data.info.pe)f.pe_ratio=data.info.pe;if(data.info.roe!=null)f.roe=data.info.roe;if(data.info.roce!=null)f.roce=data.info.roce;if(data.info.bookValue)f.book_value=data.info.bookValue;if(data.info.dividendYield!=null)f.dividend_yield=data.info.dividendYield;
      const mg=document.querySelector('.met-grid');if(mg){const f2=D.fundamentals;const deR=f2.debt_to_equity;const deD=deR!=null?(deR>2?fmt(deR/100,2):fmt(deR,2)):'—';const rg2=scannerStock?.revenue_growth||0;const pm2=scannerStock?.profit_margin||0;const rfc=scannerStock?.red_flag_count;mg.innerHTML=[{l:'Market Cap',v:'₹'+fmtCr(f2.market_cap_cr)+'Cr'},{l:'P/E',v:f2.pe_ratio?fmt(f2.pe_ratio,1):'—'},{l:'P/B',v:f2.pb_ratio?fmt(f2.pb_ratio,2):'—'},{l:'ROE',v:f2.roe?fmt(f2.roe,1)+'%':'—'},{l:'ROCE',v:f2.roce?fmt(f2.roce,1)+'%':'—'},{l:'D/E',v:deD},{l:'Div Yield',v:f2.dividend_yield?fmt(f2.dividend_yield,2)+'%':'—'},{l:'Book Value',v:f2.book_value?'₹'+fmt(f2.book_value,0):'—'},{l:'EPS',v:f2.eps?'₹'+fmt(f2.eps,2):'—'},{l:'Rev Growth',v:rg2?fmtP(rg2):'—'},{l:'Profit Margin',v:pm2?fmt(pm2,1)+'%':'—'},{l:'Red Flags',v:rfc!=null?rfc+'':'—'}].map(m=>'<div class="met-box"><div class="met-v">'+m.v+'</div><div class="met-l">'+m.l+'</div></div>').join('');}
    }
    // Render scorecard
    const sc2=score>=70?'#22c55e':score>=40?'#eab308':'#f87171';const pe2=info.pe||0;const pc2=pe2>40?'#f87171':pe2>25?'#eab308':pe2>0?'#22c55e':'var(--t4)';
    const gf=v=>v!=null?(v>=0?'+':'')+v.toFixed(1)+'%':'—';const gc=v=>v!=null?(v>=0?'#22c55e':'#f87171'):'var(--t4)';
    const qr=quarters.slice(0,8).map((q,i)=>'<tr style="border-bottom:1px solid var(--border)"><td style="padding:6px 8px;font-size:11px;font-weight:600;color:var(--t2)">'+q.label+'</td><td style="padding:6px;font-family:var(--mono);font-size:11px;color:var(--t1);text-align:right">'+(q.eps?.toFixed(1)??'—')+'</td><td style="padding:6px;font-family:var(--mono);font-size:11px;color:'+gc(q.epsYoY)+';text-align:right">'+gf(q.epsYoY)+'</td><td style="padding:6px;font-family:var(--mono);font-size:11px;color:'+gc(q.epsQoQ)+';text-align:right">'+gf(q.epsQoQ)+'</td><td style="padding:6px;font-family:var(--mono);font-size:11px;color:var(--t1);text-align:right">'+q.revenueCr+'</td><td style="padding:6px;font-family:var(--mono);font-size:11px;color:'+gc(q.salesYoY)+';text-align:right">'+gf(q.salesYoY)+'</td><td style="padding:6px;font-family:var(--mono);font-size:11px;color:'+gc(q.salesQoQ)+';text-align:right">'+gf(q.salesQoQ)+'</td><td style="padding:6px;font-family:var(--mono);font-size:11px;color:'+(q.opm>=0?'#22c55e':'#f87171')+';text-align:right">'+q.opm.toFixed(1)+'%</td><td style="padding:6px;font-family:var(--mono);font-size:11px;color:'+pc2+';text-align:right">'+(i===0&&pe2?pe2.toFixed(1):'—')+'</td></tr>').join('');
    c.innerHTML='<div class="card" style="padding:0;overflow:hidden;border-left:3px solid '+sc2+'"><div style="padding:12px 16px;background:rgba(0,0,0,.2);border-bottom:1px solid var(--border)"><div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px"><div><span style="font-size:14px;font-weight:800;color:var(--t1)">'+(info.name||sym)+'</span>'+(info.mcapCr>5000?'<span style="font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(234,179,8,.15);color:#eab308;font-weight:700;margin-left:4px">F&O</span>':'')+'<div style="font-size:10px;color:var(--t4);margin-top:2px">mcap '+info.mcapCr.toLocaleString('en-IN')+' Cr · roe '+info.roe.toFixed(1)+'%</div></div><div style="text-align:center"><div style="font-size:28px;font-weight:800;color:'+sc2+'">'+score+'</div><div style="font-size:9px;color:var(--t4);font-weight:600">FUND SCORE</div></div></div>'+(flags.length?'<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px">'+flags.map(f=>'<span style="font-size:9px;padding:1px 6px;border-radius:6px;background:'+(f.s==='red'?'rgba(248,113,113,.15)':'rgba(234,179,8,.12)')+';color:'+(f.s==='red'?'#f87171':'#eab308')+';font-weight:600">'+f.m+': '+(typeof f.v==='number'?f.v.toFixed(1):f.v)+'</span>').join('')+'</div>':'')+'</div><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse"><thead><tr style="border-bottom:2px solid var(--border)"><th style="padding:6px 8px;text-align:left;font-size:10px;color:var(--accent);font-weight:700">FQ</th><th style="padding:6px;text-align:right;font-size:10px;color:var(--t3)">EPS</th><th style="padding:6px;text-align:right;font-size:10px;color:var(--t3)">YOY</th><th style="padding:6px;text-align:right;font-size:10px;color:var(--t3)">QOQ</th><th style="padding:6px;text-align:right;font-size:10px;color:var(--t3)">SALES</th><th style="padding:6px;text-align:right;font-size:10px;color:var(--t3)">YOY</th><th style="padding:6px;text-align:right;font-size:10px;color:var(--t3)">QOQ</th><th style="padding:6px;text-align:right;font-size:10px;color:var(--t3)">OPM%</th><th style="padding:6px;text-align:right;font-size:10px;color:var(--t3)">P/E</th></tr></thead><tbody>'+qr+'</tbody></table></div></div>';
  }catch(e){console.error('Scorecard:',e);c.innerHTML='<div style="padding:16px;color:var(--t4)">Fundamental data unavailable</div>';}
}

// ══════ CHART ══════
function renderChart(){return'<div class="sec"><div class="sec-t">Price Chart</div><div class="card"><div class="chart-tb"><span style="font-size:11px;font-weight:700;color:var(--accent);font-family:var(--mono)">◈ '+D.symbol+'</span><div class="tb-grp"><button class="tb-btn active" data-ct="hlc">HLC</button><button class="tb-btn" data-ct="candle">OHLC</button><button class="tb-btn" data-ct="line">Line</button></div><button class="ema-btn" id="e20" style="border-color:#00bbff55;color:#00bbff;background:rgba(0,187,255,.1)">E20</button><button class="ema-btn" id="e50" style="border-color:#ffaa0055;color:#ffaa00;background:rgba(255,170,0,.1)">E50</button><button class="ema-btn" id="e200" style="border-color:#ff664455;color:#ff6644;background:rgba(255,102,68,.1)">E200</button><div style="margin-left:auto;display:flex;gap:4px"><a href="https://in.tradingview.com/chart/'+TV+'/?symbol=NSE:'+D.symbol+'" target="_blank" style="padding:5px 10px;border:1px solid var(--border);border-radius:4px;font-size:9px;color:var(--t3);text-decoration:none">TV</a><a href="https://zone.definedge.com/chart/NSE/'+D.symbol+'/pf" target="_blank" style="padding:5px 10px;border:1px solid var(--border);border-radius:4px;font-size:9px;color:var(--t3);text-decoration:none">P&F</a></div></div><canvas id="chart" style="display:block;width:100%;height:340px;cursor:crosshair"></canvas><div class="chart-ft"><span>Scroll: Zoom | Drag: Pan</span><span style="color:var(--accent)">◈ TEChart v5</span></div></div></div>';}
let prices=[],ema20=[],ema50=[],ema200=[];let showEMA={e20:true,e50:true,e200:true};let chartType='hlc';let viewStart=null,viewCount=120,isDrag=false,dragX=0;
function initChart(){loadPrices().then(function(){const cl=prices.map(x=>x.c);if(cl.length>=20)ema20=calcEMA(cl,20);if(cl.length>=50)ema50=calcEMA(cl,50);if(cl.length>=200)ema200=calcEMA(cl,200);const cv=$('chart');if(!cv)return;cv.onmousemove=onMM;cv.onmousedown=function(e){isDrag=true;dragX=e.clientX;};cv.onmouseup=function(){isDrag=false;};cv.onwheel=onWH;document.querySelectorAll('[data-ct]').forEach(b=>{b.onclick=function(){chartType=b.dataset.ct;document.querySelectorAll('[data-ct]').forEach(x=>x.classList.toggle('active',x.dataset.ct===chartType));draw();};});['e20','e50','e200'].forEach(k=>{const b=$(k);if(b)b.onclick=function(){showEMA[k]=!showEMA[k];b.style.opacity=showEMA[k]?1:0.4;draw();};});draw();});}
async function loadPrices(){try{const r=await fetch(WK+'/quote/'+D.symbol+'.NS?range=6mo&interval=1d');if(r.ok){const j=await r.json();if(j.chart&&j.chart.result&&j.chart.result[0]){const rs=j.chart.result[0];const ts=rs.timestamp||[];const q=(rs.indicators&&rs.indicators.quote&&rs.indicators.quote[0])||{};for(let i=0;i<ts.length;i++){const o=q.open&&q.open[i],h=q.high&&q.high[i],l=q.low&&q.low[i],c=q.close&&q.close[i],v=q.volume&&q.volume[i];if(o&&h&&l&&c&&!isNaN(o))prices.push({d:new Date(ts[i]*1000).toISOString().split('T')[0],o,h,l,c,v:v||0});}if(prices.length>20)return;}}}catch(e){}let p=sv(D,'technical.close',100);for(let i=0;i<200;i++){const d=new Date();d.setDate(d.getDate()-200+i);p=Math.max(5,p*(1+(Math.random()-0.48)*0.025));const rg=p*0.012;const o=p*(1+(Math.random()-0.5)*0.008);prices.push({d:d.toISOString().split('T')[0],o,h:Math.max(o,p)+Math.random()*rg*.3,l:Math.min(o,p)-Math.random()*rg*.3,c:p,v:Math.random()*500000+100000});}}
function calcEMA(d,n){const k=2/(n+1);const r=[];let p=0;for(let i=0;i<n&&i<d.length;i++)p+=d[i];p/=n;for(let i=0;i<d.length;i++){if(i<n-1)r.push(null);else if(i===n-1)r.push(p);else{p=d[i]*k+p*(1-k);r.push(p);}}return r;}
function draw(){const cv=$('chart');if(!cv||!prices.length)return;const ctx=cv.getContext('2d');const dp=window.devicePixelRatio||1;const rect=cv.parentElement?cv.parentElement.getBoundingClientRect():{width:800};const W=rect.width-2,H=340,PAD={L:55,R:8,T:25,B:18},VH=50;const cH=H-PAD.T-PAD.B-VH-6;cv.width=W*dp;cv.height=H*dp;cv.style.width=W+'px';cv.style.height=H+'px';ctx.scale(dp,dp);const si=viewStart!=null?viewStart:Math.max(0,prices.length-viewCount);const vis=prices.slice(si,si+viewCount);if(!vis.length)return;let aH=vis.map(x=>x.h),aL=vis.map(x=>x.l);for(let i=0;i<vis.length;i++){const g=si+i;if(showEMA.e20&&g<ema20.length&&ema20[g]){aH.push(ema20[g]);aL.push(ema20[g]);}if(showEMA.e50&&g<ema50.length&&ema50[g]){aH.push(ema50[g]);aL.push(ema50[g]);}if(showEMA.e200&&g<ema200.length&&ema200[g]){aH.push(ema200[g]);aL.push(ema200[g]);}}const pM=Math.max(...aH)*1.005,pm=Math.min(...aL)*.995,pR=pM-pm||1;const bW=(W-PAD.L-PAD.R)/viewCount;function toY(p){return PAD.T+(1-(p-pm)/pR)*cH;}function toX(i){return PAD.L+i*bW+bW/2;}ctx.fillStyle='#06080c';ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(0,255,136,.04)';ctx.lineWidth=.5;for(let i=0;i<=5;i++){const p2=pm+pR*i/5;const y=toY(p2);ctx.beginPath();ctx.moveTo(PAD.L,y);ctx.lineTo(W-PAD.R,y);ctx.stroke();ctx.fillStyle='#445';ctx.font='9px "IBM Plex Mono"';ctx.textAlign='right';ctx.fillText(p2.toFixed(1),PAD.L-5,y+3);}const maxV=Math.max(...vis.map(x=>x.v))||1;const vTop=PAD.T+cH+6;for(let i=0;i<vis.length;i++){const b=vis[i];ctx.fillStyle=b.c>=b.o?'rgba(34,197,94,.3)':'rgba(239,68,68,.3)';ctx.fillRect(toX(i)-bW*.35,vTop+VH-(b.v/maxV)*VH,bW*.7,(b.v/maxV)*VH);}function drawE(e,col){ctx.strokeStyle=col;ctx.lineWidth=1.2;ctx.beginPath();let s=false;for(let i=0;i<vis.length;i++){const g=si+i;if(g>=e.length||!e[g])continue;if(!s){ctx.moveTo(toX(i),toY(e[g]));s=true;}else ctx.lineTo(toX(i),toY(e[g]));}ctx.stroke();}if(showEMA.e200&&ema200.length)drawE(ema200,'#ff6644');if(showEMA.e50&&ema50.length)drawE(ema50,'#ffaa00');if(showEMA.e20&&ema20.length)drawE(ema20,'#00bbff');for(let i=0;i<vis.length;i++){const b=vis[i];const x=toX(i);const up=b.c>=b.o;const col=up?'#22c55e':'#ef4444';if(chartType==='candle'){ctx.strokeStyle=col;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,toY(b.h));ctx.lineTo(x,toY(b.l));ctx.stroke();const bT=toY(Math.max(b.o,b.c)),bB=toY(Math.min(b.o,b.c)),bw=Math.max(bW*.6,2);ctx.fillStyle=up?col+'55':col;ctx.fillRect(x-bw/2,bT,bw,Math.max(bB-bT,1));}else if(chartType==='line'){if(i===0)ctx.beginPath(),ctx.moveTo(x,toY(b.c));else ctx.lineTo(x,toY(b.c));if(i===vis.length-1){ctx.strokeStyle='#00bbff';ctx.lineWidth=1.5;ctx.stroke();}}else{ctx.strokeStyle=col;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,toY(b.h));ctx.lineTo(x,toY(b.l));ctx.stroke();ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x,toY(b.c));ctx.lineTo(x+bW*.35,toY(b.c));ctx.stroke();}}const hb=vis[vis.length-1];if(hb){ctx.font='10px "IBM Plex Mono"';const bc=hb.c>=hb.o?'#22c55e':'#ef4444';ctx.fillStyle='#556';ctx.textAlign='left';ctx.fillText('O',PAD.L+4,16);ctx.fillStyle=bc;ctx.fillText(hb.o.toFixed(2),PAD.L+16,16);ctx.fillStyle='#556';ctx.fillText('H',PAD.L+75,16);ctx.fillStyle=bc;ctx.fillText(hb.h.toFixed(2),PAD.L+87,16);ctx.fillStyle='#556';ctx.fillText('L',PAD.L+146,16);ctx.fillStyle=bc;ctx.fillText(hb.l.toFixed(2),PAD.L+158,16);ctx.fillStyle='#556';ctx.fillText('C',PAD.L+217,16);ctx.fillStyle=bc;ctx.fillText(hb.c.toFixed(2),PAD.L+229,16);}}
function onMM(e){if(!isDrag||!dragX)return;const cv=$('chart');const bW=(cv.getBoundingClientRect().width-63)/viewCount;const bd=Math.round((e.clientX-dragX)/bW);if(Math.abs(bd)>=1){const cur=viewStart!=null?viewStart:Math.max(0,prices.length-viewCount);viewStart=Math.max(0,Math.min(prices.length-viewCount,cur-bd));dragX=e.clientX;draw();}}
function onWH(e){e.preventDefault();viewCount=Math.max(20,Math.min(500,viewCount+(e.deltaY>0?1:-1)*Math.max(3,Math.floor(viewCount*.1))));draw();}

async function genAI(s){const c=$('aiC');if(!c)return;const p=sv(D,'technical.close',0);const ch=sv(D,'technical.change_pct',0);const mc=sv(D,'fundamentals.market_cap_cr',0);const pe=sv(D,'fundamentals.pe_ratio',0);const roe=sv(D,'fundamentals.roe',0);const pr=sv(D,'fund_holdings.promoter_pct',0);const ins=sv(D,'fund_holdings.institutional_pct',0);const r1m=sv(D,'technical.returns.1m',0);const r3m=sv(D,'technical.returns.3m',0);const rsi=sv(D,'technical.rsi',0);const ctx2='Stock: '+(D.name||s)+' ('+s+')\nSector: '+(D.sector||'N/A')+'\nPrice: ₹'+p+', Change: '+ch+'%, 1M: '+r1m+'%, 3M: '+r3m+'%\nRSI: '+rsi+', Market Cap: ₹'+mc+' Cr\nP/E: '+pe+', ROE: '+roe+'%\nPromoter: '+pr+'%, Institutional: '+ins+'%';try{const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:'Professional Indian stock analyst. Analyze in 2-3 paragraphs:\n\n'+ctx2+'\n\n1) Verdict (Bullish/Bearish/Neutral) 2) Strengths 3) Risks. Use **bold**. Be direct.'}],max_tokens:400,temperature:.7})});if(!r.ok)throw 0;const d=await r.json();const txt=d.choices?.[0]?.message?.content||'Unavailable';c.innerHTML='<div class="ai-content">'+txt.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>')+'</div><div class="ai-ft"><span class="ai-powered">⚡ Llama 3.3 70B via Groq</span><button class="ai-refresh" onclick="genAI(\''+s+'\')">↻</button></div>';}catch(e){c.innerHTML='<div style="text-align:center;padding:20px;color:var(--t4)">AI unavailable <button class="ai-refresh" onclick="genAI(\''+s+'\')">↻ Retry</button></div>';}}
init();
</script></body></html>
