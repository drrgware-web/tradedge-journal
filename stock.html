<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stock Drilldown | TradEdge</title>
<link rel="icon" type="image/jpeg" href="assets/logo.jpeg">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#06080c;--bg2:#0a0e14;--bg3:#0d1117;--bg4:#141a22;--border:rgba(0,255,136,.08);--accent:#00ff88;--accent2:#00c8ff;--accent3:#8b5cf6;--red:#ef4444;--amber:#f59e0b;--green:#22c55e;--t1:#f1f5f9;--t2:#cbd5e1;--t3:#94a3b8;--t4:#64748b;--mono:'IBM Plex Mono',monospace;--sans:'Outfit',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--sans);background:var(--bg);color:var(--t1);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.hdr{background:rgba(10,14,20,.95);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.back{padding:7px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--t3);text-decoration:none;font-size:12px;transition:.2s}.back:hover{color:var(--accent);border-color:var(--accent)}
.stk-sym{font-size:24px;font-weight:800;font-family:var(--mono);color:var(--accent);margin-left:16px}
.stk-nm{font-size:13px;color:var(--t3);margin-left:12px}
.badge{font-size:9px;padding:3px 7px;border-radius:4px;font-weight:700;margin-left:8px}
.badge.fno{background:rgba(139,92,246,.15);color:#a78bfa}.badge.sec{background:var(--bg4);color:var(--t4)}
.srch{width:220px;padding:9px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--t1);font-family:var(--mono);font-size:12px}.srch:focus{outline:none;border-color:var(--accent);width:280px}
.srch-dd{position:absolute;top:100%;right:0;width:320px;margin-top:4px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;max-height:320px;overflow-y:auto;display:none;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.srch-dd.on{display:block}.srch-it{display:flex;justify-content:space-between;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border)}.srch-it:hover{background:var(--bg4)}
.main{max-width:1500px;margin:0 auto;padding:20px}
.sec{margin-bottom:20px}
.sec-t{font-size:12px;font-weight:700;color:var(--t3);letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;gap:8px}.sec-t::before{content:'';width:4px;height:16px;background:var(--accent);border-radius:2px}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-h{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(0,0,0,.2);border-bottom:1px solid var(--border)}
.card-t{font-size:11px;font-weight:700;color:var(--t2);letter-spacing:.5px}
.card-b{padding:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

/* Price Hero */
.hero{display:flex;gap:24px;padding:20px;background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid var(--border);border-radius:14px;margin-bottom:20px;flex-wrap:wrap}
.hero-left{flex:1}
.hero-price{font-size:38px;font-weight:800;font-family:var(--mono)}
.hero-chg{display:inline-flex;align-items:center;gap:5px;font-size:15px;font-weight:700;padding:5px 10px;border-radius:6px;margin-left:12px}
.hero-chg.up{background:rgba(34,197,94,.12);color:var(--green)}.hero-chg.dn{background:rgba(239,68,68,.12);color:var(--red)}
.hero-meta{display:flex;gap:20px;margin-top:14px;flex-wrap:wrap}
.hm{text-align:left}.hm-l{font-size:9px;color:var(--t4);text-transform:uppercase}.hm-v{font-size:15px;font-weight:600;font-family:var(--mono);margin-top:2px}
.hm-v.up{color:var(--green)}.hm-v.dn{color:var(--red)}
.hero-right{display:flex;gap:10px;align-items:flex-start}
.qlink{padding:9px 14px;background:var(--bg4);border:1px solid var(--border);border-radius:7px;color:var(--t3);text-decoration:none;font-size:11px;font-weight:600;transition:.2s}.qlink:hover{border-color:var(--accent);color:var(--accent)}

/* Fresh Badge */
.fresh-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;margin-bottom:12px}
.fresh-badge.fresh{background:rgba(34,197,94,.12);color:var(--green)}.fresh-badge.stale{background:rgba(239,68,68,.12);color:var(--red)}

/* AI Summary */
.ai-summary{font-size:13px;line-height:1.7;color:var(--t2);padding:16px;background:var(--bg2);border-radius:8px;margin-bottom:12px}

/* Quality Score */
.qs-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.qs-grade{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800}
.qs-grade.A{background:rgba(34,197,94,.2);color:var(--green)}.qs-grade.B{background:rgba(0,200,255,.2);color:var(--accent2)}.qs-grade.C{background:rgba(245,158,11,.2);color:var(--amber)}.qs-grade.D,.qs-grade.F{background:rgba(239,68,68,.2);color:var(--red)}
.qs-score{font-size:14px;font-weight:600;color:var(--t2)}
.qs-bars{display:flex;flex-direction:column;gap:8px}
.qs-row{display:flex;align-items:center;gap:10px}
.qs-label{width:80px;font-size:10px;color:var(--t4)}
.qs-bar{flex:1;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden}
.qs-fill{height:100%;border-radius:4px;transition:width .3s}
.qs-val{width:40px;font-size:10px;font-family:var(--mono);color:var(--t3);text-align:right}

/* Key Levels */
.kl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.kl-box{padding:12px;background:var(--bg2);border-radius:8px;border-left:3px solid var(--accent2)}
.kl-box.res{border-left-color:var(--red)}.kl-box.sup{border-left-color:var(--green)}
.kl-title{font-size:9px;color:var(--t4);display:flex;align-items:center;gap:4px;margin-bottom:4px}
.kl-val{font-size:13px;font-weight:600;font-family:var(--mono)}
.kl-desc{font-size:10px;color:var(--t3);margin-top:2px}

/* Risk Box */
.risk-box{padding:12px;background:var(--bg2);border-radius:8px;margin-top:12px}
.risk-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}.risk-row:last-child{margin-bottom:0}
.risk-icon{font-size:14px}.risk-label{font-size:10px;color:var(--t4);width:70px}.risk-val{font-size:11px;color:var(--t2);flex:1}
.risk-val.fresh{color:var(--green)}

/* Conditions */
.cond-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.cond{font-size:9px;padding:4px 8px;background:rgba(0,200,255,.1);color:var(--accent2);border-radius:4px;font-family:var(--mono)}

/* Metrics */
.met-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.met-box{padding:14px;background:var(--bg2);border-radius:8px;text-align:center;position:relative}
.met-v{font-size:18px;font-weight:700;font-family:var(--mono)}.met-l{font-size:9px;color:var(--t4);margin-top:3px}
.met-arr{position:absolute;top:6px;right:6px;font-size:9px;padding:2px 5px;border-radius:3px;font-weight:700}
.met-arr.up{background:rgba(34,197,94,.15);color:var(--green)}.met-arr.dn{background:rgba(239,68,68,.15);color:var(--red)}

/* Shareholding */
.shp-wrap{display:flex;gap:20px}
.shp-donut{position:relative;width:160px;height:160px;flex-shrink:0}
.shp-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;font-size:20px}
.shp-list{flex:1}
.shp-row{display:flex;align-items:center;padding:10px 12px;background:var(--bg2);border-radius:6px;margin-bottom:6px}
.shp-dot{width:10px;height:10px;border-radius:50%;margin-right:10px}
.shp-name{flex:1;font-size:11px;color:var(--t2)}.shp-pct{font-family:var(--mono);font-size:12px;font-weight:600;margin-right:10px}
.shp-chg{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;min-width:55px;text-align:center}
.shp-chg.up{background:rgba(34,197,94,.12);color:var(--green)}.shp-chg.dn{background:rgba(239,68,68,.12);color:var(--red)}.shp-chg.flat{background:var(--bg4);color:var(--t4)}

/* Financials Table */
.fin-tbl{width:100%;border-collapse:collapse}
.fin-tbl th{padding:8px 10px;text-align:right;font-size:9px;color:var(--t4);font-weight:700;border-bottom:2px solid var(--border)}
.fin-tbl th:first-child{text-align:left}
.fin-tbl td{padding:8px 10px;font-family:var(--mono);font-size:11px;text-align:right;border-bottom:1px solid var(--border)}
.fin-tbl td:first-child{text-align:left;font-family:var(--sans);font-weight:600;color:var(--t2)}
.fin-tbl .up{color:var(--green)}.fin-tbl .dn{color:var(--red)}

/* Surveillance */
.surv-st{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;margin-bottom:14px}
.surv-st.safe{background:rgba(34,197,94,.12);color:var(--green)}.surv-st.danger{background:rgba(239,68,68,.12);color:var(--red)}.surv-st.caution{background:rgba(245,158,11,.12);color:var(--amber)}
.surv-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.surv-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border-radius:6px;border-left:3px solid var(--green)}
.surv-item.fail{border-left-color:var(--red)}
.surv-icon{font-size:12px}.surv-text{font-size:10px;color:var(--t2)}

/* Chart */
.chart-tb{display:flex;align-items:center;gap:6px;padding:8px 12px;background:rgba(0,0,0,.2);border-bottom:1px solid var(--border);flex-wrap:wrap}
.tb-grp{display:flex;gap:2px;background:var(--bg);border-radius:4px;padding:2px}
.tb-btn{padding:5px 10px;border:none;border-radius:3px;font-size:9px;font-weight:600;font-family:var(--mono);cursor:pointer;background:transparent;color:var(--t4)}.tb-btn:hover{color:var(--t2)}.tb-btn.active{background:rgba(0,255,136,.1);color:var(--accent)}
.ema-btn{padding:3px 6px;border-radius:3px;font-size:8px;font-weight:700;font-family:var(--mono);cursor:pointer;border:1px solid;background:transparent}
.chart-ft{padding:5px 12px;background:rgba(0,0,0,.2);font-size:8px;font-family:var(--mono);color:var(--t4);display:flex;justify-content:space-between}

/* AI Card */
.ai-card{background:linear-gradient(135deg,rgba(139,92,246,.08),rgba(6,182,212,.05));border:1px solid rgba(139,92,246,.2)}
.ai-h{background:linear-gradient(90deg,rgba(139,92,246,.1),transparent)}
.ai-body{padding:18px}.ai-content{font-size:12px;line-height:1.7;color:var(--t2)}.ai-content strong{color:var(--t1)}
.ai-loading{text-align:center;padding:30px;color:var(--t4)}
.ai-ft{margin-top:14px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.ai-powered{font-size:9px;color:var(--t4)}.ai-refresh{padding:5px 10px;background:var(--bg4);border:1px solid var(--border);border-radius:5px;color:var(--t3);font-size:9px;cursor:pointer}

.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;color:var(--t4)}

@media(max-width:1000px){.grid2,.grid3{grid-template-columns:1fr}.hero{flex-direction:column}.shp-wrap{flex-direction:column}.kl-grid,.met-grid{grid-template-columns:1fr 1fr}.surv-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="hdr">
  <div style="display:flex;align-items:center">
    <a href="scanner.html" class="back">← Scanner</a>
    <span class="stk-sym" id="sym">—</span>
    <span class="stk-nm" id="nm">Loading...</span>
    <span id="badges"></span>
  </div>
  <div style="position:relative">
    <input type="text" class="srch" id="srch" placeholder="Search stock..." autocomplete="off">
    <div class="srch-dd" id="srchDD"></div>
  </div>
</header>
<main class="main" id="main"><div class="loading" id="ld"><div class="spinner"></div>Loading stock data...</div></main>
<script>
const TV='8RFOgQZr',WK='https://spring-fire-41a0.drrgware.workers.dev',GROQ='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';
let D=null,F=null,allS=[];
const COL={promo:'#8b5cf6',fii:'#22c55e',dii:'#f59e0b',pub:'#3b82f6'};

async function init(){
  const s=new URLSearchParams(location.search).get('s');
  await loadSyms();setupSrch();
  if(!s){empty();return}
  $('sym').textContent=s;document.title=s+' | TradEdge';
  try{const r=await fetch(`data/stock_details/${s}.json`);if(!r.ok)throw 0;D=await r.json();render();fetchFund(s);genAI(s)}catch(e){err(s)}
}
const $=id=>document.getElementById(id);
async function loadSyms(){try{const r=await fetch('data/scanner_results.json');if(r.ok){const d=await r.json();allS=(d.all_stocks||[]).map(x=>({s:x.symbol,n:x.name||x.symbol}))}}catch(e){}}
function setupSrch(){
  const i=$('srch'),d=$('srchDD');let idx=-1;
  i.oninput=()=>{const q=i.value.trim().toUpperCase();if(!q){d.classList.remove('on');return}const m=allS.filter(x=>x.s.includes(q)||x.n.toUpperCase().includes(q)).slice(0,10);d.innerHTML=m.length?m.map(x=>`<div class="srch-it" data-s="${x.s}"><span style="font-family:var(--mono);color:var(--accent)">${x.s}</span><span style="font-size:10px;color:var(--t4)">${x.n}</span></div>`).join(''):'<div style="padding:12px;color:var(--t4);text-align:center">No matches</div>';d.classList.add('on');idx=-1};
  i.onkeydown=e=>{const its=d.querySelectorAll('[data-s]');if(e.key==='ArrowDown'){e.preventDefault();idx=Math.min(idx+1,its.length-1);its.forEach((t,j)=>t.style.background=j===idx?'var(--bg4)':'')}else if(e.key==='ArrowUp'){e.preventDefault();idx=Math.max(idx-1,0);its.forEach((t,j)=>t.style.background=j===idx?'var(--bg4)':'')}else if(e.key==='Enter'){e.preventDefault();if(idx>=0&&its[idx])go(its[idx].dataset.s);else if(i.value.trim())go(i.value.trim().toUpperCase())}else if(e.key==='Escape')d.classList.remove('on')};
  d.onclick=e=>{const t=e.target.closest('[data-s]');if(t)go(t.dataset.s)};
  document.onclick=e=>{if(!e.target.closest('.srch')&&!e.target.closest('.srch-dd'))d.classList.remove('on')};
}
function go(s){location.href='stock.html?s='+s}
function empty(){$('sym').textContent='Select';$('sym').style.color='var(--t4)';$('nm').textContent='';$('ld').innerHTML=`<div style="font-size:48px;margin-bottom:20px">🔍</div><div style="font-size:18px;font-weight:600;margin-bottom:8px">Search for a stock</div><div style="font-size:12px;color:var(--t4);margin-bottom:24px">Type symbol or company name</div><input type="text" id="mainS" placeholder="e.g. RELIANCE" style="width:100%;max-width:360px;padding:14px 20px;background:var(--bg3);border:2px solid var(--accent);border-radius:10px;color:var(--t1);font-family:var(--mono);font-size:14px;outline:none;margin-bottom:20px"><div id="mainSD" style="position:relative;max-width:360px;width:100%"></div><div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:16px">${['RELIANCE','TCS','HDFCBANK','ASHOKLEY','INFY'].map(x=>`<button onclick="go('${x}')" style="padding:8px 14px;background:var(--bg4);border:1px solid var(--border);border-radius:6px;color:var(--accent);font-family:var(--mono);font-size:11px;cursor:pointer">${x}</button>`).join('')}</div>`;const mi=$('mainS');if(mi){mi.focus();mi.oninput=()=>{const q=mi.value.trim().toUpperCase(),d=$('mainSD');if(!q){d.innerHTML='';return}const m=allS.filter(x=>x.s.includes(q)||x.n.toUpperCase().includes(q)).slice(0,8);d.innerHTML=m.length?`<div style="position:absolute;left:0;right:0;background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.4)">${m.map(x=>`<div onclick="go('${x.s}')" style="display:flex;justify-content:space-between;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border)" onmouseover="this.style.background='var(--bg4)'" onmouseout="this.style.background=''"><span style="font-family:var(--mono);color:var(--accent)">${x.s}</span><span style="font-size:10px;color:var(--t4)">${x.n}</span></div>`).join('')}</div>`:''};mi.onkeydown=e=>{if(e.key==='Enter'&&mi.value.trim())go(mi.value.trim().toUpperCase())}}}
function err(s){$('ld').innerHTML=`<div style="font-size:40px;margin-bottom:12px">⚠️</div><div>Failed to load ${s}</div><a href="scanner.html" style="margin-top:16px;color:var(--accent)">← Back</a>`}

function render(){
  $('ld').style.display='none';$('nm').textContent=D.name||D.symbol;
  const f=D.fundamentals||{},fno=(f.market_cap_cr||0)>5000;
  $('badges').innerHTML=`${fno?'<span class="badge fno">F&O</span>':''}<span class="badge sec">${D.sector||'—'}</span>`;
  $('main').innerHTML=rHero()+`<div class="grid2 sec"><div>${rAI()}</div><div>${rQuality()}</div></div>`+rMetrics()+`<div class="grid2 sec"><div>${rSHP()}</div><div>${rMF()}</div></div>`+rFin()+`<div class="grid2 sec"><div>${rInsider()}</div><div>${rSurv()}</div></div>`+rChart();
  drawDonut();initChart();
}

function rHero(){
  const t=D.technical||{},p=t.close||D.price||0,c=t.change_pct||0,u=c>=0,br=D.breakout||{},v=D.volume||{},ret=t.returns||{};
  const fresh=v.ratio>=1.5;
  return`<div class="hero"><div class="hero-left">${fresh?'<div class="fresh-badge fresh">🟢 Fresh — Active volume</div>':'<div class="fresh-badge stale">⚪ Monitoring</div>'}<div><span class="hero-price">₹${fmt(p)}</span><span class="hero-chg ${u?'up':'dn'}">${u?'▲':'▼'} ${Math.abs(c).toFixed(2)}%</span></div><div class="hero-meta"><div class="hm"><div class="hm-l">52W High</div><div class="hm-v">₹${fmt(br.high_52w||t.high_52w)}</div></div><div class="hm"><div class="hm-l">52W Low</div><div class="hm-v">₹${fmt(br.low_52w||t.low_52w)}</div></div><div class="hm"><div class="hm-l">Volume</div><div class="hm-v">${fmtV(v.latest||t.volume)}</div></div><div class="hm"><div class="hm-l">Vol Ratio</div><div class="hm-v" style="color:${v.ratio>=1.5?'var(--green)':'var(--t2)'}">${fmt(v.ratio,2)}x</div></div><div class="hm"><div class="hm-l">1M</div><div class="hm-v ${(ret['1m']||0)>=0?'up':'dn'}">${fmtP(ret['1m'])}</div></div><div class="hm"><div class="hm-l">3M</div><div class="hm-v ${(ret['3m']||0)>=0?'up':'dn'}">${fmtP(ret['3m'])}</div></div></div></div><div class="hero-right"><a href="https://in.tradingview.com/chart/${TV}/?symbol=NSE:${D.symbol}" target="_blank" class="qlink">📊 TV</a><a href="https://zone.definedge.com/chart/NSE/${D.symbol}/pf" target="_blank" class="qlink">📈 P&F</a><a href="https://www.screener.in/company/${D.symbol}/" target="_blank" class="qlink">📋 Screener</a></div></div>`;
}

function rAI(){return`<div class="sec-t">AI Intelligence Summary</div><div class="card ai-card"><div class="card-h ai-h"><span class="card-t" style="color:var(--accent3)">🤖 AI ANALYSIS</span><span style="font-size:9px;color:var(--t4)">Powered by Groq</span></div><div class="ai-body" id="aiC"><div class="ai-loading"><div class="spinner"></div>Generating analysis...</div></div></div>`}

function rQuality(){
  const t=D.technical||{},v=D.volume||{},o=D.oneil||{};
  // Calculate quality components
  const priceEvt=Math.min(25,Math.round((t.change_pct||0)>0?15+(t.change_pct||0):10));
  const volScore=Math.min(20,Math.round((v.ratio||1)*10));
  const candleScore=15; // Would need candle analysis
  const structScore=Math.min(15,Math.round((o.price_strength||50)/6.6));
  const liqScore=Math.min(10,v.ratio>=1?8:4);
  const rsScore=Math.min(10,Math.round((o.price_strength||50)/10));
  const secScore=5; // Would need sector data
  const total=priceEvt+volScore+candleScore+structScore+liqScore+rsScore+secScore;
  const grade=total>=80?'A':total>=65?'B':total>=50?'C':total>=35?'D':'F';

// Chart
let prices=[],ema20=[],ema50=[],ema200=[],showEMA={e20:1,e50:1,e200:1},chartType='hlc',viewStart=null,viewCount=120,isDrag=0,dragX=0;
async function initChart(){
  await loadPrices();const c=prices.map(x=>x.c);if(c.length>=20)ema20=calcEMA(c,20);if(c.length>=50)ema50=calcEMA(c,50);if(c.length>=200)ema200=calcEMA(c,200);
  const cv=$('chart');if(!cv)return;
  cv.onmousemove=onMM;cv.onmouseleave=()=>draw();cv.onmousedown=e=>{isDrag=1;dragX=e.clientX};cv.onmouseup=()=>isDrag=0;cv.onwheel=onWH;
  document.querySelectorAll('[data-ct]').forEach(b=>b.onclick=()=>{chartType=b.dataset.ct;document.querySelectorAll('[data-ct]').forEach(x=>x.classList.toggle('active',x.dataset.ct===chartType));draw()});
  ['e20','e50','e200'].forEach(k=>{const b=$(k);if(b)b.onclick=()=>{showEMA[k]=!showEMA[k];b.style.opacity=showEMA[k]?1:.4;draw()}});
  draw();
}
async function loadPrices(){
  try{const r=await fetch(`${WK}/quote/${D.symbol}.NS?range=6mo&interval=1d`);if(r.ok){const j=await r.json();if(j.chart?.result?.[0]){const rs=j.chart.result[0],ts=rs.timestamp||[],q=rs.indicators?.quote?.[0]||{};for(let i=0;i<ts.length;i++){const o=q.open?.[i],h=q.high?.[i],l=q.low?.[i],c=q.close?.[i],v=q.volume?.[i];if(o&&h&&l&&c&&!isNaN(o))prices.push({d:new Date(ts[i]*1000).toISOString().split('T')[0],o,h,l,c,v:v||0})}if(prices.length>20)return}}}catch(e){}
  let p=D.technical?.close||100;for(let i=0;i<200;i++){const d=new Date();d.setDate(d.getDate()-200+i);p=Math.max(5,p*(1+(Math.random()-.48)*.025));const rg=p*.012,o=p*(1+(Math.random()-.5)*.008);prices.push({d:d.toISOString().split('T')[0],o,h:Math.max(o,p)+Math.random()*rg*.3,l:Math.min(o,p)-Math.random()*rg*.3,c:p,v:Math.random()*5e5+1e5})}
}
function calcEMA(d,n){const k=2/(n+1),r=[];let p=d.slice(0,n).reduce((a,b)=>a+b,0)/n;for(let i=0;i<d.length;i++){if(i<n-1)r.push(null);else if(i===n-1)r.push(p);else{p=d[i]*k+p*(1-k);r.push(p)}}return r}
function draw(){
  const cv=$('chart');if(!cv||!prices.length)return;const ctx=cv.getContext('2d'),dp=devicePixelRatio||1,rect=cv.parentElement?.getBoundingClientRect(),W=rect?rect.width-2:800,H=340,PAD={L:55,R:8,T:25,B:18},VH=50,cH=H-PAD.T-PAD.B-VH-6;
  cv.width=W*dp;cv.height=H*dp;cv.style.width=W+'px';cv.style.height=H+'px';ctx.scale(dp,dp);
  const si=viewStart??Math.max(0,prices.length-viewCount),vis=prices.slice(si,si+viewCount);if(!vis.length)return;
  let aH=vis.map(x=>x.h),aL=vis.map(x=>x.l);for(let i=0;i<vis.length;i++){const g=si+i;if(showEMA.e20&&g<ema20.length&&ema20[g]){aH.push(ema20[g]);aL.push(ema20[g])}if(showEMA.e50&&g<ema50.length&&ema50[g]){aH.push(ema50[g]);aL.push(ema50[g])}if(showEMA.e200&&g<ema200.length&&ema200[g]){aH.push(ema200[g]);aL.push(ema200[g])}}
  const pM=Math.max(...aH)*1.005,pm=Math.min(...aL)*.995,pR=pM-pm||1,bW=(W-PAD.L-PAD.R)/viewCount,toY=p=>PAD.T+(1-(p-pm)/pR)*cH,toX=i=>PAD.L+i*bW+bW/2;
  ctx.fillStyle='#06080c';ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(0,255,136,.04)';ctx.lineWidth=.5;
  for(let i=0;i<=5;i++){const p=pm+pR*i/5,y=toY(p);ctx.beginPath();ctx.moveTo(PAD.L,y);ctx.lineTo(W-PAD.R,y);ctx.stroke();ctx.fillStyle='#445';ctx.font='9px "IBM Plex Mono"';ctx.textAlign='right';ctx.fillText(p.toFixed(1),PAD.L-5,y+3)}
  const maxV=Math.max(...vis.map(x=>x.v))||1,vTop=PAD.T+cH+6;
  for(let i=0;i<vis.length;i++){const b=vis[i],x=toX(i);ctx.fillStyle=b.c>=b.o?'rgba(34,197,94,.3)':'rgba(239,68,68,.3)';ctx.fillRect(x-bW*.35,vTop+VH-(b.v/maxV)*VH,bW*.7,(b.v/maxV)*VH)}
  const drawE=(e,c)=>{ctx.strokeStyle=c;ctx.lineWidth=1.2;ctx.beginPath();let s=0;for(let i=0;i<vis.length;i++){const g=si+i;if(g>=e.length||!e[g])continue;const x=toX(i),y=toY(e[g]);if(!s){ctx.moveTo(x,y);s=1}else ctx.lineTo(x,y)}ctx.stroke()};
  if(showEMA.e200&&ema200.length)drawE(ema200,'#ff6644');if(showEMA.e50&&ema50.length)drawE(ema50,'#ffaa00');if(showEMA.e20&&ema20.length)drawE(ema20,'#00bbff');
  for(let i=0;i<vis.length;i++){const b=vis[i],x=toX(i),u=b.c>=b.o,col=u?'#22c55e':'#ef4444';if(chartType==='candle'){ctx.strokeStyle=col;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,toY(b.h));ctx.lineTo(x,toY(b.l));ctx.stroke();const bT=toY(Math.max(b.o,b.c)),bB=toY(Math.min(b.o,b.c)),bw=Math.max(bW*.6,2);ctx.fillStyle=u?col+'55':col;ctx.fillRect(x-bw/2,bT,bw,Math.max(bB-bT,1));ctx.strokeRect(x-bw/2,bT,bw,Math.max(bB-bT,1))}else if(chartType==='line'){if(i===0){ctx.beginPath();ctx.moveTo(x,toY(b.c))}else ctx.lineTo(x,toY(b.c));if(i===vis.length-1){ctx.strokeStyle='#00bbff';ctx.lineWidth=1.5;ctx.stroke()}}else{ctx.strokeStyle=col;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,toY(b.h));ctx.lineTo(x,toY(b.l));ctx.stroke();ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x,toY(b.c));ctx.lineTo(x+bW*.35,toY(b.c));ctx.stroke()}}
  const hb=vis[vis.length-1];ctx.font='10px "IBM Plex Mono"';const bc=hb.c>=hb.o?'#22c55e':'#ef4444';ctx.fillStyle='#556';ctx.fillText('O',PAD.L+4,16);ctx.fillStyle=bc;ctx.fillText(hb.o?.toFixed(2),PAD.L+16,16);ctx.fillStyle='#556';ctx.fillText('H',PAD.L+75,16);ctx.fillStyle=bc;ctx.fillText(hb.h?.toFixed(2),PAD.L+87,16);ctx.fillStyle='#556';ctx.fillText('L',PAD.L+146,16);ctx.fillStyle=bc;ctx.fillText(hb.l?.toFixed(2),PAD.L+158,16);ctx.fillStyle='#556';ctx.fillText('C',PAD.L+217,16);ctx.fillStyle=bc;ctx.fillText(hb.c?.toFixed(2),PAD.L+229,16);
}
function onMM(e){const cv=$('chart'),rect=cv.getBoundingClientRect(),W=rect.width,PAD={L:55,R:8},bW=(W-PAD.L-PAD.R)/viewCount;if(isDrag&&dragX){const bd=Math.round((e.clientX-dragX)/bW);if(Math.abs(bd)>=1){viewStart=Math.max(0,Math.min(prices.length-viewCount,(viewStart??Math.max(0,prices.length-viewCount))-bd));dragX=e.clientX;draw()}}}
function onWH(e){e.preventDefault();viewCount=Math.max(20,Math.min(500,viewCount+(e.deltaY>0?1:-1)*Math.max(3,Math.floor(viewCount*.1))));draw()}

  if(cached){F=cached;renderFin();return}
  if(!wk){c.innerHTML=`<div class="card-h"><span class="card-t">📊 QUARTERLY FINANCIALS</span></div><div class="card-b" style="text-align:center;padding:24px;color:var(--t4)">⚙️ Set zd_worker_url for Screener data</div>`;return}
  try{const r=await fetch(wk,{method:'GET',headers:{'X-Kite-Action':'screener','X-Screener-Symbol':s},signal:AbortSignal.timeout(15000)});if(!r.ok)throw 0;const d=await r.json();if(!d.quarters?.length)throw 0;F={info:d.info||{},quarters:d.quarters||[]};try{const x=JSON.parse(localStorage.getItem('te_fund_cache')||'{}');x[s]={data:F,ts:Date.now()};localStorage.setItem('te_fund_cache',JSON.stringify(x))}catch(e){}renderFin()}catch(e){c.innerHTML=`<div class="card-h"><span class="card-t">📊 QUARTERLY FINANCIALS</span></div><div class="card-b" style="text-align:center;padding:24px;color:var(--t4)">Data unavailable</div>`}
}
function renderFin(){const c=$('finC');if(!F)return;c.innerHTML=`<div class="card-h"><span class="card-t">📊 QUARTERLY FINANCIALS</span><span style="font-size:9px;color:var(--t4)">${F.info.name||D.symbol}</span></div><div class="card-b" style="padding:0;overflow-x:auto"><table class="fin-tbl"><thead><tr><th>Quarter</th><th>EPS</th><th>%Chg</th><th>Sales (Cr)</th><th>%Chg</th><th>OPM%</th></tr></thead><tbody>${F.quarters.slice(0,8).map(q=>`<tr><td>${q.label||'—'}</td><td>${q.eps?.toFixed(2)??'—'}</td><td class="${(q.epsYoY||0)>=0?'up':'dn'}">${q.epsYoY!=null?(q.epsYoY>=0?'+':'')+q.epsYoY.toFixed(0)+'%':'—'}</td><td>${q.sales?q.sales.toLocaleString('en-IN',{maximumFractionDigits:1}):'—'}</td><td class="${(q.salesYoY||0)>=0?'up':'dn'}">${q.salesYoY!=null?(q.salesYoY>=0?'+':'')+q.salesYoY.toFixed(0)+'%':'—'}</td><td>${q.opm?.toFixed(1)||'—'}%</td></tr>`).join('')}</tbody></table></div>`}

// AI
async function genAI(s){
  const c=$('aiC'),t=D.technical||{},f=D.fundamentals||{},h=D.fund_holdings||{};
  const ctx=`Stock: ${D.name||s} (${s})\nSector: ${D.sector||'N/A'}\nPrice: ₹${t.close||0}, Change: ${t.change_pct||0}%\n52W High: ₹${D.breakout?.high_52w||0}, 52W Low: ₹${D.breakout?.low_52w||0}\nMarket Cap: ₹${f.market_cap_cr||0} Cr\nP/E: ${f.pe_ratio||'N/A'}, ROE: ${f.roe||'N/A'}%\nPromoter: ${h.promoter_pct||0}%, Institutional: ${h.institutional_pct||0}%\n1M: ${t.returns?.['1m']||0}%, 3M: ${t.returns?.['3m']||0}%\nVol Ratio: ${D.volume?.ratio||1}x`;
  const prompt=`You are a professional Indian stock analyst. Analyze this stock concisely in 2-3 short paragraphs:\n\n${ctx}\n\nCover: 1) Overall verdict (Bullish/Bearish/Neutral) with reasoning 2) Key strengths 3) Risks. Use **bold** for key points. Be direct, no disclaimers.`;
  try{
    const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:prompt}],max_tokens:400,temperature:.7})});
    if(!r.ok)throw 0;const d=await r.json(),txt=d.choices?.[0]?.message?.content||'Analysis unavailable';
    c.innerHTML=`<div class="ai-content">${txt.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>')}</div><div class="ai-ft"><span class="ai-powered">⚡ Llama 3.3 70B via Groq</span><button class="ai-refresh" onclick="genAI('${s}')">↻ Refresh</button></div>`;
  }catch(e){c.innerHTML=`<div style="text-align:center;padding:20px;color:var(--t4)">⚠️ AI unavailable<br><button class="ai-refresh" style="margin-top:10px" onclick="genAI('${s}')">↻ Retry</button></div>`}
}

function fmt(n,d=2){return n==null||isNaN(n)?'—':Number(n).toLocaleString('en-IN',{minimumFractionDigits:d,maximumFractionDigits:d})}
function fmtCr(n){return n==null?'—':n>=1e5?(n/1e5).toFixed(2)+'L':n>=1e3?(n/1e3).toFixed(1)+'K':n.toFixed(0)}
function fmtV(n){return n==null?'—':n>=1e7?(n/1e7).toFixed(2)+'Cr':n>=1e5?(n/1e5).toFixed(2)+'L':n>=1e3?(n/1e3).toFixed(1)+'K':n}
function fmtP(n){return n==null?'—':(n>=0?'+':'')+n.toFixed(1)+'%'}

init();
</script>
