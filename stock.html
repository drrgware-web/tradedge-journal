// Trend Arrow — shows QoQ (Q) and YoY (Y) direction
const TrendArrow = ({curr, prev, inverse}) => {
  // inverse=true → lower is better (P/E, debt, beta)
  if (curr == null || prev == null) return null;
  const diff = curr - prev;
  if (Math.abs(diff) < 0.001) return <span style={{fontSize:7,color:"#556"}}>→</span>;
  const isUp = diff > 0;
  const isGood = inverse ? !isUp : isUp;
  return <span style={{fontSize:7,color:isGood?"#00ff88":"#ff4455"}}>{isUp?"▲":"▼"}</span>;
};

// ═══════════════════════════════════════════════════════════════
// TRADEDGE CUSTOM CHART — HLC Bars + 3 EMAs + Volume (No TV)
// ═══════════════════════════════════════════════════════════════

function calcEMA(closes, period) {
  const k = 2 / (period + 1), ema = [closes[0]];
  for (let i = 1; i < closes.length; i++) ema.push(closes[i] * k + ema[i - 1] * (1 - k));
  return ema;
}
function fmtVol(v) { return v >= 1e7 ? (v/1e7).toFixed(2)+" Cr" : v >= 1e5 ? (v/1e5).toFixed(1)+" L" : v >= 1e3 ? (v/1e3).toFixed(0)+"K" : v+""; }

const TEChart = ({symbol, prices}) => {
  const canvasRef = useRef(null);
  const [viewStart, setViewStart] = useState(null);
  const [viewCount, setViewCount] = useState(120);
  const [crosshair, setCrosshair] = useState(null);
  const [isDrag, setIsDrag] = useState(false);
  const [dragX, setDragX] = useState(null);
  const [showEMA, setShowEMA] = useState({e20:true,e50:true,e200:true});
  const [hoverBar, setHoverBar] = useState(null);

  const priceData = useMemo(() => {
    if (!prices || !prices.length) return [];
    return prices;
  }, [prices]);

  const start = viewStart ?? Math.max(0, priceData.length - viewCount);
  const visible = priceData.slice(start, start + viewCount);

  const closes = useMemo(() => priceData.map(d => d.c), [priceData]);
  const ema20 = useMemo(() => closes.length >= 20 ? calcEMA(closes, 20) : [], [closes]);
  const ema50 = useMemo(() => closes.length >= 50 ? calcEMA(closes, 50) : [], [closes]);
  const ema200 = useMemo(() => closes.length >= 200 ? calcEMA(closes, 200) : [], [closes]);

  const draw = useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas || !visible.length) return;
    const ctx = canvas.getContext("2d");
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    const W = rect.width, H = 480;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + "px"; canvas.style.height = H + "px";
    ctx.scale(dpr, dpr);

    const padL = 62, padR = 10, padT = 10, padB = 22;
    const volH = 72, chartH = H - padT - padB - volH - 8;
    const chartW = W - padL - padR, barW = chartW / viewCount;

    // Price range with EMAs
    let allH = visible.map(d => d.h), allL = visible.map(d => d.l);
    for (let i = 0; i < visible.length; i++) {
      const gi = start + i;
      if (showEMA.e20 && gi < ema20.length) { allH.push(ema20[gi]); allL.push(ema20[gi]); }
      if (showEMA.e50 && gi < ema50.length) { allH.push(ema50[gi]); allL.push(ema50[gi]); }
      if (showEMA.e200 && gi < ema200.length) { allH.push(ema200[gi]); allL.push(ema200[gi]); }
    }
    const pMax = Math.max(...allH) * 1.005, pMin = Math.min(...allL) * 0.995, pRng = pMax - pMin || 1;
    const toY = (p) => padT + (1 - (p - pMin) / pRng) * chartH;
    const toX = (i) => padL + i * barW + barW / 2;
    const maxVol = Math.max(...visible.map(d => d.v)) || 1;
    const volTop = padT + chartH + 8;
    const toVolY = (v) => volTop + volH - (v / maxVol) * volH;

    // Clear
    ctx.fillStyle = "#06080c"; ctx.fillRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = "rgba(0,255,136,0.04)"; ctx.lineWidth = 0.5;
    for (let i = 0; i <= 6; i++) {
      const p = pMin + pRng * i / 6, y = toY(p);
      ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
      ctx.fillStyle = "#334"; ctx.font = "10px 'JetBrains Mono',monospace"; ctx.textAlign = "right";
      ctx.fillText(p.toFixed(1), padL - 6, y + 3);
    }

    // Date labels
    ctx.fillStyle = "#334"; ctx.font = "9px 'JetBrains Mono',monospace"; ctx.textAlign = "center";
    const dStep = Math.max(1, Math.floor(viewCount / 8));
    for (let i = 0; i < visible.length; i += dStep) {
      const x = toX(i), dt = visible[i].date || "";
      if (dt) { const p = dt.split("-"); ctx.fillText(p[2]+"/"+p[1], x, H - 4); }
      ctx.strokeStyle = "rgba(0,255,136,0.02)";
      ctx.beginPath(); ctx.moveTo(x, padT); ctx.lineTo(x, padT + chartH); ctx.stroke();
    }

    // Volume
    for (let i = 0; i < visible.length; i++) {
      const b = visible[i], x = toX(i), bull = b.c >= b.o;
      ctx.fillStyle = bull ? "rgba(0,204,102,0.25)" : "rgba(238,51,68,0.25)";
      ctx.fillRect(x - barW * 0.35, toVolY(b.v), barW * 0.7, volTop + volH - toVolY(b.v));
    }
    ctx.fillStyle = "#223"; ctx.font = "8px monospace"; ctx.textAlign = "right";
    ctx.fillText(fmtVol(maxVol), padL - 6, volTop + 8);

    // EMAs
    const drawEMA = (ed, col) => {
      ctx.strokeStyle = col; ctx.lineWidth = 1.2; ctx.beginPath(); let s = false;
      for (let i = 0; i < visible.length; i++) {
        const gi = start + i; if (gi >= ed.length) break;
        const x = toX(i), y = toY(ed[gi]);
        if (!s) { ctx.moveTo(x, y); s = true; } else ctx.lineTo(x, y);
      } ctx.stroke();
    };
    if (showEMA.e200 && ema200.length) drawEMA(ema200, "#ff6644");
    if (showEMA.e50 && ema50.length) drawEMA(ema50, "#ffaa00");
    if (showEMA.e20 && ema20.length) drawEMA(ema20, "#00bbff");

    // HLC Bars
    for (let i = 0; i < visible.length; i++) {
      const b = visible[i], x = toX(i), bull = b.c >= b.o;
      const col = bull ? "#00cc66" : "#ee3344";
      // H-L line
      ctx.strokeStyle = col; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x, toY(b.h)); ctx.lineTo(x, toY(b.l)); ctx.stroke();
      // Close tick right
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(x, toY(b.c)); ctx.lineTo(x + barW * 0.35, toY(b.c)); ctx.stroke();
    }

    // Crosshair
    if (crosshair) {
      const {x: mx, y: my} = crosshair;
      if (mx >= padL && mx <= W - padR) {
        ctx.strokeStyle = "rgba(0,255,136,0.2)"; ctx.lineWidth = 0.5; ctx.setLineDash([3,3]);
        ctx.beginPath(); ctx.moveTo(mx, padT); ctx.lineTo(mx, H - padB); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(padL, my); ctx.lineTo(W - padR, my); ctx.stroke();
        ctx.setLineDash([]);
        // Price label
        if (my >= padT && my <= padT + chartH) {
          const pr = pMax - ((my - padT) / chartH) * pRng;
          ctx.fillStyle = "#0a1520"; ctx.fillRect(0, my - 9, padL - 2, 18);
          ctx.strokeStyle = "#00ff88"; ctx.lineWidth = 0.5; ctx.strokeRect(0, my - 9, padL - 2, 18);
          ctx.fillStyle = "#00ff88"; ctx.font = "bold 9px 'JetBrains Mono',monospace"; ctx.textAlign = "right";
          ctx.fillText(pr.toFixed(2), padL - 6, my + 3);
        }
        // Date label
        const bi = Math.round((mx - padL) / barW - 0.5);
        if (bi >= 0 && bi < visible.length) {
          const dx = toX(bi), ds = visible[bi].date || "";
          ctx.fillStyle = "#0a1520"; ctx.fillRect(dx - 32, H - padB, 64, padB);

          ctx.fillStyle = "#00ff88"; ctx.font = "bold 8px 'JetBrains Mono',monospace"; ctx.textAlign = "center";
          ctx.fillText(ds, dx, H - 8);
        }
      }
    }

    // Legend
    ctx.fillStyle = "#ddd"; ctx.font = "bold 13px 'Outfit',sans-serif"; ctx.textAlign = "left";
    ctx.fillText("NSE:" + symbol, padL + 4, padT + 16);

    const hb = hoverBar || visible[visible.length - 1];
    if (hb) {
      const iy = padT + 32; const bc = hb.c >= hb.o ? "#00cc66" : "#ee3344";
      ctx.font = "11px 'JetBrains Mono',monospace";
      ctx.fillStyle = "#667"; ctx.fillText("O ", padL + 4, iy);
      ctx.fillStyle = bc; ctx.fillText(hb.o?.toFixed(2), padL + 20, iy);
      ctx.fillStyle = "#667"; ctx.fillText("H ", padL + 88, iy);
      ctx.fillStyle = bc; ctx.fillText(hb.h?.toFixed(2), padL + 104, iy);
      ctx.fillStyle = "#667"; ctx.fillText("L ", padL + 172, iy);
      ctx.fillStyle = bc; ctx.fillText(hb.l?.toFixed(2), padL + 186, iy);
      ctx.fillStyle = "#667"; ctx.fillText("C ", padL + 254, iy);
      ctx.fillStyle = bc; ctx.fillText(hb.c?.toFixed(2), padL + 268, iy);
      ctx.fillStyle = "#667"; ctx.fillText("V ", padL + 340, iy);
      ctx.fillStyle = "#aaa"; ctx.fillText(fmtVol(hb.v || 0), padL + 354, iy);
    }

    const ey = padT + 48;
    if (showEMA.e20 && ema20.length) { ctx.fillStyle = "#00bbff"; ctx.font = "10px 'JetBrains Mono',monospace"; ctx.fillText("EMA20: " + (ema20[start + visible.length - 1]?.toFixed(2)||"—"), padL + 4, ey); }
    if (showEMA.e50 && ema50.length) { ctx.fillStyle = "#ffaa00"; ctx.fillText("EMA50: " + (ema50[start + visible.length - 1]?.toFixed(2)||"—"), padL + 140, ey); }
    if (showEMA.e200 && ema200.length) { ctx.fillStyle = "#ff6644"; ctx.fillText("EMA200: " + (ema200[start + visible.length - 1]?.toFixed(2)||"—"), padL + 280, ey); }

    // Separator
    ctx.strokeStyle = "rgba(0,255,136,0.06)"; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(padL, volTop - 4); ctx.lineTo(W - padR, volTop - 4); ctx.stroke();
  }, [visible, viewCount, start, crosshair, showEMA, hoverBar, symbol, ema20, ema50, ema200, priceData]);

  useEffect(() => { draw(); }, [draw]);
  useEffect(() => { const h = () => draw(); window.addEventListener("resize", h); return () => window.removeEventListener("resize", h); }, [draw]);

  const handleMouseMove = (e) => {

    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    setCrosshair({x: mx, y: my});
    const padL = 62, chartW = rect.width - padL - 10, bw = chartW / viewCount;
    const idx = Math.round((mx - padL) / bw - 0.5);
    setHoverBar(idx >= 0 && idx < visible.length ? visible[idx] : null);
    if (isDrag && dragX != null) {

// POINT & FIGURE CHART (Canvas)
// ═══════════════════════════════════════════════════════════════

const PnFChart = ({prices, boxPct=1}) => {
  const canvasRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !prices.length) return;
    const ctx = canvasRef.current.getContext("2d");
    const W = canvasRef.current.width = canvasRef.current.parentElement.offsetWidth;
    const H = canvasRef.current.height = 300;

    // Build P&F columns
    const columns = [];
    let currentCol = {type:"X", boxes:[]};
    let currentPrice = prices[0].c;
    let reversal = 3; // 3-box reversal

    for (const bar of prices) {
      const boxSize = currentPrice * (boxPct / 100);
      if (currentCol.type === "X") {
        if (bar.h >= currentPrice + boxSize) {
          while (currentPrice + boxSize <= bar.h) {
            currentCol.boxes.push(currentPrice);
            currentPrice += boxSize;
          }
        } else if (bar.l <= currentPrice - boxSize * reversal) {
          columns.push({...currentCol});
          currentCol = {type:"O", boxes:[]};
          currentPrice -= boxSize;
          while (currentPrice - boxSize >= bar.l) {
            currentCol.boxes.push(currentPrice);
            currentPrice -= boxSize;
          }
        }
      } else {
        if (bar.l <= currentPrice - boxSize) {
          while (currentPrice - boxSize >= bar.l) {
            currentCol.boxes.push(currentPrice);
            currentPrice -= boxSize;
          }
        } else if (bar.h >= currentPrice + boxSize * reversal) {
          columns.push({...currentCol});
          currentCol = {type:"X", boxes:[]};
          currentPrice += boxSize;
          while (currentPrice + boxSize <= bar.h) {
            currentCol.boxes.push(currentPrice);
            currentPrice += boxSize;
          }
        }
      }
    }
    if (currentCol.boxes.length) columns.push(currentCol);

    // Find price range
    let allPrices = columns.flatMap(c => c.boxes);
    if (!allPrices.length) return;
    const minP = Math.min(...allPrices);
    const maxP = Math.max(...allPrices);
    const boxSize = currentPrice * (boxPct / 100) || 1;
    const rows = Math.ceil((maxP - minP) / boxSize) + 2;

    // Draw
    ctx.fillStyle = "#06080c";
    ctx.fillRect(0, 0, W, H);

    const pad = 40;
    const colW = Math.min(14, (W - pad * 2) / Math.max(columns.length, 1));
    const rowH = Math.min(12, (H - pad * 2) / Math.max(rows, 1));

    // Price axis
    ctx.fillStyle = "#334";
    ctx.font = "9px 'JetBrains Mono'";
    ctx.textAlign = "right";
    for (let i = 0; i <= rows; i += Math.max(1, Math.floor(rows / 8))) {
      const p = minP + i * boxSize;
      const y = H - pad - i * rowH;
      ctx.fillText(`₹${p.toFixed(0)}`, pad - 4, y + 3);
      ctx.strokeStyle = "rgba(0,255,136,0.04)";
      ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(W - 10, y); ctx.stroke();
    }

    // Draw columns
    columns.forEach((col, ci) => {
      const x = pad + ci * colW + colW / 2;
      col.boxes.forEach(p => {
        const row = Math.round((p - minP) / boxSize);
        const y = H - pad - row * rowH;

        if (col.type === "X") {
          ctx.strokeStyle = "#00ff88";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(x - colW * 0.3, y - rowH * 0.3);
          ctx.lineTo(x + colW * 0.3, y + rowH * 0.3);
          ctx.moveTo(x + colW * 0.3, y - rowH * 0.3);
          ctx.lineTo(x - colW * 0.3, y + rowH * 0.3);
          ctx.stroke();
        } else {
          ctx.strokeStyle = "#ff4455";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(x, y, Math.min(colW, rowH) * 0.3, 0, Math.PI * 2);
          ctx.stroke();
        }
      });
    });

    // Title
    ctx.fillStyle = "#556";
    ctx.font = "10px 'JetBrains Mono'";
    ctx.textAlign = "left";
    ctx.fillText(`P&F ${boxPct}% box, 3-box reversal`, pad, 14);

  }, [prices, boxPct]);

  return <canvas ref={canvasRef} style={{width:"100%",height:300,borderRadius:6}}/>;
};

// ═══════════════════════════════════════════════════════════════
// RENKO CHART (Canvas)
// ═══════════════════════════════════════════════════════════════

const RenkoChart = ({prices, boxPct=1}) => {
  const canvasRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !prices.length) return;
    const ctx = canvasRef.current.getContext("2d");
    const W = canvasRef.current.width = canvasRef.current.parentElement.offsetWidth;
    const H = canvasRef.current.height = 300;

    // Build Renko bricks
    const bricks = [];
    let lastBrickPrice = prices[0].c;
    const firstBoxSize = lastBrickPrice * (boxPct / 100);

    for (const bar of prices) {
      const boxSize = lastBrickPrice * (boxPct / 100) || 1;
      while (bar.c >= lastBrickPrice + boxSize) {
        bricks.push({price: lastBrickPrice, type: "up"});
        lastBrickPrice += boxSize;
      }
      while (bar.c <= lastBrickPrice - boxSize) {
        lastBrickPrice -= boxSize;
        bricks.push({price: lastBrickPrice, type: "down"});
      }
    }

    if (!bricks.length) return;

    const allP = bricks.map(b => b.price);
    const minP = Math.min(...allP);
    const maxP = Math.max(...allP);
    const range = maxP - minP || 1;

    ctx.fillStyle = "#06080c";
    ctx.fillRect(0, 0, W, H);

    const pad = 40;
    const brickW = Math.min(10, (W - pad * 2) / Math.max(bricks.length, 1));
    const scaleY = (H - pad * 2) / range;

    // Price axis
    ctx.fillStyle = "#334";
    ctx.font = "9px 'JetBrains Mono'";
    ctx.textAlign = "right";
    const steps = 8;
    for (let i = 0; i <= steps; i++) {
      const p = minP + (range * i / steps);
      const y = H - pad - (p - minP) * scaleY;
      ctx.fillText(`₹${p.toFixed(0)}`, pad - 4, y + 3);
      ctx.strokeStyle = "rgba(0,255,136,0.04)";
      ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(W - 10, y); ctx.stroke();
    }

    // Draw bricks
    bricks.forEach((brick, i) => {
      const x = pad + i * brickW;
      const boxSize = brick.price * (boxPct / 100) || 1;
      const y = H - pad - (brick.price - minP + boxSize) * scaleY;
      const h = boxSize * scaleY;

      if (brick.type === "up") {
        ctx.fillStyle = "rgba(0,255,136,0.7)";
        ctx.strokeStyle = "#00ff88";
      } else {
        ctx.fillStyle = "rgba(255,68,85,0.7)";
        ctx.strokeStyle = "#ff4455";
      }
      ctx.lineWidth = 0.5;
      ctx.fillRect(x + 1, y, brickW - 2, h);
      ctx.strokeRect(x + 1, y, brickW - 2, h);
    });

    ctx.fillStyle = "#556";
    ctx.font = "10px 'JetBrains Mono'";
    ctx.textAlign = "left";
    ctx.fillText(`Renko ${boxPct}% box`, pad, 14);

  }, [prices, boxPct]);

  return <canvas ref={canvasRef} style={{width:"100%",height:300,borderRadius:6}}/>;
};

      try {
        const r = await fetch(workerUrl, {

          headers: { 'X-Kite-Action': 'screener', 'X-Screener-Symbol': sym },

    }
    return null;
  }

  useEffect(() => {
    async function loadStock() {
      try {
        // Try per-stock detail file first
        const res = await fetch(`data/stock_details/${SYMBOL}.json`);
        if (res.ok) {
          const json = await res.json();
          setData(json);
          setLoading(false);
          return;
        }

      try {
        // Fallback: find stock in scanner_results.json

        if (res.ok) {
          const json = await res.json();
          const stock = (json.stocks || []).find(s => s.symbol === SYMBOL);

              major_shareholders: stock.major_shareholders || [],
              management: stock.management || [],
              price_history: stock.price_history || [],
            });
            setLoading(false);
            return;
          }
        }
      } catch (e) {}

      // Ultimate fallback: use MOCK
      console.warn("Using mock data for", SYMBOL);
      setData(MOCK);
      setLoading(false);
    }
    loadStock();
  }, []);

  // Fetch screener.in data (quarterly results, info)
  useEffect(() => {

      setScreenerLoading(false);

  if (!data) return <div style={{padding:40,textAlign:"center",color:"var(--text-muted)"}}>Stock not found</div>;

  const d = data;
  // Merge screener.in info as fallback for fundamentals
  const si = screenerData?.info || {};
  const f = {
    ...d.fundamentals,
    market_cap_cr: d.fundamentals?.market_cap_cr || si.mcapCr,
    pe_ratio: d.fundamentals?.pe_ratio || si.pe,
    roe: d.fundamentals?.roe || si.roe,
    book_value: d.fundamentals?.book_value || si.bookValue,
    dividend_yield: d.fundamentals?.dividend_yield || si.dividendYield,
    roce: d.fundamentals?.roce || si.roce,
    eps: d.fundamentals?.eps || (si.currentPrice && si.pe ? (si.currentPrice / si.pe).toFixed(2) : null),
  };
  if (!d.price && si.currentPrice) d.price = si.currentPrice;
  if (!d.name && si.name) d.name = si.name;
  const pq = d.prev_fundamentals || {};
  const py = d.yoy_fundamentals || {};
  const fh = d.fund_holdings || {};
  const o = d.oneil || {};
  
  // Safe defaults for arrays (prevent .map() on undefined)
  if (!d.guru_ratings) d.guru_ratings = [];
  if (!d.quarterly_results) d.quarterly_results = [];
  if (!d.major_shareholders) d.major_shareholders = [];
  if (!d.management) d.management = [];
  if (!d.catalysts) d.catalysts = [];
  if (!d.price_history) d.price_history = [];
  if (!d.surveillance) d.surveillance = {flags:[], red_flag_count:0, assessment:"Data not available"};
  if (!d.surveillance.flags) d.surveillance.flags = [];
  if (!d.ownership) d.ownership = {promoter:[],mutual_funds:[],fii:[],public:[],dii:[]};
  if (!d.ownership.promoter) d.ownership.promoter = [];
  if (!d.ownership.mutual_funds) d.ownership.mutual_funds = [];
  if (!d.ownership.fii) d.ownership.fii = [];
  if (!d.ownership.public) d.ownership.public = [];
  if (!d.ownership.dii) d.ownership.dii = [];

  return (
    <div>
      {/* Nav */}
      <nav className="nav">
        <span className="nav-brand">◈ TRADEDGE</span>
        <a href="index.html" className="nav-link">Journal</a>
        <a href="rrg.html" className="nav-link">RRG</a>
        <a href="mps.html" className="nav-link">MPS</a>
        <a href="matrix.html" className="nav-link">Matrix</a>
        <a href="scanner.html" className="nav-link">Scanner</a>
        <a href="#" className="nav-link active">Stock</a>
      </nav>

      <div style={{maxWidth:1300,margin:"0 auto",padding:"16px 20px"}}>

        {/* ── HEADER ── */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,flexWrap:"wrap",gap:12}} className="fade-in">

            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <h1 style={{fontSize:28,fontWeight:900,color:"#fff"}}>{d.symbol}</h1>
              <span style={{fontSize:13,color:"var(--text-secondary)"}}>{d.name}</span>
            </div>
            <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>
              <span className="badge badge-fair">{d.sector}</span>
              <span className="badge" style={{background:"rgba(136,68,255,0.1)",color:"#8844ff",border:"1px solid rgba(136,68,255,0.2)"}}>{d.industry}</span>
              {d.circuit?.band && <span className={`badge ${d.circuit.is_restricted?"badge-fail":"badge-pass"}`}>Circuit: {d.circuit.band}</span>}
              {d.earnings_alert && <span className="badge badge-warn">{d.earnings_alert}</span>}
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:32,fontWeight:800,color:"#fff",fontFamily:"var(--font-mono)"}}>₹{d.price.toLocaleString()}</div>
            <PctVal val={d.change_pct}/>
          </div>
        </div>

        {/* ── TRADEDGE CHART (HLC + EMA + Volume) ── */}
        <div style={{marginBottom:16}} className="fade-in">
          <TEChart symbol={d.symbol} prices={d.price_history || []}/>
        </div>

        {/* ── FUNDAMENTAL OVERVIEW GRID ── */}

          <div style={{padding:"10px 16px",borderBottom:"1px solid var(--border-dim)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:11,fontWeight:700,fontFamily:"var(--font-mono)",color:"var(--text-muted)",letterSpacing:1}}>FUNDAMENTALS</span>
            <div style={{display:"flex",gap:10,fontSize:8,fontFamily:"var(--font-mono)",color:"var(--text-muted)"}}>
              <span><span style={{color:"#00ff88",fontSize:6}}>▲</span>Q = QoQ better</span>
              <span><span style={{color:"#ff4455",fontSize:6}}>▼</span>Q = QoQ worse</span>
              <span><span style={{color:"#00ff88",fontSize:6}}>▲</span>Y = YoY better</span>
            </div>
          </div>
          <div style={{padding:16,display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:1,background:"var(--border-dim)"}}>
            {(() => {
              const items = [
                ["Market Cap",`INR ${f.market_cap_cr?.toLocaleString()} Cr`, f.market_cap_cr, pq.market_cap_cr, py.market_cap_cr, false],
                ["Sales",`INR ${f.sales_cr?.toLocaleString()} Cr`, f.sales_cr, pq.sales_cr, py.sales_cr, false],
                ["Shares in Float",`${f.shares_float_cr} Cr`, null, null, null, false],
                ["No of Funds",null, fh.no_of_funds, 122, 105, false],
                ["Shares by Funds",null, null, null, null, false],
                ["Yield",f.dividend_yield?`${f.dividend_yield}%`:"N/A", null, null, null, false],
                ["Book Value",f.book_value?`${f.pb_ratio}x`:"N/A", f.pb_ratio, pq.pb_ratio, py.pb_ratio, false],
                ["U/D Vol Ratio",`${f.ud_vol_ratio||"N/A"}`, f.ud_vol_ratio, pq.ud_vol_ratio, py.ud_vol_ratio, false],
                ["LTDebt/Equity",f.lt_debt_equity||"N.A", f.lt_debt_equity, pq.lt_debt_equity, py.lt_debt_equity, true],
                ["Alpha",`${f.alpha}`, f.alpha, pq.alpha, py.alpha, false],
                ["Beta",`${f.beta}`, f.beta, pq.beta, py.beta, true],
                ["P/E",`${f.pe_ratio}`, f.pe_ratio, pq.pe_ratio, py.pe_ratio, true],
                ["ROE",f.roe?`${f.roe}%`:"N/A", f.roe, pq.roe, py.roe, false],
                ["OPM",f.profit_margin?`${f.profit_margin}%`:"N/A", f.profit_margin, pq.profit_margin, py.profit_margin, false],
                ["Rev Growth",f.revenue_growth?`${f.revenue_growth}%`:"N/A", f.revenue_growth, pq.revenue_growth, py.revenue_growth, false],
              ];
              return items.map(([label, display, curr, prevQv, prevYv, inv], i) => {
                // Special: No of Funds
                if (label === "No of Funds") {
                  return (
                    <div key={i} style={{background:"var(--bg-card)",padding:"8px 12px"}}>
                      <div style={{fontSize:9,color:"var(--text-muted)",fontFamily:"var(--font-mono)",marginBottom:2}}>{label}</div>
                      <div style={{display:"flex",alignItems:"center",gap:4}}>
                        <span style={{fontSize:13,fontWeight:600,color:"var(--text-primary)",fontFamily:"var(--font-mono)"}}>{fh.no_of_funds}</span>
                        <PctVal str={`(${fh.fund_shares_change_pct>0?"+":""}${fh.fund_shares_change_pct}%)`}/>
                        <span style={{display:"flex",alignItems:"center",gap:1,fontSize:8,fontFamily:"var(--font-mono)",fontWeight:700}}>
                          <TrendArrow curr={119} prev={122} inverse={false}/><span style={{color:"#556"}}>Q</span>
                        </span>
                        <span style={{display:"flex",alignItems:"center",gap:1,fontSize:8,fontFamily:"var(--font-mono)",fontWeight:700}}>
                          <TrendArrow curr={119} prev={105} inverse={false}/><span style={{color:"#556"}}>Y</span>
                        </span>
                      </div>
                    </div>
                  );
                }
                // Special: Shares by Funds
                if (label === "Shares by Funds") {
                  return (
                    <div key={i} style={{background:"var(--bg-card)",padding:"8px 12px"}}>
                      <div style={{fontSize:9,color:"var(--text-muted)",fontFamily:"var(--font-mono)",marginBottom:2}}>{label}</div>
                      <div style={{display:"flex",alignItems:"center",gap:4}}>
                        <span style={{fontSize:13,fontWeight:600,color:"var(--text-primary)",fontFamily:"var(--font-mono)"}}>{fh.shares_held_cr} Cr</span>
                        <PctVal str={`(${fh.shares_held_change_pct>0?"+":""}${fh.shares_held_change_pct}%)`}/>
                        <span style={{display:"flex",alignItems:"center",gap:1,fontSize:8,fontFamily:"var(--font-mono)",fontWeight:700}}>
                          <TrendArrow curr={5.64} prev={5.98} inverse={false}/><span style={{color:"#556"}}>Q</span>
                        </span>
                        <span style={{display:"flex",alignItems:"center",gap:1,fontSize:8,fontFamily:"var(--font-mono)",fontWeight:700}}>
                          <TrendArrow curr={5.64} prev={4.2} inverse={false}/><span style={{color:"#556"}}>Y</span>
                        </span>
                      </div>
                    </div>
                  );
                }
                // Standard cell
                const hasArrows = prevQv != null || prevYv != null;
                return (
                  <div key={i} style={{background:"var(--bg-card)",padding:"8px 12px"}}>
                    <div style={{fontSize:9,color:"var(--text-muted)",fontFamily:"var(--font-mono)",marginBottom:2}}>{label}</div>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <span style={{fontSize:13,fontWeight:600,color:"var(--text-primary)",fontFamily:"var(--font-mono)"}}>{display}</span>
                      {hasArrows && (
                        <Fragment>
                          {prevQv != null && <span style={{display:"flex",alignItems:"center",gap:1,fontSize:8,fontFamily:"var(--font-mono)",fontWeight:700}}>
                            <TrendArrow curr={curr} prev={prevQv} inverse={inv}/><span style={{color:"#556"}}>Q</span>
                          </span>}
                          {prevYv != null && <span style={{display:"flex",alignItems:"center",gap:1,fontSize:8,fontFamily:"var(--font-mono)",fontWeight:700}}>
                            <TrendArrow curr={curr} prev={prevYv} inverse={inv}/><span style={{color:"#556"}}>Y</span>
                          </span>}
                        </Fragment>
                      )}
                    </div>
                  </div>
                );
              });
            })()}
          </div>
        </div>

        {/* ── O'NEIL MASTER SCORE + GURU RATINGS ── */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>

          {/* Master Score */}
          <div className="card fade-in">
            <div style={{padding:"10px 16px",borderBottom:"1px solid var(--border-dim)",fontSize:11,fontWeight:700,
              fontFamily:"var(--font-mono)",color:"var(--text-muted)",letterSpacing:1}}>O'NEIL MASTER SCORE</div>

              <div style={{display:"flex",gap:16,alignItems:"flex-start",marginBottom:16}}>
                <ScoreGrade grade={o.master_score} size={52}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>Master Score {o.master_score} :</div>
                  <div style={{fontSize:11,color:"var(--text-secondary)",lineHeight:1.6}}>{o.analysis_text?.substring(0, 300)}...</div>
                </div>
              </div>

              {/* Score bars */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div>
                  <div style={{fontSize:10,fontWeight:700,marginBottom:4,color:o.eps_strength<30?"#ff4455":o.eps_strength>70?"#00ff88":"#ffaa00"}}>
                    {o.eps_strength<30?"POOR":o.eps_strength>70?"STRONG":"FAIR"} : {o.eps_strength}
                  </div>
                  <ProgressBar value={o.eps_strength} label="EPS Strength" color={o.eps_strength<30?"#ff4455":"#00ff88"}/>
                </div>
                <div>
                  <div style={{fontSize:10,fontWeight:700,marginBottom:4,color:o.price_strength<30?"#ff4455":o.price_strength>70?"#00ff88":"#ffaa00"}}>
                    {o.price_strength<30?"POOR":o.price_strength>70?"STRONG":"FAIR"} : {o.price_strength}
                  </div>
                  <ProgressBar value={o.price_strength} label="Price Strength" color={o.price_strength<30?"#ff4455":"#00c8ff"}/>
                </div>
                <div>
                  <div style={{fontSize:10,fontWeight:700,marginBottom:4,color:"#00c8ff"}}>FAIR : {o.buyer_demand}</div>
                  <ProgressBar value={o.buyer_demand_score} label="Buyer Demand" color="#00c8ff"/>
                </div>
                <div>
                  <div style={{fontSize:10,fontWeight:700,marginBottom:4,color:o.group_rank>70?"#ff4455":"#00ff88"}}>
                    {o.group_rank>70?"POOR":"GOOD"} : {o.group_rank}
                  </div>
                  <ProgressBar value={o.group_rank} label="Group Rank" color={o.group_rank>70?"#ff4455":"#00ff88"}/>
                </div>
              </div>
            </div>
          </div>

          {/* Guru Ratings */}
          <div className="card fade-in">
            <div style={{padding:"10px 16px",borderBottom:"1px solid var(--border-dim)",fontSize:11,fontWeight:700,
              fontFamily:"var(--font-mono)",color:"var(--text-muted)",letterSpacing:1}}>GURU STRATEGY RATINGS</div>
            <div style={{padding:12}}>
              {d.guru_ratings.map((g,i) => (
                <div key={i} style={{padding:"8px 0",borderBottom:i<d.guru_ratings.length-1?"1px solid var(--border-dim)":"none"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <span style={{fontSize:12,fontWeight:700,color:"var(--text-primary)"}}>{g.guru}</span>
                    <span className={`badge ${g.score==="PASS"?"badge-pass":g.score==="FAIR"?"badge-fair":"badge-fail"}`}>
                      {g.score} {g.score_pct}%
                    </span>
                  </div>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                    {g.details.map((c,j) => (
                      <span key={j} style={{fontSize:8,padding:"1px 5px",borderRadius:2,fontFamily:"var(--font-mono)",
                        background:c.passed?"rgba(0,255,136,0.06)":"rgba(255,68,85,0.06)",
                        color:c.passed?"#00ff88":"#ff4455",border:`1px solid ${c.passed?"rgba(0,255,136,0.15)":"rgba(255,68,85,0.15)"}`}}>
                        {c.passed?"✓":"✗"} {c.detail}
                      </span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* ── QUARTERLY RESULTS + OWNERSHIP ── */}
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:16,marginBottom:16}}>

          {/* Quarterly Results — powered by screener.in */}
          <div className="card fade-in">
            <div style={{padding:"10px 16px",borderBottom:"1px solid var(--border-dim)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:11,fontWeight:700,fontFamily:"var(--font-mono)",color:"var(--text-muted)",letterSpacing:1}}>📊 FUNDAMENTAL SCORECARDS</span>
              {screenerData?.info && (
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span style={{fontSize:10,fontFamily:"var(--font-mono)",color:"var(--text-muted)"}}>
                    MCap: ₹{screenerData.info.mcapCr?.toLocaleString()} Cr | P/E: {screenerData.info.pe} | ROE: {screenerData.info.roe}%
                  </span>
                </div>
              )}
            </div>
            <div style={{overflowX:"auto"}}>
              {screenerLoading ? (
                <div style={{padding:20,textAlign:"center",color:"var(--text-muted)",fontSize:11}}>Loading quarterly data from screener.in...</div>
              ) : screenerData?.quarters?.length ? (
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead>
                    <tr style={{background:"rgba(0,255,136,0.03)"}}>
                      {["FQ","EPS","YOY","QOQ","SALES","YOY","QOQ","OPM%","P/E"].map((h,i)=>(
                        <th key={i} style={{padding:"6px 8px",textAlign:i===0?"left":"right",color:"var(--text-muted)",fontSize:9,
                          fontFamily:"var(--font-mono)",fontWeight:700,borderBottom:"1px solid var(--border-dim)"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {screenerData.quarters.slice(0,8).map((q,i) => {
                      const fmtPct = (v) => {
                        if (v == null) return "—";
                        const s = (v > 0 ? "+" : "") + v.toFixed(1) + "%";
                        return s;
                      };
                      return (
                        <tr key={i} style={{borderBottom:"1px solid var(--border-dim)"}}>
                          <td style={{padding:"6px 8px",fontWeight:600,fontSize:11,color:"var(--text-primary)",fontFamily:"var(--font-mono)"}}>{q.label}</td>
                          <td style={{padding:"6px 8px",textAlign:"right",fontFamily:"var(--font-mono)",color:"var(--text-primary)"}}>{q.eps?.toFixed(1)}</td>

                          <td style={{padding:"6px 8px",textAlign:"right"}}><PctVal str={q.epsQoQ != null ? fmtPct(q.epsQoQ) : "—"}/></td>
                          <td style={{padding:"6px 8px",textAlign:"right",fontFamily:"var(--font-mono)",color:"var(--text-primary)"}}>{q.sales?.toLocaleString()}</td>
                          <td style={{padding:"6px 8px",textAlign:"right"}}><PctVal str={q.salesYoY != null ? fmtPct(q.salesYoY) : "—"}/></td>
                          <td style={{padding:"6px 8px",textAlign:"right"}}><PctVal str={q.salesQoQ != null ? fmtPct(q.salesQoQ) : "—"}/></td>
                          <td style={{padding:"6px 8px",textAlign:"right",fontFamily:"var(--font-mono)",color:q.opm>=0?"var(--text-primary)":"#ff4455"}}>{q.opm != null ? q.opm + "%" : "—"}</td>
                          <td style={{padding:"6px 8px",textAlign:"right",fontFamily:"var(--font-mono)",color:"var(--accent2)"}}>{screenerData.info?.pe || "—"}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              ) : (
                <div style={{padding:20,textAlign:"center",color:"var(--text-muted)",fontSize:11}}>
                  {screenerData === null ? "Set zd_worker_url in localStorage for quarterly data" : "No quarterly data available"}
                </div>

            </div>
          </div>

          {/* Ownership + Shareholders */}
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <div className="card fade-in">
              <div style={{padding:"10px 16px",borderBottom:"1px solid var(--border-dim)",fontSize:11,fontWeight:700,
                fontFamily:"var(--font-mono)",color:"var(--text-muted)",letterSpacing:1}}>OWNERSHIP PATTERN</div>
              <div style={{padding:12}}>
                <OwnershipBar ownership={d.ownership}/>

                    <tbody>

                    </tbody>

              </div>

              <div style={{padding:8}}>
                {d.major_shareholders.map((s,i) => (
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 8px",
                    borderBottom:"1px solid var(--border-dim)",fontSize:11}}>
                    <span style={{color:"var(--text-secondary)"}}>{s.name}</span>
                    <span style={{fontWeight:700,fontFamily:"var(--font-mono)",color:"var(--text-primary)"}}>{s.pct}%</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>

        {/* ── SURVEILLANCE CHECKLIST ── */}

              <div style={{fontSize:9,color:"var(--text-muted)"}}>{d.surveillance.assessment_detail}</div>
            </div>

          <div style={{padding:12,display:"grid",gridTemplateColumns:"1fr",gap:2}}>

                <span style={{fontSize:11,color:f.flagged?"#ff4455":"var(--text-secondary)"}}>{f.name}</span>

                {["pnf","renko"].map(t => (
                  <button key={t} onClick={()=>setChartType(t)}
                    style={{padding:"3px 10px",border:"none",borderRadius:3,fontSize:10,fontWeight:600,
                      fontFamily:"var(--font-mono)",cursor:"pointer",
                      background:chartType===t?"var(--accent-dim)":"transparent",
                      color:chartType===t?"var(--accent)":"var(--text-muted)"}}>
                    {t.toUpperCase()}
                  </button>
                ))}
              </div>
              <div style={{display:"flex",gap:2,background:"var(--bg-secondary)",padding:2,borderRadius:4,border:"1px solid var(--border-dim)"}}>
                {[0.25, 0.5, 1, 3].map(pct => (
                  <button key={pct} onClick={()=>setChartBoxPct(pct)}
                    style={{padding:"3px 8px",border:"none",borderRadius:3,fontSize:10,fontWeight:600,
                      fontFamily:"var(--font-mono)",cursor:"pointer",
                      background:chartBoxPct===pct?"var(--accent-dim)":"transparent",
                      color:chartBoxPct===pct?"var(--accent)":"var(--text-muted)"}}>
                    {pct}%
                  </button>
                ))}
              </div>
            </div>
          </div>
          <div style={{padding:12}}>
            {chartType === "pnf"
              ? <PnFChart prices={d.price_history} boxPct={chartBoxPct}/>
              : <RenkoChart prices={d.price_history} boxPct={chartBoxPct}/>}
          </div>
        </div>

        {/* ── MANAGEMENT TEAM ── */}
        <div className="card fade-in" style={{marginBottom:16}}>
          <div style={{padding:"10px 16px",borderBottom:"1px solid var(--border-dim)",fontSize:11,fontWeight:700,
            fontFamily:"var(--font-mono)",color:"var(--text-muted)",letterSpacing:1}}>MANAGEMENT TEAM</div>
          <div style={{padding:8}}>
            {d.management.map((m,i) => (
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",
                borderBottom:"1px solid var(--border-dim)",fontSize:11}}>
                <span style={{fontWeight:600,color:"var(--text-primary)"}}>{m.name}</span>
                <span style={{color:"var(--text-muted)"}}>{m.designation}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Footer */}
        <div style={{padding:"12px 0",borderTop:"1px solid var(--border-dim)",display:"flex",justifyContent:"space-between",
          fontSize:9,color:"var(--text-muted)",fontFamily:"var(--font-mono)",letterSpacing:1}}>
          <span>TRADEDGE STOCK ANALYSIS • DATA VIA YFINANCE</span>
          <a href="scanner.html" style={{color:"var(--accent)",textDecoration:"none"}}>← BACK TO SCANNER</a>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<StockPage/>);
</script>
</body>
</html>
