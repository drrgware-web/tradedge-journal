<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Drilldown | TradEdge</title>
    <link rel="icon" type="image/jpeg" href="assets/logo.jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-hover: #242432;
            --border: #2a2a3a;
            --text-primary: #e8e8f0;
            --text-secondary: #8888a0;
            --text-muted: #5a5a70;
            --accent-cyan: #00f0ff;
            --accent-magenta: #ff00aa;
            --accent-green: #00ff88;
            --accent-red: #ff4466;
            --accent-yellow: #ffaa00;
            --accent-purple: #aa66ff;
            --accent-blue: #4488ff;
            --gradient-cyber: linear-gradient(135deg, #00f0ff 0%, #ff00aa 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 16px; }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--accent-cyan);
        }

        .stock-header {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .stock-symbol {
            font-size: 24px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .stock-name {
            font-size: 14px;
            color: var(--text-muted);
        }

        .stock-sector {
            font-size: 12px;
            padding: 4px 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-secondary);
        }

        .header-right { display: flex; align-items: center; gap: 12px; }

        .chart-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 12px;
            transition: all 0.2s;
        }

        .chart-btn:hover {
            background: var(--accent-cyan);
            color: var(--bg-primary);
            border-color: var(--accent-cyan);
        }

        .chart-btn.tv { background: linear-gradient(135deg, #2962ff 0%, #00bcd4 100%); color: white; border: none; }
        .chart-btn.dz { background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%); color: white; border: none; }

        /* Main Content */
        .main {
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Price Section */
        .price-section {
            display: flex;
            align-items: flex-end;
            gap: 24px;
            margin-bottom: 24px;
            padding: 20px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .price-main {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .current-price {
            font-size: 36px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .price-change {
            font-size: 18px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 8px;
        }

        .price-change.positive { background: rgba(0, 255, 136, 0.15); color: var(--accent-green); }
        .price-change.negative { background: rgba(255, 68, 102, 0.15); color: var(--accent-red); }

        .price-meta {
            display: flex;
            gap: 24px;
            margin-left: auto;
        }

        .meta-item {
            text-align: center;
        }

        .meta-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .meta-value {
            font-size: 16px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            margin-top: 4px;
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }

        .col-span-2 { grid-column: span 2; }
        .col-span-3 { grid-column: span 3; }

        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title .icon { font-size: 16px; }

        .card-badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
        }

        /* O'Neil Score */
        .oneil-grid {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 20px;
            align-items: center;
        }

        .master-score {
            width: 100px;
            height: 100px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .master-score .grade {
            font-size: 48px;
            line-height: 1;
        }

        .master-score .label {
            font-size: 11px;
            margin-top: 4px;
            opacity: 0.8;
        }

        .master-score.A { background: linear-gradient(135deg, rgba(0,255,136,0.2), rgba(0,255,136,0.05)); color: var(--accent-green); border: 2px solid var(--accent-green); }
        .master-score.B { background: linear-gradient(135deg, rgba(0,240,255,0.2), rgba(0,240,255,0.05)); color: var(--accent-cyan); border: 2px solid var(--accent-cyan); }
        .master-score.C { background: linear-gradient(135deg, rgba(255,170,0,0.2), rgba(255,170,0,0.05)); color: var(--accent-yellow); border: 2px solid var(--accent-yellow); }
        .master-score.D { background: linear-gradient(135deg, rgba(255,68,102,0.2), rgba(255,68,102,0.05)); color: var(--accent-red); border: 2px solid var(--accent-red); }
        .master-score.E { background: var(--bg-hover); color: var(--text-muted); border: 2px solid var(--border); }

        .oneil-metrics { display: flex; flex-direction: column; gap: 12px; }

        .metric-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .metric-label {
            font-size: 12px;
            color: var(--text-secondary);
            width: 120px;
        }

        .metric-bar {
            flex: 1;
            height: 8px;
            background: var(--bg-hover);
            border-radius: 4px;
            overflow: hidden;
        }

        .metric-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .metric-fill.green { background: linear-gradient(90deg, var(--accent-green), #00cc6a); }
        .metric-fill.cyan { background: linear-gradient(90deg, var(--accent-cyan), #00c0cc); }
        .metric-fill.yellow { background: linear-gradient(90deg, var(--accent-yellow), #cc8800); }
        .metric-fill.red { background: linear-gradient(90deg, var(--accent-red), #cc3344); }

        .metric-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            width: 40px;
            text-align: right;
        }

        /* Guru Ratings */
        .guru-list { display: flex; flex-direction: column; gap: 12px; }

        .guru-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .guru-item:hover { background: var(--bg-hover); }
        .guru-item.expanded { background: var(--bg-hover); }

        .guru-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: var(--bg-card);
        }

        .guru-info { flex: 1; }

        .guru-name {
            font-size: 13px;
            font-weight: 600;
        }

        .guru-strategy {
            font-size: 11px;
            color: var(--text-muted);
        }

        .guru-score {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .guru-score-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            font-weight: 700;
        }

        .guru-score-label {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 8px;
            font-weight: 600;
        }

        .score-pass { background: rgba(0, 255, 136, 0.15); color: var(--accent-green); }
        .score-fair { background: rgba(255, 170, 0, 0.15); color: var(--accent-yellow); }
        .score-fail { background: rgba(255, 68, 102, 0.15); color: var(--accent-red); }

        .guru-details {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .guru-item.expanded .guru-details { display: block; }

        .criteria-list { display: flex; flex-direction: column; gap: 6px; }

        .criteria-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .criteria-icon {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .criteria-icon.pass { background: rgba(0, 255, 136, 0.15); color: var(--accent-green); }
        .criteria-icon.fail { background: rgba(255, 68, 102, 0.15); color: var(--accent-red); }

        .criteria-text { flex: 1; color: var(--text-secondary); }
        .criteria-value { font-family: 'JetBrains Mono', monospace; color: var(--text-primary); }

        /* Surveillance */
        .surveillance-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .surveillance-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 600;
        }

        .surveillance-badge.safe { background: rgba(0, 255, 136, 0.15); color: var(--accent-green); border: 1px solid rgba(0, 255, 136, 0.3); }
        .surveillance-badge.caution { background: rgba(255, 170, 0, 0.15); color: var(--accent-yellow); border: 1px solid rgba(255, 170, 0, 0.3); }
        .surveillance-badge.danger { background: rgba(255, 68, 102, 0.15); color: var(--accent-red); border: 1px solid rgba(255, 68, 102, 0.3); }

        .check-list { display: flex; flex-direction: column; gap: 8px; }

        .check-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            background: var(--bg-secondary);
            border-radius: 8px;
        }

        .check-icon {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }

        .check-icon.pass { background: rgba(0, 255, 136, 0.15); color: var(--accent-green); }
        .check-icon.fail { background: rgba(255, 68, 102, 0.15); color: var(--accent-red); }

        .check-content { flex: 1; }

        .check-name { font-size: 13px; font-weight: 500; }
        .check-detail { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        /* Fundamentals */
        .fundamentals-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .fund-item {
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 8px;
            text-align: center;
        }

        .fund-value {
            font-size: 18px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .fund-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Returns */
        .returns-row {
            display: flex;
            gap: 8px;
        }

        .return-item {
            flex: 1;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 8px;
            text-align: center;
        }

        .return-value {
            font-size: 16px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .return-value.positive { color: var(--accent-green); }
        .return-value.negative { color: var(--accent-red); }

        .return-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Ownership */
        .ownership-bars { display: flex; flex-direction: column; gap: 12px; }

        .ownership-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ownership-label {
            width: 100px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .ownership-bar {
            flex: 1;
            height: 24px;
            background: var(--bg-secondary);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .ownership-fill {
            height: 100%;
            border-radius: 6px;
            display: flex;
            align-items: center;
            padding-left: 8px;
            font-size: 11px;
            font-weight: 600;
            color: white;
        }

        .ownership-fill.promoter { background: linear-gradient(90deg, var(--accent-purple), #8844cc); }
        .ownership-fill.institutional { background: linear-gradient(90deg, var(--accent-cyan), #0088aa); }
        .ownership-fill.public { background: linear-gradient(90deg, var(--accent-yellow), #cc8800); }

        /* Loading */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px;
            color: var(--text-muted);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 1200px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            .col-span-3 { grid-column: span 2; }
        }

        @media (max-width: 800px) {
            .grid { grid-template-columns: 1fr; }
            .col-span-2, .col-span-3 { grid-column: span 1; }
            .price-section { flex-direction: column; align-items: flex-start; }
            .price-meta { margin-left: 0; margin-top: 16px; flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="scanner.html" class="back-btn">← Scanner</a>
            <div class="stock-header">
                <span class="stock-symbol" id="symbol">-</span>
                <span class="stock-name" id="name">Loading...</span>
                <span class="stock-sector" id="sector">-</span>
            </div>
        </div>
        <div class="header-right">
            <a href="#" class="chart-btn tv" id="tvLink" target="_blank">📊 TradingView</a>
            <a href="#" class="chart-btn dz" id="dzLink" target="_blank">📈 Definedge</a>
        </div>
    </header>

    <main class="main" id="mainContent">
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <div>Loading stock data...</div>
        </div>
    </main>

    <script>
        let stockData = null;

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const symbol = params.get('s') || params.get('symbol');

            if (!symbol) {
                showError('No symbol provided. Use ?s=RELIANCE');
                return;
            }

            document.getElementById('symbol').textContent = symbol;
            document.title = `${symbol} | TradEdge`;

            // Set chart links
            document.getElementById('tvLink').href = `https://in.tradingview.com/chart/8RFOgQZr/?symbol=NSE:${symbol}`;
            document.getElementById('dzLink').href = `https://zone.definedge.com/symbol/NSE:${symbol}`;

            try {
                const response = await fetch(`data/stock_details/${symbol}.json`);
                if (!response.ok) throw new Error('Stock not found');
                
                stockData = await response.json();
                renderStock();
            } catch (error) {
                showError(`Failed to load ${symbol}: ${error.message}`);
            }
        }

        function showError(message) {
            document.getElementById('loading').innerHTML = `
                <div style="font-size: 48px; margin-bottom: 16px;">⚠️</div>
                <div>${message}</div>
                <a href="scanner.html" style="margin-top: 16px; color: var(--accent-cyan);">← Back to Scanner</a>
            `;
        }

        function renderStock() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('name').textContent = stockData.name || stockData.symbol;
            document.getElementById('sector').textContent = stockData.sector || stockData.industry || '-';

            const main = document.getElementById('mainContent');
            main.innerHTML = `
                ${renderPriceSection()}
                <div class="grid" style="margin-top: 20px;">
                    ${renderOneilCard()}
                    ${renderGuruCard()}
                    ${renderSurveillanceCard()}
                    ${renderFundamentalsCard()}
                    ${renderReturnsCard()}
                    ${renderOwnershipCard()}
                </div>
            `;

            // Setup guru expand/collapse
            document.querySelectorAll('.guru-item').forEach(item => {
                item.addEventListener('click', () => {
                    item.classList.toggle('expanded');
                });
            });
        }

        function renderPriceSection() {
            const tech = stockData.technical || {};
            const price = tech.close || stockData.price || 0;
            const change = tech.change_pct || stockData.change_pct || 0;
            const breakout = stockData.breakout || {};
            const vol = stockData.volume || {};

            return `
                <div class="price-section">
                    <div class="price-main">
                        <span class="current-price">₹${formatNum(price)}</span>
                        <span class="price-change ${change >= 0 ? 'positive' : 'negative'}">
                            ${change >= 0 ? '+' : ''}${formatNum(change, 2)}%
                        </span>
                    </div>
                    <div class="price-meta">
                        <div class="meta-item">
                            <div class="meta-label">52W High</div>
                            <div class="meta-value">₹${formatNum(breakout.high_52w || tech.high_52w)}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">52W Low</div>
                            <div class="meta-value">₹${formatNum(breakout.low_52w || tech.low_52w)}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Volume</div>
                            <div class="meta-value">${formatVolume(vol.latest || tech.volume)}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Vol Ratio</div>
                            <div class="meta-value">${formatNum(vol.ratio, 2)}x</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">RSI</div>
                            <div class="meta-value">${formatNum(stockData.rsi || tech.indicators?.rsi, 1)}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderOneilCard() {
            const oneil = stockData.oneil || {};
            const grade = oneil.master_score || '-';
            const composite = oneil.composite_score || 0;
            const eps = oneil.eps_strength || 0;
            const price = oneil.price_strength || 0;
            const demand = oneil.buyer_demand_score || 50;
            const group = oneil.group_rank || 50;

            return `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title"><span class="icon">📊</span> O'Neil Rating</span>
                        <span class="card-badge" style="background: var(--bg-hover);">Composite: ${composite}</span>
                    </div>
                    <div class="oneil-grid">
                        <div class="master-score ${grade}">
                            <span class="grade">${grade}</span>
                            <span class="label">MASTER</span>
                        </div>
                        <div class="oneil-metrics">
                            ${renderMetricBar('EPS Strength', eps, getBarColor(eps))}
                            ${renderMetricBar('Price Strength', price, getBarColor(price))}
                            ${renderMetricBar('Buyer Demand', demand, getBarColor(demand))}
                            ${renderMetricBar('Group Rank', group, getBarColor(group))}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderMetricBar(label, value, color) {
            return `
                <div class="metric-row">
                    <span class="metric-label">${label}</span>
                    <div class="metric-bar">
                        <div class="metric-fill ${color}" style="width: ${value}%"></div>
                    </div>
                    <span class="metric-value">${value}</span>
                </div>
            `;
        }

        function getBarColor(value) {
            if (value >= 80) return 'green';
            if (value >= 60) return 'cyan';
            if (value >= 40) return 'yellow';
            return 'red';
        }

        function renderGuruCard() {
            const ratings = stockData.guru_ratings || [];
            
            const guruIcons = {
                'canslim': '📈',
                'value': '💎',
                'quality': '🏰',
                'growth': '🌱',
                'wall street': '📊'
            };

            let html = `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title"><span class="icon">🎓</span> Guru Ratings</span>
                    </div>
                    <div class="guru-list">
            `;

            for (const guru of ratings) {
                const scorePct = guru.score_pct || 0;
                const scoreClass = scorePct >= 70 ? 'pass' : scorePct >= 50 ? 'fair' : 'fail';
                const icon = Object.entries(guruIcons).find(([k]) => guru.strategy?.toLowerCase().includes(k))?.[1] || '📊';

                html += `
                    <div class="guru-item">
                        <div class="guru-avatar">${icon}</div>
                        <div class="guru-info">
                            <div class="guru-name">${guru.guru || 'Unknown'}</div>
                            <div class="guru-strategy">${guru.strategy || '-'}</div>
                        </div>
                        <div class="guru-score">
                            <div class="guru-score-value">${scorePct}%</div>
                            <div class="guru-score-label score-${scoreClass}">${guru.score || scoreClass.toUpperCase()}</div>
                        </div>
                        <div class="guru-details">
                            <div class="criteria-list">
                                ${(guru.details || []).map(d => `
                                    <div class="criteria-item">
                                        <div class="criteria-icon ${d.passed ? 'pass' : 'fail'}">${d.passed ? '✓' : '✗'}</div>
                                        <span class="criteria-text">${d.criterion}</span>
                                        <span class="criteria-value">${d.detail}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }

            html += `</div></div>`;
            return html;
        }

        function renderSurveillanceCard() {
            const surv = stockData.surveillance || {};
            const flags = surv.flags || [];
            const redCount = surv.red_flag_count || 0;
            const statusClass = redCount === 0 ? 'safe' : redCount <= 2 ? 'caution' : 'danger';
            const statusText = redCount === 0 ? 'No Red Flags' : `${redCount} Flag${redCount > 1 ? 's' : ''} Raised`;

            return `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title"><span class="icon">🛡️</span> Surveillance Check</span>
                    </div>
                    <div class="surveillance-header">
                        <div class="surveillance-badge ${statusClass}">
                            ${statusClass === 'safe' ? '✓' : '⚠️'} ${statusText}
                        </div>
                    </div>
                    <div class="check-list">
                        ${flags.map(f => `
                            <div class="check-item">
                                <div class="check-icon ${f.flagged ? 'fail' : 'pass'}">${f.flagged ? '✗' : '✓'}</div>
                                <div class="check-content">
                                    <div class="check-name">${f.name}</div>
                                    <div class="check-detail">${f.detail || f.description}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderFundamentalsCard() {
            const fund = stockData.fundamentals || {};

            const items = [
                { label: 'Market Cap', value: `₹${formatCr(fund.market_cap_cr)}Cr` },
                { label: 'P/E Ratio', value: formatNum(fund.pe_ratio, 1) },
                { label: 'P/B Ratio', value: formatNum(fund.pb_ratio, 2) },
                { label: 'ROE', value: fund.roe ? `${formatNum(fund.roe, 1)}%` : '-' },
                { label: 'Debt/Equity', value: `${formatNum(fund.debt_to_equity, 1)}%` },
                { label: 'Div Yield', value: fund.dividend_yield ? `${formatNum(fund.dividend_yield, 2)}%` : '-' },
                { label: 'EPS', value: `₹${formatNum(fund.eps, 2)}` },
                { label: 'Book Value', value: `₹${formatNum(fund.book_value, 2)}` },
                { label: 'Rev Growth', value: fund.revenue_growth ? `${formatNum(fund.revenue_growth, 1)}%` : '-' },
            ];

            return `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title"><span class="icon">💰</span> Fundamentals</span>
                        <span class="card-badge" style="background: var(--bg-hover);">${fund.mcap_category || '-'}</span>
                    </div>
                    <div class="fundamentals-grid">
                        ${items.map(i => `
                            <div class="fund-item">
                                <div class="fund-value">${i.value}</div>
                                <div class="fund-label">${i.label}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderReturnsCard() {
            const tech = stockData.technical || {};
            const returns = tech.returns || stockData.returns || {};

            const items = [
                { label: '1D', value: returns['1d'] || 0 },
                { label: '1W', value: returns['1w'] || 0 },
                { label: '1M', value: returns['1m'] || 0 },
                { label: '3M', value: returns['3m'] || 0 },
                { label: '6M', value: returns['6m'] || 0 },
            ];

            return `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title"><span class="icon">📈</span> Returns</span>
                    </div>
                    <div class="returns-row">
                        ${items.map(i => `
                            <div class="return-item">
                                <div class="return-value ${i.value >= 0 ? 'positive' : 'negative'}">
                                    ${i.value >= 0 ? '+' : ''}${formatNum(i.value, 1)}%
                                </div>
                                <div class="return-label">${i.label}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderOwnershipCard() {
            const hold = stockData.fund_holdings || {};
            const promoter = hold.promoter_pct || 0;
            const institutional = hold.institutional_pct || 0;
            const publicHold = Math.max(0, 100 - promoter - institutional);

            return `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title"><span class="icon">👥</span> Ownership</span>
                    </div>
                    <div class="ownership-bars">
                        <div class="ownership-row">
                            <span class="ownership-label">Promoter</span>
                            <div class="ownership-bar">
                                <div class="ownership-fill promoter" style="width: ${promoter}%">${formatNum(promoter, 1)}%</div>
                            </div>
                        </div>
                        <div class="ownership-row">
                            <span class="ownership-label">Institutional</span>
                            <div class="ownership-bar">
                                <div class="ownership-fill institutional" style="width: ${institutional}%">${formatNum(institutional, 1)}%</div>
                            </div>
                        </div>
                        <div class="ownership-row">
                            <span class="ownership-label">Public</span>
                            <div class="ownership-bar">
                                <div class="ownership-fill public" style="width: ${publicHold}%">${formatNum(publicHold, 1)}%</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Utility functions
        function formatNum(num, decimals = 2) {
            if (num == null || isNaN(num)) return '-';
            return Number(num).toLocaleString('en-IN', { 
                minimumFractionDigits: decimals, 
                maximumFractionDigits: decimals 
            });
        }

        function formatCr(num) {
            if (num == null || isNaN(num)) return '-';
            if (num >= 100000) return (num / 100000).toFixed(1) + 'L';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toFixed(0);
        }

        function formatVolume(num) {
            if (num == null || isNaN(num)) return '-';
            if (num >= 10000000) return (num / 10000000).toFixed(2) + 'Cr';
            if (num >= 100000) return (num / 100000).toFixed(2) + 'L';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        init();
    </script>
</body>
</html>
