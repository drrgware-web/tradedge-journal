<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Drilldown | TradEdge</title>
<link rel="icon" type="image/jpeg" href="assets/logo.jpeg">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg-primary:#06080c;--bg-secondary:#0a0e14;--bg-card:#0d1117;--bg-hover:#141a22;--bg3:#111820;--border-dim:rgba(0,255,136,.06);--border-low:rgba(0,255,136,.1);--border-med:rgba(0,255,136,.2);--b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.12);--accent:#00ff88;--accent-dim:rgba(0,255,136,.08);--accent2:#00c8ff;--accent3:#8844ff;--red:#ff4455;--amber:#ffaa00;--t1:#eef;--t2:#ccd;--t3:#99aabb;--t4:#556677;--font-mono:'IBM Plex Mono',monospace;--font-sans:'Outfit',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-sans);background:var(--bg-primary);color:var(--t1);min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg-secondary)}::-webkit-scrollbar-thumb{background:var(--border-low);border-radius:3px}

.hdr{background:linear-gradient(180deg,#0d1018,var(--bg-secondary));border-bottom:1px solid var(--border-dim);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,136,.12),rgba(0,200,255,.08),transparent)}
.hdr-l{display:flex;align-items:center;gap:16px}
.back{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--bg-card);border:1px solid var(--border-low);border-radius:6px;color:var(--t4);text-decoration:none;font-size:12px;font-weight:500;transition:all .15s}
.back:hover{background:var(--bg-hover);color:var(--t1);border-color:var(--accent)}
.stk-t{display:flex;align-items:center;gap:12px}
.stk-sym{font-size:20px;font-weight:800;font-family:var(--font-mono);color:var(--accent)}
.stk-nm{font-size:12px;color:var(--t4);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stk-sec{font-size:10px;padding:3px 8px;background:var(--bg-card);border:1px solid var(--border-dim);border-radius:10px;color:var(--t4);font-weight:500}
.hdr-r{display:flex;align-items:center;gap:10px}

.srch-w{position:relative}
.srch-i{width:200px;padding:7px 12px;background:var(--bg-card);border:1px solid var(--border-low);border-radius:6px;color:var(--t1);font-family:var(--font-mono);font-size:12px;transition:all .2s}
.srch-i:focus{outline:none;border-color:var(--accent);width:280px;box-shadow:0 0 0 3px rgba(0,255,136,.1)}
.srch-i::placeholder{color:var(--t4);font-family:var(--font-sans)}
.srch-dd{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--bg-card);border:1px solid var(--border-med);border-radius:8px;max-height:320px;overflow-y:auto;z-index:1000;display:none;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.srch-dd.on{display:block}
.srch-it{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer;transition:all .1s;border-bottom:1px solid var(--border-dim)}
.srch-it:last-child{border-bottom:none}
.srch-it:hover,.srch-it.sel{background:var(--bg-hover)}
.srch-sym{font-family:var(--font-mono);font-weight:600;font-size:12px;color:var(--accent)}
.srch-nm{font-size:11px;color:var(--t4);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.main{max-width:1600px;margin:0 auto;padding:16px}

.pbar{display:flex;align-items:center;gap:20px;padding:14px 20px;background:var(--bg-card);border:1px solid var(--border-low);border-radius:10px;margin-bottom:16px}
.pbar-m{display:flex;align-items:baseline;gap:12px}
.cur-pr{font-size:32px;font-weight:700;font-family:var(--font-mono)}
.pr-chg{font-size:16px;font-weight:600;padding:4px 10px;border-radius:6px}
.pr-chg.up{background:rgba(0,255,136,.12);color:var(--accent)}
.pr-chg.dn{background:rgba(255,68,85,.12);color:var(--red)}
.pbar-mt{display:flex;gap:20px;margin-left:auto}
.mt-it{text-align:center}
.mt-lb{font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:.5px}
.mt-vl{font-size:14px;font-weight:600;font-family:var(--font-mono);margin-top:2px}

/* TEChart */
.ch-sec{background:var(--bg-card);border:1px solid var(--border-low);border-radius:10px;margin-bottom:16px;overflow:hidden}
.ch-tb{display:flex;align-items:center;gap:4px;padding:5px 10px;background:var(--bg-secondary);border-bottom:1px solid var(--border-dim);flex-wrap:wrap}
.dtb{display:flex;gap:1px;background:var(--border-dim);border-radius:4px;padding:1px}
.dtb-btn{padding:3px 8px;border:none;border-radius:3px;font-size:9px;font-weight:600;font-family:var(--font-mono);cursor:pointer;background:transparent;color:var(--t4);transition:all .1s}
.dtb-btn:hover{color:var(--t3)}
.dtb-btn.active{background:var(--accent-dim);color:var(--accent)}
.dtb-btn:disabled{opacity:.3;cursor:not-allowed}
.sep{width:1px;height:14px;background:var(--border-dim);margin:0 4px}
.ema-btn{padding:1px 5px;border-radius:3px;font-size:8px;font-weight:700;font-family:var(--font-mono);cursor:pointer;border:1px solid;background:transparent;transition:all .1s}
.link-btn{padding:1px 6px;border-radius:3px;font-size:8px;font-weight:700;font-family:var(--font-mono);cursor:pointer;border:1px solid;background:transparent;text-decoration:none}
.ch-ft{display:flex;justify-content:space-between;padding:2px 10px;background:var(--bg-secondary);border-top:1px solid var(--border-dim);font-size:7px;font-family:var(--font-mono);color:var(--t4)}

/* Context Menu */
.ctx-menu{position:fixed;z-index:600;background:var(--bg-card);border:1px solid var(--border-med);border-radius:8px;min-width:180px;box-shadow:0 8px 32px rgba(0,0,0,.6);padding:4px 0}
.ctx-header{padding:8px 12px;border-bottom:1px solid var(--border-dim);display:flex;justify-content:space-between;align-items:center}
.ctx-item{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;border:none;background:none;color:var(--t3);font-size:11px;font-family:var(--font-sans);cursor:pointer;text-align:left;transition:background .1s}
.ctx-item:hover{background:var(--bg-hover)}
.ctx-sep{height:1px;background:var(--border-dim);margin:4px 0}

/* Cards */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-2{grid-template-columns:repeat(2,1fr)}
.card{background:var(--bg-card);border:1px solid var(--border-low);border-radius:10px;padding:16px;overflow:hidden}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border-dim)}
.card-tt{font-size:11px;font-weight:600;color:var(--t4);letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.card-bg{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:600;background:var(--bg-hover);color:var(--t4)}

/* O'Neil */
.onl-w{display:flex;gap:16px;align-items:flex-start}
.m-gr{width:80px;height:80px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
.m-gr .g{font-size:36px;line-height:1}
.m-gr .lb{font-size:8px;margin-top:4px;opacity:.7;letter-spacing:1px}
.m-gr.A{background:linear-gradient(135deg,rgba(0,255,136,.15),rgba(0,255,136,.05));color:var(--accent);border:2px solid var(--accent)}
.m-gr.B{background:linear-gradient(135deg,rgba(0,200,255,.15),rgba(0,200,255,.05));color:var(--accent2);border:2px solid var(--accent2)}
.m-gr.C{background:linear-gradient(135deg,rgba(255,170,0,.15),rgba(255,170,0,.05));color:var(--amber);border:2px solid var(--amber)}
.m-gr.D{background:linear-gradient(135deg,rgba(255,68,85,.15),rgba(255,68,85,.05));color:var(--red);border:2px solid var(--red)}
.m-gr.E,.m-gr.-{background:var(--bg-hover);color:var(--t4);border:2px solid var(--border-low)}
.onl-mt{flex:1;display:flex;flex-direction:column;gap:10px}
.met-r{display:flex;align-items:center;gap:10px}
.met-lb{font-size:10px;color:var(--t4);width:90px}
.met-bar{flex:1;height:6px;background:var(--bg-hover);border-radius:3px;overflow:hidden}
.met-fl{height:100%;border-radius:3px}
.met-fl.grn{background:linear-gradient(90deg,var(--accent),#00cc6a)}
.met-fl.cyn{background:linear-gradient(90deg,var(--accent2),#0088aa)}
.met-fl.amb{background:linear-gradient(90deg,var(--amber),#cc8800)}
.met-fl.red{background:linear-gradient(90deg,var(--red),#cc2244)}
.met-vl{font-family:var(--font-mono);font-size:11px;font-weight:600;width:30px;text-align:right}

/* Guru */
.guru-ls{display:flex;flex-direction:column;gap:8px}
.guru-r{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg-secondary);border-radius:6px;transition:background .1s}
.guru-r:hover{background:var(--bg-hover)}
.guru-ic{font-size:16px}
.guru-nf{flex:1}
.guru-nm{font-size:11px;font-weight:600}
.guru-st{font-size:9px;color:var(--t4)}
.guru-sc{font-family:var(--font-mono);font-size:14px;font-weight:700}
.guru-bd{font-size:8px;padding:2px 6px;border-radius:4px;font-weight:600;margin-left:6px}
.guru-bd.pass{background:rgba(0,255,136,.12);color:var(--accent)}
.guru-bd.fair{background:rgba(255,170,0,.12);color:var(--amber)}
.guru-bd.fail{background:rgba(255,68,85,.12);color:var(--red)}

/* Surveillance */
.surv-st{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;font-size:11px;font-weight:600;margin-bottom:12px}
.surv-st.safe{background:rgba(0,255,136,.12);color:var(--accent);border:1px solid rgba(0,255,136,.2)}
.surv-st.caution{background:rgba(255,170,0,.12);color:var(--amber);border:1px solid rgba(255,170,0,.2)}
.surv-st.danger{background:rgba(255,68,85,.12);color:var(--red);border:1px solid rgba(255,68,85,.2)}
.chk-ls{display:flex;flex-direction:column;gap:6px}
.chk-r{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:var(--bg-secondary);border-radius:6px}
.chk-ic{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.chk-ic.pass{background:rgba(0,255,136,.12);color:var(--accent)}
.chk-ic.fail{background:rgba(255,68,85,.12);color:var(--red)}
.chk-tx{flex:1}
.chk-nm{font-size:11px;font-weight:500}
.chk-dt{font-size:9px;color:var(--t4);margin-top:1px}

/* Fundamentals Grid */
.fund-gr{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.fund-it{padding:10px;background:var(--bg-secondary);border-radius:6px;text-align:center}
.fund-vl{font-size:16px;font-weight:700;font-family:var(--font-mono)}
.fund-lb{font-size:9px;color:var(--t4);margin-top:3px}

/* Returns */
.ret-r{display:flex;gap:6px}
.ret-it{flex:1;padding:10px;background:var(--bg-secondary);border-radius:6px;text-align:center}
.ret-vl{font-size:14px;font-weight:600;font-family:var(--font-mono)}
.ret-vl.up{color:var(--accent)}
.ret-vl.dn{color:var(--red)}
.ret-lb{font-size:9px;color:var(--t4);margin-top:3px}

/* Ownership */
.own-bs{display:flex;flex-direction:column;gap:10px}
.own-r{display:flex;align-items:center;gap:10px}
.own-lb{width:80px;font-size:10px;color:var(--t4)}
.own-bar{flex:1;height:20px;background:var(--bg-secondary);border-radius:4px;overflow:hidden}
.own-fl{height:100%;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:600;color:#fff;border-radius:4px}
.own-fl.prm{background:linear-gradient(90deg,var(--accent3),#6633cc)}
.own-fl.ins{background:linear-gradient(90deg,var(--accent2),#0066aa)}
.own-fl.pub{background:linear-gradient(90deg,var(--amber),#cc8800)}

/* Fundamental Scorecard */
.fund-card{padding:0;overflow:hidden}
.fund-hdr{padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--b1)}
.fund-hdr-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.fund-title{font-size:14px;font-weight:800;color:var(--t1)}
.fund-meta{font-size:10px;color:var(--t4);margin-top:2px}
.fund-score{text-align:center}
.fund-score-val{font-size:22px;font-weight:800}
.fund-score-lbl{font-size:9px;color:var(--t4);font-weight:600}
.fund-flags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.fund-flag{font-size:9px;padding:1px 6px;border-radius:6px;font-weight:600}
.fund-flag.red{background:rgba(248,113,113,.15);color:#f87171}
.fund-flag.yellow{background:rgba(234,179,8,.12);color:#eab308}
.fund-tbl{width:100%;border-collapse:collapse;font-size:11px}
.fund-tbl th{padding:6px 8px;text-align:right;font-size:10px;color:var(--t4);font-weight:700;border-bottom:2px solid var(--b2)}
.fund-tbl th:first-child{text-align:left}
.fund-tbl td{padding:5px 8px;font-family:var(--font-mono);font-size:11px;text-align:right;border-bottom:1px solid var(--b1)}
.fund-tbl td:first-child{text-align:left;font-family:var(--font-sans);font-weight:600;color:var(--t2)}
.fund-tbl tr:hover{background:var(--bg-hover)}
.fund-loading{padding:30px;text-align:center;color:var(--t4);font-size:11px}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;color:var(--t4)}
.spinner{width:36px;height:36px;border:3px solid var(--border-low);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:1200px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:800px){.grid{grid-template-columns:1fr}.pbar{flex-wrap:wrap}.pbar-mt{margin-left:0;margin-top:12px;width:100%;justify-content:space-between}.hdr{flex-wrap:wrap;gap:10px}.hdr-r{width:100%;justify-content:flex-end}}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-l">
    <a href="scanner.html" class="back">← Scanner</a>
    <div class="stk-t">
      <span class="stk-sym" id="symbol">—</span>
      <span class="stk-nm" id="name">Loading...</span>
      <span class="stk-sec" id="sector">—</span>
    </div>
  </div>
  <div class="hdr-r">
    <div class="srch-w">
      <input type="text" class="srch-i" id="srchIn" placeholder="Search stock..." autocomplete="off">
      <div class="srch-dd" id="srchDD"></div>
    </div>
  </div>
</header>
<main class="main" id="mainContent">
  <div class="loading" id="loading"><div class="spinner"></div><div>Loading stock data...</div></div>
</main>
<script>
const TV_LAYOUT='8RFOgQZr',WORKER='https://spring-fire-41a0.drrgware.workers.dev';
const FUND_PE_THRESHOLD=40;
let D=null,allS=[],selIdx=-1,fundData=null;

// ═══ INIT ═══
async function init(){
  const p=new URLSearchParams(location.search),sym=p.get('s')||p.get('symbol');
  await loadSyms();setupSrch();
  if(!sym){
    $('symbol').textContent='Select Stock';
    $('symbol').style.color='var(--t4)';
    $('name').textContent='';
    $('sector').style.display='none';
    $('loading').innerHTML=`<div style="font-size:48px;margin-bottom:16px">🔍</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:8px">Search for a stock</div>
      <div style="font-size:12px;color:var(--t4);margin-bottom:20px">Type symbol or company name in the search box above</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">${['RELIANCE','TCS','HDFCBANK','INFY','BAJFINANCE'].map(s=>`<button onclick="goTo('${s}')" style="padding:6px 14px;background:var(--bg-hover);border:1px solid var(--border-low);border-radius:6px;color:var(--accent);font-family:var(--font-mono);font-size:11px;font-weight:600;cursor:pointer">${s}</button>`).join('')}</div>`;
    setTimeout(()=>$('srchIn').focus(),100);
    document.title='Stock Drilldown | TradEdge';
    return;
  }
  $('symbol').textContent=sym;document.title=`${sym} | TradEdge`;
  try{const r=await fetch(`data/stock_details/${sym}.json`);if(!r.ok)throw new Error('Not found');D=await r.json();render();fetchFundamentals(sym)}catch(e){showErr(`Failed to load ${sym}: ${e.message}`)}
}
function $(id){return document.getElementById(id)}

async function loadSyms(){try{const r=await fetch('data/scanner_results.json');if(r.ok){const d=await r.json();allS=(d.all_stocks||[]).map(s=>({s:s.symbol,n:s.name||s.symbol}))}}catch(e){}}

function setupSrch(){
  const inp=$('srchIn'),dd=$('srchDD');
  inp.addEventListener('input',()=>{
    const q=inp.value.trim().toUpperCase();if(q.length<1){dd.classList.remove('on');return}
    const m=allS.filter(x=>x.s.includes(q)||x.n.toUpperCase().includes(q)).slice(0,12);
    dd.innerHTML=m.length===0?'<div class="srch-it" style="color:var(--t4);justify-content:center">No matches</div>':m.map((x,i)=>`<div class="srch-it ${i===selIdx?'sel':''}" data-s="${x.s}"><span class="srch-sym">${x.s}</span><span class="srch-nm">${x.n}</span></div>`).join('');
    dd.classList.add('on');selIdx=-1
  });
  inp.addEventListener('keydown',e=>{const its=dd.querySelectorAll('.srch-it[data-s]');if(e.key==='ArrowDown'){e.preventDefault();selIdx=Math.min(selIdx+1,its.length-1);updSel(its)}else if(e.key==='ArrowUp'){e.preventDefault();selIdx=Math.max(selIdx-1,0);updSel(its)}else if(e.key==='Enter'){e.preventDefault();if(selIdx>=0&&its[selIdx])goTo(its[selIdx].dataset.s);else if(inp.value.trim())goTo(inp.value.trim().toUpperCase())}else if(e.key==='Escape')dd.classList.remove('on')});
  dd.addEventListener('click',e=>{const it=e.target.closest('.srch-it[data-s]');if(it)goTo(it.dataset.s)});
  document.addEventListener('click',e=>{if(!e.target.closest('.srch-w'))dd.classList.remove('on')});
}
function updSel(its){its.forEach((it,i)=>it.classList.toggle('sel',i===selIdx))}
function goTo(s){location.href=`stock.html?s=${s}`}
function showErr(m){$('loading').innerHTML=`<div style="font-size:40px;margin-bottom:12px">⚠️</div><div>${m}</div><a href="scanner.html" style="margin-top:12px;color:var(--accent)">← Back to Scanner</a>`}

function render(){
  $('loading').style.display='none';
  $('name').textContent=D.name||D.symbol;
  $('sector').textContent=D.sector||D.industry||'—';
  $('mainContent').innerHTML=`
    ${rPriceBar()}
    ${rChart()}
    <div id="fundScorecard" class="card fund-card" style="margin-bottom:16px;border-left:3px solid var(--b2)">
      <div class="fund-loading"><div class="spinner" style="width:24px;height:24px;margin:0 auto 8px"></div>Loading fundamentals from Screener.in...</div>
    </div>
    <div class="grid">${rOneil()}${rGuru()}${rSurv()}</div>
    <div class="grid" style="margin-top:16px">${rFund()}${rRet()}${rOwn()}</div>
  `;
  initTEChart();
}

// ═══ FUNDAMENTAL SCORECARD ═══
async function fetchFundamentals(sym){
  const container=$('fundScorecard');
  // Try cache first
  let cached=null;
  try{const c=JSON.parse(localStorage.getItem('te_fund_cache')||'{}');if(c[sym]&&Date.now()-c[sym].ts<24*60*60*1000)cached=c[sym].data}catch(e){}
  if(cached){fundData=cached;renderFundScorecard();return}
  // Fetch from worker
  const workerUrl=localStorage.getItem('zd_worker_url')||'';
  if(!workerUrl){container.innerHTML=`<div class="fund-loading" style="color:var(--amber)">⚠️ Set zd_worker_url in localStorage for Screener.in data</div>`;return}
  try{
    const r=await fetch(workerUrl,{method:'GET',headers:{'X-Kite-Action':'screener','X-Screener-Symbol':sym},signal:AbortSignal.timeout(15000)});
    if(!r.ok)throw new Error('Fetch failed');
    const data=await r.json();
    if(!data.quarters?.length)throw new Error('No quarterly data');
    fundData={info:data.info||{},quarters:data.quarters||[]};
    // Cache
    try{const c=JSON.parse(localStorage.getItem('te_fund_cache')||'{}');c[sym]={data:fundData,ts:Date.now()};localStorage.setItem('te_fund_cache',JSON.stringify(c))}catch(e){}
    renderFundScorecard();
  }catch(e){
    console.warn('Fundamental fetch failed:',e);
    container.innerHTML=`<div class="fund-loading" style="color:var(--t4)">Fundamental data unavailable · ${e.message}</div>`;
  }
}

function fundCalcScore(data){
  if(!data||!data.quarters?.length)return{score:0,flags:[]};
  const q=data.quarters[0],flags=[];
  let score=50;
  // EPS growth
  if(q.epsYoY!=null){if(q.epsYoY>20)score+=15;else if(q.epsYoY>0)score+=8;else{score-=15;flags.push({metric:'EPS YoY',val:q.epsYoY,severity:'red'})}}
  if(q.epsQoQ!=null){if(q.epsQoQ>10)score+=8;else if(q.epsQoQ>0)score+=4;else{score-=8;flags.push({metric:'EPS QoQ',val:q.epsQoQ,severity:'red'})}}
  // Sales growth
  if(q.salesYoY!=null){if(q.salesYoY>15)score+=12;else if(q.salesYoY>0)score+=6;else{score-=12;flags.push({metric:'Sales YoY',val:q.salesYoY,severity:'red'})}}
  if(q.salesQoQ!=null){if(q.salesQoQ>5)score+=5;else if(q.salesQoQ>=0)score+=2;else{score-=5;flags.push({metric:'Sales QoQ',val:q.salesQoQ,severity:'yellow'})}}
  // OPM trend
  if(q.opmQoQ!=null){if(q.opmQoQ>1)score+=5;else if(q.opmQoQ>=0)score+=2;else{score-=5;flags.push({metric:'OPM QoQ',val:q.opmQoQ,severity:'yellow'})}}
  // PE check
  const pe=data.info?.pe||0;
  if(pe>FUND_PE_THRESHOLD){score-=10;flags.push({metric:'P/E',val:pe,severity:'red'})}else if(pe>0&&pe<15)score+=5;
  // ROE
  if(data.info?.roe>15)score+=5;else if(data.info?.roe<5&&data.info?.roe>0){score-=5;flags.push({metric:'ROE',val:data.info.roe+'%',severity:'yellow'})}
  return{score:Math.max(0,Math.min(100,score)),flags};
}

// ═══ TEChart Engine ═══
let prices=[],ema20=[],ema50=[],ema200=[];
let showEMA={e20:true,e50:true,e200:true};
let chartType='hlc',drawMode=null,drawings=[],undoStack=[],redoStack=[];
let viewStart=null,viewCount=120,crosshair=null,hoverBar=null;
let isDrag=false,dragX=null,drawStart=null,drawPreview=null,showDrawings=true;
let ctxMenu=null;

function calcEMA(data,period){const k=2/(period+1),r=[];let p=data.slice(0,period).reduce((a,b)=>a+b,0)/period;for(let i=0;i<data.length;i++){if(i<period-1)r.push(null);else if(i===period-1)r.push(p);else{p=data[i]*k+p*(1-k);r.push(p)}}return r}

async function initTEChart(){
  const cv=$('teChart');if(!cv)return;
  await loadChartData();
  const closes=prices.map(d=>d.c);
  if(closes.length>=20)ema20=calcEMA(closes,20);
  if(closes.length>=50)ema50=calcEMA(closes,50);
  if(closes.length>=200)ema200=calcEMA(closes,200);
  cv.addEventListener('mousemove',onMM);
  cv.addEventListener('mouseleave',onML);
  cv.addEventListener('mousedown',onMD);
  cv.addEventListener('mouseup',onMU);
  cv.addEventListener('wheel',onWH);
  cv.addEventListener('contextmenu',onCM);
  $('chTb').addEventListener('click',onTB);
  document.addEventListener('keydown',onKD);
  document.addEventListener('click',e=>{if(ctxMenu&&!e.target.closest('.ctx-menu'))hideCtx()});
  window.addEventListener('resize',draw);
  draw();
}

async function loadChartData(){
  const sym=D.symbol,t=D.technical||{},ph=t.price_history||[];
  if(ph.length>10){for(let i=0;i<ph.length;i++){const c=ph[i],d=new Date();d.setDate(d.getDate()-(ph.length-i));const v=c*.015,o=c+(Math.random()-.5)*v,h=Math.max(o,c)+Math.random()*v*.5,l=Math.min(o,c)-Math.random()*v*.5;prices.push({date:d.toISOString().split('T')[0],o,h,l,c,v:Math.random()*1e6+1e5})}return}
  try{const r=await fetch(`${WORKER}/quote/${sym}.NS?range=6mo&interval=1d`);if(!r.ok)throw new Error();const j=await r.json();if(j.chart?.result?.[0]){const rs=j.chart.result[0],ts=rs.timestamp||[],q=rs.indicators?.quote?.[0]||{};for(let i=0;i<ts.length;i++){const dt=new Date(ts[i]*1000).toISOString().split('T')[0],o=q.open?.[i],h=q.high?.[i],l=q.low?.[i],c=q.close?.[i],v=q.volume?.[i];if(o&&h&&l&&c)prices.push({date:dt,o,h,l,c,v:v||0})}}}catch(e){console.log('Chart fetch fail')}
  if(!prices.length){let p=D.technical?.close||100;for(let i=0;i<200;i++){const d=new Date();d.setDate(d.getDate()-200+i);p=Math.max(5,p*(1+(Math.random()-.48)*.03));const v=p*.015,o=p+(Math.random()-.5)*v,h=Math.max(o,p)+Math.random()*v*.5,l=Math.min(o,p)-Math.random()*v*.5;prices.push({date:d.toISOString().split('T')[0],o,h,l,c:p,v:Math.random()*1e6+1e5})}}
}

function getLayout(){
  const cv=$('teChart');if(!cv||!prices.length)return null;
  const r=cv.parentElement?.getBoundingClientRect();
  const W=r?r.width:800,CH=480;
  const PAD={L:62,R:10,T:10,B:22},VH=72;
  const cH=CH-PAD.T-PAD.B-VH-8;
  const si=viewStart??Math.max(0,prices.length-viewCount);
  const vis=prices.slice(si,si+viewCount);
  if(!vis.length)return null;
  let aH=vis.map(d=>d.h),aL=vis.map(d=>d.l);
  for(let i=0;i<vis.length;i++){const g=si+i;if(showEMA.e20&&g<ema20.length&&ema20[g]){aH.push(ema20[g]);aL.push(ema20[g])}if(showEMA.e50&&g<ema50.length&&ema50[g]){aH.push(ema50[g]);aL.push(ema50[g])}if(showEMA.e200&&g<ema200.length&&ema200[g]){aH.push(ema200[g]);aL.push(ema200[g])}}
  drawings.filter(d=>d.type==='hline').forEach(d=>{aH.push(d.price);aL.push(d.price)});
  const pM=Math.max(...aH)*1.005,pm=Math.min(...aL)*.995,pR=pM-pm||1;
  const bW=(W-PAD.L-PAD.R)/viewCount;
  return{W,CH,PAD,VH,cH,bW,pM,pm,pR,si,vis,toY:p=>PAD.T+(1-(p-pm)/pR)*cH,toP:y=>pM-((y-PAD.T)/cH)*pR,toX:i=>PAD.L+i*bW+bW/2,toBi:x=>Math.round((x-PAD.L)/bW-.5)};
}

function draw(){
  const cv=$('teChart'),L=getLayout();if(!cv||!L)return;
  const c=cv.getContext('2d'),dp=devicePixelRatio||1;
  const{W,CH,PAD,VH,cH,bW,pM,pm,pR,si,vis,toY,toP,toX}=L;
  cv.width=W*dp;cv.height=CH*dp;cv.style.width=W+'px';cv.style.height=CH+'px';c.scale(dp,dp);
  c.fillStyle='#06080c';c.fillRect(0,0,W,CH);
  c.strokeStyle='rgba(0,255,136,.04)';c.lineWidth=.5;
  for(let i=0;i<=6;i++){const p=pm+pR*i/6,y=toY(p);c.beginPath();c.moveTo(PAD.L,y);c.lineTo(W-PAD.R,y);c.stroke();c.fillStyle='#334';c.font='10px "IBM Plex Mono",monospace';c.textAlign='right';c.fillText(p.toFixed(1),PAD.L-6,y+3)}
  c.fillStyle='#334';c.font='9px "IBM Plex Mono",monospace';c.textAlign='center';
  const ds=Math.max(1,Math.floor(viewCount/8));
  for(let i=0;i<vis.length;i+=ds){const x=toX(i),dt=vis[i].date||'';if(dt){const p=dt.split('-');c.fillText(p[2]+'/'+p[1],x,CH-4)}}
  const maxV=Math.max(...vis.map(d=>d.v))||1,vTop=PAD.T+cH+8;
  for(let i=0;i<vis.length;i++){const b=vis[i],x=toX(i);c.fillStyle=b.c>=b.o?'rgba(0,204,102,.25)':'rgba(238,51,68,.25)';c.fillRect(x-bW*.35,vTop+VH-(b.v/maxV)*VH,bW*.7,(b.v/maxV)*VH)}
  c.strokeStyle='rgba(0,255,136,.05)';c.lineWidth=.5;c.beginPath();c.moveTo(PAD.L,vTop-4);c.lineTo(W-PAD.R,vTop-4);c.stroke();
  const drawEMA=(ed,col)=>{c.strokeStyle=col;c.lineWidth=1.2;c.beginPath();let s=false;for(let i=0;i<vis.length;i++){const g=si+i;if(g>=ed.length||!ed[g])continue;const x=toX(i),y=toY(ed[g]);if(!s){c.moveTo(x,y);s=true}else c.lineTo(x,y)}c.stroke()};
  if(showEMA.e200&&ema200.length)drawEMA(ema200,'#ff6644');
  if(showEMA.e50&&ema50.length)drawEMA(ema50,'#ffaa00');
  if(showEMA.e20&&ema20.length)drawEMA(ema20,'#00bbff');
  for(let i=0;i<vis.length;i++){const b=vis[i],x=toX(i),bu=b.c>=b.o,col=bu?'#00cc66':'#ee3344';if(chartType==='candle'){c.strokeStyle=col;c.lineWidth=1;c.beginPath();c.moveTo(x,toY(b.h));c.lineTo(x,toY(b.l));c.stroke();const bT=toY(Math.max(b.o,b.c)),bB=toY(Math.min(b.o,b.c)),bw=Math.max(bW*.6,2);c.fillStyle=bu?col+'55':col;c.fillRect(x-bw/2,bT,bw,Math.max(bB-bT,1));c.strokeRect(x-bw/2,bT,bw,Math.max(bB-bT,1))}else if(chartType==='line'){if(i===0){c.beginPath();c.moveTo(x,toY(b.c))}else c.lineTo(x,toY(b.c));if(i===vis.length-1){c.strokeStyle='#00bbff';c.lineWidth=1.5;c.stroke()}}else{c.strokeStyle=col;c.lineWidth=1;c.beginPath();c.moveTo(x,toY(b.h));c.lineTo(x,toY(b.l));c.stroke();c.lineWidth=1.5;c.beginPath();c.moveTo(x,toY(b.c));c.lineTo(x+bW*.35,toY(b.c));c.stroke()}}
  c.fillStyle='#ddd';c.font='bold 13px Outfit,sans-serif';c.textAlign='left';c.fillText('NSE:'+D.symbol,PAD.L+4,PAD.T+16);
  const hb=hoverBar||vis[vis.length-1];
  if(hb){const iy=PAD.T+32,bc=hb.c>=hb.o?'#00cc66':'#ee3344';c.font='11px "IBM Plex Mono",monospace';c.fillStyle='#667';c.fillText('O',PAD.L+4,iy);c.fillStyle=bc;c.fillText(hb.o?.toFixed(2),PAD.L+18,iy);c.fillStyle='#667';c.fillText('H',PAD.L+80,iy);c.fillStyle=bc;c.fillText(hb.h?.toFixed(2),PAD.L+94,iy);c.fillStyle='#667';c.fillText('L',PAD.L+156,iy);c.fillStyle=bc;c.fillText(hb.l?.toFixed(2),PAD.L+168,iy);c.fillStyle='#667';c.fillText('C',PAD.L+230,iy);c.fillStyle=bc;c.fillText(hb.c?.toFixed(2),PAD.L+244,iy);c.fillStyle='#667';c.fillText('V',PAD.L+316,iy);c.fillStyle='#aaa';c.fillText(fmtV(hb.v||0),PAD.L+330,iy)}
  if(showEMA.e20&&ema20.length){c.fillStyle='#00bbff';c.font='10px "IBM Plex Mono",monospace';c.fillText('E20:'+ema20[si+vis.length-1]?.toFixed(1),PAD.L+4,PAD.T+48)}
  if(showEMA.e50&&ema50.length){c.fillStyle='#ffaa00';c.fillText('E50:'+ema50[si+vis.length-1]?.toFixed(1),PAD.L+120,PAD.T+48)}
  if(showEMA.e200&&ema200.length){c.fillStyle='#ff6644';c.fillText('E200:'+ema200[si+vis.length-1]?.toFixed(1),PAD.L+240,PAD.T+48)}
  if(showDrawings)drawings.forEach(d=>{if(d.type==='hline'){const y=toY(d.price);if(y<PAD.T-20||y>PAD.T+cH+20)return;c.strokeStyle=(d.color||'#ffaa00')+'88';c.lineWidth=1;c.setLineDash([6,4]);c.beginPath();c.moveTo(PAD.L,y);c.lineTo(W-PAD.R,y);c.stroke();c.setLineDash([]);c.fillStyle=(d.color||'#ffaa00')+'88';c.font='bold 8px "IBM Plex Mono",monospace';c.textAlign='left';c.fillText('LINE ₹'+d.price.toFixed(1),PAD.L+4,y-3)}else if(d.type==='trendline'||d.type==='ray'){const x1=toX(d.bi1-si),y1=toY(d.p1),x2=toX(d.bi2-si),y2=toY(d.p2);c.strokeStyle=(d.color||'#00c8ff')+'bb';c.lineWidth=1.5;c.beginPath();c.moveTo(x1,y1);if(d.type==='ray'){const dx=x2-x1,dy=y2-y1;c.lineTo(x2+dx*W*2,y2+dy*W*2)}else c.lineTo(x2,y2);c.stroke()}else if(d.type==='fib'){const lvs=[0,.236,.382,.5,.618,.786,1],rng=d.p1-d.p2;const cols=['#44455566','#ffaa0066','#00c8ff66','#00ff8866','#00c8ff66','#ffaa0066','#44455566'];lvs.forEach((lv,li)=>{const p=d.p2+rng*lv,y=toY(p);c.strokeStyle=cols[li];c.lineWidth=.7;c.setLineDash([4,3]);c.beginPath();c.moveTo(PAD.L,y);c.lineTo(W-PAD.R,y);c.stroke();c.setLineDash([]);c.fillStyle=cols[li].replace('66','aa');c.font='8px "IBM Plex Mono",monospace';c.textAlign='left';c.fillText(`${(lv*100).toFixed(1)}% ₹${p.toFixed(1)}`,PAD.L+4,y-2)})}else if(d.type==='rect'){const x1=toX(d.bi1-si),y1=toY(d.p1),x2=toX(d.bi2-si),y2=toY(d.p2);c.strokeStyle=(d.color||'#8844ff')+'88';c.lineWidth=1;c.strokeRect(Math.min(x1,x2),Math.min(y1,y2),Math.abs(x2-x1),Math.abs(y2-y1))}});
  if(crosshair){const{x:mx,y:my}=crosshair;if(mx>=PAD.L&&mx<=W-PAD.R){c.strokeStyle=drawMode?'rgba(255,255,255,.35)':'rgba(0,255,136,.4)';c.lineWidth=.5;c.setLineDash([3,3]);c.beginPath();c.moveTo(mx,PAD.T);c.lineTo(mx,CH-PAD.B);c.stroke();c.beginPath();c.moveTo(PAD.L,my);c.lineTo(W-PAD.R,my);c.stroke();c.setLineDash([]);if(my>=PAD.T&&my<=PAD.T+cH){const pr=toP(my);c.fillStyle='#0a1520';c.fillRect(0,my-9,PAD.L-2,18);c.strokeStyle='#00ff88';c.lineWidth=.5;c.strokeRect(0,my-9,PAD.L-2,18);c.fillStyle='#00ff88';c.font='bold 9px "IBM Plex Mono",monospace';c.textAlign='right';c.fillText(pr.toFixed(2),PAD.L-6,my+3)}}}
  if(drawMode){c.fillStyle='#0c1220bb';c.fillRect(W/2-55,PAD.T+2,110,16);c.fillStyle='#00ff88';c.font='bold 8px "IBM Plex Mono",monospace';c.textAlign='center';c.fillText('✏ '+drawMode.toUpperCase(),W/2,PAD.T+12)}
}

function onMM(e){const cv=$('teChart'),L=getLayout();if(!cv||!L)return;const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;crosshair={x:mx,y:my};const idx=L.toBi(mx);hoverBar=idx>=0&&idx<L.vis.length?L.vis[idx]:null;if(drawMode&&drawStart)drawPreview={x:mx,y:my,price:L.toP(my),bi:L.toBi(mx)+L.si};if(!drawMode&&isDrag&&dragX!=null){const bd=Math.round((e.clientX-dragX)/L.bW);if(Math.abs(bd)>=1){viewStart=Math.max(0,Math.min(prices.length-viewCount,(viewStart??Math.max(0,prices.length-viewCount))-bd));dragX=e.clientX}}draw()}
function onML(){crosshair=null;hoverBar=null;isDrag=false;if(!drawStart)drawPreview=null;draw()}
function onMD(e){if(e.button===2)return;const L=getLayout();if(!L)return;const cv=$('teChart'),r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,price=L.toP(my),bi=L.toBi(mx)+L.si;if(drawMode==='hline'){pushUndo();drawings.push({type:'hline',price,color:'#ffaa00'});drawMode=null;updTB()}else if((drawMode==='trendline'||drawMode==='ray'||drawMode==='fib'||drawMode==='rect'||drawMode==='measure')&&!drawStart){drawStart={sx:mx,sy:my,price,bi}}else if(drawStart){pushUndo();if(drawMode==='trendline')drawings.push({type:'trendline',bi1:drawStart.bi,p1:drawStart.price,bi2:bi,p2:price,color:'#00c8ff'});else if(drawMode==='ray')drawings.push({type:'ray',bi1:drawStart.bi,p1:drawStart.price,bi2:bi,p2:price,color:'#00c8ff'});else if(drawMode==='fib')drawings.push({type:'fib',p1:drawStart.price,p2:price,color:'#00c8ff'});else if(drawMode==='rect')drawings.push({type:'rect',bi1:drawStart.bi,p1:drawStart.price,bi2:bi,p2:price,color:'#8844ff'});drawStart=null;drawPreview=null;drawMode=null;updTB()}else if(!drawMode){isDrag=true;dragX=e.clientX}draw()}
function onMU(){isDrag=false;dragX=null}
function onWH(e){e.preventDefault();viewCount=Math.max(20,Math.min(500,viewCount+(e.deltaY>0?1:-1)*Math.max(3,Math.floor(viewCount*.1))));draw()}
function onCM(e){e.preventDefault();const L=getLayout();if(!L)return;const cv=$('teChart'),r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,price=L.toP(my);showCtx(e.clientX,e.clientY,price)}

function showCtx(x,y,price){hideCtx();const div=document.createElement('div');div.className='ctx-menu';div.id='ctxMenu';div.innerHTML=`<div class="ctx-header"><span style="font-family:var(--font-mono);font-size:11px;font-weight:800;color:var(--accent)">₹${price.toFixed(2)}</span></div><button class="ctx-item" onclick="ctxAct('hline',${price})"><span style="width:14px;text-align:center">─</span>H-Line ₹${price.toFixed(1)}</button><div class="ctx-sep"></div><button class="ctx-item" style="color:var(--accent)" onclick="ctxAct('buy',${price})"><span style="width:14px;text-align:center">🟢</span>BUY</button><button class="ctx-item" style="color:var(--red)" onclick="ctxAct('sell',${price})"><span style="width:14px;text-align:center">🔴</span>SELL</button>`;div.style.left=Math.min(x,innerWidth-200)+'px';div.style.top=Math.min(y,innerHeight-200)+'px';document.body.appendChild(div);ctxMenu=div}
function hideCtx(){if(ctxMenu){ctxMenu.remove();ctxMenu=null}}
window.ctxAct=(action,price)=>{hideCtx();if(action==='hline'){pushUndo();drawings.push({type:'hline',price,color:'#ffaa00'});draw()}else if(action==='buy'||action==='sell'){alert(`${action.toUpperCase()} ${D.symbol} @ ₹${price.toFixed(2)}\n\nConnect to broker for live orders.`)}}

function onTB(e){const btn=e.target.closest('button');if(!btn)return;if(btn.dataset.ct){chartType=btn.dataset.ct;$('chTb').querySelectorAll('[data-ct]').forEach(b=>b.classList.toggle('active',b.dataset.ct===chartType));draw();return}if(btn.dataset.dm){drawMode=drawMode===btn.dataset.dm?null:btn.dataset.dm;drawStart=null;drawPreview=null;updTB();draw();return}if(btn.id==='e20Btn'){showEMA.e20=!showEMA.e20;btn.style.background=showEMA.e20?'rgba(0,187,255,.1)':'transparent';draw();return}if(btn.id==='e50Btn'){showEMA.e50=!showEMA.e50;btn.style.background=showEMA.e50?'rgba(255,170,0,.1)':'transparent';draw();return}if(btn.id==='e200Btn'){showEMA.e200=!showEMA.e200;btn.style.background=showEMA.e200?'rgba(255,102,68,.1)':'transparent';draw();return}if(btn.id==='undoBtn'){undo();return}if(btn.id==='redoBtn'){redo();return}if(btn.id==='clearBtn'){if(drawings.length&&confirm('Clear all drawings?')){pushUndo();drawings=[];draw()}return}if(btn.id==='visBtn'){showDrawings=!showDrawings;btn.classList.toggle('active',showDrawings);draw();return}}
function updTB(){$('chTb').querySelectorAll('[data-dm]').forEach(b=>b.classList.toggle('active',b.dataset.dm===drawMode))}
function pushUndo(){undoStack.push([...drawings]);redoStack=[]}
function undo(){if(!undoStack.length)return;redoStack.push([...drawings]);drawings=undoStack.pop();draw()}
function redo(){if(!redoStack.length)return;undoStack.push([...drawings]);drawings=redoStack.pop();draw()}
function onKD(e){if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;const k=e.key.toLowerCase();if(k==='escape'){drawMode=null;drawStart=null;drawPreview=null;hideCtx();updTB();draw()}else if(k==='h'){drawMode=drawMode==='hline'?null:'hline';updTB();draw()}else if(k==='t'){drawMode=drawMode==='trendline'?null:'trendline';updTB();draw()}else if(k==='r'){drawMode=drawMode==='ray'?null:'ray';updTB();draw()}else if(k==='f'){drawMode=drawMode==='fib'?null:'fib';updTB();draw()}else if(k==='b'){drawMode=drawMode==='rect'?null:'rect';updTB();draw()}else if(k==='m'){drawMode=drawMode==='measure'?null:'measure';updTB();draw()}else if(k==='v'){showDrawings=!showDrawings;$('visBtn')?.classList.toggle('active',showDrawings);draw()}else if(e.ctrlKey&&k==='z'){e.preventDefault();undo()}else if(e.ctrlKey&&k==='y'){e.preventDefault();redo()}}

// ═══ DATA CARDS ═══
function rOneil(){const o=D.oneil||{},g=o.master_score||'-',eps=o.eps_strength||0,pr=o.price_strength||0,dem=o.buyer_demand_score||50,grp=o.group_rank||50;return`<div class="card"><div class="card-hd"><span class="card-tt">📊 O'NEIL RATING</span><span class="card-bg">Composite: ${o.composite_score||0}</span></div><div class="onl-w"><div class="m-gr ${g}"><span class="g">${g}</span><span class="lb">MASTER</span></div><div class="onl-mt">${metBar('EPS Strength',eps)}${metBar('Price Strength',pr)}${metBar('Buyer Demand',dem)}${metBar('Group Rank',grp)}</div></div></div>`}
function metBar(lb,v){const c=v>=80?'grn':v>=60?'cyn':v>=40?'amb':'red';return`<div class="met-r"><span class="met-lb">${lb}</span><div class="met-bar"><div class="met-fl ${c}" style="width:${v}%"></div></div><span class="met-vl">${v}</span></div>`}
function rGuru(){const rs=D.guru_ratings||[],ic={canslim:'📈',value:'💎',quality:'🏰',growth:'🌱','wall street':'📊'};return`<div class="card"><div class="card-hd"><span class="card-tt">🎓 GURU RATINGS</span></div><div class="guru-ls">${rs.map(g=>{const p=g.score_pct||0,b=p>=70?'pass':p>=50?'fair':'fail',i=Object.entries(ic).find(([k])=>g.strategy?.toLowerCase().includes(k))?.[1]||'📊';return`<div class="guru-r"><span class="guru-ic">${i}</span><div class="guru-nf"><div class="guru-nm">${g.guru||'Unknown'}</div><div class="guru-st">${g.strategy||'-'}</div></div><span class="guru-sc">${p}%</span><span class="guru-bd ${b}">${g.score||b.toUpperCase()}</span></div>`}).join('')}</div></div>`}
function rSurv(){const s=D.surveillance||{},fs=s.flags||[],rc=s.red_flag_count||0,sc=rc===0?'safe':rc<=2?'caution':'danger',st=rc===0?'✓ No Red Flags':`⚠ ${rc} Flag${rc>1?'s':''} Raised`;return`<div class="card"><div class="card-hd"><span class="card-tt">🛡️ SURVEILLANCE CHECK</span></div><div class="surv-st ${sc}">${st}</div><div class="chk-ls">${fs.map(f=>`<div class="chk-r"><div class="chk-ic ${f.flagged?'fail':'pass'}">${f.flagged?'✗':'✓'}</div><div class="chk-tx"><div class="chk-nm">${f.name}</div><div class="chk-dt">${f.detail||f.description||''}</div></div></div>`).join('')}</div></div>`}
function rFund(){const f=D.fundamentals||{},its=[{lb:'Market Cap',v:`₹${fmtCr(f.market_cap_cr)}Cr`},{lb:'P/E Ratio',v:fmt(f.pe_ratio,1)},{lb:'P/B Ratio',v:fmt(f.pb_ratio,2)},{lb:'ROE',v:f.roe?`${fmt(f.roe,1)}%`:'—'},{lb:'Debt/Equity',v:`${fmt(f.debt_to_equity,1)}%`},{lb:'Div Yield',v:f.dividend_yield?`${fmt(f.dividend_yield,2)}%`:'—'},{lb:'EPS',v:`₹${fmt(f.eps,2)}`},{lb:'Book Value',v:`₹${fmt(f.book_value,2)}`},{lb:'Rev Growth',v:f.revenue_growth?`${fmt(f.revenue_growth,1)}%`:'—'}];return`<div class="card"><div class="card-hd"><span class="card-tt">💰 FUNDAMENTALS</span><span class="card-bg">${f.mcap_category||'—'}</span></div><div class="fund-gr">${its.map(i=>`<div class="fund-it"><div class="fund-vl">${i.v}</div><div class="fund-lb">${i.lb}</div></div>`).join('')}</div></div>`}
function rRet(){const t=D.technical||{},r=t.returns||D.returns||{},its=[{lb:'1D',v:r['1d']||0},{lb:'1W',v:r['1w']||0},{lb:'1M',v:r['1m']||0},{lb:'3M',v:r['3m']||0},{lb:'6M',v:r['6m']||0}];return`<div class="card"><div class="card-hd"><span class="card-tt">📈 RETURNS</span></div><div class="ret-r">${its.map(i=>`<div class="ret-it"><div class="ret-vl ${i.v>=0?'up':'dn'}">${i.v>=0?'+':''}${fmt(i.v,1)}%</div><div class="ret-lb">${i.lb}</div></div>`).join('')}</div></div>`}
function rOwn(){const h=D.fund_holdings||{},pr=h.promoter_pct||0,ins=h.institutional_pct||0,pu=Math.max(0,100-pr-ins);return`<div class="card"><div class="card-hd"><span class="card-tt">👥 OWNERSHIP</span></div><div class="own-bs"><div class="own-r"><span class="own-lb">Promoter</span><div class="own-bar"><div class="own-fl prm" style="width:${pr}%">${fmt(pr,1)}%</div></div></div><div class="own-r"><span class="own-lb">Institutional</span><div class="own-bar"><div class="own-fl ins" style="width:${ins}%">${fmt(ins,1)}%</div></div></div><div class="own-r"><span class="own-lb">Public</span><div class="own-bar"><div class="own-fl pub" style="width:${pu}%">${fmt(pu,1)}%</div></div></div></div></div>`}

function fmt(n,d=2){if(n==null||isNaN(n))return'—';return Number(n).toLocaleString('en-IN',{minimumFractionDigits:d,maximumFractionDigits:d})}
function fmtCr(n){if(n==null||isNaN(n))return'—';if(n>=1e5)return(n/1e5).toFixed(1)+'L';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n.toFixed(0)}
function fmtV(n){if(n==null||isNaN(n))return'—';if(n>=1e7)return(n/1e7).toFixed(2)+'Cr';if(n>=1e5)return(n/1e5).toFixed(2)+'L';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n.toString()}

init();
</script>
