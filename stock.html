<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stock Drilldown | TradEdge</title>
<link rel="icon" type="image/jpeg" href="assets/logo.jpeg">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#06080c;--bg2:#0a0e14;--bg3:#0d1117;--bg4:#141a22;--border:rgba(0,255,136,.08);--accent:#00ff88;--accent2:#00c8ff;--accent3:#8b5cf6;--red:#ef4444;--amber:#f59e0b;--green:#22c55e;--t1:#f1f5f9;--t2:#cbd5e1;--t3:#94a3b8;--t4:#64748b;--mono:'IBM Plex Mono',monospace;--sans:'Outfit',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.hdr{background:rgba(10,14,20,.95);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.back{padding:7px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--t3);text-decoration:none;font-size:12px}
.back:hover{color:var(--accent);border-color:var(--accent)}
.stk-sym{font-size:24px;font-weight:800;font-family:var(--mono);color:var(--accent);margin-left:16px}
.stk-nm{font-size:13px;color:var(--t3);margin-left:12px}
.badge{font-size:9px;padding:3px 7px;border-radius:4px;font-weight:700;margin-left:8px}
.badge.fno{background:rgba(139,92,246,.15);color:#a78bfa}
.badge.sec{background:var(--bg4);color:var(--t4)}
.srch{width:220px;padding:9px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--t1);font-family:var(--mono);font-size:12px}
.srch:focus{outline:none;border-color:var(--accent);width:280px}
.srch-dd{position:absolute;top:100%;right:0;width:320px;margin-top:4px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;max-height:320px;overflow-y:auto;display:none;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.srch-dd.on{display:block}
.srch-it{display:flex;justify-content:space-between;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border)}
.srch-it:hover{background:var(--bg4)}

.main{max-width:1400px;margin:0 auto;padding:20px}
.sec{margin-bottom:20px}
.sec-t{font-size:12px;font-weight:700;color:var(--t3);letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-t::before{content:'';width:4px;height:16px;background:var(--accent);border-radius:2px}

.card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-h{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(0,0,0,.2);border-bottom:1px solid var(--border)}
.card-t{font-size:11px;font-weight:700;color:var(--t2);letter-spacing:.5px}
.card-b{padding:16px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}

/* Hero */
.hero{display:flex;gap:24px;padding:20px;background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid var(--border);border-radius:14px;margin-bottom:20px;flex-wrap:wrap}
.hero-price{font-size:36px;font-weight:800;font-family:var(--mono)}
.hero-chg{display:inline-flex;align-items:center;gap:5px;font-size:14px;font-weight:700;padding:5px 10px;border-radius:6px;margin-left:12px}
.hero-chg.up{background:rgba(34,197,94,.12);color:var(--green)}
.hero-chg.dn{background:rgba(239,68,68,.12);color:var(--red)}
.hero-meta{display:flex;gap:20px;margin-top:14px;flex-wrap:wrap}
.hm-l{font-size:9px;color:var(--t4);text-transform:uppercase}
.hm-v{font-size:14px;font-weight:600;font-family:var(--mono);margin-top:2px}
.hm-v.up{color:var(--green)}
.hm-v.dn{color:var(--red)}
.hero-right{display:flex;gap:10px;margin-left:auto}
.qlink{padding:9px 14px;background:var(--bg4);border:1px solid var(--border);border-radius:7px;color:var(--t3);text-decoration:none;font-size:11px;font-weight:600}
.qlink:hover{border-color:var(--accent);color:var(--accent)}

/* Fresh Badge */
.fresh-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;margin-bottom:12px}
.fresh-badge.fresh{background:rgba(34,197,94,.12);color:var(--green)}
.fresh-badge.stale{background:rgba(100,100,120,.12);color:var(--t4)}

/* Quality Score */
.qs-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.qs-grade{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800}
.qs-grade.A{background:rgba(34,197,94,.2);color:var(--green)}
.qs-grade.B{background:rgba(0,200,255,.2);color:var(--accent2)}
.qs-grade.C{background:rgba(245,158,11,.2);color:var(--amber)}
.qs-grade.D,.qs-grade.F{background:rgba(239,68,68,.2);color:var(--red)}
.qs-score{font-size:14px;font-weight:600;color:var(--t2)}
.qs-bars{display:flex;flex-direction:column;gap:8px}
.qs-row{display:flex;align-items:center;gap:10px}
.qs-label{width:80px;font-size:10px;color:var(--t4)}
.qs-bar{flex:1;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden}
.qs-fill{height:100%;border-radius:4px}
.qs-val{width:40px;font-size:10px;font-family:var(--mono);color:var(--t3);text-align:right}

/* Key Levels */
.kl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.kl-box{padding:12px;background:var(--bg2);border-radius:8px;border-left:3px solid var(--accent2)}
.kl-box.res{border-left-color:var(--red)}
.kl-box.sup{border-left-color:var(--green)}
.kl-title{font-size:9px;color:var(--t4);margin-bottom:4px}
.kl-val{font-size:14px;font-weight:700;font-family:var(--mono)}
.kl-desc{font-size:9px;color:var(--t3);margin-top:2px}

/* Risk */
.risk-box{padding:12px;background:var(--bg2);border-radius:8px;margin-top:12px}
.risk-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.risk-row:last-child{margin-bottom:0}
.risk-icon{font-size:14px}
.risk-label{font-size:10px;color:var(--t4);width:80px}
.risk-val{font-size:11px;color:var(--t2);flex:1}
.risk-val.fresh{color:var(--green)}

/* Metrics */
.met-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.met-box{padding:14px;background:var(--bg2);border-radius:8px;text-align:center}
.met-v{font-size:18px;font-weight:700;font-family:var(--mono)}
.met-l{font-size:9px;color:var(--t4);margin-top:3px}

/* Shareholding */
.shp-wrap{display:flex;gap:20px;flex-wrap:wrap}
.shp-donut{position:relative;width:160px;height:160px;flex-shrink:0}
.shp-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;font-size:20px}
.shp-list{flex:1;min-width:200px}
.shp-row{display:flex;align-items:center;padding:10px 12px;background:var(--bg2);border-radius:6px;margin-bottom:6px}
.shp-dot{width:10px;height:10px;border-radius:50%;margin-right:10px}
.shp-name{flex:1;font-size:11px;color:var(--t2)}
.shp-pct{font-family:var(--mono);font-size:12px;font-weight:600;margin-right:10px}
.shp-chg{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;min-width:50px;text-align:center}
.shp-chg.up{background:rgba(34,197,94,.12);color:var(--green)}
.shp-chg.dn{background:rgba(239,68,68,.12);color:var(--red)}
.shp-chg.flat{background:var(--bg4);color:var(--t4)}

/* Table */
.fin-tbl{width:100%;border-collapse:collapse}
.fin-tbl th{padding:8px 10px;text-align:right;font-size:9px;color:var(--t4);font-weight:700;border-bottom:2px solid var(--border)}
.fin-tbl th:first-child{text-align:left}
.fin-tbl td{padding:8px 10px;font-family:var(--mono);font-size:11px;text-align:right;border-bottom:1px solid var(--border)}
.fin-tbl td:first-child{text-align:left;font-family:var(--sans);font-weight:600;color:var(--t2)}
.fin-tbl .up{color:var(--green)}
.fin-tbl .dn{color:var(--red)}

/* Surveillance */
.surv-st{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;margin-bottom:14px}
.surv-st.safe{background:rgba(34,197,94,.12);color:var(--green)}
.surv-st.danger{background:rgba(239,68,68,.12);color:var(--red)}
.surv-st.caution{background:rgba(245,158,11,.12);color:var(--amber)}
.surv-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.surv-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border-radius:6px;border-left:3px solid var(--green)}
.surv-item.fail{border-left-color:var(--red)}
.surv-icon{font-size:12px}
.surv-text{font-size:10px;color:var(--t2)}

/* Chart */
.chart-tb{display:flex;align-items:center;gap:6px;padding:8px 12px;background:rgba(0,0,0,.2);border-bottom:1px solid var(--border);flex-wrap:wrap}
.tb-grp{display:flex;gap:2px;background:var(--bg);border-radius:4px;padding:2px}
.tb-btn{padding:5px 10px;border:none;border-radius:3px;font-size:9px;font-weight:600;font-family:var(--mono);cursor:pointer;background:transparent;color:var(--t4)}
.tb-btn:hover{color:var(--t2)}
.tb-btn.active{background:rgba(0,255,136,.1);color:var(--accent)}
.ema-btn{padding:3px 6px;border-radius:3px;font-size:8px;font-weight:700;font-family:var(--mono);cursor:pointer;border:1px solid;background:transparent}
.chart-ft{padding:5px 12px;background:rgba(0,0,0,.2);font-size:8px;font-family:var(--mono);color:var(--t4);display:flex;justify-content:space-between}

/* AI */
.ai-card{background:linear-gradient(135deg,rgba(139,92,246,.08),rgba(6,182,212,.05));border:1px solid rgba(139,92,246,.2)}
.ai-h{background:linear-gradient(90deg,rgba(139,92,246,.1),transparent)}
.ai-body{padding:18px}
.ai-content{font-size:12px;line-height:1.7;color:var(--t2)}
.ai-content strong{color:var(--t1)}
.ai-loading{text-align:center;padding:30px;color:var(--t4)}
.ai-ft{margin-top:14px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.ai-powered{font-size:9px;color:var(--t4)}
.ai-refresh{padding:5px 10px;background:var(--bg4);border:1px solid var(--border);border-radius:5px;color:var(--t3);font-size:9px;cursor:pointer}

.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;color:var(--t4)}
.error{color:var(--red);padding:20px;text-align:center}
</style>
</head>
<body>
<header class="hdr">
  <div style="display:flex;align-items:center">
    <a href="scanner.html" class="back">← Scanner</a>
    <span class="stk-sym" id="sym">—</span>
    <span class="stk-nm" id="nm">Loading...</span>
    <span id="badges"></span>
  </div>
  <div style="position:relative">
    <input type="text" class="srch" id="srch" placeholder="Search stock..." autocomplete="off">
    <div class="srch-dd" id="srchDD"></div>
  </div>
</header>

<main class="main" id="main">
  <div class="loading" id="ld"><div class="spinner"></div>Loading stock data...</div>
</main>

<script>
const TV = '8RFOgQZr';
const WK = 'https://spring-fire-41a0.drrgware.workers.dev';
const GROQ = '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';
const COL = {promo:'#8b5cf6', fii:'#22c55e', dii:'#f59e0b', pub:'#3b82f6'};

let D = null;
let F = null;
let allS = [];

function $(id) { return document.getElementById(id); }
function go(s) { location.href = 'stock.html?s=' + s; }

// Safe value access
function sv(obj, path, def) {
  if (!obj) return def;
  const parts = path.split('.');
  let val = obj;
  for (const p of parts) {
    if (val == null) return def;
    val = val[p];
  }
  return val != null ? val : def;
}

function fmt(n, d) {
  if (n == null || isNaN(n)) return '—';
  d = d || 2;
  return Number(n).toLocaleString('en-IN', {minimumFractionDigits: d, maximumFractionDigits: d});
}

function fmtCr(n) {
  if (n == null || isNaN(n)) return '—';
  if (n >= 100000) return (n/100000).toFixed(2) + 'L';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return n.toFixed(0);
}

function fmtV(n) {
  if (n == null || isNaN(n)) return '—';
  if (n >= 10000000) return (n/10000000).toFixed(2) + 'Cr';
  if (n >= 100000) return (n/100000).toFixed(2) + 'L';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return String(n);
}

function fmtP(n) {
  if (n == null || isNaN(n)) return '—';
  return (n >= 0 ? '+' : '') + n.toFixed(1) + '%';
}

async function init() {
  const s = new URLSearchParams(location.search).get('s');
  await loadSyms();
  setupSrch();
  
  if (!s) {
    empty();
    return;
  }
  
  $('sym').textContent = s;
  document.title = s + ' | TradEdge';
  
  try {
    const r = await fetch('data/stock_details/' + s + '.json');
    if (r.ok) {
      D = await r.json();
      D.symbol = D.symbol || s;
    } else {
      throw new Error('Not found');
    }
  } catch (e) {
    console.log('Creating demo data for', s);
    D = {
      symbol: s,
      name: s,
      sector: 'Unknown',
      technical: {close: 100, change_pct: 0, high_52w: 120, low_52w: 80},
      fundamentals: {market_cap_cr: 10000, pe_ratio: 20},
      fund_holdings: {promoter_pct: 50, institutional_pct: 30},
      volume: {ratio: 1, latest: 100000},
      breakout: {high_52w: 120, low_52w: 80},
      surveillance: {flags: [], red_flag_count: 0}
    };
  }
  
  render();
  fetchFund(s);
  genAI(s);
}

async function loadSyms() {
  try {
    const r = await fetch('data/scanner_results.json');
    if (r.ok) {
      const d = await r.json();
      allS = (d.all_stocks || []).map(x => ({s: x.symbol, n: x.name || x.symbol}));
    }
  } catch (e) {}
}

function setupSrch() {
  const i = $('srch');
  const dd = $('srchDD');
  if (!i || !dd) return;
  
  let idx = -1;
  i.oninput = function() {
    const q = i.value.trim().toUpperCase();
    if (!q) { dd.classList.remove('on'); return; }
    const m = allS.filter(x => x.s.includes(q) || x.n.toUpperCase().includes(q)).slice(0, 10);
    dd.innerHTML = m.length 
      ? m.map(x => '<div class="srch-it" data-s="' + x.s + '"><span style="font-family:var(--mono);color:var(--accent)">' + x.s + '</span><span style="font-size:10px;color:var(--t4)">' + x.n + '</span></div>').join('')
      : '<div style="padding:12px;color:var(--t4);text-align:center">No matches</div>';
    dd.classList.add('on');
    idx = -1;
  };
  
  dd.onclick = function(e) {
    const t = e.target.closest('[data-s]');
    if (t) go(t.dataset.s);
  };
  
  document.onclick = function(e) {
    if (!e.target.closest('.srch') && !e.target.closest('.srch-dd')) {
      dd.classList.remove('on');
    }
  };
}

function empty() {
  $('sym').textContent = 'Select Stock';
  $('sym').style.color = 'var(--t4)';
  $('nm').textContent = '';
  $('ld').innerHTML = '<div style="font-size:48px;margin-bottom:20px">🔍</div><div style="font-size:18px;font-weight:600;margin-bottom:8px">Search for a stock</div><div style="font-size:12px;color:var(--t4);margin-bottom:24px">Type symbol or company name above</div><div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">' + ['RELIANCE','TCS','HDFCBANK','ASHOKLEY','INFY'].map(x => '<button onclick="go(\'' + x + '\')" style="padding:10px 16px;background:var(--bg4);border:1px solid var(--border);border-radius:6px;color:var(--accent);font-family:var(--mono);font-size:12px;cursor:pointer">' + x + '</button>').join('') + '</div>';
}

function render() {
  console.log('Rendering with data:', D);
  
  const ld = $('ld');
  const main = $('main');
  if (ld) ld.style.display = 'none';
  if (!main) return;
  
  // Update header
  $('nm').textContent = sv(D, 'name', D.symbol);
  const mcap = sv(D, 'fundamentals.market_cap_cr', 0);
  const fno = mcap > 5000;
  const sector = sv(D, 'sector', '—');
  $('badges').innerHTML = (fno ? '<span class="badge fno">F&O</span>' : '') + '<span class="badge sec">' + sector + '</span>';
  
  // Build page
  let html = '';
  html += renderHero();
  html += '<div class="grid2 sec"><div>' + renderAI() + '</div><div>' + renderQuality() + '</div></div>';
  html += renderMetrics();
  html += '<div class="grid2 sec"><div>' + renderSHP() + '</div><div>' + renderMF() + '</div></div>';
  html += renderFin();
  html += '<div class="grid2 sec"><div>' + renderInsider() + '</div><div>' + renderSurv() + '</div></div>';
  html += renderChart();
  
  main.innerHTML = html;
  
  // Initialize components
  setTimeout(function() {
    drawDonut();
    initChart();
  }, 100);
}

function renderHero() {
  const price = sv(D, 'technical.close', 0) || sv(D, 'price', 0);
  const chg = sv(D, 'technical.change_pct', 0);
  const up = chg >= 0;
  const h52 = sv(D, 'breakout.high_52w', 0) || sv(D, 'technical.high_52w', 0);
  const l52 = sv(D, 'breakout.low_52w', 0) || sv(D, 'technical.low_52w', 0);
  const vol = sv(D, 'volume.latest', 0) || sv(D, 'technical.volume', 0);
  const volR = sv(D, 'volume.ratio', 1);
  const ret1m = sv(D, 'technical.returns.1m', 0);
  const ret3m = sv(D, 'technical.returns.3m', 0);
  const fresh = volR >= 1.5;
  
  return '<div class="hero">' +
    '<div style="flex:1">' +
      '<div class="fresh-badge ' + (fresh ? 'fresh' : 'stale') + '">' + (fresh ? '🟢 Fresh — Active volume' : '⚪ Monitoring') + '</div>' +
      '<div><span class="hero-price">₹' + fmt(price) + '</span><span class="hero-chg ' + (up ? 'up' : 'dn') + '">' + (up ? '▲' : '▼') + ' ' + Math.abs(chg).toFixed(2) + '%</span></div>' +
      '<div class="hero-meta">' +
        '<div><div class="hm-l">52W High</div><div class="hm-v">₹' + fmt(h52) + '</div></div>' +
        '<div><div class="hm-l">52W Low</div><div class="hm-v">₹' + fmt(l52) + '</div></div>' +
        '<div><div class="hm-l">Volume</div><div class="hm-v">' + fmtV(vol) + '</div></div>' +
        '<div><div class="hm-l">Vol Ratio</div><div class="hm-v" style="color:' + (volR >= 1.5 ? 'var(--green)' : 'var(--t2)') + '">' + fmt(volR, 2) + 'x</div></div>' +
        '<div><div class="hm-l">1M</div><div class="hm-v ' + (ret1m >= 0 ? 'up' : 'dn') + '">' + fmtP(ret1m) + '</div></div>' +
        '<div><div class="hm-l">3M</div><div class="hm-v ' + (ret3m >= 0 ? 'up' : 'dn') + '">' + fmtP(ret3m) + '</div></div>' +
      '</div>' +
    '</div>' +
    '<div class="hero-right">' +
      '<a href="https://in.tradingview.com/chart/' + TV + '/?symbol=NSE:' + D.symbol + '" target="_blank" class="qlink">📊 TV</a>' +
      '<a href="https://zone.definedge.com/chart/NSE/' + D.symbol + '/pf" target="_blank" class="qlink">📈 P&F</a>' +
      '<a href="https://www.screener.in/company/' + D.symbol + '/" target="_blank" class="qlink">📋 Screener</a>' +
    '</div>' +
  '</div>';
}

function renderAI() {
  return '<div class="sec-t">AI Intelligence Summary</div>' +
    '<div class="card ai-card">' +
      '<div class="card-h ai-h"><span class="card-t" style="color:var(--accent3)">🤖 AI ANALYSIS</span><span style="font-size:9px;color:var(--t4)">Powered by Groq</span></div>' +
      '<div class="ai-body" id="aiC"><div class="ai-loading"><div class="spinner"></div>Generating analysis...</div></div>' +
    '</div>';
}

function renderQuality() {
  const chgPct = sv(D, 'technical.change_pct', 0);
  const volR = sv(D, 'volume.ratio', 1);

function drawDonut() {
  const c = $('shpC');
  if (!c) return;
  const ctx = c.getContext('2d');
  const h = D.fund_holdings || {};
  
  const promo = h.promoter_pct || 50;
  const inst = h.fii_pct || h.institutional_pct || 30;
  const dii = h.dii_pct || 0;
  const pub = Math.max(0, 100 - promo - inst - dii);
  
  const data = [
    {p: promo, c: COL.promo},
    {p: inst, c: COL.fii},
    {p: dii, c: COL.dii},
    {p: pub, c: COL.pub}
  ].filter(function(x) { return x.p > 0; });
  
  let start = -Math.PI / 2;
  data.forEach(function(x) {
    const angle = (x.p / 100) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(80, 80);
    ctx.arc(80, 80, 70, start, start + angle);
    ctx.fillStyle = x.c;
    ctx.fill();
    start += angle;
  });
  
  ctx.beginPath();
  ctx.arc(80, 80, 40, 0, Math.PI * 2);
  ctx.fillStyle = '#0d1117';
  ctx.fill();
}

let prices = [];
let ema20 = [], ema50 = [], ema200 = [];
let showEMA = {e20: true, e50: true, e200: true};
let chartType = 'hlc';
let viewStart = null;
let viewCount = 120;
let isDrag = false;
let dragX = 0;

function initChart() {
  loadPrices().then(function() {
    const closes = prices.map(function(x) { return x.c; });
    if (closes.length >= 20) ema20 = calcEMA(closes, 20);
    if (closes.length >= 50) ema50 = calcEMA(closes, 50);
    if (closes.length >= 200) ema200 = calcEMA(closes, 200);
    
    const cv = $('chart');
    if (!cv) return;
    
    cv.onmousemove = onMM;
    cv.onmousedown = function(e) { isDrag = true; dragX = e.clientX; };
    cv.onmouseup = function() { isDrag = false; };
    cv.onwheel = onWH;
    
    document.querySelectorAll('[data-ct]').forEach(function(b) {
      b.onclick = function() {
        chartType = b.dataset.ct;
        document.querySelectorAll('[data-ct]').forEach(function(x) {
          x.classList.toggle('active', x.dataset.ct === chartType);
        });
        draw();
      };
    });
    
    ['e20', 'e50', 'e200'].forEach(function(k) {
      const b = $(k);
      if (b) {
        b.onclick = function() {
          showEMA[k] = !showEMA[k];
          b.style.opacity = showEMA[k] ? 1 : 0.4;
          draw();
        };
      }
    });
    
    draw();
  });
}

async function loadPrices() {
  try {
    const r = await fetch(WK + '/quote/' + D.symbol + '.NS?range=6mo&interval=1d');
    if (r.ok) {
      const j = await r.json();
      if (j.chart && j.chart.result && j.chart.result[0]) {
        const rs = j.chart.result[0];
        const ts = rs.timestamp || [];
        const q = (rs.indicators && rs.indicators.quote && rs.indicators.quote[0]) || {};
        for (let i = 0; i < ts.length; i++) {
          const o = q.open && q.open[i];
          const h = q.high && q.high[i];
          const l = q.low && q.low[i];
          const c = q.close && q.close[i];
          const v = q.volume && q.volume[i];
          if (o && h && l && c && !isNaN(o)) {
            prices.push({d: new Date(ts[i] * 1000).toISOString().split('T')[0], o: o, h: h, l: l, c: c, v: v || 0});
          }
        }
        if (prices.length > 20) return;
      }
    }
  } catch (e) {
    console.log('Chart data fetch error:', e);
  }
  
  // Generate demo data
  let p = sv(D, 'technical.close', 100);
  for (let i = 0; i < 200; i++) {
    const d = new Date();
    d.setDate(d.getDate() - 200 + i);
    p = Math.max(5, p * (1 + (Math.random() - 0.48) * 0.025));
    const rg = p * 0.012;
    const o = p * (1 + (Math.random() - 0.5) * 0.008);
    prices.push({
      d: d.toISOString().split('T')[0],
      o: o,
      h: Math.max(o, p) + Math.random() * rg * 0.3,
      l: Math.min(o, p) - Math.random() * rg * 0.3,
      c: p,
      v: Math.random() * 500000 + 100000
    });
  }
}

function calcEMA(data, n) {
  const k = 2 / (n + 1);
  const r = [];
  let p = 0;
  for (let i = 0; i < n && i < data.length; i++) p += data[i];
  p = p / n;
  
  for (let i = 0; i < data.length; i++) {
    if (i < n - 1) r.push(null);
    else if (i === n - 1) r.push(p);
    else {
      p = data[i] * k + p * (1 - k);
      r.push(p);
    }
  }
  return r;
}

function draw() {
  const cv = $('chart');
  if (!cv || prices.length === 0) return;
  
  const ctx = cv.getContext('2d');
  const dp = window.devicePixelRatio || 1;
  const rect = cv.parentElement ? cv.parentElement.getBoundingClientRect() : {width: 800};
  const W = rect.width - 2;
  const H = 340;
  const PAD = {L: 55, R: 8, T: 25, B: 18};
  const VH = 50;
  const cH = H - PAD.T - PAD.B - VH - 6;
  
  cv.width = W * dp;
  cv.height = H * dp;
  cv.style.width = W + 'px';
  cv.style.height = H + 'px';
  ctx.scale(dp, dp);
  
  const si = viewStart != null ? viewStart : Math.max(0, prices.length - viewCount);
  const vis = prices.slice(si, si + viewCount);
  if (vis.length === 0) return;
  
  // Calculate price range
  let aH = vis.map(function(x) { return x.h; });
  let aL = vis.map(function(x) { return x.l; });
  
  for (let i = 0; i < vis.length; i++) {
    const g = si + i;
    if (showEMA.e20 && g < ema20.length && ema20[g]) { aH.push(ema20[g]); aL.push(ema20[g]); }
    if (showEMA.e50 && g < ema50.length && ema50[g]) { aH.push(ema50[g]); aL.push(ema50[g]); }
    if (showEMA.e200 && g < ema200.length && ema200[g]) { aH.push(ema200[g]); aL.push(ema200[g]); }
  }
  
  const pM = Math.max.apply(null, aH) * 1.005;
  const pm = Math.min.apply(null, aL) * 0.995;
  const pR = pM - pm || 1;
  const bW = (W - PAD.L - PAD.R) / viewCount;
  
  function toY(p) { return PAD.T + (1 - (p - pm) / pR) * cH; }
  function toX(i) { return PAD.L + i * bW + bW / 2; }
  
  // Background
  ctx.fillStyle = '#06080c';
  ctx.fillRect(0, 0, W, H);
  
  // Grid
  ctx.strokeStyle = 'rgba(0,255,136,.04)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 5; i++) {
    const p = pm + pR * i / 5;
    const y = toY(p);
    ctx.beginPath();
    ctx.moveTo(PAD.L, y);
    ctx.lineTo(W - PAD.R, y);
    ctx.stroke();
    ctx.fillStyle = '#445';
    ctx.font = '9px "IBM Plex Mono"';
    ctx.textAlign = 'right';
    ctx.fillText(p.toFixed(1), PAD.L - 5, y + 3);
  }
  
  // Volume
  const maxV = Math.max.apply(null, vis.map(function(x) { return x.v; })) || 1;
  const vTop = PAD.T + cH + 6;
  for (let i = 0; i < vis.length; i++) {
    const b = vis[i];
    const x = toX(i);
    ctx.fillStyle = b.c >= b.o ? 'rgba(34,197,94,.3)' : 'rgba(239,68,68,.3)';
    ctx.fillRect(x - bW * 0.35, vTop + VH - (b.v / maxV) * VH, bW * 0.7, (b.v / maxV) * VH);
  }
  
  // EMAs
  function drawEMA(e, col) {
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    let started = false;
    for (let i = 0; i < vis.length; i++) {
      const g = si + i;
      if (g >= e.length || !e[g]) continue;
      const x = toX(i);
      const y = toY(e[g]);
      if (!started) { ctx.moveTo(x, y); started = true; }
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  
  if (showEMA.e200 && ema200.length) drawEMA(ema200, '#ff6644');
  if (showEMA.e50 && ema50.length) drawEMA(ema50, '#ffaa00');
  if (showEMA.e20 && ema20.length) drawEMA(ema20, '#00bbff');
  
  // Price bars
  for (let i = 0; i < vis.length; i++) {
    const b = vis[i];
    const x = toX(i);
    const up = b.c >= b.o;
    const col = up ? '#22c55e' : '#ef4444';
    
    if (chartType === 'candle') {
      ctx.strokeStyle = col;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, toY(b.h));
      ctx.lineTo(x, toY(b.l));
      ctx.stroke();
      const bT = toY(Math.max(b.o, b.c));
      const bB = toY(Math.min(b.o, b.c));
      const bw = Math.max(bW * 0.6, 2);
      ctx.fillStyle = up ? col + '55' : col;
      ctx.fillRect(x - bw / 2, bT, bw, Math.max(bB - bT, 1));
    } else if (chartType === 'line') {
      if (i === 0) {
        ctx.beginPath();
        ctx.moveTo(x, toY(b.c));
      } else {
        ctx.lineTo(x, toY(b.c));
      }
      if (i === vis.length - 1) {
        ctx.strokeStyle = '#00bbff';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    } else {
      // HLC
      ctx.strokeStyle = col;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, toY(b.h));
      ctx.lineTo(x, toY(b.l));
      ctx.stroke();
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x, toY(b.c));
      ctx.lineTo(x + bW * 0.35, toY(b.c));
      ctx.stroke();
    }
  }
  
  // OHLC display
  const hb = vis[vis.length - 1];
  if (hb) {
    ctx.font = '10px "IBM Plex Mono"';
    const bc = hb.c >= hb.o ? '#22c55e' : '#ef4444';
    ctx.fillStyle = '#556';
    ctx.textAlign = 'left';
    ctx.fillText('O', PAD.L + 4, 16);
    ctx.fillStyle = bc;
    ctx.fillText(hb.o.toFixed(2), PAD.L + 16, 16);
    ctx.fillStyle = '#556';
    ctx.fillText('H', PAD.L + 75, 16);
    ctx.fillStyle = bc;
    ctx.fillText(hb.h.toFixed(2), PAD.L + 87, 16);
    ctx.fillStyle = '#556';
    ctx.fillText('L', PAD.L + 146, 16);
    ctx.fillStyle = bc;
    ctx.fillText(hb.l.toFixed(2), PAD.L + 158, 16);
    ctx.fillStyle = '#556';
    ctx.fillText('C', PAD.L + 217, 16);
    ctx.fillStyle = bc;
    ctx.fillText(hb.c.toFixed(2), PAD.L + 229, 16);
  }
}

function onMM(e) {
  if (!isDrag || !dragX) return;
  const cv = $('chart');
  const rect = cv.getBoundingClientRect();
  const W = rect.width;
  const bW = (W - 63) / viewCount;
  const bd = Math.round((e.clientX - dragX) / bW);
  if (Math.abs(bd) >= 1) {
    const current = viewStart != null ? viewStart : Math.max(0, prices.length - viewCount);
    viewStart = Math.max(0, Math.min(prices.length - viewCount, current - bd));
    dragX = e.clientX;
    draw();
  }
}

function onWH(e) {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 1 : -1;
  viewCount = Math.max(20, Math.min(500, viewCount + delta * Math.max(3, Math.floor(viewCount * 0.1))));
  draw();
}

// Fundamentals
async function fetchFund(s) {
  const c = $('finC');
  const wk = localStorage.getItem('zd_worker_url') || '';
  
  if (!wk) {
    if (c) c.innerHTML = '<div class="card-h"><span class="card-t">📊 QUARTERLY FINANCIALS</span></div><div class="card-b" style="text-align:center;padding:24px;color:var(--t4)">⚙️ Set zd_worker_url in localStorage for Screener data</div>';
    return;
  }
  
  try {
    const r = await fetch(wk, {
      method: 'GET',
      headers: {'X-Kite-Action': 'screener', 'X-Screener-Symbol': s},
      signal: AbortSignal.timeout(15000)
    });
    if (!r.ok) throw new Error('Fetch failed');
    const d = await r.json();
    if (!d.quarters || d.quarters.length === 0) throw new Error('No data');
    F = {info: d.info || {}, quarters: d.quarters || [], shareholding: d.shareholding || null};
    
    // Update shareholding with real QoQ data if available
    if (d.shareholding) {
      updateShareholding(d.shareholding);
    }
    
    // Update key metrics with real data
    if (d.info) {
      updateKeyMetrics(d.info);
    }
    
    renderFundTable();
  } catch (e) {
    console.log('Screener fetch error:', e);
    if (c) c.innerHTML = '<div class="card-h"><span class="card-t">📊 QUARTERLY FINANCIALS</span></div><div class="card-b" style="text-align:center;padding:24px;color:var(--t4)">Data unavailable</div>';
  }
}

function updateShareholding(shp) {
  // Update D.fund_holdings with Screener data
  if (shp.promoter_pct != null) D.fund_holdings.promoter_pct = shp.promoter_pct;
  if (shp.promoter_chg != null) D.fund_holdings.promoter_chg = shp.promoter_chg;
  if (shp.fii_pct != null) D.fund_holdings.fii_pct = shp.fii_pct;
  if (shp.fii_chg != null) D.fund_holdings.fii_chg = shp.fii_chg;
  if (shp.dii_pct != null) D.fund_holdings.dii_pct = shp.dii_pct;
  if (shp.dii_chg != null) D.fund_holdings.dii_chg = shp.dii_chg;
  if (shp.public_pct != null) D.fund_holdings.public_pct = shp.public_pct;
  if (shp.public_chg != null) D.fund_holdings.public_chg = shp.public_chg;
  
  // Re-render shareholding section
  const shpBody = $('shpBody');
  if (shpBody) {
    const h = D.fund_holdings;
    const holders = [];
    if (h.promoter_pct > 0) holders.push({n: 'Promoters', p: h.promoter_pct, c: h.promoter_chg || 0, col: COL.promo});
    if (h.fii_pct > 0) holders.push({n: 'FII/FPI', p: h.fii_pct, c: h.fii_chg || 0, col: COL.fii});
    else if (h.institutional_pct > 0) holders.push({n: 'Institutional', p: h.institutional_pct, c: 0, col: COL.fii});
    if (h.dii_pct > 0) holders.push({n: 'DII', p: h.dii_pct, c: h.dii_chg || 0, col: COL.dii});
    const pub = h.public_pct || Math.max(0, 100 - (h.promoter_pct || 0) - (h.fii_pct || h.institutional_pct || 0) - (h.dii_pct || 0));
    if (pub > 0) holders.push({n: 'Public', p: pub, c: h.public_chg || 0, col: COL.pub});
    
    function chgBadge(c) {
      if (c > 0) return '<div class="shp-chg up">▲' + c.toFixed(2) + '%</div>';
      if (c < 0) return '<div class="shp-chg dn">▼' + Math.abs(c).toFixed(2) + '%</div>';
      return '<div class="shp-chg flat">—</div>';
    }
    
    shpBody.innerHTML = '<div class="shp-wrap">' +
      '<div class="shp-donut"><canvas id="shpC" width="160" height="160"></canvas><div class="shp-center">👥</div></div>' +
      '<div class="shp-list">' + holders.map(function(x) {
        return '<div class="shp-row"><div class="shp-dot" style="background:' + x.col + '"></div><div class="shp-name">' + x.n + '</div><div class="shp-pct">' + x.p.toFixed(1) + '%</div>' + chgBadge(x.c) + '</div>';
      }).join('') + '</div>' +
    '</div>';
    
    drawDonut();
  }
}

function updateKeyMetrics(info) {
  // Update D.fundamentals with Screener data
  if (info.mcapCr != null) D.fundamentals.market_cap_cr = info.mcapCr;
  if (info.pe != null) D.fundamentals.pe_ratio = info.pe;
  if (info.roe != null) D.fundamentals.roe = info.roe;
  if (info.roce != null) D.fundamentals.roce = info.roce;
  if (info.bookValue != null) D.fundamentals.book_value = info.bookValue;
  if (info.dividendYield != null) D.fundamentals.dividend_yield = info.dividendYield;
  if (info.debtToEquity != null) D.fundamentals.debt_to_equity = info.debtToEquity;
  if (info.currentPrice != null) {
    D.technical = D.technical || {};
    D.technical.close = info.currentPrice;
  }
}

function renderFundTable() {
  const c = $('finC');
  if (!c || !F) return;
  
  c.innerHTML = '<div class="card-h"><span class="card-t">📊 QUARTERLY FINANCIALS</span><span style="font-size:9px;color:var(--t4)">' + (F.info.name || D.symbol) + '</span></div>' +
    '<div class="card-b" style="padding:0;overflow-x:auto"><table class="fin-tbl"><thead><tr><th>Quarter</th><th>EPS</th><th>%Chg</th><th>Sales (Cr)</th><th>%Chg</th><th>OPM%</th></tr></thead><tbody>' +
    F.quarters.slice(0, 8).map(function(q) {
      return '<tr>' +
        '<td>' + (q.label || '—') + '</td>' +
        '<td>' + (q.eps != null ? q.eps.toFixed(2) : '—') + '</td>' +
        '<td class="' + (q.epsYoY >= 0 ? 'up' : 'dn') + '">' + (q.epsYoY != null ? (q.epsYoY >= 0 ? '+' : '') + q.epsYoY.toFixed(0) + '%' : '—') + '</td>' +
        '<td>' + (q.sales ? q.sales.toLocaleString('en-IN') : '—') + '</td>' +
        '<td class="' + (q.salesYoY >= 0 ? 'up' : 'dn') + '">' + (q.salesYoY != null ? (q.salesYoY >= 0 ? '+' : '') + q.salesYoY.toFixed(0) + '%' : '—') + '</td>' +
        '<td>' + (q.opm != null ? q.opm.toFixed(1) + '%' : '—') + '</td>' +
      '</tr>';
    }).join('') +
    '</tbody></table></div>';
}

// AI Summary
async function genAI(s) {
  const c = $('aiC');
  if (!c) return;
  
  const price = sv(D, 'technical.close', 0);
  const chg = sv(D, 'technical.change_pct', 0);
  const mcap = sv(D, 'fundamentals.market_cap_cr', 0);
  const pe = sv(D, 'fundamentals.pe_ratio', 0);
  const roe = sv(D, 'fundamentals.roe', 0);
  const promo = sv(D, 'fund_holdings.promoter_pct', 0);
  const inst = sv(D, 'fund_holdings.institutional_pct', 0);
  
  const ctx = 'Stock: ' + (D.name || s) + ' (' + s + ')\n' +
    'Sector: ' + (D.sector || 'N/A') + '\n' +
    'Price: ₹' + price + ', Change: ' + chg + '%\n' +
    'Market Cap: ₹' + mcap + ' Cr\n' +
    'P/E: ' + pe + ', ROE: ' + roe + '%\n' +
    'Promoter: ' + promo + '%, Institutional: ' + inst + '%';
  
  const prompt = 'You are a professional Indian stock analyst. Analyze this stock concisely in 2-3 short paragraphs:\n\n' + ctx + '\n\nCover: 1) Overall verdict (Bullish/Bearish/Neutral) 2) Key strengths 3) Risks. Use **bold** for key points. Be direct.';
  
  try {
    const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + GROQ},
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{role: 'user', content: prompt}],
        max_tokens: 400,
        temperature: 0.7
      })
    });
    
    if (!r.ok) throw new Error('API error');
    const d = await r.json();
    const txt = (d.choices && d.choices[0] && d.choices[0].message && d.choices[0].message.content) || 'Analysis unavailable';
    
    c.innerHTML = '<div class="ai-content">' + txt.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>') + '</div>' +
      '<div class="ai-ft"><span class="ai-powered">⚡ Llama 3.3 70B via Groq</span><button class="ai-refresh" onclick="genAI(\'' + s + '\')">↻ Refresh</button></div>';
  } catch (e) {
    c.innerHTML = '<div style="text-align:center;padding:20px;color:var(--t4)">⚠️ AI unavailable<br><button class="ai-refresh" style="margin-top:10px" onclick="genAI(\'' + s + '\')">↻ Retry</button></div>';
  }
}

init();
