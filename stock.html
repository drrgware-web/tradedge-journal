<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Drilldown | TradEdge</title>
<link rel="icon" type="image/jpeg" href="assets/logo.jpeg">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg-primary:#06080c;--bg-secondary:#0a0e14;--bg-card:#0d1117;--bg-hover:#141a22;--bg3:#111820;--border-dim:rgba(0,255,136,.06);--border-low:rgba(0,255,136,.1);--border-med:rgba(0,255,136,.2);--b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.12);--accent:#00ff88;--accent-dim:rgba(0,255,136,.08);--accent2:#00c8ff;--accent3:#8844ff;--red:#ff4455;--amber:#ffaa00;--t1:#eef;--t2:#ccd;--t3:#99aabb;--t4:#556677;--green:#22c55e;--font-mono:'IBM Plex Mono',monospace;--font-sans:'Outfit',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-sans);background:var(--bg-primary);color:var(--t1);min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg-secondary)}::-webkit-scrollbar-thumb{background:var(--border-low);border-radius:3px}

/* Header */
.hdr{background:linear-gradient(180deg,#0d1018,var(--bg-secondary));border-bottom:1px solid var(--border-dim);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-l{display:flex;align-items:center;gap:16px}
.back{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--bg-card);border:1px solid var(--border-low);border-radius:6px;color:var(--t3);text-decoration:none;font-size:12px;font-weight:500;transition:all .15s}
.back:hover{background:var(--bg-hover);color:var(--t1);border-color:var(--accent)}
.stk-info{display:flex;flex-direction:column;gap:2px}
.stk-row{display:flex;align-items:center;gap:10px}
.stk-sym{font-size:22px;font-weight:800;font-family:var(--font-mono);color:var(--accent)}
.stk-nm{font-size:13px;color:var(--t2);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700}
.badge.fno{background:rgba(136,68,255,.15);color:#a855f7;border:1px solid rgba(136,68,255,.3)}
.badge.sector{background:var(--bg-hover);color:var(--t3);border:1px solid var(--border-dim)}
.hdr-r{display:flex;align-items:center;gap:12px}
.srch-w{position:relative}
.srch-i{width:220px;padding:8px 14px;background:var(--bg-card);border:1px solid var(--border-low);border-radius:8px;color:var(--t1);font-family:var(--font-mono);font-size:12px;transition:all .2s}
.srch-i:focus{outline:none;border-color:var(--accent);width:300px;box-shadow:0 0 0 3px rgba(0,255,136,.1)}
.srch-dd{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--bg-card);border:1px solid var(--border-med);border-radius:8px;max-height:320px;overflow-y:auto;z-index:1000;display:none;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.srch-dd.on{display:block}
.srch-it{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border-dim);transition:background .1s}
.srch-it:hover{background:var(--bg-hover)}

/* Main Layout */
.main{max-width:1800px;margin:0 auto;padding:16px}

/* Price Header Card */
.price-card{display:flex;align-items:center;gap:24px;padding:16px 24px;background:var(--bg-card);border:1px solid var(--border-low);border-radius:12px;margin-bottom:16px;flex-wrap:wrap}
.price-main{display:flex;align-items:baseline;gap:12px}
.cur-price{font-size:36px;font-weight:700;font-family:var(--font-mono)}
.price-chg{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;padding:4px 10px;border-radius:6px}
.price-chg.up{background:rgba(34,197,94,.12);color:var(--green)}
.price-chg.dn{background:rgba(255,68,85,.12);color:var(--red)}
.price-meta{display:flex;gap:24px;margin-left:auto;flex-wrap:wrap}
.meta-item{text-align:center;min-width:70px}
.meta-label{font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:.5px}
.meta-value{font-size:15px;font-weight:600;font-family:var(--font-mono);margin-top:2px}
.meta-value.up{color:var(--green)}
.meta-value.dn{color:var(--red)}

/* Earnings Alert */
.earnings-alert{display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(90deg,rgba(234,179,8,.1),rgba(234,179,8,.02));border:1px solid rgba(234,179,8,.3);border-radius:8px;margin-bottom:16px}
.earnings-alert.soon{background:linear-gradient(90deg,rgba(255,68,85,.1),rgba(255,68,85,.02));border-color:rgba(255,68,85,.3)}
.earn-icon{font-size:20px}
.earn-text{font-size:12px;color:var(--t2)}
.earn-text strong{color:var(--amber)}
.earnings-alert.soon .earn-text strong{color:var(--red)}
.earn-date{font-family:var(--font-mono);font-weight:600;margin-left:auto;padding:4px 10px;background:rgba(234,179,8,.15);border-radius:6px;color:var(--amber);font-size:11px}
.earnings-alert.soon .earn-date{background:rgba(255,68,85,.15);color:var(--red)}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border-dim);padding-bottom:0}
.tab{padding:10px 20px;background:transparent;border:none;color:var(--t3);font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:var(--t1)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Tab Content */
.tab-content{display:none}
.tab-content.active{display:block}

/* Grid Layout */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

/* Card */
.card{background:var(--bg-card);border:1px solid var(--border-low);border-radius:10px;overflow:hidden}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg3);border-bottom:1px solid var(--border-dim)}
.card-title{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.card-badge{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:600}
.card-body{padding:16px}

/* Master Score Box */
.master-box{display:flex;align-items:center;gap:20px;padding:16px;background:var(--bg-secondary);border-radius:8px;margin-bottom:16px}
.master-grade{width:72px;height:72px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
.master-grade .letter{font-size:32px;line-height:1}
.master-grade .label{font-size:8px;margin-top:2px;opacity:.8;letter-spacing:1px}
.master-grade.A{background:linear-gradient(135deg,rgba(34,197,94,.2),rgba(34,197,94,.05));color:var(--green);border:2px solid var(--green)}
.master-grade.B{background:linear-gradient(135deg,rgba(0,200,255,.2),rgba(0,200,255,.05));color:var(--accent2);border:2px solid var(--accent2)}
.master-grade.C{background:linear-gradient(135deg,rgba(234,179,8,.2),rgba(234,179,8,.05));color:var(--amber);border:2px solid var(--amber)}
.master-grade.D{background:linear-gradient(135deg,rgba(255,68,85,.2),rgba(255,68,85,.05));color:var(--red);border:2px solid var(--red)}
.master-grade.E{background:var(--bg-hover);color:var(--t4);border:2px solid var(--border-low)}
.master-desc{flex:1;font-size:12px;color:var(--t3);line-height:1.5}

/* O'Neil Metrics Grid */
.oneil-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.oneil-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg-secondary);border-radius:6px}
.oneil-label{font-size:11px;color:var(--t3)}
.oneil-value{font-family:var(--font-mono);font-size:13px;font-weight:700}
.oneil-value.good{color:var(--green)}
.oneil-value.fair{color:var(--amber)}
.oneil-value.poor{color:var(--red)}
.oneil-bar{display:flex;align-items:center;gap:8px;flex:1;margin:0 12px}
.oneil-bar-track{flex:1;height:6px;background:var(--bg-hover);border-radius:3px;overflow:hidden}
.oneil-bar-fill{height:100%;border-radius:3px}

/* Data Table */
.data-table{width:100%;border-collapse:collapse}
.data-table th{padding:8px 10px;text-align:right;font-size:10px;color:var(--t4);font-weight:700;border-bottom:2px solid var(--b2);text-transform:uppercase;letter-spacing:.3px}
.data-table th:first-child{text-align:left}
.data-table td{padding:8px 10px;font-family:var(--font-mono);font-size:11px;text-align:right;border-bottom:1px solid var(--b1)}
.data-table td:first-child{text-align:left;font-family:var(--font-sans);font-weight:600;color:var(--t2)}
.data-table tr:hover{background:var(--bg-hover)}
.data-table .up{color:var(--green)}
.data-table .dn{color:var(--red)}

/* Surveillance */
.surv-status{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;margin-bottom:16px}
.surv-status.safe{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.surv-status.caution{background:rgba(234,179,8,.12);color:var(--amber);border:1px solid rgba(234,179,8,.3)}
.surv-status.danger{background:rgba(255,68,85,.12);color:var(--red);border:1px solid rgba(255,68,85,.3)}
.surv-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.surv-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-secondary);border-radius:6px;border-left:3px solid transparent}
.surv-item.pass{border-left-color:var(--green)}
.surv-item.fail{border-left-color:var(--red)}
.surv-icon{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.surv-icon.pass{background:rgba(34,197,94,.15);color:var(--green)}
.surv-icon.fail{background:rgba(255,68,85,.15);color:var(--red)}
.surv-text{font-size:11px;color:var(--t2)}

/* Ownership */
.own-chart{display:flex;height:32px;border-radius:6px;overflow:hidden;margin-bottom:16px}
.own-segment{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;min-width:30px}
.own-table{width:100%}
.own-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--b1)}
.own-row:last-child{border-bottom:none}
.own-color{width:12px;height:12px;border-radius:3px;margin-right:10px;flex-shrink:0}
.own-name{flex:1;font-size:11px;color:var(--t2)}
.own-vals{display:flex;gap:16px}
.own-val{font-family:var(--font-mono);font-size:11px;font-weight:600;min-width:50px;text-align:right}
.own-val.chg{font-size:10px}
.own-val.up{color:var(--green)}
.own-val.dn{color:var(--red)}

/* News */
.news-item{padding:12px 0;border-bottom:1px solid var(--b1)}
.news-item:last-child{border-bottom:none}
.news-title{font-size:12px;color:var(--t1);font-weight:500;line-height:1.4;margin-bottom:4px;cursor:pointer;transition:color .15s}
.news-title:hover{color:var(--accent)}
.news-meta{display:flex;gap:12px;font-size:10px;color:var(--t4)}
.news-source{color:var(--accent2)}

/* Chart Section */
.chart-card{margin-bottom:16px}
.chart-toolbar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--bg3);border-bottom:1px solid var(--border-dim);flex-wrap:wrap}
.toolbar-group{display:flex;gap:2px;background:var(--bg-primary);border-radius:4px;padding:2px}
.tb-btn{padding:4px 10px;border:none;border-radius:3px;font-size:9px;font-weight:600;font-family:var(--font-mono);cursor:pointer;background:transparent;color:var(--t4);transition:all .1s}
.tb-btn:hover{color:var(--t2)}
.tb-btn.active{background:var(--accent-dim);color:var(--accent)}
.ema-btn{padding:2px 6px;border-radius:3px;font-size:8px;font-weight:700;font-family:var(--font-mono);cursor:pointer;border:1px solid;background:transparent}
.link-btn{padding:3px 8px;border-radius:4px;font-size:9px;font-weight:600;text-decoration:none;border:1px solid;transition:all .15s}
.chart-footer{display:flex;justify-content:space-between;padding:4px 12px;background:var(--bg3);border-top:1px solid var(--border-dim);font-size:8px;font-family:var(--font-mono);color:var(--t4)}

/* Management */
.mgmt-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--b1)}
.mgmt-item:last-child{border-bottom:none}
.mgmt-name{font-size:12px;font-weight:500;color:var(--t1)}
.mgmt-role{font-size:11px;color:var(--t4)}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;color:var(--t4)}
.spinner{width:36px;height:36px;border:3px solid var(--border-low);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Responsive */
@media(max-width:1200px){.grid-3{grid-template-columns:1fr 1fr}.grid-2{grid-template-columns:1fr}}
@media(max-width:800px){.grid-3,.grid-2{grid-template-columns:1fr}.price-card{flex-direction:column;align-items:flex-start}.price-meta{margin-left:0;width:100%}.hdr{flex-wrap:wrap;gap:10px}.surv-grid{grid-template-columns:1fr}.oneil-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-l">
    <a href="scanner.html" class="back">← Scanner</a>
    <div class="stk-info">
      <div class="stk-row">
        <span class="stk-sym" id="symbol">—</span>
        <span class="stk-nm" id="name">Loading...</span>
      </div>
      <div class="stk-row" id="badges"></div>
    </div>
  </div>
  <div class="hdr-r">
    <div class="srch-w">
      <input type="text" class="srch-i" id="srchIn" placeholder="Search stock..." autocomplete="off">
      <div class="srch-dd" id="srchDD"></div>
    </div>
  </div>
</header>

<main class="main" id="mainContent">
  <div class="loading" id="loading"><div class="spinner"></div><div>Loading stock data...</div></div>
</main>

<script>
const TV_LAYOUT='8RFOgQZr',WORKER='https://spring-fire-41a0.drrgware.workers.dev';
let D=null,F=null,allS=[],selIdx=-1;

// ═══════════════════════════════════════════
// INITIALIZATION
// ═══════════════════════════════════════════
async function init(){
  const p=new URLSearchParams(location.search),sym=p.get('s')||p.get('symbol');
  await loadSymbols();setupSearch();
  if(!sym){showEmptyState();return}
  $('symbol').textContent=sym;
  document.title=`${sym} | TradEdge`;
  try{
    const r=await fetch(`data/stock_details/${sym}.json`);
    if(!r.ok)throw new Error('Stock not found');
    D=await r.json();
    render();
    fetchFundamentals(sym);
  }catch(e){showError(`Failed to load ${sym}: ${e.message}`)}
}

function $(id){return document.getElementById(id)}

async function loadSymbols(){
  try{
    const r=await fetch('data/scanner_results.json');
    if(r.ok){const d=await r.json();allS=(d.all_stocks||[]).map(s=>({s:s.symbol,n:s.name||s.symbol}))}
  }catch(e){}
}

function setupSearch(){
  const inp=$('srchIn'),dd=$('srchDD');
  inp.addEventListener('input',()=>{
    const q=inp.value.trim().toUpperCase();
    if(q.length<1){dd.classList.remove('on');return}
    const m=allS.filter(x=>x.s.includes(q)||x.n.toUpperCase().includes(q)).slice(0,12);
    dd.innerHTML=m.length?m.map((x,i)=>`<div class="srch-it" data-s="${x.s}"><span style="font-family:var(--font-mono);font-weight:600;color:var(--accent)">${x.s}</span><span style="font-size:11px;color:var(--t4)">${x.n}</span></div>`).join(''):'<div style="padding:12px;text-align:center;color:var(--t4);font-size:11px">No matches</div>';
    dd.classList.add('on');selIdx=-1;
  });
  inp.addEventListener('keydown',e=>{
    const its=dd.querySelectorAll('.srch-it[data-s]');
    if(e.key==='ArrowDown'){e.preventDefault();selIdx=Math.min(selIdx+1,its.length-1);updSel(its)}
    else if(e.key==='ArrowUp'){e.preventDefault();selIdx=Math.max(selIdx-1,0);updSel(its)}
    else if(e.key==='Enter'){e.preventDefault();if(selIdx>=0&&its[selIdx])goTo(its[selIdx].dataset.s);else if(inp.value.trim())goTo(inp.value.trim().toUpperCase())}
    else if(e.key==='Escape')dd.classList.remove('on');
  });
  dd.addEventListener('click',e=>{const it=e.target.closest('.srch-it[data-s]');if(it)goTo(it.dataset.s)});
  document.addEventListener('click',e=>{if(!e.target.closest('.srch-w'))dd.classList.remove('on')});
}

function updSel(its){its.forEach((it,i)=>it.style.background=i===selIdx?'var(--bg-hover)':'transparent')}
function goTo(s){location.href=`stock.html?s=${s}`}

function showEmptyState(){
  $('symbol').textContent='Select Stock';$('symbol').style.color='var(--t4)';$('name').textContent='';
  $('loading').innerHTML=`
    <div style="font-size:48px;margin-bottom:20px">🔍</div>
    <div style="font-size:18px;font-weight:600;margin-bottom:8px;color:var(--t1)">Search for a stock</div>
    <div style="font-size:12px;color:var(--t4);margin-bottom:24px">Type symbol or company name</div>
    <div style="position:relative;width:100%;max-width:400px;margin-bottom:24px">
      <input type="text" id="mainSearch" placeholder="Search stock..." autocomplete="off" style="width:100%;padding:14px 20px;background:var(--bg-card);border:2px solid var(--accent);border-radius:10px;color:var(--t1);font-family:var(--font-mono);font-size:14px;outline:none;box-shadow:0 0 20px rgba(0,255,136,.15)">
      <div id="mainSearchDD" style="position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--bg-card);border:1px solid var(--border-med);border-radius:8px;max-height:280px;overflow-y:auto;display:none;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:100"></div>
    </div>
    <div style="font-size:11px;color:var(--t4);margin-bottom:12px">Popular stocks:</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">${['RELIANCE','TCS','HDFCBANK','INFY','BAJFINANCE','SBIN','ICICIBANK','ASHOKLEY'].map(s=>`<button onclick="goTo('${s}')" style="padding:8px 16px;background:var(--bg-hover);border:1px solid var(--border-low);border-radius:6px;color:var(--accent);font-family:var(--font-mono);font-size:11px;font-weight:600;cursor:pointer">${s}</button>`).join('')}</div>`;
  setupMainSearch();
}

function setupMainSearch(){
  const inp=$('mainSearch'),dd=$('mainSearchDD');if(!inp)return;
  let idx=-1;inp.focus();
  inp.addEventListener('input',()=>{
    const q=inp.value.trim().toUpperCase();if(q.length<1){dd.style.display='none';return}
    const m=allS.filter(x=>x.s.includes(q)||x.n.toUpperCase().includes(q)).slice(0,10);
    dd.innerHTML=m.length?m.map(x=>`<div data-s="${x.s}" style="display:flex;justify-content:space-between;padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--border-dim)" onmouseover="this.style.background='var(--bg-hover)'" onmouseout="this.style.background='transparent'"><span style="font-family:var(--font-mono);font-weight:600;color:var(--accent)">${x.s}</span><span style="font-size:11px;color:var(--t4)">${x.n}</span></div>`).join(''):'<div style="padding:12px;text-align:center;color:var(--t4)">No matches</div>';
    dd.style.display='block';idx=-1;
  });
  inp.addEventListener('keydown',e=>{
    const its=dd.querySelectorAll('[data-s]');
    if(e.key==='ArrowDown'){e.preventDefault();idx=Math.min(idx+1,its.length-1);its.forEach((it,i)=>it.style.background=i===idx?'var(--bg-hover)':'transparent')}
    else if(e.key==='ArrowUp'){e.preventDefault();idx=Math.max(idx-1,0);its.forEach((it,i)=>it.style.background=i===idx?'var(--bg-hover)':'transparent')}
    else if(e.key==='Enter'){e.preventDefault();if(idx>=0&&its[idx])goTo(its[idx].dataset.s);else if(inp.value.trim())goTo(inp.value.trim().toUpperCase())}
  });
  dd.addEventListener('click',e=>{const it=e.target.closest('[data-s]');if(it)goTo(it.dataset.s)});
}

function showError(m){$('loading').innerHTML=`<div style="font-size:40px;margin-bottom:12px">⚠️</div><div>${m}</div><a href="scanner.html" style="margin-top:16px;color:var(--accent)">← Back to Scanner</a>`}

// ═══════════════════════════════════════════
// RENDER MAIN PAGE
// ═══════════════════════════════════════════
function render(){
  $('loading').style.display='none';
  $('name').textContent=D.name||D.symbol;
  
  // Badges
  const f=D.fundamentals||{},isFnO=(f.market_cap_cr||0)>5000;
  $('badges').innerHTML=`

let prices=[],ema20=[],ema50=[],ema200=[];
let showEMA={e20:true,e50:true,e200:true};
let chartType='hlc',viewStart=null,viewCount=120,crosshair=null,hoverBar=null;
let isDrag=false,dragX=null;

function renderChartSection(){
  const sym=D.symbol;
  return`<div class="card chart-card">
    <div class="chart-toolbar">
      <span style="font-size:11px;font-weight:800;color:var(--accent);font-family:var(--font-mono)">◈ ${sym}</span>
      <div class="toolbar-group">
        <button class="tb-btn active" data-ct="hlc">HLC</button>
        <button class="tb-btn" data-ct="candle">OHLC</button>
        <button class="tb-btn" data-ct="line">Line</button>
      </div>
      <button class="ema-btn" id="e20Btn" style="border-color:#00bbff55;color:#00bbff;background:rgba(0,187,255,.1)">E20</button>
      <button class="ema-btn" id="e50Btn" style="border-color:#ffaa0055;color:#ffaa00;background:rgba(255,170,0,.1)">E50</button>
      <button class="ema-btn" id="e200Btn" style="border-color:#ff664455;color:#ff6644;background:rgba(255,102,68,.1)">E200</button>
      <div style="margin-left:auto;display:flex;gap:4px">
        <a href="https://in.tradingview.com/chart/${TV_LAYOUT}/?symbol=NSE:${sym}" target="_blank" class="link-btn" style="border-color:rgba(0,200,255,.3);color:var(--accent2)">TradingView</a>
        <a href="https://zone.definedge.com/chart/NSE/${sym}/pf" target="_blank" class="link-btn" style="border-color:rgba(136,68,255,.3);color:var(--accent3)">P&F</a>
        <a href="https://zone.definedge.com/chart/NSE/${sym}/renko" target="_blank" class="link-btn" style="border-color:rgba(136,68,255,.3);color:var(--accent3)">Renko</a>
      </div>
    </div>
    <canvas id="teChart" style="display:block;width:100%;height:400px;cursor:crosshair"></canvas>
    <div class="chart-footer"><span>Scroll: Zoom | Drag: Pan</span><span style="color:var(--accent)">◈ TEChart v5.0</span></div>
  </div>`;
}

async function initChart(){
  await loadChartData();
  const closes=prices.map(d=>d.c);
  if(closes.length>=20)ema20=calcEMA(closes,20);
  if(closes.length>=50)ema50=calcEMA(closes,50);
  if(closes.length>=200)ema200=calcEMA(closes,200);
  
  const cv=$('teChart');if(!cv)return;
  cv.addEventListener('mousemove',onChartMove);
  cv.addEventListener('mouseleave',()=>{crosshair=null;hoverBar=null;drawChart()});
  cv.addEventListener('mousedown',e=>{if(e.button===0){isDrag=true;dragX=e.clientX}});
  cv.addEventListener('mouseup',()=>{isDrag=false;dragX=null});
  cv.addEventListener('wheel',onChartWheel);
  
  document.querySelectorAll('[data-ct]').forEach(btn=>btn.addEventListener('click',()=>{
    chartType=btn.dataset.ct;
    document.querySelectorAll('[data-ct]').forEach(b=>b.classList.toggle('active',b.dataset.ct===chartType));
    drawChart();
  }));
  
  ['e20','e50','e200'].forEach(k=>{
    const btn=$(k+'Btn');if(!btn)return;
    btn.addEventListener('click',()=>{
      showEMA[k]=!showEMA[k];
      btn.style.background=showEMA[k]?btn.style.background.replace('0)','0.1)'):'transparent';
      drawChart();
    });
  });
}

async function loadChartData(){
  const sym=D.symbol;
  try{
    const r=await fetch(`${WORKER}/quote/${sym}.NS?range=6mo&interval=1d`);
    if(r.ok){
      const j=await r.json();
      if(j.chart?.result?.[0]){
        const rs=j.chart.result[0],ts=rs.timestamp||[],q=rs.indicators?.quote?.[0]||{};
        for(let i=0;i<ts.length;i++){
          const dt=new Date(ts[i]*1000).toISOString().split('T')[0];
          const o=q.open?.[i],h=q.high?.[i],l=q.low?.[i],c=q.close?.[i],v=q.volume?.[i];
          if(o&&h&&l&&c&&!isNaN(o))prices.push({date:dt,o,h,l,c,v:v||0});
        }
        if(prices.length>20)return;
      }
    }
  }catch(e){}
  
  // Fallback demo data
  let p=D.technical?.close||D.price||100;
  for(let i=0;i<200;i++){
    const d=new Date();d.setDate(d.getDate()-200+i);
    p=Math.max(5,p*(1+(Math.random()-.48)*.025));
    const range=p*.012,o=p*(1+(Math.random()-.5)*.008);
    prices.push({date:d.toISOString().split('T')[0],o,h:Math.max(o,p)+Math.random()*range*.3,l:Math.min(o,p)-Math.random()*range*.3,c:p,v:Math.random()*5e5+1e5});
  }
}

function calcEMA(data,period){const k=2/(period+1),r=[];let p=data.slice(0,period).reduce((a,b)=>a+b,0)/period;for(let i=0;i<data.length;i++){if(i<period-1)r.push(null);else if(i===period-1)r.push(p);else{p=data[i]*k+p*(1-k);r.push(p)}}return r}

function drawChart(){
  const cv=$('teChart');if(!cv||!prices.length)return;
  const c=cv.getContext('2d'),dp=devicePixelRatio||1;
  const rect=cv.parentElement?.getBoundingClientRect();
  const W=rect?rect.width-2:800,H=400;
  const PAD={L:60,R:10,T:30,B:20},VH=60;
  const cH=H-PAD.T-PAD.B-VH-8;
  
  cv.width=W*dp;cv.height=H*dp;cv.style.width=W+'px';cv.style.height=H+'px';c.scale(dp,dp);
  
  const si=viewStart??Math.max(0,prices.length-viewCount);
  const vis=prices.slice(si,si+viewCount);if(!vis.length)return;
  
  let aH=vis.map(d=>d.h),aL=vis.map(d=>d.l);
  for(let i=0;i<vis.length;i++){const g=si+i;
    if(showEMA.e20&&g<ema20.length&&ema20[g]){aH.push(ema20[g]);aL.push(ema20[g])}
    if(showEMA.e50&&g<ema50.length&&ema50[g]){aH.push(ema50[g]);aL.push(ema50[g])}
    if(showEMA.e200&&g<ema200.length&&ema200[g]){aH.push(ema200[g]);aL.push(ema200[g])}
  }
  const pM=Math.max(...aH)*1.005,pm=Math.min(...aL)*.995,pR=pM-pm||1;
  const bW=(W-PAD.L-PAD.R)/viewCount;
  const toY=p=>PAD.T+(1-(p-pm)/pR)*cH;
  const toX=i=>PAD.L+i*bW+bW/2;
  
  c.fillStyle='#06080c';c.fillRect(0,0,W,H);
  
  // Grid
  c.strokeStyle='rgba(0,255,136,.04)';c.lineWidth=.5;
  for(let i=0;i<=6;i++){const p=pm+pR*i/6,y=toY(p);c.beginPath();c.moveTo(PAD.L,y);c.lineTo(W-PAD.R,y);c.stroke();c.fillStyle='#445';c.font='9px "IBM Plex Mono"';c.textAlign='right';c.fillText(p.toFixed(1),PAD.L-6,y+3)}
  
  // Volume
  const maxV=Math.max(...vis.map(d=>d.v))||1,vTop=PAD.T+cH+8;
  for(let i=0;i<vis.length;i++){const b=vis[i],x=toX(i);c.fillStyle=b.c>=b.o?'rgba(34,197,94,.3)':'rgba(239,68,68,.3)';c.fillRect(x-bW*.35,vTop+VH-(b.v/maxV)*VH,bW*.7,(b.v/maxV)*VH)}
  
  // EMAs
  const drawEMA=(ed,col)=>{c.strokeStyle=col;c.lineWidth=1.2;c.beginPath();let s=false;for(let i=0;i<vis.length;i++){const g=si+i;if(g>=ed.length||!ed[g])continue;const x=toX(i),y=toY(ed[g]);if(!s){c.moveTo(x,y);s=true}else c.lineTo(x,y)}c.stroke()};
  if(showEMA.e200&&ema200.length)drawEMA(ema200,'#ff6644');
  if(showEMA.e50&&ema50.length)drawEMA(ema50,'#ffaa00');
  if(showEMA.e20&&ema20.length)drawEMA(ema20,'#00bbff');
  
  // Candles
  for(let i=0;i<vis.length;i++){
    const b=vis[i],x=toX(i),bu=b.c>=b.o,col=bu?'#22c55e':'#ef4444';
    if(chartType==='candle'){
      c.strokeStyle=col;c.lineWidth=1;c.beginPath();c.moveTo(x,toY(b.h));c.lineTo(x,toY(b.l));c.stroke();
      const bT=toY(Math.max(b.o,b.c)),bB=toY(Math.min(b.o,b.c)),bw=Math.max(bW*.6,2);
      c.fillStyle=bu?col+'55':col;c.fillRect(x-bw/2,bT,bw,Math.max(bB-bT,1));c.strokeRect(x-bw/2,bT,bw,Math.max(bB-bT,1));
    }else if(chartType==='line'){
      if(i===0){c.beginPath();c.moveTo(x,toY(b.c))}else c.lineTo(x,toY(b.c));
      if(i===vis.length-1){c.strokeStyle='#00bbff';c.lineWidth=1.5;c.stroke()}
    }else{
      c.strokeStyle=col;c.lineWidth=1;c.beginPath();c.moveTo(x,toY(b.h));c.lineTo(x,toY(b.l));c.stroke();
      c.lineWidth=1.5;c.beginPath();c.moveTo(x,toY(b.c));c.lineTo(x+bW*.35,toY(b.c));c.stroke();
    }
  }
  
  // OHLCV display
  const hb=hoverBar||vis[vis.length-1];
  if(hb){
    c.font='11px "IBM Plex Mono"';const bc=hb.c>=hb.o?'#22c55e':'#ef4444';
    c.fillStyle='#556';c.fillText('O',PAD.L+4,18);c.fillStyle=bc;c.fillText(hb.o?.toFixed(2),PAD.L+18,18);
    c.fillStyle='#556';c.fillText('H',PAD.L+80,18);c.fillStyle=bc;c.fillText(hb.h?.toFixed(2),PAD.L+94,18);
    c.fillStyle='#556';c.fillText('L',PAD.L+156,18);c.fillStyle=bc;c.fillText(hb.l?.toFixed(2),PAD.L+168,18);
    c.fillStyle='#556';c.fillText('C',PAD.L+230,18);c.fillStyle=bc;c.fillText(hb.c?.toFixed(2),PAD.L+244,18);
    c.fillStyle='#556';c.fillText('V',PAD.L+316,18);c.fillStyle='#aaa';c.fillText(fmtVol(hb.v||0),PAD.L+330,18);
  }
  
  // Crosshair
  if(crosshair){
    const{x:mx,y:my}=crosshair;
    if(mx>=PAD.L&&mx<=W-PAD.R){
      c.strokeStyle='rgba(0,255,136,.4)';c.lineWidth=.5;c.setLineDash([3,3]);
      c.beginPath();c.moveTo(mx,PAD.T);c.lineTo(mx,H-PAD.B);c.stroke();
      c.beginPath();c.moveTo(PAD.L,my);c.lineTo(W-PAD.R,my);c.stroke();c.setLineDash([]);
    }
  }
}

function onChartMove(e){
  const cv=$('teChart'),rect=cv.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  crosshair={x:mx,y:my};
  
  const W=rect.width,PAD={L:60,R:10};
  const bW=(W-PAD.L-PAD.R)/viewCount;
  const si=viewStart??Math.max(0,prices.length-viewCount);
  const vis=prices.slice(si,si+viewCount);
  const idx=Math.round((mx-PAD.L)/bW-.5);
  hoverBar=idx>=0&&idx<vis.length?vis[idx]:null;
  
  if(isDrag&&dragX!=null){
    const bd=Math.round((e.clientX-dragX)/bW);
    if(Math.abs(bd)>=1){
      viewStart=Math.max(0,Math.min(prices.length-viewCount,(viewStart??Math.max(0,prices.length-viewCount))-bd));
      dragX=e.clientX;
    }
  }
  drawChart();
}

function onChartWheel(e){
  e.preventDefault();
  viewCount=Math.max(20,Math.min(500,viewCount+(e.deltaY>0?1:-1)*Math.max(3,Math.floor(viewCount*.1))));
  drawChart();
}

// ═══════════════════════════════════════════
// FUNDAMENTALS FETCH (Screener.in)
// ═══════════════════════════════════════════
async function fetchFundamentals(sym){
  const container=$('fundScorecard');
  const workerUrl=localStorage.getItem('zd_worker_url')||'';
  
  // Check cache
  let cached=null;
  try{const c=JSON.parse(localStorage.getItem('te_fund_cache')||'{}');if(c[sym]&&Date.now()-c[sym].ts<24*60*60*1000)cached=c[sym].data}catch(e){}
  
  if(cached){F=cached;renderFundScorecard();return}
  
  if(!workerUrl){
    container.innerHTML=`<div style="padding:24px;text-align:center;color:var(--t4)">
      <div style="font-size:24px;margin-bottom:8px">⚙️</div>
      <div style="font-size:12px;margin-bottom:8px">Screener.in data requires worker URL</div>
      <code style="font-size:10px;background:var(--bg-secondary);padding:4px 8px;border-radius:4px">localStorage.setItem('zd_worker_url', 'YOUR_URL')</code>
    </div>`;
    return;
  }
  
  try{
    const r=await fetch(workerUrl,{method:'GET',headers:{'X-Kite-Action':'screener','X-Screener-Symbol':sym},signal:AbortSignal.timeout(15000)});
    if(!r.ok)throw new Error('Fetch failed');
    const data=await r.json();
    if(!data.quarters?.length)throw new Error('No data');
    F={info:data.info||{},quarters:data.quarters||[],annual:data.annual||[]};
    
    // Cache it
    try{const c=JSON.parse(localStorage.getItem('te_fund_cache')||'{}');c[sym]={data:F,ts:Date.now()};localStorage.setItem('te_fund_cache',JSON.stringify(c))}catch(e){}
    
    renderFundScorecard();
    renderEarningsAlertIfAvailable();
  }catch(e){
    container.innerHTML=`<div style="padding:24px;text-align:center;color:var(--t4)"><div style="font-size:24px;margin-bottom:8px">📊</div><div style="font-size:12px">Fundamental data unavailable</div><div style="font-size:10px;color:var(--red);margin-top:4px">${e.message}</div></div>`;
  }
}

function renderFundScorecard(){
  const container=$('fundScorecard');if(!F)return;
  
  const{info,quarters}=F;
  const score=calcFundScore(F);
  const scoreColor=score.value>=70?'var(--green)':score.value>=40?'var(--amber)':'var(--red)';
  const isFnO=(info.mcapCr||0)>5000;
  
  container.innerHTML=`
    <div class="card-header" style="border-left:4px solid ${scoreColor}">
      <div>
        <div style="font-size:14px;font-weight:700;color:var(--t1)">${info.name||D.symbol} ${isFnO?'<span class="badge fno" style="margin-left:6px">F&O</span>':''}</div>
        <div style="font-size:10px;color:var(--t4);margin-top:2px">mcap ${(info.mcapCr||0).toLocaleString('en-IN')} Cr · roe ${info.roe||0}%</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:28px;font-weight:800;color:${scoreColor}">${score.value}</div>
        <div style="font-size:9px;color:var(--t4);font-weight:600">FUND SCORE</div>
      </div>
    </div>
    ${score.flags.length?`<div style="padding:8px 16px;background:rgba(255,68,85,.05);border-bottom:1px solid var(--b1);display:flex;gap:6px;flex-wrap:wrap">${score.flags.map(f=>`<span style="font-size:9px;padding:2px 8px;border-radius:4px;background:${f.severity==='red'?'rgba(255,68,85,.15)':'rgba(234,179,8,.12)'};color:${f.severity==='red'?'var(--red)':'var(--amber)'};font-weight:600">${f.metric}: ${typeof f.val==='number'?f.val.toFixed(1):f.val}</span>`).join('')}</div>`:''}
    <div style="overflow-x:auto">
      <table class="data-table">
        <thead><tr><th>Quarter</th><th>EPS</th><th>%Chg</th><th>Sales (Cr)</th><th>%Chg</th><th>OPM%</th></tr></thead>
        <tbody>${quarters.slice(0,6).map(q=>`<tr>
          <td>${q.label||'—'}</td>
          <td>${q.eps?.toFixed(2)??'—'}</td>
          <td class="${(q.epsYoY||0)>=0?'up':'dn'}">${fmtPctSigned(q.epsYoY)}</td>
          <td>${q.sales?.toLocaleString('en-IN',{maximumFractionDigits:1})||'—'}</td>
          <td class="${(q.salesYoY||0)>=0?'up':'dn'}">${fmtPctSigned(q.salesYoY)}</td>
          <td>${q.opm?.toFixed(1)||'—'}%</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>
  `;
}

function calcFundScore(data){
  if(!data?.quarters?.length)return{value:0,flags:[]};
  const q=data.quarters[0],flags=[];
  let score=50;
  
  if(q.epsYoY!=null){if(q.epsYoY>20)score+=15;else if(q.epsYoY>0)score+=8;else{score-=15;flags.push({metric:'EPS YoY',val:q.epsYoY,severity:'red'})}}
  if(q.epsQoQ!=null){if(q.epsQoQ>10)score+=8;else if(q.epsQoQ>0)score+=4;else{score-=8;flags.push({metric:'EPS QoQ',val:q.epsQoQ,severity:'red'})}}
  if(q.salesYoY!=null){if(q.salesYoY>15)score+=12;else if(q.salesYoY>0)score+=6;else{score-=12;flags.push({metric:'Sales YoY',val:q.salesYoY,severity:'red'})}}
  if(q.salesQoQ!=null){if(q.salesQoQ>5)score+=5;else if(q.salesQoQ>=0)score+=2;else{score-=5;flags.push({metric:'Sales QoQ',val:q.salesQoQ,severity:'yellow'})}}
  
  const pe=data.info?.pe||0;
  if(pe>40){score-=10;flags.push({metric:'P/E',val:pe,severity:'red'})}else if(pe>0&&pe<15)score+=5;
  if(data.info?.roe>15)score+=5;else if(data.info?.roe<5&&data.info?.roe>0){score-=5;flags.push({metric:'ROE',val:data.info.roe+'%',severity:'yellow'})}
  
  return{value:Math.max(0,Math.min(100,score)),flags};
}

function renderEarningsAlertIfAvailable(){
  const container=$('earningsAlert');if(!container||!F?.info)return;
  
  // This would come from the API - placeholder
  const nextEarnings=F.info.nextEarnings;
  if(!nextEarnings)return;
  
  const days=Math.floor((new Date(nextEarnings)-new Date())/(1000*60*60*24));
  if(days<0||days>30)return;
  
  const soon=days<=7;
  container.innerHTML=`<div class="earnings-alert ${soon?'soon':''}">
    <span class="earn-icon">📅</span>
    <span class="earn-text">Next earnings in <strong>${days} day${days!==1?'s':''}</strong></span>
    <span class="earn-date">${new Date(nextEarnings).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</span>
  </div>`;
}

// ═══════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════
function fmt(n,d=2){if(n==null||isNaN(n))return'—';return Number(n).toLocaleString('en-IN',{minimumFractionDigits:d,maximumFractionDigits:d})}
function fmtCr(n){if(n==null||isNaN(n))return'—';if(n>=1e5)return(n/1e5).toFixed(1)+'L';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n.toFixed(0)}
function fmtVol(n){if(n==null||isNaN(n))return'—';if(n>=1e7)return(n/1e7).toFixed(2)+'Cr';if(n>=1e5)return(n/1e5).toFixed(2)+'L';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n.toString()}
function fmtPct(n){if(n==null||isNaN(n))return'—';return(n>=0?'+':'')+n.toFixed(1)+'%'}
function fmtPctSigned(n){if(n==null||isNaN(n))return'—';return(n>=0?'+':'')+n.toFixed(0)+'%'}

// Init
init();
