<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradEdge Watchlist</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--bg-primary:#06080c;--bg-secondary:#0c1018;--bg-card:#0f1520;--bg-hover:#141d2a;--border-dim:rgba(0,255,136,0.06);--border-low:rgba(0,255,136,0.1);--border-med:rgba(0,255,136,0.2);--accent:#00ff88;--accent-dim:rgba(0,255,136,0.15);--accent2:#00c8ff;--accent3:#8844ff;--red:#ff4455;--amber:#ffaa00;--text-primary:#e8e8e8;--text-secondary:#8899aa;--text-muted:#556677;--font-display:'Outfit',sans-serif;--font-mono:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-display);min-height:100vh;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,.008) 2px,rgba(0,255,136,.008) 4px);pointer-events:none;z-index:9999}
#root{position:relative;z-index:1}
.nav{display:flex;align-items:center;gap:4px;padding:4px 20px;background:var(--bg-secondary);border-bottom:1px solid var(--border-dim);position:sticky;top:0;z-index:100}
.nav-link{padding:5px 12px;font-size:11px;font-weight:600;color:var(--text-muted);text-decoration:none;border-radius:4px;font-family:var(--font-mono)}
.nav-link:hover{color:var(--text-primary);background:var(--bg-hover)}
.nav-link.active{color:var(--accent);background:var(--accent-dim)}
.card{background:var(--bg-card);border:1px solid var(--border-low);border-radius:8px;overflow:hidden}
.ob{padding:3px 8px;font-size:8px;font-family:var(--font-mono);font-weight:700;border-radius:3px;cursor:pointer;border:1px solid;transition:all 0.15s}
.ob:hover{filter:brightness(1.3)}
.ob-b{background:rgba(0,255,136,0.15);border-color:rgba(0,255,136,0.4);color:var(--accent)}
.ob-s{background:rgba(255,68,85,0.15);border-color:rgba(255,68,85,0.4);color:var(--red)}
.ob-sl{background:rgba(255,170,0,0.15);border-color:rgba(255,170,0,0.4);color:var(--amber)}
.ob-g{background:rgba(136,68,255,0.15);border-color:rgba(136,68,255,0.4);color:var(--accent3)}
.ob-i{background:rgba(0,200,255,0.1);border-color:rgba(0,200,255,0.3);color:var(--accent2)}
@keyframes logoPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.85;transform:scale(1.03)}}
@keyframes fadeRow{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── Watchlist aesthetic overhaul ── */
.wl-header{display:flex;justify-content:space-between;align-items:flex-end;padding:16px 0 12px;border-bottom:1px solid var(--border-dim);margin-bottom:14px}
.wl-title{font-size:24px;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,#00ff88,#00c8ff,#8844ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.wl-subtitle{font-size:10px;color:var(--text-muted);font-family:var(--font-mono);margin-top:3px;letter-spacing:0.5px}
.wl-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;padding-bottom:10px;border-bottom:1px solid var(--border-dim)}
.wl-tab{padding:6px 14px;font-size:11px;font-family:var(--font-mono);font-weight:700;border-radius:6px;cursor:pointer;transition:all .15s;border:1px solid var(--border-low);background:rgba(255,255,255,0.015);color:var(--text-secondary);position:relative}
.wl-tab:hover{border-color:var(--border-med);color:var(--text-primary);background:var(--bg-hover)}
.wl-tab.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);box-shadow:0 0 12px rgba(0,255,136,0.06)}
.wl-tab .wl-tab-count{font-size:8px;color:var(--text-muted);margin-left:4px;opacity:0.7}
.wl-tab.active .wl-tab-count{color:var(--accent);opacity:0.6}

/* Stock rows */
.wl-row{display:grid;grid-template-columns:36px 1fr 120px 200px 180px;gap:0;padding:0;border-bottom:1px solid rgba(255,255,255,0.02);transition:all .12s;cursor:pointer;animation:fadeRow .2s ease-out}
.wl-row:hover{background:rgba(0,255,136,0.015)}
.wl-row.expanded{background:rgba(0,255,136,0.025);border-bottom-color:var(--accent)}
.wl-row-cell{padding:10px 10px;display:flex;align-items:center}

/* Stock identity */
.wl-sym{font-weight:800;color:#fff;font-size:13px;letter-spacing:0.5px}
.wl-sector{font-size:9px;color:var(--text-muted);font-family:var(--font-mono);margin-top:1px}
.wl-source{font-size:7px;padding:1px 5px;border-radius:10px;font-family:var(--font-mono);font-weight:600;background:rgba(0,255,136,0.06);color:rgba(0,255,136,0.5);border:1px solid rgba(0,255,136,0.08)}

/* Status pill */
.wl-status{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:8px;font-family:var(--font-mono);font-weight:800;letter-spacing:0.8px}
.wl-status.watching{background:rgba(136,153,170,0.06);color:var(--text-muted);border:1px solid rgba(136,153,170,0.1)}
.wl-status.active{background:rgba(0,255,136,0.08);color:var(--accent);border:1px solid rgba(0,255,136,0.15)}
.wl-status.triggered{background:rgba(255,170,0,0.08);color:var(--amber);border:1px solid rgba(255,170,0,0.15)}
.wl-status.exited{background:rgba(136,68,255,0.08);color:var(--accent3);border:1px solid rgba(136,68,255,0.15)}

/* Trade plan mini display */
.wl-plan{display:flex;gap:8px;align-items:center;font-family:var(--font-mono);font-size:10px}
.wl-plan-item{display:flex;flex-direction:column;align-items:center;gap:1px}
.wl-plan-label{font-size:7px;font-weight:700;letter-spacing:0.5px;opacity:0.5}
.wl-plan-val{font-weight:700;font-size:10px}
.wl-plan-val.entry{color:var(--accent)}.wl-plan-val.target{color:var(--accent2)}.wl-plan-val.sl{color:var(--red)}
.wl-rr{padding:2px 6px;border-radius:4px;font-size:9px;font-weight:800;font-family:var(--font-mono)}
.wl-rr.good{background:rgba(0,255,136,0.08);color:var(--accent);border:1px solid rgba(0,255,136,0.12)}
.wl-rr.ok{background:rgba(255,170,0,0.08);color:var(--amber);border:1px solid rgba(255,170,0,0.12)}
.wl-rr.bad{background:rgba(255,68,85,0.08);color:var(--red);border:1px solid rgba(255,68,85,0.12)}

/* Order buttons */
.wl-orders{display:flex;gap:3px;align-items:center}
.wl-btn{padding:4px 10px;border-radius:4px;font-size:8px;font-family:var(--font-mono);font-weight:700;cursor:pointer;border:1px solid;transition:all .12s;white-space:nowrap}
.wl-btn:hover{filter:brightness(1.2);transform:translateY(-1px)}
.wl-btn.buy{background:rgba(0,255,136,0.1);border-color:rgba(0,255,136,0.3);color:var(--accent)}
.wl-btn.sell{background:rgba(255,68,85,0.1);border-color:rgba(255,68,85,0.3);color:var(--red)}
.wl-btn.sl{background:rgba(255,170,0,0.1);border-color:rgba(255,170,0,0.3);color:var(--amber)}
.wl-btn.gtt{background:rgba(136,68,255,0.1);border-color:rgba(136,68,255,0.3);color:var(--accent3)}
.wl-btn.edit{background:transparent;border-color:var(--border-low);color:var(--text-muted)}
.wl-btn.del{background:transparent;border-color:rgba(255,68,85,0.15);color:rgba(255,68,85,0.4);font-size:10px;padding:2px 6px}
.wl-btn.del:hover{color:var(--red);border-color:rgba(255,68,85,0.4)}

/* Chart expanded area */
.wl-chart-wrap{padding:8px 12px;background:linear-gradient(180deg,rgba(0,0,0,0.4),rgba(6,8,12,0.9));border-bottom:2px solid var(--accent)}

/* Empty state */
.wl-empty{padding:60px 20px;text-align:center}
.wl-empty-icon{font-size:48px;margin-bottom:12px;opacity:0.3}
.wl-empty-text{font-size:14px;font-weight:700;color:var(--text-muted);margin-bottom:4px}
.wl-empty-sub{font-size:10px;color:var(--text-muted);font-family:var(--font-mono);opacity:0.6}

/* List card header */
.wl-list-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border-dim);background:linear-gradient(90deg,rgba(0,255,136,0.015),transparent)}
.wl-list-name{font-size:15px;font-weight:800;color:#fff;letter-spacing:0.5px}
.wl-list-meta{font-size:9px;color:var(--text-muted);font-family:var(--font-mono);margin-left:8px}

/* Column header */
.wl-thead{display:grid;grid-template-columns:36px 1fr 120px 200px 180px;padding:0;background:rgba(0,255,136,0.02);border-bottom:1px solid var(--border-dim)}
.wl-th{padding:8px 10px;font-size:8px;font-weight:700;font-family:var(--font-mono);color:var(--text-muted);letter-spacing:1px;text-transform:uppercase}

/* Responsive */
@media(max-width:900px){.wl-row,.wl-thead{grid-template-columns:30px 1fr 100px 160px 140px}.wl-btn{padding:3px 6px;font-size:7px}}
</style>
</head>
<body>
<div id="root"></div>
<script src="scripts/tradedge-watchlist.js"></script>
<script type="text/babel">
const {useState, useEffect, useMemo, useRef, useCallback, Fragment} = React;

const TEChart = ({symbol, prices}) => {
  const canvasRef = useRef(null);
  const [viewStart, setViewStart] = useState(null);
  const [viewCount, setViewCount] = useState(120);
  const [crosshair, setCrosshair] = useState(null);
  const [isDrag, setIsDrag] = useState(false);
  const [dragX, setDragX] = useState(null);
  const [showEMA, setShowEMA] = useState({e20:true,e50:true,e200:true});
  const [hoverBar, setHoverBar] = useState(null);

  const priceData = useMemo(() => {
    if (!prices || !prices.length) return [];
    return prices;
  }, [prices]);

  const start = viewStart ?? Math.max(0, priceData.length - viewCount);
  const visible = priceData.slice(start, start + viewCount);

  const closes = useMemo(() => priceData.map(d => d.c), [priceData]);
  const ema20 = useMemo(() => closes.length >= 20 ? calcEMA(closes, 20) : [], [closes]);
  const ema50 = useMemo(() => closes.length >= 50 ? calcEMA(closes, 50) : [], [closes]);
  const ema200 = useMemo(() => closes.length >= 200 ? calcEMA(closes, 200) : [], [closes]);

  const draw = useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas || !visible.length) return;
    const ctx = canvas.getContext("2d");
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    const W = rect.width, H = 480;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + "px"; canvas.style.height = H + "px";
    ctx.scale(dpr, dpr);

    const padL = 62, padR = 10, padT = 10, padB = 22;
    const volH = 72, chartH = H - padT - padB - volH - 8;
    const chartW = W - padL - padR, barW = chartW / viewCount;

    // Price range with EMAs
    let allH = visible.map(d => d.h), allL = visible.map(d => d.l);
    for (let i = 0; i < visible.length; i++) {
      const gi = start + i;
      if (showEMA.e20 && gi < ema20.length) { allH.push(ema20[gi]); allL.push(ema20[gi]); }
      if (showEMA.e50 && gi < ema50.length) { allH.push(ema50[gi]); allL.push(ema50[gi]); }
      if (showEMA.e200 && gi < ema200.length) { allH.push(ema200[gi]); allL.push(ema200[gi]); }
    }
    const pMax = Math.max(...allH) * 1.005, pMin = Math.min(...allL) * 0.995, pRng = pMax - pMin || 1;
    const toY = (p) => padT + (1 - (p - pMin) / pRng) * chartH;
    const toX = (i) => padL + i * barW + barW / 2;
    const maxVol = Math.max(...visible.map(d => d.v)) || 1;
    const volTop = padT + chartH + 8;
    const toVolY = (v) => volTop + volH - (v / maxVol) * volH;

    // Clear
    ctx.fillStyle = "#06080c"; ctx.fillRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = "rgba(0,255,136,0.04)"; ctx.lineWidth = 0.5;
    for (let i = 0; i <= 6; i++) {
      const p = pMin + pRng * i / 6, y = toY(p);
      ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
      ctx.fillStyle = "#334"; ctx.font = "10px 'JetBrains Mono',monospace"; ctx.textAlign = "right";
      ctx.fillText(p.toFixed(1), padL - 6, y + 3);
    }

    // Date labels
    ctx.fillStyle = "#334"; ctx.font = "9px 'JetBrains Mono',monospace"; ctx.textAlign = "center";
    const dStep = Math.max(1, Math.floor(viewCount / 8));
    for (let i = 0; i < visible.length; i += dStep) {
      const x = toX(i), dt = visible[i].date || "";
      if (dt) { const p = dt.split("-"); ctx.fillText(p[2]+"/"+p[1], x, H - 4); }
      ctx.strokeStyle = "rgba(0,255,136,0.02)";
      ctx.beginPath(); ctx.moveTo(x, padT); ctx.lineTo(x, padT + chartH); ctx.stroke();
    }

    // Volume
    for (let i = 0; i < visible.length; i++) {
      const b = visible[i], x = toX(i), bull = b.c >= b.o;
      ctx.fillStyle = bull ? "rgba(0,204,102,0.25)" : "rgba(238,51,68,0.25)";
      ctx.fillRect(x - barW * 0.35, toVolY(b.v), barW * 0.7, volTop + volH - toVolY(b.v));
    }
    ctx.fillStyle = "#223"; ctx.font = "8px monospace"; ctx.textAlign = "right";
    ctx.fillText(fmtVol(maxVol), padL - 6, volTop + 8);

    // EMAs
    const drawEMA = (ed, col) => {
      ctx.strokeStyle = col; ctx.lineWidth = 1.2; ctx.beginPath(); let s = false;
      for (let i = 0; i < visible.length; i++) {
        const gi = start + i; if (gi >= ed.length) break;
        const x = toX(i), y = toY(ed[gi]);
        if (!s) { ctx.moveTo(x, y); s = true; } else ctx.lineTo(x, y);
      } ctx.stroke();
    };
    if (showEMA.e200 && ema200.length) drawEMA(ema200, "#ff6644");
    if (showEMA.e50 && ema50.length) drawEMA(ema50, "#ffaa00");
    if (showEMA.e20 && ema20.length) drawEMA(ema20, "#00bbff");

    // HLC Bars
    for (let i = 0; i < visible.length; i++) {
      const b = visible[i], x = toX(i), bull = b.c >= b.o;
      const col = bull ? "#00cc66" : "#ee3344";
      // H-L line
      ctx.strokeStyle = col; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x, toY(b.h)); ctx.lineTo(x, toY(b.l)); ctx.stroke();
      // Close tick right
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(x, toY(b.c)); ctx.lineTo(x + barW * 0.35, toY(b.c)); ctx.stroke();
    }

    // Crosshair
    if (crosshair) {
      const {x: mx, y: my} = crosshair;
      if (mx >= padL && mx <= W - padR) {
        ctx.strokeStyle = "rgba(0,255,136,0.2)"; ctx.lineWidth = 0.5; ctx.setLineDash([3,3]);
        ctx.beginPath(); ctx.moveTo(mx, padT); ctx.lineTo(mx, H - padB); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(padL, my); ctx.lineTo(W - padR, my); ctx.stroke();
        ctx.setLineDash([]);
        // Price label
        if (my >= padT && my <= padT + chartH) {
          const pr = pMax - ((my - padT) / chartH) * pRng;
          ctx.fillStyle = "#0a1520"; ctx.fillRect(0, my - 9, padL - 2, 18);
          ctx.strokeStyle = "#00ff88"; ctx.lineWidth = 0.5; ctx.strokeRect(0, my - 9, padL - 2, 18);
          ctx.fillStyle = "#00ff88"; ctx.font = "bold 9px 'JetBrains Mono',monospace"; ctx.textAlign = "right";
          ctx.fillText(pr.toFixed(2), padL - 6, my + 3);
        }
        // Date label
        const bi = Math.round((mx - padL) / barW - 0.5);
        if (bi >= 0 && bi < visible.length) {
          const dx = toX(bi), ds = visible[bi].date || "";
          ctx.fillStyle = "#0a1520"; ctx.fillRect(dx - 32, H - padB, 64, padB);
          ctx.strokeStyle = "#00ff88"; ctx.strokeRect(dx - 32, H - padB, 64, padB);
          ctx.fillStyle = "#00ff88"; ctx.font = "bold 8px 'JetBrains Mono',monospace"; ctx.textAlign = "center";
          ctx.fillText(ds, dx, H - 8);
        }
      }
    }

    // Legend
    ctx.fillStyle = "#ddd"; ctx.font = "bold 13px 'Outfit',sans-serif"; ctx.textAlign = "left";
    ctx.fillText("NSE:" + symbol, padL + 4, padT + 16);

    const hb = hoverBar || visible[visible.length - 1];
    if (hb) {
      const iy = padT + 32; const bc = hb.c >= hb.o ? "#00cc66" : "#ee3344";
      ctx.font = "11px 'JetBrains Mono',monospace";
      ctx.fillStyle = "#667"; ctx.fillText("O ", padL + 4, iy);
      ctx.fillStyle = bc; ctx.fillText(hb.o?.toFixed(2), padL + 20, iy);
      ctx.fillStyle = "#667"; ctx.fillText("H ", padL + 88, iy);
      ctx.fillStyle = bc; ctx.fillText(hb.h?.toFixed(2), padL + 104, iy);
      ctx.fillStyle = "#667"; ctx.fillText("L ", padL + 172, iy);
      ctx.fillStyle = bc; ctx.fillText(hb.l?.toFixed(2), padL + 186, iy);
      ctx.fillStyle = "#667"; ctx.fillText("C ", padL + 254, iy);
      ctx.fillStyle = bc; ctx.fillText(hb.c?.toFixed(2), padL + 268, iy);
      ctx.fillStyle = "#667"; ctx.fillText("V ", padL + 340, iy);
      ctx.fillStyle = "#aaa"; ctx.fillText(fmtVol(hb.v || 0), padL + 354, iy);
    }

    const ey = padT + 48;
    if (showEMA.e20 && ema20.length) { ctx.fillStyle = "#00bbff"; ctx.font = "10px 'JetBrains Mono',monospace"; ctx.fillText("EMA20: " + (ema20[start + visible.length - 1]?.toFixed(2)||"—"), padL + 4, ey); }
    if (showEMA.e50 && ema50.length) { ctx.fillStyle = "#ffaa00"; ctx.fillText("EMA50: " + (ema50[start + visible.length - 1]?.toFixed(2)||"—"), padL + 140, ey); }
    if (showEMA.e200 && ema200.length) { ctx.fillStyle = "#ff6644"; ctx.fillText("EMA200: " + (ema200[start + visible.length - 1]?.toFixed(2)||"—"), padL + 280, ey); }

    // Separator
    ctx.strokeStyle = "rgba(0,255,136,0.06)"; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(padL, volTop - 4); ctx.lineTo(W - padR, volTop - 4); ctx.stroke();
  }, [visible, viewCount, start, crosshair, showEMA, hoverBar, symbol, ema20, ema50, ema200, priceData]);

  useEffect(() => { draw(); }, [draw]);
  useEffect(() => { const h = () => draw(); window.addEventListener("resize", h); return () => window.removeEventListener("resize", h); }, [draw]);

  const handleMouseMove = (e) => {
    const rect = canvasRef.current?.getBoundingClientRect(); if (!rect) return;
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    setCrosshair({x: mx, y: my});
    const padL = 62, chartW = rect.width - padL - 10, bw = chartW / viewCount;
    const idx = Math.round((mx - padL) / bw - 0.5);
    setHoverBar(idx >= 0 && idx < visible.length ? visible[idx] : null);
    if (isDrag && dragX != null) {
      const delta = e.clientX - dragX, bDelta = Math.round(delta / bw);
      if (Math.abs(bDelta) >= 1) {
        setViewStart(pv => { const s = (pv ?? Math.max(0, priceData.length - viewCount)) - bDelta; return Math.max(0, Math.min(priceData.length - viewCount, s)); });
        setDragX(e.clientX);
      }
    }
  };

  const handleWheel = (e) => {
    e.preventDefault();
    setViewCount(pv => { const n = pv + (e.deltaY > 0 ? 1 : -1) * Math.max(3, Math.floor(pv * 0.1)); return Math.max(20, Math.min(priceData.length, n)); });
  };

  if (!priceData.length) {
    return (
      <div style={{background:"var(--bg-card)",border:"1px solid var(--border-low)",borderRadius:8,padding:40,textAlign:"center"}}>
        <div style={{color:"var(--text-muted)",fontSize:12,marginBottom:8}}>No price data available for chart</div>
        <div style={{display:"flex",gap:6,justifyContent:"center"}}>
          <button onClick={() => window.open(`https://in.tradingview.com/chart/8RFOgQZr/?symbol=NSE%3A${symbol}&interval=D`, 'tradedge_tv')}
            style={{padding:"6px 14px",borderRadius:4,fontSize:11,fontWeight:700,fontFamily:"var(--font-mono)",cursor:"pointer",border:"1px solid rgba(0,200,255,0.3)",background:"rgba(0,200,255,0.08)",color:"#00c8ff"}}>
            ⭐ Open in TradingView Pro
          </button>
          <button onClick={() => window.open(`https://zone.definedge.com/chart/NSE/${symbol}/pf`, '_blank')}
            style={{padding:"6px 14px",borderRadius:4,fontSize:11,fontWeight:700,fontFamily:"var(--font-mono)",cursor:"pointer",border:"1px solid rgba(136,68,255,0.3)",background:"rgba(136,68,255,0.08)",color:"#8844ff"}}>
            🔷 Definedge P&F
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={{background:"var(--bg-card)",borderRadius:10,border:"1px solid var(--border-low)",overflow:"hidden"}}>
      {/* Toolbar */}
      <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",background:"var(--bg-secondary)",borderBottom:"1px solid var(--border-dim)",flexWrap:"wrap"}}>
        <a href="index.html" style={{display:"flex",alignItems:"center"}}><img src="assets/logo.jpeg" alt="TradEdge" style={{height:100,marginRight:16,animation:"logoPulse 3s ease-in-out infinite"}}/></a>

        {[{k:"e20",l:"EMA 20",c:"#00bbff"},{k:"e50",l:"EMA 50",c:"#ffaa00"},{k:"e200",l:"EMA 200",c:"#ff6644"}].map(em => (
          <button key={em.k} onClick={() => setShowEMA(p => ({...p,[em.k]:!p[em.k]}))}
            style={{padding:"2px 8px",borderRadius:3,fontSize:9,fontWeight:700,fontFamily:"var(--font-mono)",cursor:"pointer",
              border:`1px solid ${showEMA[em.k]?em.c+"55":"var(--border-dim)"}`,

        {/* External links */}

            style={{padding:"2px 8px",borderRadius:3,fontSize:9,fontWeight:700,fontFamily:"var(--font-mono)",cursor:"pointer",border:"1px solid rgba(0,200,255,0.2)",background:"transparent",color:"#00c8ff"}}>
            ⭐ TV Pro
          </button>
          <button onClick={() => window.open(`https://zone.definedge.com/chart/NSE/${symbol}/pf`, '_blank')}
            style={{padding:"2px 8px",borderRadius:3,fontSize:9,fontWeight:700,fontFamily:"var(--font-mono)",cursor:"pointer",border:"1px solid rgba(136,68,255,0.2)",background:"transparent",color:"#8844ff"}}>
            🔷 P&F
          </button>
          <button onClick={() => window.open(`https://zone.definedge.com/chart/NSE/${symbol}/renko`, '_blank')}
            style={{padding:"2px 8px",borderRadius:3,fontSize:9,fontWeight:700,fontFamily:"var(--font-mono)",cursor:"pointer",border:"1px solid rgba(136,68,255,0.2)",background:"transparent",color:"#8844ff"}}>
            🔷 Renko

      {/* Canvas */}
      <div style={{cursor:isDrag?"grabbing":"crosshair"}}>

          onMouseMove={handleMouseMove}

          onMouseDown={(e) => { setIsDrag(true); setDragX(e.clientX); }}
          onMouseUp={() => { setIsDrag(false); setDragX(null); }}
          onWheel={handleWheel}

      {/* Bottom bar */}

        <span style={{color:"var(--accent)"}}>◈ TradEdge — Zero External Dependencies</span>
      </div>
    </div>
  );
};

const OrderDialog = ({symbol, type, onClose, lastPrice}) => {
  const [qty, setQty] = useState(1);
  const [price, setPrice] = useState(lastPrice || 0);
  const [triggerPrice, setTriggerPrice] = useState(0);
  const [orderType, setOrderType] = useState(type === "GTT" ? "LIMIT" : "MARKET");
  const [product, setProduct] = useState("CNC");
  const [gttTarget, setGttTarget] = useState(0);
  const [gttSL, setGttSL] = useState(0);
  const [submitting, setSubmitting] = useState(false);
  const [result, setResult] = useState(null);
  const txnType = (type === "SELL" || type === "SL") ? "SELL" : "BUY";
  const colors = {BUY:"var(--accent)",SELL:"var(--red)",SL:"var(--amber)",GTT:"var(--accent3)"};
  
  const submit = async () => {
    const w = localStorage.getItem("zd_worker_url");
    if (!w) { alert("Set zd_worker_url"); return; }
    setSubmitting(true);
    const h = {"Content-Type":"application/json", "Authorization": localStorage.getItem("kite_auth") || ""};
    let res;
    try {
      if (type === "GTT") {
        h["X-Kite-Action"] = "gtt-place";
        const r = await fetch(w, {method:"POST", headers:h, body:JSON.stringify({
          type:"two-leg", condition:{exchange:"NSE",tradingsymbol:symbol,trigger_values:[gttTarget,gttSL],last_price:lastPrice},
          orders:[{exchange:"NSE",tradingsymbol:symbol,transaction_type:"SELL",quantity:qty,price:gttTarget,order_type:"LIMIT",product},
                  {exchange:"NSE",tradingsymbol:symbol,transaction_type:"SELL",quantity:qty,price:gttSL,order_type:"LIMIT",product}]
        })});
        res = await r.json();
      } else {
        h["X-Kite-Action"] = "place-order";
        const r = await fetch(w, {method:"POST", headers:h, body:JSON.stringify({
          tradingsymbol:symbol,exchange:"NSE",transaction_type:txnType,order_type:orderType,quantity:qty,product,
          price:orderType==="LIMIT"?price:0,trigger_price:(orderType==="SL"||orderType==="SL-M")?triggerPrice:0
        })});
        res = await r.json();
      }
    } catch(e) { res = {error: e.message}; }
    setResult(res); setSubmitting(false);
  };

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.8)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>
      <div style={{background:"var(--bg-secondary)",border:"1px solid var(--border-med)",borderRadius:10,padding:20,width:380}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
          <div><span style={{fontSize:16,fontWeight:800,color:"#fff"}}>{symbol}</span>
            <span style={{fontSize:11,color:colors[type],fontWeight:700,marginLeft:8,padding:"2px 8px",background:colors[type]+"22",borderRadius:4}}>{type}</span></div>
          <button style={{background:"none",border:"none",color:"var(--text-muted)",fontSize:18,cursor:"pointer"}} onClick={onClose}>x</button>
        </div>
        {result ? (
          <div style={{textAlign:"center",padding:12}}>
            <div style={{fontSize:13,fontWeight:700,color:result.data||result.status==="success"?"var(--accent)":"var(--red)",marginBottom:8}}>{result.data||result.status==="success"?"Order Placed!":"Failed"}</div>
            <pre style={{fontSize:8,color:"var(--text-muted)",fontFamily:"var(--font-mono)",background:"var(--bg-card)",padding:8,borderRadius:4,textAlign:"left",maxHeight:80,overflow:"auto"}}>{JSON.stringify(result,null,2)}</pre>
            <button className="ob ob-i" style={{marginTop:10,padding:"5px 16px",fontSize:10}} onClick={onClose}>Close</button>
          </div>
        ) : (
          <div>
            {type !== "GTT" ? (
              <Fragment>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                  <label style={{fontSize:9,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>Type
                    <select value={orderType} onChange={e=>setOrderType(e.target.value)} style={{display:"block",width:"100%",padding:"4px 6px",marginTop:3,background:"var(--bg-card)",border:"1px solid var(--border-low)",color:"#fff",borderRadius:4,fontSize:10,fontFamily:"var(--font-mono)"}}>
                      <option value="MARKET">MARKET</option><option value="LIMIT">LIMIT</option><option value="SL">SL</option><option value="SL-M">SL-M</option>
                    </select></label>
                  <label style={{fontSize:9,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>Product
                    <select value={product} onChange={e=>setProduct(e.target.value)} style={{display:"block",width:"100%",padding:"4px 6px",marginTop:3,background:"var(--bg-card)",border:"1px solid var(--border-low)",color:"#fff",borderRadius:4,fontSize:10,fontFamily:"var(--font-mono)"}}>
                      <option value="CNC">CNC</option><option value="MIS">MIS</option>
                    </select></label>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                  <label style={{fontSize:9,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>Qty
                    <input type="number" value={qty} onChange={e=>setQty(parseInt(e.target.value)||1)} style={{display:"block",width:"100%",padding:"4px 6px",marginTop:3,background:"var(--bg-card)",border:"1px solid var(--border-low)",color:"#fff",borderRadius:4,fontSize:10,fontFamily:"var(--font-mono)"}}/></label>
                  {orderType!=="MARKET" && <label style={{fontSize:9,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>Price
                    <input type="number" value={price} onChange={e=>setPrice(parseFloat(e.target.value)||0)} step={0.05} style={{display:"block",width:"100%",padding:"4px 6px",marginTop:3,background:"var(--bg-card)",border:"1px solid var(--border-low)",color:"#fff",borderRadius:4,fontSize:10,fontFamily:"var(--font-mono)"}}/></label>}
                </div>
                {(orderType==="SL"||orderType==="SL-M") && <label style={{fontSize:9,color:"var(--text-muted)",fontFamily:"var(--font-mono)",display:"block",marginBottom:8}}>Trigger Price
                  <input type="number" value={triggerPrice} onChange={e=>setTriggerPrice(parseFloat(e.target.value)||0)} step={0.05} style={{display:"block",width:"100%",padding:"4px 6px",marginTop:3,background:"var(--bg-card)",border:"1px solid var(--border-low)",color:"#fff",borderRadius:4,fontSize:10,fontFamily:"var(--font-mono)"}}/></label>}
              </Fragment>
            ) : (
              <div style={{marginBottom:8}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                  <label style={{fontSize:9,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>Qty<input type="number" value={qty} onChange={e=>setQty(parseInt(e.target.value)||1)} style={{display:"block",width:"100%",padding:"4px 6px",marginTop:3,background:"var(--bg-card)",border:"1px solid var(--border-low)",color:"#fff",borderRadius:4,fontSize:10,fontFamily:"var(--font-mono)"}}/></label>
                  <label style={{fontSize:9,color:"var(--accent)",fontFamily:"var(--font-mono)"}}>Target<input type="number" value={gttTarget} onChange={e=>setGttTarget(parseFloat(e.target.value)||0)} style={{display:"block",width:"100%",padding:"4px 6px",marginTop:3,background:"var(--bg-card)",border:"1px solid var(--accent)",color:"var(--accent)",borderRadius:4,fontSize:10,fontFamily:"var(--font-mono)"}}/></label>
                  <label style={{fontSize:9,color:"var(--red)",fontFamily:"var(--font-mono)"}}>SL<input type="number" value={gttSL} onChange={e=>setGttSL(parseFloat(e.target.value)||0)} style={{display:"block",width:"100%",padding:"4px 6px",marginTop:3,background:"var(--bg-card)",border:"1px solid var(--red)",color:"var(--red)",borderRadius:4,fontSize:10,fontFamily:"var(--font-mono)"}}/></label>
                </div>
                <div style={{fontSize:8,color:"var(--text-muted)",fontFamily:"var(--font-mono)",marginTop:4}}>GTT OCO: Sells at Target OR SL</div>
              </div>
            )}
            <button style={{width:"100%",padding:"7px",fontSize:11,fontWeight:800,fontFamily:"var(--font-mono)",background:colors[type],color:"#000",border:"none",borderRadius:5,cursor:"pointer"}}
              onClick={submit} disabled={submitting}>{submitting?"Placing...":type==="GTT"?"Place GTT":txnType+" "+symbol}</button>
          </div>
        )}
      </div>
    </div>
  );
};

const StockRow=({s,active,isExp,isEd,onExpand,onEdit,onSaveEdit,onOrder,onRemove,chartData,chartFailed,setRefresh})=>{
  const t=s.trade||{};
  const risk=t.entry&&t.sl?Math.abs(t.entry-t.sl):0;
  const reward=t.entry&&t.target?Math.abs(t.target-t.entry):0;
  const rr=risk>0&&reward>0?(reward/risk):0;
  const rrClass=rr>=2?'good':rr>=1?'ok':'bad';
  const statusClass=(t.status||'watching').toLowerCase();

  return(<div style={{borderBottom:'1px solid rgba(255,255,255,0.02)'}}>
    {/* Row */}
    <div style={{display:'flex',alignItems:'center',gap:0,padding:'8px 0',cursor:'pointer',transition:'background .12s',background:isExp?'rgba(0,255,136,0.025)':'transparent'}}
      className="fade-in"
      onClick={()=>onExpand(isExp?null:s.symbol)}
      onMouseEnter={e=>{if(!isExp)e.currentTarget.style.background='rgba(0,255,136,0.015)'}}
      onMouseLeave={e=>{if(!isExp)e.currentTarget.style.background='transparent'}}>

      {/* Expand toggle */}
      <div style={{width:36,textAlign:'center',color:isExp?'var(--accent)':'var(--text-muted)',fontSize:10,transition:'transform .15s',transform:isExp?'rotate(90deg)':'',flexShrink:0}}>▶</div>

      {/* Symbol + Sector + Source */}
      <div style={{flex:'1 1 auto',padding:'0 8px',minWidth:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          <span className="wl-sym">{s.symbol}</span>
          <span className={`wl-status ${statusClass}`}>{(t.status||'WATCHING').toUpperCase()}</span>
          <span className="wl-source">{s.source||'manual'}</span>
        </div>
        <span className="wl-sector">{s.sector||'—'}</span>
      </div>

      {/* Trade Plan (E/T/SL + R:R) */}
      <div style={{flex:'0 0 auto',padding:'0 10px',display:'flex',alignItems:'center'}}>
        {t.entry||t.target||t.sl?(
          <div className="wl-plan">
            {t.entry&&<div className="wl-plan-item"><span className="wl-plan-label">ENTRY</span><span className="wl-plan-val entry">₹{t.entry}</span></div>}
            {t.target&&<div className="wl-plan-item"><span className="wl-plan-label">TGT</span><span className="wl-plan-val target">₹{t.target}</span></div>}
            {t.sl&&<div className="wl-plan-item"><span className="wl-plan-label">SL</span><span className="wl-plan-val sl">₹{t.sl}</span></div>}
            {rr>0&&<span className={`wl-rr ${rrClass}`}>{rr.toFixed(1)}R</span>}
            {t.qty&&<div className="wl-plan-item"><span className="wl-plan-label">QTY</span><span className="wl-plan-val" style={{color:'var(--text-secondary)'}}>{t.qty}</span></div>}
          </div>
        ):(
          <span style={{fontSize:9,color:'var(--text-muted)',fontFamily:'var(--font-mono)',opacity:0.4}}>No plan</span>
        )}
      </div>

      {/* Orders / Edit */}
      <div style={{flex:'0 0 auto',padding:'0 10px',display:'flex',alignItems:'center'}} onClick={e=>e.stopPropagation()}>
        {isEd?(
          <div style={{display:'flex',gap:3,alignItems:'center'}}>
            <input type="number" defaultValue={t.entry||""} id={"e"+s.symbol} placeholder="Entry" style={{width:58,fontSize:9,background:'var(--bg-hover)',border:'1px solid rgba(0,255,136,0.2)',color:'var(--accent)',borderRadius:4,padding:'4px 5px',fontFamily:'var(--font-mono)'}}/>
            <input type="number" defaultValue={t.target||""} id={"t"+s.symbol} placeholder="Tgt" style={{width:58,fontSize:9,background:'var(--bg-hover)',border:'1px solid rgba(0,200,255,0.2)',color:'var(--accent2)',borderRadius:4,padding:'4px 5px',fontFamily:'var(--font-mono)'}}/>
            <input type="number" defaultValue={t.sl||""} id={"s"+s.symbol} placeholder="SL" style={{width:58,fontSize:9,background:'var(--bg-hover)',border:'1px solid rgba(255,68,85,0.2)',color:'var(--red)',borderRadius:4,padding:'4px 5px',fontFamily:'var(--font-mono)'}}/>
            <input type="number" defaultValue={t.qty||""} id={"q"+s.symbol} placeholder="Qty" style={{width:40,fontSize:9,background:'var(--bg-hover)',border:'1px solid var(--border-low)',color:'#fff',borderRadius:4,padding:'4px 5px',fontFamily:'var(--font-mono)'}}/>
            <button className="wl-btn buy" onClick={()=>onSaveEdit(s.symbol)}>Save</button>
          </div>
        ):(
          <div className="wl-orders">
            <button className="wl-btn edit" onClick={()=>onEdit(s.symbol)}>Edit</button>
            <button className="wl-btn buy" onClick={()=>onOrder({symbol:s.symbol,type:'BUY',price:t.entry||0})}>BUY</button>
            <button className="wl-btn sell" onClick={()=>onOrder({symbol:s.symbol,type:'SELL',price:t.entry||0})}>SELL</button>
            <button className="wl-btn sl" onClick={()=>onOrder({symbol:s.symbol,type:'SL',price:t.sl||0})}>SL</button>
            <button className="wl-btn gtt" onClick={()=>onOrder({symbol:s.symbol,type:'GTT',price:t.entry||0})}>GTT</button>
            <button className="wl-btn del" onClick={()=>onRemove(s.symbol)}>×</button>
          </div>
        )}
      </div>
    </div>

    {/* Expanded chart — full width below the row */}
    {isExp&&<div className="wl-chart-wrap">
      {chartData[s.symbol]?(<ChartErrorBoundary symbol={s.symbol}><TEChart symbol={s.symbol} prices={chartData[s.symbol]} onOrder={onOrder} onCollapse={()=>onExpand(null)}/></ChartErrorBoundary>
      ):(<div style={{padding:24,textAlign:'center'}}>
        {!chartFailed[s.symbol]&&<div><div style={{width:20,height:20,border:'2px solid var(--border-low)',borderTop:'2px solid var(--accent)',borderRadius:'50%',animation:'spin .8s linear infinite',margin:'0 auto 8px'}}/><div style={{fontSize:9,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>Loading {s.symbol}...</div></div>}
        {chartFailed[s.symbol]&&<div style={{fontSize:10,color:'var(--text-muted)',fontFamily:'var(--font-mono)',marginBottom:8}}>No data for <b style={{color:'#fff'}}>{s.symbol}</b></div>}
        <div style={{display:'flex',gap:5,justifyContent:'center',marginTop:8}}>
          <button onClick={()=>window.open(`https://in.tradingview.com/chart/8RFOgQZr/?symbol=NSE%3A${s.symbol}&interval=D`,'tradedge_tv')} className="ob ob-i" style={{padding:'4px 10px',fontSize:9}}>TV Pro</button>
          <button onClick={()=>window.open(`https://zone.definedge.com/chart/NSE/${s.symbol}/pf`,'_blank')} className="ob ob-g" style={{padding:'4px 10px',fontSize:9}}>P&F</button>
          <button onClick={()=>window.open(`https://zone.definedge.com/chart/NSE/${s.symbol}/renko`,'_blank')} className="ob ob-g" style={{padding:'4px 10px',fontSize:9}}>Renko</button>
        </div>
      </div>)}
    </div>}
  </div>);
};

const WatchlistDashboard=()=>{
  const[lists,setLists]=useState([]);const[activeList,setActiveList]=useState(null);const[refresh,setRefresh]=useState(0);
  const[editingTrade,setEditingTrade]=useState(null);const[expandedStock,setExpandedStock]=useState(null);
  const[chartData,setChartData]=useState({});const[chartFailed,setChartFailed]=useState({});const[orderDialog,setOrderDialog]=useState(null);

  useEffect(()=>{if(window.teWatchlist)setLists(window.teWatchlist.getLists())},[refresh]);
  useEffect(()=>{if(!expandedStock||chartData[expandedStock]||chartFailed[expandedStock])return;
    const ac=new AbortController();const to=setTimeout(()=>ac.abort(),5000);
    fetch("./data/stock_details/"+expandedStock+".json?t="+Date.now(),{signal:ac.signal})
      .then(r=>r.ok?r.json():null).then(d=>{clearTimeout(to);if(d?.price_history?.length)setChartData(p=>({...p,[expandedStock]:d.price_history}));else setChartFailed(p=>({...p,[expandedStock]:true}))})
      .catch(()=>{clearTimeout(to);setChartFailed(p=>({...p,[expandedStock]:true}))});
    return()=>{clearTimeout(to);ac.abort()}},[expandedStock]);

  const active=activeList?lists.find(l=>l.id===activeList):lists[0];

  const handleSaveEdit=(sym)=>{
    const en=+(document.getElementById("e"+sym)?.value)||null;
    const tg=+(document.getElementById("t"+sym)?.value)||null;
    const sl=+(document.getElementById("s"+sym)?.value)||null;
    const qt=parseInt(document.getElementById("q"+sym)?.value)||0;
    window.teWatchlist.updateTrade(active.id,sym,{entry:en,target:tg,sl:sl,qty:qt,status:en?"active":"watching"});
    setEditingTrade(null);setRefresh(r=>r+1);
  };

  // Stats for active list
  const stats=useMemo(()=>{
    if(!active)return{total:0,active:0,watching:0,withPlan:0};
    const stks=active.stocks;
    return{total:stks.length,active:stks.filter(s=>s.trade?.status==='active').length,
      watching:stks.filter(s=>!s.trade?.status||s.trade.status==='watching').length,
      withPlan:stks.filter(s=>s.trade?.entry).length};
  },[active]);

  return(<div>
    <nav className="nav">
      <a href="index.html" style={{display:"flex",alignItems:"center"}}><img src="assets/logo.jpeg" alt="TE" style={{height:100,marginRight:16,animation:"logoPulse 3s ease-in-out infinite"}}/></a>
      <a href="scanner.html" className="nav-link">Scanner</a><a href="sectors.html" className="nav-link">Sectors</a><a href="rrg.html" className="nav-link">RRG</a><a href="matrix.html" className="nav-link">Matrix</a><a href="mps.html" className="nav-link">MPS</a><a href="index.html" className="nav-link">Journal</a><a href="#" className="nav-link active">Watchlist</a>
    </nav>

    <div style={{maxWidth:1440,margin:"0 auto",padding:"0 20px"}}>
      {/* Header */}
      <div className="wl-header">
        <div>
          <div className="wl-title">WATCHLISTS</div>
          <div className="wl-subtitle">{lists.length} lists | HLC · OHLC · Line · P&F · Renko | Right-click chart → Trade</div>
        </div>
        <div style={{display:'flex',gap:6}}>
          <button className="wl-btn buy" style={{padding:'6px 14px',fontSize:10}} onClick={()=>{const n=prompt("Name:");if(n){window.teWatchlist.createList(n);setRefresh(r=>r+1)}}}>+ New</button>
          <button className="wl-btn" style={{padding:'6px 14px',fontSize:10,background:'rgba(0,200,255,0.08)',borderColor:'rgba(0,200,255,0.2)',color:'var(--accent2)'}} onClick={async()=>{await window.teWatchlist.sync();await window.teWatchlist.pullFromCloud();setLists(window.teWatchlist.getLists());setRefresh(r=>r+1)}}>☁ Sync</button>
        </div>
      </div>

      {/* Tabs */}
      <div className="wl-tabs">
        {lists.map(l=><button key={l.id} className={`wl-tab ${active?.id===l.id?'active':''}`} onClick={()=>{setActiveList(l.id);setExpandedStock(null);setEditingTrade(null)}}>
          {l.name}<span className="wl-tab-count">({l.stocks.length})</span>
        </button>)}
      </div>

      {active?(
        <div className="card" style={{borderRadius:10}}>
          {/* List header */}
          <div className="wl-list-header">
            <div style={{display:'flex',alignItems:'center'}}>
              <span className="wl-list-name">{active.name}</span>
              <span className="wl-list-meta">{stats.total} stocks · {stats.active} active · {stats.withPlan} with plan</span>
            </div>
            <div style={{display:'flex',gap:4}}>
              <button className="wl-btn buy" onClick={()=>{const s=prompt("Symbol:");if(s){window.teWatchlist.addStock(active.id,{symbol:s.toUpperCase(),source:"manual"});setRefresh(r=>r+1)}}}>+ Add</button>
              <button className="wl-btn edit" onClick={()=>{const n=prompt("Rename:",active.name);if(n){window.teWatchlist.renameList(active.id,n);setRefresh(r=>r+1)}}}>Rename</button>
              <button className="wl-btn del" style={{fontSize:8}} onClick={()=>{if(confirm("Delete '"+active.name+"'?")){window.teWatchlist.deleteList(active.id);setActiveList(null);setRefresh(r=>r+1)}}}>Delete</button>
            </div>
          </div>

          {/* Column headers */}
          <div style={{display:'flex',alignItems:'center',padding:'8px 0',background:'rgba(0,255,136,0.02)',borderBottom:'1px solid var(--border-dim)'}}>
            <div style={{width:36,textAlign:'center',fontSize:8,fontWeight:700,fontFamily:'var(--font-mono)',color:'var(--text-muted)',letterSpacing:1}}></div>
            <div style={{flex:'1 1 auto',padding:'0 8px',fontSize:8,fontWeight:700,fontFamily:'var(--font-mono)',color:'var(--text-muted)',letterSpacing:1}}>SYMBOL</div>
            <div style={{flex:'0 0 auto',padding:'0 10px',fontSize:8,fontWeight:700,fontFamily:'var(--font-mono)',color:'var(--text-muted)',letterSpacing:1}}>TRADE PLAN</div>
            <div style={{flex:'0 0 auto',padding:'0 10px',fontSize:8,fontWeight:700,fontFamily:'var(--font-mono)',color:'var(--text-muted)',letterSpacing:1}}>ORDERS</div>
          </div>

          {/* Stock rows */}
          {active.stocks.map((s,i)=>(
            <StockRow key={s.symbol+i} s={s} active={active} isExp={expandedStock===s.symbol} isEd={editingTrade===s.symbol}
              onExpand={setExpandedStock} onEdit={setEditingTrade} onSaveEdit={handleSaveEdit}
              onOrder={setOrderDialog} onRemove={sym=>{window.teWatchlist.removeStock(active.id,sym);setRefresh(r=>r+1)}}
              chartData={chartData} chartFailed={chartFailed} setRefresh={setRefresh}/>
          ))}

          {active.stocks.length===0&&<div className="wl-empty"><div className="wl-empty-icon">📋</div><div className="wl-empty-text">Empty watchlist</div><div className="wl-empty-sub">Add stocks manually or save a scan from the Scanner page</div></div>}
        </div>
      ):(<div className="wl-empty"><div className="wl-empty-icon">📋</div><div className="wl-empty-text">No Watchlists</div><div className="wl-empty-sub">Create a new watchlist to get started</div></div>)}

      {/* Footer */}
      <div style={{padding:'14px 0',marginTop:12,borderTop:'1px solid var(--border-dim)',display:'flex',justifyContent:'space-between',fontSize:8,fontFamily:'var(--font-mono)',color:'var(--text-muted)',letterSpacing:0.5}}>
        <span>TRADEDGE WATCHLIST v4.0 · HLC·OHLC·Line·P&F·Renko · Keyboard: H T F R M P</span>
        <span style={{color:'var(--accent)'}}>◈ CYBERPUNK EDITION</span>
      </div>
    </div>
    {orderDialog&&<OrderDialog symbol={orderDialog.symbol} type={orderDialog.type} lastPrice={orderDialog.price} onClose={()=>setOrderDialog(null)}/>}
  </div>);
};

ReactDOM.createRoot(document.getElementById("root")).render(<WatchlistDashboard/>);
</script>
</body>
</html>
