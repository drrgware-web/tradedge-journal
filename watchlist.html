<script type="text/babel">
const {useState,useEffect,useMemo,useRef,useCallback,Fragment}=React;

// ═══ UTILITIES ═══
if(typeof calcEMA==='undefined'){window.calcEMA=function(c,p){if(!c||c.length<p)return[];const k=2/(p+1);const e=new Array(c.length).fill(0);let s=0;for(let i=0;i<p;i++)s+=c[i];e[p-1]=s/p;for(let i=p;i<c.length;i++)e[i]=c[i]*k+e[i-1]*(1-k);for(let i=0;i<p-1;i++)e[i]=e[p-1];return e}}
if(typeof fmtVol==='undefined'){window.fmtVol=function(v){if(!v)return"0";if(v>=1e9)return(v/1e9).toFixed(1)+"B";if(v>=1e7)return(v/1e7).toFixed(1)+"Cr";if(v>=1e5)return(v/1e5).toFixed(1)+"L";if(v>=1e3)return(v/1e3).toFixed(1)+"K";return v+""}}
const beep=(freq=880,dur=150)=>{try{const a=new(window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator();const g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=freq;g.gain.value=0.12;o.start();o.stop(a.currentTime+dur/1000);setTimeout(()=>a.close(),dur+100)}catch{}};
const logToJournal=(symbol,action,price,qty,meta={})=>{const trades=JSON.parse(localStorage.getItem('te_trades')||'[]');trades.push({id:Date.now(),symbol,action,price,qty,ts:new Date().toISOString(),status:'executed',...meta});localStorage.setItem('te_trades',JSON.stringify(trades))};

class ChartErrorBoundary extends React.Component{

  static getDerivedStateFromError(e){return{error:e.message}}
  render(){if(this.state.error)return React.createElement('div',{style:{padding:20,textAlign:'center',color:'#ff4455',fontSize:10,fontFamily:'var(--font-mono)'}},

  return this.props.children}
}

// ═══ STORAGE ═══
const LS={get:(k,d)=>{try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}},del:k=>{try{localStorage.removeItem(k)}catch{}}};
const CS={
  drawings:s=>LS.get(`te_chart_draw_${s}`,[]),alerts:s=>LS.get(`te_chart_alerts_${s}`,[]),
  plan:s=>LS.get(`te_chart_plan_${s}`,null),posConfig:()=>LS.get('te_chart_pos_config',{capital:100000,riskPct:1}),
  saveDrawings:(s,v)=>LS.set(`te_chart_draw_${s}`,v),saveAlerts:(s,v)=>LS.set(`te_chart_alerts_${s}`,v),
  savePlan:(s,v)=>v?LS.set(`te_chart_plan_${s}`,v):LS.del(`te_chart_plan_${s}`),savePosConfig:v=>LS.set('te_chart_pos_config',v),
};

// ═══════════════════════════════════════════════════════════
// P&F ENGINE — Definedge Method
// High/Low method: X columns use highs, O columns use lows
// Percentage box sizes, 3-box reversal standard
// ═══════════════════════════════════════════════════════════
function buildPnF(ohlc, boxPct=1, reversal=3, method='hl') {
  if (!ohlc || ohlc.length < 2) return { columns: [], boxSize: 0 };
  // Log-scale percentage box: each box = boxPct% of price
  // Definedge uses absolute box at reference price for simplicity
  const refPrice = ohlc[Math.floor(ohlc.length/2)].c; // midpoint reference
  const boxSize = refPrice * boxPct / 100;
  if (boxSize <= 0) return { columns: [], boxSize };

  const toBox = p => Math.floor(p / boxSize);
  const columns = []; // {type:'X'|'O', low:boxNum, high:boxNum, vol:number, startDate, endDate, bars:count}
  
  // Start with first bar direction
  let curType = null, curLow = 0, curHigh = 0, curVol = 0, curStart = '', curBars = 0;
  
  const pushCol = (end) => {
    if (curType) columns.push({ type: curType, low: curLow, high: curHigh, vol: curVol, startDate: curStart, endDate: end, bars: curBars });
  };
  
  for (let i = 0; i < ohlc.length; i++) {
    const bar = ohlc[i];
    const price = method === 'close' ? bar.c : (curType === 'X' ? bar.h : curType === 'O' ? bar.l : bar.c);
    const priceAlt = method === 'close' ? bar.c : (curType === 'X' ? bar.l : curType === 'O' ? bar.h : bar.c);
    const bMain = toBox(price), bAlt = toBox(priceAlt);
    const bh = toBox(bar.h), bl = toBox(bar.l);
    
    if (!curType) {
      // Initialize: determine first direction
      curType = 'X'; curLow = bl; curHigh = bh; curVol = bar.v || 0; curStart = bar.date; curBars = 1;
      continue;
    }
    
    if (curType === 'X') {
      const newHigh = method === 'close' ? toBox(bar.c) : bh;
      const checkRev = method === 'close' ? toBox(bar.c) : bl;
      if (newHigh > curHigh) {
        curHigh = newHigh; curVol += (bar.v || 0); curBars++;
      } else if (curHigh - checkRev >= reversal) {
        // Reversal to O column
        pushCol(ohlc[i-1]?.date || bar.date);
        curType = 'O'; curHigh = curHigh - 1; curLow = checkRev; curVol = bar.v || 0; curStart = bar.date; curBars = 1;
      }
    } else { // O column
      const newLow = method === 'close' ? toBox(bar.c) : bl;
      const checkRev = method === 'close' ? toBox(bar.c) : bh;
      if (newLow < curLow) {
        curLow = newLow; curVol += (bar.v || 0); curBars++;
      } else if (checkRev - curLow >= reversal) {
        // Reversal to X column
        pushCol(ohlc[i-1]?.date || bar.date);
        curType = 'X'; curLow = curLow + 1; curHigh = checkRev; curVol = bar.v || 0; curStart = bar.date; curBars = 1;
      }
    }
  }
  // Push final column
  pushCol(ohlc[ohlc.length - 1].date);
  
  return { columns, boxSize };
}

// P&F SMA — Simple Moving Average of column close prices (10-column SMA)
function pnfSMA(columns, boxSize, period = 10) {
  if (columns.length < period) return [];
  const sma = [];
  for (let i = 0; i < columns.length; i++) {
    if (i < period - 1) { sma.push(null); continue; }
    let sum = 0;
    for (let j = i - period + 1; j <= i; j++) {
      const col = columns[j];
      // Close = high for X, low for O (Definedge convention)
      sum += (col.type === 'X' ? col.high : col.low) * boxSize;
    }
    sma.push(sum / period);
  }
  return sma;
}

// P&F Pattern Detection — Definedge breakout signals
function pnfSignals(columns) {
  const signals = [];
  for (let i = 2; i < columns.length; i++) {
    const c = columns[i], p1 = columns[i-1], p2 = columns[i-2];
    const p3 = columns[i-3], p4 = columns[i-4];
    // Double Top Breakout: X column exceeds previous X column's high
    if (c.type === 'X' && p2 && p2.type === 'X' && c.high > p2.high) {
      signals.push({ col: i, type: 'dbl_top', dir: 'bull', price: c.high });
    }
    // Double Bottom Breakdown: O column goes below previous O column's low
    if (c.type === 'O' && p2 && p2.type === 'O' && c.low < p2.low) {
      signals.push({ col: i, type: 'dbl_bot', dir: 'bear', price: c.low });
    }
    // Triple Top Breakout
    if (c.type === 'X' && p2 && p4 && p2.type === 'X' && p4.type === 'X' && c.high > p2.high && c.high > p4.high) {
      signals.push({ col: i, type: 'triple_top', dir: 'bull', price: c.high });
    }
    // Triple Bottom Breakdown
    if (c.type === 'O' && p2 && p4 && p2.type === 'O' && p4.type === 'O' && c.low < p2.low && c.low < p4.low) {
      signals.push({ col: i, type: 'triple_bot', dir: 'bear', price: c.low });
    }
    // Bullish Catapult: Triple top followed by immediate continuation
    if (i >= 5 && c.type === 'X') {
      const prev = signals.find(s => s.col === i - 2 && s.type === 'triple_top');
      if (prev && c.high > columns[i-2].high) {
        signals.push({ col: i, type: 'bull_catapult', dir: 'bull', price: c.high });
      }
    }
    // Bearish Catapult
    if (i >= 5 && c.type === 'O') {
      const prev = signals.find(s => s.col === i - 2 && s.type === 'triple_bot');
      if (prev && c.low < columns[i-2].low) {
        signals.push({ col: i, type: 'bear_catapult', dir: 'bear', price: c.low });
      }
    }
  }
  return signals;
}

// P&F Vertical Count — Definedge method
// Count boxes in a column × reversal × box_size + base
function pnfVerticalCount(columns, colIdx, boxSize, reversal = 3) {
  if (colIdx < 0 || colIdx >= columns.length) return null;
  const col = columns[colIdx];
  const boxCount = col.high - col.low + 1;
  if (col.type === 'X') {
    return { target: (col.low * boxSize) + (boxCount * reversal * boxSize), dir: 'up', boxes: boxCount, base: col.low * boxSize };
  } else {
    return { target: (col.high * boxSize) - (boxCount * reversal * boxSize), dir: 'down', boxes: boxCount, base: col.high * boxSize };
  }
}

// P&F Horizontal Count — Definedge method
// Count columns in congestion zone × box_size × reversal + base
function pnfHorizontalCount(columns, startCol, endCol, boxSize, reversal = 3) {
  if (startCol < 0 || endCol >= columns.length || startCol > endCol) return null;
  const width = endCol - startCol + 1;
  // Find the base (lowest point in congestion for bullish, highest for bearish)
  let minBox = Infinity, maxBox = -Infinity;
  for (let i = startCol; i <= endCol; i++) {
    minBox = Math.min(minBox, columns[i].low);
    maxBox = Math.max(maxBox, columns[i].high);
  }
  const lastCol = columns[endCol];
  if (lastCol.type === 'X') {
    return { target: (minBox * boxSize) + (width * reversal * boxSize), dir: 'up', width, base: minBox * boxSize };
  } else {
    return { target: (maxBox * boxSize) - (width * reversal * boxSize), dir: 'down', width, base: maxBox * boxSize };
  }
}

// P&F 45° trend lines — bullish support from low, bearish resistance from high
function pnf45Lines(columns) {
  const lines = [];
  // Bullish Support: start from significant lows, go up 1 box per column
  // Bearish Resistance: start from significant highs, go down 1 box per column
  for (let i = 0; i < columns.length; i++) {
    const c = columns[i];
    // Detect reversal points as anchor for 45° lines
    if (c.type === 'X' && i > 0 && columns[i-1].type === 'O') {
      lines.push({ start: i-1, baseBox: columns[i-1].low, dir: 'bull', type: '45_support' });
    }
    if (c.type === 'O' && i > 0 && columns[i-1].type === 'X') {
      lines.push({ start: i-1, baseBox: columns[i-1].high, dir: 'bear', type: '45_resist' });
    }
  }
  // Keep only last 3 of each type
  const bull = lines.filter(l => l.dir === 'bull').slice(-3);
  const bear = lines.filter(l => l.dir === 'bear').slice(-3);
  return [...bull, ...bear];
}

// ═══════════════════════════════════════════════════════════
// RENKO ENGINE — Definedge Method
// Close-based brick construction (Definedge standard)
// Percentage brick sizes
// ═══════════════════════════════════════════════════════════
function buildRenko(ohlc, brickPct = 1) {
  if (!ohlc || ohlc.length < 2) return { bricks: [], brickSize: 0 };
  const refPrice = ohlc[Math.floor(ohlc.length / 2)].c;
  const brickSize = refPrice * brickPct / 100;
  if (brickSize <= 0) return { bricks: [], brickSize };

  const toBrick = p => Math.floor(p / brickSize);
  const bricks = []; // {type:'up'|'down', low:price, high:price, open:price, close:price, vol, date}
  let lastBrickTop = toBrick(ohlc[0].c) * brickSize;
  let lastBrickBot = lastBrickTop - brickSize;
  let lastDir = null;

  for (let i = 1; i < ohlc.length; i++) {
    const close = ohlc[i].c;
    const vol = ohlc[i].v || 0;
    const date = ohlc[i].date;

    if (close >= lastBrickTop + brickSize) {
      // Build up bricks
      while (close >= lastBrickTop + brickSize) {
        const newBot = lastBrickTop;
        const newTop = lastBrickTop + brickSize;
        bricks.push({ type: 'up', low: newBot, high: newTop, open: newBot, close: newTop, vol, date, srcIdx: i });
        lastBrickBot = newBot;
        lastBrickTop = newTop;
        lastDir = 'up';
      }
    } else if (close <= lastBrickBot - brickSize) {
      // Build down bricks
      while (close <= lastBrickBot - brickSize) {
        const newTop = lastBrickBot;
        const newBot = lastBrickBot - brickSize;
        bricks.push({ type: 'down', low: newBot, high: newTop, open: newTop, close: newBot, vol, date, srcIdx: i });
        lastBrickTop = newTop;
        lastBrickBot = newBot;
        lastDir = 'down';
      }
    }
  }
  return { bricks, brickSize };
}

// Renko SMA — Moving average of brick close prices
function renkoSMA(bricks, period) {
  if (bricks.length < period) return [];
  const sma = [];
  for (let i = 0; i < bricks.length; i++) {
    if (i < period - 1) { sma.push(null); continue; }
    let sum = 0;
    for (let j = i - period + 1; j <= i; j++) sum += bricks[j].close;
    sma.push(sum / period);
  }
  return sma;
}

// Renko Vertical Count — Definedge method
// Count consecutive bricks in current swing direction
// Target = base + (count × brick_size) for up, base - (count × brick_size) for down
function renkoVerticalCount(bricks, swingStartIdx, brickSize) {
  if (swingStartIdx < 0 || swingStartIdx >= bricks.length) return null;
  const dir = bricks[swingStartIdx].type;
  let count = 0;
  for (let i = swingStartIdx; i < bricks.length; i++) {
    if (bricks[i].type !== dir) break;
    count++;
  }
  if (dir === 'up') {
    const base = bricks[swingStartIdx].low;
    return { target: base + count * brickSize, dir: 'up', count, base };
  } else {
    const base = bricks[swingStartIdx].high;
    return { target: base - count * brickSize, dir: 'down', count, base };
  }
}

// Renko Horizontal Count — count bricks in congestion zone
function renkoHorizontalCount(bricks, startIdx, endIdx, brickSize) {
  if (startIdx < 0 || endIdx >= bricks.length) return null;
  const width = endIdx - startIdx + 1;
  let minP = Infinity, maxP = -Infinity;
  for (let i = startIdx; i <= endIdx; i++) {
    minP = Math.min(minP, bricks[i].low);
    maxP = Math.max(maxP, bricks[i].high);
  }
  const lastBrick = bricks[endIdx];
  if (lastBrick.type === 'up') return { target: minP + width * brickSize, dir: 'up', width, base: minP };
  return { target: maxP - width * brickSize, dir: 'down', width, base: maxP };
}

// Renko support/resistance from reversal points
function renkoSRZones(bricks) {
  const zones = [];
  for (let i = 1; i < bricks.length; i++) {
    if (bricks[i].type !== bricks[i-1].type) {
      // Reversal point
      const price = bricks[i-1].type === 'up' ? bricks[i-1].high : bricks[i-1].low;
      zones.push({ price, type: bricks[i-1].type === 'up' ? 'resistance' : 'support', idx: i-1 });
    }
  }
  return zones.slice(-10); // Last 10 S/R zones
}

// ═══ POSITION SIZER ═══
const PosSizer=({cfg,onCfg,plan})=>{
  const e=plan?.entry,s=plan?.sl,t=plan?.target;
  const risk=e&&s?Math.abs(e-s):0,reward=e&&t?Math.abs(t-e):0;
  const rr=risk>0&&reward>0?(reward/risk).toFixed(2):"—";
  const ml=cfg.capital*cfg.riskPct/100,qty=risk>0?Math.floor(ml/risk):0;
  const pv=qty*(e||0),cp=cfg.capital>0?((pv/cfg.capital)*100).toFixed(1):0;
  return(
    <div style={{background:"#080c14ee",border:"1px solid var(--border-low)",borderRadius:6,padding:"8px 10px",fontSize:9,fontFamily:"var(--font-mono)",minWidth:190,backdropFilter:"blur(8px)"}}>
      <div style={{fontSize:9,fontWeight:800,color:"var(--accent)",marginBottom:6,letterSpacing:1}}>POSITION SIZER</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,marginBottom:6}}>
        <div><label style={{color:"var(--text-muted)",fontSize:8}}>Capital ₹</label>
          <input type="number" value={cfg.capital} onChange={ev=>onCfg({...cfg,capital:+ev.target.value||0})}
            style={{width:"100%",background:"var(--bg-hover)",border:"1px solid var(--border-dim)",color:"#fff",borderRadius:3,padding:"3px 5px",fontSize:9,fontFamily:"var(--font-mono)"}}/></div>
        <div><label style={{color:"var(--text-muted)",fontSize:8}}>Risk %</label>
          <input type="number" value={cfg.riskPct} step={0.25} min={0.1} max={10} onChange={ev=>onCfg({...cfg,riskPct:+ev.target.value||1})}
            style={{width:"100%",background:"var(--bg-hover)",border:"1px solid var(--border-dim)",color:"#fff",borderRadius:3,padding:"3px 5px",fontSize:9,fontFamily:"var(--font-mono)"}}/></div>
      </div>
      {e&&s?(
        <div style={{borderTop:"1px solid var(--border-dim)",paddingTop:6}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3,marginBottom:4}}>
            <span style={{color:"var(--text-muted)"}}>Risk/sh: <span style={{color:"var(--amber)"}}>{risk.toFixed(2)}</span></span>
            <span style={{color:"var(--text-muted)"}}>R:R: <span style={{color:"#00c8ff",fontWeight:800}}>{rr}</span></span>
          </div>
          <div style={{padding:"4px 6px",background:"rgba(0,255,136,0.04)",borderRadius:3,border:"1px solid rgba(0,255,136,0.08)"}}>
            <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:"var(--text-muted)"}}>Qty:</span><span style={{color:"#fff",fontWeight:800,fontSize:11}}>{qty}</span></div>
            <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:"var(--text-muted)"}}>Value:</span><span style={{color:"var(--accent2)"}}>₹{pv.toLocaleString()} ({cp}%)</span></div>
            <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:"var(--text-muted)"}}>Max Loss:</span><span style={{color:"var(--red)"}}>₹{ml.toLocaleString()}</span></div>
          </div>
        </div>
      ):(<div style={{color:"var(--text-muted)",textAlign:"center",padding:6,fontSize:8}}>Right-click chart → Mark Entry + SL</div>)}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════
// TECHART v4.0 — FULL TRADING COCKPIT
// HLC / OHLC / Line / P&F / Renko with all overlays
// ═══════════════════════════════════════════════════════════
const TEChart=({symbol,prices,onOrder,onCollapse})=>{
  const canvasRef=useRef(null);
  const [viewStart,setViewStart]=useState(null);
  const [viewCount,setViewCount]=useState(120);
  const [crosshair,setCrosshair]=useState(null);
  const [isDrag,setIsDrag]=useState(false);
  const [dragX,setDragX]=useState(null);
  const [showEMA,setShowEMA]=useState({e20:true,e50:true,e200:true});
  const [hoverBar,setHoverBar]=useState(null);
  const [chartType,setChartType]=useState('hlc');
  const [boxPct,setBoxPct]=useState(1); // P&F/Renko box %
  const [pnfMethod,setPnfMethod]=useState('close'); // Definedge default: close-based
  const [pnfReversal,setPnfReversal]=useState(3); // 3-box or 1-box
  const [show45,setShow45]=useState(true); // P&F 45° trend lines
  const [showSignals,setShowSignals]=useState(true); // P&F breakout signals
  const [showSR,setShowSR]=useState(true); // Renko S/R zones
  const [collapsed,setCollapsed]=useState(false);

  // Drawings
  const [drawMode,setDrawMode]=useState(null);
  const [drawings,setDrawings]=useState(()=>CS.drawings(symbol));
  const [drawStart,setDrawStart]=useState(null);
  const [drawPreview,setDrawPreview]=useState(null);

  // Trade plan + alerts
  const [alerts,setAlerts]=useState(()=>CS.alerts(symbol));
  const [plan,setPlan]=useState(()=>CS.plan(symbol));
  const [posCfg,setPosCfg]=useState(()=>CS.posConfig());
  const [showPos,setShowPos]=useState(false);
  const [measureResult,setMeasureResult]=useState(null);
  const [dragLine,setDragLine]=useState(null);
  const [ctx,setCtx]=useState(null);
  // P&F/Renko count targets displayed
  const [countTargets,setCountTargets]=useState([]);

  // Persist
  useEffect(()=>{CS.saveDrawings(symbol,drawings)},[drawings,symbol]);
  useEffect(()=>{CS.saveAlerts(symbol,alerts)},[alerts,symbol]);
  useEffect(()=>{CS.savePlan(symbol,plan)},[plan,symbol]);
  useEffect(()=>{CS.savePosConfig(posCfg)},[posCfg]);

  useEffect(()=>{
    setDrawings(CS.drawings(symbol));setAlerts(CS.alerts(symbol));setPlan(CS.plan(symbol));
    setDrawMode(null);setDrawStart(null);setCtx(null);setMeasureResult(null);setDragLine(null);setCountTargets([]);
  },[symbol]);

  const priceData=useMemo(()=>prices?.length?prices:[],[prices]);
  const closes=useMemo(()=>priceData.map(d=>d.c),[priceData]);
  const ema20=useMemo(()=>closes.length>=20?calcEMA(closes,20):[],[closes]);
  const ema50=useMemo(()=>closes.length>=50?calcEMA(closes,50):[],[closes]);
  const ema200=useMemo(()=>closes.length>=200?calcEMA(closes,200):[],[closes]);

  // P&F and Renko data
  const pnfData=useMemo(()=>(chartType==='pnf'?buildPnF(priceData,boxPct,pnfReversal,pnfMethod):{columns:[],boxSize:0}),[priceData,boxPct,pnfReversal,pnfMethod,chartType]);
  const pnfSma10=useMemo(()=>pnfSMA(pnfData.columns,pnfData.boxSize,10),[pnfData]);
  const pnfSigs=useMemo(()=>pnfSignals(pnfData.columns),[pnfData]);
  const pnf45=useMemo(()=>pnf45Lines(pnfData.columns),[pnfData]);
  const renkoData=useMemo(()=>(chartType==='renko'?buildRenko(priceData,boxPct):{bricks:[],brickSize:0}),[priceData,boxPct,chartType]);
  const renkoSma20=useMemo(()=>renkoSMA(renkoData.bricks,20),[renkoData]);
  const renkoSma40=useMemo(()=>renkoSMA(renkoData.bricks,40),[renkoData]);
  const renkoSR=useMemo(()=>renkoSRZones(renkoData.bricks),[renkoData]);

  const isPnfRenko=chartType==='pnf'||chartType==='renko';
  const si=viewStart??Math.max(0,(isPnfRenko?(chartType==='pnf'?pnfData.columns.length:renkoData.bricks.length):priceData.length)-viewCount);
  const vis=isPnfRenko?[]/*unused for pnf/renko*/:priceData.slice(si,si+viewCount);

  const PAD={L:62,R:10,T:10,B:22};const VH=isPnfRenko?0:72;const CH_BASE=480;

  // ═══ LAYOUT CALCULATOR ═══
  const getL=useCallback(()=>{
    if(!canvasRef.current)return null;
    const r=canvasRef.current.parentElement?.getBoundingClientRect();
    const W=r?r.width:800;
    const CH=CH_BASE;const cH=CH-PAD.T-PAD.B-VH-(isPnfRenko?0:8);

    let pM,pm;
    if(chartType==='pnf'){
      const cols=pnfData.columns;if(!cols.length)return null;
      const vs=Math.min(viewCount,cols.length);const startI=Math.max(0,cols.length-vs);
      const visCols=cols.slice(startI,startI+vs);
      pm=Math.min(...visCols.map(c=>c.low))*pnfData.boxSize*0.99;
      pM=Math.max(...visCols.map(c=>c.high))*pnfData.boxSize*1.01;
    }else if(chartType==='renko'){
      const br=renkoData.bricks;if(!br.length)return null;
      const vs=Math.min(viewCount,br.length);const startI=Math.max(0,br.length-vs);
      const visBr=br.slice(startI,startI+vs);
      pm=Math.min(...visBr.map(b=>b.low))*0.99;pM=Math.max(...visBr.map(b=>b.high))*1.01;
    }else{
      if(!vis.length)return null;
      let aH=vis.map(d=>d.h),aL=vis.map(d=>d.l);
      for(let i=0;i<vis.length;i++){const g=si+i;
        if(showEMA.e20&&g<ema20.length){aH.push(ema20[g]);aL.push(ema20[g])}
        if(showEMA.e50&&g<ema50.length){aH.push(ema50[g]);aL.push(ema50[g])}
        if(showEMA.e200&&g<ema200.length){aH.push(ema200[g]);aL.push(ema200[g])}}
      pM=Math.max(...aH)*1.005;pm=Math.min(...aL)*0.995;
    }
    // Include overlays in range
    alerts.forEach(a=>{if(a.price>pm&&a.price<pM*2){pM=Math.max(pM,a.price*1.005);pm=Math.min(pm,a.price*0.995)}});
    if(plan){[plan.entry,plan.target,plan.sl].filter(Boolean).forEach(p=>{pM=Math.max(pM,p*1.005);pm=Math.min(pm,p*0.995)})}
    drawings.filter(d=>d.type==='hline').forEach(d=>{pM=Math.max(pM,d.price*1.005);pm=Math.min(pm,d.price*0.995)});
    countTargets.forEach(ct=>{pM=Math.max(pM,ct.target*1.01);pm=Math.min(pm,ct.target*0.99)});

    const pR=pM-pm||1;const bW=(W-PAD.L-PAD.R)/viewCount;
    return{W,CH,cH,bW,pM,pm,pR,
      toY:p=>PAD.T+(1-(p-pm)/pR)*cH,toP:y=>pM-((y-PAD.T)/cH)*pR,
      toX:i=>PAD.L+i*bW+bW/2,toBi:x=>Math.round((x-PAD.L)/bW-0.5)};
  },[vis,viewCount,si,showEMA,ema20,ema50,ema200,alerts,plan,drawings,chartType,pnfData,renkoData,isPnfRenko,countTargets]);

  const hitTest=useCallback((my,L)=>{
    if(!L)return null;const t=5;
    if(plan?.entry&&Math.abs(my-L.toY(plan.entry))<t)return{type:'entry',price:plan.entry};
    if(plan?.target&&Math.abs(my-L.toY(plan.target))<t)return{type:'target',price:plan.target};
    if(plan?.sl&&Math.abs(my-L.toY(plan.sl))<t)return{type:'sl',price:plan.sl};
    for(let i=0;i<alerts.length;i++){if(Math.abs(my-L.toY(alerts[i].price))<t)return{type:'alert',idx:i,price:alerts[i].price}}
    for(let i=0;i<drawings.length;i++){if(drawings[i].type==='hline'&&Math.abs(my-L.toY(drawings[i].price))<t)return{type:'drawing',idx:i,price:drawings[i].price}}
    for(let i=0;i<countTargets.length;i++){if(Math.abs(my-L.toY(countTargets[i].target))<t)return{type:'count',idx:i,price:countTargets[i].target}}
    return null;
  },[plan,alerts,drawings,countTargets]);

  // ═══ DRAW ═══
  const draw=useCallback(()=>{
    const cv=canvasRef.current;const L=getL();if(!cv||!L)return;
    const c=cv.getContext("2d"),dp=devicePixelRatio||1;
    const{W,CH,cH,bW,pM,pm,pR,toY,toP,toX}=L;
    cv.width=W*dp;cv.height=CH*dp;cv.style.width=W+"px";cv.style.height=CH+"px";c.scale(dp,dp);
    c.fillStyle="#06080c";c.fillRect(0,0,W,CH);

    // Grid
    c.strokeStyle="rgba(0,255,136,0.04)";c.lineWidth=0.5;
    const gridSteps=isPnfRenko?10:6;
    for(let i=0;i<=gridSteps;i++){const p=pm+pR*i/gridSteps,y=toY(p);
      c.beginPath();c.moveTo(PAD.L,y);c.lineTo(W-PAD.R,y);c.stroke();
      c.fillStyle="#334";c.font="10px 'JetBrains Mono',monospace";c.textAlign="right";c.fillText(p.toFixed(1),PAD.L-6,y+3)}

    // ══ CHART-SPECIFIC RENDERING ══
    if(chartType==='pnf'){
      // P&F Chart
      const cols=pnfData.columns;const bs=pnfData.boxSize;if(!cols.length||!bs){c.restore?.();return}
      const vc=Math.min(viewCount,cols.length);const startI=Math.max(0,cols.length-vc);
      const visCols=cols.slice(startI,startI+vc);

      // Draw X/O columns
      for(let ci=0;ci<visCols.length;ci++){
        const col=visCols[ci];const x=toX(ci);
        const isX=col.type==='X';
        // Volume-based opacity
        const maxV=Math.max(...visCols.map(c=>c.vol||1));const volAlpha=Math.max(0.4,Math.min(1,(col.vol||0)/maxV));
        
        for(let b=col.low;b<=col.high;b++){
          const py=toY((b+1)*bs);const pyBot=toY(b*bs);const bh=pyBot-py;const bww=bW*0.7;
          if(isX){
            c.strokeStyle=`rgba(0,204,102,${volAlpha})`;c.lineWidth=1.5;
            c.beginPath();c.moveTo(x-bww/2,py);c.lineTo(x+bww/2,pyBot);c.stroke();
            c.beginPath();c.moveTo(x+bww/2,py);c.lineTo(x-bww/2,pyBot);c.stroke();
          }else{
            c.strokeStyle=`rgba(238,51,68,${volAlpha})`;c.lineWidth=1.5;
            const cx=x,cy=(py+pyBot)/2,rx=bww/2,ry=bh/2;
            c.beginPath();c.ellipse(cx,cy,rx,Math.max(ry,1),0,0,Math.PI*2);c.stroke();
          }
        }
      }

      // 10-col SMA
      const sma=pnfSma10;c.strokeStyle="#ff00ff88";c.lineWidth=1.5;c.beginPath();let started=false;
      for(let ci=0;ci<visCols.length;ci++){
        const gi=startI+ci;if(gi>=sma.length||sma[gi]==null)continue;
        const x=toX(ci),y=toY(sma[gi]);
        if(!started){c.moveTo(x,y);started=true}else c.lineTo(x,y);}
      c.stroke();

      // 45° trend lines
      if(show45){pnf45.forEach(line=>{
        const colStart=line.start-startI;if(colStart<0)return;
        c.strokeStyle=line.dir==='bull'?"rgba(0,255,136,0.25)":"rgba(255,68,85,0.25)";c.lineWidth=1;c.setLineDash([4,3]);c.beginPath();
        for(let ci=colStart;ci<visCols.length;ci++){
          const boxOffset=ci-colStart;const bx=line.dir==='bull'?line.baseBox+boxOffset:line.baseBox-boxOffset;
          const x=toX(ci),y=toY(bx*bs);
          if(ci===colStart)c.moveTo(x,y);else c.lineTo(x,y);}
        c.stroke();c.setLineDash([]);})}

      // Breakout signals
      if(showSignals){pnfSigs.forEach(sig=>{
        const ci=sig.col-startI;if(ci<0||ci>=visCols.length)return;
        const x=toX(ci),y=toY(sig.price*bs);
        const isBull=sig.dir==='bull';
        c.fillStyle=isBull?"rgba(0,255,136,0.15)":"rgba(255,68,85,0.15)";
        c.beginPath();if(isBull){c.moveTo(x,y-12);c.lineTo(x-6,y-4);c.lineTo(x+6,y-4)}
        else{c.moveTo(x,y+12);c.lineTo(x-6,y+4);c.lineTo(x+6,y+4)}c.fill();
        c.fillStyle=isBull?"#00ff8888":"#ff445588";c.font="bold 7px 'JetBrains Mono',monospace";c.textAlign="center";
        const labels={dbl_top:"DBL⬆",dbl_bot:"DBL⬇",triple_top:"TRP⬆",triple_bot:"TRP⬇",bull_catapult:"CAT⬆",bear_catapult:"CAT⬇"};
        c.fillText(labels[sig.type]||sig.type,x,isBull?y-14:y+18);})}

      // Date labels for P&F
      c.fillStyle="#334";c.font="8px 'JetBrains Mono',monospace";c.textAlign="center";
      const dstep=Math.max(1,Math.floor(visCols.length/8));
      for(let ci=0;ci<visCols.length;ci+=dstep){
        const dt=visCols[ci].startDate;if(!dt)continue;
        const p=dt.split("-");c.fillText(p[1]+"/"+p[0]?.slice(2),toX(ci),CH-4)}

      // Legend
      c.fillStyle="#ddd";c.font="bold 12px 'Outfit',sans-serif";c.textAlign="left";
      c.fillText(`P&F ${symbol} | ${boxPct}% box | ${pnfReversal}-box rev | ${pnfMethod.toUpperCase()} | ${cols.length} cols`,PAD.L+4,PAD.T+14);
      c.fillStyle="#ff00ff88";c.font="10px 'JetBrains Mono',monospace";c.fillText("SMA(10): "+(sma[sma.length-1]?.toFixed(1)||"—"),PAD.L+4,PAD.T+28);

    }else if(chartType==='renko'){
      // Renko Chart
      const br=renkoData.bricks;const bs=renkoData.brickSize;if(!br.length||!bs)return;
      const vc=Math.min(viewCount,br.length);const startI=Math.max(0,br.length-vc);
      const visBr=br.slice(startI,startI+vc);

      // Draw bricks
      for(let bi=0;bi<visBr.length;bi++){
        const b=visBr[bi];const x=toX(bi);const isUp=b.type==='up';
        const yt=toY(b.high),yb=toY(b.low),bh=yb-yt;const bww=bW*0.8;
        c.fillStyle=isUp?"rgba(0,204,102,0.8)":"rgba(238,51,68,0.8)";
        c.fillRect(x-bww/2,yt,bww,Math.max(bh,1));
        c.strokeStyle=isUp?"#00cc66":"#ee3344";c.lineWidth=0.5;
        c.strokeRect(x-bww/2,yt,bww,Math.max(bh,1));
      }

      // 20-brick SMA
      c.strokeStyle="#00bbff88";c.lineWidth=1.5;c.beginPath();let s20=false;
      for(let bi=0;bi<visBr.length;bi++){const gi=startI+bi;if(gi>=renkoSma20.length||renkoSma20[gi]==null)continue;
        const x=toX(bi),y=toY(renkoSma20[gi]);if(!s20){c.moveTo(x,y);s20=true}else c.lineTo(x,y)}c.stroke();

      // 40-brick SMA
      c.strokeStyle="#ffaa0088";c.lineWidth=1.5;c.beginPath();let s40=false;
      for(let bi=0;bi<visBr.length;bi++){const gi=startI+bi;if(gi>=renkoSma40.length||renkoSma40[gi]==null)continue;
        const x=toX(bi),y=toY(renkoSma40[gi]);if(!s40){c.moveTo(x,y);s40=true}else c.lineTo(x,y)}c.stroke();

      // S/R zones
      if(showSR){renkoSR.forEach(z=>{const y=toY(z.price);
        c.strokeStyle=z.type==='support'?"rgba(0,255,136,0.15)":"rgba(255,68,85,0.15)";c.lineWidth=1;c.setLineDash([4,6]);
        c.beginPath();c.moveTo(PAD.L,y);c.lineTo(W-PAD.R,y);c.stroke();c.setLineDash([]);
        c.fillStyle=z.type==='support'?"#00ff8833":"#ff445533";c.font="7px 'JetBrains Mono',monospace";c.textAlign="right";
        c.fillText((z.type==='support'?"S":"R")+" "+z.price.toFixed(1),W-PAD.R-2,y-2)})}

      // Date labels
      c.fillStyle="#334";c.font="8px 'JetBrains Mono',monospace";c.textAlign="center";
      const dstep=Math.max(1,Math.floor(visBr.length/8));
      for(let bi=0;bi<visBr.length;bi+=dstep){const dt=visBr[bi].date;if(!dt)continue;
        const p=dt.split("-");c.fillText(p[2]+"/"+p[1],toX(bi),CH-4)}

      // Legend
      c.fillStyle="#ddd";c.font="bold 12px 'Outfit',sans-serif";c.textAlign="left";
      c.fillText(`Renko ${symbol} | ${boxPct}% brick | ${br.length} bricks`,PAD.L+4,PAD.T+14);
      c.fillStyle="#00bbff88";c.font="10px 'JetBrains Mono',monospace";
      c.fillText("SMA(20): "+(renkoSma20[renkoSma20.length-1]?.toFixed(1)||"—"),PAD.L+4,PAD.T+28);
      c.fillStyle="#ffaa0088";c.fillText("SMA(40): "+(renkoSma40[renkoSma40.length-1]?.toFixed(1)||"—"),PAD.L+150,PAD.T+28);

    }else{
      // HLC / Candle / Line chart (existing)
      if(!vis.length)return;
      const toVY=v=>PAD.T+cH+8+VH-(v/(Math.max(...vis.map(d=>d.v))||1))*VH;
      // Dates
      c.fillStyle="#334";c.font="9px 'JetBrains Mono',monospace";c.textAlign="center";
      const ds=Math.max(1,Math.floor(viewCount/8));
      for(let i=0;i<vis.length;i+=ds){const x=toX(i),dt=vis[i].date||"";if(dt){const p=dt.split("-");c.fillText(p[2]+"/"+p[1],x,CH-4)}}
      // Volume
      for(let i=0;i<vis.length;i++){const b=vis[i],x=toX(i);c.fillStyle=b.c>=b.o?"rgba(0,204,102,0.25)":"rgba(238,51,68,0.25)";
        c.fillRect(x-bW*0.35,toVY(b.v),bW*0.7,PAD.T+cH+8+VH-toVY(b.v))}
      // EMAs
      const dE=(ed,col)=>{c.strokeStyle=col;c.lineWidth=1.2;c.beginPath();let s=false;for(let i=0;i<vis.length;i++){const g=si+i;if(g>=ed.length)break;const x=toX(i),y=toY(ed[g]);if(!s){c.moveTo(x,y);s=true}else c.lineTo(x,y)}c.stroke()};
      if(showEMA.e200&&ema200.length)dE(ema200,"#ff6644");if(showEMA.e50&&ema50.length)dE(ema50,"#ffaa00");if(showEMA.e20&&ema20.length)dE(ema20,"#00bbff");
      // Bars
      for(let i=0;i<vis.length;i++){const b=vis[i],x=toX(i),bu=b.c>=b.o,col=bu?"#00cc66":"#ee3344";
        if(chartType==='candle'){c.strokeStyle=col;c.lineWidth=1;c.beginPath();c.moveTo(x,toY(b.h));c.lineTo(x,toY(b.l));c.stroke();
          const bT=toY(Math.max(b.o,b.c)),bB=toY(Math.min(b.o,b.c)),bw=Math.max(bW*0.6,2);c.fillStyle=bu?col+"55":col;c.fillRect(x-bw/2,bT,bw,Math.max(bB-bT,1));c.strokeRect(x-bw/2,bT,bw,Math.max(bB-bT,1))}
        else if(chartType==='line'){if(i===0){c.beginPath();c.moveTo(x,toY(b.c))}else c.lineTo(x,toY(b.c));if(i===vis.length-1){c.strokeStyle="#00bbff";c.lineWidth=1.5;c.stroke()}}
        else{c.strokeStyle=col;c.lineWidth=1;c.beginPath();c.moveTo(x,toY(b.h));c.lineTo(x,toY(b.l));c.stroke();c.lineWidth=1.5;c.beginPath();c.moveTo(x,toY(b.c));c.lineTo(x+bW*0.35,toY(b.c));c.stroke()}}
      // Legend
      c.fillStyle="#ddd";c.font="bold 13px 'Outfit',sans-serif";c.textAlign="left";c.fillText("NSE:"+symbol,PAD.L+4,PAD.T+16);
      const hb=hoverBar||vis[vis.length-1];
      if(hb){const iy=PAD.T+32,bc=hb.c>=hb.o?"#00cc66":"#ee3344";c.font="11px 'JetBrains Mono',monospace";
        c.fillStyle="#667";c.fillText("O",PAD.L+4,iy);c.fillStyle=bc;c.fillText(hb.o?.toFixed(2),PAD.L+18,iy);
        c.fillStyle="#667";c.fillText("H",PAD.L+80,iy);c.fillStyle=bc;c.fillText(hb.h?.toFixed(2),PAD.L+94,iy);
        c.fillStyle="#667";c.fillText("L",PAD.L+156,iy);c.fillStyle=bc;c.fillText(hb.l?.toFixed(2),PAD.L+168,iy);
        c.fillStyle="#667";c.fillText("C",PAD.L+230,iy);c.fillStyle=bc;c.fillText(hb.c?.toFixed(2),PAD.L+244,iy);
        c.fillStyle="#667";c.fillText("V",PAD.L+316,iy);c.fillStyle="#aaa";c.fillText(fmtVol(hb.v||0),PAD.L+330,iy)}
      if(showEMA.e20&&ema20.length){c.fillStyle="#00bbff";c.font="10px 'JetBrains Mono',monospace";c.fillText("E20:"+ema20[si+vis.length-1]?.toFixed(1),PAD.L+4,PAD.T+48)}
      if(showEMA.e50&&ema50.length){c.fillStyle="#ffaa00";c.fillText("E50:"+ema50[si+vis.length-1]?.toFixed(1),PAD.L+120,PAD.T+48)}

      </div>}
      {ctx&&<CtxMenu x={ctx.x} y={ctx.y} price={ctx.price} hit={ctx.hit} isPnf={ctx.isPnf} isRenko={ctx.isRenko} onClose={()=>setCtx(null)} onAction={ctxAction}/>}
      {!collapsed&&<div style={{display:"flex",justifyContent:"space-between",padding:"2px 8px",background:"var(--bg-secondary)",borderTop:"1px solid var(--border-dim)",fontSize:7,fontFamily:"var(--font-mono)",color:"var(--text-muted)",flexWrap:"wrap",gap:3}}>
        <span>Scroll:Zoom | Drag:Pan | Right-Click:Actions{isPnfRenko?" | V.Count & H.Count via right-click":""}</span>
        <span style={{color:"var(--accent)"}}>◈ TradEdge v4.0</span>
      </div>}
    </div>);
};

// ═══ CONTEXT MENU ═══
const CtxMenu=({x,y,price,hit,isPnf,isRenko,onClose,onAction})=>{
  const ref=useRef(null);
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))onClose()};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h)},[onClose]);
  const[pos,setPos]=useState({left:x,top:y});
  useEffect(()=>{if(!ref.current)return;const r=ref.current.getBoundingClientRect();let l=x,t=y;if(l+r.width>innerWidth-8)l=innerWidth-r.width-8;if(t+r.height>innerHeight-8)t=innerHeight-r.height-8;setPos({left:Math.max(4,l),top:Math.max(4,t)})},[x,y]);
  const hitLabel=hit?({entry:"Entry",target:"Target",sl:"Stoploss",alert:"Alert",drawing:"H-Line",count:"Count Target"}[hit.type]):"";
  return(
    <div ref={ref} className="ctx-menu" style={pos}>
      <div className="ctx-header"><span style={{fontFamily:"var(--font-mono)",fontSize:11,fontWeight:800,color:"var(--accent)"}}>₹{price.toFixed(2)}</span>
        {hit&&<span style={{fontSize:7,color:"var(--amber)",fontFamily:"var(--font-mono)"}}>{hitLabel}</span>}</div>
      {hit&&<Fragment>
        <button className="ctx-item" style={{color:"var(--red)"}} onClick={()=>onAction('del_hit')}><span style={{width:14,textAlign:"center"}}>🗑</span>Delete {hitLabel}</button>
        <button className="ctx-item" onClick={()=>onAction('alert_hit')}><span style={{width:14,textAlign:"center"}}>🔔</span>Alert at ₹{hit.price.toFixed(1)}</button>
        <div className="ctx-sep"/></Fragment>}
      <button className="ctx-item" onClick={()=>onAction('alert')}><span style={{width:14,textAlign:"center"}}>🔔</span>Alert ₹{price.toFixed(1)}</button>
      <div className="ctx-sep"/>
      <button className="ctx-item" style={{color:"var(--accent)"}} onClick={()=>onAction('buy')}><span style={{width:14,textAlign:"center"}}>🟢</span>BUY ₹{price.toFixed(1)}</button>
      <button className="ctx-item" style={{color:"var(--red)"}} onClick={()=>onAction('sell')}><span style={{width:14,textAlign:"center"}}>🔴</span>SELL ₹{price.toFixed(1)}</button>
      <button className="ctx-item" style={{color:"var(--accent3)"}} onClick={()=>onAction('gtt')}><span style={{width:14,textAlign:"center"}}>⚡</span>GTT ₹{price.toFixed(1)}</button>
      <div className="ctx-sep"/>
      <button className="ctx-item" onClick={()=>onAction('entry')}><span style={{width:14,textAlign:"center",color:"#00ff88"}}>E</span>Mark Entry</button>
      <button className="ctx-item" onClick={()=>onAction('target')}><span style={{width:14,textAlign:"center",color:"#00aaff"}}>T</span>Mark Target</button>
      <button className="ctx-item" onClick={()=>onAction('sl')}><span style={{width:14,textAlign:"center",color:"#ff4455"}}>SL</span>Mark Stoploss</button>
      <div className="ctx-sep"/>
      <button className="ctx-item" onClick={()=>onAction('hline')}><span style={{width:14,textAlign:"center"}}>─</span>H-Line</button>
      {(isPnf||isRenko)&&<Fragment>
        <div className="ctx-sep"/>
        <button className="ctx-item" style={{color:"var(--accent2)"}} onClick={()=>onAction('vcount')}><span style={{width:14,textAlign:"center"}}>🎯</span>Vertical Count Target</button>
        <button className="ctx-item" style={{color:"var(--accent2)"}} onClick={()=>onAction('hcount')}><span style={{width:14,textAlign:"center"}}>🎯</span>Horizontal Count Target</button>
      </Fragment>}
    </div>);
};

// ═══ ORDER DIALOG ═══
const OrderDialog=({symbol,type,onClose,lastPrice})=>{
  const[qty,setQty]=useState(1);const[price,setPrice]=useState(lastPrice||0);const[triggerPrice,setTriggerPrice]=useState(0);
  const[orderType,setOrderType]=useState(type==="GTT"?"LIMIT":"MARKET");const[product,setProduct]=useState("CNC");
  const[gttTarget,setGttTarget]=useState(0);const[gttSL,setGttSL]=useState(0);const[submitting,setSubmitting]=useState(false);const[result,setResult]=useState(null);
  const txnType=(type==="SELL"||type==="SL")?"SELL":"BUY";const colors={BUY:"var(--accent)",SELL:"var(--red)",SL:"var(--amber)",GTT:"var(--accent3)"};
  const inp={display:"block",width:"100%",padding:"4px 6px",marginTop:3,background:"var(--bg-card)",border:"1px solid var(--border-low)",color:"#fff",borderRadius:4,fontSize:10,fontFamily:"var(--font-mono)"};
  const submit=async()=>{const w=localStorage.getItem("zd_worker_url");if(!w){alert("Set zd_worker_url");return}setSubmitting(true);
    const h={"Content-Type":"application/json","Authorization":localStorage.getItem("kite_auth")||""};let res;
    try{if(type==="GTT"){h["X-Kite-Action"]="gtt-place";const r=await fetch(w,{method:"POST",headers:h,body:JSON.stringify({type:"two-leg",condition:{exchange:"NSE",tradingsymbol:symbol,trigger_values:[gttTarget,gttSL],last_price:lastPrice},orders:[{exchange:"NSE",tradingsymbol:symbol,transaction_type:"SELL",quantity:qty,price:gttTarget,order_type:"LIMIT",product},{exchange:"NSE",tradingsymbol:symbol,transaction_type:"SELL",quantity:qty,price:gttSL,order_type:"LIMIT",product}]})});res=await r.json()}
    else{h["X-Kite-Action"]="place-order";const r=await fetch(w,{method:"POST",headers:h,body:JSON.stringify({tradingsymbol:symbol,exchange:"NSE",transaction_type:txnType,order_type:orderType,quantity:qty,product,price:orderType==="LIMIT"?price:0,trigger_price:(orderType==="SL"||orderType==="SL-M")?triggerPrice:0})});res=await r.json()}}catch(e){res={error:e.message}}
    setResult(res);setSubmitting(false);if(res&&(res.data||res.status==="success")){beep(880,200);logToJournal(symbol,txnType,price,qty,{orderType,product,type})}};
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>
      <div style={{background:"var(--bg-secondary)",border:"1px solid var(--border-med)",borderRadius:10,padding:20,width:360}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><div><span style={{fontSize:16,fontWeight:800,color:"#fff"}}>{symbol}</span><span style={{fontSize:11,color:colors[type],fontWeight:700,marginLeft:8,padding:"2px 8px",background:colors[type]+"22",borderRadius:4}}>{type}</span></div><button style={{background:"none",border:"none",color:"var(--text-muted)",fontSize:16,cursor:"pointer"}} onClick={onClose}>×</button></div>
        {result?(<div style={{textAlign:"center",padding:10}}><div style={{fontSize:13,fontWeight:700,color:result.data||result.status==="success"?"var(--accent)":"var(--red)",marginBottom:6}}>{result.data||result.status==="success"?"✓ Placed":"✗ Failed"}</div><pre style={{fontSize:7,color:"var(--text-muted)",fontFamily:"var(--font-mono)",background:"var(--bg-card)",padding:6,borderRadius:4,textAlign:"left",maxHeight:60,overflow:"auto"}}>{JSON.stringify(result,null,2)}</pre><button className="ob ob-i" style={{marginTop:8,padding:"5px 14px",fontSize:10}} onClick={onClose}>Close</button></div>):(<div>
          {type!=="GTT"?(<Fragment><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}><label style={{fontSize:8,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>Type<select value={orderType} onChange={e=>setOrderType(e.target.value)} style={inp}><option value="MARKET">MARKET</option><option value="LIMIT">LIMIT</option><option value="SL">SL</option><option value="SL-M">SL-M</option></select></label><label style={{fontSize:8,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>Product<select value={product} onChange={e=>setProduct(e.target.value)} style={inp}><option value="CNC">CNC</option><option value="MIS">MIS</option></select></label></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}><label style={{fontSize:8,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>Qty<input type="number" value={qty} onChange={e=>setQty(+e.target.value||1)} style={inp}/></label>{orderType!=="MARKET"&&<label style={{fontSize:8,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>Price<input type="number" value={price} onChange={e=>setPrice(+e.target.value||0)} step={0.05} style={inp}/></label>}</div></Fragment>):(<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:6}}><label style={{fontSize:8,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>Qty<input type="number" value={qty} onChange={e=>setQty(+e.target.value||1)} style={inp}/></label><label style={{fontSize:8,color:"var(--accent)",fontFamily:"var(--font-mono)"}}>Target<input type="number" value={gttTarget} onChange={e=>setGttTarget(+e.target.value||0)} style={{...inp,borderColor:"var(--accent)",color:"var(--accent)"}}/></label><label style={{fontSize:8,color:"var(--red)",fontFamily:"var(--font-mono)"}}>SL<input type="number" value={gttSL} onChange={e=>setGttSL(+e.target.value||0)} style={{...inp,borderColor:"var(--red)",color:"var(--red)"}}/></label></div>)}
          <button style={{width:"100%",padding:"7px",fontSize:11,fontWeight:800,fontFamily:"var(--font-mono)",background:colors[type],color:"#000",border:"none",borderRadius:5,cursor:"pointer"}} onClick={submit} disabled={submitting}>{submitting?"...":type==="GTT"?"Place GTT":txnType+" "+symbol}</button></div>)}
      </div></div>);
};

// ═══ WATCHLIST DASHBOARD ═══
const WatchlistDashboard=()=>{
  const[lists,setLists]=useState([]);const[activeList,setActiveList]=useState(null);const[refresh,setRefresh]=useState(0);const[editingTrade,setEditingTrade]=useState(null);
  const[expandedStock,setExpandedStock]=useState(null);const[chartData,setChartData]=useState({});const[chartFailed,setChartFailed]=useState({});const[orderDialog,setOrderDialog]=useState(null);
  useEffect(()=>{if(window.teWatchlist)setLists(window.teWatchlist.getLists())},[refresh]);
  useEffect(()=>{if(!expandedStock||chartData[expandedStock]||chartFailed[expandedStock])return;const ac=new AbortController();const to=setTimeout(()=>ac.abort(),5000);
    fetch("./data/stock_details/"+expandedStock+".json?t="+Date.now(),{signal:ac.signal}).then(r=>r.ok?r.json():null).then(d=>{clearTimeout(to);if(d?.price_history?.length)setChartData(p=>({...p,[expandedStock]:d.price_history}));else setChartFailed(p=>({...p,[expandedStock]:true}))}).catch(()=>{clearTimeout(to);setChartFailed(p=>({...p,[expandedStock]:true}))});return()=>{clearTimeout(to);ac.abort()}},[expandedStock]);
  const active=activeList?lists.find(l=>l.id===activeList):lists[0];
  return(<div>
    <nav className="nav"><a href="index.html" style={{display:"flex",alignItems:"center"}}><img src="assets/logo.jpeg" alt="TE" style={{height:100,marginRight:16,animation:"logoPulse 3s ease-in-out infinite"}}/></a>
      <a href="scanner.html" className="nav-link">Scanner</a><a href="sectors.html" className="nav-link">Sectors</a><a href="rrg.html" className="nav-link">RRG</a><a href="matrix.html" className="nav-link">Matrix</a><a href="mps.html" className="nav-link">MPS</a><a href="index.html" className="nav-link">Journal</a><a href="#" className="nav-link active">Watchlist</a></nav>
    <div style={{maxWidth:1440,margin:"0 auto",padding:"16px 20px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div><h1 style={{fontSize:22,fontWeight:900,letterSpacing:2,background:"linear-gradient(135deg,#00ff88,#00c8ff,#8844ff)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>WATCHLISTS</h1>
          <div style={{fontSize:10,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>{lists.length} lists | HLC·OHLC·Line·P&F·Renko | Right-click → Trade</div></div>
        <div style={{display:"flex",gap:6}}><button className="ob ob-b" style={{padding:"5px 12px",fontSize:10}} onClick={()=>{const n=prompt("Name:");if(n){window.teWatchlist.createList(n);setRefresh(r=>r+1)}}}>+ New</button>
          <button className="ob ob-i" style={{padding:"5px 12px",fontSize:10}} onClick={async()=>{await window.teWatchlist.sync();await window.teWatchlist.pullFromCloud();setLists(window.teWatchlist.getLists());setRefresh(r=>r+1)}}>Sync</button></div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>{lists.map(l=><button key={l.id} onClick={()=>{setActiveList(l.id);setExpandedStock(null)}} style={{padding:"5px 10px",fontSize:10,fontFamily:"var(--font-mono)",fontWeight:700,background:active?.id===l.id?"var(--accent-dim)":"rgba(255,255,255,0.03)",border:"1px solid "+(active?.id===l.id?"var(--accent)":"var(--border-low)"),color:active?.id===l.id?"var(--accent)":"var(--text-secondary)",borderRadius:4,cursor:"pointer"}}>{l.name} ({l.stocks.length})</button>)}</div>
      {active?(<div className="card">
        <div style={{padding:"10px 16px",borderBottom:"1px solid var(--border-dim)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:14,fontWeight:800,color:"#fff"}}>{active.name} <span style={{fontSize:9,color:"var(--text-muted)",fontFamily:"var(--font-mono)",fontWeight:400}}>{active.stocks.length} stocks</span></span>
          <div style={{display:"flex",gap:4}}><button className="ob ob-b" onClick={()=>{const s=prompt("Symbol:");if(s){window.teWatchlist.addStock(active.id,{symbol:s.toUpperCase(),source:"manual"});setRefresh(r=>r+1)}}}>+Add</button>
            <button className="ob ob-i" onClick={()=>{const n=prompt("Rename:",active.name);if(n){window.teWatchlist.renameList(active.id,n);setRefresh(r=>r+1)}}}>Rename</button>
            <button className="ob ob-s" onClick={()=>{if(confirm("Delete?")){window.teWatchlist.deleteList(active.id);setActiveList(null);setRefresh(r=>r+1)}}}>Delete</button></div></div>
        <table style={{width:"100%",fontSize:11,borderCollapse:"collapse"}}>
          <thead><tr style={{background:"rgba(0,255,136,0.03)"}}>{["","SYMBOL","SECTOR","SRC","STATUS","ENTRY","TGT","SL","QTY","ORDERS"].map(h=><th key={h} style={{padding:"7px 8px",textAlign:"left",fontSize:9,fontWeight:700,fontFamily:"var(--font-mono)",color:"var(--text-muted)",borderBottom:"1px solid var(--border-dim)",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
          <tbody>{active.stocks.map((s,i)=>{const t=s.trade||{};const isExp=expandedStock===s.symbol;const isEd=editingTrade===s.symbol;
            return(<Fragment key={i}>
              <tr style={{borderBottom:"1px solid rgba(255,255,255,0.02)",cursor:"pointer",background:isExp?"rgba(0,255,136,0.03)":"transparent"}} onClick={()=>setExpandedStock(isExp?null:s.symbol)}>
                <td style={{padding:"5px 8px",fontSize:11}}>{isExp?"▼":"▶"}</td>
                <td style={{padding:"5px 8px"}}><span style={{fontWeight:700,color:"#fff"}}>{s.symbol}</span></td>
                <td style={{padding:"5px 8px",color:"var(--text-muted)",fontSize:9}}>{s.sector||""}</td>
                <td style={{padding:"5px 8px"}}><span style={{fontSize:7,padding:"1px 4px",borderRadius:2,fontFamily:"var(--font-mono)",background:"rgba(0,255,136,0.08)",color:"var(--accent)"}}>{s.source||"manual"}</span></td>
                <td style={{padding:"5px 8px"}}><span style={{fontSize:8,fontFamily:"var(--font-mono)",fontWeight:700,color:t.status==="active"?"var(--accent)":"var(--text-muted)"}}>{(t.status||"WATCH").toUpperCase()}</span></td>
                {isEd?(<Fragment>
                  <td style={{padding:"2px"}} onClick={e=>e.stopPropagation()}><input type="number" defaultValue={t.entry||""} id={"e"+s.symbol} style={{width:60,fontSize:9,background:"var(--bg-hover)",border:"1px solid var(--border-med)",color:"#fff",borderRadius:3,padding:"2px 4px",fontFamily:"var(--font-mono)"}}/></td>
                  <td style={{padding:"2px"}} onClick={e=>e.stopPropagation()}><input type="number" defaultValue={t.target||""} id={"t"+s.symbol} style={{width:60,fontSize:9,background:"var(--bg-hover)",border:"1px solid var(--accent)",color:"var(--accent)",borderRadius:3,padding:"2px 4px",fontFamily:"var(--font-mono)"}}/></td>
                  <td style={{padding:"2px"}} onClick={e=>e.stopPropagation()}><input type="number" defaultValue={t.sl||""} id={"s"+s.symbol} style={{width:60,fontSize:9,background:"var(--bg-hover)",border:"1px solid var(--red)",color:"var(--red)",borderRadius:3,padding:"2px 4px",fontFamily:"var(--font-mono)"}}/></td>
                  <td style={{padding:"2px"}} onClick={e=>e.stopPropagation()}><input type="number" defaultValue={t.qty||""} id={"q"+s.symbol} style={{width:40,fontSize:9,background:"var(--bg-hover)",border:"1px solid var(--border-med)",color:"#fff",borderRadius:3,padding:"2px 4px",fontFamily:"var(--font-mono)"}}/></td>
                </Fragment>):(<Fragment>
                  <td style={{padding:"5px 8px",fontFamily:"var(--font-mono)",fontSize:10}}>{t.entry||"—"}</td>
                  <td style={{padding:"5px 8px",fontFamily:"var(--font-mono)",fontSize:10,color:t.target?"var(--accent)":"var(--text-muted)"}}>{t.target||"—"}</td>
                  <td style={{padding:"5px 8px",fontFamily:"var(--font-mono)",fontSize:10,color:t.sl?"var(--red)":"var(--text-muted)"}}>{t.sl||"—"}</td>
                  <td style={{padding:"5px 8px",fontFamily:"var(--font-mono)",fontSize:10}}>{t.qty||"—"}</td></Fragment>)}
                <td style={{padding:"3px 6px"}} onClick={e=>e.stopPropagation()}><div style={{display:"flex",gap:2,flexWrap:"nowrap"}}>
                  {isEd?<button className="ob ob-b" onClick={()=>{const en=+document.getElementById("e"+s.symbol)?.value||null;const tg=+document.getElementById("t"+s.symbol)?.value||null;const sl=+document.getElementById("s"+s.symbol)?.value||null;const qt=parseInt(document.getElementById("q"+s.symbol)?.value)||0;window.teWatchlist.updateTrade(active.id,s.symbol,{entry:en,target:tg,sl:sl,qty:qt,status:en?"active":"watching"});setEditingTrade(null);setRefresh(r=>r+1)}}>Save</button>:<button className="ob" style={{borderColor:"var(--border-low)",color:"var(--text-muted)"}} onClick={()=>setEditingTrade(s.symbol)}>Edit</button>}
                  <button className="ob ob-b" onClick={()=>setOrderDialog({symbol:s.symbol,type:"BUY",price:t.entry||0})}>BUY</button>
                  <button className="ob ob-s" onClick={()=>setOrderDialog({symbol:s.symbol,type:"SELL",price:t.entry||0})}>SELL</button>
                  <button className="ob ob-sl" onClick={()=>setOrderDialog({symbol:s.symbol,type:"SL",price:t.sl||0})}>SL</button>
                  <button className="ob ob-g" onClick={()=>setOrderDialog({symbol:s.symbol,type:"GTT",price:t.entry||0})}>GTT</button>
                  <button className="ob ob-s" style={{padding:"2px 4px"}} onClick={()=>{window.teWatchlist.removeStock(active.id,s.symbol);setRefresh(r=>r+1)}}>x</button></div></td>
              </tr>
              {isExp&&<tr><td colSpan={10} style={{padding:0,background:"rgba(0,0,0,0.3)",borderBottom:"2px solid var(--accent)"}}>
                <div style={{padding:"6px 10px"}}>{chartData[s.symbol]?(<ChartErrorBoundary symbol={s.symbol}><TEChart symbol={s.symbol} prices={chartData[s.symbol]} onOrder={o=>setOrderDialog(o)} onCollapse={()=>setExpandedStock(null)}/></ChartErrorBoundary>):(<div style={{padding:20,textAlign:"center"}}>
                  {!chartFailed[s.symbol]&&<div><div style={{width:20,height:20,border:"2px solid var(--border-low)",borderTop:"2px solid var(--accent)",borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto 6px"}}/><div style={{fontSize:9,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>Loading...</div></div>}
                  {chartFailed[s.symbol]&&<div style={{fontSize:10,color:"var(--text-muted)",fontFamily:"var(--font-mono)",marginBottom:8}}>No data for <b style={{color:"#fff"}}>{s.symbol}</b></div>}
                  <div style={{display:"flex",gap:5,justifyContent:"center",marginTop:6}}><button onClick={()=>window.open(`https://in.tradingview.com/chart/8RFOgQZr/?symbol=NSE%3A${s.symbol}&interval=D`,'tradedge_tv')} className="ob ob-i" style={{padding:"4px 10px",fontSize:9}}>TV Pro</button><button onClick={()=>window.open(`https://zone.definedge.com/chart/NSE/${s.symbol}/pf`,'_blank')} className="ob ob-g" style={{padding:"4px 10px",fontSize:9}}>P&F</button><button onClick={()=>window.open(`https://zone.definedge.com/chart/NSE/${s.symbol}/renko`,'_blank')} className="ob ob-g" style={{padding:"4px 10px",fontSize:9}}>Renko</button></div></div>)}</div>
              </td></tr>}
            </Fragment>)})}</tbody>
        </table>
        {active.stocks.length===0&&<div style={{padding:40,textAlign:"center",color:"var(--text-muted)",fontSize:11,fontFamily:"var(--font-mono)"}}>Empty watchlist</div>}
      </div>):(<div style={{padding:60,textAlign:"center",color:"var(--text-muted)"}}><div style={{fontSize:40,marginBottom:12}}>📋</div><div style={{fontSize:14,fontWeight:700}}>No Watchlists</div></div>)}
    </div>
    {orderDialog&&<OrderDialog symbol={orderDialog.symbol} type={orderDialog.type} lastPrice={orderDialog.price} onClose={()=>setOrderDialog(null)}/>}
  </div>);
};

ReactDOM.createRoot(document.getElementById("root")).render(<WatchlistDashboard/>);
</script>
</body>
</html>
