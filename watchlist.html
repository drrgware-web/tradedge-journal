<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradEdge Watchlist</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--bg-primary:#06080c;--bg-secondary:#0c1018;--bg-card:#0f1520;--bg-hover:#141d2a;--border-dim:rgba(0,255,136,0.06);--border-low:rgba(0,255,136,0.1);--border-med:rgba(0,255,136,0.2);--accent:#00ff88;--accent-dim:rgba(0,255,136,0.15);--accent2:#00c8ff;--accent3:#8844ff;--red:#ff4455;--amber:#ffaa00;--text-primary:#e8e8e8;--text-secondary:#8899aa;--text-muted:#556677;--font-display:'Outfit',sans-serif;--font-mono:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-display);min-height:100vh;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,.008) 2px,rgba(0,255,136,.008) 4px);pointer-events:none;z-index:9999}
#root{position:relative;z-index:1}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg-primary)}
::-webkit-scrollbar-thumb{background:rgba(0,255,136,0.15);border-radius:3px}
.nav{display:flex;align-items:center;gap:4px;padding:4px 20px;background:var(--bg-secondary);border-bottom:1px solid var(--border-dim);position:sticky;top:0;z-index:100}
.nav-link{padding:5px 12px;font-size:11px;font-weight:600;color:var(--text-muted);text-decoration:none;border-radius:4px;font-family:var(--font-mono)}
.nav-link:hover{color:var(--text-primary);background:var(--bg-hover)}
.nav-link.active{color:var(--accent);background:var(--accent-dim)}
.card{background:var(--bg-card);border:1px solid var(--border-low);border-radius:8px;overflow:hidden}
.ob{padding:3px 8px;font-size:8px;font-family:var(--font-mono);font-weight:700;border-radius:3px;cursor:pointer;border:1px solid;transition:all 0.15s}
.ob:hover{filter:brightness(1.3)}
.ob-b{background:rgba(0,255,136,0.15);border-color:rgba(0,255,136,0.4);color:var(--accent)}
.ob-s{background:rgba(255,68,85,0.15);border-color:rgba(255,68,85,0.4);color:var(--red)}
.ob-sl{background:rgba(255,170,0,0.15);border-color:rgba(255,170,0,0.4);color:var(--amber)}
.ob-g{background:rgba(136,68,255,0.15);border-color:rgba(136,68,255,0.4);color:var(--accent3)}
.ob-i{background:rgba(0,200,255,0.1);border-color:rgba(0,200,255,0.3);color:var(--accent2)}
@keyframes logoPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.85;transform:scale(1.03)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes ctxIn{from{opacity:0;transform:scale(0.95) translateY(-4px)}to{opacity:1;transform:scale(1) translateY(0)}}
/* Context Menu */
.ctx-menu{position:fixed;background:#0a0f18;border:1px solid rgba(0,255,136,0.2);border-radius:8px;min-width:220px;z-index:600;box-shadow:0 12px 48px rgba(0,0,0,0.7),0 0 0 1px rgba(0,255,136,0.05);animation:ctxIn 0.1s ease-out;overflow:hidden;backdrop-filter:blur(12px)}
.ctx-header{padding:8px 12px;border-bottom:1px solid rgba(0,255,136,0.08);display:flex;justify-content:space-between;align-items:center}
.ctx-item{display:flex;align-items:center;gap:8px;padding:7px 12px;font-size:10px;font-family:var(--font-mono);color:var(--text-primary);cursor:pointer;transition:all 0.08s;border:none;background:none;width:100%;text-align:left}
.ctx-item:hover{background:rgba(0,255,136,0.06)}
.ctx-item .ctx-icon{width:16px;text-align:center;font-size:11px}
.ctx-item .ctx-key{margin-left:auto;font-size:7px;color:var(--text-muted);padding:1px 4px;background:rgba(255,255,255,0.04);border-radius:2px;border:1px solid rgba(255,255,255,0.06)}
.ctx-sep{height:1px;background:rgba(0,255,136,0.06);margin:2px 8px}
/* Draw toolbar */
.dtb{display:inline-flex;gap:1px;background:rgba(0,0,0,0.4);border-radius:4px;border:1px solid var(--border-dim);padding:1px}
.dtb-btn{padding:3px 8px;font-size:8px;font-family:var(--font-mono);font-weight:700;background:transparent;border:none;color:var(--text-muted);border-radius:3px;cursor:pointer;transition:all 0.1s;white-space:nowrap;letter-spacing:0.3px}
.dtb-btn:hover{color:var(--text-primary);background:rgba(255,255,255,0.04)}
.dtb-btn.active{color:var(--accent);background:rgba(0,255,136,0.12)}
.dtb-btn.danger{color:var(--red)}
.dtb-btn.danger:hover{background:rgba(255,68,85,0.1)}
</style>
</head>
<body>
<div id="root"></div>
<script src="scripts/tradedge-watchlist.js"></script>
<script type="text/babel">
const {useState, useEffect, useMemo, useRef, useCallback, Fragment} = React;

// ═══════════════════════════════════════════════════════════
// CHART DATA STORAGE — localStorage with te_chart_ prefix
// Mirrors teWatchlist pattern for future Supabase sync
// ═══════════════════════════════════════════════════════════
const LS = {
  get(k, d) { try { return JSON.parse(localStorage.getItem(k)) || d; } catch { return d; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
  del(k) { try { localStorage.removeItem(k); } catch {} },
};

// Per-symbol chart annotations
const chartStore = {
  drawings:  (sym) => LS.get(`te_chart_draw_${sym}`, []),
  alerts:    (sym) => LS.get(`te_chart_alerts_${sym}`, []),
  tradePlan: (sym) => LS.get(`te_chart_plan_${sym}`, null),
  posConfig: ()    => LS.get('te_chart_pos_config', { capital: 100000, riskPct: 1 }),
  saveDrawings:  (sym, v) => LS.set(`te_chart_draw_${sym}`, v),
  saveAlerts:    (sym, v) => LS.set(`te_chart_alerts_${sym}`, v),
  saveTradePlan: (sym, v) => v ? LS.set(`te_chart_plan_${sym}`, v) : LS.del(`te_chart_plan_${sym}`),
  savePosConfig: (v)      => LS.set('te_chart_pos_config', v),
};

// ═══════════════════════════════════════════════════════════
// CONTEXT MENU COMPONENT
// ═══════════════════════════════════════════════════════════
const ContextMenu = ({ x, y, price, onClose, onAction }) => {
  const ref = useRef(null);
  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, [onClose]);

  // Adjust position to stay on screen
  const [pos, setPos] = useState({ left: x, top: y });
  useEffect(() => {
    if (!ref.current) return;
    const rect = ref.current.getBoundingClientRect();
    let left = x, top = y;
    if (left + rect.width > window.innerWidth - 8) left = window.innerWidth - rect.width - 8;
    if (top + rect.height > window.innerHeight - 8) top = window.innerHeight - rect.height - 8;
    setPos({ left: Math.max(4, left), top: Math.max(4, top) });
  }, [x, y]);

  const items = [
    { id: "alert",    icon: "🔔", label: "Set Alert at ₹" + price.toFixed(2), key: "A" },
    { id: "sep1" },
    { id: "buy",      icon: "🟢", label: "BUY at ₹" + price.toFixed(2), key: "B", cls: "color:var(--accent)" },
    { id: "sell",     icon: "🔴", label: "SELL at ₹" + price.toFixed(2), key: "S", cls: "color:var(--red)" },
    { id: "gtt",      icon: "⚡", label: "GTT OCO at ₹" + price.toFixed(2), key: "G", cls: "color:var(--accent3)" },
    { id: "sep2" },
    { id: "entry",    icon: "→", label: "Mark as ENTRY", cls: "color:var(--accent2)" },
    { id: "target",   icon: "◎", label: "Mark as TARGET", cls: "color:var(--accent)" },
    { id: "stoploss", icon: "⊘", label: "Mark as STOPLOSS", cls: "color:var(--red)" },
    { id: "clearplan",icon: "✕", label: "Clear Trade Plan", cls: "color:var(--text-muted)" },
    { id: "sep3" },
    { id: "hline",    icon: "─", label: "Horizontal Line", key: "H" },
    { id: "measure_from", icon: "📏", label: "Measure from here", key: "M" },
  ];

  return (
    <div ref={ref} className="ctx-menu" style={pos}>
      <div className="ctx-header">
        <span style={{fontFamily:"var(--font-mono)",fontSize:12,fontWeight:800,color:"var(--accent)"}}>₹{price.toFixed(2)}</span>
        <span style={{fontSize:8,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>RIGHT-CLICK ACTIONS</span>
      </div>
      {items.map((it, i) => {
        if (it.id?.startsWith("sep")) return <div key={i} className="ctx-sep"/>;
        return (
          <button key={it.id} className="ctx-item" style={it.cls ? {[it.cls.split(":")[0]]: it.cls.split(":")[1]} : {}}
            onClick={() => { onAction(it.id, price); onClose(); }}>
            <span className="ctx-icon">{it.icon}</span>
            {it.label}
            {it.key && <span className="ctx-key">{it.key}</span>}
          </button>
        );
      })}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════
// POSITION SIZER POPOVER
// ═══════════════════════════════════════════════════════════
const PositionSizer = ({ config, onChange, entry, sl, target }) => {
  const risk = entry && sl ? Math.abs(entry - sl) : 0;
  const reward = entry && target ? Math.abs(target - entry) : 0;
  const rr = risk > 0 ? (reward / risk).toFixed(2) : "—";
  const maxLoss = config.capital * config.riskPct / 100;
  const qty = risk > 0 ? Math.floor(maxLoss / risk) : 0;
  const posValue = qty * (entry || 0);
  const capitalPct = config.capital > 0 ? ((posValue / config.capital) * 100).toFixed(1) : 0;

  return (
    <div style={{background:"#080c14",border:"1px solid var(--border-low)",borderRadius:6,padding:"10px 12px",
      fontSize:9,fontFamily:"var(--font-mono)",minWidth:200}}>
      <div style={{fontSize:10,fontWeight:800,color:"var(--accent)",marginBottom:8,letterSpacing:1}}>POSITION SIZER</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
        <div>
          <label style={{color:"var(--text-muted)",display:"block",marginBottom:2}}>Capital (₹)</label>
          <input type="number" value={config.capital} onChange={e => onChange({...config, capital: parseFloat(e.target.value)||0})}
            style={{width:"100%",background:"var(--bg-hover)",border:"1px solid var(--border-dim)",color:"#fff",
              borderRadius:3,padding:"4px 6px",fontSize:10,fontFamily:"var(--font-mono)"}}/>
        </div>
        <div>
          <label style={{color:"var(--text-muted)",display:"block",marginBottom:2}}>Risk %</label>
          <input type="number" value={config.riskPct} step={0.25} min={0.1} max={10}
            onChange={e => onChange({...config, riskPct: parseFloat(e.target.value)||1})}
            style={{width:"100%",background:"var(--bg-hover)",border:"1px solid var(--border-dim)",color:"#fff",
              borderRadius:3,padding:"4px 6px",fontSize:10,fontFamily:"var(--font-mono)"}}/>
        </div>
      </div>
      {entry && sl ? (
        <div style={{borderTop:"1px solid var(--border-dim)",paddingTop:8}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
            <div style={{color:"var(--text-muted)"}}>Entry: <span style={{color:"var(--accent2)"}}>{entry?.toFixed(2)}</span></div>
            <div style={{color:"var(--text-muted)"}}>SL: <span style={{color:"var(--red)"}}>{sl?.toFixed(2)}</span></div>
            <div style={{color:"var(--text-muted)"}}>Target: <span style={{color:"var(--accent)"}}>{target?.toFixed(2) || "—"}</span></div>
            <div style={{color:"var(--text-muted)"}}>R:R: <span style={{color:"#00c8ff",fontWeight:800}}>{rr}</span></div>
          </div>
          <div style={{marginTop:6,padding:"6px 8px",background:"rgba(0,255,136,0.05)",borderRadius:4,border:"1px solid rgba(0,255,136,0.1)"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
              <span style={{color:"var(--text-muted)"}}>Max Loss:</span>
              <span style={{color:"var(--red)",fontWeight:700}}>₹{maxLoss.toLocaleString()}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
              <span style={{color:"var(--text-muted)"}}>Risk/share:</span>
              <span style={{color:"var(--amber)"}}>{risk.toFixed(2)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
              <span style={{color:"var(--text-muted)"}}>Quantity:</span>
              <span style={{color:"#fff",fontWeight:800,fontSize:12}}>{qty}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{color:"var(--text-muted)"}}>Position:</span>
              <span style={{color:"var(--accent2)"}}>₹{posValue.toLocaleString()} ({capitalPct}%)</span>
            </div>
          </div>
        </div>
      ) : (
        <div style={{color:"var(--text-muted)",textAlign:"center",padding:8}}>Set Entry + SL via right-click on chart</div>
      )}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════
// TECHART v2.0 — THE TRADING COCKPIT
// ═══════════════════════════════════════════════════════════

const TEChart = ({symbol, prices, onOrder}) => {
  const canvasRef = useRef(null);
  const containerRef = useRef(null);
  const [viewStart, setViewStart] = useState(null);
  const [viewCount, setViewCount] = useState(120);
  const [crosshair, setCrosshair] = useState(null);
  const [isDrag, setIsDrag] = useState(false);
  const [dragX, setDragX] = useState(null);
  const [showEMA, setShowEMA] = useState({e20:true,e50:true,e200:true});
  const [hoverBar, setHoverBar] = useState(null);

  // ── Drawing state ──
  const DRAW_MODES = ['hline','trendline','fib','rect','measure'];
  const [drawMode, setDrawMode] = useState(null);
  const [drawings, setDrawings] = useState(() => chartStore.drawings(symbol));
  const [drawStart, setDrawStart] = useState(null);
  const [drawPreview, setDrawPreview] = useState(null);
  const [selectedDrawIdx, setSelectedDrawIdx] = useState(-1);

  // ── Context menu ──
  const [ctxMenu, setCtxMenu] = useState(null);

  // ── Alerts + Trade Plan ──
  const [alerts, setAlerts] = useState(() => chartStore.alerts(symbol));
  const [tradePlan, setTradePlan] = useState(() => chartStore.tradePlan(symbol));
  const [posConfig, setPosConfig] = useState(() => chartStore.posConfig());
  const [showPosSizer, setShowPosSizer] = useState(false);
  const [measureResult, setMeasureResult] = useState(null);
  const [chartType, setChartType] = useState('hlc'); // 'hlc' | 'candle' | 'line'

  // ── Persist on change ──
  useEffect(() => { chartStore.saveDrawings(symbol, drawings); }, [drawings, symbol]);
  useEffect(() => { chartStore.saveAlerts(symbol, alerts); }, [alerts, symbol]);
  useEffect(() => { chartStore.saveTradePlan(symbol, tradePlan); }, [tradePlan, symbol]);
  useEffect(() => { chartStore.savePosConfig(posConfig); }, [posConfig]);

  // Reset when symbol changes
  useEffect(() => {
    setDrawings(chartStore.drawings(symbol));
    setAlerts(chartStore.alerts(symbol));
    setTradePlan(chartStore.tradePlan(symbol));
    setDrawMode(null); setDrawStart(null); setDrawPreview(null);
    setSelectedDrawIdx(-1); setCtxMenu(null); setMeasureResult(null);
  }, [symbol]);

  const priceData = useMemo(() => prices && prices.length ? prices : [], [prices]);
  const startIdx = viewStart ?? Math.max(0, priceData.length - viewCount);
  const visible = priceData.slice(startIdx, startIdx + viewCount);
  const closes = useMemo(() => priceData.map(d => d.c), [priceData]);
  const ema20 = useMemo(() => closes.length >= 20 ? calcEMA(closes, 20) : [], [closes]);
  const ema50 = useMemo(() => closes.length >= 50 ? calcEMA(closes, 50) : [], [closes]);
  const ema200 = useMemo(() => closes.length >= 200 ? calcEMA(closes, 200) : [], [closes]);

  // Layout
  const PAD = { L:62, R:10, T:10, B:22 };
  const VOL_H = 72;
  const CHART_H = 480;

  // Price <-> Y coordinate helpers
  const getLayout = useCallback(() => {
    if (!visible.length || !canvasRef.current) return null;
    const rect = canvasRef.current.parentElement?.getBoundingClientRect();
    const W = rect ? rect.width : 800;
    const chartH = CHART_H - PAD.T - PAD.B - VOL_H - 8;
    const barW = (W - PAD.L - PAD.R) / viewCount;

    let allH = visible.map(d => d.h), allL = visible.map(d => d.l);
    for (let i = 0; i < visible.length; i++) {
      const gi = startIdx + i;
      if (showEMA.e20 && gi < ema20.length) { allH.push(ema20[gi]); allL.push(ema20[gi]); }
      if (showEMA.e50 && gi < ema50.length) { allH.push(ema50[gi]); allL.push(ema50[gi]); }
      if (showEMA.e200 && gi < ema200.length) { allH.push(ema200[gi]); allL.push(ema200[gi]); }
    }
    alerts.forEach(a => { allH.push(a.price); allL.push(a.price); });
    if (tradePlan) [tradePlan.entry, tradePlan.target, tradePlan.sl].filter(Boolean).forEach(p => { allH.push(p); allL.push(p); });
    drawings.filter(d => d.type === 'hline').forEach(d => { allH.push(d.price); allL.push(d.price); });

    const pMax = Math.max(...allH) * 1.005, pMin = Math.min(...allL) * 0.995, pRng = pMax - pMin || 1;
    return {
      W, chartH, barW, pMax, pMin, pRng,
      toY: (p) => PAD.T + (1 - (p - pMin) / pRng) * chartH,
      toP: (y) => pMax - ((y - PAD.T) / chartH) * pRng,
      toX: (i) => PAD.L + i * barW + barW / 2,
      toBIdx: (x) => Math.round((x - PAD.L) / barW - 0.5),
      volTop: PAD.T + chartH + 8,
      maxVol: Math.max(...visible.map(d => d.v)) || 1,
    };
  }, [visible, viewCount, startIdx, showEMA, ema20, ema50, ema200, alerts, tradePlan, drawings]);

  // ══════════════════════════════
  // MAIN DRAW FUNCTION
  // ══════════════════════════════
  const draw = useCallback(() => {
    const canvas = canvasRef.current;
    const L = getLayout();
    if (!canvas || !visible.length || !L) return;

    const ctx = canvas.getContext("2d");
    const dpr = window.devicePixelRatio || 1;
    const { W, chartH, barW, pMax, pMin, pRng, toY, toP, toX, toBIdx, volTop, maxVol } = L;

    canvas.width = W * dpr; canvas.height = CHART_H * dpr;
    canvas.style.width = W + "px"; canvas.style.height = CHART_H + "px";
    ctx.scale(dpr, dpr);

    ctx.fillStyle = "#06080c"; ctx.fillRect(0, 0, W, CHART_H);

    // Grid
    ctx.strokeStyle = "rgba(0,255,136,0.04)"; ctx.lineWidth = 0.5;
    for (let i = 0; i <= 6; i++) {
      const p = pMin + pRng * i / 6, y = toY(p);
      ctx.beginPath(); ctx.moveTo(PAD.L, y); ctx.lineTo(W - PAD.R, y); ctx.stroke();
      ctx.fillStyle = "#334"; ctx.font = "10px 'JetBrains Mono',monospace"; ctx.textAlign = "right";
      ctx.fillText(p.toFixed(1), PAD.L - 6, y + 3);
    }

    // Date labels
    ctx.fillStyle = "#334"; ctx.font = "9px 'JetBrains Mono',monospace"; ctx.textAlign = "center";
    const dStep = Math.max(1, Math.floor(viewCount / 8));
    for (let i = 0; i < visible.length; i += dStep) {
      const x = toX(i), dt = visible[i].date || "";
      if (dt) { const p = dt.split("-"); ctx.fillText(p[2]+"/"+p[1], x, CHART_H - 4); }
      ctx.strokeStyle = "rgba(0,255,136,0.02)";
      ctx.beginPath(); ctx.moveTo(x, PAD.T); ctx.lineTo(x, PAD.T + chartH); ctx.stroke();
    }

    // Volume
    const toVolY = (v) => volTop + VOL_H - (v / maxVol) * VOL_H;
    for (let i = 0; i < visible.length; i++) {
      const b = visible[i], x = toX(i), bull = b.c >= b.o;
      ctx.fillStyle = bull ? "rgba(0,204,102,0.25)" : "rgba(238,51,68,0.25)";
      ctx.fillRect(x - barW * 0.35, toVolY(b.v), barW * 0.7, volTop + VOL_H - toVolY(b.v));
    }
    ctx.fillStyle = "#223"; ctx.font = "8px monospace"; ctx.textAlign = "right";
    ctx.fillText(fmtVol(maxVol), PAD.L - 6, volTop + 8);

    // EMAs
    const drawEL = (ed, col) => {
      ctx.strokeStyle = col; ctx.lineWidth = 1.2; ctx.beginPath(); let s = false;
      for (let i = 0; i < visible.length; i++) {
        const gi = startIdx + i; if (gi >= ed.length) break;
        const x = toX(i), y = toY(ed[gi]);
        if (!s) { ctx.moveTo(x, y); s = true; } else ctx.lineTo(x, y);
      } ctx.stroke();
    };
    if (showEMA.e200 && ema200.length) drawEL(ema200, "#ff6644");
    if (showEMA.e50 && ema50.length) drawEL(ema50, "#ffaa00");
    if (showEMA.e20 && ema20.length) drawEL(ema20, "#00bbff");

    // Price bars
    for (let i = 0; i < visible.length; i++) {
      const b = visible[i], x = toX(i), bull = b.c >= b.o;
      const col = bull ? "#00cc66" : "#ee3344";
      if (chartType === 'candle') {
        ctx.strokeStyle = col; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(x, toY(b.h)); ctx.lineTo(x, toY(b.l)); ctx.stroke();
        const bodyTop = toY(Math.max(b.o, b.c)), bodyBot = toY(Math.min(b.o, b.c));
        const bw = Math.max(barW * 0.6, 2);
        ctx.fillStyle = bull ? col : col; ctx.globalAlpha = bull ? 0.3 : 1;
        ctx.fillRect(x - bw/2, bodyTop, bw, Math.max(bodyBot - bodyTop, 1));
        ctx.globalAlpha = 1;
        ctx.strokeRect(x - bw/2, bodyTop, bw, Math.max(bodyBot - bodyTop, 1));
      } else if (chartType === 'line') {
        if (i === 0) { ctx.beginPath(); ctx.moveTo(x, toY(b.c)); }
        else ctx.lineTo(x, toY(b.c));
        if (i === visible.length - 1) { ctx.strokeStyle = "#00bbff"; ctx.lineWidth = 1.5; ctx.stroke(); }
      } else { // hlc
        ctx.strokeStyle = col; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(x, toY(b.h)); ctx.lineTo(x, toY(b.l)); ctx.stroke();
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(x, toY(b.c)); ctx.lineTo(x + barW * 0.35, toY(b.c)); ctx.stroke();
      }
    }

    // ══ DRAWINGS ══
    drawings.forEach((d, di) => {
      const sel = selectedDrawIdx === di;
      ctx.save();
      if (d.type === 'hline') {
        const y = toY(d.price);
        if (y < PAD.T - 20 || y > PAD.T + chartH + 20) { ctx.restore(); return; }
        ctx.strokeStyle = d.color || "#ffaa00"; ctx.lineWidth = sel ? 2 : 1; ctx.setLineDash(d.dash || [6,4]);
        ctx.beginPath(); ctx.moveTo(PAD.L, y); ctx.lineTo(W - PAD.R, y); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle = d.color || "#ffaa00"; ctx.font = "bold 8px 'JetBrains Mono',monospace"; ctx.textAlign = "left";
        ctx.fillText((d.label || "LINE") + " ₹" + d.price.toFixed(2), PAD.L + 4, y - 3);
        if (sel) {
          ctx.fillStyle = "#ff445588"; ctx.fillRect(W - PAD.R - 16, y - 7, 14, 14);
          ctx.fillStyle = "#fff"; ctx.font = "bold 10px monospace"; ctx.textAlign = "center";
          ctx.fillText("×", W - PAD.R - 9, y + 4);
        }
      } else if (d.type === 'trendline') {
        const x1 = toX(d.bi1 - startIdx), y1 = toY(d.p1), x2 = toX(d.bi2 - startIdx), y2 = toY(d.p2);
        ctx.strokeStyle = d.color || "#00c8ff"; ctx.lineWidth = sel ? 2.5 : 1.5;
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        if (sel) { [{ x:x1, y:y1 },{ x:x2, y:y2 }].forEach(pt => {
          ctx.fillStyle = "#00c8ff"; ctx.beginPath(); ctx.arc(pt.x, pt.y, 4, 0, Math.PI*2); ctx.fill();
        }); }
      } else if (d.type === 'fib') {
        const levels = [0, 0.236, 0.382, 0.5, 0.618, 0.786, 1];
        const range = d.p1 - d.p2;
        const cols = ["#556","#ffaa00","#00c8ff","#00ff88","#00c8ff","#ffaa00","#556"];
        levels.forEach((lv, li) => {
          const p = d.p2 + range * lv, y = toY(p);
          ctx.strokeStyle = cols[li]; ctx.lineWidth = 0.8; ctx.setLineDash([4,4]);
          ctx.beginPath(); ctx.moveTo(PAD.L, y); ctx.lineTo(W - PAD.R, y); ctx.stroke(); ctx.setLineDash([]);
          ctx.fillStyle = cols[li]; ctx.font = "8px 'JetBrains Mono',monospace"; ctx.textAlign = "left";
          ctx.fillText(`${(lv*100).toFixed(1)}% ₹${p.toFixed(1)}`, PAD.L + 4, y - 2);
        });
        const y382 = toY(d.p2 + range * 0.382), y618 = toY(d.p2 + range * 0.618);
        ctx.fillStyle = "rgba(0,255,136,0.025)";
        ctx.fillRect(PAD.L, Math.min(y382,y618), W - PAD.L - PAD.R, Math.abs(y618 - y382));
      } else if (d.type === 'rect') {
        const x1 = toX(d.bi1 - startIdx), y1 = toY(d.p1), x2 = toX(d.bi2 - startIdx), y2 = toY(d.p2);
        ctx.strokeStyle = d.color || "#8844ff"; ctx.lineWidth = sel ? 2 : 1;
        ctx.strokeRect(Math.min(x1,x2), Math.min(y1,y2), Math.abs(x2-x1), Math.abs(y2-y1));
        ctx.fillStyle = (d.color||"#8844ff") + "08";
        ctx.fillRect(Math.min(x1,x2), Math.min(y1,y2), Math.abs(x2-x1), Math.abs(y2-y1));
      }
      ctx.restore();
    });

    // ══ DRAW PREVIEW ══
    if (drawPreview && drawStart && drawMode) {
      ctx.save();
      const dp = drawPreview;
      if (drawMode === 'trendline' || drawMode === 'fib') {
        ctx.strokeStyle = drawMode === 'fib' ? "rgba(0,255,136,0.4)" : "#00c8ff";
        ctx.lineWidth = 1.5; ctx.setLineDash([3,3]);
        ctx.beginPath(); ctx.moveTo(drawStart.sx, drawStart.sy); ctx.lineTo(dp.x, dp.y); ctx.stroke();
        ctx.setLineDash([]);
      } else if (drawMode === 'rect') {
        ctx.strokeStyle = "#8844ff"; ctx.lineWidth = 1; ctx.setLineDash([4,4]);
        ctx.strokeRect(Math.min(drawStart.sx,dp.x), Math.min(drawStart.sy,dp.y), Math.abs(dp.x-drawStart.sx), Math.abs(dp.y-drawStart.sy));
        ctx.setLineDash([]);
      } else if (drawMode === 'measure') {
        const p1 = drawStart.price, p2 = toP(dp.y);
        const diff = p2 - p1, pct = (diff / p1 * 100);
        ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 1; ctx.setLineDash([2,3]);
        ctx.beginPath(); ctx.moveTo(drawStart.sx, drawStart.sy); ctx.lineTo(dp.x, dp.y); ctx.stroke();
        ctx.setLineDash([]);
        const mx = (drawStart.sx + dp.x) / 2, my = (drawStart.sy + dp.y) / 2;
        const txt = `${diff>=0?"+":""}${diff.toFixed(2)} (${pct>=0?"+":""}${pct.toFixed(1)}%)`;
        ctx.fillStyle = "#0c1220ee"; const tw = ctx.measureText(txt).width + 16;
        ctx.fillRect(mx - tw/2, my - 11, tw, 22);
        ctx.strokeStyle = "rgba(255,255,255,0.15)"; ctx.strokeRect(mx - tw/2, my - 11, tw, 22);
        ctx.fillStyle = diff >= 0 ? "#00ff88" : "#ff4455"; ctx.font = "bold 10px 'JetBrains Mono',monospace"; ctx.textAlign = "center";
        ctx.fillText(txt, mx, my + 4);
      }
      ctx.restore();
    }

    // ══ ALERTS ══
    alerts.forEach(a => {
      const y = toY(a.price);
      if (y < PAD.T - 10 || y > PAD.T + chartH + 10) return;
      ctx.save();
      ctx.strokeStyle = "#ff00ff"; ctx.lineWidth = 1; ctx.setLineDash([8,4,2,4]);
      ctx.beginPath(); ctx.moveTo(PAD.L, y); ctx.lineTo(W - PAD.R, y); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle = "#ff00ffcc"; ctx.font = "bold 8px 'JetBrains Mono',monospace"; ctx.textAlign = "right";
      ctx.fillText("🔔 ₹" + a.price.toFixed(2), W - PAD.R - 4, y - 3);
      ctx.restore();
    });

    // ══ TRADE PLAN ══
    if (tradePlan) {
      const drawLvl = (price, label, color, dash) => {
        if (!price) return;
        const y = toY(price);
        ctx.save();
        ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.setLineDash(dash);
        ctx.beginPath(); ctx.moveTo(PAD.L, y); ctx.lineTo(W - PAD.R, y); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle = color + "18"; ctx.fillRect(W - PAD.R - 100, y - 8, 96, 16);
        ctx.strokeStyle = color + "44"; ctx.lineWidth = 0.5; ctx.strokeRect(W - PAD.R - 100, y - 8, 96, 16);
        ctx.fillStyle = color; ctx.font = "bold 8px 'JetBrains Mono',monospace"; ctx.textAlign = "right";
        ctx.fillText(label + " ₹" + price.toFixed(2), W - PAD.R - 6, y + 3);
        ctx.restore();
      };
      drawLvl(tradePlan.entry, "ENTRY", "#00c8ff", []);
      drawLvl(tradePlan.target, "TGT", "#00ff88", [6,3]);
      drawLvl(tradePlan.sl, "SL", "#ff4455", [6,3]);
      if (tradePlan.entry && tradePlan.sl) {
        const risk = Math.abs(tradePlan.entry - tradePlan.sl);
        const reward = tradePlan.target ? Math.abs(tradePlan.target - tradePlan.entry) : 0;
        const rr = risk > 0 && reward > 0 ? (reward / risk).toFixed(2) : "—";
        const yE = toY(tradePlan.entry), ySl = toY(tradePlan.sl);
        ctx.fillStyle = "rgba(255,68,85,0.035)";
        ctx.fillRect(PAD.L, Math.min(yE,ySl), W - PAD.L - PAD.R, Math.abs(ySl - yE));
        if (tradePlan.target) {
          const yT = toY(tradePlan.target);
          ctx.fillStyle = "rgba(0,255,136,0.035)";
          ctx.fillRect(PAD.L, Math.min(yE,yT), W - PAD.L - PAD.R, Math.abs(yT - yE));
        }
        // R:R + position badge
        ctx.fillStyle = "#0a1018ee"; ctx.fillRect(PAD.L + 4, yE - 22, 120, 18);
        ctx.strokeStyle = "#00c8ff33"; ctx.lineWidth = 0.5; ctx.strokeRect(PAD.L + 4, yE - 22, 120, 18);
        const qty = risk > 0 ? Math.floor((posConfig.capital * posConfig.riskPct / 100) / risk) : 0;
        ctx.fillStyle = "#00c8ff"; ctx.font = "bold 9px 'JetBrains Mono',monospace"; ctx.textAlign = "left";
        ctx.fillText(`R:R ${rr} | QTY ${qty}`, PAD.L + 8, yE - 11);
      }
    }

    // ══ CROSSHAIR ══
    if (crosshair && !ctxMenu) {
      const { x: mx, y: my } = crosshair;
      if (mx >= PAD.L && mx <= W - PAD.R) {
        ctx.strokeStyle = drawMode ? "rgba(255,255,255,0.12)" : "rgba(0,255,136,0.15)";
        ctx.lineWidth = 0.5; ctx.setLineDash([3,3]);
        ctx.beginPath(); ctx.moveTo(mx, PAD.T); ctx.lineTo(mx, CHART_H - PAD.B); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(PAD.L, my); ctx.lineTo(W - PAD.R, my); ctx.stroke();
        ctx.setLineDash([]);
        if (my >= PAD.T && my <= PAD.T + chartH) {
          const pr = toP(my);
          ctx.fillStyle = "#0a1520"; ctx.fillRect(0, my - 9, PAD.L - 2, 18);
          ctx.strokeStyle = "#00ff88"; ctx.lineWidth = 0.5; ctx.strokeRect(0, my - 9, PAD.L - 2, 18);
          ctx.fillStyle = "#00ff88"; ctx.font = "bold 9px 'JetBrains Mono',monospace"; ctx.textAlign = "right";
          ctx.fillText(pr.toFixed(2), PAD.L - 6, my + 3);
        }
        const bi = toBIdx(mx);
        if (bi >= 0 && bi < visible.length) {
          const dx = toX(bi), ds = visible[bi].date || "";
          ctx.fillStyle = "#0a1520"; ctx.fillRect(dx - 32, CHART_H - PAD.B, 64, PAD.B);
          ctx.strokeStyle = "#00ff88"; ctx.strokeRect(dx - 32, CHART_H - PAD.B, 64, PAD.B);
          ctx.fillStyle = "#00ff88"; ctx.font = "bold 8px 'JetBrains Mono',monospace"; ctx.textAlign = "center";
          ctx.fillText(ds, dx, CHART_H - 8);
        }
      }
    }

    // ══ LEGEND ══
    ctx.fillStyle = "#ddd"; ctx.font = "bold 13px 'Outfit',sans-serif"; ctx.textAlign = "left";
    ctx.fillText("NSE:" + symbol, PAD.L + 4, PAD.T + 16);
    const hb = hoverBar || visible[visible.length - 1];
    if (hb) {
      const iy = PAD.T + 32; const bc = hb.c >= hb.o ? "#00cc66" : "#ee3344";
      ctx.font = "11px 'JetBrains Mono',monospace";
      ctx.fillStyle = "#667"; ctx.fillText("O ", PAD.L + 4, iy);
      ctx.fillStyle = bc; ctx.fillText(hb.o?.toFixed(2), PAD.L + 20, iy);
      ctx.fillStyle = "#667"; ctx.fillText("H ", PAD.L + 88, iy);
      ctx.fillStyle = bc; ctx.fillText(hb.h?.toFixed(2), PAD.L + 104, iy);
      ctx.fillStyle = "#667"; ctx.fillText("L ", PAD.L + 172, iy);
      ctx.fillStyle = bc; ctx.fillText(hb.l?.toFixed(2), PAD.L + 186, iy);
      ctx.fillStyle = "#667"; ctx.fillText("C ", PAD.L + 254, iy);
      ctx.fillStyle = bc; ctx.fillText(hb.c?.toFixed(2), PAD.L + 268, iy);
      ctx.fillStyle = "#667"; ctx.fillText("V ", PAD.L + 340, iy);
      ctx.fillStyle = "#aaa"; ctx.fillText(fmtVol(hb.v || 0), PAD.L + 354, iy);
    }
    const ey = PAD.T + 48;
    if (showEMA.e20 && ema20.length) { ctx.fillStyle = "#00bbff"; ctx.font = "10px 'JetBrains Mono',monospace"; ctx.fillText("EMA20: " + (ema20[startIdx + visible.length - 1]?.toFixed(2)||"—"), PAD.L + 4, ey); }
    if (showEMA.e50 && ema50.length) { ctx.fillStyle = "#ffaa00"; ctx.fillText("EMA50: " + (ema50[startIdx + visible.length - 1]?.toFixed(2)||"—"), PAD.L + 140, ey); }
    if (showEMA.e200 && ema200.length) { ctx.fillStyle = "#ff6644"; ctx.fillText("EMA200: " + (ema200[startIdx + visible.length - 1]?.toFixed(2)||"—"), PAD.L + 280, ey); }

    // Draw mode indicator
    if (drawMode) {
      ctx.fillStyle = "#0c1220cc"; ctx.fillRect(W/2 - 60, PAD.T + 2, 120, 18);
      ctx.strokeStyle = "var(--accent)"; ctx.strokeRect(W/2 - 60, PAD.T + 2, 120, 18);
      ctx.fillStyle = "#00ff88"; ctx.font = "bold 9px 'JetBrains Mono',monospace"; ctx.textAlign = "center";
      const modeNames = { hline:"H-LINE", trendline:"TRENDLINE", fib:"FIBONACCI", rect:"RECTANGLE", measure:"MEASURE" };
      ctx.fillText("✏ " + (modeNames[drawMode]||drawMode.toUpperCase()), W/2, PAD.T + 13);
    }

    // Separator
    ctx.strokeStyle = "rgba(0,255,136,0.06)"; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(PAD.L, volTop - 4); ctx.lineTo(W - PAD.R, volTop - 4); ctx.stroke();
  }, [visible, viewCount, startIdx, crosshair, showEMA, hoverBar, symbol, ema20, ema50, ema200, priceData,
      drawings, selectedDrawIdx, drawMode, drawStart, drawPreview, alerts, tradePlan, posConfig, ctxMenu, chartType, getLayout]);

  useEffect(() => { draw(); }, [draw]);
  useEffect(() => { const h = () => draw(); window.addEventListener("resize", h); return () => window.removeEventListener("resize", h); }, [draw]);

  // ══ MOUSE HANDLERS ══
  const handleMouseMove = (e) => {
    if (ctxMenu) return;
    const rect = canvasRef.current?.getBoundingClientRect(); if (!rect) return;
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    setCrosshair({ x: mx, y: my });
    const L = getLayout(); if (!L) return;
    const idx = L.toBIdx(mx);
    setHoverBar(idx >= 0 && idx < visible.length ? visible[idx] : null);

    // Drawing preview
    if (drawMode && drawStart) {
      setDrawPreview({ x: mx, y: my, price: L.toP(my), bi: idx + startIdx });
    }

    // Pan
    if (!drawMode && isDrag && dragX != null) {
      const bw = L.barW;
      const delta = e.clientX - dragX, bDelta = Math.round(delta / bw);
      if (Math.abs(bDelta) >= 1) {
        setViewStart(pv => { const s = (pv ?? Math.max(0, priceData.length - viewCount)) - bDelta; return Math.max(0, Math.min(priceData.length - viewCount, s)); });
        setDragX(e.clientX);
      }
    }
  };

  const handleMouseDown = (e) => {
    if (e.button === 2 || ctxMenu) return; // right-click handled separately
    const L = getLayout(); if (!L) return;
    const rect = canvasRef.current.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const price = L.toP(my);
    const bi = L.toBIdx(mx) + startIdx;

    // Check if clicking on a drawing delete handle
    if (selectedDrawIdx >= 0 && selectedDrawIdx < drawings.length) {
      const d = drawings[selectedDrawIdx];
      if (d.type === 'hline') {
        const dy = L.toY(d.price);
        if (mx > L.W - PAD.R - 18 && mx < L.W - PAD.R && Math.abs(my - dy) < 8) {
          setDrawings(prev => prev.filter((_, i) => i !== selectedDrawIdx));
          setSelectedDrawIdx(-1);
          return;
        }
      }
    }

    // Check if clicking near an existing drawing
    if (!drawMode) {
      let found = -1;
      drawings.forEach((d, di) => {
        if (d.type === 'hline' && Math.abs(my - L.toY(d.price)) < 6) found = di;
      });
      if (found >= 0) { setSelectedDrawIdx(found === selectedDrawIdx ? -1 : found); return; }
      setSelectedDrawIdx(-1);
    }

    if (drawMode === 'hline') {
      setDrawings(prev => [...prev, { type:'hline', price, color:"#ffaa00", dash:[6,4], label:"LINE", ts: Date.now() }]);
      setDrawMode(null);
    } else if ((drawMode === 'trendline' || drawMode === 'fib' || drawMode === 'rect' || drawMode === 'measure') && !drawStart) {
      setDrawStart({ sx: mx, sy: my, price, bi });
    } else if ((drawMode === 'trendline' || drawMode === 'fib' || drawMode === 'rect') && drawStart) {
      if (drawMode === 'trendline') {
        setDrawings(prev => [...prev, { type:'trendline', bi1:drawStart.bi, p1:drawStart.price, bi2:bi, p2:price, color:"#00c8ff", ts:Date.now() }]);
      } else if (drawMode === 'fib') {
        setDrawings(prev => [...prev, { type:'fib', bi1:drawStart.bi, p1:drawStart.price, bi2:bi, p2:price, ts:Date.now() }]);
      } else if (drawMode === 'rect') {
        setDrawings(prev => [...prev, { type:'rect', bi1:drawStart.bi, p1:drawStart.price, bi2:bi, p2:price, color:"#8844ff", ts:Date.now() }]);
      }
      setDrawStart(null); setDrawPreview(null); setDrawMode(null);
    } else if (drawMode === 'measure' && drawStart) {
      setMeasureResult({ from: drawStart.price, to: price, diff: price - drawStart.price, pct: ((price - drawStart.price) / drawStart.price * 100) });
      setDrawStart(null); setDrawPreview(null); setDrawMode(null);
    } else if (!drawMode) {
      setIsDrag(true); setDragX(e.clientX);
    }
  };

  const handleMouseUp = () => { setIsDrag(false); setDragX(null); };
  const handleMouseLeave = () => { setCrosshair(null); setHoverBar(null); setIsDrag(false); if (!drawStart) setDrawPreview(null); };

  const handleWheel = (e) => {
    e.preventDefault();
    setViewCount(pv => { const n = pv + (e.deltaY > 0 ? 1 : -1) * Math.max(3, Math.floor(pv * 0.1)); return Math.max(20, Math.min(priceData.length, n)); });
  };

  const handleContextMenu = (e) => {
    e.preventDefault();
    const L = getLayout(); if (!L) return;
    const rect = canvasRef.current.getBoundingClientRect();
    const my = e.clientY - rect.top;
    const price = L.toP(my);
    if (price > 0) setCtxMenu({ x: e.clientX, y: e.clientY, price });
  };

  // ══ CONTEXT MENU ACTIONS ══
  const handleCtxAction = (action, price) => {
    if (action === 'alert') {
      setAlerts(prev => [...prev, { price, ts: Date.now(), active: true }]);
    } else if (action === 'buy') {
      if (onOrder) onOrder({ symbol, type: 'BUY', price });
    } else if (action === 'sell') {
      if (onOrder) onOrder({ symbol, type: 'SELL', price });
    } else if (action === 'gtt') {
      if (onOrder) onOrder({ symbol, type: 'GTT', price });
    } else if (action === 'entry') {
      setTradePlan(prev => ({ ...prev, entry: price }));
    } else if (action === 'target') {
      setTradePlan(prev => ({ ...prev, target: price }));
    } else if (action === 'stoploss') {
      setTradePlan(prev => ({ ...prev, sl: price }));
    } else if (action === 'clearplan') {
      setTradePlan(null); chartStore.saveTradePlan(symbol, null);
    } else if (action === 'hline') {
      setDrawings(prev => [...prev, { type:'hline', price, color:"#ffaa00", dash:[6,4], label:"LINE", ts:Date.now() }]);
    } else if (action === 'measure_from') {
      setDrawMode('measure');
      const L = getLayout();
      if (L) setDrawStart({ sx: PAD.L + 100, sy: L.toY(price), price, bi: 0 });
    }
  };

  // ══ KEYBOARD SHORTCUTS ══
  useEffect(() => {
    const handler = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const key = e.key.toLowerCase();
      if (key === 'escape') { setDrawMode(null); setDrawStart(null); setDrawPreview(null); setCtxMenu(null); setSelectedDrawIdx(-1); }
      else if (key === 'h') setDrawMode(m => m === 'hline' ? null : 'hline');
      else if (key === 't') setDrawMode(m => m === 'trendline' ? null : 'trendline');
      else if (key === 'f') setDrawMode(m => m === 'fib' ? null : 'fib');
      else if (key === 'r') setDrawMode(m => m === 'rect' ? null : 'rect');
      else if (key === 'm') setDrawMode(m => m === 'measure' ? null : 'measure');
      else if (key === 'delete' || key === 'backspace') {
        if (selectedDrawIdx >= 0) { setDrawings(prev => prev.filter((_, i) => i !== selectedDrawIdx)); setSelectedDrawIdx(-1); }
      }
      else if (key === 'c' && e.shiftKey) { setDrawings([]); setSelectedDrawIdx(-1); } // Shift+C clear all
      else if (key === 'p') setShowPosSizer(v => !v);
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [selectedDrawIdx]);

  // ══ RENDER ══
  if (!priceData.length) {
    return (
      <div style={{background:"var(--bg-card)",border:"1px solid var(--border-low)",borderRadius:8,padding:40,textAlign:"center"}}>
        <div style={{color:"var(--text-muted)",fontSize:12,marginBottom:8}}>No price data available</div>
        <div style={{display:"flex",gap:6,justifyContent:"center"}}>
          <button onClick={() => window.open(`https://in.tradingview.com/chart/8RFOgQZr/?symbol=NSE%3A${symbol}&interval=D`, 'tradedge_tv')}
            style={{padding:"6px 14px",borderRadius:4,fontSize:11,fontWeight:700,fontFamily:"var(--font-mono)",cursor:"pointer",border:"1px solid rgba(0,200,255,0.3)",background:"rgba(0,200,255,0.08)",color:"#00c8ff"}}>
            ⭐ TradingView Pro
          </button>
          <button onClick={() => window.open(`https://zone.definedge.com/chart/NSE/${symbol}/pf`, '_blank')}
            style={{padding:"6px 14px",borderRadius:4,fontSize:11,fontWeight:700,fontFamily:"var(--font-mono)",cursor:"pointer",border:"1px solid rgba(136,68,255,0.3)",background:"rgba(136,68,255,0.08)",color:"#8844ff"}}>
            🔷 Definedge P&F
          </button>
        </div>
      </div>
    );
  }

  const cursorStyle = drawMode ? 'crosshair' : isDrag ? 'grabbing' : 'crosshair';

  return (

        {/* Alerts count */}
        {alerts.length > 0 && (
          <span style={{fontSize:8,color:"#ff00ff",fontFamily:"var(--font-mono)",fontWeight:700}}>
            🔔 {alerts.length}
            <button style={{marginLeft:3,fontSize:8,background:"none",border:"none",color:"var(--text-muted)",cursor:"pointer",fontFamily:"var(--font-mono)"}}
              onClick={() => { if(confirm("Clear all alerts?")) setAlerts([]); }}>clear</button>
          </span>
        )}

        {/* Trade plan indicator */}
        {tradePlan && (tradePlan.entry || tradePlan.sl || tradePlan.target) && (
          <span style={{fontSize:8,fontFamily:"var(--font-mono)",display:"flex",gap:3,alignItems:"center"}}>
            {tradePlan.entry && <span style={{color:"#00c8ff"}}>E:{tradePlan.entry.toFixed(0)}</span>}
            {tradePlan.sl && <span style={{color:"#ff4455"}}>S:{tradePlan.sl.toFixed(0)}</span>}
            {tradePlan.target && <span style={{color:"#00ff88"}}>T:{tradePlan.target.toFixed(0)}</span>}
          </span>

        {/* Measure result */}
        {measureResult && (
          <span style={{fontSize:9,fontFamily:"var(--font-mono)",fontWeight:700,

        )}

        {/* External links */}
        <div style={{marginLeft:"auto",display:"flex",gap:3}}>
          <button onClick={() => window.open(`https://in.tradingview.com/chart/8RFOgQZr/?symbol=NSE%3A${symbol}&interval=D`, 'tradedge_tv')}
            style={{padding:"2px 7px",borderRadius:3,fontSize:8,fontWeight:700,fontFamily:"var(--font-mono)",cursor:"pointer",border:"1px solid rgba(0,200,255,0.2)",background:"transparent",color:"#00c8ff"}}>
            TV Pro
          </button>
          <button onClick={() => window.open(`https://zone.definedge.com/chart/NSE/${symbol}/pf`, '_blank')}
            style={{padding:"2px 7px",borderRadius:3,fontSize:8,fontWeight:700,fontFamily:"var(--font-mono)",cursor:"pointer",border:"1px solid rgba(136,68,255,0.2)",background:"transparent",color:"#8844ff"}}>
            P&F
          </button>
          <button onClick={() => window.open(`https://zone.definedge.com/chart/NSE/${symbol}/renko`, '_blank')}
            style={{padding:"2px 7px",borderRadius:3,fontSize:8,fontWeight:700,fontFamily:"var(--font-mono)",cursor:"pointer",border:"1px solid rgba(136,68,255,0.2)",background:"transparent",color:"#8844ff"}}>
            Renko
          </button>
        </div>
      </div>

      {/* ══ CANVAS ══ */}
      <div style={{cursor:cursorStyle,position:"relative"}}>
        <canvas ref={canvasRef}
          onMouseMove={handleMouseMove}
          onMouseLeave={handleMouseLeave}
          onMouseDown={handleMouseDown}
          onMouseUp={handleMouseUp}
          onWheel={handleWheel}
          onContextMenu={handleContextMenu}
          style={{display:"block",width:"100%"}}/>

        {/* Position Sizer panel */}
        {showPosSizer && (
          <div style={{position:"absolute",top:8,right:8,zIndex:50}}>
            <PositionSizer config={posConfig} onChange={setPosConfig}
              entry={tradePlan?.entry} sl={tradePlan?.sl} target={tradePlan?.target}/>
          </div>
        )}
      </div>

      {/* ══ CONTEXT MENU ══ */}
      {ctxMenu && (
        <ContextMenu x={ctxMenu.x} y={ctxMenu.y} price={ctxMenu.price}
          onClose={() => setCtxMenu(null)} onAction={handleCtxAction}/>
      )}

      {/* ══ BOTTOM BAR ══ */}
      <div style={{display:"flex",justifyContent:"space-between",padding:"3px 10px",background:"var(--bg-secondary)",
        borderTop:"1px solid var(--border-dim)",fontSize:7,fontFamily:"var(--font-mono)",color:"var(--text-muted)",flexWrap:"wrap",gap:4}}>
        <span>Bars:{viewCount} | Visible:{visible.length} | Total:{priceData.length} | Scroll:Zoom | Drag:Pan | Right-Click:Actions</span>
        <span>Keys: H=Line T=Trend F=Fib R=Rect M=Measure P=PosSizer Del=Remove Esc=Cancel</span>
        <span style={{color:"var(--accent)"}}>◈ TradEdge Trading Cockpit v2.0</span>
      </div>
    </div>
  );
};

// ORDER DIALOG (unchanged — already has BUY/SELL/SL/GTT)
// ═══════════════════════════════════════════════════════════

const OrderDialog = ({symbol, type, onClose, lastPrice}) => {
  const [qty, setQty] = useState(1);
  const [price, setPrice] = useState(lastPrice || 0);
  const [triggerPrice, setTriggerPrice] = useState(0);
  const [orderType, setOrderType] = useState(type === "GTT" ? "LIMIT" : "MARKET");
  const [product, setProduct] = useState("CNC");
  const [gttTarget, setGttTarget] = useState(0);
  const [gttSL, setGttSL] = useState(0);
  const [submitting, setSubmitting] = useState(false);
  const [result, setResult] = useState(null);
  const txnType = (type === "SELL" || type === "SL") ? "SELL" : "BUY";
  const colors = {BUY:"var(--accent)",SELL:"var(--red)",SL:"var(--amber)",GTT:"var(--accent3)"};
  
  const submit = async () => {
    const w = localStorage.getItem("zd_worker_url");
    if (!w) { alert("Set zd_worker_url"); return; }
    setSubmitting(true);
    const h = {"Content-Type":"application/json", "Authorization": localStorage.getItem("kite_auth") || ""};
    let res;
    try {
      if (type === "GTT") {
        h["X-Kite-Action"] = "gtt-place";
        const r = await fetch(w, {method:"POST", headers:h, body:JSON.stringify({
          type:"two-leg", condition:{exchange:"NSE",tradingsymbol:symbol,trigger_values:[gttTarget,gttSL],last_price:lastPrice},
          orders:[{exchange:"NSE",tradingsymbol:symbol,transaction_type:"SELL",quantity:qty,price:gttTarget,order_type:"LIMIT",product},
                  {exchange:"NSE",tradingsymbol:symbol,transaction_type:"SELL",quantity:qty,price:gttSL,order_type:"LIMIT",product}]
        })});
        res = await r.json();
      } else {
        h["X-Kite-Action"] = "place-order";
        const r = await fetch(w, {method:"POST", headers:h, body:JSON.stringify({
          tradingsymbol:symbol,exchange:"NSE",transaction_type:txnType,order_type:orderType,quantity:qty,product,
          price:orderType==="LIMIT"?price:0,trigger_price:(orderType==="SL"||orderType==="SL-M")?triggerPrice:0
        })});
        res = await r.json();
      }
    } catch(e) { res = {error: e.message}; }
    setResult(res); setSubmitting(false);
  };

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.8)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>
      <div style={{background:"var(--bg-secondary)",border:"1px solid var(--border-med)",borderRadius:10,padding:20,width:380}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
          <div><span style={{fontSize:16,fontWeight:800,color:"#fff"}}>{symbol}</span>
            <span style={{fontSize:11,color:colors[type],fontWeight:700,marginLeft:8,padding:"2px 8px",background:colors[type]+"22",borderRadius:4}}>{type}</span></div>
          <button style={{background:"none",border:"none",color:"var(--text-muted)",fontSize:18,cursor:"pointer"}} onClick={onClose}>x</button>
        </div>
        {result ? (
          <div style={{textAlign:"center",padding:12}}>
            <div style={{fontSize:13,fontWeight:700,color:result.data||result.status==="success"?"var(--accent)":"var(--red)",marginBottom:8}}>{result.data||result.status==="success"?"Order Placed!":"Failed"}</div>
            <pre style={{fontSize:8,color:"var(--text-muted)",fontFamily:"var(--font-mono)",background:"var(--bg-card)",padding:8,borderRadius:4,textAlign:"left",maxHeight:80,overflow:"auto"}}>{JSON.stringify(result,null,2)}</pre>
            <button className="ob ob-i" style={{marginTop:10,padding:"5px 16px",fontSize:10}} onClick={onClose}>Close</button>
          </div>
        ) : (
          <div>
            {type !== "GTT" ? (
              <Fragment>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                  <label style={{fontSize:9,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>Type
                    <select value={orderType} onChange={e=>setOrderType(e.target.value)} style={{display:"block",width:"100%",padding:"4px 6px",marginTop:3,background:"var(--bg-card)",border:"1px solid var(--border-low)",color:"#fff",borderRadius:4,fontSize:10,fontFamily:"var(--font-mono)"}}>
                      <option value="MARKET">MARKET</option><option value="LIMIT">LIMIT</option><option value="SL">SL</option><option value="SL-M">SL-M</option>
                    </select></label>
                  <label style={{fontSize:9,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>Product
                    <select value={product} onChange={e=>setProduct(e.target.value)} style={{display:"block",width:"100%",padding:"4px 6px",marginTop:3,background:"var(--bg-card)",border:"1px solid var(--border-low)",color:"#fff",borderRadius:4,fontSize:10,fontFamily:"var(--font-mono)"}}>
                      <option value="CNC">CNC</option><option value="MIS">MIS</option>
                    </select></label>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                  <label style={{fontSize:9,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>Qty
                    <input type="number" value={qty} onChange={e=>setQty(parseInt(e.target.value)||1)} style={{display:"block",width:"100%",padding:"4px 6px",marginTop:3,background:"var(--bg-card)",border:"1px solid var(--border-low)",color:"#fff",borderRadius:4,fontSize:10,fontFamily:"var(--font-mono)"}}/></label>
                  {orderType!=="MARKET" && <label style={{fontSize:9,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>Price
                    <input type="number" value={price} onChange={e=>setPrice(parseFloat(e.target.value)||0)} step={0.05} style={{display:"block",width:"100%",padding:"4px 6px",marginTop:3,background:"var(--bg-card)",border:"1px solid var(--border-low)",color:"#fff",borderRadius:4,fontSize:10,fontFamily:"var(--font-mono)"}}/></label>}
                </div>
                {(orderType==="SL"||orderType==="SL-M") && <label style={{fontSize:9,color:"var(--text-muted)",fontFamily:"var(--font-mono)",display:"block",marginBottom:8}}>Trigger Price
                  <input type="number" value={triggerPrice} onChange={e=>setTriggerPrice(parseFloat(e.target.value)||0)} step={0.05} style={{display:"block",width:"100%",padding:"4px 6px",marginTop:3,background:"var(--bg-card)",border:"1px solid var(--border-low)",color:"#fff",borderRadius:4,fontSize:10,fontFamily:"var(--font-mono)"}}/></label>}
              </Fragment>
            ) : (
              <div style={{marginBottom:8}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                  <label style={{fontSize:9,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>Qty<input type="number" value={qty} onChange={e=>setQty(parseInt(e.target.value)||1)} style={{display:"block",width:"100%",padding:"4px 6px",marginTop:3,background:"var(--bg-card)",border:"1px solid var(--border-low)",color:"#fff",borderRadius:4,fontSize:10,fontFamily:"var(--font-mono)"}}/></label>
                  <label style={{fontSize:9,color:"var(--accent)",fontFamily:"var(--font-mono)"}}>Target<input type="number" value={gttTarget} onChange={e=>setGttTarget(parseFloat(e.target.value)||0)} style={{display:"block",width:"100%",padding:"4px 6px",marginTop:3,background:"var(--bg-card)",border:"1px solid var(--accent)",color:"var(--accent)",borderRadius:4,fontSize:10,fontFamily:"var(--font-mono)"}}/></label>
                  <label style={{fontSize:9,color:"var(--red)",fontFamily:"var(--font-mono)"}}>SL<input type="number" value={gttSL} onChange={e=>setGttSL(parseFloat(e.target.value)||0)} style={{display:"block",width:"100%",padding:"4px 6px",marginTop:3,background:"var(--bg-card)",border:"1px solid var(--red)",color:"var(--red)",borderRadius:4,fontSize:10,fontFamily:"var(--font-mono)"}}/></label>
                </div>
                <div style={{fontSize:8,color:"var(--text-muted)",fontFamily:"var(--font-mono)",marginTop:4}}>GTT OCO: Sells at Target OR SL</div>
              </div>
            )}
            <button style={{width:"100%",padding:"7px",fontSize:11,fontWeight:800,fontFamily:"var(--font-mono)",background:colors[type],color:"#000",border:"none",borderRadius:5,cursor:"pointer"}}
              onClick={submit} disabled={submitting}>{submitting?"Placing...":type==="GTT"?"Place GTT":txnType+" "+symbol}</button>
          </div>
        )}
      </div>
    </div>
  );
};

// WATCHLIST DASHBOARD

const WatchlistDashboard = () => {
  const [lists, setLists] = useState([]);
  const [activeList, setActiveList] = useState(null);
  const [refresh, setRefresh] = useState(0);
  const [editingTrade, setEditingTrade] = useState(null);

  const [chartData, setChartData] = useState({});
  const [chartFailed, setChartFailed] = useState({});
  const [orderDialog, setOrderDialog] = useState(null);

  useEffect(() => { if (window.teWatchlist) setLists(window.teWatchlist.getLists()); }, [refresh]);

  useEffect(() => {
    if (!expandedStock || chartData[expandedStock] || chartFailed[expandedStock]) return;
    fetch("./data/stock_details/" + expandedStock + ".json?t=" + Date.now())
      .then(r => r.ok ? r.json() : null)
      .then(d => {
        if (d && d.price_history && d.price_history.length) setChartData(prev => ({...prev, [expandedStock]: d.price_history}));
        else setChartFailed(prev => ({...prev, [expandedStock]: true}));

  return (

        <a href="scanner.html" className="nav-link">Scanner</a>
        <a href="sectors.html" className="nav-link">Sectors</a>
        <a href="rrg.html" className="nav-link">RRG</a>
        <a href="matrix.html" className="nav-link">Matrix</a>

            <h1 style={{fontSize:22,fontWeight:900,letterSpacing:2,background:"linear-gradient(135deg,#00ff88,#00c8ff,#8844ff)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>WATCHLISTS</h1>
            <div style={{fontSize:10,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>{lists.length} lists | Click row → Trading Cockpit | Right-click chart → Trade Actions</div>
          </div>
          <div style={{display:"flex",gap:6}}>

                            <td style={{padding:"2px"}} onClick={e=>e.stopPropagation()}><input type="number" defaultValue={t.entry||""} id={"e"+s.symbol} style={{width:60,fontSize:9,background:"var(--bg-hover)",border:"1px solid var(--border-med)",color:"#fff",borderRadius:3,padding:"2px 4px",fontFamily:"var(--font-mono)"}}/></td>
                            <td style={{padding:"2px"}} onClick={e=>e.stopPropagation()}><input type="number" defaultValue={t.target||""} id={"t"+s.symbol} style={{width:60,fontSize:9,background:"var(--bg-hover)",border:"1px solid var(--accent)",color:"var(--accent)",borderRadius:3,padding:"2px 4px",fontFamily:"var(--font-mono)"}}/></td>
                            <td style={{padding:"2px"}} onClick={e=>e.stopPropagation()}><input type="number" defaultValue={t.sl||""} id={"s"+s.symbol} style={{width:60,fontSize:9,background:"var(--bg-hover)",border:"1px solid var(--red)",color:"var(--red)",borderRadius:3,padding:"2px 4px",fontFamily:"var(--font-mono)"}}/></td>
                            <td style={{padding:"2px"}} onClick={e=>e.stopPropagation()}><input type="number" defaultValue={t.qty||""} id={"q"+s.symbol} style={{width:40,fontSize:9,background:"var(--bg-hover)",border:"1px solid var(--border-med)",color:"#fff",borderRadius:3,padding:"2px 4px",fontFamily:"var(--font-mono)"}}/></td>
                          </Fragment>
                        ) : (
                          <Fragment>
                            <td style={{padding:"5px 8px",fontFamily:"var(--font-mono)",fontSize:10}}>{t.entry||"\u2014"}</td>
                            <td style={{padding:"5px 8px",fontFamily:"var(--font-mono)",fontSize:10,color:t.target?"var(--accent)":"var(--text-muted)"}}>{t.target||"\u2014"}</td>
                            <td style={{padding:"5px 8px",fontFamily:"var(--font-mono)",fontSize:10,color:t.sl?"var(--red)":"var(--text-muted)"}}>{t.sl||"\u2014"}</td>
                            <td style={{padding:"5px 8px",fontFamily:"var(--font-mono)",fontSize:10}}>{t.qty||"\u2014"}</td>
                          </Fragment>
                        )}
                        <td style={{padding:"3px 6px"}} onClick={e=>e.stopPropagation()}>
                          <div style={{display:"flex",gap:2,flexWrap:"nowrap"}}>
                            {isEd ? <button className="ob ob-b" onClick={()=>{
                              const en=parseFloat(document.getElementById("e"+s.symbol)?.value)||null;
                              const tg=parseFloat(document.getElementById("t"+s.symbol)?.value)||null;
                              const sl=parseFloat(document.getElementById("s"+s.symbol)?.value)||null;
                              const qt=parseInt(document.getElementById("q"+s.symbol)?.value)||0;
                              window.teWatchlist.updateTrade(active.id,s.symbol,{entry:en,target:tg,sl:sl,qty:qt,status:en?"active":"watching"});
                              setEditingTrade(null);setRefresh(r=>r+1);
                            }}>Save</button> : <button className="ob" style={{borderColor:"var(--border-low)",color:"var(--text-muted)"}} onClick={()=>setEditingTrade(s.symbol)}>Edit</button>}
                            <button className="ob ob-b" onClick={()=>setOrderDialog({symbol:s.symbol,type:"BUY",price:t.entry||0})}>BUY</button>
                            <button className="ob ob-s" onClick={()=>setOrderDialog({symbol:s.symbol,type:"SELL",price:t.entry||0})}>SELL</button>
                            <button className="ob ob-sl" onClick={()=>setOrderDialog({symbol:s.symbol,type:"SL",price:t.sl||0})}>SL</button>
                            <button className="ob ob-g" onClick={()=>setOrderDialog({symbol:s.symbol,type:"GTT",price:t.entry||0})}>GTT</button>
                            <button className="ob ob-s" style={{padding:"2px 4px"}} onClick={()=>{window.teWatchlist.removeStock(active.id,s.symbol);setRefresh(r=>r+1);}}>x</button>
                          </div>
                        </td>
                      </tr>
                      {isExp && <tr><td colSpan={10} style={{padding:0,background:"rgba(0,0,0,0.3)",borderBottom:"2px solid var(--accent)"}}>
                        <div style={{padding:"8px 12px"}}>
                          {chartData[s.symbol] ? (
                            <TEChart symbol={s.symbol} prices={chartData[s.symbol]} onOrder={(o) => setOrderDialog(o)}/>
                          ) : (
                            <div style={{padding:24,textAlign:"center"}}>
                              {!chartFailed[s.symbol] && (
                                <div>
                                  <div style={{width:24,height:24,border:"2px solid var(--border-low)",borderTop:"2px solid var(--accent)",borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto 8px"}}/>
                                  <div style={{fontSize:10,color:"var(--text-muted)",fontFamily:"var(--font-mono)",marginBottom:8}}>Loading chart...</div>
                                </div>
                              )}
                              {chartFailed[s.symbol] && (
                                <div style={{fontSize:11,color:"var(--text-muted)",fontFamily:"var(--font-mono)",marginBottom:10}}>
                                  No local data for <span style={{color:"#fff",fontWeight:700}}>{s.symbol}</span>
                                </div>
                              )}
                              <div style={{display:"flex",gap:6,justifyContent:"center"}}>
                                <button onClick={() => window.open(`https://in.tradingview.com/chart/8RFOgQZr/?symbol=NSE%3A${s.symbol}&interval=D`, 'tradedge_tv')}
                                  style={{padding:"5px 12px",borderRadius:4,fontSize:10,fontWeight:700,fontFamily:"var(--font-mono)",cursor:"pointer",border:"1px solid rgba(0,200,255,0.3)",background:"rgba(0,200,255,0.08)",color:"#00c8ff"}}>
                                  TV Pro
                                </button>
                                <button onClick={() => window.open(`https://zone.definedge.com/chart/NSE/${s.symbol}/pf`, '_blank')}
                                  style={{padding:"5px 12px",borderRadius:4,fontSize:10,fontWeight:700,fontFamily:"var(--font-mono)",cursor:"pointer",border:"1px solid rgba(136,68,255,0.3)",background:"rgba(136,68,255,0.08)",color:"#8844ff"}}>
                                  P&F
                                </button>
                                <button onClick={() => window.open(`https://zone.definedge.com/chart/NSE/${s.symbol}/renko`, '_blank')}
                                  style={{padding:"5px 12px",borderRadius:4,fontSize:10,fontWeight:700,fontFamily:"var(--font-mono)",cursor:"pointer",border:"1px solid rgba(136,68,255,0.3)",background:"rgba(136,68,255,0.08)",color:"#8844ff"}}>
                                  Renko
                                </button>
                                <button onClick={() => window.open(`stock.html?s=${s.symbol}`, '_blank')}
                                  style={{padding:"5px 12px",borderRadius:4,fontSize:10,fontWeight:700,fontFamily:"var(--font-mono)",cursor:"pointer",border:"1px solid var(--border-low)",background:"transparent",color:"var(--text-secondary)"}}>
                                  Stock Page ↗
                                </button>
                              </div>
                            </div>
                          )}
                        </div>
                      </td></tr>}
                    </Fragment>
                  );
                })}
              </tbody>
            </table>
            {active.stocks.length===0 && <div style={{padding:40,textAlign:"center",color:"var(--text-muted)",fontSize:11,fontFamily:"var(--font-mono)"}}>Empty. Add stocks or save a scan.</div>}
          </div>
        ) : <div style={{padding:60,textAlign:"center",color:"var(--text-muted)"}}><div style={{fontSize:40,marginBottom:12}}>📋</div><div style={{fontSize:14,fontWeight:700}}>No Watchlists</div></div>}
      </div>
      {orderDialog && <OrderDialog symbol={orderDialog.symbol} type={orderDialog.type} lastPrice={orderDialog.price} onClose={()=>setOrderDialog(null)}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<WatchlistDashboard/>);
</script>
</body>
</html>
