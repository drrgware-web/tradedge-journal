<style>
:root{--bg-primary:#06080c;--bg-secondary:#0c1018;--bg-card:#0f1520;--bg-hover:#141d2a;--border-dim:rgba(0,255,136,0.06);--border-low:rgba(0,255,136,0.1);--border-med:rgba(0,255,136,0.2);--accent:#00ff88;--accent-dim:rgba(0,255,136,0.15);--accent2:#00c8ff;--accent3:#8844ff;--red:#ff4455;--amber:#ffaa00;--text-primary:#e8e8e8;--text-secondary:#8899aa;--text-muted:#556677;--font-display:'Outfit',sans-serif;--font-mono:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}

<script type="text/babel">
const {useState,useEffect,useMemo,useRef,useCallback,Fragment}=React;

// ═══ UTILITIES — defined as plain functions so they're in scope ═══
function calcEMA(c,p){if(!c||c.length<p)return[];const k=2/(p+1);const e=new Array(c.length).fill(0);let s=0;for(let i=0;i<p;i++)s+=c[i];e[p-1]=s/p;for(let i=p;i<c.length;i++)e[i]=c[i]*k+e[i-1]*(1-k);for(let i=0;i<p-1;i++)e[i]=e[p-1];return e}
function fmtVol(v){if(!v)return"0";if(v>=1e9)return(v/1e9).toFixed(1)+"B";if(v>=1e7)return(v/1e7).toFixed(1)+"Cr";if(v>=1e5)return(v/1e5).toFixed(1)+"L";if(v>=1e3)return(v/1e3).toFixed(1)+"K";return v+""}
const beep=(freq=880,dur=150)=>{try{const a=new(window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator();const g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=freq;g.gain.value=0.12;o.start();o.stop(a.currentTime+dur/1000);setTimeout(()=>a.close(),dur+100)}catch{}};
const logToJournal=(symbol,action,price,qty,meta={})=>{const trades=JSON.parse(localStorage.getItem('te_trades')||'[]');trades.push({id:Date.now(),symbol,action,price,qty,ts:new Date().toISOString(),status:'executed',...meta});localStorage.setItem('te_trades',JSON.stringify(trades))};

class ChartErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={error:null}}
  static getDerivedStateFromError(e){return{error:e.message}}
  render(){if(this.state.error)return React.createElement('div',{style:{padding:20,textAlign:'center',color:'#ff4455',fontSize:10,fontFamily:'var(--font-mono)'}},
    '⚠ Chart Error: '+this.state.error,React.createElement('button',{className:'ob ob-i',style:{marginLeft:8},onClick:()=>this.setState({error:null})},'Retry'));
  return this.props.children}
}

// ═══ STORAGE ═══
const LS={get:(k,d)=>{try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}};
const CS={
alerts:s=>LS.get(`te_chart_alerts_${s}`,[]),
plan:s=>LS.get(`te_chart_plan_${s}`,null),posConfig:()=>LS.get('te_chart_pos_config',{capital:100000,riskPct:1}),
saveAlerts:(s,v)=>LS.set(`te_chart_alerts_${s}`,v),
savePlan:(s,v)=>v?LS.set(`te_chart_plan_${s}`,v):localStorage.removeItem(`te_chart_plan_${s}`),savePosConfig:v=>LS.set('te_chart_pos_config',v),
};
// ═══ SUPABASE CLOUD SYNC ═══
const SUPABASE_URL='https://urnrdpyhncezljirpnmy.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVybnJkcHlobmNlemxqaXJwbm15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDI0NTk1MzIsImV4cCI6MjA1ODAzNTUzMn0.AU427PEYMdWafYaQjABEEerbdw';

const DrawingCloudSync={
  async load(symbol){try{const res=await fetch(`${SUPABASE_URL}/rest/v1/te_chart_drawings?symbol=eq.${symbol}&select=data`,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`}});if(!res.ok)return null;const rows=await res.json();return rows.length?rows[0].data:null}catch(e){return null}},
  async save(symbol,data){try{await fetch(`${SUPABASE_URL}/rest/v1/te_chart_drawings`,{method:'POST',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},body:JSON.stringify({symbol,data,updated_at:new Date().toISOString()})})}catch(e){}}
};

const DrawingStore={
  key:s=>`te_drawings_v5_${s}`,
  load:s=>LS.get(DrawingStore.key(s),[]),
  save(s,d){LS.set(DrawingStore.key(s),d);DrawingCloudSync.save(s,d)},
  async syncFromCloud(symbol){const cloud=await DrawingCloudSync.load(symbol);if(cloud&&Array.isArray(cloud)){const local=DrawingStore.load(symbol);const map=new Map();local.forEach(d=>map.set(d.id,d));cloud.forEach(d=>{const ex=map.get(d.id);if(!ex||(d.ts&&ex.ts&&d.ts>ex.ts))map.set(d.id,d)});const merged=Array.from(map.values());LS.set(DrawingStore.key(symbol),merged);return merged}return null},
  undoKey:s=>`te_undo_v5_${s}`,redoKey:s=>`te_redo_v5_${s}`,
  pushUndo(s,state){const st=LS.get(this.undoKey(s),[]);st.push(JSON.parse(JSON.stringify(state)));if(st.length>50)st.shift();LS.set(this.undoKey(s),st);LS.set(this.redoKey(s),[])},
  popUndo(s){const st=LS.get(this.undoKey(s),[]);if(!st.length)return null;const r=st.pop();LS.set(this.undoKey(s),st);return r},
  pushRedo(s,state){const st=LS.get(this.redoKey(s),[]);st.push(JSON.parse(JSON.stringify(state)));LS.set(this.redoKey(s),st)},
  popRedo(s){const st=LS.get(this.redoKey(s),[]);if(!st.length)return null;const r=st.pop();LS.set(this.redoKey(s),st);return r},
  hasUndo:s=>LS.get(DrawingStore.undoKey(s),[]).length>0,
  hasRedo:s=>LS.get(DrawingStore.redoKey(s),[]).length>0
};

const DRAW_COLORS=['#00ff88','#00c8ff','#8844ff','#ff4455','#ffaa00','#ff66cc','#44ffcc','#88ff44','#ff8844','#44aaff','#aa44ff','#ffffff'];
const genDrawingId=()=>Date.now().toString(36)+Math.random().toString(36).substr(2,6);
// ═══ POSITION SIZER ═══
const PosSizer=({cfg,onCfg,plan})=>{
  const e=plan?.entry,s=plan?.sl,t=plan?.target;
  const risk=e&&s?Math.abs(e-s):0,reward=e&&t?Math.abs(t-e):0;
  const rr=risk>0&&reward>0?(reward/risk).toFixed(2):"—";
  const ml=cfg.capital*cfg.riskPct/100,qty=risk>0?Math.floor(ml/risk):0;
  const pv=qty*(e||0),cp=cfg.capital>0?((pv/cfg.capital)*100).toFixed(1):0;
  return(
    <div style={{background:"#080c14ee",border:"1px solid var(--border-low)",borderRadius:6,padding:"8px 10px",fontSize:9,fontFamily:"var(--font-mono)",minWidth:190,backdropFilter:"blur(8px)"}}>
      <div style={{fontSize:9,fontWeight:800,color:"var(--accent)",marginBottom:6,letterSpacing:1}}>POSITION SIZER</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,marginBottom:6}}>
        <div><label style={{color:"var(--text-muted)",fontSize:8}}>Capital ₹</label>
          <input type="number" value={cfg.capital} onChange={ev=>onCfg({...cfg,capital:+ev.target.value||0})} style={{width:"100%",background:"var(--bg-hover)",border:"1px solid var(--border-dim)",color:"#fff",borderRadius:3,padding:"3px 5px",fontSize:9,fontFamily:"var(--font-mono)"}}/></div>
        <div><label style={{color:"var(--text-muted)",fontSize:8}}>Risk %</label>
          <input type="number" value={cfg.riskPct} step={0.25} min={0.1} max={10} onChange={ev=>onCfg({...cfg,riskPct:+ev.target.value||1})} style={{width:"100%",background:"var(--bg-hover)",border:"1px solid var(--border-dim)",color:"#fff",borderRadius:3,padding:"3px 5px",fontSize:9,fontFamily:"var(--font-mono)"}}/></div>
      </div>
      {e&&s?(<div style={{borderTop:"1px solid var(--border-dim)",paddingTop:6}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3,marginBottom:4}}>
          <span style={{color:"var(--text-muted)"}}>Risk/sh: <span style={{color:"var(--amber)"}}>{risk.toFixed(2)}</span></span>
          <span style={{color:"var(--text-muted)"}}>R:R: <span style={{color:"#00c8ff",fontWeight:800}}>{rr}</span></span></div>
        <div style={{padding:"4px 6px",background:"rgba(0,255,136,0.04)",borderRadius:3,border:"1px solid rgba(0,255,136,0.08)"}}>
          <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:"var(--text-muted)"}}>Qty:</span><span style={{color:"#fff",fontWeight:800,fontSize:11}}>{qty}</span></div>
          <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:"var(--text-muted)"}}>Value:</span><span style={{color:"var(--accent2)"}}>₹{pv.toLocaleString()} ({cp}%)</span></div>
          <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:"var(--text-muted)"}}>Max Loss:</span><span style={{color:"var(--red)"}}>₹{ml.toLocaleString()}</span></div></div>
      </div>):(<div style={{color:"var(--text-muted)",textAlign:"center",padding:6,fontSize:8}}>Right-click → Mark Entry + SL</div>)}
    </div>);
};

// ═══════════════════════════════════════════════════════════
// TECHART v4.0 — HLC/OHLC/Line + Drawing tools + Trade Plan
// ═══════════════════════════════════════════════════════════
const TEChart=({symbol,prices,onOrder,onCollapse})=>{
  const canvasRef=useRef(null);
  const[viewStart,setViewStart]=useState(null);const[viewCount,setViewCount]=useState(120);
  const[crosshair,setCrosshair]=useState(null);const[isDrag,setIsDrag]=useState(false);const[dragX,setDragX]=useState(null);
  const[showEMA,setShowEMA]=useState({e20:true,e50:true,e200:true});const[hoverBar,setHoverBar]=useState(null);
  const[chartType,setChartType]=useState('hlc');const[collapsed,setCollapsed]=useState(false);
  // Drawings
const[drawings,setDrawings]=useState(()=>DrawingStore.load(symbol));
  const[drawStart,setDrawStart]=useState(null);const[drawPreview,setDrawPreview]=useState(null);
  const[drawPoints,setDrawPoints]=useState([]);const[selectedId,setSelectedId]=useState(null);const[dragHandle,setDragHandle]=useState(null);const[showDrawings,setShowDrawings]=useState(true);const[magnetMode,setMagnetMode]=useState(true);const[textInput,setTextInput]=useState(null);const[cloudSynced,setCloudSynced]=useState(false);
  // Trade plan + alerts
  const[alerts,setAlerts]=useState(()=>CS.alerts(symbol));const[plan,setPlan]=useState(()=>CS.plan(symbol));
  const[posCfg,setPosCfg]=useState(()=>CS.posConfig());const[showPos,setShowPos]=useState(false);
  const[measureResult,setMeasureResult]=useState(null);const[dragLine,setDragLine]=useState(null);const[ctx,setCtx]=useState(null);

  // Persist
  (()=>{DrawingStore.save(symbol,drawings)},[drawings,symbol]);
  useEffect(()=>{CS.saveAlerts(symbol,alerts)},[alerts,symbol]);
  useEffect(()=>{CS.savePlan(symbol,plan)},[plan,symbol]);
  useEffect(()=>{CS.savePosConfig(posCfg)},[posCfg]);
  useEffect(()=>{setDrawings(DrawingStore.load(symbol));setAlerts(CS.alerts(symbol));setPlan(CS.plan(symbol));setDrawMode(null);setDrawStart(null);setDrawPoints([]);setSelectedId(null);setCtx(null);setMeasureResult(null);setDragLine(null);setCloudSynced(false);DrawingStore.syncFromCloud(symbol).then(m=>{if(m)setDrawings(m);setCloudSynced(true)})},[symbol]);

  const priceData=useMemo(()=>prices?.length?prices:[],[prices]);
  const closes=useMemo(()=>priceData.map(d=>d.c),[priceData]);
  const ema20=useMemo(()=>closes.length>=20?calcEMA(closes,20):[],[closes]);
  const ema50=useMemo(()=>closes.length>=50?calcEMA(closes,50):[],[closes]);
  const ema200=useMemo(()=>closes.length>=200?calcEMA(closes,200):[],[closes]);

  const si=viewStart??Math.max(0,priceData.length-viewCount);
  const vis=priceData.slice(si,si+viewCount);
  const snapToOHLC=useCallback((mx,my,L)=>{if(!magnetMode||!L)return{x:mx,y:my,price:L.toP(my),bi:L.toBi(mx)+si};const bi=L.toBi(mx);if(bi<0||bi>=vis.length)return{x:mx,y:my,price:L.toP(my),bi:L.toBi(mx)+si};const bar=vis[bi];const prices=[bar.o,bar.h,bar.l,bar.c];let closest=null,minD=12;for(const p of prices){const d=Math.abs(L.toY(p)-my);if(d<minD){minD=d;closest=p}}if(closest)return{x:L.toX(bi),y:L.toY(closest),price:closest,bi:bi+si};return{x:mx,y:my,price:L.toP(my),bi:L.toBi(mx)+si}},[magnetMode,vis,si]);
  const hitTestDrawing=useCallback((mx,my,L)=>{if(!L||!showDrawings)return null;const t=8;for(let i=drawings.length-1;i>=0;i--){const d=drawings[i];if(d.hidden)continue;if(d.type==='hline'){const y=L.toY(d.price);if(Math.abs(my-y)<t)return{id:d.id,type:'hline',handle:null}}else if(d.type==='trendline'||d.type==='ray'){const x1=L.toX(d.bi1-si),y1=L.toY(d.p1),x2=L.toX(d.bi2-si),y2=L.toY(d.p2);if(Math.hypot(mx-x1,my-y1)<t)return{id:d.id,type:d.type,handle:'p1'};if(Math.hypot(mx-x2,my-y2)<t)return{id:d.id,type:d.type,handle:'p2'};const A=mx-x1,B=my-y1,C=x2-x1,D=y2-y1,dot=A*C+B*D,len=C*C+D*D;let p=len?dot/len:-1;p=Math.max(0,Math.min(1,p));if(Math.hypot(mx-(x1+p*C),my-(y1+p*D))<t)return{id:d.id,type:d.type,handle:null}}else if(d.type==='fib'){if(Math.abs(my-L.toY(d.p1))<t)return{id:d.id,type:'fib',handle:'p1'};if(Math.abs(my-L.toY(d.p2))<t)return{id:d.id,type:'fib',handle:'p2'}}else if(d.type==='rect'){const x1=L.toX(d.bi1-si),y1=L.toY(d.p1),x2=L.toX(d.bi2-si),y2=L.toY(d.p2);if(Math.hypot(mx-x1,my-y1)<t)return{id:d.id,type:'rect',handle:'p1'};if(Math.hypot(mx-x2,my-y2)<t)return{id:d.id,type:'rect',handle:'p2'}}else if(d.type==='text'&&Math.abs(mx-L.toX(d.bi-si))<40&&Math.abs(my-L.toY(d.price))<12)return{id:d.id,type:'text',handle:null}}return null},[drawings,si,showDrawings]);
  const saveUndo=useCallback(()=>{DrawingStore.pushUndo(symbol,drawings)},[symbol,drawings]);
  const undo=useCallback(()=>{const prev=DrawingStore.popUndo(symbol);if(prev){DrawingStore.pushRedo(symbol,drawings);setDrawings(prev)}},[symbol,drawings]);
  const redo=useCallback(()=>{const next=DrawingStore.popRedo(symbol);if(next){DrawingStore.pushUndo(symbol,drawings);setDrawings(next)}},[symbol,drawings]);
  const addDrawing=(d)=>{saveUndo();setDrawings(prev=>[...prev,{...d,id:genDrawingId(),ts:Date.now()}])};
  const updateDrawing=(id,upd)=>{setDrawings(prev=>prev.map(d=>d.id===id?{...d,...upd,ts:Date.now()}:d))};
  const deleteDrawing=(id)=>{saveUndo();setDrawings(prev=>prev.filter(d=>d.id!==id));if(selectedId===id)setSelectedId(null)};
  const PAD={L:62,R:10,T:10,B:22};const VH=72;

  const getL=useCallback(()=>{
    if(!canvasRef.current||!vis.length)return null;
    const r=canvasRef.current.parentElement?.getBoundingClientRect();const W=r?r.width:800;const CH=480;
    const cH=CH-PAD.T-PAD.B-VH-8;
    let aH=vis.map(d=>d.h),aL=vis.map(d=>d.l);
    for(let i=0;i<vis.length;i++){const g=si+i;
      if(showEMA.e20&&g<ema20.length){aH.push(ema20[g]);aL.push(ema20[g])}
      if(showEMA.e50&&g<ema50.length){aH.push(ema50[g]);aL.push(ema50[g])}
      if(showEMA.e200&&g<ema200.length){aH.push(ema200[g]);aL.push(ema200[g])}}
    // Include plan/alerts/drawings in range
    const extras=[];
    alerts.forEach(a=>extras.push(a.price));
    if(plan){[plan.entry,plan.target,plan.sl].filter(Boolean).forEach(p=>extras.push(p))}
    drawings.filter(d=>d.type==='hline').forEach(d=>extras.push(d.price));
    extras.forEach(p=>{aH.push(p);aL.push(p)});
    const pM=Math.max(...aH)*1.005,pm=Math.min(...aL)*0.995,pR=pM-pm||1;
    const bW=(W-PAD.L-PAD.R)/viewCount;
    return{W,CH:480,cH,bW,pM,pm,pR,toY:p=>PAD.T+(1-(p-pm)/pR)*cH,toP:y=>pM-((y-PAD.T)/cH)*pR,toX:i=>PAD.L+i*bW+bW/2,toBi:x=>Math.round((x-PAD.L)/bW-0.5)};
  },[vis,viewCount,si,showEMA,ema20,ema50,ema200,alerts,plan,drawings]);

  const hitTest=useCallback((my,L)=>{
    if(!L)return null;const t=6;
    if(plan?.entry&&Math.abs(my-L.toY(plan.entry))<t)return{type:'entry',price:plan.entry};
    if(plan?.target&&Math.abs(my-L.toY(plan.target))<t)return{type:'target',price:plan.target};

        <canvas ref={canvasRef} onMouseMove={onMM} onMouseLeave={onML} onMouseDown={onMD} onMouseUp={onMU} onWheel={onWH} onContextMenu={onCM} style={{display:"block",width:"100%"}}/>
        {showPos&&<div style={{position:"absolute",top:8,right:8,zIndex:50}}><PosSizer cfg={posCfg} onCfg={setPosCfg} plan={plan}/></div>}
      </div>}
      {ctx&&<CtxMenu x={ctx.x} y={ctx.y} price={ctx.price} hit={ctx.hit} onClose={()=>setCtx(null)} onAction={ctxAction}/>}
      {!collapsed&&<div style={{display:"flex",justifyContent:"space-between",padding:"2px 10px",background:"var(--bg-secondary)",borderTop:"1px solid var(--border-dim)",fontSize:7,fontFamily:"var(--font-mono)",color:"var(--text-muted)"}}>
        <span>Scroll:Zoom | Drag:Pan | Right-Click:Trade | Keys: H T F R M P</span>
        <span style={{color:"var(--accent)"}}>◈ TradEdge v4.0</span>
      </div>}
    </div>);
};

// ═══ CONTEXT MENU ═══
const CtxMenu=({x,y,price,hit,onClose,onAction})=>{
  const ref=useRef(null);
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))onClose()};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h)},[onClose]);
  const[pos,setPos]=useState({left:x,top:y});
  useEffect(()=>{if(!ref.current)return;const r=ref.current.getBoundingClientRect();let l=x,t=y;if(l+r.width>innerWidth-8)l=innerWidth-r.width-8;if(t+r.height>innerHeight-8)t=innerHeight-r.height-8;setPos({left:Math.max(4,l),top:Math.max(4,t)})},[x,y]);
  const hitLabel=hit?({entry:"Entry",target:"Target",sl:"Stoploss",alert:"Alert",drawing:"H-Line"}[hit.type]):"";
  return(
    <div ref={ref} className="ctx-menu" style={pos}>
      <div className="ctx-header"><span style={{fontFamily:"var(--font-mono)",fontSize:11,fontWeight:800,color:"var(--accent)"}}>₹{price.toFixed(2)}</span>
        {hit&&<span style={{fontSize:7,color:"var(--amber)",fontFamily:"var(--font-mono)"}}>{hitLabel}</span>}</div>
      {hit&&<Fragment><button className="ctx-item" style={{color:"var(--red)"}} onClick={()=>onAction('del_hit')}><span style={{width:14,textAlign:"center"}}>🗑</span>Delete {hitLabel}</button><div className="ctx-sep"/></Fragment>}
      <button className="ctx-item" onClick={()=>onAction('alert')}><span style={{width:14,textAlign:"center"}}>🔔</span>Alert ₹{price.toFixed(1)}</button>
      <div className="ctx-sep"/>
      <button className="ctx-item" style={{color:"var(--accent)"}} onClick={()=>onAction('buy')}><span style={{width:14,textAlign:"center"}}>🟢</span>BUY</button>
      <button className="ctx-item" style={{color:"var(--red)"}} onClick={()=>onAction('sell')}><span style={{width:14,textAlign:"center"}}>🔴</span>SELL</button>
      <button className="ctx-item" style={{color:"var(--accent3)"}} onClick={()=>onAction('gtt')}><span style={{width:14,textAlign:"center"}}>⚡</span>GTT</button>
      <div className="ctx-sep"/>
      <button className="ctx-item" onClick={()=>onAction('entry')}><span style={{width:14,textAlign:"center",color:"#00ff88"}}>E</span>Mark Entry</button>
      <button className="ctx-item" onClick={()=>onAction('target')}><span style={{width:14,textAlign:"center",color:"#00aaff"}}>T</span>Mark Target</button>
      <button className="ctx-item" onClick={()=>onAction('sl')}><span style={{width:14,textAlign:"center",color:"#ff4455"}}>SL</span>Mark Stoploss</button>
      <div className="ctx-sep"/>
      <button className="ctx-item" onClick={()=>onAction('hline')}><span style={{width:14,textAlign:"center"}}>─</span>H-Line</button>
    </div>);
};

// ═══ ORDER DIALOG ═══
const OrderDialog=({symbol,type,onClose,lastPrice})=>{
  const[qty,setQty]=useState(1);const[price,setPrice]=useState(lastPrice||0);const[triggerPrice,setTriggerPrice]=useState(0);
  const[orderType,setOrderType]=useState(type==="GTT"?"LIMIT":"MARKET");const[product,setProduct]=useState("CNC");
  const[gttTarget,setGttTarget]=useState(0);const[gttSL,setGttSL]=useState(0);const[submitting,setSubmitting]=useState(false);const[result,setResult]=useState(null);
  const txnType=(type==="SELL"||type==="SL")?"SELL":"BUY";const colors={BUY:"var(--accent)",SELL:"var(--red)",SL:"var(--amber)",GTT:"var(--accent3)"};
  const inp={display:"block",width:"100%",padding:"4px 6px",marginTop:3,background:"var(--bg-card)",border:"1px solid var(--border-low)",color:"#fff",borderRadius:4,fontSize:10,fontFamily:"var(--font-mono)"};
  const submit=async()=>{const w=localStorage.getItem("zd_worker_url");if(!w){alert("Set zd_worker_url");return}setSubmitting(true);
    const h={"Content-Type":"application/json","Authorization":localStorage.getItem("kite_auth")||""};let res;
    try{if(type==="GTT"){h["X-Kite-Action"]="gtt-place";const r=await fetch(w,{method:"POST",headers:h,body:JSON.stringify({type:"two-leg",condition:{exchange:"NSE",tradingsymbol:symbol,trigger_values:[gttTarget,gttSL],last_price:lastPrice},orders:[{exchange:"NSE",tradingsymbol:symbol,transaction_type:"SELL",quantity:qty,price:gttTarget,order_type:"LIMIT",product},{exchange:"NSE",tradingsymbol:symbol,transaction_type:"SELL",quantity:qty,price:gttSL,order_type:"LIMIT",product}]})});res=await r.json()}
    else{h["X-Kite-Action"]="place-order";const r=await fetch(w,{method:"POST",headers:h,body:JSON.stringify({tradingsymbol:symbol,exchange:"NSE",transaction_type:txnType,order_type:orderType,quantity:qty,product,price:orderType==="LIMIT"?price:0,trigger_price:(orderType==="SL"||orderType==="SL-M")?triggerPrice:0})});res=await r.json()}}catch(e){res={error:e.message}}
    setResult(res);setSubmitting(false);if(res&&(res.data||res.status==="success")){beep(880,200);logToJournal(symbol,txnType,price,qty,{orderType,product,type})}};
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>
      <div style={{background:"var(--bg-secondary)",border:"1px solid var(--border-med)",borderRadius:10,padding:20,width:360}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><div><span style={{fontSize:16,fontWeight:800,color:"#fff"}}>{symbol}</span><span style={{fontSize:11,color:colors[type],fontWeight:700,marginLeft:8,padding:"2px 8px",background:colors[type]+"22",borderRadius:4}}>{type}</span></div><button style={{background:"none",border:"none",color:"var(--text-muted)",fontSize:16,cursor:"pointer"}} onClick={onClose}>×</button></div>
        {result?(<div style={{textAlign:"center",padding:10}}><div style={{fontSize:13,fontWeight:700,color:result.data||result.status==="success"?"var(--accent)":"var(--red)",marginBottom:6}}>{result.data||result.status==="success"?"✓ Placed":"✗ Failed"}</div><pre style={{fontSize:7,color:"var(--text-muted)",fontFamily:"var(--font-mono)",background:"var(--bg-card)",padding:6,borderRadius:4,textAlign:"left",maxHeight:60,overflow:"auto"}}>{JSON.stringify(result,null,2)}</pre><button className="ob ob-i" style={{marginTop:8,padding:"5px 14px",fontSize:10}} onClick={onClose}>Close</button></div>):(<div>
          {type!=="GTT"?(<Fragment><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}><label style={{fontSize:8,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>Type<select value={orderType} onChange={e=>setOrderType(e.target.value)} style={inp}><option value="MARKET">MARKET</option><option value="LIMIT">LIMIT</option><option value="SL">SL</option><option value="SL-M">SL-M</option></select></label><label style={{fontSize:8,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>Product<select value={product} onChange={e=>setProduct(e.target.value)} style={inp}><option value="CNC">CNC</option><option value="MIS">MIS</option></select></label></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}><label style={{fontSize:8,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>Qty<input type="number" value={qty} onChange={e=>setQty(+e.target.value||1)} style={inp}/></label>{orderType!=="MARKET"&&<label style={{fontSize:8,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>Price<input type="number" value={price} onChange={e=>setPrice(+e.target.value||0)} step={0.05} style={inp}/></label>}</div></Fragment>):(<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:6}}><label style={{fontSize:8,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>Qty<input type="number" value={qty} onChange={e=>setQty(+e.target.value||1)} style={inp}/></label><label style={{fontSize:8,color:"var(--accent)",fontFamily:"var(--font-mono)"}}>Target<input type="number" value={gttTarget} onChange={e=>setGttTarget(+e.target.value||0)} style={{...inp,borderColor:"var(--accent)",color:"var(--accent)"}}/></label><label style={{fontSize:8,color:"var(--red)",fontFamily:"var(--font-mono)"}}>SL<input type="number" value={gttSL} onChange={e=>setGttSL(+e.target.value||0)} style={{...inp,borderColor:"var(--red)",color:"var(--red)"}}/></label></div>)}
          <button style={{width:"100%",padding:"7px",fontSize:11,fontWeight:800,fontFamily:"var(--font-mono)",background:colors[type],color:"#000",border:"none",borderRadius:5,cursor:"pointer"}} onClick={submit} disabled={submitting}>{submitting?"...":type==="GTT"?"Place GTT":txnType+" "+symbol}</button></div>)}
      </div></div>);
};

// ═══ WATCHLIST DASHBOARD ═══
const WatchlistDashboard=()=>{
  const[lists,setLists]=useState([]);const[activeList,setActiveList]=useState(null);const[refresh,setRefresh]=useState(0);const[editingTrade,setEditingTrade]=useState(null);
  const[expandedStock,setExpandedStock]=useState(null);const[chartData,setChartData]=useState({});const[chartFailed,setChartFailed]=useState({});const[orderDialog,setOrderDialog]=useState(null);
  useEffect(()=>{if(window.teWatchlist)setLists(window.teWatchlist.getLists())},[refresh]);
  useEffect(()=>{if(!expandedStock||chartData[expandedStock]||chartFailed[expandedStock])return;
    fetch("./data/stock_details/"+expandedStock+".json?t="+Date.now()).then(r=>r.ok?r.json():null)
      .then(d=>{if(d?.price_history?.length)setChartData(p=>({...p,[expandedStock]:d.price_history}));else setChartFailed(p=>({...p,[expandedStock]:true}))})
      .catch(()=>setChartFailed(p=>({...p,[expandedStock]:true})))},[expandedStock]);
  const active=activeList?lists.find(l=>l.id===activeList):lists[0];
  return(<div>
    <nav className="nav"><a href="index.html" style={{display:"flex",alignItems:"center"}}><img src="assets/logo.jpeg" alt="TE" style={{height:100,marginRight:16,animation:"logoPulse 3s ease-in-out infinite"}}/></a>
      <a href="scanner.html" className="nav-link">Scanner</a><a href="sectors.html" className="nav-link">Sectors</a><a href="rrg.html" className="nav-link">RRG</a><a href="matrix.html" className="nav-link">Matrix</a><a href="mps.html" className="nav-link">MPS</a><a href="index.html" className="nav-link">Journal</a><a href="#" className="nav-link active">Watchlist</a></nav>
    <div style={{maxWidth:1440,margin:"0 auto",padding:"16px 20px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:14,paddingBottom:12,borderBottom:"1px solid var(--border-dim)"}}>
        <div><h1 style={{fontSize:24,fontWeight:900,letterSpacing:3,background:"linear-gradient(135deg,#00ff88,#00c8ff,#8844ff)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1}}>WATCHLISTS</h1>
          <div style={{fontSize:10,color:"var(--text-muted)",fontFamily:"var(--font-mono)",marginTop:4}}>{lists.length} lists | HLC·OHLC·Line | Right-click chart → Trade | Keys: H T F R M P</div></div>
        <div style={{display:"flex",gap:6}}>
          <button className="ob ob-b" style={{padding:"5px 12px",fontSize:10}} onClick={()=>{const n=prompt("Name:");if(n){window.teWatchlist.createList(n);setRefresh(r=>r+1)}}}>+ New</button>
          <button className="ob ob-i" style={{padding:"5px 12px",fontSize:10}} onClick={async()=>{await window.teWatchlist.sync();await window.teWatchlist.pullFromCloud();setLists(window.teWatchlist.getLists());setRefresh(r=>r+1)}}>Sync</button></div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap",paddingBottom:10,borderBottom:"1px solid var(--border-dim)"}}>{lists.map(l=><button key={l.id} onClick={()=>{setActiveList(l.id);setExpandedStock(null)}}
        style={{padding:"6px 14px",fontSize:11,fontFamily:"var(--font-mono)",fontWeight:700,background:active?.id===l.id?"var(--accent-dim)":"rgba(255,255,255,0.02)",border:"1px solid "+(active?.id===l.id?"var(--accent)":"rgba(255,255,255,0.06)"),color:active?.id===l.id?"var(--accent)":"var(--text-secondary)",borderRadius:6,cursor:"pointer",transition:"all .15s",boxShadow:active?.id===l.id?"0 0 12px rgba(0,255,136,0.06)":"none"}}>{l.name} ({l.stocks.length})</button>)}</div>
      {active?(<div className="card">
        <div style={{padding:"12px 16px",borderBottom:"1px solid var(--border-dim)",display:"flex",justifyContent:"space-between",alignItems:"center",background:"linear-gradient(90deg,rgba(0,255,136,0.015),transparent)"}}>
          <span style={{fontSize:15,fontWeight:800,color:"#fff"}}>{active.name} <span style={{fontSize:9,color:"var(--text-muted)",fontFamily:"var(--font-mono)",fontWeight:400,marginLeft:6}}>{active.stocks.length} stocks</span></span>
          <div style={{display:"flex",gap:4}}>
            <button className="ob ob-b" onClick={()=>{const s=prompt("Symbol:");if(s){window.teWatchlist.addStock(active.id,{symbol:s.toUpperCase(),source:"manual"});setRefresh(r=>r+1)}}}>+Add</button>
            <button className="ob ob-i" onClick={()=>{const n=prompt("Rename:",active.name);if(n){window.teWatchlist.renameList(active.id,n);setRefresh(r=>r+1)}}}>Rename</button>
            <button className="ob ob-s" onClick={()=>{if(confirm("Delete?")){window.teWatchlist.deleteList(active.id);setActiveList(null);setRefresh(r=>r+1)}}}>Delete</button></div></div>
        <table style={{width:"100%",fontSize:11,borderCollapse:"collapse"}}>
          <thead><tr style={{background:"rgba(0,255,136,0.03)"}}>{["","SYMBOL","SECTOR","SRC","STATUS","ENTRY","TGT","SL","QTY","ORDERS"].map(h=><th key={h} style={{padding:"8px 10px",textAlign:"left",fontSize:8,fontWeight:700,fontFamily:"var(--font-mono)",color:"var(--text-muted)",borderBottom:"1px solid var(--border-dim)",whiteSpace:"nowrap",letterSpacing:1}}>{h}</th>)}</tr></thead>
          <tbody>{active.stocks.map((s,i)=>{const t=s.trade||{};const isExp=expandedStock===s.symbol;const isEd=editingTrade===s.symbol;
            return(<Fragment key={i}>
              <tr style={{borderBottom:"1px solid rgba(255,255,255,0.02)",cursor:"pointer",background:isExp?"rgba(0,255,136,0.03)":"transparent",transition:"background .15s"}} onClick={()=>setExpandedStock(isExp?null:s.symbol)}>
                <td style={{padding:"6px 10px",fontSize:11,color:isExp?"var(--accent)":"var(--text-muted)"}}>{isExp?"▼":"▶"}</td>
                <td style={{padding:"6px 10px"}}><span style={{fontWeight:800,color:"#fff",fontSize:12}}>{s.symbol}</span></td>
                <td style={{padding:"6px 10px",color:"var(--text-muted)",fontSize:9}}>{s.sector||""}</td>
                <td style={{padding:"6px 10px"}}><span style={{fontSize:7,padding:"1px 5px",borderRadius:10,fontFamily:"var(--font-mono)",background:"rgba(0,255,136,0.06)",color:"rgba(0,255,136,0.5)",border:"1px solid rgba(0,255,136,0.08)"}}>{s.source||"manual"}</span></td>
                <td style={{padding:"6px 10px"}}><span style={{fontSize:8,fontFamily:"var(--font-mono)",fontWeight:700,padding:"2px 8px",borderRadius:10,
                  background:t.status==="active"?"rgba(0,255,136,0.08)":"rgba(136,153,170,0.06)",
                  color:t.status==="active"?"var(--accent)":"var(--text-muted)",
                  border:"1px solid "+(t.status==="active"?"rgba(0,255,136,0.15)":"rgba(136,153,170,0.1)")}}>{(t.status||"WATCHING").toUpperCase()}</span></td>
                {isEd?(<Fragment>
                  <td style={{padding:"2px"}} onClick={e=>e.stopPropagation()}><input type="number" defaultValue={t.entry||""} id={"e"+s.symbol} style={{width:60,fontSize:9,background:"var(--bg-hover)",border:"1px solid var(--border-med)",color:"#fff",borderRadius:3,padding:"2px 4px",fontFamily:"var(--font-mono)"}}/></td>
                  <td style={{padding:"2px"}} onClick={e=>e.stopPropagation()}><input type="number" defaultValue={t.target||""} id={"t"+s.symbol} style={{width:60,fontSize:9,background:"var(--bg-hover)",border:"1px solid var(--accent)",color:"var(--accent)",borderRadius:3,padding:"2px 4px",fontFamily:"var(--font-mono)"}}/></td>
                  <td style={{padding:"2px"}} onClick={e=>e.stopPropagation()}><input type="number" defaultValue={t.sl||""} id={"s"+s.symbol} style={{width:60,fontSize:9,background:"var(--bg-hover)",border:"1px solid var(--red)",color:"var(--red)",borderRadius:3,padding:"2px 4px",fontFamily:"var(--font-mono)"}}/></td>
                  <td style={{padding:"2px"}} onClick={e=>e.stopPropagation()}><input type="number" defaultValue={t.qty||""} id={"q"+s.symbol} style={{width:40,fontSize:9,background:"var(--bg-hover)",border:"1px solid var(--border-med)",color:"#fff",borderRadius:3,padding:"2px 4px",fontFamily:"var(--font-mono)"}}/></td>
                </Fragment>):(<Fragment>
                  <td style={{padding:"6px 10px",fontFamily:"var(--font-mono)",fontSize:10,color:t.entry?"var(--accent)":"var(--text-muted)"}}>{t.entry||"—"}</td>
                  <td style={{padding:"6px 10px",fontFamily:"var(--font-mono)",fontSize:10,color:t.target?"var(--accent2)":"var(--text-muted)"}}>{t.target||"—"}</td>
                  <td style={{padding:"6px 10px",fontFamily:"var(--font-mono)",fontSize:10,color:t.sl?"var(--red)":"var(--text-muted)"}}>{t.sl||"—"}</td>
                  <td style={{padding:"6px 10px",fontFamily:"var(--font-mono)",fontSize:10}}>{t.qty||"—"}</td></Fragment>)}
                <td style={{padding:"3px 6px"}} onClick={e=>e.stopPropagation()}><div style={{display:"flex",gap:3,flexWrap:"nowrap"}}>
                  {isEd?<button className="ob ob-b" onClick={()=>{const en=+(document.getElementById("e"+s.symbol)?.value)||null;const tg=+(document.getElementById("t"+s.symbol)?.value)||null;const sl=+(document.getElementById("s"+s.symbol)?.value)||null;const qt=parseInt(document.getElementById("q"+s.symbol)?.value)||0;window.teWatchlist.updateTrade(active.id,s.symbol,{entry:en,target:tg,sl:sl,qty:qt,status:en?"active":"watching"});setEditingTrade(null);setRefresh(r=>r+1)}}>Save</button>:<button className="ob" style={{borderColor:"var(--border-low)",color:"var(--text-muted)"}} onClick={()=>setEditingTrade(s.symbol)}>Edit</button>}
                  <button className="ob ob-b" onClick={()=>setOrderDialog({symbol:s.symbol,type:"BUY",price:t.entry||0})}>BUY</button>
                  <button className="ob ob-s" onClick={()=>setOrderDialog({symbol:s.symbol,type:"SELL",price:t.entry||0})}>SELL</button>
                  <button className="ob ob-sl" onClick={()=>setOrderDialog({symbol:s.symbol,type:"SL",price:t.sl||0})}>SL</button>
                  <button className="ob ob-g" onClick={()=>setOrderDialog({symbol:s.symbol,type:"GTT",price:t.entry||0})}>GTT</button>
                  <button className="ob ob-s" style={{padding:"2px 4px"}} onClick={()=>{window.teWatchlist.removeStock(active.id,s.symbol);setRefresh(r=>r+1)}}>x</button></div></td>
              </tr>
              {isExp&&<tr><td colSpan={10} style={{padding:"8px 12px",background:"linear-gradient(180deg,rgba(0,0,0,0.4),rgba(6,8,12,0.9))",borderBottom:"2px solid var(--accent)"}}>
                <ChartErrorBoundary><TEChart symbol={s.symbol} prices={chartData[s.symbol]||[]} onOrder={o=>setOrderDialog(o)} onCollapse={()=>setExpandedStock(null)}/></ChartErrorBoundary>
                {!chartData[s.symbol]&&!chartFailed[s.symbol]&&<div style={{padding:16,textAlign:"center"}}><div style={{width:20,height:20,border:"2px solid var(--border-low)",borderTop:"2px solid var(--accent)",borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto 6px"}}/><div style={{fontSize:9,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>Loading...</div></div>}
                {chartFailed[s.symbol]&&<div style={{padding:12,textAlign:"center",fontSize:10,color:"var(--text-muted)"}}><div style={{marginBottom:6}}>No data for <b style={{color:"#fff"}}>{s.symbol}</b></div><div style={{display:"flex",gap:5,justifyContent:"center"}}><button onClick={()=>window.open(`https://in.tradingview.com/chart/8RFOgQZr/?symbol=NSE%3A${s.symbol}&interval=D`,'tradedge_tv')} className="ob ob-i">TV Pro</button><button onClick={()=>window.open(`https://zone.definedge.com/chart/NSE/${s.symbol}/pf`,'_blank')} className="ob ob-g">P&F</button></div></div>}
              </td></tr>}
            </Fragment>)})}</tbody>
        </table>
        {active.stocks.length===0&&<div style={{padding:40,textAlign:"center",color:"var(--text-muted)",fontSize:11,fontFamily:"var(--font-mono)"}}>Empty watchlist. Add stocks or save a scan.</div>}
      </div>):(<div style={{padding:60,textAlign:"center",color:"var(--text-muted)"}}><div style={{fontSize:48,marginBottom:12,opacity:0.3}}>📋</div><div style={{fontSize:14,fontWeight:700}}>No Watchlists</div><div style={{fontSize:10,fontFamily:"var(--font-mono)",marginTop:4,opacity:0.5}}>Create one to get started</div></div>)}
      <div style={{padding:"14px 0",marginTop:12,borderTop:"1px solid var(--border-dim)",display:"flex",justifyContent:"space-between",fontSize:8,fontFamily:"var(--font-mono)",color:"var(--text-muted)"}}>
        <span>TRADEDGE WATCHLIST v4.0 · Scroll:Zoom · Drag:Pan · Right-Click:Trade</span><span style={{color:"var(--accent)"}}>◈ CYBERPUNK EDITION</span></div>
    </div>
    {orderDialog&&<OrderDialog symbol={orderDialog.symbol} type={orderDialog.type} lastPrice={orderDialog.price} onClose={()=>setOrderDialog(null)}/>}
  </div>);
};

ReactDOM.createRoot(document.getElementById("root")).render(<WatchlistDashboard/>);
</script>
