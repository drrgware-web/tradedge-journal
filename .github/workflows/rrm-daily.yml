name: RRM Daily Update v4.0

on:
  schedule:
    # Run at 4:30 PM IST (11:00 UTC) on weekdays
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-rrm:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance numpy

      - name: Run RRM Fetcher v4.0
        run: |
          cd scripts
          python rrm_fetcher.py \
            --output ../data/rrm_data.json \
            --daily-tail 5 \
            --weekly-tail 5 \
            --monthly-tail 5 \
            --window 10

      - name: Count results
        run: |
          SECTORS=$(python3 -c "import json; d=json.load(open('data/rrm_data.json')); print(d['metadata']['total_sectors'])")
          ETFS=$(python3 -c "import json; d=json.load(open('data/rrm_data.json')); print(d['metadata']['total_etfs'])")
          DRILLS=$(python3 -c "import json; d=json.load(open('data/rrm_data.json')); print(d['metadata']['total_drilldown_sectors'])")
          echo "SECTORS=${SECTORS}" >> $GITHUB_ENV
          echo "ETFS=${ETFS}" >> $GITHUB_ENV
          echo "DRILLS=${DRILLS}" >> $GITHUB_ENV

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rrm_data.json
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "📊 RRM v4.0 ${DATE}: ${SECTORS} sectors, ${ETFS} ETFs, ${DRILLS} drilldowns (D+W+M)" || echo "No changes"
          git push
