name: RRM Daily Fetch
on:
  schedule:
    - cron: '0 12 * * 1-5'  # 5:30 PM IST (12:00 UTC) Mon-Fri
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance numpy

      - name: Run RRM Fetcher
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cd scripts
          python rrm_fetcher.py -o ../data/rrm_data.json \
            --daily-tail 8 --weekly-tail 8 --monthly-tail 8

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rrm_data.json
          DATE=$(TZ=Asia/Kolkata date '+%Y-%m-%d %H:%M IST')
          git commit -m "📊 RRM v4.2 EOD ${DATE}" || exit 0
          git push
