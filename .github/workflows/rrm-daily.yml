# ═══════════════════════════════════════════════════════════════
# TradEdge MATRIX — Daily Data Fetcher + Telegram Alerts
# Runs Mon–Fri at 5:30 PM IST (12:00 UTC) after market close
# ═══════════════════════════════════════════════════════════════

name: RRM Daily Fetch

on:
  schedule:
    - cron: '0 12 * * 1-5'
  workflow_dispatch:
    inputs:
      daily_tail:
        description: 'Daily tail length'
        required: false
        default: '10'
      weekly_tail:
        description: 'Weekly tail length'
        required: false
        default: '8'
      monthly_tail:
        description: 'Monthly tail length'
        required: false
        default: '5'
      skip_alerts:
        description: 'Skip Telegram alerts (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  fetch-rrm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance numpy

      - name: Sync positions → custom_stocks.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python scripts/rrm_pos_sync.py

      - name: Run RRM Fetcher v4.1
        run: |
          python scripts/rrm_fetcher.py \
            --output data/rrm_data.json \
            --daily-tail ${{ github.event.inputs.daily_tail || '10' }} \
            --weekly-tail ${{ github.event.inputs.weekly_tail || '8' }} \
            --monthly-tail ${{ github.event.inputs.monthly_tail || '5' }}

      - name: Verify output
        run: |
          python -c "
          import json
          d = json.load(open('data/rrm_data.json'))
          m = d['metadata']
          print(f'Version:  {m[\"version\"]}')
          print(f'Date:     {m[\"date\"]}')
          print(f'Sectors:  {m[\"total_sectors\"]}')
          print(f'ETFs:     {m[\"total_etfs\"]}')
          print(f'Globals:  {m[\"total_global_indices\"]}')
          print(f'Custom:   {m[\"total_custom_stocks\"]}')
          "

      - name: Run MATRIX Alerts
        if: ${{ github.event.inputs.skip_alerts != 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python scripts/rrm_alerts.py \
            --data data/rrm_data.json \
            --prev data/rrm_signals_prev.json \
            --benchmark "^NSEI"

      - name: Commit & push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rrm_data.json data/rrm_signals_prev.json data/custom_stocks.json
          git diff --cached --quiet || git commit -m "MATRIX data update — $(date -u +%Y-%m-%d)"
          git push
