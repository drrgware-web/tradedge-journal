name: Circuit Limits Daily

on:
  schedule:
    - cron: '0 12 * * 1-5'  # 5:30 PM IST (12:00 UTC) Mon-Fri
  workflow_dispatch:

jobs:
  circuit-fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Circuit Limits
        run: python scripts/circuit_fetcher.py

      - name: Commit & Push
        run: |
          git config user.name "TradEdge Bot"
          git config user.email "bot@tradedge.dev"
          git add data/circuit_limits.json
          git diff --cached --quiet || git commit -m "Circuit limits $(date +'%Y-%m-%d %H:%M IST')"
          git push
