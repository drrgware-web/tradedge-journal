# .github/workflows/scanner-daily.yml
# Daily stock scanner workflow with Screener.in data updates

name: Daily Scanner

on:
  schedule:
    # Run Mon-Fri at 5:30 PM IST (12:00 PM UTC)
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 yfinance pandas numpy
      
      - name: Run main scanner
        run: |
          python scripts/scanner_runner.py
      
      - name: Generate stock details (O'Neil scores)
        run: |
          python scripts/stock_detail_generator.py --top 500

      - name: Update Screener.in data (top 50 stocks)
        run: |
          if [ -f "scripts/screener_fetcher.py" ]; then
            echo "Fetching Screener.in data for top 50 stocks..."
            python scripts/screener_fetcher.py --limit 50
          else
            echo "Screener fetcher not found, skipping..."
          fi

      - name: Regenerate scanner_results.json
        run: |
          if [ -f "scripts/generate_scanner_summary.py" ]; then
            echo "Aggregating stock details into scanner_results.json..."
            python scripts/generate_scanner_summary.py
          else
            echo "generate_scanner_summary.py not found, skipping..."
          fi
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add all data files
          git add data/*.json
          git add data/stock_details/*.json || true
          git add data/screener_cache.json || true
          
          # Always commit (--allow-empty ensures commit even if no data files changed)
          git commit --allow-empty -m "📈 Daily scanner update [$(date +'%Y-%m-%d')]"
          git pull --rebase origin main
          git push
      
      - name: Summary
        run: |
          echo "## Daily Scanner Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: $(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          if [ -f "data/scanner_results.json" ]; then
            TOTAL=$(jq '.all_stocks | length' data/scanner_results.json 2>/dev/null || echo "N/A")
            echo "- **Total stocks**: $TOTAL" >> $GITHUB_STEP_SUMMARY
          fi
