# .github/workflows/scanner-daily.yml
# Daily stock scanner workflow with shareholding updates

name: Daily Scanner

on:
  schedule:
    # Run Mon-Fri at 5:30 PM IST (12:00 PM UTC)
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 yfinance pandas numpy
      
      - name: Run main scanner
        run: |
          python scripts/scanner_runner.py
      
      - name: Update shareholding for scan results (top 50)
        run: |
          if [ -f "scripts/shareholding_fetcher.py" ]; then
            python scripts/shareholding_fetcher.py --limit 50
          else
            echo "Shareholding fetcher not found, skipping..."
          fi
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add all data files
          git add data/*.json
          git add data/stock_details/*.json || true
          git add data/shareholding_cache.json || true
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📈 Daily scanner update [$(date +'%Y-%m-%d')]"
            git push
          fi
      
      - name: Summary
        run: |
          echo "## Daily Scanner Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: $(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          if [ -f "data/scanner_results.json" ]; then
            TOTAL=$(jq '.all_stocks | length' data/scanner_results.json 2>/dev/null || echo "N/A")
            echo "- **Total stocks scanned**: $TOTAL" >> $GITHUB_STEP_SUMMARY
          fi
