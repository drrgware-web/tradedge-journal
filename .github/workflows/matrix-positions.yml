# ═══════════════════════════════════════════════════════════════
# TradEdge MATRIX — Position Monitor (every 30 min)
# Runs Mon–Fri during market hours: 9:15 AM – 3:45 PM IST
# Lightweight: no Yahoo Finance calls, just Supabase + saved signals
# ═══════════════════════════════════════════════════════════════

name: MATRIX Position Monitor

on:
  schedule:
    # Every 30 min during IST market hours (3:45 AM – 10:15 AM UTC = 9:15 AM – 3:45 PM IST)
    # Mon–Fri only
    - cron: '45 3 * * 1-5'    # 9:15 AM IST
    - cron: '15 4 * * 1-5'    # 9:45 AM IST
    - cron: '45 4 * * 1-5'    # 10:15 AM IST
    - cron: '15 5 * * 1-5'    # 10:45 AM IST
    - cron: '45 5 * * 1-5'    # 11:15 AM IST
    - cron: '15 6 * * 1-5'    # 11:45 AM IST
    - cron: '45 6 * * 1-5'    # 12:15 PM IST
    - cron: '15 7 * * 1-5'    # 12:45 PM IST
    - cron: '45 7 * * 1-5'    # 1:15 PM IST
    - cron: '15 8 * * 1-5'    # 1:45 PM IST
    - cron: '45 8 * * 1-5'    # 2:15 PM IST
    - cron: '15 9 * * 1-5'    # 2:45 PM IST
    - cron: '45 9 * * 1-5'    # 3:15 PM IST
    - cron: '15 10 * * 1-5'   # 3:45 PM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Position Monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python scripts/rrm_pos_monitor.py

      - name: Commit alert state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pos_alerts_sent.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Position monitor state — $(date -u +%Y-%m-%dT%H:%M)"
          git push || true
