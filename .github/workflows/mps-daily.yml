# =============================================================================
# MPS v3.1.1 Hourly + EOD Auto-Update — GitHub Action
# =============================================================================
# Runs every hour during market hours (9:15 AM - 3:30 PM IST)
# + one final EOD run at 4:15 PM IST (after FII data publishes)
#
# Schedule (IST → UTC):
#   9:45 AM IST  = 04:15 UTC  (first intraday, 30 min after open)
#   10:45 AM IST = 05:15 UTC
#   11:45 AM IST = 06:15 UTC
#   12:45 PM IST = 07:15 UTC
#   1:45 PM IST  = 08:15 UTC
#   2:45 PM IST  = 09:15 UTC
#   3:45 PM IST  = 10:15 UTC  (15 min after close)
#   4:15 PM IST  = 10:45 UTC  (EOD final — FII data available)
#
# Intraday runs use last known FII value from state file.
# EOD run refreshes FII + commits final daily record to history.
#
# v3.1.1 Changes:
#   - Yahoo Finance as primary market data source (NSE blocked on GH Actions)
#   - Hourly updates during market hours
#   - data/mps_latest.json updates every hour (dashboard stays fresh)
#   - data/mps_history.json only appends on EOD run
# =============================================================================

name: MPS Daily Update

on:
  schedule:
    # Hourly during market hours (IST → UTC, Mon-Fri)
    - cron: '15 4,5,6,7,8,9 * * 1-5'    # 9:45 AM to 2:45 PM IST (hourly)
    - cron: '15 10 * * 1-5'               # 3:45 PM IST (post-close)
    - cron: '45 10 * * 1-5'               # 4:15 PM IST (EOD final)

  workflow_dispatch:
    inputs:
      force_eod:
        description: 'Force EOD mode (updates history)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: mps-update
  cancel-in-progress: false

jobs:
  update-mps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 yfinance

      - name: Create data directory
        run: mkdir -p data

      - name: Determine run mode (intraday vs EOD)
        id: mode
        run: |
          # Current UTC hour
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          FORCE_EOD="${{ github.event.inputs.force_eod }}"
          
          # EOD = 10:45 UTC (4:15 PM IST) or forced
          if [ "$HOUR" = "10" ] && [ "$MINUTE" -ge "40" ]; then
            echo "mode=eod" >> $GITHUB_OUTPUT
            echo "📊 Mode: EOD (final daily update + history)"
          elif [ "$FORCE_EOD" = "true" ]; then
            echo "mode=eod" >> $GITHUB_OUTPUT
            echo "📊 Mode: EOD (forced)"
          else
            echo "mode=intraday" >> $GITHUB_OUTPUT
            echo "⚡ Mode: INTRADAY (live update, no history append)"
          fi

      - name: Run MPS v3.1.1 Fetcher
        id: mps
        run: |
          cd scripts
          python mps_fetcher_v3.py \
            --output ../data/mps_latest.json \
            --state-file ../data/mps_state.json
        continue-on-error: true

      - name: Check if fetch succeeded
        if: steps.mps.outcome == 'failure'
        run: |
          echo "::warning::MPS fetch failed. This could be due to:"
          echo "  - Market holiday (no data available)"
          echo "  - Chartink/Yahoo Finance issues"
          echo "  - Network issues"
          echo "Skipping commit."
          exit 0

      - name: Update history file (EOD only)
        if: steps.mps.outcome == 'success' && steps.mode.outputs.mode == 'eod'
        run: |
          python3 -c "
          import json
          
          with open('data/mps_latest.json') as f:
              latest = json.load(f)
          
          history_file = 'data/mps_history.json'
          try:
              with open(history_file) as f:
                  history = json.load(f)
          except FileNotFoundError:
              history = []
          
          today = latest['current']['date']
          history = [h for h in history if h.get('date') != today]
          
          record = {
              'date': today,
              'final_score': latest['current']['final_score'],
              'base_score': latest['current']['base_score'],
              'total_modifier': latest['current']['total_modifier'],
              'zone': latest['current']['zone'],
              'state': latest['current']['state'],
              'burst_ratio': latest['current'].get('burst_ratio', 0),
              'burst_label': latest['current'].get('burst_label', ''),
              'rsi_breadth_pct': latest['current'].get('rsi_breadth_pct', 0),
              'atr_breadth_pct': latest['current'].get('atr_breadth_pct', 0),
              'atr_regime': latest['current'].get('atr_regime', ''),
              'macro_summary': latest['current'].get('macro_summary', ''),
              'pillars': {p['name']: p['raw_score'] for p in latest['current']['pillar_scores']},
              'modifiers_active': [m['name'] for m in latest['current']['modifiers'] if m['triggered']],
          }
          
          macro = latest.get('raw_inputs', {}).get('macro', {})
          if macro:
              record['macro'] = macro
          
          history.append(record)
          history = history[-365:]
          
          with open(history_file, 'w') as f:
              json.dump(history, f, indent=2)
          
          print(f'📊 EOD: History updated — {len(history)} records')
          "

      - name: Commit and push
        if: steps.mps.outcome == 'success'
        run: |
          git config user.name "MPS Bot"
          git config user.email "mps-bot@tradedge.local"
          
          MODE="${{ steps.mode.outputs.mode }}"
          
          # Add files that exist (state file may be new on first run)
          git add data/mps_latest.json || true
          [ -f data/mps_state.json ] && git add data/mps_state.json || true
          if [ "$MODE" = "eod" ]; then
            [ -f data/mps_history.json ] && git add data/mps_history.json || true
          fi
          
          ZONE=$(python3 -c "import json; print(json.load(open('data/mps_latest.json'))['current']['zone'])")
          SCORE=$(python3 -c "import json; print(json.load(open('data/mps_latest.json'))['current']['final_score'])")
          STATE=$(python3 -c "import json; print(json.load(open('data/mps_latest.json'))['current']['state'])")
          DATE=$(date +%Y-%m-%d)
          TIME=$(TZ='Asia/Kolkata' date +%H:%M)
          
          if [ "$MODE" = "eod" ]; then
            git commit -m "📊 MPS v3.1.1 EOD ${DATE}: ${SCORE} — ${ZONE} [${STATE}]" || echo "No changes to commit"
          else
            git commit -m "⚡ MPS ${DATE} ${TIME} IST: ${SCORE} — ${ZONE}" || echo "No changes to commit"
          fi
          
          git push

      - name: Summary
        if: steps.mps.outcome == 'success'
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          python3 -c "
          import json
          with open('data/mps_latest.json') as f:
              d = json.load(f)
          c = d['current']
          mode = '${MODE}'
          
          print(f'## MPS v3.1.1 {\"EOD\" if mode == \"eod\" else \"Intraday\"} Summary')
          print(f'**Score:** {c[\"final_score\"]}')
          print(f'**Zone:** {c[\"zone\"]} {c[\"zone_emoji\"]}')
          print(f'**State:** {c[\"state\"]} — {c[\"state_message\"]}')
          print(f'**Risk:** {c[\"risk_per_trade\"]}')
          print()
          if mode == 'eod':
              print('### Pillars')
              for p in c['pillar_scores']:
                  print(f'- {p[\"name\"]}: {p[\"raw_score\"]:.1f}/100')
              print()
              print('### Data Sources')
              sources = d.get('raw_inputs', {}).get('data_sources', {})
              for k, v in sources.items():
                  print(f'- {k}: {v}')
          else:
              print('_Intraday snapshot — history updates at EOD (4:15 PM IST)_')
          " >> $GITHUB_STEP_SUMMARY
