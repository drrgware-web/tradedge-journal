<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRG — Relative Rotation Graph | TradEdge</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06080d;--bg2:#0c1018;--bg3:#111827;--bg4:#1a2235;--bd:#1e293b;--bd2:#334155;--t1:#e2e8f0;--t2:#94a3b8;--t3:#64748b;--t4:#475569;--cyan:#22d3ee;--pink:#f472b6;--green:#4ade80;--fd:'Orbitron',sans-serif;--fm:'JetBrains Mono',monospace;--fb:'Exo 2',sans-serif;--r:10px}
body{font-family:var(--fb);background:var(--bg);color:var(--t1);min-height:100vh}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:9999}
.d{max-width:1400px;margin:0 auto;padding:16px 16px 60px}
.hd{text-align:center;padding:20px 0 14px;position:relative}
.hd::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:300px;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent)}
.hd h1{font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:6px;color:var(--cyan)}
.hd p{font-family:var(--fm);font-size:10px;color:var(--t4);letter-spacing:2px;margin-top:2px}
/* Controls */
.ctrl{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;padding:8px 12px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r)}
.cg{display:flex;align-items:center;gap:5px}
.cl{font-family:var(--fm);font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase}
.cb{padding:4px 12px;border-radius:5px;border:1px solid var(--bd);background:var(--bg3);color:var(--t2);font-family:var(--fm);font-size:10px;font-weight:600;cursor:pointer;transition:.2s}
.cb:hover{border-color:var(--bd2);color:var(--t1)}
.cb.a{border-color:var(--cyan);color:var(--cyan);background:rgba(34,211,238,.08)}
.cb.warn{border-color:#eab308;color:#eab308;background:rgba(234,179,8,.06)}
select.cs{padding:4px 8px;border-radius:5px;border:1px solid var(--bd);background:var(--bg3);color:var(--t1);font-family:var(--fm);font-size:10px;cursor:pointer}
.badge{font-family:var(--fm);font-size:9px;padding:3px 8px;border:1px solid var(--bd);border-radius:4px;background:var(--bg3)}
.badge .dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:3px;vertical-align:middle}
.badge.live .dot{background:var(--green);animation:pd 2s infinite}
.badge.sample .dot{background:#ef4444}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.3}}
/* Breadcrumb */
.bc{display:flex;align-items:center;gap:6px;margin-bottom:10px;font-family:var(--fm);font-size:11px}
.bc span{color:var(--t3);cursor:pointer;transition:.2s}
.bc span:hover{color:var(--cyan)}
.bc .arr{color:var(--t4)}
.bc .cur{color:var(--cyan);font-weight:700;cursor:default}
/* Layout */
.ml{display:grid;grid-template-columns:1fr 260px;gap:12px}
@media(max-width:900px){.ml{grid-template-columns:1fr}}
/* Chart */
.rp{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:10px;position:relative}
.rc{position:relative;width:100%;aspect-ratio:1.2/1;min-height:480px}
.rc svg{width:100%;height:100%}
/* Tooltip */
.tt{position:absolute;display:none;background:var(--bg3);border:1px solid var(--bd2);border-radius:6px;padding:8px 10px;font-family:var(--fm);font-size:10px;pointer-events:none;z-index:100;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.tt b{display:block;margin-bottom:3px}
/* Sidebar */
.sb{display:flex;flex-direction:column;gap:8px}
.qp{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:10px}
.qt{font-family:var(--fd);font-size:10px;font-weight:600;letter-spacing:2px;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.qd{width:8px;height:8px;border-radius:50%}
.sl{list-style:none}
.si{display:flex;align-items:center;gap:5px;padding:3px 0;font-family:var(--fm);font-size:10px;color:var(--t2);cursor:pointer;transition:.15s}
.si:hover{color:var(--t1)}
.si .sd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.si .sv{margin-left:auto;color:var(--t4);font-size:9px}
/* Footer */
.ft{text-align:center;padding:14px 0;font-family:var(--fm);font-size:9px;color:var(--t4);letter-spacing:1px;border-top:1px solid var(--bd);margin-top:16px}
/* Loading */
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:16px}
.sp{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="d" id="app">
  <div class="ld"><div class="sp"></div><div style="font-family:var(--fm);font-size:11px;color:var(--t3);letter-spacing:2px">LOADING RRG DATA...</div></div>
</div>
<script>
// ═══ STATE ═══
let DATA=null, IS_LIVE=false, MODE='sectors', TF='daily', HIGHLIGHT=null, DRILLDOWN=null, STOCK_LIMIT=10;

// ═══ SAMPLE DATA ═══
const SAMPLE={
  benchmark:{symbol:"^NSEI",name:"Nifty 50"},available_benchmarks:{"^NSEI":"Nifty 50","^NSEBANK":"Nifty Bank"},
  daily:{sectors:[
    {symbol:"^CNXIT",name:"Nifty IT",quadrant:"Improving",color:"#06b6d4",current:{rs_ratio:97.5,rs_momentum:103.2},tail:[{rs_ratio:95.8,rs_momentum:101.5},{rs_ratio:96.2,rs_momentum:102},{rs_ratio:96.8,rs_momentum:102.5},{rs_ratio:97.1,rs_momentum:103},{rs_ratio:97.5,rs_momentum:103.2}]},
    {symbol:"^CNXPHARMA",name:"Nifty Pharma",quadrant:"Leading",color:"#f59e0b",current:{rs_ratio:102.8,rs_momentum:101.5},tail:[{rs_ratio:101.2,rs_momentum:100.5},{rs_ratio:101.8,rs_momentum:100.8},{rs_ratio:102.2,rs_momentum:101},{rs_ratio:102.5,rs_momentum:101.2},{rs_ratio:102.8,rs_momentum:101.5}]},
    {symbol:"^NSEBANK",name:"Nifty Bank",quadrant:"Weakening",color:"#3b82f6",current:{rs_ratio:101.2,rs_momentum:98.8},tail:[{rs_ratio:102.5,rs_momentum:99.8},{rs_ratio:102.1,rs_momentum:99.5},{rs_ratio:101.8,rs_momentum:99.2},{rs_ratio:101.5,rs_momentum:99},{rs_ratio:101.2,rs_momentum:98.8}]},
    {symbol:"^CNXAUTO",name:"Nifty Auto",quadrant:"Lagging",color:"#ef4444",current:{rs_ratio:98.2,rs_momentum:98.5},tail:[{rs_ratio:99.5,rs_momentum:99.2},{rs_ratio:99.1,rs_momentum:99},{rs_ratio:98.8,rs_momentum:98.8},{rs_ratio:98.5,rs_momentum:98.6},{rs_ratio:98.2,rs_momentum:98.5}]},
    {symbol:"^CNXFMCG",name:"Nifty FMCG",quadrant:"Leading",color:"#22c55e",current:{rs_ratio:103.5,rs_momentum:101.8},tail:[{rs_ratio:102,rs_momentum:100.5},{rs_ratio:102.5,rs_momentum:101},{rs_ratio:103,rs_momentum:101.2},{rs_ratio:103.2,rs_momentum:101.5},{rs_ratio:103.5,rs_momentum:101.8}]},
    {symbol:"^CNXMETAL",name:"Nifty Metal",quadrant:"Improving",color:"#8b5cf6",current:{rs_ratio:98.8,rs_momentum:102.2},tail:[{rs_ratio:97.2,rs_momentum:100.8},{rs_ratio:97.6,rs_momentum:101.2},{rs_ratio:98,rs_momentum:101.6},{rs_ratio:98.4,rs_momentum:102},{rs_ratio:98.8,rs_momentum:102.2}]},
    {symbol:"^CNXREALTY",name:"Nifty Realty",quadrant:"Lagging",color:"#ec4899",current:{rs_ratio:97,rs_momentum:98.2},tail:[{rs_ratio:98.5,rs_momentum:99},{rs_ratio:98,rs_momentum:98.8},{rs_ratio:97.6,rs_momentum:98.5},{rs_ratio:97.3,rs_momentum:98.3},{rs_ratio:97,rs_momentum:98.2}]},
    {symbol:"^CNXENERGY",name:"Nifty Energy",quadrant:"Leading",color:"#f97316",current:{rs_ratio:101.5,rs_momentum:100.8},tail:[{rs_ratio:100.5,rs_momentum:100.2},{rs_ratio:100.8,rs_momentum:100.4},{rs_ratio:101,rs_momentum:100.5},{rs_ratio:101.2,rs_momentum:100.7},{rs_ratio:101.5,rs_momentum:100.8}]},
    {symbol:"^CNXPSUBANK",name:"Nifty PSU Bank",quadrant:"Weakening",color:"#0ea5e9",current:{rs_ratio:100.5,rs_momentum:97.5},tail:[{rs_ratio:102,rs_momentum:99},{rs_ratio:101.5,rs_momentum:98.5},{rs_ratio:101,rs_momentum:98},{rs_ratio:100.8,rs_momentum:97.8},{rs_ratio:100.5,rs_momentum:97.5}]},
    {symbol:"^CNXINFRA",name:"Nifty Infra",quadrant:"Weakening",color:"#14b8a6",current:{rs_ratio:100.2,rs_momentum:99.2},tail:[{rs_ratio:100.8,rs_momentum:100},{rs_ratio:100.6,rs_momentum:99.8},{rs_ratio:100.5,rs_momentum:99.5},{rs_ratio:100.3,rs_momentum:99.3},{rs_ratio:100.2,rs_momentum:99.2}]},
  ],etfs:[],quadrant_summary:{Leading:["Nifty Pharma","Nifty FMCG","Nifty Energy"],Improving:["Nifty IT","Nifty Metal"],Lagging:["Nifty Auto","Nifty Realty"],Weakening:["Nifty Bank","Nifty PSU Bank","Nifty Infra"]},tail_length:5},
  weekly:{sectors:[],etfs:[],quadrant_summary:{Leading:[],Improving:[],Lagging:[],Weakening:[]},tail_length:5},
  drilldown:{},config:{window:10,center:100},
  metadata:{generated_at:"2026-03-14T16:30:00",date:"2026-03-14",total_sectors:10,total_etfs:0,total_drilldown_sectors:0,timeframes:["daily","weekly"]}
};

// ═══ RENDER ═══
function render(){
  const d=DATA,app=document.getElementById('app');
  const tf_data=d[TF]||d.daily;
  let items,benchLabel,breadcrumb='';

  if(DRILLDOWN&&d.drilldown&&d.drilldown[DRILLDOWN]){
    const dd=d.drilldown[DRILLDOWN];
    const ddTF=TF==='weekly'?(dd.weekly||[]):(dd.daily||[]);
    // Apply stock limit
    items=STOCK_LIMIT==='all'?ddTF:ddTF.slice(0,parseInt(STOCK_LIMIT));
    benchLabel=dd.sector_name;
    breadcrumb=`<div class="bc"><span onclick="exitDrill()">Sectors</span><span class="arr">›</span><span class="cur">${dd.sector_name} — Stocks</span></div>`;
  } else {
    items=MODE==='etfs'?(tf_data.etfs||[]):(tf_data.sectors||[]);
    benchLabel=d.benchmark?.name||'Nifty 50';
  }

  const grp={Leading:[],Improving:[],Weakening:[],Lagging:[]};
  items.forEach(s=>{if(grp[s.quadrant])grp[s.quadrant].push(s)});

  app.innerHTML=`
    <div class="hd"><h1>Relative Rotation Graph</h1><p>TRADEDGE · SECTOR ROTATION · ${d.metadata?.date||''}</p></div>
    <div class="ctrl">
      <div class="cg"><span class="cl">Mode:</span>
        <button class="cb ${!DRILLDOWN&&MODE==='sectors'?'a':''}" onclick="setMode('sectors')">Sectors</button>
        <button class="cb ${!DRILLDOWN&&MODE==='etfs'?'a':''}" onclick="setMode('etfs')">ETFs</button>
      </div>
      <div class="cg"><span class="cl">Period:</span>
        <button class="cb ${TF==='daily'?'a':''}" onclick="setTF('daily')">Daily</button>
        <button class="cb ${TF==='weekly'?'a':''}" onclick="setTF('weekly')">Weekly</button>
      </div>
      ${DRILLDOWN?`<div class="cg"><span class="cl">Stocks:</span>
        <select class="cs" onchange="setLimit(this.value)">
          <option value="5" ${STOCK_LIMIT==5?'selected':''}>Top 5</option>
          <option value="10" ${STOCK_LIMIT==10?'selected':''}>Top 10</option>
          <option value="all" ${STOCK_LIMIT==='all'?'selected':''}>All</option>
        </select></div>`:''}
      <div class="cg"><span class="cl">Bench:</span>
        <span style="font-family:var(--fm);font-size:11px;color:var(--cyan);font-weight:600">${benchLabel}</span>
      </div>
      <span class="badge ${IS_LIVE?'live':'sample'}"><span class="dot"></span>${IS_LIVE?'LIVE':'SAMPLE'}</span>
    </div>
    ${breadcrumb}
    <div class="ml">
      <div class="rp"><div class="rc" id="rc"></div><div class="tt" id="tt"></div></div>
      <div class="sb">
        ${qPanel('Leading','#22c55e',grp.Leading)}
        ${qPanel('Improving','#3b82f6',grp.Improving)}
        ${qPanel('Weakening','#eab308',grp.Weakening)}
        ${qPanel('Lagging','#ef4444',grp.Lagging)}
      </div>
    </div>
    <div class="ft">TradEdge RRG v2 · ${items.length} instruments · ${TF} · Bench: ${benchLabel} · ✦ Trade the Pulse ✦</div>`;

  drawChart(items);
}

function qPanel(name,color,items){
  return `<div class="qp"><div class="qt"><div class="qd" style="background:${color}"></div><span style="color:${color}">${name}</span><span style="font-family:var(--fm);font-size:9px;color:var(--t4);margin-left:auto">${items.length}</span></div>
  <ul class="sl">${items.length===0?'<li style="font-family:var(--fm);font-size:9px;color:var(--t4);padding:3px 0">—</li>':
    items.map(s=>`<li class="si" onmouseenter="hl('${s.symbol}')" onmouseleave="hl(null)" ${!DRILLDOWN&&MODE==='sectors'?`ondblclick="drill('${s.symbol}')"`:''}><span class="sd" style="background:${s.color}"></span><span>${s.name}</span><span class="sv">${s.current.rs_ratio.toFixed(1)}/${s.current.rs_momentum.toFixed(1)}</span></li>`).join('')}</ul></div>`;
}

// ═══ SVG CHART ═══
function drawChart(items){
  const el=document.getElementById('rc');
  if(!el)return;
  const W=800,H=660,P={t:30,r:30,b:40,l:50},iw=W-P.l-P.r,ih=H-P.t-P.b,C=100;
  let ax=[],ay=[];
  items.forEach(s=>s.tail.forEach(t=>{ax.push(t.rs_ratio);ay.push(t.rs_momentum)}));
  if(!ax.length){ax=[96,104];ay=[96,104]}
  const mg=1.5;
  const xn=Math.min(Math.min(...ax)-mg,C-4),xx=Math.max(Math.max(...ax)+mg,C+4);
  const yn=Math.min(Math.min(...ay)-mg,C-4),yx=Math.max(Math.max(...ay)+mg,C+4);
  const tX=v=>P.l+((v-xn)/(xx-xn))*iw,tY=v=>P.t+ih-((v-yn)/(yx-yn))*ih;
  const cx=tX(C),cy=tY(C);

  let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  // Quadrants
  s+=`<rect x="${P.l}" y="${P.t}" width="${cx-P.l}" height="${cy-P.t}" fill="rgba(59,130,246,.05)"/>`;
  s+=`<rect x="${cx}" y="${P.t}" width="${W-P.r-cx}" height="${cy-P.t}" fill="rgba(34,197,94,.05)"/>`;
  s+=`<rect x="${P.l}" y="${cy}" width="${cx-P.l}" height="${H-P.b-cy}" fill="rgba(239,68,68,.05)"/>`;
  s+=`<rect x="${cx}" y="${cy}" width="${W-P.r-cx}" height="${H-P.b-cy}" fill="rgba(234,179,8,.05)"/>`;
  // Labels
  s+=`<text x="${(P.l+cx)/2}" y="${P.t+18}" text-anchor="middle" font-size="11" font-family="Orbitron" font-weight="600" fill="rgba(59,130,246,.35)" letter-spacing="2">IMPROVING</text>`;
  s+=`<text x="${(cx+W-P.r)/2}" y="${P.t+18}" text-anchor="middle" font-size="11" font-family="Orbitron" font-weight="600" fill="rgba(34,197,94,.35)" letter-spacing="2">LEADING</text>`;
  s+=`<text x="${(P.l+cx)/2}" y="${H-P.b-8}" text-anchor="middle" font-size="11" font-family="Orbitron" font-weight="600" fill="rgba(239,68,68,.35)" letter-spacing="2">LAGGING</text>`;
  s+=`<text x="${(cx+W-P.r)/2}" y="${H-P.b-8}" text-anchor="middle" font-size="11" font-family="Orbitron" font-weight="600" fill="rgba(234,179,8,.35)" letter-spacing="2">WEAKENING</text>`;
  // Grid
  for(let v=Math.ceil(xn);v<=Math.floor(xx);v++){
    const x=tX(v),ic=v===C;
    s+=`<line x1="${x}" y1="${P.t}" x2="${x}" y2="${H-P.b}" stroke="${ic?'#475569':'#1e293b'}" stroke-width="${ic?1.5:.5}" ${ic?'':'stroke-dasharray="2,4"'}/>`;
    if(v%2===0)s+=`<text x="${x}" y="${H-P.b+16}" text-anchor="middle" font-size="9" fill="#475569" font-family="JetBrains Mono">${v}</text>`;
  }
  for(let v=Math.ceil(yn);v<=Math.floor(yx);v++){
    const y=tY(v),ic=v===C;
    s+=`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="${ic?'#475569':'#1e293b'}" stroke-width="${ic?1.5:.5}" ${ic?'':'stroke-dasharray="2,4"'}/>`;
    if(v%2===0)s+=`<text x="${P.l-6}" y="${y+3}" text-anchor="end" font-size="9" fill="#475569" font-family="JetBrains Mono">${v}</text>`;
  }
  s+=`<text x="${W/2}" y="${H-4}" text-anchor="middle" font-size="10" fill="#64748b" font-family="JetBrains Mono" letter-spacing="2">JdK RS-RATIO →</text>`;
  s+=`<text x="12" y="${H/2}" text-anchor="middle" font-size="10" fill="#64748b" font-family="JetBrains Mono" letter-spacing="2" transform="rotate(-90,12,${H/2})">JdK RS-MOMENTUM →</text>`;

  // Data
  items.forEach(sec=>{
    const isH=HIGHLIGHT===sec.symbol;
    const op=HIGHLIGHT&&!isH?.12:1;
    if(sec.tail.length<2)return;
    let pd='';
    sec.tail.forEach((t,i)=>{const x=tX(t.rs_ratio),y=tY(t.rs_momentum);pd+=(i===0?'M':'L')+x.toFixed(1)+','+y.toFixed(1)});
    s+=`<path d="${pd}" fill="none" stroke="${sec.color}" stroke-width="${isH?2.5:1.5}" stroke-linecap="round" stroke-linejoin="round" opacity="${op}"/>`;
    sec.tail.forEach((t,i)=>{const x=tX(t.rs_ratio),y=tY(t.rs_momentum),last=i===sec.tail.length-1,r=last?(isH?6:4.5):2;
      s+=`<circle cx="${x}" cy="${y}" r="${r}" fill="${sec.color}" stroke="${last?'#0c1018':'none'}" stroke-width="${last?2:0}" opacity="${op}"/>`});
    // Arrow
    const l=sec.tail[sec.tail.length-1],p=sec.tail[sec.tail.length-2];
    const lx=tX(l.rs_ratio),ly=tY(l.rs_momentum),px=tX(p.rs_ratio),py=tY(p.rs_momentum);
    const a=Math.atan2(ly-py,lx-px),al=8;
    s+=`<polygon points="${lx},${ly} ${lx+al*Math.cos(a+2.6)},${ly+al*Math.sin(a+2.6)} ${lx+al*Math.cos(a-2.6)},${ly+al*Math.sin(a-2.6)}" fill="${sec.color}" opacity="${op}"/>`;
    // Label
    if(op>.5){
      const nm=sec.name.replace('Nifty ','');
      s+=`<text x="${lx+8}" y="${ly-6}" font-size="${isH?11:9}" fill="${sec.color}" font-family="JetBrains Mono" font-weight="${isH?700:500}" opacity="${Math.min(op+.2,1)}">${nm}</text>`}
  });
  s+='</svg>';
  el.innerHTML=s;

  // Hover
  const svg=el.querySelector('svg');
  svg.onmousemove=e=>{
    const r=svg.getBoundingClientRect(),sx=W/r.width,sy=H/r.height;
    const mx=(e.clientX-r.left)*sx,my=(e.clientY-r.top)*sy;
    let cl=null,cd=20;
    items.forEach(sec=>{const t=sec.tail[sec.tail.length-1];const d=Math.hypot(mx-tX(t.rs_ratio),my-tY(t.rs_momentum));if(d<cd){cd=d;cl=sec}});
    const tt=document.getElementById('tt');
    if(cl){
      tt.style.display='block';
      tt.style.left=(e.clientX-el.closest('.rp').getBoundingClientRect().left+14)+'px';
      tt.style.top=(e.clientY-el.closest('.rp').getBoundingClientRect().top-10)+'px';
      tt.innerHTML=`<b style="color:${cl.color}">${cl.name}</b><span style="font-size:9px;color:var(--t3)">${cl.quadrant}</span><div style="margin-top:4px">RS-Ratio: <b>${cl.current.rs_ratio.toFixed(2)}</b><br>RS-Mom: <b>${cl.current.rs_momentum.toFixed(2)}</b></div>${!DRILLDOWN&&MODE==='sectors'?'<div style="margin-top:4px;font-size:9px;color:var(--cyan)">Double-click to drill in →</div>':''}`;
      HIGHLIGHT=cl.symbol;drawChart(items);
    }else{tt.style.display='none';if(HIGHLIGHT){HIGHLIGHT=null;drawChart(items)}}
  };
  svg.onmouseleave=()=>{document.getElementById('tt').style.display='none';if(HIGHLIGHT){HIGHLIGHT=null;drawChart(items)}};
  // Click to drill
  if(!DRILLDOWN&&MODE==='sectors'){
    svg.ondblclick=e=>{
      const r=svg.getBoundingClientRect(),sx=W/r.width,sy=H/r.height;
      const mx=(e.clientX-r.left)*sx,my=(e.clientY-r.top)*sy;
      let cl=null,cd=20;
      items.forEach(sec=>{const t=sec.tail[sec.tail.length-1];const d=Math.hypot(mx-tX(t.rs_ratio),my-tY(t.rs_momentum));if(d<cd){cd=d;cl=sec}});
      if(cl)drill(cl.symbol);
    };
  }
}

// ═══ ACTIONS ═══
function setMode(m){DRILLDOWN=null;MODE=m;HIGHLIGHT=null;render()}
function setTF(t){TF=t;HIGHLIGHT=null;render()}
function setLimit(v){STOCK_LIMIT=v;render()}
function hl(sym){HIGHLIGHT=sym;const tf=DATA[TF]||DATA.daily;let items;if(DRILLDOWN&&DATA.drilldown&&DATA.drilldown[DRILLDOWN]){const dd=DATA.drilldown[DRILLDOWN];items=TF==='weekly'?(dd.weekly||[]):(dd.daily||[]);if(STOCK_LIMIT!=='all')items=items.slice(0,parseInt(STOCK_LIMIT))}else{items=MODE==='etfs'?(tf.etfs||[]):(tf.sectors||[])}drawChart(items)}
function drill(sym){if(DATA.drilldown&&DATA.drilldown[sym]){DRILLDOWN=sym;HIGHLIGHT=null;render()}else{alert('No drill-down data available for this sector yet. Run the RRG GitHub Action to generate stock-level data.')}}
function exitDrill(){DRILLDOWN=null;HIGHLIGHT=null;render()}

// ═══ INIT ═══
async function init(){
  let d=null;
  try{
    const r=await fetch('./data/rrg_data.json',{cache:'no-store'});
    if(r.ok){d=await r.json();if(d?.daily?.sectors?.length>0)IS_LIVE=true;else d=null}
  }catch(e){console.warn('RRG fetch failed:',e)}
  if(!d){d=SAMPLE;IS_LIVE=false}
  DATA=d;
  await new Promise(r=>setTimeout(r,300));
  render();
}
init();
</script>
