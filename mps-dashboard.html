<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPS v3.1 — Market Pulse Score | TradEdge Command Center</title>
<link rel="icon" type="image/jpeg" href="./assets/logo.jpeg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   CSS RESET & VARIABLES
   ═══════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-void: #06080d;
  --bg-panel: #0c1018;
  --bg-card: #111827;
  --bg-card-hover: #1a2235;
  --border-dim: #1e293b;
  --border-glow: #334155;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --text-dim: #475569;

  /* Zone colors */
  --easy-money: #22c55e;
  --easy-money-bg: rgba(34,197,94,0.08);
  --smart-money: #3b82f6;
  --smart-money-bg: rgba(59,130,246,0.08);
  --hard-money: #eab308;
  --hard-money-bg: rgba(234,179,8,0.08);
  --no-money: #ef4444;
  --no-money-bg: rgba(239,68,68,0.08);

  /* Pillar colors */
  --c-structural: #3b82f6;
  --c-breadth: #8b5cf6;
  --c-spark: #f59e0b;
  --c-quality: #10b981;
  --c-sentiment: #ef4444;
  --c-momentum: #06b6d4;
  --c-volatility: #ec4899;

  /* Macro color */
  --c-macro: #f97316;

  /* Neon accents */
  --neon-cyan: #22d3ee;
  --neon-pink: #f472b6;
  --neon-green: #4ade80;

  --font-display: 'Orbitron', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --font-body: 'Exo 2', sans-serif;

  --radius: 10px;
  --radius-sm: 6px;
}

body {
  font-family: var(--font-body);
  background: var(--bg-void);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scanline overlay */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ═══════════════════════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════════════════════ */
.dashboard {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px 16px 60px;
}

/* ═══════════════════════════════════════════════════════════════
   HEADER + LOGO
   ═══════════════════════════════════════════════════════════════ */
.header {
  text-align: center;
  padding: 0 0 20px;
  position: relative;
}

.logo-strip {
  background: #101a29;
  padding: 18px 0 14px;
  margin: 0 -16px 12px;
  position: relative;
}

.logo-strip::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
}

.logo-strip::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(34,211,238,0.15), transparent);
}

.logo-img {
  width: 240px;
  height: auto;
  display: block;
  margin: 0 auto 2px;
}

.logo-tagline {
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #c9a84c;
  animation: taglinePulse 4s ease-in-out infinite;
}

@keyframes taglinePulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

.header-subtitle {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 2px;
  margin-top: 8px;
}

.header-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 8px;
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
}

.header-meta span { opacity: 0.7; }
.data-source-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 9px;
  padding: 2px 8px;
  border-radius: 20px;
  border: 1px solid var(--border-dim);
  background: var(--bg-card);
}
.data-source-badge .dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--neon-green);
  animation: pulse-dot 2s infinite;
}
.data-source-badge.offline .dot { background: var(--no-money); animation: none; }

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ═══════════════════════════════════════════════════════════════
   HERO — Score + Zone + State
   ═══════════════════════════════════════════════════════════════ */
.hero {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 24px;
  padding: 24px;
  margin-bottom: 20px;
  background: var(--bg-panel);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius);
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan) 30%, var(--neon-pink) 70%, transparent);
}

.hero-left { text-align: center; }
.hero-center { text-align: center; }
.hero-right { text-align: center; }

/* Score ring */
.score-ring-container {
  position: relative;
  width: 180px;
  height: 180px;
  margin: 0 auto;
}
.score-ring-container svg { width: 100%; height: 100%; }
.score-number {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -55%);
  font-family: var(--font-display);
  font-size: 42px;
  font-weight: 900;
  letter-spacing: -1px;
}
.score-label {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, 30px);
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-muted);
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* Zone badge */
.zone-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border-radius: 8px;
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
  border: 1.5px solid;
  margin-bottom: 10px;
}

/* State badge */
.state-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  border: 1px solid;
}

/* Quick stats */
.quick-stats {
  display: flex;
  flex-direction: column;
  gap: 8px;
  text-align: left;
}
.quick-stat {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 12px;
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-dim);
  min-width: 200px;
}
.quick-stat-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.quick-stat-value {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
}

/* Action banner */
.action-banner {
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-dim);
  background: var(--bg-card);
  margin-top: 10px;
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.5;
}
.action-banner strong {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 1px;
}

/* Macro banner */
.macro-banner {
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(249,115,22,0.25);
  background: rgba(249,115,22,0.06);
  margin-top: 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--c-macro);
  line-height: 1.5;
}

/* ═══════════════════════════════════════════════════════════════
   PILLAR CARDS
   ═══════════════════════════════════════════════════════════════ */
.section-title {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 12px;
  padding-left: 4px;
}

.pillars-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 10px;
  margin-bottom: 24px;
}

.pillar-card {
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius);
  padding: 14px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s, background 0.3s;
}
.pillar-card:hover {
  border-color: var(--border-glow);
  background: var(--bg-card-hover);
}

.pillar-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
}
.pillar-name {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
}
.pillar-weight {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-dim);
}
.pillar-score-big {
  font-family: var(--font-mono);
  font-size: 24px;
  font-weight: 700;
  line-height: 1;
}
.pillar-weighted {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-dim);
  text-align: right;
}

/* Score bar */
.pillar-bar-track {
  width: 100%;
  height: 6px;
  background: var(--bg-void);
  border-radius: 3px;
  margin: 10px 0 6px;
  overflow: hidden;
}
.pillar-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

.pillar-description {
  font-family: var(--font-mono);
  font-size: 9.5px;
  color: var(--text-muted);
  line-height: 1.5;
}

/* ═══════════════════════════════════════════════════════════════
   MODIFIERS
   ═══════════════════════════════════════════════════════════════ */
.modifiers-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 8px;
  margin-bottom: 24px;
}

.modifier-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius-sm);
  transition: border-color 0.3s;
}
.modifier-row:hover { border-color: var(--border-glow); }
.modifier-row.active { border-color: rgba(34,197,94,0.3); }
.modifier-row.active.negative { border-color: rgba(239,68,68,0.3); }
.modifier-row.macro { border-left: 2px solid var(--c-macro); }

.modifier-icon {
  width: 28px; height: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
}
.modifier-icon.inactive { background: var(--bg-void); color: var(--text-dim); }
.modifier-icon.positive { background: rgba(34,197,94,0.15); color: var(--neon-green); }
.modifier-icon.negative { background: rgba(239,68,68,0.15); color: var(--no-money); }

.modifier-info { flex: 1; min-width: 0; }
.modifier-name {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-primary);
}
.modifier-reason {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-muted);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.modifier-adj {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 700;
  flex-shrink: 0;
  min-width: 40px;
  text-align: right;
}

/* ═══════════════════════════════════════════════════════════════
   HISTORY CHART
   ═══════════════════════════════════════════════════════════════ */
.history-panel {
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 24px;
}

.history-chart {
  width: 100%;
  height: 160px;
  position: relative;
}

/* ═══════════════════════════════════════════════════════════════
   SCORE BREAKDOWN BAR
   ═══════════════════════════════════════════════════════════════ */
.breakdown-panel {
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 24px;
}

.breakdown-bar {
  display: flex;
  height: 32px;
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 10px;
}
.breakdown-segment {
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  color: white;
  overflow: hidden;
  white-space: nowrap;
  transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

.breakdown-legend {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 10px;
}
.legend-dot {
  width: 8px; height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}
.legend-name { color: var(--text-muted); }
.legend-value { font-weight: 700; }

/* ═══════════════════════════════════════════════════════════════
   ZONE THRESHOLDS
   ═══════════════════════════════════════════════════════════════ */
.zones-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 24px;
}
.zone-block {
  flex: 1;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid;
  text-align: center;
  transition: transform 0.2s;
}
.zone-block:hover { transform: translateY(-2px); }
.zone-block-name {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.zone-block-range {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-muted);
  margin-top: 2px;
}
.zone-block-risk {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  margin-top: 4px;
}
.zone-block.current {
  transform: translateY(-3px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

/* ═══════════════════════════════════════════════════════════════
   RAW DATA
   ═══════════════════════════════════════════════════════════════ */
.raw-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 10px;
  margin-bottom: 24px;
}
.raw-section {
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius);
  padding: 14px;
}
.raw-section-title {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.raw-row {
  display: flex;
  justify-content: space-between;
  padding: 3px 0;
  font-family: var(--font-mono);
  font-size: 10.5px;
  border-bottom: 1px solid rgba(30,41,59,0.5);
}
.raw-row:last-child { border-bottom: none; }
.raw-key { color: var(--text-muted); }
.raw-val { color: var(--text-primary); font-weight: 600; }

/* ═══════════════════════════════════════════════════════════════
   FOOTER
   ═══════════════════════════════════════════════════════════════ */
.footer {
  text-align: center;
  padding: 20px 0;
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 1px;
  border-top: 1px solid var(--border-dim);
}

/* ═══════════════════════════════════════════════════════════════
   LOADING STATE
   ═══════════════════════════════════════════════════════════════ */
.loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 16px;
}
.loading-spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border-dim);
  border-top-color: var(--neon-cyan);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 2px;
}

/* ═══════════════════════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════════════════════ */
@media (max-width: 768px) {
  .hero {
    grid-template-columns: 1fr;
    gap: 16px;
    padding: 16px;
  }
  .quick-stat { min-width: auto; }
  .zones-bar { flex-wrap: wrap; }
  .zone-block { min-width: 48%; }
  .modifiers-grid { grid-template-columns: 1fr; }
}
/* PARADOX ALERTS */
.paradox-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(340px,1fr)); gap:10px; margin-bottom:24px; }
.paradox-card { padding:14px 16px; border-radius:var(--radius); border:1px solid; position:relative; overflow:hidden; transition:transform 0.2s; }
.paradox-card:hover { transform:translateY(-2px); }
.paradox-card.danger { border-color:rgba(239,68,68,0.4); background:rgba(239,68,68,0.06); }
.paradox-card.caution { border-color:rgba(234,179,8,0.4); background:rgba(234,179,8,0.06); }
.paradox-card.opportunity { border-color:rgba(34,197,94,0.4); background:rgba(34,197,94,0.06); }
.paradox-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.paradox-emoji { font-size:18px; }
.paradox-name { font-family:var(--font-display); font-size:11px; font-weight:700; letter-spacing:1px; }
.paradox-severity { font-family:var(--font-mono); font-size:8px; font-weight:600; letter-spacing:2px; text-transform:uppercase; padding:2px 8px; border-radius:3px; margin-left:auto; }
.paradox-severity.danger { color:#ef4444; background:rgba(239,68,68,0.15); }
.paradox-severity.caution { color:#eab308; background:rgba(234,179,8,0.15); }
.paradox-severity.opportunity { color:#22c55e; background:rgba(34,197,94,0.15); }
.paradox-desc { font-family:var(--font-mono); font-size:9.5px; color:var(--text-secondary); line-height:1.5; margin-bottom:8px; }
.paradox-action { font-family:var(--font-mono); font-size:9px; color:var(--text-muted); line-height:1.4; padding-top:8px; border-top:1px solid var(--border-dim); }
.paradox-action strong { color:var(--neon-cyan); font-weight:600; }

/* ═══════════════════════════════════════════════════════════════
   AI MARKET ANALYST
   ═══════════════════════════════════════════════════════════════ */
.ai-analyst-panel {
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}
.ai-analyst-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-pink), transparent);
}
.ai-analyst-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.ai-analyst-title {
  display: flex;
  align-items: center;
  gap: 10px;
}
.ai-analyst-title .ai-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: linear-gradient(135deg, rgba(34,211,238,0.15), rgba(244,114,182,0.15));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}
.ai-analyst-title h3 {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--neon-cyan);
  margin: 0;
}
.ai-analyst-title .ai-badge {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 1px;
  color: var(--text-dim);
  background: var(--bg-void);
  padding: 2px 8px;
  border-radius: 10px;
  border: 1px solid var(--border-dim);
}
.ai-refresh-btn {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--neon-cyan);

const PILLAR_COLORS = {

const MACRO_MODIFIER_NAMES = ['Crude Oil Stress', 'Global Yield Pressure', 'Rupee Stress'];

function getZoneStyle(zone) {

  if (zone.includes('Smart')) return { color: 'var(--smart-money)', bg: 'var(--smart-money-bg)', border: 'rgba(59,130,246,0.4)' };
  if (zone.includes('Hard')) return { color: 'var(--hard-money)', bg: 'var(--hard-money-bg)', border: 'rgba(234,179,8,0.4)' };
  return { color: 'var(--no-money)', bg: 'var(--no-money-bg)', border: 'rgba(239,68,68,0.4)' };
}

function getScoreColor(score) {
  if (score >= 75) return '#22c55e';
  if (score >= 60) return '#3b82f6';
  if (score >= 40) return '#eab308';
  return '#ef4444';
}

function getStateStyle(state) {

    case 'NORMAL': return { color: '#22c55e', bg: 'rgba(34,197,94,0.1)', icon: '✦' };
    case 'WARNING': return { color: '#eab308', bg: 'rgba(234,179,8,0.1)', icon: '⚠️' };
    case 'OVEREXTENDED': return { color: '#f97316', bg: 'rgba(249,115,22,0.1)', icon: '🔥' };
    case 'EXHAUSTED': return { color: '#ef4444', bg: 'rgba(239,68,68,0.1)', icon: '💀' };
    default: return { color: '#94a3b8', bg: 'rgba(148,163,184,0.1)', icon: '?' };
  }
}


// ═══════════════════════════════════════════════════════════════
// SVG BUILDERS
// ═══════════════════════════════════════════════════════════════
function buildScoreRing(score) {
  const r = 72, cx = 90, cy = 90, sw = 10;
  const startA = -225, endA = 45;
  const totalArc = endA - startA;
  const scoreA = startA + (score / 100) * totalArc;
  const color = getScoreColor(score);

  function arc(a1, a2, radius) {
    const s = { x: cx + radius * Math.cos(a1 * Math.PI / 180), y: cy + radius * Math.sin(a1 * Math.PI / 180) };
    const e = { x: cx + radius * Math.cos(a2 * Math.PI / 180), y: cy + radius * Math.sin(a2 * Math.PI / 180) };
    const large = (a2 - a1) > 180 ? 1 : 0;
    return `M ${s.x} ${s.y} A ${radius} ${radius} 0 ${large} 1 ${e.x} ${e.y}`;
  }

  return `<svg viewBox="0 0 180 180" width="180" height="180">
    <defs>
      <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <path d="${arc(startA, endA, r)}" fill="none" stroke="#1e293b" stroke-width="${sw}" stroke-linecap="round"/>
    ${score > 0 ? `<path d="${arc(startA, scoreA, r)}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round" filter="url(#glow)"/>` : ''}
    ${[0, 25, 50, 75, 100].map(v => {
      const a = startA + (v / 100) * totalArc;
      const inner = r - sw/2 - 3, outer = r - sw/2 - 8;
      const x1 = cx + inner * Math.cos(a * Math.PI / 180), y1 = cy + inner * Math.sin(a * Math.PI / 180);
      const x2 = cx + outer * Math.cos(a * Math.PI / 180), y2 = cy + outer * Math.sin(a * Math.PI / 180);
      return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#334155" stroke-width="1"/>`;
    }).join('')}
  </svg>`;
}

function buildHistoryChart(history) {
  // ═══ FIX: Allow single data point (show as dot) ═══
  if (!history || history.length < 1) return '<div style="text-align:center;color:var(--text-dim);font-size:11px;padding:40px 0">Awaiting history data...</div>';

  const w = 800, h = 140, padL = 40, padR = 16, padT = 10, padB = 24;
  const iw = w - padL - padR, ih = h - padT - padB;

  const scores = history.map(d => d.mps || d.final_score || 0);
  const minS = Math.min(...scores, 30);
  const maxS = Math.max(...scores, 90);
  const range = maxS - minS || 1;

  const toX = (i) => history.length === 1 ? padL + iw / 2 : padL + (i / (history.length - 1)) * iw;
  const toY = (v) => padT + ih - ((v - minS) / range) * ih;

  const zones = [
    { y0: 0, y1: 40, fill: 'rgba(239,68,68,0.06)' },
    { y0: 40, y1: 60, fill: 'rgba(234,179,8,0.06)' },
    { y0: 60, y1: 75, fill: 'rgba(59,130,246,0.06)' },
    { y0: 75, y1: 100, fill: 'rgba(34,197,94,0.06)' },
  ];

  let svg = `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:100%">`;

  zones.forEach(z => {
    const y1c = Math.max(minS, z.y0), y2c = Math.min(maxS, z.y1);
    if (y2c > y1c) svg += `<rect x="${padL}" y="${toY(y2c)}" width="${iw}" height="${toY(y1c) - toY(y2c)}" fill="${z.fill}"/>`;
  });

  [40, 60, 75].forEach(v => {
    if (v >= minS && v <= maxS) {
      svg += `<line x1="${padL}" y1="${toY(v)}" x2="${w - padR}" y2="${toY(v)}" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>`;
      svg += `<text x="${padL - 6}" y="${toY(v) + 3}" text-anchor="end" font-size="8" fill="#475569" font-family="JetBrains Mono">${v}</text>`;
    }
  });

  const lastColor = getScoreColor(scores[scores.length - 1]);
  svg += `<defs><linearGradient id="histGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${lastColor}" stop-opacity="0.2"/><stop offset="100%" stop-color="${lastColor}" stop-opacity="0"/></linearGradient></defs>`;

  // Only draw line and area if more than 1 point
  if (history.length > 1) {
    let areaD = `M ${toX(0)} ${toY(scores[0])}`;
    for (let i = 1; i < scores.length; i++) areaD += ` L ${toX(i)} ${toY(scores[i])}`;
    areaD += ` L ${toX(scores.length - 1)} ${padT + ih} L ${toX(0)} ${padT + ih} Z`;
    svg += `<path d="${areaD}" fill="url(#histGrad)"/>`;

    let lineD = `M ${toX(0)} ${toY(scores[0])}`;
    for (let i = 1; i < scores.length; i++) lineD += ` L ${toX(i)} ${toY(scores[i])}`;
    svg += `<path d="${lineD}" fill="none" stroke="${lastColor}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
  }

  history.forEach((d, i) => {
    const x = toX(i), y = toY(scores[i]), c = getScoreColor(scores[i]);
    svg += `<circle cx="${x}" cy="${y}" r="4" fill="${c}" stroke="#0c1018" stroke-width="2"/>`;
    svg += `<text x="${x}" y="${h - 4}" text-anchor="middle" font-size="8" fill="#475569" font-family="JetBrains Mono">${d.date.slice(5)}</text>`;
    // Show score label on last point (or only point)
    if (i === history.length - 1) svg += `<text x="${x}" y="${y - 10}" text-anchor="middle" font-size="10" font-weight="700" fill="${c}" font-family="JetBrains Mono">${scores[i].toFixed(1)}</text>`;
  });

  svg += '</svg>';
  return svg;
}

          </div>

        </div>`;
      }).join('')}
    </div>

    <!-- PARADOX ALERTS -->
    ${(c.paradox_alerts && c.paradox_alerts.length > 0) ? `
    <div class="section-title">⚡ PARADOX ALERTS (${c.paradox_alerts.length})</div>
    <div class="paradox-grid">
      ${c.paradox_alerts.map(p => {
        const sevColors = {danger: '#ef4444', caution: '#eab308', opportunity: '#22c55e'};
        const nameColor = sevColors[p.severity] || '#94a3b8';
        return `
        <div class="paradox-card ${p.severity}">
          <div class="paradox-header">
            <span class="paradox-emoji">${p.emoji}</span>
            <span class="paradox-name" style="color:${nameColor}">${p.name}</span>
            <span class="paradox-severity ${p.severity}">${p.severity.toUpperCase()}</span>
          </div>
          <div class="paradox-desc">${p.description}</div>
          <div class="paradox-action"><strong>→ ACTION:</strong> ${p.action}</div>
        </div>`;
      }).join('')}
    </div>
    ` : ''}

    <!-- AI MARKET ANALYST -->
    <div class="section-title">🤖 AI MARKET ANALYST</div>
    <div class="ai-analyst-panel" id="ai-analyst">
      <div class="ai-analyst-header">
        <div class="ai-analyst-title">
          <div class="ai-icon">🧠</div>
          <div>
            <h3>BLOOMBERG-STYLE ANALYSIS</h3>
            <span class="ai-badge">POWERED BY GROQ · LLAMA 3.3 70B · FREE</span>
          </div>
        </div>
        <button class="ai-refresh-btn" id="ai-refresh-btn" onclick="runAIAnalysis()">
          ↻ REFRESH ANALYSIS
        </button>
      </div>
      <div id="ai-key-prompt" style="margin-bottom:12px;display:${window._groqKey ? 'none' : 'flex'};align-items:center;gap:8px;flex-wrap:wrap">
        <input type="password" id="groq-key-input" placeholder="Enter Groq API Key (free at console.groq.com)"
          style="flex:1;min-width:240px;background:var(--bg-void);border:1px solid var(--border-dim);border-radius:6px;padding:8px 12px;font-family:var(--font-mono);font-size:10px;color:var(--text-primary);outline:none"
          onfocus="this.style.borderColor='rgba(34,211,238,0.5)'" onblur="this.style.borderColor='var(--border-dim)'">
        <button onclick="saveGroqKey()" style="font-family:var(--font-mono);font-size:10px;color:var(--neon-cyan);background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.25);border-radius:6px;padding:8px 14px;cursor:pointer">
          SAVE & ANALYZE
        </button>
        <a href="https://console.groq.com/keys" target="_blank" style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted);text-decoration:none">
          🔑 Get free key →
        </a>
      </div>
      <div class="ai-analyst-content" id="ai-analyst-content">
        <div style="text-align:center;color:var(--text-dim);font-size:11px;padding:20px 0">
          Enter your free Groq API key above to activate the AI analyst
        </div>
      </div>
    </div>

    <!-- ZONE THRESHOLDS -->
    <div class="section-title">ZONE THRESHOLDS</div>
    <div class="zones-bar">
      ${[
        { name: 'Easy Money', range: '75–100', risk: '1.5–2%', color: '#22c55e', bg: 'rgba(34,197,94,0.08)', border: 'rgba(34,197,94,0.3)' },
        { name: 'Smart Money', range: '60–75', risk: '1%', color: '#3b82f6', bg: 'rgba(59,130,246,0.08)', border: 'rgba(59,130,246,0.3)' },
        { name: 'Hard Money', range: '40–60', risk: '0.5%', color: '#eab308', bg: 'rgba(234,179,8,0.08)', border: 'rgba(234,179,8,0.3)' },
        { name: 'No Money', range: '< 40', risk: '0%', color: '#ef4444', bg: 'rgba(239,68,68,0.08)', border: 'rgba(239,68,68,0.3)' },
      ].map(z => {
        const isCurrent = c.zone.includes(z.name);
        return `<div class="zone-block ${isCurrent ? 'current' : ''}" style="background:${z.bg};border-color:${z.border};${isCurrent ? 'box-shadow:0 0 20px ' + z.color + '22' : ''}">
          <div class="zone-block-name" style="color:${z.color}">${z.name}</div>
          <div class="zone-block-range">MPS ${z.range}</div>
          <div class="zone-block-risk" style="color:${z.color}">${z.risk} risk</div>
        </div>`;
      }).join('')}
    </div>

    <!-- RAW DATA -->
    <div class="section-title">RAW INPUTS (${data.metadata?.daily_inputs || 21} DATA POINTS)</div>
    <div class="raw-grid">
      <div class="raw-section">
        <div class="raw-section-title">CHARTINK (8 SCANNERS)</div>
        ${Object.entries(data.raw_inputs?.chartink || {}).map(([k, v]) =>
          `<div class="raw-row"><span class="raw-key">${k}</span><span class="raw-val">${typeof v === 'number' ? v.toLocaleString() : v}</span></div>`
        ).join('')}
      </div>
      <div class="raw-section">
        <div class="raw-section-title">NSE INDIA</div>
        ${Object.entries(data.raw_inputs?.nse || {}).map(([k, v]) =>
          `<div class="raw-row"><span class="raw-key">${k}</span><span class="raw-val">${typeof v === 'number' ? v.toLocaleString() : v}</span></div>`
        ).join('')}
      </div>
      <div class="raw-section">
        <div class="raw-section-title">🌍 MACRO (YAHOO FINANCE)</div>
        ${Object.entries(data.raw_inputs?.macro || {}).map(([k, v]) => {
          let display = typeof v === 'number' ? v.toLocaleString() : v;
          if (k === 'brent_crude') display = '$' + v;
          if (k === 'us10y_yield') display = v + '%';
          if (k.startsWith('usd_inr')) display = '₹' + v;
          return `<div class="raw-row"><span class="raw-key">${k}</span><span class="raw-val">${display}</span></div>`;
        }).join('')}
      </div>
      <div class="raw-section">
        <div class="raw-section-title">STATE TRACKING</div>
        ${Object.entries(data.state || {}).map(([k, v]) =>
          `<div class="raw-row"><span class="raw-key">${k}</span><span class="raw-val">${typeof v === 'number' ? v.toLocaleString() : v}</span></div>`
        ).join('')}
      </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      TradEdge MPS v${c.version} · By Dr. Rahul Ware · Generated ${data.metadata?.generated_at || c.date} · ✦ Trade the Pulse ✦
    </div>
  `;
}


// ═══════════════════════════════════════════════════════════════
// AI MARKET ANALYST — Bloomberg-Style Analysis via Groq (FREE)
// Uses Llama 3.3 70B Versatile — best quality on Groq free tier
// ═══════════════════════════════════════════════════════════════
let _mpsData = null; // global ref for AI re-analysis
window._groqKey = null;

// Try loading key from memory (session only — never persisted to disk)
try { window._groqKey = sessionStorage.getItem('groq_key') || null; } catch(e) {}

function saveGroqKey() {
  const input = document.getElementById('groq-key-input');
  if (!input) return;
  const key = input.value.trim();
  if (!key || !key.startsWith('gsk_')) {
    input.style.borderColor = 'var(--no-money)';
    input.placeholder = 'Key must start with gsk_... Get one at console.groq.com';
    return;
  }
  window._groqKey = key;
  try { sessionStorage.setItem('groq_key', key); } catch(e) {}
  const prompt = document.getElementById('ai-key-prompt');
  if (prompt) prompt.style.display = 'none';
  runAIAnalysis();
}

async function runAIAnalysis() {
  const contentEl = document.getElementById('ai-analyst-content');
  const btn = document.getElementById('ai-refresh-btn');
  if (!contentEl || !_mpsData) return;

  if (!window._groqKey) {
    const prompt = document.getElementById('ai-key-prompt');
    if (prompt) prompt.style.display = 'flex';
    contentEl.innerHTML = `<div style="text-align:center;color:var(--text-dim);font-size:11px;padding:20px 0">
      Enter your free Groq API key above to activate the AI analyst
    </div>`;
    return;
  }

  // Show loading state
  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '⏳ ANALYZING...';
  contentEl.innerHTML = `
    <div class="ai-typing-indicator">
      <div class="ai-typing-dots"><span></span><span></span><span></span></div>
      <span class="ai-typing-text">AI ANALYST IS PROCESSING MARKET DATA...</span>
    </div>`;

  const c = _mpsData.current;
  const pillarsStr = c.pillar_scores.map(p =>
    `${p.name}: ${p.raw_score.toFixed(1)}/100 (wt ${(p.weight*100).toFixed(0)}%) — ${p.description}`
  ).join('\n');

  const modsStr = c.modifiers.map(m =>
    `${m.name}: ${m.triggered ? (m.adjustment > 0 ? '+' : '') + m.adjustment.toFixed(1) : 'OFF'} — ${m.reason}`
  ).join('\n');

  const histStr = (_mpsData.history || []).map(h =>
    `${h.date}: MPS ${(h.mps || h.final_score || 0).toFixed(1)} [${h.zone}]`
  ).join('\n') || 'No history available yet';

  const rawNSE = _mpsData.raw_inputs?.nse || {};
  const rawMacro = _mpsData.raw_inputs?.macro || {};
  const stateData = _mpsData.state || {};

  const prompt = `You are a senior Bloomberg equity strategist analyzing the Indian stock market (NSE/BSE) through the TradEdge Market Pulse Score (MPS) system. Give a concise, professional market briefing.

TODAY'S MPS DATA:
- Final Score: ${c.final_score.toFixed(1)}/100
- Zone: ${c.zone} ${c.zone_emoji}
- State: ${c.state} — ${c.state_message}
- Base Score: ${c.base_score.toFixed(1)} | Modifier: ${c.total_modifier >= 0 ? '+' : ''}${c.total_modifier.toFixed(1)}
- Risk Per Trade: ${c.risk_per_trade}
- Burst Ratio: ${(c.burst_ratio||0).toFixed(0)} [${c.burst_label||'N/A'}]
- RSI Breadth: ${(c.rsi_breadth_pct||0).toFixed(1)}%
- ATR Regime: ${(c.atr_breadth_pct||0).toFixed(1)}% [${c.atr_regime||'N/A'}]
- Macro: ${c.macro_summary || 'N/A'}

7 PILLAR SCORES:
${pillarsStr}

9 SMART MODIFIERS:
${modsStr}

RAW DATA:
- VIX: ${rawNSE.india_vix || 'N/A'}, PCR: ${rawNSE.pcr || 'N/A'}
- FII Net: ${rawNSE.fii_net || 'N/A'} Cr
- Advances/Declines: ${rawNSE.advances || '?'}/${rawNSE.declines || '?'}
- New 52W Highs/Lows: ${rawNSE.new_52w_highs || '?'}/${rawNSE.new_52w_lows || '?'}
- Brent Crude: $${rawMacro.brent_crude || '?'}
- US 10Y: ${rawMacro.us10y_yield || '?'}%
- USD/INR: ₹${rawMacro.usd_inr || '?'}
- Structural Bull Streak: ${stateData.structural_bull_streak || '?'} days
- FII 5-Day Net: ${stateData.fii_5day_net || '?'} Cr

MPS HISTORY (recent):
${histStr}

${c.paradox_alerts && c.paradox_alerts.length > 0 ? 'PARADOX ALERTS:\n' + c.paradox_alerts.map(p => `⚡ ${p.name} [${p.severity}]: ${p.description}`).join('\n') : ''}

Write your analysis using EXACTLY these 4 section headers (use these exact strings):

[MARKET STANCE]
Overall market assessment — bull/bear/neutral stance with conviction level. 2-3 sentences.

[PILLAR BREAKDOWN]
Analyze the 7 pillars. Identify the strongest and weakest. Flag any concerning divergences. What story do they tell together? 3-4 sentences.

[RISK FACTORS]
Key risks from modifiers, macro data, and paradox alerts. What could change the picture? 2-3 sentences.

[TRADING RECOMMENDATIONS]
Specific actionable guidance: position sizing, sector preference hints from the data, what setups to look for or avoid. 2-3 sentences.

Keep it under 250 words total. Be direct, data-driven, and professional. No fluff. Use numbers from the data.`;

  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${window._groqKey}`
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'user', content: prompt }],
        max_tokens: 1000,
        temperature: 0.4
      })
    });

    if (response.status === 401) {
      window._groqKey = null;
      try { sessionStorage.removeItem('groq_key'); } catch(e) {}
      throw new Error('Invalid API key — please re-enter your Groq key');
    }
    if (response.status === 429) {
      throw new Error('Rate limit exceeded — Groq free tier allows ~30 req/min. Try again in a moment.');
    }

    const data = await response.json();
    const text = data.choices?.[0]?.message?.content || 'Analysis unavailable.';

    // Format the sections with styled headers
    const formatted = text
      .replace(/\[MARKET STANCE\]/g, '<div class="ai-section-title">📊 MARKET STANCE</div>')
      .replace(/\[PILLAR BREAKDOWN\]/g, '<div class="ai-section-title">📐 PILLAR BREAKDOWN</div>')
      .replace(/\[RISK FACTORS\]/g, '<div class="ai-section-title">⚠️ RISK FACTORS</div>')
      .replace(/\[TRADING RECOMMENDATIONS\]/g, '<div class="ai-section-title">🎯 TRADING RECOMMENDATIONS</div>');

    const now = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
    contentEl.innerHTML = formatted + `<div class="ai-analyst-timestamp">Analysis generated: ${now} IST · Groq Llama 3.3 70B</div>`;

  } catch (err) {
    console.error('AI Analysis failed:', err);
    const showKeyPrompt = err.message.includes('Invalid API key');
    if (showKeyPrompt) {
      const kp = document.getElementById('ai-key-prompt');
      if (kp) kp.style.display = 'flex';
    }
    contentEl.innerHTML = `<div style="color:var(--no-money);padding:16px 0">
      ⚠ AI Analysis unavailable — ${err.message || 'API error'}
      <br><span style="color:var(--text-dim);font-size:9px">Click "Refresh Analysis" to retry</span>
    </div>`;
  }

  btn.disabled = false;
  btn.classList.remove('loading');
  btn.textContent = '↻ REFRESH ANALYSIS';
}


// ═══════════════════════════════════════════════════════════════
// FETCH + INIT (FIXED: fetches mps_history.json separately)
// ═══════════════════════════════════════════════════════════════
async function init() {
  let data = null;
  let isLive = false;

  try {
    const resp = await fetch('./data/mps_latest.json', { cache: 'no-store' });
    if (resp.ok) {
      data = await resp.json();
      if (data?.current?.final_score !== undefined && data?.current?.pillar_scores?.length === 7) {
        isLive = true;
      } else {
        console.warn('MPS JSON structure invalid, falling back to sample data');
        data = null;
      }
    }
  } catch (e) {
    console.warn('Could not fetch mps_latest.json:', e.message);
  }

  if (!data) {
    data = SAMPLE_DATA;
    isLive = false;
  }

  // ═══ FIX: Fetch history from separate mps_history.json file ═══
  if (isLive) {
    try {
      const histResp = await fetch('./data/mps_history.json', { cache: 'no-store' });
      if (histResp.ok) {
        const histArr = await histResp.json();
        if (Array.isArray(histArr) && histArr.length > 0) {
          data.history = histArr.map(h => ({
            date: h.date,
            mps: h.final_score,
            zone: h.zone
          }));
        }
      }
    } catch (e) {
      console.warn('Could not fetch mps_history.json:', e.message);
    }
  }

  await new Promise(r => setTimeout(r, 400));
  render(data, isLive);

  // Store globally for AI re-analysis and auto-trigger
  _mpsData = data;
  setTimeout(() => runAIAnalysis(), 500);
}

init();
</script>
<script src="scripts/tradedge-stock-popup.js"></script>
