        broker: ct.broker, status: ct.status || 'OPEN',
        remainingQty: ct.remaining_qty ?? ct.qty,
        partialSells: ct.partial_sells ? JSON.parse(ct.partial_sells) : [],
        slMoves: ct.sl_moves ? JSON.parse(ct.sl_moves) : [],
        exitPrice: ct.exit_price, exitDate: ct.exit_date,
        totalQtyAfter: ct.total_qty_after, avgPriceAfter: ct.avg_price_after,
        dateStr: new Date(ct.created_at).toLocaleDateString('en-IN'),
        timeStr: new Date(ct.created_at).toLocaleTimeString('en-IN'),
        type: ct.action === 'BUY' ? 'ENTRY' : ct.action === 'SELL_PARTIAL' ? 'PARTIAL_EXIT' : 'EXIT',
      }));

      // Merge: cloud wins for existing IDs, keep local-only trades
      const localTrades = JSON.parse(localStorage.getItem('te_trades') || '[]');
      const cloudIds = new Set(mapped.map(t => t.id));
      const localOnly = localTrades.filter(t => !cloudIds.has(t.id));
      const merged = [...mapped, ...localOnly];

      localStorage.setItem('te_trades', JSON.stringify(merged));
      console.log(`Cloud sync: ${cloudTrades.length} from Supabase, ${localOnly.length} local-only, ${merged.length} total`);
      return merged;
    }
  } catch(e) { console.log('Cloud sync failed, using localStorage:', e); }
  return JSON.parse(localStorage.getItem('te_trades') || '[]');
}

// ═══ STAGGERED EXIT SYSTEM ═══
// Handles partial sells in tranches: 25% at 5×ATR, 50% at 6×ATR, etc.
// Each partial sell:
//   1. Creates a SELL journal entry linked to parent trade
//   2. Updates parent trade's remainingQty
//   3. Sets status to PARTIAL if qty remains, CLOSED if fully exited
//   4. Logs to both localStorage and Supabase

async function executePartialSell(tradeId, sellPct, sellPrice, reason, atrMultiple) {
  const trades = JSON.parse(localStorage.getItem('te_trades') || '[]');
  const tradeIdx = trades.findIndex(t => t.id === tradeId);
  if (tradeIdx === -1) return;

  const trade = trades[tradeIdx];
  const now = new Date();
  const dateStr = now.toISOString().split('T')[0];

  // Determine remaining qty based on format
  let remaining, entryPrice;
  if (trade.entries && Array.isArray(trade.entries)) {
    // Journal format
    const totalEntryQty = trade.entries.reduce((s, e) => s + (e.qty || 0), 0);
    const totalExitQty = (trade.exits || []).reduce((s, e) => s + (e.qty || 0), 0);
    remaining = totalEntryQty - totalExitQty;
    entryPrice = totalEntryQty > 0 ? trade.entries.reduce((s, e) => s + e.price * e.qty, 0) / totalEntryQty : 0;
  } else {
    // Edge Pilot format
    remaining = trade.remainingQty ?? trade.qty;
    entryPrice = trade.price || 0;
  }

  const sellQty = Math.floor(remaining * (sellPct / 100));
  if (sellQty <= 0) return;

  const newRemaining = remaining - sellQty;
  const pnlPerShare = sellPrice - entryPrice;
  const pnlTotal = pnlPerShare * sellQty;
  const riskAmount = trade._epRiskAmount || (entryPrice * 0.08 * remaining); // Fallback: 8% SL
  const rMultiple = riskAmount > 0 ? (pnlTotal / riskAmount) : 0;

  // ═══ UPDATE TRADE IN JOURNAL FORMAT ═══
  if (trade.entries && Array.isArray(trade.entries)) {
    // Journal format — add to exits array
    if (!trade.exits) trade.exits = [];
    trade.exits.push({ date: dateStr, price: sellPrice, qty: sellQty });
    trade.status = newRemaining <= 0 ? 'Closed' : 'Open'; // Journal uses "Closed" not "CLOSED"
  } else {
    // Edge Pilot format — use partialSells
    if (!trade.partialSells) trade.partialSells = [];
    trade.partialSells.push({
      date: now.toISOString(), dateStr: now.toLocaleDateString('en-IN'),
      qty: sellQty, price: sellPrice, pctSold: sellPct, reason,
      atrMultiple: atrMultiple || null, pnlPerShare,
      pnlTotal: Math.round(pnlTotal), rMultiple: rMultiple.toFixed(2),
      remainingAfter: newRemaining,
    });
    trade.remainingQty = newRemaining;
    trade.status = newRemaining <= 0 ? 'Closed' : 'Open';
    if (newRemaining <= 0) {
      trade.exitPrice = sellPrice;
      trade.exitDate = now.toISOString();
    }
  }

  trades[tradeIdx] = trade;
  localStorage.setItem('te_trades', JSON.stringify(trades));
  computeCurrentCapital(); // Refresh cached capital

  // Sync to Supabase
  let supaOk = false;
  try {
    supaOk = await supabaseUpdate('trades', 'trade_id', trade.id, {
      status: newRemaining <= 0 ? 'CLOSED' : 'PARTIAL',
      remaining_qty: newRemaining,
      partial_sells: JSON.stringify(trade.partialSells || trade.exits || []),
      exit_price: newRemaining <= 0 ? sellPrice : null,
      exit_date: newRemaining <= 0 ? now.toISOString() : null,
    });
    await supabaseUpsert('trade_events', {
      event_id: `SELL-${Date.now()}`,
      trade_id: trade.id,
      symbol: trade.symbol,
      event_type: newRemaining <= 0 ? 'FINAL_EXIT' : 'PARTIAL_EXIT',
      qty: sellQty, price: sellPrice, reason,
      atr_multiple: atrMultiple,
      pnl_total: Math.round(pnlTotal),
      r_multiple: rMultiple.toFixed(2),
      remaining_qty: newRemaining,
      created_at: now.toISOString()
    });
  } catch(e) { console.log('Supabase sell sync error:', e); }

  showToast(newRemaining <= 0 ? '🏁' : '📤',
    `${trade.symbol} — ${newRemaining <= 0 ? 'FULLY CLOSED' : `SOLD ${sellPct}%`}`,
    `${sellQty} @ ₹${sellPrice.toLocaleString()} · P&L: ₹${Math.round(pnlTotal).toLocaleString()} (${rMultiple.toFixed(1)}R) · ${newRemaining} remaining · ${supaOk ? 'Cloud ✓' : 'Local'}`,
    5000
  );
  return trade;
}

// ── SL MOVE LOGGING ──
async function logSLMove(tradeId, newSL, reason) {
  const trades = JSON.parse(localStorage.getItem('te_trades') || '[]');
  const tradeIdx = trades.findIndex(t => t.id === tradeId);
  if (tradeIdx === -1) return;

  const trade = trades[tradeIdx];
  const prevSL = trade.sl || trade.stopLoss || 0;

  // Update SL in both formats
  trade.sl = newSL;        // Journal format uses 'sl'
  trade.stopLoss = newSL;  // Edge Pilot format uses 'stopLoss'

  // Track SL move history
  if (!trade._epSlMoves) trade._epSlMoves = [];
  trade._epSlMoves.push({ date: new Date().toISOString(), from: prevSL, to: newSL, reason });

  trades[tradeIdx] = trade;
  localStorage.setItem('te_trades', JSON.stringify(trades));

  // Sync to Supabase
  await supabaseUpdate('trades', 'trade_id', trade.id, {
    stop_loss: newSL,
    sl_moves: JSON.stringify(trade._epSlMoves)
  });
  await supabaseUpsert('trade_events', {
    event_id: `SL-${Date.now()}`, trade_id: trade.id, symbol: trade.symbol,
    event_type: 'SL_MOVE', price: newSL, reason,
    created_at: new Date().toISOString()
  });

  showToast('🛡️', `${trade.symbol} — SL moved`, `₹${prevSL} → ₹${newSL} · ${reason}`);
}

const MAX_POSITIONS = _capConfig?.maxPositions || 10;
const MAX_SECTOR_PCT = _capConfig?.maxSectorPct || 30;

// Compute live capital from te_trades (supports both Journal and Edge Pilot trade formats)
function computeCurrentCapital() {
  const trades = JSON.parse(localStorage.getItem('te_trades') || '[]');
  let investedInOpen = 0;
  let realizedPnl = 0;

  trades.forEach(t => {
    if (t.entries && Array.isArray(t.entries)) {
      // Journal format: entries[{date,price,qty}], exits[{date,price,qty}]
      const entryValue = t.entries.reduce((s, e) => s + (e.price * e.qty), 0);
      const exitValue = (t.exits || []).reduce((s, e) => s + (e.price * e.qty), 0);
      if (t.status === 'Open') {
        investedInOpen += entryValue - exitValue; // Partial exits reduce invested
      } else {
        realizedPnl += exitValue - entryValue;
      }
    } else if (t.price && t.qty) {
      // Edge Pilot format: flat {price, qty, status, partialSells[]}
      if (t.status === 'OPEN' || t.status === 'PARTIAL') {
        investedInOpen += (t.remainingQty || t.qty) * t.price;
      } else if (t.status === 'CLOSED' && t.partialSells) {
        const sellValue = t.partialSells.reduce((s, ps) => s + (ps.qty * ps.price), 0);
        const buyValue = t.qty * t.price;
        realizedPnl += sellValue - buyValue;
      }
    }
  });

  const currentCapital = STARTING_CAPITAL + realizedPnl;
  const availableCash = currentCapital - investedInOpen;

  // Cache for allocation page to read
  localStorage.setItem('te_current_capital', JSON.stringify({
    capital: currentCapital,
    startingCapital: STARTING_CAPITAL,
    invested: investedInOpen,
    available: availableCash,
    realizedPnl,
    riskPct: RISK_PCT,
    maxPositions: MAX_POSITIONS,
    maxSectorPct: MAX_SECTOR_PCT,
    updatedAt: new Date().toISOString()
  }));

  return currentCapital;
}

// ── POSITION DETECTION (supports Journal + Edge Pilot formats) ──

// Normalize any trade to a common format for reading
function normalizeTrade(t) {
  if (t.entries && Array.isArray(t.entries)) {
    // Journal format: { entries: [{date,price,qty}], exits: [{date,price,qty}], status: "Open" }
    const totalEntryQty = t.entries.reduce((s, e) => s + (e.qty || 0), 0);
    const totalExitQty = (t.exits || []).reduce((s, e) => s + (e.qty || 0), 0);
    const avgEntry = totalEntryQty > 0 ? t.entries.reduce((s, e) => s + e.price * e.qty, 0) / totalEntryQty : 0;
    return {
      id: t.id,
      symbol: t.symbol,
      price: avgEntry,
      qty: totalEntryQty,
      remainingQty: totalEntryQty - totalExitQty,
      stopLoss: t.sl || 0,
      status: (t.status || '').toUpperCase(), // Normalize "Open" → "OPEN"
      pyramidLevel: t.pyramidLevel || t._epPyramid || null,
      parentTradeId: t.parentTradeId || t._epParentId || null,
      source: t.source || 'journal',
      dateStr: t.entries[0]?.date || '',
      sector: t.sector || '',
      _isJournal: true,
      _original: t,
    };
  } else {
    // Edge Pilot format: { price, qty, status: "OPEN", pyramidLevel, ... }
    return {
      id: t.id,
      symbol: t.symbol,
      price: t.price || t.entry || 0,
      qty: t.qty || 0,
      remainingQty: t.remainingQty ?? t.qty ?? 0,
      stopLoss: t.stopLoss || t.sl || 0,
      status: (t.status || '').toUpperCase(),
      pyramidLevel: t.pyramidLevel || null,
      parentTradeId: t.parentTradeId || null,
      source: t.broker || t.source || 'edgepilot',
      dateStr: t.dateStr || '',
      sector: t.sector || '',
      _isJournal: false,
      _original: t,
    };
  }
}

function getOpenPositions(symbol) {
  const trades = JSON.parse(localStorage.getItem('te_trades') || '[]');
  return trades
    .filter(t => t.symbol === symbol)
    .map(normalizeTrade)
    .filter(t => t.status === 'OPEN' && t.remainingQty > 0);
}

function detectPyramidLevel(symbol, pick) {
  const openPos = getOpenPositions(symbol);
  if (openPos.length === 0) return { level: 'p1', existing: [], canPyramid: true, reason: 'No existing position — fresh P1 entry' };

  // Check pyramid levels from existing positions
  const withPyramid = openPos.filter(t => t.pyramidLevel);
  const p1 = withPyramid.find(t => t.pyramidLevel === 'p1');
  const p2 = withPyramid.find(t => t.pyramidLevel === 'p2');
  const p3 = withPyramid.find(t => t.pyramidLevel === 'p3');

  // If existing positions don't have pyramid levels (Journal trades), treat first as P1
  if (withPyramid.length === 0 && openPos.length > 0) {
    // Journal trades without pyramid tagging — treat as P1 already filled
    const avgEntry = openPos[0].price;
    const cmp = pick.cmp || pick.entry;
    const gainPct = ((cmp - avgEntry) / avgEntry * 100);

    if (openPos.length >= 3) return { level: 'full', existing: openPos, canPyramid: false, reason: 'FULLY PYRAMIDED — 3+ entries already exist.' };

    if (openPos.length === 1) {
      if (gainPct >= 5) return { level: 'p2', existing: openPos, canPyramid: true, reason: `Stock +${gainPct.toFixed(1)}% from entry (₹${avgEntry.toFixed(0)}). P2 ADD eligible.`, parentId: openPos[0].id };
      else return { level: 'p2_wait', existing: openPos, canPyramid: false, reason: `Stock only +${gainPct.toFixed(1)}% from entry. Need +5-8% for P2.` };
    }

    if (openPos.length === 2) {
      if (gainPct >= 10) return { level: 'p3', existing: openPos, canPyramid: true, reason: `Stock +${gainPct.toFixed(1)}% from entry. P3 TOP-UP eligible.`, parentId: openPos[0].id };
      else return { level: 'p3_wait', existing: openPos, canPyramid: false, reason: `Stock +${gainPct.toFixed(1)}% from entry. Need +10-15% for P3.` };
    }
  }

  if (p1 && p2 && p3) return { level: 'full', existing: openPos, canPyramid: false, reason: 'FULLY PYRAMIDED — all 3 levels filled. No more adds.' };

  const cmp = pick.cmp || pick.entry;
  const avgEntry = p1 ? p1.price : openPos[0].price;
  const gainPct = ((cmp - avgEntry) / avgEntry * 100);

  if (p1 && !p2) {
    if (gainPct >= 5) return { level: 'p2', existing: openPos, canPyramid: true, reason: `Stock +${gainPct.toFixed(1)}% from P1 (₹${avgEntry.toFixed(0)}). P2 ADD eligible.`, parentId: p1.id };
    else return { level: 'p2_wait', existing: openPos, canPyramid: false, reason: `Stock only +${gainPct.toFixed(1)}% from P1. Need +5-8% for P2.` };
  }

  if (p1 && p2 && !p3) {
    if (gainPct >= 10) return { level: 'p3', existing: openPos, canPyramid: true, reason: `Stock +${gainPct.toFixed(1)}% from P1. P3 TOP-UP eligible.`, parentId: p1.id };
    else return { level: 'p3_wait', existing: openPos, canPyramid: false, reason: `Stock +${gainPct.toFixed(1)}% from P1. Need +10-15% for P3.` };
  }

  return { level: 'p1', existing: openPos, canPyramid: true, reason: 'Fresh entry' };
}

function calcOrderDetails(pick, pyramidInfo) {
  const entry = pick.entry;
  const sl = pick.slLadder?.initial || pick.stop;
  const riskPerShare = entry - sl;
  const riskAmount = CAPITAL * (RISK_PCT / 100);
  const qty = Math.floor(riskAmount / riskPerShare);
  const tier = pick.rsTier || 'top25';
  const sizeMulti = CONFIG.rsRankTiers[tier]?.sizeMultiplier ?? 1;

  // Auto-detect pyramid level from open positions
  const pyLevel = pyramidInfo?.canPyramid ? pyramidInfo.level : 'blocked';
  const pyPct = pyLevel === 'p1' ? 50 : pyLevel === 'p2' ? 30 : pyLevel === 'p3' ? 20 : 0;
  const adjQty = Math.floor(qty * sizeMulti * (pyPct / 100));
  const adjCost = adjQty * entry;

  // Calculate total position across all pyramid levels (normalized format)
  const existingQty = (pyramidInfo?.existing || []).reduce((sum, t) => sum + (t.remainingQty || t.qty || 0), 0);
  const existingCost = (pyramidInfo?.existing || []).reduce((sum, t) => sum + ((t.remainingQty || t.qty || 0) * (t.price || 0)), 0);
  const totalQtyAfter = existingQty + adjQty;
  const totalCostAfter = existingCost + adjCost;
  const avgPriceAfter = totalQtyAfter > 0 ? (totalCostAfter / totalQtyAfter) : entry;

  return {
    symbol: pick.symbol, sector: pick.sector, grade: pick.grade,
    entry, sl, target1: pick.target1, target2: pick.target2,
    riskPerShare, riskAmount: Math.round(riskAmount),
    rawQty: qty, adjQty, totalCost: Math.round(adjCost),
    capitalPct: ((adjCost / CAPITAL) * 100).toFixed(1),
    rr: pick.rr, pattern: pick.pattern, catalyst: pick.catalyst,
    sizeMulti, pyLevel, pyPct,
    atr14: pick.atr?.atr14 || 0,
    oneilScore: pick.oneilScore,
    // Position totals
    existingQty, existingCost: Math.round(existingCost),
    totalQtyAfter, totalCostAfter: Math.round(totalCostAfter),
    avgPriceAfter: Math.round(avgPriceAfter),
    parentId: pyramidInfo?.parentId || null,
  };
}

function openOrderBuilder(symbol) {
  const pick = state.topPicks.find(p => p.symbol === symbol);
  if (!pick) return;

  // Detect pyramid level from open positions
  const pyramidInfo = detectPyramidLevel(symbol, pick);
  const o = calcOrderDetails(pick, pyramidInfo);

  let overlay = document.getElementById('order-modal');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'order-modal';
    overlay.className = 'modal-overlay';
    document.body.appendChild(overlay);
  }

  const canExecute = pyramidInfo.canPyramid && o.adjQty > 0;
  const pyLevelDisplay = o.pyLevel === 'p1' ? 'P1 — INITIAL (50%)' : o.pyLevel === 'p2' ? 'P2 — ADD (30%)' : o.pyLevel === 'p3' ? 'P3 — TOP-UP (20%)' : o.pyLevel === 'full' ? 'FULLY PYRAMIDED' : 'WAITING';
  const pyColor = o.pyLevel === 'p1' ? 'var(--cyan)' : o.pyLevel === 'p2' ? 'var(--green)' : o.pyLevel === 'p3' ? 'var(--gold)' : 'var(--red)';

  // Pyramid progress calculation
  const filledLevels = pyramidInfo.existing?.length || 0;
  const totalLevelsAfter = canExecute ? filledLevels + 1 : filledLevels;
  const progressPct = (totalLevelsAfter / 3 * 100);

  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title">⚡ EXECUTE — ${o.symbol} <span style="color:${pyColor};font-size:13px">(${o.pyLevel.toUpperCase()})</span></div>
          <div style="font-size:10px;color:var(--text-dim);margin-top:2px">${o.sector} · ${o.pattern} · ${o.grade} · O'Neil ${o.oneilScore}</div>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <div class="modal-body">

        <!-- EXISTING POSITION DETECTION -->
        <div class="existing-pos ${pyramidInfo.existing.length > 0 ? 'has-pos' : 'no-pos'}">
          <div class="existing-pos-title ${pyramidInfo.existing.length > 0 ? 'has' : 'no'}">
            ${pyramidInfo.existing.length > 0 ? '📊 EXISTING POSITION DETECTED' : '✅ NO EXISTING POSITION — FRESH ENTRY'}
          </div>

          ${pyramidInfo.existing.length > 0 ? `
            ${pyramidInfo.existing.map(t => {
              const tPnl = pick.cmp ? ((pick.cmp - t.price) / t.price * 100).toFixed(1) : '—';
              const tPnlColor = tPnl > 0 ? 'var(--green-bright)' : tPnl < 0 ? 'var(--red-bright)' : 'var(--text-dim)';
              return `<div class="pos-entry">
                <div class="pos-entry-left">
                  <span class="pos-entry-level ${t.pyramidLevel}">${t.pyramidLevel?.toUpperCase()}</span>
                  <span style="color:var(--text-primary);font-weight:600">${t.qty} shares @ ₹${t.price?.toLocaleString()}</span>
                  <span style="font-size:9px;color:var(--text-dim)">${t.dateStr || ''}</span>
                </div>
                <span style="font-family:var(--mono);font-weight:700;color:${tPnlColor}">${tPnl > 0 ? '+' : ''}${tPnl}%</span>
              </div>`;
            }).join('')}

            <!-- Pyramid Progress Bar -->
            <div class="pyramid-progress">
              <div class="pyramid-progress-label">PYRAMID</div>
              <div class="pyramid-progress-bar">
                ${filledLevels >= 1 ? '<div class="pyramid-progress-fill p1" style="width:33.3%"></div>' : ''}
                ${filledLevels >= 2 ? '<div class="pyramid-progress-fill p2" style="width:33.3%"></div>' : ''}
                ${filledLevels >= 3 ? '<div class="pyramid-progress-fill p3" style="width:33.3%"></div>' : ''}
              </div>
              <div class="pyramid-progress-pct" style="color:${pyColor}">${filledLevels}/3</div>
            </div>
          ` : ''}

          <div style="font-size:10px;color:var(--text-secondary);margin-top:6px;padding:6px 8px;background:rgba(0,0,0,0.15);border-radius:4px">
            <strong style="color:${pyColor}">${pyLevelDisplay}</strong> — ${pyramidInfo.reason}
          </div>
        </div>

        ${!canExecute ? `
          <div style="text-align:center;padding:20px;background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.12);border-radius:8px;margin-bottom:14px">
            <div style="font-size:14px;margin-bottom:6px">🚫</div>
            <div style="font-size:12px;font-weight:700;color:var(--red-bright);margin-bottom:4px">${o.pyLevel === 'full' ? 'FULLY PYRAMIDED' : 'PYRAMID ADD NOT YET ELIGIBLE'}</div>
            <div style="font-size:10px;color:var(--text-dim)">${pyramidInfo.reason}</div>
          </div>
        ` : `
          <!-- Order Details -->
          <div class="order-grid">
            <div class="order-field"><div class="order-field-label">Entry Price</div><div class="order-field-val" style="color:var(--cyan)">₹${o.entry.toLocaleString()}</div></div>
            <div class="order-field"><div class="order-field-label">Stop Loss</div><div class="order-field-val" style="color:var(--red)">₹${o.sl.toLocaleString()}</div></div>
            <div class="order-field"><div class="order-field-label">${o.pyLevel.toUpperCase()} Qty (RS ${o.sizeMulti}× · ${o.pyPct}%)</div><div class="order-field-val" style="color:var(--text-primary)">${o.adjQty} shares</div></div>
            <div class="order-field"><div class="order-field-label">${o.pyLevel.toUpperCase()} Cost</div><div class="order-field-val">₹${o.totalCost.toLocaleString()} <span style="font-size:10px;color:var(--text-dim)">(${o.capitalPct}%)</span></div></div>
            ${o.existingQty > 0 ? `
              <div class="order-field"><div class="order-field-label">Total Position After</div><div class="order-field-val" style="color:var(--cyan)">${o.totalQtyAfter} shares</div></div>
              <div class="order-field"><div class="order-field-label">Avg Price After</div><div class="order-field-val">₹${o.avgPriceAfter.toLocaleString()}</div></div>
            ` : `
              <div class="order-field"><div class="order-field-label">Target 1</div><div class="order-field-val" style="color:var(--green)">₹${o.target1.toLocaleString()}</div></div>
              <div class="order-field"><div class="order-field-label">Target 2</div><div class="order-field-val" style="color:var(--green-bright)">₹${o.target2.toLocaleString()}</div></div>
            `}
            <div class="order-field"><div class="order-field-label">Risk Amount (${RISK_PCT}%)</div><div class="order-field-val" style="color:var(--amber)">₹${o.riskAmount.toLocaleString()}</div></div>
            <div class="order-field"><div class="order-field-label">Risk/Share</div><div class="order-field-val">₹${o.riskPerShare} (${((o.riskPerShare/o.entry)*100).toFixed(1)}%)</div></div>
          </div>

          <!-- Broker Selector -->
          <div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px">SELECT BROKER</div>
          <div class="broker-select">
            ${Object.entries(BROKERS).map(([key, b]) => `
              <div class="broker-card ${selectedBroker === key ? 'selected' : ''}" onclick="selectBroker('${key}')">
                <div class="broker-name">${b.name}</div>
                <div class="broker-type">${b.type}</div>
                <div style="display:flex;gap:3px;justify-content:center;margin-top:4px">
                  ${b.levels.map(l => `<span class="broker-level ${l}">${l.toUpperCase()}</span>`).join('')}
                </div>
              </div>
            `).join('')}
          </div>

          <!-- Level Tabs -->
          <div class="order-tabs">
            <button class="order-tab active" onclick="switchOrderLevel('clipboard', this)">📋 L1: Clipboard</button>
            <button class="order-tab" onclick="switchOrderLevel('deeplink', this)">🔗 L2: Deep Link</button>
            <button class="order-tab" onclick="switchOrderLevel('api', this)">⚡ L3: API Order</button>
          </div>
          <div id="order-level-content">${renderClipboard(o)}</div>
        `}

        <!-- Journal Preview -->
        <div class="journal-preview">
          <div class="journal-preview-title">📓 AUTO-JOURNAL ENTRY</div>
          <div class="journal-row"><span>Date</span><span>${new Date().toLocaleDateString('en-IN')}</span></div>
          <div class="journal-row"><span>Symbol</span><span>${o.symbol} (${o.sector})</span></div>
          <div class="journal-row"><span>Action</span><span>${canExecute ? `BUY · ${o.pyLevel.toUpperCase()}${o.parentId ? ' (linked to '+o.parentId+')' : ''}` : 'BLOCKED'}</span></div>
          <div class="journal-row"><span>Qty × Price</span><span>${o.adjQty} × ₹${o.entry.toLocaleString()} = ₹${o.totalCost.toLocaleString()}</span></div>
          ${o.existingQty > 0 ? `<div class="journal-row"><span>Position After</span><span>${o.totalQtyAfter} shares · Avg ₹${o.avgPriceAfter.toLocaleString()}</span></div>` : ''}
          <div class="journal-row"><span>SL · R:R · ATR</span><span>₹${o.sl.toLocaleString()} · ${o.rr} · ATR ₹${o.atr14}</span></div>
          <div class="journal-row"><span>Setup</span><span>${o.pattern} · ${o.catalyst} · ${o.grade}</span></div>
          <div class="journal-row"><span>Regime</span><span>MPS ${state.mps.score} · ${computeGates(state).mpsSignal}</span></div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        ${canExecute ? `
          <button class="btn btn-primary" onclick="executeOrder('${o.symbol}')" style="font-weight:800;letter-spacing:1px">
            ⚡ ${o.pyLevel === 'p1' ? 'EXECUTE' : o.pyLevel === 'p2' ? 'ADD P2' : 'TOP-UP P3'} + LOG
          </button>
        ` : `
          <button class="btn btn-ghost" style="opacity:0.4;cursor:not-allowed" disabled>🚫 Cannot Execute</button>
        `}
      </div>
    </div>
  `;

  requestAnimationFrame(() => overlay.classList.add('show'));
}

function renderClipboard(o) {
  const text = `═══ EDGE PILOT ORDER ═══
Symbol: ${o.symbol} (NSE)
Action: BUY
Entry:  ₹${o.entry.toLocaleString()}
Qty:    ${o.adjQty} shares
SL:     ₹${o.sl.toLocaleString()} (${((o.riskPerShare/o.entry)*100).toFixed(1)}%)
T1:     ₹${o.target1.toLocaleString()}
T2:     ₹${o.target2.toLocaleString()}
R:R:    ${o.rr}
Cost:   ₹${o.totalCost.toLocaleString()} (${o.capitalPct}% capital)
Risk:   ₹${o.riskAmount.toLocaleString()} (${RISK_PCT}%)
Setup:  ${o.pattern} · ${o.catalyst}
Grade:  ${o.grade} · O'Neil ${o.oneilScore}
ATR:    ₹${o.atr14} · Sell: 5×/6×/7×
═══════════════════════`;
  return `
    <div class="order-clipboard" id="clipboard-text">${text}<button class="copy-btn" onclick="copyOrder()">📋 Copy</button></div>
    <div style="font-size:9px;color:var(--text-dim);text-align:center">Copy and paste into your broker's order window</div>
  `;
}

function renderDeepLink(o) {
  const broker = BROKERS[selectedBroker];
  const link = broker?.deepLink?.(o.symbol, o.adjQty, o.entry, o.sl, o.target1) || '#';
  return `
    <div style="text-align:center;padding:20px 0">
      <div style="font-size:11px;color:var(--text-secondary);margin-bottom:12px">
        Opens <strong style="color:var(--text-primary)">${broker?.name || 'Broker'}</strong> with pre-filled order details
      </div>
      <a href="${link}" target="_blank" class="btn btn-primary" style="text-decoration:none;padding:12px 32px;font-size:13px;font-weight:800;letter-spacing:1px">
        🔗 OPEN ${(broker?.name || 'BROKER').toUpperCase()} ORDER WINDOW
      </a>
      <div style="font-size:9px;color:var(--text-dim);margin-top:10px">
        ${selectedBroker === 'definedge' ? 'Opens Definedge Zone chart — place order from Zone' :
          `Pre-fills: ${o.symbol} · BUY · ${o.adjQty} qty · ₹${o.entry} · SL ₹${o.sl}`}
      </div>
    </div>
  `;
}

function renderAPIOrder(o) {
  const isSupported = selectedBroker === 'dhan';
  return `
    <div style="text-align:center;padding:16px 0">
      ${isSupported ? `
        <div style="font-size:11px;color:var(--green);margin-bottom:8px;font-weight:700">✅ Dhan API Bracket Order</div>
        <div style="font-size:10px;color:var(--text-secondary);margin-bottom:12px;line-height:1.6">
          Places a <strong>bracket order</strong> via Dhan API:<br>
          BUY ${o.adjQty} × ${o.symbol} @ ₹${o.entry} · SL ₹${o.sl} · Target ₹${o.target1}<br>
          <span style="color:var(--amber)">Requires DHAN_API_KEY in config</span>
        </div>
        <button class="btn btn-primary" onclick="placeDhanOrder('${o.symbol}')" style="padding:12px 32px;font-size:13px;font-weight:800">
          ⚡ PLACE BRACKET ORDER VIA API
        </button>
      ` : `
        <div style="font-size:11px;color:var(--amber);margin-bottom:8px;font-weight:700">⚠️ API not available for ${BROKERS[selectedBroker]?.name}</div>
        <div style="font-size:10px;color:var(--text-dim);line-height:1.6">
          API execution is currently supported only for <strong style="color:var(--green)">Dhan</strong>.<br>
          For ${BROKERS[selectedBroker]?.name}, use Deep Link (L2) or Clipboard (L1).
        </div>
      `}
    </div>
  `;
}

function selectBroker(key) {
  selectedBroker = key;
  const pick = state.topPicks.find(p => {
    const modal = document.getElementById('order-modal');
    return modal?.innerHTML?.includes(p.symbol);
  });
  if (pick) openOrderBuilder(pick.symbol);
}

function switchOrderLevel(level, btn) {
  document.querySelectorAll('.order-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const modal = document.getElementById('order-modal');
  const symbolMatch = modal?.innerHTML?.match(/EXECUTE — (\w+)/);
  if (!symbolMatch) return;
  const pick = state.topPicks.find(p => p.symbol === symbolMatch[1]);
  if (!pick) return;
  const o = calcOrderDetails(pick);
  const content = document.getElementById('order-level-content');
  if (!content) return;
  if (level === 'clipboard') content.innerHTML = renderClipboard(o);
  else if (level === 'deeplink') content.innerHTML = renderDeepLink(o);
  else content.innerHTML = renderAPIOrder(o);
}

function copyOrder() {
  const el = document.getElementById('clipboard-text');
  if (el) {
    const text = el.innerText.replace('📋 Copy', '').trim();
    navigator.clipboard.writeText(text).then(() => {
      showToast('📋', 'Order copied to clipboard', 'Paste into your broker order window');
    });
  }
}

function closeModal() {
  const overlay = document.getElementById('order-modal');
  if (overlay) overlay.classList.remove('show');
}

// ── EXECUTE + JOURNAL LOG ──
async function executeOrder(symbol) {
  const pick = state.topPicks.find(p => p.symbol === symbol);
  if (!pick) return;
  const pyramidInfo = detectPyramidLevel(symbol, pick);
  if (!pyramidInfo.canPyramid) return;
  const o = calcOrderDetails(pick, pyramidInfo);
  const gates = computeGates(state);
  const now = new Date();
  const dateStr = now.toISOString().split('T')[0]; // YYYY-MM-DD

  // ═══ BUILD JOURNAL-COMPATIBLE TRADE ═══
  // Format: { id, symbol, side, status, entries:[{date,price,qty}], exits:[], source, sl, ... }
  // This is the SAME format your Journal (index.html) uses in te_trades
  const journalTrade = {
    id: `${now.getTime()}${Math.random().toString().slice(2,18)}`,
    symbol: o.symbol,
    setup: `${o.pattern} · ${o.catalyst}`,
    side: 'Buy',
    status: 'Open',  // Journal uses "Open" not "OPEN"
    sl: o.sl,
    plan: `Entry ₹${o.entry} → T1 ₹${o.target1} → T2 ₹${o.target2} · R:R ${o.rr}`,
    exitTrigger: `TSL: 21 EMA / 10 DMA / Chandelier · ATR sell: 5×/6×/7×`,
    growth: o.grade,
    notes: `Edge Pilot ${o.pyLevel.toUpperCase()} · ${gates.mpsSignal} MPS ${gates.mpsScore} · ${o.sector} · O'Neil ${o.oneilScore} (${o.grade}) · RS #${pick.rsRank} ${o.rsTier} ${o.sizeMulti}× · ATR ₹${o.atr14}`,
    source: BROKERS[selectedBroker]?.name?.toLowerCase() || 'dhan',
    entries: [
      { date: dateStr, price: o.entry, qty: o.adjQty }
    ],
    exits: [],
    cmp: o.entry,
    // Edge Pilot metadata (prefixed with _ep to avoid conflicts with Journal)
    _epPyramid: o.pyLevel,
    _epParentId: o.parentId || null,
    _epRsTier: o.rsTier,
    _epSizeMulti: o.sizeMulti,
    _epRiskAmount: o.riskAmount,
    _epAtr14: o.atr14,
    _epAtrSellLevels: { x5: o.entry + o.atr14*5, x6: o.entry + o.atr14*6, x7: o.entry + o.atr14*7 },
    _epRegime: gates.mpsSignal,
    _epMpsScore: gates.mpsScore,
    _epSlMoves: [{ date: now.toISOString(), from: null, to: o.sl, reason: 'Initial SL' }],
    sector: o.sector,
  };

  // ═══ 1. SAVE TO localStorage (te_trades — shared with Journal) ═══
  const trades = JSON.parse(localStorage.getItem('te_trades') || '[]');
  trades.push(journalTrade);
  localStorage.setItem('te_trades', JSON.stringify(trades));

  // Update cached capital
  computeCurrentCapital();

  // ═══ 2. SAVE TO SUPABASE (Edge Pilot's own table for advanced tracking) ═══
  let supaOk = false;
  try {
    supaOk = await supabaseUpsert('trades', {
      trade_id: journalTrade.id,
      symbol: o.symbol,
      sector: o.sector,
      action: 'BUY',
      entry_price: o.entry,
      qty: o.adjQty,
      remaining_qty: o.adjQty,
      stop_loss: o.sl,
      target_1: o.target1,
      target_2: o.target2,
      risk_amount: o.riskAmount,
      pattern: o.pattern,
      catalyst: o.catalyst,
      grade: o.grade,
      oneil_score: o.oneilScore,
      rs_rank: pick.rsRank,
      pyramid_level: o.pyLevel,
      parent_trade_id: o.parentId || null,
      total_qty_after: o.totalQtyAfter,
      avg_price_after: o.avgPriceAfter,
      atr_14: o.atr14,
      regime: gates.mpsSignal,
      mps_score: gates.mpsScore,
      broker: BROKERS[selectedBroker]?.name,
      status: 'OPEN',
      partial_sells: '[]',
      sl_moves: JSON.stringify(journalTrade._epSlMoves),
      created_at: now.toISOString()
    });
  } catch(e) { console.log('Supabase trade save error:', e); }

  // ═══ 3. OPEN BROKER ═══
  const broker = BROKERS[selectedBroker];
  if (broker?.deepLink) {
    window.open(broker.deepLink(o.symbol, o.adjQty, o.entry, o.sl, o.target1), '_blank');
  }

  closeModal();
  showToast('⚡',
    `${o.symbol} ${o.pyLevel.toUpperCase()} — Logged to Journal + ${supaOk ? 'Cloud' : 'Local'}`,
    `BUY ${o.adjQty} @ ₹${o.entry} · SL ₹${o.sl} · ${BROKERS[selectedBroker]?.name} · ID: ${journalTrade.id.slice(0,8)}...`,
    6000
  );
}

async function placeDhanOrder(symbol) {
  // Dhan API bracket order — requires DHAN_API_KEY
  showToast('⚠️', 'Dhan API Key Required',
    'Set DHAN_API_KEY in config to enable auto bracket orders. For now, use Deep Link (L2) to open pre-filled order.',
    5000
  );
}

// ═══ BOOT — CLOUD SYNC FIRST ═══
async function boot() {
  // 1. Sync trades from Supabase (source of truth)
  await syncTradesFromCloud();
  // 2. Load market data
  await loadData();
}
boot();
</script>
