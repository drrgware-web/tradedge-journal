<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradEdge EDGE PILOT</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-void: #050810;
  --bg-base: #080c16;
  --bg-card: #0c1120;
  --bg-card-alt: #0e1426;
  --bg-elevated: #111830;
  --bg-inset: #070a12;

  --border-dim: rgba(56,189,248,0.04);
  --border-subtle: rgba(56,189,248,0.08);
  --border-accent: rgba(56,189,248,0.18);
  --border-glow: rgba(34,211,238,0.3);
  --border-pass: rgba(16,185,129,0.25);
  --border-fail: rgba(239,68,68,0.2);

  --text-primary: #e2e8f0;
  --text-secondary: #8492a6;
  --text-dim: #4a5568;
  --text-muted: #2d3748;

  --cyan: #22d3ee;
  --cyan-soft: #67e8f9;
  --cyan-dim: rgba(34,211,238,0.1);
  --green: #10b981;
  --green-bright: #34d399;
  --green-dim: rgba(16,185,129,0.1);
  --red: #ef4444;
  --red-bright: #f87171;
  --red-dim: rgba(239,68,68,0.1);
  --amber: #f59e0b;
  --amber-bright: #fbbf24;
  --amber-dim: rgba(245,158,11,0.1);
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.12);
  --gold: #fbbf24;
  --gold-dim: rgba(251,191,36,0.08);

  --font: 'Outfit', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg-void);color:var(--text-primary);min-height:100vh;line-height:1.5;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg-void);}
::-webkit-scrollbar-thumb{background:rgba(34,211,238,0.15);border-radius:3px;}

body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 800px 600px at 15% 10%,rgba(34,211,238,0.03) 0%,transparent 60%),radial-gradient(ellipse 600px 500px at 85% 80%,rgba(16,185,129,0.025) 0%,transparent 60%);pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:0 24px 60px;}

/* ═══ HEADER ═══ */
.header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 16px;border-bottom:1px solid var(--border-dim);margin-bottom:24px;}
.header-left{display:flex;align-items:center;gap:16px;}
.logo-mark{width:44px;height:44px;border-radius:10px;overflow:hidden;box-shadow:0 0 20px rgba(34,211,238,0.15);flex-shrink:0;}.logo-mark img{width:100%;height:100%;object-fit:cover;}
.header-title{font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text-secondary);}
.header-title span{color:var(--cyan);}
.header-nav{display:flex;gap:6px;}
.header-nav a{font-size:12px;font-weight:500;color:var(--text-dim);text-decoration:none;padding:6px 12px;border-radius:6px;transition:all 0.2s;letter-spacing:0.5px;}
.header-nav a:hover{color:var(--text-secondary);background:var(--bg-card);}
.header-nav a.active{color:var(--cyan);background:var(--cyan-dim);}

/* ═══ HERO ═══ */
.hero{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:16px;padding:28px 32px;margin-bottom:8px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--green),var(--amber),var(--red));opacity:0.6;}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;}
.hero-badge{display:inline-flex;align-items:center;gap:8px;font-size:28px;font-weight:900;letter-spacing:2px;color:var(--text-primary);}
.ep-logo{width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#4a5e78 0%,#1e2a3a 50%,#0f1923 100%);border:3px solid #3a4f66;box-shadow:0 0 12px rgba(34,211,238,0.15),inset 0 1px 2px rgba(255,255,255,0.08);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:hidden;}.ep-logo::before{content:'';position:absolute;top:2px;left:50%;transform:translateX(-50%);width:60%;height:30%;border-radius:0 0 50% 50%/0 0 100% 100%;border:1.5px solid rgba(255,255,255,0.25);border-top:none;}.ep-logo-txt{font-size:5.5px;font-weight:900;letter-spacing:0.8px;color:rgba(255,255,255,0.85);line-height:1;margin-top:6px;text-align:center;}.ep-logo-dot{display:flex;gap:6px;margin-top:2px;}.ep-logo-dot span{width:4px;height:4px;border-radius:50%;}.ep-logo-dot .on{background:#10b981;box-shadow:0 0 4px #10b981;}.ep-logo-dot .off{background:#6b7280;}
.hero-subtitle{font-size:11.5px;font-weight:500;letter-spacing:2.5px;color:var(--text-dim);text-transform:uppercase;margin-top:6px;}
.hero-actions{display:flex;gap:8px;flex-shrink:0;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all 0.2s;letter-spacing:0.3px;}
.btn-primary{background:linear-gradient(135deg,rgba(34,211,238,0.15),rgba(16,185,129,0.1));border-color:var(--border-accent);color:var(--cyan);}
.btn-primary:hover{background:linear-gradient(135deg,rgba(34,211,238,0.25),rgba(16,185,129,0.15));border-color:var(--border-glow);box-shadow:0 0 16px rgba(34,211,238,0.1);}
.btn-ghost{background:var(--bg-elevated);border-color:var(--border-subtle);color:var(--text-secondary);}
.btn-ghost:hover{border-color:var(--border-accent);color:var(--text-primary);}

/* ═══ MONEY PROFILE ═══ */
.money-profile{display:grid;grid-template-columns:1fr auto auto auto;gap:32px;align-items:center;padding:16px 20px;background:var(--bg-inset);border-radius:10px;border:1px solid var(--border-dim);}
.money-label{display:flex;align-items:center;gap:12px;}
.money-dot{width:36px;height:36px;border-radius:50%;border:3px solid var(--cyan);position:relative;display:flex;align-items:center;justify-content:center;}
.money-dot-inner{width:18px;height:18px;border-radius:50%;}
.money-name{font-size:16px;font-weight:700;color:var(--text-primary);letter-spacing:1px;}
.money-mode{font-size:11px;color:var(--text-dim);font-weight:500;}
.money-stat{text-align:center;}
.money-stat-val{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--text-primary);}
.money-stat-label{font-size:9.5px;font-weight:600;letter-spacing:1.5px;color:var(--text-dim);text-transform:uppercase;}
.money-rules{padding:10px 16px;background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.12);border-radius:8px;max-width:320px;}
.money-rules-title{font-size:11px;font-weight:700;color:var(--green);letter-spacing:0.5px;margin-bottom:3px;}
.money-rules-text{font-size:10.5px;color:var(--text-secondary);line-height:1.5;}

/* ═══ PIPELINE TRACKER ═══ */
.pipeline{display:flex;align-items:center;gap:0;padding:16px 24px;margin:8px 0 20px;}
.pipe-stage{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;z-index:1;}
.pipe-num{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;font-family:var(--mono);font-size:12px;font-weight:700;border:2px solid var(--border-subtle);background:var(--bg-card);color:var(--text-dim);transition:all 0.4s;}
.pipe-num.pass{border-color:var(--green);background:var(--green-dim);color:var(--green);box-shadow:0 0 12px rgba(16,185,129,0.15);}
.pipe-num.fail{border-color:var(--red);background:var(--red-dim);color:var(--red);}
.pipe-num.active{border-color:var(--cyan);background:var(--cyan-dim);color:var(--cyan);box-shadow:0 0 12px rgba(34,211,238,0.2);}
.pipe-num.locked{opacity:0.35;}
.pipe-label{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);text-align:center;white-space:nowrap;}
.pipe-label.pass{color:var(--green);}
.pipe-label.fail{color:var(--red);}
.pipe-label.active{color:var(--cyan);}
.pipe-connector{flex:0 0 auto;width:40px;height:2px;position:relative;z-index:1;}
.pipe-connector .line{position:absolute;top:0;left:0;right:0;height:2px;background:var(--border-subtle);border-radius:1px;}
.pipe-connector .line.pass{background:var(--green);box-shadow:0 0 6px rgba(16,185,129,0.2);}
.pipe-connector .line.fail{background:linear-gradient(90deg,var(--red),rgba(239,68,68,0.3));}

/* ═══ STAGE CARDS ═══ */
.stage{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:14px;margin-bottom:16px;overflow:hidden;transition:all 0.3s;animation:stageIn 0.5s ease-out both;}
.stage:hover{border-color:var(--border-accent);}
.stage.locked{opacity:0.4;pointer-events:none;filter:grayscale(0.3);}
.stage.locked .stage-body{display:none;}
.stage.pass{border-color:var(--border-pass);}
.stage.fail{border-color:var(--border-fail);}
@keyframes stageIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.stage:nth-child(1){animation-delay:0.05s;}.stage:nth-child(2){animation-delay:0.1s;}.stage:nth-child(3){animation-delay:0.15s;}.stage:nth-child(4){animation-delay:0.2s;}.stage:nth-child(5){animation-delay:0.25s;}.stage:nth-child(6){animation-delay:0.3s;}

.stage-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;cursor:pointer;user-select:none;}
.stage-header-left{display:flex;align-items:center;gap:14px;}
.stage-num{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-family:var(--mono);font-size:14px;font-weight:700;flex-shrink:0;}
.stage-num.n1{background:var(--cyan-dim);color:var(--cyan);border:1.5px solid rgba(34,211,238,0.25);}
.stage-num.n2{background:var(--green-dim);color:var(--green);border:1.5px solid rgba(16,185,129,0.25);}
.stage-num.n3{background:var(--amber-dim);color:var(--amber);border:1.5px solid rgba(245,158,11,0.2);}
.stage-num.n4{background:var(--purple-dim);color:var(--purple);border:1.5px solid rgba(167,139,250,0.2);}
.stage-num.n5{background:var(--gold-dim);color:var(--gold);border:1.5px solid rgba(251,191,36,0.2);}
.stage-num.n6{background:rgba(34,211,238,0.08);color:var(--cyan-soft);border:1.5px solid rgba(34,211,238,0.15);}
.stage-title-group{}
.stage-title{font-size:15px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;}
.stage-question{font-size:11.5px;color:var(--text-dim);font-weight:400;margin-top:2px;}
.stage-verdict{display:flex;align-items:center;gap:10px;}
.verdict-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:1px;}
.verdict-badge.risk-on{background:var(--green-dim);color:var(--green-bright);border:1px solid rgba(16,185,129,0.2);}
.verdict-badge.risk-off{background:var(--red-dim);color:var(--red-bright);border:1px solid rgba(239,68,68,0.2);}
.verdict-badge.caution{background:var(--amber-dim);color:var(--amber-bright);border:1px solid rgba(245,158,11,0.2);}
.verdict-badge .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.verdict-badge.risk-on .dot{background:var(--green);box-shadow:0 0 6px var(--green);}
.verdict-badge.risk-off .dot{background:var(--red);box-shadow:0 0 6px var(--red);animation:pulse-dot 2s infinite;}
.verdict-badge.caution .dot{background:var(--amber);box-shadow:0 0 6px var(--amber);}
@keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:0.4;}}
.stage-body{padding:0 24px 22px;}

/* ═══ STAGE 1: ASSET ALLOC ═══ */
.asset-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.asset-card{background:var(--bg-inset);border:1px solid var(--border-dim);border-radius:10px;padding:14px 16px;transition:all 0.2s;position:relative;overflow:hidden;}
.asset-card:hover{border-color:var(--border-accent);}
.asset-card.recommended{border-color:var(--border-pass);background:linear-gradient(135deg,var(--bg-inset),rgba(16,185,129,0.04));}
.asset-card.recommended::before{content:'★';position:absolute;top:8px;right:10px;font-size:10px;color:var(--green);}
.asset-name{font-size:11px;font-weight:600;color:var(--text-secondary);letter-spacing:0.5px;margin-bottom:6px;}
.asset-alloc{font-family:var(--mono);font-size:24px;font-weight:700;color:var(--text-primary);}
.asset-alloc span{font-size:13px;color:var(--text-dim);}
.asset-signal{font-size:10px;font-weight:600;margin-top:6px;letter-spacing:0.5px;}
.asset-signal.overweight{color:var(--green);}
.asset-signal.neutral{color:var(--text-dim);}
.asset-signal.underweight{color:var(--red);}
.alloc-reasoning{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;background:var(--bg-inset);border-radius:8px;border-left:3px solid var(--cyan);}
.alloc-reasoning-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
.alloc-reasoning-text{font-size:11.5px;color:var(--text-secondary);line-height:1.6;}
.alloc-reasoning-text strong{color:var(--text-primary);font-weight:600;}

/* ═══ STAGE 2: EQUITY REGIME ═══ */
.regime-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.regime-metric{background:var(--bg-inset);border:1px solid var(--border-dim);border-radius:10px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;}
.regime-metric-left{}
.regime-metric-name{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px;}
.regime-metric-val{font-family:var(--mono);font-size:18px;font-weight:700;}
.regime-signal{font-family:var(--mono);font-size:10px;font-weight:700;padding:4px 10px;border-radius:4px;letter-spacing:0.8px;}
.regime-signal.bullish{background:var(--green-dim);color:var(--green);}
.regime-signal.bearish{background:var(--red-dim);color:var(--red);}
.regime-signal.neutral{background:var(--amber-dim);color:var(--amber);}

.mps-gauge{display:flex;align-items:center;gap:20px;padding:16px 20px;background:var(--bg-inset);border:1px solid var(--border-dim);border-radius:10px;}
.mps-gauge-visual{position:relative;width:80px;height:80px;flex-shrink:0;}
.mps-gauge-visual svg{width:80px;height:80px;transform:rotate(-90deg);}
.mps-gauge-visual .track{fill:none;stroke:var(--border-subtle);stroke-width:6;}
.mps-gauge-visual .fill{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 1s ease;}
.mps-gauge-val{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--mono);font-size:20px;font-weight:800;}
.mps-gauge-info{flex:1;}
.mps-gauge-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px;}
.mps-gauge-reading{font-size:14px;font-weight:700;margin-bottom:6px;}
.mps-gauge-detail{font-size:10.5px;color:var(--text-dim);line-height:1.5;}

.regime-verdict-bar{margin-top:14px;padding:12px 16px;border-radius:8px;display:flex;align-items:center;gap:10px;}
.regime-verdict-bar.risk-on{background:linear-gradient(90deg,var(--green-dim),transparent);border-left:3px solid var(--green);}
.regime-verdict-bar.risk-off{background:linear-gradient(90deg,var(--red-dim),transparent);border-left:3px solid var(--red);}
.regime-verdict-bar.caution{background:linear-gradient(90deg,var(--amber-dim),transparent);border-left:3px solid var(--amber);}
.regime-verdict-text{font-size:12px;color:var(--text-secondary);}
.regime-verdict-text strong{color:var(--text-primary);font-weight:700;}

/* ═══ STAGE 3: SECTOR ROTATION ═══ */
.sector-quadrants{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.quadrant{background:var(--bg-inset);border:1px solid var(--border-dim);border-radius:10px;padding:14px 16px;min-height:90px;}
.quadrant-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.quadrant-title{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;}
.quadrant-title.leading{color:var(--green);}.quadrant-title.improving{color:var(--cyan);}.quadrant-title.weakening{color:var(--amber);}.quadrant-title.lagging{color:var(--red);}
.quadrant-items{display:flex;flex-wrap:wrap;gap:5px;}
.sector-pill{font-size:10px;font-weight:600;padding:3px 10px;border-radius:4px;letter-spacing:0.3px;}
.sector-pill.leading{background:rgba(16,185,129,0.1);color:var(--green-bright);border:1px solid rgba(16,185,129,0.15);}
.sector-pill.improving{background:rgba(34,211,238,0.08);color:var(--cyan-soft);border:1px solid rgba(34,211,238,0.12);}
.sector-pill.weakening{background:rgba(245,158,11,0.08);color:var(--amber-bright);border:1px solid rgba(245,158,11,0.12);}
.sector-pill.lagging{background:rgba(239,68,68,0.08);color:var(--red-bright);border:1px solid rgba(239,68,68,0.12);}
.sector-empty{font-size:10.5px;color:var(--text-muted);font-style:italic;}

/* ═══ SUB-GROUP FILTER PILLS ═══ */
.subgroup-filter{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap;}
.subgroup-pill{font-size:10px;font-weight:600;padding:5px 14px;border-radius:6px;cursor:pointer;color:var(--text-dim);background:transparent;border:1px solid var(--border-dim);font-family:var(--font);letter-spacing:0.5px;transition:all 0.2s;}
.subgroup-pill:hover{color:var(--text-secondary);border-color:var(--border-accent);}
.subgroup-pill.active{color:var(--cyan);background:var(--cyan-dim);border-color:rgba(34,211,238,0.2);}
.subgroup-pill .pill-count{font-family:var(--mono);font-size:9px;opacity:0.7;margin-left:4px;}
.etf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px;margin-bottom:14px;}
.etf-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--bg-inset);border:1px solid var(--border-dim);border-radius:6px;font-size:10px;transition:border-color 0.2s;}
.etf-item:hover{border-color:var(--border-accent);}
.etf-name{font-weight:600;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;}
.etf-quad{font-family:var(--mono);font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;flex-shrink:0;}
.etf-quad.leading{background:rgba(16,185,129,0.1);color:var(--green-bright);}
.etf-quad.improving{background:rgba(34,211,238,0.08);color:var(--cyan-soft);}
.etf-quad.weakening{background:rgba(245,158,11,0.08);color:var(--amber-bright);}
.etf-quad.lagging{background:rgba(239,68,68,0.08);color:var(--red-bright);}

/* ═══ STAGE 4: HELIX ═══ */
.helix-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.helix-tf{background:var(--bg-inset);border:1px solid var(--border-dim);border-radius:10px;padding:14px 16px;}
.helix-tf-name{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;}
.helix-tf-signal{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.helix-arrow{font-size:16px;font-weight:900;}
.helix-arrow.up{color:var(--green);}.helix-arrow.down{color:var(--red);}.helix-arrow.flat{color:var(--amber);}
.helix-tf-label{font-family:var(--mono);font-size:12px;font-weight:700;}
.helix-tf-detail{font-size:10px;color:var(--text-dim);line-height:1.5;}
.helix-alignment{padding:14px 16px;background:var(--bg-inset);border:1px solid var(--border-dim);border-radius:10px;display:flex;align-items:center;gap:16px;}
.helix-alignment-label{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-dim);flex-shrink:0;}
.helix-bars{flex:1;display:flex;gap:4px;height:20px;align-items:center;}
.helix-bar{height:100%;border-radius:3px;flex:1;transition:all 0.3s;}
.helix-bar.green{background:var(--green);opacity:0.8;}.helix-bar.amber{background:var(--amber);opacity:0.6;}.helix-bar.red{background:var(--red);opacity:0.6;}.helix-bar.dim{background:var(--border-subtle);opacity:0.3;}
.helix-score{font-family:var(--mono);font-size:14px;font-weight:700;flex-shrink:0;}

/* ═══ STAGE 5: EDGE INTEL ═══ */
.edge-tabs{display:flex;gap:4px;margin-bottom:14px;}
.edge-tab{font-size:10.5px;font-weight:600;padding:6px 14px;border-radius:6px;cursor:pointer;color:var(--text-dim);background:transparent;border:1px solid transparent;font-family:var(--font);letter-spacing:0.5px;transition:all 0.2s;}
.edge-tab:hover{color:var(--text-secondary);}.edge-tab.active{color:var(--cyan);background:var(--cyan-dim);border-color:rgba(34,211,238,0.15);}
.edge-table{width:100%;border-collapse:collapse;}
.edge-table th{font-size:9px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--text-dim);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border-subtle);}
.edge-table th:last-child{text-align:right;}
.edge-table td{font-size:12px;padding:10px 12px;border-bottom:1px solid var(--border-dim);vertical-align:middle;}
.edge-table tr:hover td{background:rgba(34,211,238,0.02);}
.edge-table tr:last-child td{border-bottom:none;}
.stock-name{font-weight:700;color:var(--text-primary);letter-spacing:0.3px;}
.stock-sector{font-size:10px;color:var(--text-dim);margin-top:1px;}
.stock-score{font-family:var(--mono);font-weight:700;font-size:13px;}
.stock-score.a-plus{color:var(--green-bright);}.stock-score.a{color:var(--green);}.stock-score.b{color:var(--cyan);}.stock-score.c{color:var(--amber);}
.catalyst-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:9.5px;font-weight:600;letter-spacing:0.3px;}
.catalyst-badge.high{background:var(--green-dim);color:var(--green);border:1px solid rgba(16,185,129,0.15);}
.catalyst-badge.med{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,0.15);}
.catalyst-badge.low{background:var(--bg-elevated);color:var(--text-dim);border:1px solid var(--border-dim);}
.surv-check{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:11px;font-weight:600;}
.surv-check.clean{color:var(--green);}.surv-check.warn{color:var(--amber);}.surv-check.danger{color:var(--red);}
.td-right{text-align:right!important;}

/* ═══ STAGE 6: EXECUTION ═══ */
.exec-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;}
.exec-card{background:var(--bg-inset);border:1px solid var(--border-dim);border-radius:12px;padding:18px 20px;position:relative;transition:all 0.25s;}
.exec-card:hover{border-color:var(--border-accent);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.exec-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.exec-card-symbol{font-size:18px;font-weight:800;color:var(--text-primary);letter-spacing:0.5px;}
.exec-card-sector{font-size:10px;color:var(--text-dim);margin-top:2px;}
.exec-grade{font-family:var(--mono);font-size:14px;font-weight:800;padding:4px 10px;border-radius:6px;}
.exec-grade.a-plus{background:var(--green-dim);color:var(--green-bright);border:1px solid rgba(16,185,129,0.2);}
.exec-grade.a{background:var(--green-dim);color:var(--green);border:1px solid rgba(16,185,129,0.15);}
.exec-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.exec-metric{text-align:center;padding:8px 4px;background:rgba(0,0,0,0.2);border-radius:6px;}
.exec-metric-val{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--text-primary);}
.exec-metric-label{font-size:8.5px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);margin-top:2px;}
.exec-entry-zone{padding:10px 14px;background:rgba(16,185,129,0.05);border:1px solid rgba(16,185,129,0.1);border-radius:8px;margin-bottom:10px;}
.exec-entry-title{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--green);margin-bottom:6px;}
.exec-entry-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text-secondary);margin-bottom:3px;}
.exec-entry-row span:last-child{font-family:var(--mono);font-weight:600;color:var(--text-primary);}
.exec-action{display:flex;gap:6px;}
.exec-btn{flex:1;padding:7px 0;border-radius:6px;font-family:var(--font);font-size:10.5px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;cursor:pointer;border:1px solid transparent;text-align:center;transition:all 0.2s;}
.exec-btn.chart{background:var(--cyan-dim);border-color:rgba(34,211,238,0.15);color:var(--cyan);}
.exec-btn.chart:hover{background:rgba(34,211,238,0.15);}
.exec-btn.watchlist{background:var(--green-dim);border-color:rgba(16,185,129,0.15);color:var(--green);}
.exec-btn.watchlist:hover{background:rgba(16,185,129,0.15);}
.exec-btn.drill{background:var(--bg-elevated);border-color:var(--border-subtle);color:var(--text-secondary);}
.exec-btn.drill:hover{color:var(--text-primary);}

/* ═══ EMPTY / FOOTER ═══ */
.empty-state{text-align:center;padding:40px 20px;}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:0.3;}
.empty-title{font-size:13px;font-weight:600;color:var(--text-dim);margin-bottom:6px;}
.empty-subtitle{font-size:11px;color:var(--text-muted);max-width:400px;margin:0 auto;line-height:1.6;}
.pipeline-footer{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--bg-card);border:1px solid var(--border-dim);border-radius:10px;margin-top:20px;}
.pipeline-stats{font-family:var(--mono);font-size:11px;color:var(--text-dim);letter-spacing:0.3px;}
.pipeline-stats .hl-green{color:var(--green);font-weight:700;}
.pipeline-stats .hl-red{color:var(--red);font-weight:700;}
.pipeline-stats .hl-cyan{color:var(--cyan);font-weight:700;}
.pipeline-stats .hl-amber{color:var(--amber);font-weight:700;}
.pipeline-meta{font-size:10px;color:var(--text-muted);text-align:right;}
.pipeline-meta strong{color:var(--text-dim);font-weight:600;}
.disclaimer{text-align:center;padding:16px 0;font-size:9.5px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;}

/* ═══ TOAST NOTIFICATION ═══ */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg-elevated);border:1px solid var(--border-accent);border-radius:10px;padding:12px 20px;display:flex;align-items:center;gap:10px;z-index:1000;opacity:0;transition:all 0.4s cubic-bezier(0.16,1,0.3,1);pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,0.5);max-width:500px;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}
.toast-icon{font-size:18px;flex-shrink:0;}
.toast-body{flex:1;}
.toast-title{font-size:12px;font-weight:700;color:var(--text-primary);margin-bottom:2px;}
.toast-detail{font-size:10px;color:var(--text-secondary);line-height:1.5;}
.toast-close{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;padding:4px;}

/* ═══ ENHANCEMENT: REGIME SPEED INDICATOR ═══ */
.regime-speed{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--bg-inset);border:1px solid var(--border-dim);border-radius:8px;margin-top:10px;}
.regime-speed-label{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-dim);flex-shrink:0;}
.regime-speed-bar{flex:1;height:6px;background:var(--border-subtle);border-radius:3px;overflow:hidden;position:relative;}
.regime-speed-fill{height:100%;border-radius:3px;transition:width 0.6s ease;}
.regime-speed-val{font-family:var(--mono);font-size:11px;font-weight:700;flex-shrink:0;min-width:50px;text-align:right;}
.regime-delta{display:inline-flex;align-items:center;gap:3px;font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;}
.regime-delta.up{background:rgba(16,185,129,0.1);color:var(--green-bright);}
.regime-delta.down{background:rgba(239,68,68,0.1);color:var(--red-bright);}
.regime-delta.flat{background:rgba(100,116,139,0.1);color:var(--text-dim);}

/* ═══ ENHANCEMENT: RS RANK BADGE ═══ */
.rs-rank{display:inline-flex;align-items:center;gap:3px;font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:0.3px;}
.rs-rank.top10{background:rgba(16,185,129,0.12);color:var(--green-bright);border:1px solid rgba(16,185,129,0.2);}
.rs-rank.top25{background:rgba(34,211,238,0.08);color:var(--cyan);border:1px solid rgba(34,211,238,0.15);}
.rs-rank.top50{background:rgba(245,158,11,0.08);color:var(--amber);border:1px solid rgba(245,158,11,0.12);}
.rs-rank.bottom{background:rgba(100,116,139,0.08);color:var(--text-dim);border:1px solid var(--border-dim);}

/* ═══ ENHANCEMENT: PYRAMID INDICATOR ═══ */
.pyramid-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:0.3px;}
.pyramid-badge.p1{background:rgba(34,211,238,0.1);color:var(--cyan);border:1px solid rgba(34,211,238,0.15);}
.pyramid-badge.p2{background:rgba(16,185,129,0.1);color:var(--green);border:1px solid rgba(16,185,129,0.15);}
.pyramid-badge.p3{background:rgba(251,191,36,0.1);color:var(--gold);border:1px solid rgba(251,191,36,0.15);}
.pyramid-blocks{display:flex;gap:2px;align-items:flex-end;}
.pyramid-block{width:6px;border-radius:1px;}
.pyramid-block.filled{background:var(--cyan);}
.pyramid-block.empty{background:var(--border-subtle);}

/* ═══ POSITION MANAGEMENT SYSTEM ═══ */
.exec-lifecycle{display:flex;gap:0;margin-bottom:12px;position:relative;}
.exec-lifecycle::before{content:'';position:absolute;top:50%;left:24px;right:24px;height:2px;background:var(--border-subtle);transform:translateY(-50%);z-index:0;}
.lc-phase{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;z-index:1;}
.lc-dot{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:8px;font-weight:800;border:2px solid var(--border-subtle);background:var(--bg-inset);color:var(--text-dim);transition:all 0.3s;}
.lc-dot.done{border-color:var(--green);background:var(--green-dim);color:var(--green);}
.lc-dot.active{border-color:var(--cyan);background:var(--cyan-dim);color:var(--cyan);box-shadow:0 0 8px rgba(34,211,238,0.25);animation:pulse-dot 2s infinite;}
.lc-dot.next{border-color:var(--amber);background:var(--amber-dim);color:var(--amber);}
.lc-dot.skip{opacity:0.3;}
.lc-label{font-size:7px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-muted);text-align:center;max-width:60px;line-height:1.3;}
.lc-label.done{color:var(--green);}.lc-label.active{color:var(--cyan);}.lc-label.next{color:var(--amber);}

/* SL Ladder */
.sl-ladder{padding:10px 14px;background:var(--bg-inset);border:1px solid var(--border-dim);border-radius:8px;margin-bottom:10px;}
.sl-ladder-title{font-size:8.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.sl-track{position:relative;height:28px;background:var(--bg-card);border-radius:6px;overflow:hidden;margin-bottom:6px;}
.sl-zone{position:absolute;top:0;height:100%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;letter-spacing:0.5px;transition:all 0.3s;}
.sl-zone.loss{background:linear-gradient(90deg,rgba(239,68,68,0.25),rgba(239,68,68,0.1));color:var(--red-bright);}
.sl-zone.be{background:linear-gradient(90deg,rgba(245,158,11,0.15),rgba(245,158,11,0.08));color:var(--amber);}
.sl-zone.profit{background:linear-gradient(90deg,rgba(16,185,129,0.15),rgba(16,185,129,0.08));color:var(--green);}
.sl-zone.target{background:linear-gradient(90deg,rgba(34,211,238,0.12),rgba(34,211,238,0.06));color:var(--cyan);}
.sl-marker{position:absolute;top:-2px;width:2px;height:32px;z-index:2;}
.sl-marker-label{position:absolute;top:-12px;font-size:6px;font-weight:700;white-space:nowrap;transform:translateX(-50%);}
.sl-levels{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.sl-level{text-align:center;padding:5px 4px;background:rgba(0,0,0,0.2);border-radius:4px;}
.sl-level-price{font-family:var(--mono);font-size:11px;font-weight:700;}
.sl-level-name{font-size:7px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-dim);margin-top:1px;}
.sl-level-pct{font-family:var(--mono);font-size:8px;margin-top:1px;}

/* Sell-into-strength zones */
.sell-zones{padding:10px 14px;background:rgba(251,191,36,0.04);border:1px solid rgba(251,191,36,0.08);border-radius:8px;margin-bottom:10px;}
.sell-zones-title{font-size:8.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.sell-rule{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border-dim);font-size:10px;color:var(--text-secondary);}
.sell-rule:last-child{border-bottom:none;}
.sell-trigger{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;flex-shrink:0;min-width:60px;text-align:center;}
.sell-trigger.partial{background:rgba(245,158,11,0.1);color:var(--amber);border:1px solid rgba(245,158,11,0.12);}
.sell-trigger.full{background:rgba(239,68,68,0.1);color:var(--red-bright);border:1px solid rgba(239,68,68,0.12);}
.sell-trigger.hold{background:rgba(16,185,129,0.08);color:var(--green);border:1px solid rgba(16,185,129,0.12);}
.sell-action{font-weight:600;color:var(--text-primary);}

/* ═══ ATR SELL-INTO-STRENGTH METER ═══ */
.atr-meter{padding:12px 14px;background:rgba(251,191,36,0.04);border:1px solid rgba(251,191,36,0.08);border-radius:8px;margin-bottom:10px;}
.atr-meter-title{font-size:8.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.atr-bar-wrap{position:relative;height:32px;background:var(--bg-card);border-radius:6px;overflow:hidden;margin-bottom:8px;}
.atr-zone{position:absolute;top:0;height:100%;display:flex;align-items:center;justify-content:center;font-size:7.5px;font-weight:700;letter-spacing:0.3px;border-right:1px solid rgba(255,255,255,0.05);}
.atr-zone.normal{background:linear-gradient(90deg,rgba(16,185,129,0.1),rgba(16,185,129,0.05));color:var(--green);}
.atr-zone.alert{background:linear-gradient(90deg,rgba(245,158,11,0.15),rgba(245,158,11,0.08));color:var(--amber);}
.atr-zone.climax{background:linear-gradient(90deg,rgba(239,68,68,0.2),rgba(239,68,68,0.1));color:var(--red-bright);}
.atr-zone.exhaust{background:linear-gradient(90deg,rgba(167,139,250,0.2),rgba(167,139,250,0.1));color:var(--purple);}
.atr-needle{position:absolute;top:-4px;width:3px;height:40px;background:var(--cyan);border-radius:2px;z-index:3;transition:left 0.5s ease;}
.atr-needle::after{content:'▼';position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--cyan);}
.atr-levels{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px;}
.atr-level{text-align:center;padding:6px 4px;border-radius:5px;border:1px solid var(--border-dim);}
.atr-level.triggered{border-color:rgba(239,68,68,0.3);background:rgba(239,68,68,0.06);}
.atr-level-x{font-family:var(--mono);font-size:14px;font-weight:800;}
.atr-level-action{font-size:7.5px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;margin-top:2px;}
.atr-level-detail{font-size:8px;color:var(--text-dim);margin-top:2px;}
.atr-current{display:flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(0,0,0,0.2);border-radius:5px;}
.atr-current-label{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);}
.atr-current-val{font-family:var(--mono);font-size:13px;font-weight:700;}

/* Position summary bar */
.pos-summary{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px;}
.pos-stat{text-align:center;padding:6px 4px;background:rgba(0,0,0,0.2);border-radius:5px;}
.pos-stat-val{font-family:var(--mono);font-size:12px;font-weight:700;}
.pos-stat-label{font-size:7px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-dim);margin-top:1px;}

/* ═══ RESPONSIVE ═══ */
@media(max-width:900px){.asset-grid{grid-template-columns:repeat(2,1fr);}.money-profile{grid-template-columns:1fr;gap:16px;}.helix-grid{grid-template-columns:1fr;}.exec-cards{grid-template-columns:1fr;}.regime-grid{grid-template-columns:1fr;}}
@media(max-width:600px){.app{padding:0 12px 40px;}.hero{padding:20px 16px;}.stage-header{padding:14px 16px;}.stage-body{padding:0 16px 18px;}.pipeline{padding:12px 8px;overflow-x:auto;}.asset-grid{grid-template-columns:1fr;}.sector-quadrants{grid-template-columns:1fr;}.header-nav{display:none;}}

/* ═══ ORDER BUILDER MODAL ═══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.modal-overlay.show{opacity:1;pointer-events:auto;}
.modal{background:var(--bg-card);border:1px solid var(--border-accent);border-radius:16px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.6);animation:modalIn 0.3s ease-out;}
@keyframes modalIn{from{transform:translateY(20px) scale(0.97);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 14px;border-bottom:1px solid var(--border-dim);}
.modal-title{font-size:16px;font-weight:800;letter-spacing:1px;}
.modal-close{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:all 0.2s;}
.modal-close:hover{color:var(--text-primary);background:var(--bg-elevated);}
.modal-body{padding:20px 24px;}
.modal-footer{padding:14px 24px 20px;border-top:1px solid var(--border-dim);display:flex;gap:8px;justify-content:flex-end;}

/* Order Details */
.order-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.order-field{padding:10px 12px;background:var(--bg-inset);border:1px solid var(--border-dim);border-radius:8px;}
.order-field-label{font-size:8px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px;}
.order-field-val{font-family:var(--mono);font-size:16px;font-weight:700;}
.order-field.full{grid-column:1/-1;}

/* Broker Selector */
.broker-select{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.broker-card{padding:12px;background:var(--bg-inset);border:2px solid var(--border-dim);border-radius:10px;text-align:center;cursor:pointer;transition:all 0.2s;}
.broker-card:hover{border-color:var(--border-accent);}
.broker-card.selected{border-color:var(--cyan);background:rgba(34,211,238,0.05);box-shadow:0 0 12px rgba(34,211,238,0.1);}
.broker-name{font-size:13px;font-weight:700;margin-bottom:2px;}
.broker-type{font-size:9px;color:var(--text-dim);letter-spacing:0.5px;}
.broker-level{font-size:8px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;margin-top:6px;padding:2px 8px;border-radius:3px;display:inline-block;}
.broker-level.l1{background:rgba(100,116,139,0.1);color:var(--text-dim);}
.broker-level.l2{background:rgba(245,158,11,0.1);color:var(--amber);}
.broker-level.l3{background:rgba(16,185,129,0.1);color:var(--green);}

/* Order Type Tabs */
.order-tabs{display:flex;gap:4px;margin-bottom:14px;}
.order-tab{font-size:10px;font-weight:600;padding:6px 14px;border-radius:6px;cursor:pointer;color:var(--text-dim);background:transparent;border:1px solid transparent;font-family:var(--font);letter-spacing:0.5px;transition:all 0.2s;}
.order-tab.active{color:var(--cyan);background:var(--cyan-dim);border-color:rgba(34,211,238,0.15);}

/* Order clipboard */

function computeGates(d) {
  const s = d.mps?.score ?? 0;
  const sig = s >= CONFIG.mps.riskOn ? 'RISK-ON' : s >= CONFIG.mps.caution ? 'CAUTION' : 'RISK-OFF';
  const s1 = { pass:true, verdict: sig==='RISK-OFF' ? 'DEFENSIVE' : sig==='CAUTION' ? 'SELECTIVE' : 'AGGRESSIVE' };
  const s2 = { pass: s >= CONFIG.mps.caution, verdict: sig };
  const lc = d.sectors?.leading?.length||0, ic = d.sectors?.improving?.length||0;
  const s3 = { pass: (lc+ic)>0, verdict: lc>0 ? `${lc} LEADING` : ic>0 ? `${ic} IMPROVING` : 'NO HOT SECTORS' };
  const al = d.helix?.alignment ?? 0;
  const s4 = { pass: al>=0.3, verdict: al>=0.7 ? 'FULLY ALIGNED' : al>=0.3 ? 'PARTIALLY ALIGNED' : 'MISALIGNED' };
  const pc = d.topPicks?.length||0;
  const s5 = { pass: pc>0, verdict: pc>0 ? `${pc} CANDIDATES` : 'NO CANDIDATES' };
  const allClear = s2.pass && s3.pass && s4.pass && s5.pass;
  const s6 = { pass:allClear, verdict: allClear ? `${pc} ACTIONABLE` : 'GATES BLOCKED' };
  return { stage1:s1, stage2:s2, stage3:s3, stage4:s4, stage5:s5, stage6:s6, mpsSignal:sig, mpsScore:s };
}

function getMoneyProfile(sig) {
  if (sig==='RISK-ON') return 'EASY MONEY';

  if (!Array.isArray(stocks) || stocks.length === 0) return { picks: [], pipeline: {}, allScanned: [] };

  // Leading/Improving sectors from Stage 3
  const bullSectors = [...(sectors?.leading || []), ...(sectors?.improving || [])].map(s => s.toLowerCase());

  // ── FILTER PIPELINE ──
  const total = stocks.length;

  // Step 1: PERFECT or high sweet (≥ 9)
  const sweet = stocks.filter(s => s.sweet >= 9);

  // Step 2: GREEN or YELLOW signal only
  const signaled = sweet.filter(s => s.signal === 'GREEN' || s.signal === 'YELLOW');

  // Step 3: Monthly quad = Leading
  const mLeading = signaled.filter(s => s.m_quad === 'Leading');

  // Step 4: Weekly quad = Leading or Improving
  const wBull = mLeading.filter(s => s.w_quad === 'Leading' || s.w_quad === 'Improving');

  // Step 5: Daily quad = Leading or Improving
  const dBull = wBull.filter(s => s.d_quad === 'Leading' || s.d_quad === 'Improving');

  // Step 6: Sector alignment (if sector data available, prefer stocks in leading sectors)
  // Don't hard-filter here — instead boost score for aligned sectors
  const scored = dBull.map(s => {
    let boost = 0;
    const secLower = (s.sector || '').toLowerCase();
    // Check if stock's sector matches any leading/improving sector name
    if (bullSectors.some(bs => secLower.includes(bs) || bs.includes(secLower.replace('nifty ', '')))) boost += 10;
    // O'Neil grade boost
    const gradeBoost = s.oneil_grade === 'A+' ? 20 : s.oneil_grade === 'A' ? 15 : s.oneil_grade === 'B' ? 10 : s.oneil_grade === 'C' ? 5 : 0;
    // Composite score + sweet + signal + grade
    const totalScore = (s.composite_score || 0) + (s.sweet || 0) * 3 + (s.signal === 'GREEN' ? 10 : 5) + gradeBoost + boost + (s.eps_strength || 0) * 0.1 + (s.volume_ratio > 1.5 ? 5 : 0);
    return { ...s, _totalScore: totalScore };
  });

  // Sort by total score descending, then by sweet, then by composite
  scored.sort((a, b) => b._totalScore - a._totalScore || b.sweet - a.sweet || b.composite_score - a.composite_score);

  // Take top 20 picks
  const topPicks = scored.slice(0, 20).map((s, i) => {
    // Determine RS tier
    const rank = i + 1;
    const rsTier = rank <= Math.ceil(scored.length * 0.1) ? 'top10' : rank <= Math.ceil(scored.length * 0.25) ? 'top25' : 'top50';

    // Determine pyramid level from existing positions
    // (will be computed live in openOrderBuilder, not hardcoded here)

    return {
      symbol: s.symbol,
      name: s.name || s.symbol,
      sector: s.sector || 'Unknown',
      cmp: s.cmp,
      changePct: s.change_pct,
      entry: s.cmp, // Current price as entry reference
      stop: Math.round(s.cmp * 0.92 * 100) / 100, // Default 8% SL
      target1: Math.round(s.cmp * 1.15 * 100) / 100, // 15% target
      target2: Math.round(s.cmp * 1.25 * 100) / 100, // 25% target
      rr: '2.0:1',
      grade: s.oneil_grade || '-',
      oneilScore: s.composite_score || 0,
      epsStrength: s.eps_strength || 0,
      priceStrength: s.price_strength || 0,
      rsRank: rank,
      rsTier,
      pattern: `Sweet ${s.sweet_label || s.sweet}`,
      catalyst: s.signal === 'GREEN' ? 'MTF Aligned' : 'Partial Align',
      rrmQuad: s.m_quad || 'Unknown',
      signal: s.signal,
      sweet: s.sweet,
      sweetLabel: s.sweet_label || '',
      mQuad: s.m_quad, wQuad: s.w_quad, dQuad: s.d_quad,
      mRsi: s.m_rsi, wRsi: s.w_rsi, dRsi: s.d_rsi,
      marketCap: s.market_cap_cr,
      volumeRatio: s.volume_ratio,
      fundHolding: '', // Will be enriched from scanner_results.json later
      slLadder: { initial: Math.round(s.cmp * 0.92 * 100) / 100 },
      atr: { atr14: Math.round(s.cmp * 0.025 * 100) / 100 }, // Approximate 2.5% ATR
    };
  });

  const pipeline = {
    total,
    sweet: sweet.length,
    signaled: signaled.length,
    mLeading: mLeading.length,
    wBull: wBull.length,
    dBull: dBull.length,
    final: topPicks.length,
    meta: {
      generated: meta.generated_at || '',
      benchmark: meta.benchmark || '',
      version: meta.version || '',
      signals: meta.signal_distribution || {},
      sweetDist: meta.sweet_distribution || {},
      quadrants: meta.quadrant_distribution || {},
    }
  };

  log_info(`Scanner: ${total} → sweet≥9: ${sweet.length} → GREEN/YELLOW: ${signaled.length} → M-Leading: ${mLeading.length} → W-bull: ${wBull.length} → D-bull: ${dBull.length} → Top ${topPicks.length} picks`);

  return { picks: topPicks, pipeline, allScanned: scored };
}
async function loadData() {
  try {
    const [rrmRes, mpsRes, mpsHistRes, scanRes] = await Promise.allSettled([
      fetch(CONFIG.dataRoot + CONFIG.rrmFile).then(r => r.ok ? r.json() : null),
      fetch(CONFIG.dataRoot + CONFIG.mpsFile).then(r => r.ok ? r.json() : null),
      fetch(CONFIG.dataRoot + 'mps_history.json').then(r => r.ok ? r.json() : null),
      fetch(CONFIG.dataRoot + 'rrm_scanner.json').then(r => r.ok ? r.json() : null),
    ]);
    const rrmData = rrmRes.status==='fulfilled' ? rrmRes.value : null;
    const mpsData = mpsRes.status==='fulfilled' ? mpsRes.value : null;
    const mpsHistory = mpsHistRes.status==='fulfilled' ? mpsHistRes.value : null;
    const scanData = scanRes.status==='fulfilled' ? scanRes.value : null;
    if (rrmData) {
      state.sectors = parseRRMSectors(rrmData);
      state.etfs = parseRRMETFs(rrmData);
      state.helix = parseHelixFromRRM(rrmData);
    }
    if (mpsData) { state.mps = parseMPSData(mpsData, mpsHistory); }
    if (scanData) {
      const result = parseScannerData(scanData, state.sectors);
      state.topPicks = result.picks;
      state.pipeline = result.pipeline;
      state.allScanned = result.allScanned;
    }
  } catch(e) { console.log('Live data unavailable, using demo:', e); }
  if (!state.mps) state.mps = DEMO.mps;
  if (!state.sectors) state.sectors = DEMO.sectors;
  if (!state.etfs || state.etfs.length === 0) state.etfs = DEMO.etfs;

  if (!state.topPicks || state.topPicks.length === 0) { state.topPicks = DEMO.topPicks; state.pipeline = DEMO.scannerPipeline; }
  state.assetAllocation = computeAssetAllocation(state.mps);
  state.loading = false;
  render();
}

function parseMPSData(d, externalHistory) {
  const c = d.current || d;
  const score = c.final_score ?? c.mps ?? c.score ?? 0;
  const zone = c.zone || '';
  const pillars = c.pillar_scores || [];
  const modifiers = c.modifiers || [];
  const paradox = c.paradox_alerts || [];

  // Determine trend from history (prefer external mps_history.json)
  const history = externalHistory || d.history || [];
  let trend = 'Stable';
  let weeklyDelta = 0;
  let prevScore = score;
  if (Array.isArray(history) && history.length >= 2) {
    // History is sorted by date, get previous entry
    const sorted = [...history].sort((a,b) => (a.date||'').localeCompare(b.date||''));
    const prev = sorted[sorted.length - 2];
    prevScore = prev?.mps ?? prev?.final_score ?? score;
    weeklyDelta = Math.round(score - prevScore);
    trend = weeklyDelta > 5 ? 'Rising' : weeklyDelta < -5 ? 'Declining' : 'Stable';
  }

  // Map pillars to our component format for Stage 2 display
  const components = {};

  // Key pillars
  pillars.forEach(p => {
    components[p.name] = {
      value: typeof p.raw_value === 'number' ? (p.name === 'Sentiment' ? `VIX ${p.raw_value.toFixed(1)}` : `${p.raw_value.toFixed(1)}${p.name === 'Structural' || p.name === 'Breadth' || p.name === 'Momentum' ? '%' : ''}`) : String(p.raw_value),
      signal: p.raw_score >= 60 ? 'bullish' : p.raw_score >= 30 ? 'neutral' : 'bearish',
      score: p.raw_score,
      weighted: p.weighted_score,
    };
  });

  // Add key raw inputs as components
  const raw = d.raw_inputs || {};
  if (raw.nse) {
    components['Advance / Decline'] = { value: `${raw.nse.advances} / ${raw.nse.declines}`, signal: raw.nse.advances > raw.nse.declines ? 'bullish' : 'bearish' };
    components['New Highs vs Lows'] = { value: `${raw.nse.new_52w_highs} / ${raw.nse.new_52w_lows}`, signal: raw.nse.new_52w_highs > raw.nse.new_52w_lows ? 'bullish' : 'bearish' };
    if (raw.nse.fii_net !== undefined) {
      const fii = raw.nse.fii_net;
      components['FII Flow (today)'] = { value: `₹${(fii/1).toFixed(0)} Cr`, signal: fii > 0 ? 'bullish' : 'bearish' };
    }
  }
  if (raw.macro) {
    if (raw.macro.brent_crude) components['Brent Crude'] = { value: `$${raw.macro.brent_crude.toFixed(1)}`, signal: raw.macro.brent_crude > 85 ? 'bearish' : 'bullish' };
    if (raw.macro.usd_inr) components['USD/INR'] = { value: `₹${raw.macro.usd_inr.toFixed(2)}`, signal: raw.macro.usd_inr > 87 ? 'bearish' : 'neutral' };
  }

  // State info
  const st = d.state || {};
  const fiiConsecSellDays = st.fii_consecutive_sell_days || 0;
  const fii5dNet = st.fii_5day_net || 0;
  if (fiiConsecSellDays > 0) {
    components['FII Sell Streak'] = { value: `${fiiConsecSellDays} days (₹${Math.round(fii5dNet)} Cr 5d)`, signal: fiiConsecSellDays >= 5 ? 'bearish' : 'neutral' };
  }

  // Active modifiers count
  const activeModifiers = modifiers.filter(m => m.triggered);
  const totalPenalty = c.total_modifier || 0;

  log_info(`MPS parsed: score=${score}, zone=${zone}, pillars=${pillars.length}, modifiers=${activeModifiers.length}/${modifiers.length}, penalty=${totalPenalty}`);

  return {
    score: Math.max(0, Math.round(score)),
    trend,
    signal: zone,
    weeklyDelta,
    prevWeekScore: prevScore,
    zone,
    zoneEmoji: c.zone_emoji || '',
    zoneAction: c.zone_action || '',
    riskPerTrade: c.risk_per_trade || '',
    stateMessage: c.state_message || '',
    baseScore: c.base_score || 0,
    totalModifier: totalPenalty,
    atrRegime: c.atr_regime || '',
    burstLabel: c.burst_label || '',
    burstRatio: c.burst_ratio || 0,
    macroSummary: c.macro_summary || '',
    paradoxAlerts: paradox,
    components,
    pillars,
    modifiers,
    activeModifierCount: activeModifiers.length,
    date: c.date || '',
  };
}

function parseRRMSectors(d) {
  const s = { leading:[], improving:[], weakening:[], lagging:[] };
  // Actual structure: benchmarks_data.^NSEI.daily.sectors[]
  const benchmarks = d.benchmarks_data || d;
  const nsei = benchmarks['^NSEI'] || benchmarks['NSEI'] || Object.values(benchmarks)[0] || {};
  const daily = nsei.daily || {};
  const sectors = daily.sectors || [];

  sectors.forEach(sec => {
    const name = sec.name || sec.symbol || '?';
    const q = (sec.quadrant || '').toLowerCase();
    // Clean name: remove "Nifty " prefix for cleaner display
    const cleanName = name.replace(/^Nifty\s*/i, '');
    if (q === 'leading') s.leading.push(cleanName);
    else if (q === 'improving') s.improving.push(cleanName);
    else if (q === 'weakening') s.weakening.push(cleanName);
    else if (q === 'lagging') s.lagging.push(cleanName);
  });

  return s;
}

function parseRRMETFs(d) {
  const etfs = [];
  const benchmarks = d.benchmarks_data || d;
  const nsei = benchmarks['^NSEI'] || benchmarks['NSEI'] || Object.values(benchmarks)[0] || {};
  const daily = nsei.daily || {};

  // Parse ETFs from the etfs[] array
  const etfData = daily.etfs || [];
  etfData.forEach(e => {
    const q = (e.quadrant || '').toLowerCase();
    const sym = (e.symbol || '').replace('.NS', '');
    etfs.push({
      symbol: sym,
      name: e.name || sym,
      group: 'ETF',
      quadrant: q === 'leading' ? 'leading' : q === 'improving' ? 'improving' : q === 'weakening' ? 'weakening' : 'lagging',
      rsRatio: e.current?.rs_ratio,
      rsMomentum: e.current?.rs_momentum,
      rsi: e.current?.rsi,
    });
  });

  // Also parse thematic_indices[] — they have a "group" field (Sectoral/Thematic)
  const thematic = daily.thematic_indices || [];
  thematic.forEach(t => {
    const q = (t.quadrant || '').toLowerCase();
    const sym = (t.symbol || '').replace('.NS', '').replace('NIFTY_', '');
    etfs.push({
      symbol: sym,
      name: t.name || sym,
      group: t.group || 'Thematic',
      quadrant: q === 'leading' ? 'leading' : q === 'improving' ? 'improving' : q === 'weakening' ? 'weakening' : 'lagging',
      rsRatio: t.current?.rs_ratio,
      rsMomentum: t.current?.rs_momentum,
      rsi: t.current?.rsi,
    });
  });

  if (etfs.length === 0) return DEMO.etfs;
  log_info(`Parsed ${etfs.length} ETFs + thematic from live RRM data`);
  return etfs;
}

function parseHelixFromRRM(d) {
  // Parse HELIX alignment from multi-timeframe data
  const benchmarks = d.benchmarks_data || d;
  const nsei = benchmarks['^NSEI'] || benchmarks['NSEI'] || Object.values(benchmarks)[0] || {};

  const timeframes = ['daily', 'weekly', 'monthly'];
  const tfData = {};
  let totalAligned = 0;
  let totalSectors = 0;

  timeframes.forEach(tf => {
    const sectors = nsei[tf]?.sectors || [];
    totalSectors = Math.max(totalSectors, sectors.length);
    const leading = sectors.filter(s => s.quadrant === 'Leading').length;
    const improving = sectors.filter(s => s.quadrant === 'Improving').length;
    const bullish = leading + improving;
    const bearish = sectors.length - bullish;

    if (tf === 'daily') {
      tfData.daily = {
        direction: bullish > bearish ? 'up' : bullish === bearish ? 'flat' : 'down',
        signal: bullish > bearish * 1.5 ? 'BULLISH' : bullish > bearish ? 'NEUTRAL' : 'WEAKENING',
        detail: `${leading} Leading + ${improving} Improving of ${sectors.length} sectors`
      };
    } else if (tf === 'weekly') {
      tfData.weekly = {
        direction: bullish > bearish ? 'up' : bullish === bearish ? 'flat' : 'down',
        signal: bullish > bearish * 1.5 ? 'STRONG' : bullish > bearish ? 'NEUTRAL' : 'BEARISH',
        detail: `${leading} Leading + ${improving} Improving of ${sectors.length} sectors`
      };
      totalAligned = bullish; // Use weekly as primary alignment measure
    } else {
      tfData.monthly = {
        direction: bullish > bearish ? 'up' : bullish === bearish ? 'flat' : 'down',
        signal: bullish > bearish * 1.5 ? 'BULLISH' : bullish > bearish ? 'NEUTRAL' : 'BEARISH',
        detail: `${leading} Leading + ${improving} Improving of ${sectors.length} sectors`
      };
    }
  });

  // If only daily available, use it for all
  if (!tfData.weekly) tfData.weekly = tfData.daily || DEMO.helix.weekly;
  if (!tfData.monthly) tfData.monthly = tfData.daily || DEMO.helix.monthly;
  if (!tfData.daily) return DEMO.helix;

  const alignment = totalSectors > 0 ? totalAligned / totalSectors : 0;

  return {
    daily: tfData.daily,
    weekly: tfData.weekly,
    monthly: tfData.monthly,
    alignment,
    alignedSectors: totalAligned,
    totalSectors,
  };
}

function log_info(msg) { console.log('[EdgePilot]', msg); }

function computeAssetAllocation(mps) {
  const s = mps.score;
  if (s >= 70) return { equity:{alloc:80,signal:'overweight',recommended:true}, cash:{alloc:10,signal:'underweight',recommended:false}, gold:{alloc:5,signal:'underweight',recommended:false}, intl:{alloc:5,signal:'neutral',recommended:false} };
  if (s >= 40) return { equity:{alloc:50,signal:'neutral',recommended:false}, cash:{alloc:25,signal:'neutral',recommended:false}, gold:{alloc:15,signal:'overweight',recommended:true}, intl:{alloc:10,signal:'neutral',recommended:false} };
  return { equity:{alloc:25,signal:'underweight',recommended:false}, cash:{alloc:40,signal:'overweight',recommended:true}, gold:{alloc:20,signal:'overweight',recommended:true}, intl:{alloc:15,signal:'neutral',recommended:false} };
}

// ═══ COMPONENT RENDERERS ═══
function renderPipeline(g) {
  const stages = [
    {n:1,l:'Asset Alloc',s:'pass'},{n:2,l:'Equity',s:g.stage2.pass?'pass':'fail'},
    {n:3,l:'Sector',s:!g.stage2.pass?'locked':g.stage3.pass?'pass':'fail'},
    {n:4,l:'HELIX',s:!g.stage3.pass?'locked':g.stage4.pass?'pass':'fail'},
    {n:5,l:'Edge Intel',s:!g.stage4.pass?'locked':g.stage5.pass?'pass':'fail'},
    {n:6,l:'Execute',s:!g.stage5.pass?'locked':g.stage6.pass?'pass':'fail'}
  ];
  let h='';
  stages.forEach((st,i)=>{
    h+=`<div class="pipe-stage"><div class="pipe-num ${st.s}">${st.s==='pass'?'✓':st.s==='fail'?'✗':st.n}</div><div class="pipe-label ${st.s}">${st.l}</div></div>`;
    if(i<stages.length-1){const cs=stages[i+1].s==='locked'?'':stages[i].s;h+=`<div class="pipe-connector"><div class="line ${cs}"></div></div>`;}
  });
  return h;
}

function renderAssets(a) {
  const items=[{name:'EQUITY (NSE)',icon:'📈',...a.equity},{name:'CASH / LIQUID',icon:'🏦',...a.cash},{name:'GOLD / COMMODITIES',icon:'🥇',...a.gold},{name:'INTERNATIONAL',icon:'🌐',...a.intl}];
  return items.map(i=>`<div class="asset-card ${i.recommended?'recommended':''}"><div class="asset-name">${i.icon} ${i.name}</div><div class="asset-alloc">${i.alloc}<span>%</span></div><div class="asset-signal ${i.signal}">${i.signal.toUpperCase()}</div></div>`).join('');
}

function allocReason(sig, mps) {
  if(sig==='RISK-OFF') return `<strong>RISK-OFF regime detected.</strong> MPS at ${mps.score}/100 signals broad market weakness. Minervini: "Cash is a position." Reduce equity to 25%, overweight cash & gold. Wait for MPS recovery above 40.`;
  if(sig==='CAUTION') return `<strong>CAUTION — selective exposure.</strong> MPS at ${mps.score}/100 shows mixed breadth. O'Neil: "Only buy the very best setups." Maintain 50% equity in leading sectors only. Keep 25% cash ready.`;
  return `<strong>RISK-ON — full deployment.</strong> MPS at ${mps.score}/100 confirms strong breadth. Deploy 80% equity, focus on leaders in leading sectors. Full position sizing.`;
}

function renderRegime(mps, g) {
  const circ=2*Math.PI*34, fill=mps.score/100, off=circ*(1-fill);
  const gc=mps.score>=70?'var(--green)':mps.score>=40?'var(--amber)':'var(--red)';
  const comps=Object.entries(mps.components||{});
  const bu=comps.filter(([,v])=>v.signal==='bullish').length, be=comps.filter(([,v])=>v.signal==='bearish').length, ne=comps.filter(([,v])=>v.signal==='neutral').length;
  return `
    <div class="regime-grid">
      <div class="mps-gauge">
        <div class="mps-gauge-visual">
          <svg viewBox="0 0 80 80"><circle class="track" cx="40" cy="40" r="34"/><circle class="fill" cx="40" cy="40" r="34" stroke="${gc}" stroke-dasharray="${circ}" stroke-dashoffset="${off}"/></svg>
          <div class="mps-gauge-val" style="color:${gc}">${mps.score}</div>
        </div>
        <div class="mps-gauge-info">
          <div class="mps-gauge-title">Market Pulse Score</div>
          <div class="mps-gauge-reading" style="color:${gc}">${g.mpsSignal} — ${mps.trend||'Stable'}</div>
          <div class="mps-gauge-detail">${bu} bullish · ${ne} neutral · ${be} bearish</div>
        </div>
      </div>
      <div style="display:grid;gap:8px">${comps.slice(0,4).map(([n,d])=>`<div class="regime-metric" style="padding:10px 14px"><div class="regime-metric-left"><div class="regime-metric-name" style="margin-bottom:2px;font-size:9px">${n}</div><div class="regime-metric-val" style="font-size:14px">${d.value}</div></div><span class="regime-signal ${d.signal}">${d.signal.toUpperCase()}</span></div>`).join('')}</div>
    </div>
    <div class="regime-grid" style="margin-bottom:14px">${comps.slice(4).map(([n,d])=>`<div class="regime-metric"><div class="regime-metric-left"><div class="regime-metric-name">${n}</div><div class="regime-metric-val">${d.value}</div></div><span class="regime-signal ${d.signal}">${d.signal.toUpperCase()}</span></div>`).join('')}</div>
    <div class="regime-verdict-bar ${g.stage2.pass?(g.mpsSignal==='RISK-ON'?'risk-on':'caution'):'risk-off'}">
      <span style="font-size:16px">${g.stage2.pass?'✅':'🚫'}</span>
      <div class="regime-verdict-text">${g.stage2.pass?`<strong>GATE 2 PASSED</strong> — Market regime allows ${g.mpsSignal==='RISK-ON'?'aggressive':'selective'} equity exposure.`:`<strong>GATE 2 BLOCKED</strong> — MPS ${mps.score}/100 below CAUTION threshold (40). No new entries. Wait for regime improvement.`}</div>
    </div>
    ${renderRegimeSpeed(mps)}`;
}

function renderRegimeSpeed(mps) {
  const delta = mps.weeklyDelta || 0;
  const prev = mps.prevWeekScore || mps.score;
  const speed = delta >= CONFIG.regimeSpeed.turbo ? 'TURBO' :
                delta >= CONFIG.regimeSpeed.accelerating ? 'ACCELERATING' :
                delta <= CONFIG.regimeSpeed.decelerating ? 'DECELERATING' : 'STEADY';
  const speedColor = speed === 'TURBO' ? 'var(--green-bright)' :
                     speed === 'ACCELERATING' ? 'var(--green)' :
                     speed === 'DECELERATING' ? 'var(--red)' : 'var(--text-dim)';
  const deltaClass = delta > 0 ? 'up' : delta < 0 ? 'down' : 'flat';
  const fillPct = Math.min(100, Math.max(5, Math.abs(delta) * 5));

  let speedAdvice = '';
  if (speed === 'TURBO') speedAdvice = 'New bull leg detected! Enter aggressively at pivots — this is where 30-50% of annual returns are captured.';
  else if (speed === 'ACCELERATING') speedAdvice = 'Regime improving fast. Be ready for Follow-Through Day confirmation — start building positions.';
  else if (speed === 'DECELERATING') speedAdvice = 'Regime deteriorating. Tighten all stops to breakeven. No new entries until weekly delta turns positive.';
  else speedAdvice = 'Regime stable. Continue current exposure level per money profile.';

  return `
    <div class="regime-speed">
      <div class="regime-speed-label">WEEKLY SPEED</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span class="regime-delta ${deltaClass}">${delta > 0 ? '▲' : delta < 0 ? '▼' : '—'} ${delta > 0 ? '+' : ''}${delta} pts/wk</span>
          <span style="font-family:var(--mono);font-size:10px;color:${speedColor};font-weight:700">${speed}</span>
          <span style="font-size:9px;color:var(--text-dim)">(prev: ${prev})</span>
        </div>
        <div class="regime-speed-bar">
          <div class="regime-speed-fill" style="width:${fillPct}%;background:${speedColor}"></div>
        </div>
        <div style="font-size:9.5px;color:var(--text-dim);margin-top:4px;line-height:1.5">💡 ${speedAdvice}</div>
      </div>
    </div>`;
}

function renderSectors(sec) {
  const qs=[{k:'leading',t:'LEADING',i:'▲',c:'leading'},{k:'improving',t:'IMPROVING',i:'↗',c:'improving'},{k:'weakening',t:'WEAKENING',i:'↘',c:'weakening'},{k:'lagging',t:'LAGGING',i:'▼',c:'lagging'}];

  // ETF stats by quadrant
  const etfs = state.etfs || [];
  const etfByQuad = { leading:[], improving:[], weakening:[], lagging:[] };
  etfs.forEach(e => { if (etfByQuad[e.quadrant]) etfByQuad[e.quadrant].push(e); });
  const etfLeading = etfByQuad.leading.length;
  const etfImproving = etfByQuad.improving.length;
  const totalSectors = sec.leading.length + sec.improving.length + sec.weakening.length + sec.lagging.length;

  // ETF groups for sub-filter
  const groups = [...new Set(etfs.map(e => e.group))];
  const activeGrp = state.activeSubgroup || 'all';
  const filteredETFs = activeGrp === 'all' ? etfs : etfs.filter(e => e.group === activeGrp);

  return `
    <!-- Sub-group filter pills -->
    <div class="subgroup-filter">
      <button class="subgroup-pill ${state.activeSubgroup==='sectors'?'active':''}" onclick="setSubgroup('sectors')">Sectors<span class="pill-count">(${totalSectors})</span></button>
      <button class="subgroup-pill ${state.activeSubgroup==='all'?'active':''}" onclick="setSubgroup('all')">All ETFs<span class="pill-count">(${etfs.length})</span></button>
      ${groups.map(g => `<button class="subgroup-pill ${state.activeSubgroup===g?'active':''}" onclick="setSubgroup('${g}')">${g}<span class="pill-count">(${etfs.filter(e=>e.group===g).length})</span></button>`).join('')}
    </div>

    ${state.activeSubgroup === 'sectors' || state.activeSubgroup === '' ? `
      <!-- Sector Quadrants -->
      <div class="sector-quadrants">${qs.map(q=>{const it=sec[q.k]||[];return`<div class="quadrant"><div class="quadrant-header"><div class="quadrant-title ${q.c}">${q.i} ${q.t} (${it.length})</div></div><div class="quadrant-items">${it.length>0?it.map(s=>`<span class="sector-pill ${q.c}">${s}</span>`).join(''):`<span class="sector-empty">None</span>`}</div></div>`;}).join('')}</div>
    ` : `
      <!-- ETF Quadrants -->
      <div class="sector-quadrants">
        ${qs.map(q => {
          const items = filteredETFs.filter(e => e.quadrant === q.k);
          return `<div class="quadrant">
            <div class="quadrant-header"><div class="quadrant-title ${q.c}">${q.i} ${q.t} (${items.length})</div></div>
            <div class="quadrant-items">
              ${items.length > 0 ? items.map(e => `<span class="sector-pill ${q.c}" title="${e.name}">${e.symbol}</span>`).join('') : `<span class="sector-empty">None</span>`}
            </div>
          </div>`;
        }).join('')}
      </div>

      <!-- ETF Detail Grid -->
      <div class="etf-grid">
        ${filteredETFs.map(e => `
          <div class="etf-item">
            <span class="etf-name" title="${e.name}">${e.symbol} <span style="color:var(--text-muted);font-weight:400;font-size:9px">${e.group}</span></span>
            <span class="etf-quad ${e.quadrant}">${e.quadrant.toUpperCase()}</span>
          </div>
        `).join('')}
      </div>
    `}

    <div class="alloc-reasoning"><span class="alloc-reasoning-icon">🎯</span><div class="alloc-reasoning-text"><strong>Focus:</strong> ${sec.leading.length>0?`Concentrate on <strong>${sec.leading.join(', ')}</strong> (Leading). Minervini: "Fish where the fish are." ETF flow: ${etfLeading} ETFs in Leading, ${etfImproving} Improving — confirms sector strength.`:sec.improving.length>0?`<strong>${sec.improving.join(', ')}</strong> are Improving — early rotation candidates. ${etfImproving} ETFs also improving. Smaller size until confirmed.`:`No sectors Leading or Improving. Only ${etfLeading} ETFs in Leading quadrant (likely defensive/gold). Broad weakness confirms RISK-OFF.`}</div></div>`;
}

function renderHelix(h) {
  const tfs=[{name:'DAILY',...h.daily},{name:'WEEKLY',...h.weekly},{name:'MONTHLY',...h.monthly}];
  const ap=Math.round(h.alignment*100);
  const ac=ap>=70?'var(--green)':ap>=30?'var(--amber)':'var(--red)';
  const gb=Math.round(h.alignedSectors||0), ab=Math.round((h.totalSectors-gb)*0.3), rb=16-gb-ab;
  return `
    <div class="helix-grid">${tfs.map(t=>`<div class="helix-tf"><div class="helix-tf-name">${t.name}</div><div class="helix-tf-signal"><span class="helix-arrow ${t.direction==='up'?'up':t.direction==='down'?'down':'flat'}">${t.direction==='up'?'▲':t.direction==='down'?'▼':'◆'}</span><span class="helix-tf-label" style="color:${t.direction==='up'?'var(--green)':t.direction==='down'?'var(--red)':'var(--amber)'}">${t.signal}</span></div><div class="helix-tf-detail">${t.detail}</div></div>`).join('')}</div>
    <div class="helix-alignment">
      <div class="helix-alignment-label">MTF ALIGNMENT</div>
      <div class="helix-bars">${Array(gb).fill('<div class="helix-bar green"></div>').join('')}${Array(ab).fill('<div class="helix-bar amber"></div>').join('')}${Array(Math.max(0,rb)).fill('<div class="helix-bar red"></div>').join('')}</div>
      <div class="helix-score" style="color:${ac}">${ap}%</div>
    </div>
    <div class="alloc-reasoning" style="margin-top:14px"><span class="alloc-reasoning-icon">🔄</span><div class="alloc-reasoning-text"><strong>HELIX:</strong> ${ap>=70?`Strong MTF alignment — ${h.alignedSectors}/${h.totalSectors} sectors aligned. High-conviction environment.`:ap>=30?`Partial alignment — ${h.alignedSectors}/${h.totalSectors} aligned. Trade only sectors with all 3 TFs confirming.`:`Misaligned — only ${h.alignedSectors}/${h.totalSectors} aligned. Avoid new entries until weekly confirms daily.`}</div></div>`;
}

function renderEdge(picks) {
  if(!picks||!picks.length) return `<div class="empty-state"><div class="empty-icon">◇</div><div class="empty-title">No stocks survive Edge Intel</div><div class="empty-subtitle">Either upstream gates blocked or no stocks pass the HELIX filter pipeline.</div></div>`;

  // Pipeline stats banner

  const pipelineBanner = p.total ? `
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;font-size:10px;font-family:var(--mono)">
      <span style="padding:3px 8px;background:rgba(34,211,238,0.08);border-radius:4px;color:var(--cyan)">${p.total} Universe</span>
      <span style="color:var(--text-dim)">→</span>
      <span style="padding:3px 8px;background:rgba(251,191,36,0.08);border-radius:4px;color:var(--gold)">🌟 ${p.sweet} Sweet≥9</span>
      <span style="color:var(--text-dim)">→</span>
      <span style="padding:3px 8px;background:rgba(16,185,129,0.08);border-radius:4px;color:var(--green)">${p.signaled} GREEN/YELLOW</span>
      <span style="color:var(--text-dim)">→</span>
      <span style="padding:3px 8px;background:rgba(34,211,238,0.08);border-radius:4px;color:var(--cyan)">M-Lead: ${p.mLeading}</span>
      <span style="color:var(--text-dim)">→</span>
      <span style="padding:3px 8px;background:rgba(16,185,129,0.08);border-radius:4px;color:var(--green)">W-Bull: ${p.wBull}</span>
      <span style="color:var(--text-dim)">→</span>
      <span style="padding:3px 8px;background:rgba(16,185,129,0.12);border-radius:4px;color:var(--green-bright);font-weight:700">${p.dBull} D-Bull → TOP ${p.final}</span>

    <div style="overflow-x:auto">

      const sweetColor = pk.sweet >= 10 ? 'var(--green-bright)' : pk.sweet >= 9 ? 'var(--green)' : 'var(--amber)';
      const qColor = q => q === 'Leading' ? 'var(--green)' : q === 'Improving' ? 'var(--cyan)' : q === 'Weakening' ? 'var(--amber)' : 'var(--red)';

}

function switchEdgeTab(tab, btn) {
  // Toggle active tab styling
  btn.parentElement.querySelectorAll('.edge-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  const container = document.getElementById('edge-tab-content');
  if (!container) return;
  const picks = state.topPicks || [];

  if (tab === 'picks') {
    // Re-render full page (simplest approach)
    render();
    return;
  }

  if (tab === 'catalysts') {
    // Group picks by catalyst/signal type
    const green = picks.filter(p => p.signal === 'GREEN');
    const yellow = picks.filter(p => p.signal === 'YELLOW');
    container.innerHTML = `
      <div style="margin-bottom:16px">
        <div style="font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--green);margin-bottom:8px">🟢 GREEN — ALL TIMEFRAMES ALIGNED (${green.length})</div>
        ${green.length ? `<div style="display:flex;flex-wrap:wrap;gap:6px">${green.map(p => `
          <div style="padding:6px 10px;background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.12);border-radius:6px;font-size:11px">
            <span style="font-weight:700;color:var(--green)">${p.symbol}</span>
            <span style="color:var(--text-dim);font-size:9px;margin-left:4px">${p.sector}</span>

function renderATRMeter(p) {
  const atr = p.atr || { atr14:0, todayRange:0, xATR:0, avgVol:'—', todayVol:'—' };
  const x = atr.xATR || 0;
  const atr14 = atr.atr14 || 1;
  const atrRules = p.sellRules?.filter(r => r.isATR) || [];

  // Needle position: map 0-8x ATR to 0-100%
  const needlePos = Math.min(100, Math.max(2, (x / 8) * 100));

  // Zone widths: 0-3x=NORMAL, 3-5x=ALERT, 5-7x=CLIMAX, 7+=EXHAUSTION
  const zoneNormal = (3/8*100);
  const zoneAlert = (2/8*100);
  const zoneClimax = (2/8*100);
  const zoneExhaust = (1/8*100);

  // Current status
  const status = x >= 7 ? 'EXHAUSTION' : x >= 5 ? 'CLIMAX' : x >= 3 ? 'ELEVATED' : 'NORMAL';
  const statusColor = x >= 7 ? 'var(--purple)' : x >= 5 ? 'var(--red)' : x >= 3 ? 'var(--amber)' : 'var(--green)';

  // Volume confirmation
  const volRatio = atr.todayVol && atr.avgVol ? 
    (parseFloat(atr.todayVol) / parseFloat(atr.avgVol)).toFixed(1) : '—';

  return `
    <div class="atr-meter">
      <div class="atr-meter-title">
        <span>📈 SELL INTO STRENGTH — ATR(14) EXPANSION</span>
        <span style="font-family:var(--mono);color:${statusColor};font-size:10px">${status}</span>
      </div>

      <!-- ATR Gauge Bar -->
      <div class="atr-bar-wrap">
        <div class="atr-zone normal" style="left:0;width:${zoneNormal}%">NORMAL 0-3×</div>
        <div class="atr-zone alert" style="left:${zoneNormal}%;width:${zoneAlert}%">ALERT 3-5×</div>
        <div class="atr-zone climax" style="left:${zoneNormal+zoneAlert}%;width:${zoneClimax}%">CLIMAX 5-7×</div>
        <div class="atr-zone exhaust" style="left:${zoneNormal+zoneAlert+zoneClimax}%;width:${zoneExhaust}%">7×+</div>
        <div class="atr-needle" style="left:${needlePos}%"></div>
      </div>

      <!-- Current ATR Reading -->
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <div class="atr-current" style="flex:1">
          <span class="atr-current-label">ATR(14)</span>
          <span class="atr-current-val" style="color:var(--text-primary)">₹${atr14}</span>
        </div>
        <div class="atr-current" style="flex:1">
          <span class="atr-current-label">Today Range</span>
          <span class="atr-current-val" style="color:${statusColor}">₹${atr.todayRange}</span>
        </div>
        <div class="atr-current" style="flex:1">
          <span class="atr-current-label">Current ×ATR</span>
          <span class="atr-current-val" style="color:${statusColor};font-size:15px">${x.toFixed(1)}×</span>
        </div>
        <div class="atr-current" style="flex:1">
          <span class="atr-current-label">Vol Ratio</span>
          <span class="atr-current-val" style="color:${volRatio > 1.5 ? 'var(--amber)' : 'var(--text-dim)'}">${volRatio}×</span>
        </div>
      </div>

      <!-- ATR Sell Levels -->
      <div class="atr-levels">
        ${[
          { x:5, color:'var(--amber)', action:'SELL 25%', detail:'Tighten TSL to low of day' },
          { x:6, color:'var(--red)', action:'SELL 50%', detail:'TSL to intraday VWAP' },
          { x:7, color:'var(--purple)', action:'SELL 75-100%', detail:'Blow-off top signal' },
          { x:0, color:'var(--red-bright)', action:'REVERSAL = EXIT', detail:'HV reversal after 5×+', label:'REV' },
        ].map(lv => {
          const triggered = lv.x > 0 ? x >= lv.x : false;
          const priceAtX = lv.x > 0 ? p.entry + (atr14 * lv.x) : null;
          return `<div class="atr-level ${triggered ? 'triggered' : ''}">
            <div class="atr-level-x" style="color:${lv.color}">${lv.label || lv.x + '×'}</div>
            <div class="atr-level-action" style="color:${lv.color}">${lv.action}</div>
            ${priceAtX ? `<div class="atr-level-detail">₹${Math.round(priceAtX).toLocaleString()}</div>` : ''}
            <div class="atr-level-detail">${lv.detail}</div>
          </div>`;
        }).join('')}
      </div>

      <div style="font-size:9px;color:var(--text-dim);line-height:1.6;padding:6px 0 0;border-top:1px solid var(--border-dim)">
        💡 <strong style="color:var(--text-secondary)">Minervini Rule:</strong> When a stock moves 5-7× its ATR in a single day on heavy volume, it's selling into strength territory. The larger the expansion + volume spike, the more aggressive the selling. A high-volume reversal candle after a 5×+ day = immediate full exit.
      </div>
    </div>`;
}
