function useSectorData() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function load() {
      try {
        const [heatRes, analysisRes] = await Promise.allSettled([
          fetch("data/sector_heatmap.json"),
          fetch("data/sector_analysis.json"),
        ]);
        let heatmap = null, analysis = null;
        if (heatRes.status === "fulfilled" && heatRes.value.ok) heatmap = await heatRes.value.json();
        if (analysisRes.status === "fulfilled" && analysisRes.value.ok) analysis = await analysisRes.value.json();

        if (heatmap || analysis) {
          setData({ heatmap: heatmap || analysis?.sector_data, ai: analysis?.ai_insights });
        } else {
          setData(MOCK_SECTOR_DATA);
        }
      } catch (e) {
        console.warn("Using mock sector data:", e);
        setData(MOCK_SECTOR_DATA);
      }
      setLoading(false);
    }
    load();
  }, []);
  return { data, loading };
}

// ═══════════════════════════════════════════════════════════
// TREEMAP COMPONENT (Canvas-drawn)
// ═══════════════════════════════════════════════════════════

const Treemap = ({data, title, timeframe}) => {
  const canvasRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !data?.length) return;
    const canvas = canvasRef.current;
    const dpr = window.devicePixelRatio || 1;
    const cssW = canvas.parentElement.offsetWidth;
    const cssH = 280;
    canvas.width = cssW * dpr;
    canvas.height = cssH * dpr;
    canvas.style.width = cssW + 'px';
    canvas.style.height = cssH + 'px';
    const ctx = canvas.getContext("2d");
    ctx.scale(dpr, dpr);
    const W = cssW;
    const H = cssH;
    const titleH = 24; // Reserve space for title bar

    // Sort by value (size) descending
    const sorted = [...data].sort((a,b) => b.value - a.value);
    const totalValue = sorted.reduce((sum, d) => sum + d.value, 0);

    // Simple squarified treemap layout
    const rects = [];
    let x = 0, y = titleH, rowH = H - titleH, remainW = W;
    let remaining = [...sorted];

    function layoutRow(row, x, y, w, h) {
      const rowTotal = row.reduce((s, d) => s + d.value, 0);
      let cx = x;
      for (const item of row) {
        const itemW = (item.value / rowTotal) * w;
        rects.push({...item, x: cx, y, w: itemW, h});
        cx += itemW;
      }
    }

    // Simple row-based layout
    let rowItems = [];
    let rowValue = 0;
    const rowLimit = totalValue * 0.35;

    for (const item of remaining) {
      rowItems.push(item);
      rowValue += item.value;
      if (rowValue >= rowLimit || item === remaining[remaining.length - 1]) {
        const rH = (rowValue / totalValue) * (H - titleH);
        layoutRow(rowItems, 0, y, W, rH);
        y += rH;
        rowItems = [];
        rowValue = 0;
      }
    }

    // Draw
    ctx.clearRect(0, 0, W, H);

    for (const r of rects) {
      // Color based on RS rating
      const rs = r.rs || 50;
      let bgColor;
      if (rs >= 75) bgColor = "rgba(0,180,80,0.7)";       // Deep green
      else if (rs >= 60) bgColor = "rgba(100,200,80,0.6)"; // Light green
      else if (rs >= 45) bgColor = "rgba(200,200,100,0.5)";// Yellow
      else if (rs >= 30) bgColor = "rgba(220,150,80,0.5)"; // Orange
      else bgColor = "rgba(200,80,80,0.6)";                // Red

      ctx.fillStyle = bgColor;
      ctx.fillRect(r.x + 1, r.y + 1, r.w - 2, r.h - 2);

      // Border
      ctx.strokeStyle = "rgba(0,0,0,0.3)";
      ctx.lineWidth = 1;
      ctx.strokeRect(r.x + 1, r.y + 1, r.w - 2, r.h - 2);

      // Text
      if (r.w > 50 && r.h > 25) {
        ctx.fillStyle = "#fff";
        ctx.font = `bold ${Math.min(13, r.w / 8)}px 'Outfit'`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        const name = r.name.length > r.w / 8 ? r.name.substring(0, Math.floor(r.w / 8)) + "..." : r.name;
        ctx.fillText(name, r.x + r.w / 2, r.y + r.h / 2 - 6);

        ctx.font = `600 ${Math.min(11, r.w / 10)}px 'JetBrains Mono'`;
        const retStr = `${r.return > 0 ? "+" : ""}${r.return.toFixed(1)}%`;
        ctx.fillText(retStr, r.x + r.w / 2, r.y + r.h / 2 + 10);
      }
    }

    // Title bar (drawn in reserved space at top)
    ctx.fillStyle = "rgba(12,16,24,0.95)";
    ctx.fillRect(0, 0, W, titleH);
    ctx.fillStyle = "#889";
    ctx.font = "11px 'JetBrains Mono'";
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    ctx.fillText(`Sectoral Heatmap: ${timeframe} RS Rating`, 8, titleH / 2);

  }, [data, title]);

  return <canvas ref={canvasRef} style={{width:"100%",borderRadius:6,cursor:"pointer"}}/>;
};

          </div>
          <div style={{padding:12}}>
            <Treemap data={treemaps[treemapTF] || []} title={`${treemapTF} RS`} timeframe={treemapTF === "3m" ? "3 Months" : treemapTF === "1m" ? "Monthly" : "Weekly"}/>
          </div>
          {/* Color legend */}
          <div style={{padding:"0 16px 12px",display:"flex",gap:12,alignItems:"center",fontSize:9,fontFamily:"var(--font-mono)"}}>
            {[["rgba(0,180,80,0.7)","RS 75+"],["rgba(100,200,80,0.6)","RS 60-75"],["rgba(200,200,100,0.5)","RS 45-60"],["rgba(220,150,80,0.5)","RS 30-45"],["rgba(200,80,80,0.6)","RS <30"]].map(([c,l],i) => (
              <div key={i} style={{display:"flex",alignItems:"center",gap:4}}>
                <div style={{width:12,height:12,borderRadius:2,background:c}}/><span style={{color:"var(--text-muted)"}}>{l}</span>
              </div>
            ))}
          </div>
        </div>

        {/* RRM Matrix + Rotation Signals */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
          <div className="card fade-in">
            <div style={{padding:"10px 16px",borderBottom:"1px solid var(--border-dim)",fontSize:11,fontWeight:700,
              fontFamily:"var(--font-mono)",color:"var(--text-muted)",letterSpacing:1}}>📊 RRM SECTOR MATRIX</div>
            <div style={{padding:12}}>
              <RRMMatrix matrix={h.matrix || {}}/>
            </div>
          </div>

          <div className="card fade-in">
            <div style={{padding:"10px 16px",borderBottom:"1px solid var(--border-dim)",fontSize:11,fontWeight:700,
              fontFamily:"var(--font-mono)",color:"var(--text-muted)",letterSpacing:1}}>🔄 ROTATION SIGNALS</div>
            <div style={{padding:12}}>
              {(h.rotation_signals || []).map((sig,i) => (
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",
                  borderBottom:"1px solid var(--border-dim)"}}>
                  <span style={{fontSize:16}}>{sig.signal === "ROTATING IN" ? "🟢" : "🔴"}</span>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:12}}>{sig.sector}
                      <span style={{fontSize:10,fontWeight:600,marginLeft:8,
                        color:sig.signal==="ROTATING IN"?"#00ff88":"#ff4455"}}>{sig.signal}</span>
                    </div>
                    <div style={{fontSize:10,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>{sig.detail}</div>
                  </div>
                </div>
              ))}
              {!(h.rotation_signals?.length) && <div style={{color:"var(--text-muted)",fontSize:11}}>No rotation signals detected</div>}
            </div>
          </div>
        </div>

        {/* Hot Themes */}
        <div className="card fade-in" style={{marginBottom:16}}>
          <div style={{padding:"10px 16px",borderBottom:"1px solid var(--border-dim)",fontSize:11,fontWeight:700,
            fontFamily:"var(--font-mono)",color:"var(--text-muted)",letterSpacing:1}}>🔥 THEME MOMENTUM</div>
          <div style={{padding:12,display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:8}}>
            {(h.hot_themes || []).map((theme,i) => (
              <div key={i} style={{background:theme.is_hot?"rgba(255,170,0,0.06)":"var(--bg-tertiary)",
                border:`1px solid ${theme.is_hot?"rgba(255,170,0,0.2)":"var(--border-dim)"}`,
                borderRadius:6,padding:"10px 12px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <span style={{fontWeight:700,fontSize:12}}>{theme.is_hot ? "🔥 " : ""}{theme.name}</span>
                  <span style={{fontFamily:"var(--font-mono)",fontWeight:700,fontSize:14,
                    color:theme.avg_momentum>60?"#00ff88":theme.avg_momentum>40?"#ffaa00":"#ff4455"}}>
                    {theme.avg_momentum.toFixed(0)}
                  </span>
                </div>
                <div style={{height:4,borderRadius:2,background:"rgba(255,255,255,0.05)"}}>
                  <div style={{height:"100%",borderRadius:2,width:`${theme.avg_momentum}%`,
                    background:theme.avg_momentum>60?"#00ff88":theme.avg_momentum>40?"#ffaa00":"#ff4455"}}/>
                </div>
                <div style={{fontSize:9,color:"var(--text-muted)",marginTop:4,fontFamily:"var(--font-mono)"}}>
                  {theme.sector_count} sectors tracked
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* All Treemaps Side by Side */}
        <div className="card fade-in" style={{marginBottom:16}}>
          <div style={{padding:"10px 16px",borderBottom:"1px solid var(--border-dim)",fontSize:11,fontWeight:700,
            fontFamily:"var(--font-mono)",color:"var(--text-muted)",letterSpacing:1}}>MULTI-TIMEFRAME COMPARISON</div>
          <div style={{padding:12,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            <Treemap data={treemaps["3m"]||[]} title="3M RS" timeframe="3 Months"/>
            <Treemap data={treemaps["1m"]||[]} title="1M RS" timeframe="Monthly"/>
            <Treemap data={treemaps["1w"]||[]} title="1W RS" timeframe="Weekly"/>
          </div>
        </div>

        {/* Footer */}
        <div style={{padding:"12px 0",borderTop:"1px solid var(--border-dim)",display:"flex",justifyContent:"space-between",
          fontSize:9,color:"var(--text-muted)",fontFamily:"var(--font-mono)",letterSpacing:1}}>
          <span>TRADEDGE SECTOR INTELLIGENCE • AI BY GROQ • DATA VIA YFINANCE</span>
          <span>⚡ CYBERPUNK EDITION</span>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<SectorPage/>);
</script>
</body>
</html>
